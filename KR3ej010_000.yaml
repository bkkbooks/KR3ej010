front:
  text: 後序議者曰經籍吾道之筌蹄方論醫道之筌蹄然則然矣使經籍不存學者無所折衷安知夫道之淵源使方論不著醫者無所夷考安知夫醫之精粗世有盧扁華佗則處劑意解妙通於神何假方論哉奈何盧扁華佗不世有求其不迂不泥不矜不誣者蓋鮮士大夫與其委聽於庸醫之手曷若因方論求古人用心以之衛生濟世耶方論之於世猶五穀之於日用乎孰謂士君子恥言之揭陽劉公帥荊湘嘗命編集古今醫書中小兒方劑之說為一書總四十卷目曰幼幼新書既成三十八卷而疾不起漕使四明樓公實繼其政乃曰前之美不可不成肆命亟迄其事因合後二卷為一復纂歷代所述求子方論為一卷冠其篇首閱月而書成噫可謂盡矣才孺竊嘗聞諸夫子之言曰父母生之續莫大焉嗣續之道人倫之首詩三百六篇聖人所取婦人樂有子芣苜美之子孫眾多螽斯美之居然生子生民美之乃生男子斯干美之讀詩至此使人三致志焉求子之論古人所以著於方書者歟今公會萃諸家之說置諸方論之前使成書流布家藏人有真得夫子與詩人之意者也抑嘗謂昔宋莒公因暴雨至水侵蟻穴公折竹為橋以過群蟻他日有僧謂公曰公丰神頓異如能活數百萬命者夫折竹為橋一時戲事螻螘微生何補於世而陰為功惠如此矧是書之傳利及天下後世則公之茀祿榮衍取必於天端可執左契也紹興上章敦牂歲十一月哉生明左迪功郎新差江陵府司戶參軍石才孺謹序庚午秋仲潭帥劉方明以疾不起僕攝帥事問諸府人公治潭久凡所興立不為苟且計得無有肇端既閒偶未就者於是以幼幼新書來告索而觀之則古今醫家之書若方與論為嬰孺設者無不畢取包並總統類聚而條分之如適通寰百貨具在如開藏室群玉燦然隨所宜用必厭其求噫昔好事人得一名方櫝藏謹守雖父子誓以不傳方明於此顧能窮探博取萃為成書鋟版流通與世共寶則其用心亦仁矣哉因命趣工以成其美又集舊傳宜子諸方列繫於左為第一通云十一月十六日右朝散大夫荊湖南路轉運判官權潭州軍州事樓璹謹跋
