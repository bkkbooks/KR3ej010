body:
  text: 卷第一求端探本凡一門求子方論詩周南國風芣苡后妃之美也和平則婦人樂有子矣王氏詩義以為芣苡以為藥能使人有子爾雅云芣苡馬舄馬舄車前也黃帝內經素問上古天真論帝日人年老而無子者材力盡耶將天數然也岐伯曰女子二七而天癸至任脈通太衝脈盛月事以時下故有子癸謂任癸北方水脈名也任脈衝脈皆奇經脈也腎氣全盛衝任流通經血漸盈應時而下天真之氣降與之從事故云天癸也然沖為血海任主胞胎二者相資故能有子所以謂之月事者平和之氣常以三旬而一見也故愆期者謂之有病丈夫二八腎氣盛天癸至精氣溢瀉陰陽和故能有子男女有陰陽之質不同天癸則精血之形亦異陰靜海滿而去血陽動應合而泄精二者通和故能有子易繫辭曰男女合精萬物化生此之謂也千金論曰夫欲求子者當先知夫妻本命五行相生及與德合併本命不在子休廢死墓中者則求子必得若其本命五行相剋及與刑殺衝破並在子休廢死墓中者則求子了不可得慎無措意縱或得者於後終亦纍人若其相生並遇福德者仍須依法如方避諸禁忌則所誕兒子盡善盡美難以具陳矣禁忌法受胎時日推王相貴宿日法並載本門中千金論曰凡人無子當為夫妻俱有五勞七傷虛羸百病所致故有絶嗣之殃夫治之法男服七子散女服紫石門冬丸及坐導蕩胞湯無不有子也四方並見本門中千金論曰古者求子多用慶雲散承澤丸今代人絶不用此雖未試驗其法可重故述之二方並見本門中千金論曰陰陽調和二氣相感陽施陰化是以有娠而三陽所食則多生女但妊娠二月名曰始膏精氣成於胞里至於三月名曰始胎血脈不流象形而變未有定儀見物而化是以男女未分故未滿三月者可服藥方術轉之令生男也方術並見本門中千金曰御女之法交會者當避丙丁日及弦望晦朔大風大雨大霧大寒大暑雷電霹靂天地晦冥日月薄蝕虹霓地動若御女者則損人神不吉損男百倍令女得病有子必癲癡頑愚喑啞聾聵攣跛盲眇多病短壽不孝不仁又避日月星辰火光之下神廟佛寺之中井灶圊廁之側冢墓尸樞之傍皆悉不可夫交合如法則有福德大智善人降托胎中仍令性行調順所作和合家道日隆祥瑞競集若不如法則有薄德愚癡惡人來托胎中仍令父母性行凶險所作不成家道日否殃咎屢至夫禍福之應有如影響此乃必然之理可不再思之若欲求子者但待婦人月經絶後一日三日五日擇其王相日及月宿在貴宿日以生氣時夜半後乃施瀉有子皆男必壽而賢明高爵也以月經絶後二日四日六日施瀉有子必女過六日後勿得施瀉既不得子亦不成人王相日春甲乙夏丙丁秋庚辛冬壬癸月宿日正月一日六日九日十日十一日十二日十四日二十一日二十四日二十九日二月四日七日八日九日十日十二日十四日十九日二十二日二十七日三月一日二日五日六日七日八日十日十七日二十日二十五日四月三日四日五日六日八日十日十五日十八日二十二日二十八日五月一日二日三日四日五日六日十二日十五日二十日二十五日二十八日二十九日三十日六月一日三日十日十三日十八日二十三日二十六日二十七日二十九日七月一日八日十一日十六日二十一日二十四日二十五日二十六日二十七日二十九日八月五日八日十日十三日十八日二十一日二十二日二十三日二十四日二十五日二十六日九月三日六日十一日十六日十九日二十日二十一日二十二日二十三日二十四日十月一日四日九日十日十四日十七日十八日十九日二十日二十二日二十三日二十九日十一月一日六日十一日十四日十五日十六日二十九日十二月四日九日十二日十三日十四日十五日十七日二十四日春甲寅乙卯夏丙午丁巳秋庚申辛酉冬壬子癸亥若與此上件月宿日相合者尤益千金黃帝雜禁忌法曰人有所怒血氣未定因以交合令人發癰疽又不可忍小便交合使人淋莖中痛面失血色及遠行疲乏來入房為五勞虛損少子且婦人月事未絶而交合令人成病得白駁也聖惠夫婦人無子者其事有三也一者墳墓不嗣二者夫婦年命相剋三者夫病婦疹皆使無子若是墳墓不嗣年命相剋此二者非藥能益若夫病婦疹須將藥餌故得有效也然婦人挾疾無子皆由勞血血氣生病或月經澀閉或崩血帶下致陰陽之氣不和經血之行乖候故無子也診其右手關後尺脈浮則為陽陽脈絶無子也又脈微澀中年得此為絶産也少陰脈如浮緊則絶産惡寒尺寸俱微弱者則絶産也聖惠夫婦人子臟虛冷無子者由將攝失宜飲食不節乘風取冷或勞傷過度致風冷之氣乘其經血結於子臟子臟則冷故令久無子也葛氏肘後婦人崩中漏下青黃赤白使人無子方禹餘糧赤石脂牡蠣桂心烏賊魚骨灶下黃土上為末各等分以粥飲服方寸匕日三服葛氏肘後又方乾薑經墨各一兩上末為丸酒下日三丸神效葛氏肘後又方鹿茸當歸各二兩蒲黃半兩上搗篩酒服一錢匕稍加至方寸匕葛氏肘後又方上好墨末一匕飲服葛氏肘後又方上燒露蜂房末三指撮酒服之大神效葛氏肘後又方上常炙豬腎脂食之麵裹煮吞之亦佳葛氏肘後婦人無病觸禁久不生子常候月水絶後一日交接為男二日為女三日為男四日為女五日為男六日為女過此則女間閉不成勿復交接更時後日徒然無益浪辛苦也柏子仁一升茯苓米酒二升上搗合乳和服十丸即佳葛氏肘後又方大黃七分黝參五分皂莢杏仁吳茱萸二兩半夏前胡各一分上搗蜜丸服二十丸不過半年有子依前法即定男女也千金七子散治丈夫風虛目暗精氣衰少亦無子補不足方千金翼同五味子牡荊子菟絲子車前子菥蓂子石斛薯蕷熟地黃杜仲鹿茸遠志各八銖附子蛇床子芎藭各六銖山茱萸天雄人參茯苓黃耆牛膝各五銖桂心十銖巴戟天十二銖蓯蓉十二銖鍾乳粉八銖上二十四味治下篩酒服方寸匕日二不知增至二匕以知為度禁如藥法不能酒者蜜和丸服亦得一方加覆盆子八銖求子法一依前篇千金朴消蕩胞湯治婦人立身已來全不産及斷緒久不産三十年者方朴消牡丹當歸大黃桃仁生用各三銖細辛厚朴桔梗赤芍藥人參茯苓桂心甘草牛膝橘皮各二銖虻蟲十枚水蛭十枚附子六銖上十八味㕮咀以清酒五升水五升合煮取三升分四服日三夜一每服相去三時更服如常覆被取少汗汗不出冬日著火籠之必下積血及冷赤膿如赤小豆汁本為婦人子宮內有此惡物令然或天陰臍下痛或月水不調為有冷血不受胎若斟酌下盡氣力弱大困不堪更服亦可二三服即止如大悶不堪可食酢飯冷漿一口即止然恐去惡物不盡不大得藥力若能忍服盡大好一日後仍著道藥千金翼不用桔梗甘草千金治全不産及斷緒服前朴消湯後著坐導藥方皂莢山茱萸千金翼作苦瓜當歸各一兩細辛五味子乾薑各二兩大黃礬石戎鹽蜀椒各半兩上十味末之以絹袋盛大如指長三寸盛藥令滿內婦人陰中坐臥任意勿行走急小便時去之更安新者一日一度必下青黃冷汁汁盡止即可幸御自有子若未見病出亦可至十日安之一本別有葶藶砒霜各半兩此藥為服朴硝湯恐去冷惡物出不盡以導藥下之值天陰冷不疼不須著導藥有著鹽為導藥者然不如此藥其服朴硝湯後即安導藥經一日外服紫石門冬丸千金紫石門冬丸治全不産及斷緒方紫石英天門冬各三兩當歸芎藭紫葳卷柏桂心烏頭乾地黃牡蒙千金翼作牡荊外臺作牡蒙禹餘糧石斛辛夷各一兩人參桑寄生續斷細辛厚朴乾薑食茱萸牡丹牛膝各三十銖柏子仁一兩薯蕷烏賊骨甘草各一兩半上二十六味末之蜜和丸酒服如梧桐子大十丸日三漸增至三十丸以腹中熱為度不禁房室夫行不在不可服禁如藥法比來服者不至盡劑即有娠千金白薇丸主令婦人有子方白薇細辛防風人參秦椒秦艽桂心牛膝白蘞一云白芷蕪荑沙參芍藥五味子白殭蠶牡丹蠐螬各一兩乾漆柏子仁乾薑卷柏附子芎藭各三十銖紫石英桃仁各一兩半鍾乳乾地黃白石英各二兩鼠婦半兩水蛭虻蟲各十五枚吳茱萸十八銖麻布叩復頭一尺燒上三十二味末之蜜和丸酒服如梧子大十五丸日再稍加至三十丸當有所去小覺有異即停服千金慶雲散主丈夫陽氣不足不能施化施化無成方千金翼同覆盆子五味子各一升天雄一兩石斛白朮各三兩桑寄生四兩天門冬九兩菟絲子二升紫石英二兩上九味治下篩酒服方寸匕先食日三服素不耐冷者去寄生加細辛四兩陽氣不少而無子者去石斛加檳榔十五枚千金承澤丸主婦人下焦三十六疾不孕絶産方千金翼同梅核仁辛夷各一升葛上亭長七枚澤蘭子五分溲疏三兩藁本一兩上六味末之蜜和丸先食服如大豆二丸日三不知稍增若腹中無堅癖積聚者去亭長加通草一兩惡甘者和藥先以苦酒搜散乃內少蜜和為丸千金大黃丸主帶下百病無子服藥十日下血二十日下長蟲及清黃汁三十日病除五十日肥白方大黃破如米豆熬令黑柴胡乾薑朴硝各一兩芎藭五兩蜀椒二兩茯苓如雞子大一枚上七味末之蜜和丸如梧桐子大先食服七丸米飲下加至十丸以知為度五日微下千金治女人積年不孕吉祥丸方天麻柳絮牡丹茯苓乾地黃桂心各一兩五味子桃花白朮芎藭各二兩覆盆子一斗桃仁一百枚菟絲子楮實子各一升上十四味末之蜜和丸如豆大每服空心飲若酒下五丸日中一服晚一服千金硝石大黃丸治十二癥瘕及婦人帶下絶産無子並欲服寒食散而腹中有癥瘕實者當先服大丸下之乃服寒食散大丸不下水穀但下病耳不令人困方硝石六兩朴硝亦得大黃八兩人參甘草各二兩上四味末之以三年苦酒三升置銅器中以竹箸柱器中一升作一刻凡三升作三刻以置火上先內大黃常攪不息使微沸盡一刻乃內余藥又盡一刻有餘一刻極微火使可丸如雞子中黃欲合藥當先齋戒一宿勿令小兒女人奴婢等見之欲下病者用二丸若不能服大丸者可分作小丸不可過四丸也欲令大不欲令細能不分為善若人羸者可少食強者不須食二十日五度服其和調半日乃下若婦人服之下者或如雞肝或如米汁正赤黑或一升或三升下後慎風冷作一杯粥食之然後作羹臛自養如産婦法六月則有子禁生魚豬肉辛菜若寒食散者自如藥法不與此同日一服寒食散方未見千金治月水不利閉塞絶産十八年服此藥二十八日有子金城太守白薇丸方白薇細辛各三十銖人參杜蘅古今録驗用牡蠣牡蒙厚朴當歸紫菀白殭蠶半夏各十八銖蜀椒防風附子各一兩半沙參乾薑秦艽牛膝各半兩上十七味末之蜜和先食服如桐子大三丸不知稍增至四五丸此藥不長將服覺有娠則止用之大驗崔氏有桔梗丹參十八銖千金白薇丸主久無子或斷緒上熱下冷百病皆治之方千金翼同白薇乾薑蜀椒乾地黃車前子各十八銖石膏紫石英藁本菴䕡子卷柏各三十銖芎藭蛇床子當歸各一兩太一餘糧白龍骨麥門冬遠志澤蘭茯苓赤石脂各二兩覆盆子白芷桃仁人參各一兩半細辛三兩蒲黃桂心各二兩半橘皮半兩上二十八味末之蜜和酒服十五丸如梧子大日再漸增以知為度亦可至五十丸慎豬雞生冷酥滑魚蒜驢馬牛肉等覺有娠即停三月止擇食時可食牛肝及心至四月五月不須不可故殺令子短壽遇得者大良千金治婦人絶産生來未産蕩滌腑臟使玉門受子精秦椒丸方秦椒天雄各十八銖元參人參白蘞鼠婦白芷黃耆桔梗露蜂房白殭蠶桃仁蠐螬白薇細辛蕪荑各一兩牡蒙沙參防風甘草牡丹皮牛膝卷柏五味子芍藥桂心大黃石斛白朮各三十銖柏子仁茯苓當歸乾薑各一兩半澤蘭乾地黃芎藭各一兩十八銖乾漆白石英紫石英附子各二兩鍾乳二兩半水蛭七十枚虻蟲一百枚麻布叩復頭七寸燒上四十四味末之蜜丸酒服十丸如梧子日再稍加至二十丸若有所去如豆汁鼻涕此是病出覺有孕即停千金治婦人始覺有娠養胎並轉女為男丹參丸方丹參續斷芍藥白膠白朮柏子仁甘草各二兩東門上雄雞頭一枚當歸吳茱萸橘皮各一兩十八銖白芷冠纓燒灰各一兩蕪荑十八銖乾地黃一兩半犬卵一具干人參芎藭乾薑各三十銖上十九味末之蜜和丸酒服十丸日再稍加至二十丸如梧子大千金又方取原蠶矢一枚井花水服之日三千金又方取弓弩弦一枚絳囊盛帶婦人左臂一法繫腰下滿百日去之千金又方取雄黃一兩絳囊盛帶之要女者帶雌黃千金又方上以斧一柄於産婦臥床下置之仍系刃向下勿令人知如不信者待雞抱卵時依此置於窠下一窠雞子盡為雄也千金治勞損産後無子陰中冷溢出子門閉積年不瘥身體寒冷方防風一兩半桔梗三十銖人參一兩菖蒲半夏丹參厚朴乾薑紫菀杜蘅各十八銖秦艽白蘞牛膝沙參各半兩上十四味末之白蜜和丸如小豆食後服十五丸日三服不知增至二十丸有身止夫不在勿服之服藥後七日方合陰陽千金柏子仁丸治婦人五勞七傷羸冷瘦削面無顏色飲食減少貌失光澤及産後斷緒無子能久服令人肥白補益方柏子仁黃耆乾薑白石英紫石英鍾乳各二兩赤石脂厚朴桂心白朮蓯蓉細辛獨活人參五味子石斛白芷芍藥桔梗各一兩蜀椒一兩半防風烏頭一方作牛膝乾地黃各三十銖澤蘭二兩六銖藁本蕪荑各十八銖杜仲當歸甘草芎藭各四十二銖上三十味末之蜜和酒服二十丸如梧子不知加至三十丸千金翼無烏頭有龍骨防葵茯苓秦艽各半兩為三十三味並治産後半身枯悴千金大澤蘭丸治婦人虛損及中風余病疝瘕陰中冷痛或頭風入腦寒痹筋攣緩急血閉無子面上遊風去來目淚出多涕唾忽忽如醉或胃中冷逆胸中嘔不止及泄痢淋瀝或五臟六腑寒熱不調心下痞急邪氣咳逆或漏下赤白陰中腫痛胸脅支滿或身體皮膚中澀如麻痘苦癢疾癖結氣或四肢拘攣風行周身骨節疼痛目眩無所見或上氣惡寒灑淅如瘧或喉痹鼻齆風癇癲疾或月水不通魂不定飲食無味併産後內衄無所不治服之令人有子方澤蘭三兩六銖藁本當歸甘草各一兩十八銖芎藭乾地黃柏子仁五味子各一兩半桂心石斛白朮各一兩六銖白芷蓯蓉厚朴防風薯蕷茯苓乾薑細辛卷柏各一兩蜀椒人參杜仲牛膝蛇床子續斷艾葉蕪荑各十八銖紫石英三兩赤石脂石膏各二兩禹餘糧一兩一本有枳實十八銖麥門冬一兩半上三十二味末之蜜和丸酒服如梧子大二十丸至四十丸久赤白痢去幹地黃石膏麥門冬柏子仁加大麥蘖陳曲龍骨阿膠黃連各一兩半有鍾乳加三兩良千金紫石英天門冬丸主風冷在子官有子常墮落或始為婦便患心痛仍成心疾月水都未曾來服之肥充令人有子方紫石英禹餘糧天門冬各三兩烏頭蓯蓉桂心甘草五味子柏子仁石斛人參澤瀉一作澤蘭遠志蕪荑杜仲各二兩蜀椒卷柏寄生石南雲母當歸一作辛荑烏賊骨各一兩上二十二味末之蜜和丸酒服梧子大二十丸日二服加至四十丸千金鱉甲丸治女人少腹中積聚大如七八寸盤面上下周流痛不可忍手足苦冷咳噫腥臭兩脅熱如火灸玉門冷如風吹經水不通或在月前或在月後服之三十日便瘥有孕此是河內太守魏夫人方鱉甲桂心各一兩半蜂房元參蜀椒細辛人參苦參丹參沙參吳茱萸各十八銖蟅蟲乾薑牡丹附子水蛭皂莢當歸芍藥甘草防葵各一兩蠐螬二十枚大黃虻蟲各一兩六銖上二十四味末之蜜和丸酒下七丸如梧子大日三稍加之以知為度千金治婦人産後十二症病帶下無子皆是冷風寒氣或産後未滿百日胞絡惡血未盡便利於懸圊上及久坐濕寒入胞里結在少腹牢痛為之積聚小如雞子大者如拳按之跳手隱隱然或如蟲齧或如針刺氣時搶心兩脅支滿不能食飲食不消化上下通流或守胃管痛連玉門背膊痛嘔逆短氣汗出少腹苦寒胞中創咳引陰痛小便自出子門不正令人無子腰胯疼痛四肢沉重淫躍一身盡腫乍來乍去大便不利小便淋瀝或月經不通或下如腐肉青黃赤白等如豆汁夢想不祥牡蒙丸方亦名紫蓋丸牡蒙桂心吳茱萸芎藭厚朴硝石前胡乾薑蟅蟲牡丹蜀椒黃芩桔梗茯苓細辛葶藶人參各十八銖當歸半兩大黃二兩半附子一兩六銖上二十味末之蜜和更搗萬杵丸如梧子大空心酒服三丸日三不知加之至五六丸下赤白青黃物如魚子者病根出矣千金治女人腹中十二疾一曰經水不時二曰經來如清水三曰經水不通四曰不周時五曰生不乳六曰絶無子七曰陰陽減少八曰腹苦痛如刺九曰陰中寒十曰子門相引痛十一曰經來凍如葵汁狀十二曰腰急痛凡此十二病得之時因與夫臥起月經不去或臥濕冷地及以冷水洗浴當時取快而後生百疾或瘡痍未瘥便合陰陽及起早作勞衣單席薄寒從下入方半夏赤石脂各一兩六銖蜀椒乾薑吳茱萸當歸桂心丹參白蘞防風各一兩雚盧半兩上十一味末之蜜和丸每日空心酒服十丸梧子大日三稍加以知為度外臺廣濟療無子令子宮內炙丸方聖惠方同麝香二分研皂莢十分塗酥炙削去黑皮子蜀椒六分汗上三味搗篩蜜丸酸棗仁大以綿裹內産宮中留少綿線出覺憎寒不淨下多即抽綿線出卻丸藥一日一度換之無問晝夜皆內無所忌外臺廣濟又方聖惠本同蛇床子石鹽細辛乾薑土瓜根各四兩上五味搗散取如棗核大以綿裹內子宮中以指進之依準前法中門病未可必不得近丈夫余無所忌外臺廣濟又療婦人百病斷絶緒産白薇丸方白薇細辛厚朴炙椒汗桔梗鱉甲炙各五分防風大黃附子炮石硫黃研各六分牡蒙二分人參桑上寄生各四分半夏洗白殭蠶續斷秦艽紫菀杜蘅牛膝虻蟲去翅足熬水蛭各三分紫石英研朴硝桂心鍾乳當歸各八分上二十七味搗篩蜜丸空腹溫酒服如梧子十五丸日二漸加至三十丸不吐不利忌生冷油膩餳生血物人莧生蔥生菜豬肉冷水黏食陳臭外臺延年療婦人子臟偏僻冷結無子坐藥方聖惠方同蛇床子芫花各三兩上二味搗篩取棗大紗袋盛內産門中令沒指袋少長作須去任意臥著慎風冷外臺廣濟療久無子白薇丸方白薇牡蒙藁本各五分當歸薑黃乾地黃各七分人參柏子仁石斛桂心附子炮五味子防風吳茱萸甘草炙牛膝芎藭桑寄生各六分禹餘糧八分秦椒二分汗上二十味搗篩蜜丸如梧桐子空腹酒下二十丸加至三十丸日再服不利忌生蔥生菜熱面蕎麥豬肉葵菜蕪荑菘菜海藻黏食陳臭物等外臺廣濟又療久無子斷緒少腹冷痛氣不調地黃湯方乾地黃牛膝當歸各八兩芎藭卷柏防風各六分桂心牽牛子末各三分上八味切以水六升煮取二升三合去滓分三服服別和一分牽牛末服如人行四五里更進一服以快利止忌熱面蕎麥炙肉生蔥蕪荑蒜黏食等物外臺經心録茱萸丸療婦人陰寒十年無子方聖惠方同蜀椒去目汗末吳茱萸各一升上二味蜜丸如彈子大綿裹導子腸中日再易無所下但開子臟令陰溫即有子也聖惠治婦人無子或斷緒上熱下冷百病皆主之白薇丸方白薇川椒去目及閉口者微炒去汗用熟乾地黃白龍骨各一兩當歸銼碎微炒車前子蛇床子芎藭乾薑炮裂銼細辛各半兩藁本卷柏桃仁湯浸去皮尖雙仁麩炒微黃白芷覆盆子菖蒲人參去蘆頭桂心遠志去心白茯苓各三分麥門冬一兩半去心焙上件藥搗羅為末煉蜜和搗五七百杵丸如梧桐子大每於空心及晚食前以溫酒下三十丸聖惠治婦人腹臟久積風冷血氣凝澀不能宣通故令無子宜服杜蘅丸方杜蘅防風去蘆頭白茯苓細辛附子炮去皮臍各一兩白薇牛膝去苗沙參去蘆頭半夏湯洗七遍去滑微炒秦艽去苗菖蒲蒿本蛇床子桂心各三分川椒一分去目及閉口者微炒去汗上件藥搗羅為末煉蜜和搗五七百杵丸如梧桐子大每於空心及晚食前以溫酒下三十丸有子即住服聖惠治婦人子臟風冷致令無子宜用此方皂莢去黑皮塗酥炙令黑去子川大黃銼碎微炒戎鹽當歸銼碎微炒白礬燒灰各一兩五味子川椒去目及閉口者微炒去汗乾薑炮裂銼細辛各三分上件藥搗羅為末用綿裹藥末如棗大內産門中有惡物下即止未效再用聖惠治婦人子臟虛冷及五勞七傷羸瘦面無顏色不能飲食産後斷緒無子多時柏子仁丸柏子仁澤蘭防風去蘆頭紫石英白石英各細研並水飛過當歸銼碎微炒厚朴去粗皮塗生薑汁炙令香熟熟乾地黃杜仲去粗皮炙微黃銼黃耆銼芎藭乾薑炮裂銼牛膝去苗各一兩白朮蕪荑人參去蘆頭石斛去根銼白芷赤石脂細研白芍藥桔梗去蘆頭五味子防葵細辛秦艽去苗白茯苓藁本龍骨肉蓯蓉酒浸一宿割去皺皮炙令乾桂心獨活以上各半兩鍾乳粉二兩甘草炙微赤銼川椒三分去目及閉口微炒去汗用上件藥搗羅為末入研了藥都研令勻煉蜜和搗五七百杵丸如梧桐子大每於空心及晚食前以溫酒下三十丸聖惠治婦人子臟久積風虛冷氣致陰陽二氣不能和合故令久無子秦椒丸方秦椒去目及閉口者微炒去汗細辛蕪荑白石英細研水飛過白薇澤蘭人參去蘆頭石斛去根銼防風去蘆頭牡蒙白芷桔梗去蘆頭牛膝去苗川大黃銼碎微炒甘草炙微赤銼白蘞五味子桂心黃耆銼蠐螬微炒白殭蠶微炒白朮元參桃仁湯浸去皮尖雙仁麩炒微黃牡丹沙參去蘆頭卷柏芎藭乾薑炮裂銼白芍藥露蜂房微炒以上各一兩鍾乳粉紫石英細研水飛過乾漆搗碎炒令煙出附子炮裂去皮臍熟乾地黃以上各二兩天雄三分炮裂去皮臍柏子仁當歸銼碎微炒白茯苓以上各一兩半虻蟲七枚去翅足微炒水蛭十四枚炒令黃麻布七寸燒灰上件藥搗羅為末煉蜜和搗五七百杵丸如梧桐子大每於空心以溫酒下三十丸服稍覺有驗即住服聖惠治婦人久無子由子臟久積風冷陰陽不能施化宜服紫石英丸方紫石英二兩細研水飛過細辛厚朴去粗皮塗生薑汁炙令香熟桔梗去蘆頭川椒去目及閉口者微炒去汗防風去蘆頭川大黃銼碎微炒附子炮裂去皮臍硫黃細研白薇當歸銼碎微炒桂心以上各一兩鱉甲一兩半生用牡蒙人參去蘆頭桑寄生各三分半夏湯洗七遍去滑白殭蠶微炒續斷紫菀洗去苗土牛膝去苗杜蘅以上各半兩上件藥搗羅為末煉蜜和搗五七百杵丸如梧桐子大每於空心及晚食前以溫酒下三十丸聖惠治婦人子臟冷久無子由風寒邪氣客於經血宜服卷柏丸方卷柏牡蒙藁本當歸銼碎微炒熟乾地黃柏子仁乾薑炮裂銼禹餘糧燒醋淬三遍白薇以上各一兩芎藭人參去蘆頭石斛去根銼桂心附子炮裂去皮臍五味子防風去蘆頭甘草炙微赤銼吳茱萸醋浸七遍焙乾微炒牛膝去苗桑寄生川椒去目及閉口者微炒去汗以上各三分上件藥搗羅為末煉蜜和搗五七百杵丸如梧桐子大每於空心及晚食前以溫酒下三十丸聖惠治婦人血海久積虛冷無子陽起石丸方陽起石二兩酒浸煮半日細研熟乾地黃一兩乾薑炮裂銼白朮牛膝去苗吳茱萸湯浸七遍焙乾微炒以上各三分上件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大每於空心及晚食前溫酒下三十丸聖惠治婦人久無子斷緒者是子臟積冷血氣不調宜服干熟地黃散方熟乾地黃牛膝去苗當歸銼細微炒柏子仁白薇以上各一兩桂心半兩防風去蘆頭芎藭卷柏各三分上件藥搗羅為散每服三錢以水一中盞煎至六分去滓每日空心溫服靈苑治受氣虛弱及五勞七傷臟腑積冷痃癖症塊虛脹或經脈不調疳冷赤白帶下口苦舌乾面色痿黃黑皯心煩驚悸頭目旋暈不喜飲食痰涕黏涎手足百節熱疼無力肌肉消瘦子息斷緒服一月當妊娠百病皆愈大效內補丸方萆薢四兩牛膝白朮五加皮各二兩川烏頭炮去皮臍丹參枳實麩炒去瓤各一兩上七味搗羅為細末煉蜜為丸如梧桐子大每服二十丸用暖酒下空心日午日晚各進一服立有功效靈苑阿膠煎丸治婦人血氣久虛孕胎不成大補益虛損不足常服滋助血海方伏道艾取葉去梗搗熟篩去粗皮只取艾茸稱取二兩米醋煮一伏時候乾研成膏阿膠三兩炙糯米炒大附子炮去皮臍枳殼去瓤麩炒各一兩上五味並搗羅為末入前膏內杵勻為丸如梧桐子大每服三十丸空心用溫酒下午食前再服忌藻菜羊血腥臊等物千金婦人絶子灸然谷五十壯在內踝前直下一寸婦人絶嗣不生胞門閉塞灸關元三十壯報之千金婦人妊子不成若墮落腹痛漏見赤灸胞門五十壯在關元左邊二寸是也右邊二寸名子戶千金治人絶嗣不生灸氣門穴在關元旁三寸各百壯千金婦人子臟閉塞不受精疼灸胞門五十壯千金婦人絶嗣不生漏赤白灸泉門十壯三報之穴在橫骨當陰上際千金翼崩中帶下因産惡露不止中極穴在關元下一寸婦人斷緒最要穴四度針即有子若未有更入八分留十呼得氣即瀉灸亦佳但不及針日灸三七至三百止莊氏腧穴婦人月水不利賁豚上下並無子灸四滿三十壯穴在丹田兩邊相去各一寸半莊氏腧穴妊數墮胎妊娠三月灸膝上一寸七壯莊氏腧穴關元主斷緒産道冷針入八分留三呼瀉五吸灸亦佳但不及針日灸三七壯至一百止
