body:
  text: 卷第二方書敘例凡十三門敘初有小兒方第一千金論曰夫生民之道莫不以養小為大若無於小卒不成大故易稱積小以成大詩有厥初生民傳云聲子生隱公此之一義即是從微至著自少及長人情共見不待經史故今斯方先婦人小兒而後丈夫耆老者則是崇本之義也然小兒氣勢微弱醫士欲留心救療立功差難今之學者多不存意良由嬰兒在於襁褓之內乳氣腥臊醫者操行英雄詎肯瞻視靜而言之可為太息者矣小品方云聖惠云小品曰黃帝言凡人年六歲以上為小十六以上為少巢源外臺作十八以上為少三十以上為壯巢源外臺作二十以上為壯五十以上為老其六歲以下經所不載所以乳下嬰兒有病難治者皆為無所承據也中古有巫妨巢源作巫方者立小兒顱囟經以占夭壽判疾病死生世相傳授始有小兒方焉逮於晉宋江左推諸蘇家傳習有驗流於人間齊有徐王者亦有小兒方三卷故今之學者頗得傳授然徐氏位望隆重何暇留心於少小詳其方意不甚深細少有可採未為至祕令博撰諸家及自經用有效者以為此篇凡百居家皆宜達茲養小之術則無橫夭之禍也敘小兒有病與大人不殊第二千金小兒之病與大人不殊唯用藥有多少為異其驚癇客忤解顱不行等八九篇合為一卷自餘下痢等方並散在諸篇中可披而得也敘小兒方可酌量藥品分兩第三葛稚川肘後方載鹿鳴山續古序云觀夫古方藥品分兩灸穴分寸不類者蓋古今人體大小或異臟腑血脈亦有差焉請以意酌量藥品分兩古序已明取所服多少配之或一分為兩或一銖為兩以盞當升可也如中卷末紫丸方代赭赤石脂各一兩巴豆四十粒杏仁五十枚小兒服一麻子百日者一小豆且多矣若兩用二銖四絫巴豆四粒杏仁五枚可療十數小兒此其類也灸之分寸取其人左右中指中節可也其使有毒狼虎性藥乃急救性命者也或遇發毒急掘地作小坑以水令滿熟攪稍澄飲水自解名為地漿特加是說於品題之後爾敘小兒有病宜早治第四外臺祕要凡人有少病若似不如平常則須早道若隱忍不療小兒女子益以滋甚敘調理小兒第五嬰童寶鑑云夫人稟陰陽二氣生疾病於三焦然冠壯易明童幼難治黃帝云吾不能察其幼小者為別是一家調理耳此不在黃帝圖經之論也黃帝與岐伯撰素問只說大人十二經脈即不說小兒黃帝云吾不察其少小賴國有巫方雖以不經可知天壽之要又云小兒如水中之泡草頭之露者以表用藥無令造次焉為小兒臟腑嬌嫩血氣懦弱肌體不密精神未備故稱不易醫也或云初生者曰嬰兒三歲者曰小兒十歲者曰童子大小各異且不可概而用藥也必明消息形候審定生死察病患之淺深知藥性之寒溫乃一世之良工矣敘修合藥第六嬰童寶鑑云凡修合藥餌切要分別州土深曉好惡明辨真僞然後精細潔淨炮爁炙爆一一都了乃依方分兩仔細稱定始可合和又合和之際當須用不津器盛藥勿令嘗嗅太平聖惠方云不可衆鼻嗅之衆口嘗之恐損藥精氣用之無靈效耳又不可全用古方恐分兩差誤今之與古風俗尚乃不同豈得更用古方之分兩也今時醫人修合小兒藥物惟少是妙故別立圭則以表今時凡古用一刀圭者即今用一錢匕一錢匕者以錢滿抄一錢末也或云一錢重者是等稱之一錢也明此二說更無疑焉夫稱二錢半為一分四分為一兩但依此修合必無差誤為小兒臟腑與大人不同故立此一篇耳敘用藥第七萬全方論小兒用藥法經言六歲以下為小兒然小兒與大人異療者以有撮口急慢驚忤疳癇等候當須別為方論余病與大人不殊諸方散在卷中亦可兼取詳而用之如吐瀉傷風傷寒之類受病一同大人並取同用之然小兒純陽病則熱多冷少其藥宜少冷於大人為得其有用溫藥處當以意減損之如水瀉白痢胃冷之類亦用溫藥也若丸散用之亦在醫者裁酌一月以內可與百日同周歲可與二歲同三歲可與四歲同五歲可與六歲同同者謂同其多少為一服雖然大約如此更詳其疾之輕重而增減之孫思邈言龍膽調中二湯云兒生一日至七日取一合分三服生八日至十五日取一合半分三服生十六日至二十日取二合分三服生二十日至三十日取三合分三服生三十日至四十日以五合分三服恐五合未得自斟酌上此二方准一日以上四十日以來兒方法具此後欲處方者宜一準此為率乃至五六歲皆節次加減之不煩重述敘小兒氣弱不可容易吐瀉第八祕要指迷論貴賤云天地之性人為貴氣清者賢氣濁者愚乃受父母胎氣既能成人初生曰嬰兒周歲曰孩兒三歲曰小兒況嬰兒之病難曉用藥與大人不同故嬰孩受氣血弱不可吐瀉所謂病輕藥重反受其殃人命既絶不可再生敘十五歲以下皆可以小方脈治之第九惠眼觀證云凡生下一七至襁褓內及一歲皆謂之牙兒二歲曰嬰兒三歲曰奶童四歲曰奶腥五歲曰孩兒六歲曰小兒自一歲至十五歲皆以小方脈治論初受氣第十聖濟經原化篇孕元立本章曰有泰初有泰始渾淪一判既見氣矣故曰泰初既立形矣故曰泰始氣初形始天地相因生生化化品物彰矣故曰大哉干元萬物資始至哉坤元萬物資生有生之初雖陽豫之正育而充之必陰為之主因形移易日改月化無非坤道之代終也謂之妊陽既受始陰壬之也謂之胞已為正陽陰包之也謂之胚未成為器猶之坯也謂之胎既食於母為口以也若娠則以時動也若懷則以身依也天之德地之氣陰陽之至和相與流薄於一體惟能順時數謹人事勿動而傷則生育之道得矣觀四序之運生長收藏貸出萬有儀則咸備而天地之氣未始或虧者蓋陰陽相養以相濟也昧者曾不知此乃欲拂自然之理謬為求息之術方且推生克於五行蘄補養於藥石以僞勝真以人助天雖或有子孕而不育育而不壽者衆矣昔人論年老有子者男不過盡八八女不盡七七則知氣血在人固自有量夫豈能逃陰陽之至數哉聖濟經原化篇藏真賦序章曰水木火土金為序者以其相生有母子之道也水火金木土為序者以其相剋有夫婦之義也相生所以相繼相剋所以相治維人稟生命門肇乎始胎之後未有不相剋以成者原自乾坤交遇於亥一陽始壬於西北壬為陽水合丁之陰火而生丙丙為陽火合辛之陰金而生庚庚為陽金合乙之陰木而生甲甲為陽木合己之陰土而生戊戊為陽土合癸之陰水而生壬茲夫婦之義化育妙理由是出焉方其壬之兆懷命門初具有命門然後生心心主血法丁之生丙也有心然後生肺肺生皮毛法辛之生庚也有肺然後生肝肝生筋法乙之生甲也有肝然後生脾脾生肉法己之生戊也有脾然後生腎腎生骨髓法癸之生壬也有腎則與命門合而二數備矣壬者其一水一石之謂歟此腎於五臟所以獨耦苟徒知在器有權與准在物有龜與蛇在色有赤與黑而六口一水一石之道是未達生化之妙夫太一真精兆於水立於石故火之悍金之堅木之橈土之和得以賅存諸中其相剋相治者乃所以相成耶犯人之形者詎可一於相生相繼而欲以收成物之功哉析而推之一月血凝二月胚兆三月陽神為魂四月陰靈為魄五月五行分五臟六月六律定六腑以之七精開竅八景神具宮室羅布氣足象成靡不有自然之序觀妙之士兩之以九竅之變參之以九臟之動瞭然胸次無或逆施者蓋得其始生之序如此顱囟經夫顱囟者謂天地陰陽化感顱囟故受名也嘗覽黃帝內傳王母金文始演四敘二儀陰陽之術三才一元之道採御靈機黃帝得之升天祕藏金匱密固內經百姓莫可見之後穆王賢士師巫於崆峒洞得而釋敘天地大德陰陽化功父母交和中成胎質爰自精凝血室兒感陽典血入精宮女隨陰住故以清氣降而陽谷生濁氣升而陰井盛此二者二儀互換五氣相參自睹元機非賢莫趨謂真陰錯雜使精血敘而成殃陽發異端感榮衛合而有疾遂使嬰兒才養驚候多生庸愚不測始末亂施攻療便致枉損嬰兒籲哉籲哉遂究古言尋察端由敘成疾目曰顱囟經焉真憑辨證乃定生死後學之流審依濟矣天和大清降乘赤海則謂真一元氣乘之則母情光瘹蕩漾熾然是陽盛發陰當妊其男也六脈諸經皆舉其陽證所謂妊衰不勝臟氣則觸忤而便傷好勝而氣劣則母疾三五月而發皆隨五臟心臟干而以口苦舌乾肺臟暍而多涕發寒肝臟邪而服酸多睡脾臟發而嘔逆惡食腎臟困而軟弱無力臟妊氣平則和而無苦胎若劣而強得臟養至生亦乃多疾二儀純陰之證升雜真一者謂陰盛陽則父情博妊當成女也六脈諸經皆發陰證若血盛氣衰則肥而劣氣若氣盛血衰則瘦而壯氣餘臟妊之氣皆同男說孩兒子處母腹之內時受化和之正氣分陰陽之紀綱天地降靈日月而化萬物以生成隨其時變大理情純至一化成祥瑞之基全真道一故生成焉一月為脈精血凝也二月為胎形兆分也三月陽神為三魂動以生也四月陰靈為七魄淨鎮形也五月五行分臟安神也六月六律定臍姿靈也七月精開竅通光明也八月元神具降真靈也九月宮室羅布以生人也十月氣足萬象成也太一元真在頭曰泥垣總衆神也得諸百靈以御邪氣淘異萬類以靜為源是知慎終靜遠即以守恬和可以保長生耳故小兒之瘦疴蓋他人之過也千金凡兒在胎一月胚二月胎三月有血脈四月形體成五月能動六月諸骨具七月毛髮生八月臟腑具九月谷入胃十月百神備則生矣生後六十日瞳子成能咳笑應和人百日任脈成千金翼云五十日任脈成能自反覆百八十日體骨成能獨坐二百一十日掌骨成能扶伏三百日臏骨成能獨立三百六十日膝骨成能行也千金翼云膝臏成若不能依期者必有不平之處千金翼與此皆同異者箋注於下張渙論小兒初受氣經曰陰搏陽別謂之有子父母氣血和調陽施陰化而成妊娠全在其母忌慎調養則令兒生下少疾易養若初不忌慎則兒無由得安且嬰兒在腹亦可辨男女診其母脈左手沉實為男右手浮大為女又母若面南行還復呼之左回首是男右回首是女且妊娠一月兩月血脈行澀其母勿食腥辛之物居必靜處三四月內形象漸成無食薑兔等物五六月內勿食諸辛物等七八月內勿食瓜果酸物之類九十月內忌食生冷一切動風痰物等常須端心清虛坐無斜席立無偏倚行無邪徑目無邪視耳無邪聽口無邪言心無邪念無妄喜怒思慮每見傴僂醜惡形容之人則避之及不得往田野之間睹一切禽獸之類蓋母有所動胎必感之動靜聽聞莫不隨母若不依此法則男女無由智慧聰明自多疾病難養徒施湯藥又妊娠常須調適寒溫一切忌慎才有小不調便須服藥去其疾病益其氣血扶養胎氣則生兒強盛切宜慎之相壽命第十一千金相小兒壽命長短法兒生枕骨不成者能言而死尻骨不成者能倨而死千金翼以尻骨為膝骨掌骨不成者能扶伏而死踵骨不成者能行而死臏骨不成者能立而死生身不收者死魚口者死股間無生肉者死頤下破者死陰不起者死囊下白者死赤者死相法甚博略述十數條而已兒初生額上有旋毛者早貴妨父母兒初生陰大而與身色同者成人兒初生叫聲連延相屬者壽聲絶而復揚急者不壽兒初生汗血者多危不壽兒初生目視不正數動者大非佳人兒初生自開目者不成人兒初生通身軟弱如無骨者不成人兒初生髮稀少者強不聽人聖惠云不聽兒初生臍小者不壽兒初生早坐早行早語早齒生皆惡性非佳人兒初生頭四破者不成人兒初生頭毛不周匝者不成人啼聲散不成人啼聲深不成人汗不流不成人小便凝如脂膏不成人常搖手足者不成人無此狀候者皆成人也兒初生臍中無血者好卯下縫通達而黑者壽鮮白長大者壽論曰兒三歲以上十歲以下觀其性氣高下即可知其夭壽大略兒小時識悟通敏過人者多夭則項托顏面之流是也小兒骨法成就威儀回轉遲舒稍費人精神鵰琢者壽其預知人意回旋敏速者亦夭則楊修孔融之流是也由此觀之夭壽大略可知也亦猶梅花早發不睹歲寒甘菊晚榮終於年事是知晚成者壽之兆也千金翼相小兒壽命並同聯珠論云凡小兒未滿歲以前五不成醫掌骨不成而不能匍匐必死枕骨不成而不能言語必死膝骨不成而不能移步必死胯骨不成而不能動坐必死尻骨不成而不能行立必死上以上不足之疾並是父母已過之疾也三關錦紋第十二仙人水鑑小兒脈經要訣云夫小兒托質胎胎成形血氣誕生之後三歲之間十旬之內榮衛未調筋骨輕軟腸胃微細凡於動靜易獲驚傷致於夭亡得不傷哉余著書之暇留心醫術措意諸方編成小兒疾候之源成一家徑捷之說三關之脈取類而歌五臟之疾窮太而脈目曰小兒脈經要訣貽於後代深可指迷耳脈形論夫小兒手之第二指指有三節脈之形出其上也近虎口之位號曰風關其次曰氣關在其指端曰命關凡有疾當視其三關上之脈形察其病焉可以三關斷之指左手指也脈形圖與翰林待詔楊大鄴法同少異者各注於下風關脈是驚傳心臟氣關脈是疳傳肺臟命關脈或通度三關是肺風慢驚不療風關慢驚可醫楊大鄴云急驚亦治氣關心疳可醫命關難醫歌曰形如魚刺物多驚莊氏家傳及朱氏家傳皆作形如魚刺是初驚遍體如湯麵色青或瀉或狂宜此斷消症調氣便惺惺風關水驚亦醫氣關疳入肺亦醫楊大鄴云方不治命關及三關通度是慢驚形候也下兩關不斷者難療單關者亦醫楊大鄴云懸針命關疳過三關不治歌曰形似懸針瀉痢多水驚急療便安和莊氏家傳云水驚紫黑候安和受疾只因心臟起三關通度是沉疴風關是肺臟驚氣關慢驚有虛積亦醫命關疳氣風不療歌曰形如水字肺家驚虛積相傳面色青膈上有食宜便取楊大鄴云膈上有涎消症洗肺得安寧風關肺風亦醫氣關慢驚風入肺難療命關若有不療歌曰形如乙字病傳肝眼慢驚啼淚不幹此病肺風傳受得莊氏家傳云此是肝脾傳受得三關觀候細詳看風關病傷肺堪治氣關大腸有積命關難治歌曰形如曲蟲疳積深肺家有病腎乘心患子若能醫得好楊大鄴云患兒急與消沉積良工須是獲千金風關肝疳亦醫楊大鄴於此云風關腎有積可治氣關肺疳亦醫楊大鄴云氣關肺積堪治命關不治楊大鄴同歌曰形似環來腎受疳好泥喜土作常餐消症未遇良工藥取動方知體漸安風關楊大鄴云風關若有腎有疳氣關楊大鄴云氣關疳蛔命關三關若有亂紋皆蟲也楊大鄴云命關不治三關都有紋曲是蟲歌曰紋亂涎橫蟲在心悲啼曉夜痛難禁求神拜鬼渾無效吃藥安和莫吝金風關氣關命關三關都過有積命關獨有不治面上及身上有者便是流米死候不療歌曰流珠死候不須醫更看三關在所推風氣得之猶可治命紋有此死何疑仙人水鑑八脈主病歌形如魚刺物驚瘥形似懸針瀉痢多水字肺驚症見甚乙知肝積要調和又歌形似曲蟲疳患久如環腎積細詳看逢紋亂後知蟲犯流米通身莫望安仙人水鑑虎口脈色相應歌虎口脈青同面上心頭有熱水驚來飛禽四足將禽斷禽為火其色赤虎口一脈若赤應面上有赤是飛禽四足驚也脈亂須逢打撲災茅先生論小兒如小可患要看虎口及三關脈時如丹紅色是傷寒及食猛發壯熱如紅色夾青色是驚如紫青色是腹肚不和如紫黑色是腹中冷或瀉或痢此是氣關也如小兒風關受色與前面同欲丹紫色若其患甚即其色如黑必死也如命關受色被虎口內一帶色去丹紅猶通治若紫色及黑色死也看茅先生似以第一關為氣關第二關卻為風關與其他名字不同然斷病則一雖不同何害大凡小兒三關脈赤來上風關時甚也上命關時死也第一且要看太衝脈動時即吉不動即千萬死更看陰陽二部脈如來沉慢時死如來猛猶尚通治嬰童寶鑑辨三關錦紋云手魚際白肉上有脈可候黑脈起者癇赤者熱青大者寒青小者平手第二指間脈可候青脈為四足驚黑脈為水驚或云沐浴著赤脈為人驚或云火驚微見者為風盛紋曲者為食傷脈小而短者為平脈大而長者為重出節者不治翰林待詔楊大鄴看小兒脈法云夫小兒脈見紅赤色在節內如細魚腸大者即風熱盛也若見脈微紅者即風熱也若見微紅半青者是驚積風熱也若見脈青色在指節內如魚腸大者即驚候也若見脈青色在指節內如練據兩頭大中心細者即急驚癇風候若見脈如前青色過節三二分以來如曲鱔伸縮來去者即慢驚風候若見脈前青中當兩伴半青紅者即急驚候也若見脈白色在節似細魚腸大者此傷脾瀉也若見前白色在節內半白半紅半赤色者即傷寒候也若見陰陽候脈息過節二三分以來如曲鱔縮來縮去者即是傷寒被人將藥取動此無辜疾必死候也見脈色白色過節二三分以來即脾泄瀉也若見傷寒候脈息當節中心者即無辜之疾此日久也七九十一日以上如見本傷寒者只一三五月醫得若見前白色青紅色在節內似細魚腸大者脾胃不順脈白色在節內即驚瘹風也大凡見小兒脈黃色必死如脈過節者為死候也楊大鄴又定小兒生死三關訣手上青紋現情知四足驚黑因遭水撲赤是大人驚內隱連風急紋彎食上尋但看叉手處方始驗真形又內八片錦青色小大麴水火飛禽撲黑花小大麴人鬼並四足赤色小大麴米麵並魚肉若是紅絲見慢脾驚作毒又訣虎口見紋青多應四足驚赤色水兼撲黑是外人驚脈沉症宿乳紋彎食上尋渾身雖壯熱耳冷痘還生又外八片錦孩兒生下月餘間左男右女辨根源若有紫紋胎驚氣青色原胎氣不全赤色有驚因水得一二三歲兩邊看又訣若過一關長一米二米便是驚撲起傳到第一中節時便是驚撲皆一齊似出不出紋隱隱驚傳臟內紫微顯青色驚病方入脾此是慢脾無可疑飛仙論小兒指節候云凡看小兒指節從虎口第一節第二節第三節脈見或青或紫或紅或淡或黑有紋如錦一直者是奶傷脾及熱驚發左右手指皆有者是驚與積齊發有三條或散是肺生風痰或齁䶎鳴者青是傷寒主嗽如紅大主瀉有黑相兼主有痢紅多赤痢黑多白痢有紫相兼加渴是虛也歌曰左手三關現錦紋定傷脾胃熱和驚右同左樣雙紋起食積驚傷是本形紋頭又著三叉樣肺熱風涎夜作聲有青卻是傷寒候若只紋紅瀉欲生寶童方看小兒虎口云自虎口一節至二節脈或青或黃或黑有紋如錦一直者是奶食傷脾及發驚左右手是一樣驚與積齊發有三條成線是肺生風痰或似齁䶎鳴有青是傷風咳嗽如紅主瀉紅黑相兼主有痢黑多主赤痢有紫相兼主瀉此候虛也歌曰紋生左手錦紋形定是傷脾及熱驚右有雙紋如左樣痢傷驚瀉一齊生紋頭有似三叉樣肺熱風生哭不停有青卻是傷寒候只有通紅是瀉生小兒非時將手摸脛七日遇心王必死心王子午時虎口紋形紋如魚刺骨者是因驚著歌曰紋如魚刺是初驚紅色須知病在心若遇黑時連腎脈更宜詳審究元因紋如水字是夾驚傷寒歌曰紋黑驚傳入腎囊青黃脾臟受災殃夾驚傷寒紅赤色鎮心解表要相當紋如一字是吃食並驚有積候歌曰紋彎食上有乖時傳受風邪入在脾若黑之時休整療遙知大命已傾危紋如環子是有驚涎入肺歌曰驚風入肺少人知八錦紋中仔細推環子作紋如面白涎聲潮響急須醫紋如曲蟲是驚入肝歌曰曲蟲紋是病傳肝外證分明仔細看符藥一時交併服何憂此患不能安紋如魚鉤是驚風在膈上歌曰膈上驚風入肺中病人遭熱又生風涼肌解膈兼開胃次鎮心田病乃通紋如懸針有驚在心歌曰驚傳心臟積因多壯熱通身氣不和此患卻稱天瘹病緩若醫持不奈何紋如亂字是脾生疳蟲歌曰蟲亂縱橫總在脾瀉痢頻生更惡啼亦有筋皮乾捲縮用心調理莫延遲紋如流珠是死候苦風氣不可下藥歌曰流珠忽睹在三關孩子相辭命已難醫者返魂求妙藥雖逢扁鵲也應閒寶童方論三關錦紋歌孩子生下才過月有病如何為人說男左女右虎口中若有紫紋是驚熱青色成胎氣未全亦本驚生搐有涎赤色必然經數日或驚水火病相連孩兒一臘至兩臘虎口更交開掌握若生米粒過初關並是有驚防眼闔若過一節至兩節便與積驚同一說似出不出隱隱紋此號應傳脾臟結若紫之時實難療青紫有驚入脾竅此時呼作慢脾風好手醫人急醫療若逢紅色但寬心下藥之時卻神妙脈出三關連指面孩兒死候還須見不拘顏色赤白紅萬死一生休憤怨保生論三關錦紋小兒三歲以前若有患須看虎口脈次指表節為命關次氣關次風關古人所謂初得風關病猶可傳入氣命定難陳是也脈一直者驚與治驚曲里者是傷寒與解汗曲外者傷食有積與下積小兒生未滿五百七十六日須看錦紋命關三脈過者死氣關二脈見病漸深風關一脈見初得病一風關易治二氣關病深三命關死候當於第二指三節上辨之歌曰指上青紋起情知四足驚青色主豬犬羊馬驚黑還因水撲風雨師巫噴水洗浴驚赤色是人驚並撮摸著內曲傷寒甚彎前食上蒸紫紋多瀉痢並有熱黃色主雷驚鼓聲一同但看叉手處方顯病真形莊氏家傳小兒看候外八片錦中雲氣急風還急紋彎食已停又小兒三關候三關青是四足驚三關赤是水驚三關黑是人驚有此通度三關脈候是極驚之候必死餘外並可醫治脈曲向里者是氣疳脈曲向外者是風疳脈斜向右者是傷寒身熱不食脈斜向左者是傷寒身熱不食雙勾脈者是傷寒脈三曲如長蟲是傷硬物脈兩曲如鉤是傷冷脈一頭如鈈又有腳者是傷冷面上有此點子並是再發之候頭面肚上有大脈並青筋並是食毒驚積難療脈如亂蟲是常疳亦有蟲疳蛔食積之疳治之必瘥凡脈不足細者並是風氣但消疳然後取蟲肥孩兒為效又三關錦紋云風關上有黑紋主癇疾赤紋主熱青紋緊小微受冷邪青紋大者主寒邪氣關紋現是疳候傳肺赤青色紫主疳積命關脈現者主急慢驚風難治三關脈通者死風關青如魚刺易治是初驚候黑色難治氣關青如魚刺主疳勞身熱易治命關青如魚刺主虛風邪傳脾難治風關青黑色如懸針青主水驚氣關赤如懸針主疳兼肺臟積熱命關有此凡五色皆是死候三關通度如懸針者主慢驚風難治風關如水字主驚風入肺咳嗽面赤氣關如水字主膈上有涎並虛積停滯命關如水字主驚風疳極夾驚候不拘五色三關通度者不治風關如乙字主肝臟驚風易治氣關如乙字主驚風命關如乙字青黑色主慢脾難治風關如曲蟲者疳病積聚胸前如橫排算子肚皮似吹起豬疱氣關如曲蟲主大腸穢積命關如曲蟲主心臟傳肝難治風關如環主脾臟疳有積聚氣關如環主疳入胃吐逆不治命關如環難治此紋若在風氣二關易治若在命關通度難治此紋在手上或在面上或在左右臉邊皆是死候又要括魚刺初驚候懸針瀉痢多水紋驚肺積乙字是肝訛蟲曲疳將甚如環腎有蹉亂紋蟲已極珠現作沉痾又別本外八錦紋第一指間魚刺動隱隱類蟲行此病從心得先因四足驚第二白輪青黑現手指若懸針內外皆相應兒驚病已侵第三虎口團成曲因驚或感風熱生由病乳神亂臉仍紅第四上吐多頻並翻腸瀉若傾指紋端似乙有濕在中停第五搖頭時拱手熱極意昏沉赤黑紋如現因人自外驚第六內隱風還盛沉痾目不開都緣因喜怒到此有迍災第七赤脈過三節仍加囟似癰縱多神妙藥此病也難攻第八頻因驚撲著啼叫沒時休亂紋三節現無病也堪憂又內八錦紋魚刺脈初驚候風關驚風痰積可治氣關積滯可治命關不治懸針脈主瀉痢風關水驚可治氣關疳在肺不治命關肺疳三關通度驚風不治水字脈肺家有驚積風關肺臟驚積氣關驚命關慢驚疳風不治乙字脈肝氣有傷風關肺風不治氣關驚風入肺不治命關不治曲蟲脈疳盛有積風關肝疳傷脾氣關大腸受積脈粗不可治命關不直者可治如環脈腎家有積風關疳病有積氣關大腸受積命關不治亂紋脈蟲在心其脈亂三關蟲咬心肺初因熱赤腳連連赤紫定為驚更加赤色食軟硬睡里驚亂紋三關可治小兒腎有積也流珠脈死或沉疴指上有黑點子伏積在命關死若是赤點或在風關可與下涎取積又歌曰曲內驚風緊曲外是食症因此多般吐乳食不相應長沙醫者毛彬傳驚八片錦虎口開時赤星現雙睛翻後卒難辨定是人驚風入心手足抽牽無定限虎口開時見黑星囟門腫起及成坑定知四足曾驚著面上時捫手不停虎口開時帶白色小兒病是水驚得口眼同開鼻作聲身上汗珠益流出虎口開時青色交唇青相應又胸高只緣飛鳥來驚著小腹膨脝氣轉牢虎口開時赤色長看天仰面牙齒當小兒高處曾經撲面黑還兼手帶黃虎口開時帶黃色孩兒兩處曾驚嚇作聲開口汗常干項黑鬚防被災厄虎口中心色帶紅兒驚因水遂生風鼻中出氣多開口目直身強徑似弓虎口紋生出外停若逢此候號胎驚不論紅赤並青黑逢此之時命必傾脈法第十三顱囟經凡孩子三歲以下呼為純陽元氣未散若有脈候即須於一寸取之不得同大人分寸其脈候未來呼之脈來三至吸之脈亦三至呼吸定息六至此為無患矣所言定息呼氣也出吸氣未入定息之中又至此是平和也得以大人脈五至取之即瘥矣如此七至以上即為有氣或脈浮如弓之張弦此為有風並可依後方合藥治之或七至以下此為冷候亦宜依後方合藥療之或診候取平和或而不見深浮不定伏益根平者此為神鬼之病且合求祟續宜使藥或桃柳枝湯法煎飲子為使一兩顆桃心顱囟經又云孩子脈呼吸十五至以上三至以下皆死矣千金翼凡婦人脈常欲濡弱於丈夫也小兒四五歲者脈自疾駃呼吸八至也尺寸俱浮直下此為督脈腰背強痛不得俯仰大人癲病小兒風癇小兒脈沉者乳不消也小兒脈弦急者客忤氣也王叔和小兒生死候歌小兒乳後輒嘔逆更兼脈亂無憂慮病源小兒啼未定氣息未調乳母忽遽以乳飲之其氣逆上乳不得下停滯胸膈則胸滿氣急令兒嘔逆又乳母將息取冷冷氣入乳乳變壞不捻除之仍以飲之冷乳入腹與胃相逆則腹脹滿痛氣息喘急亦令嘔逆又解脫換易衣裳及洗浴露兒身體不避風冷風冷客於皮膚腠理傳於血氣入於胃則腹脹而吐逆也凡如此變壞之乳非有冷吐逆腸虛入胃則為痢矣弦急之時被氣纏脈緩即是不消乳小兒脈弦主風邪氣脈緩即氣不消緊數細快亦少苦虛濡邪氣驚風助小兒脈緊與形相稱也虛濡亦生虛邪驚風也痢下宣腸急痛時浮大之脈歸泉路下痢脈浮大者死形與脈相反也聖惠辨小兒脈法夫小兒脈三歲以上五歲以下可看候然與大人有異呼吸八至是其常也九至者病十至者困小兒脈緊者必風癇也脈沉者乳不消脈弦急者為客忤脈沉數者骨間有冷脈浮而數乳癇風熱脈緊而弦腹痛脈弦而數乳熱五臟壅脈牢而實大腸祕澀脈乍短乍長乍大乍小不等者有祟小兒變蒸之時身熱而脈亂汗出不欲食乳食乳即吐逆不可用藥必自瘥矣小兒病困汗出如珠著身不流者不可治小兒久下病痢脈浮而腹痛者不可治小兒有病胸陷口唇乾目直口中氣冷頭低臥不舉身手足垂軟身體強直掌中冷皆不可治茅先生辨小兒五臟本脈肝弦心洪脾緩肺浮腎沉又辨小兒四季受脈小兒脈數熱病脈洪瀉痢沉細風疾弦緊氣疾脈洪頭痛寸急數水藏急數小便頻滴冷痛脾浮洪胃中有氣塊不思飲食上前件脈法各有聲出看各受本候淺深其小兒合陰陽二部脈將競骨為中關前為陽關後為陰關陽得陰脈死陰得陽脈亦如之六歲以前第一看太衝脈及看形色並看虎口及三關脈六歲以後方可看陰陽二部脈即依前法小兒無脈至數如看前來遲及不動即死候虎口及三關脈若迭起來黑色死候不治太衝脈不動亦死漢東王先生家寶小兒一見生死訣幼童脈氣辨何形水鑑先生曰小兒雖受陰陽二氣成其形狀氣尚未周何言有脈直至變蒸候盡陰陽氣足方可看脈其髫齓之年方生陰陽二氣聖人云男七歲曰髫生其元陽之氣女八歲曰齓其陰陽方成故未滿髫齓之年呼為淳陽若髫滿後呼為童兒始可看脈如身體俱盛脈至一息六至為常人之脈一息八至為熱九至風五至虛四至損三至脫二至死十至必是疳癆虛損形容瘦劣若或身肥血色青白一息十一二至者謂之虛是風病死是為脈亂若一息十至六者為脈不來其人當令必死遲若一息十一二至者必死速不滿二日何名為一息一呼一吸名為一息呼吸者即是出一氣入一氣謂之一息其脈若指下未硬隱指急大者是有積若來微細即是冷若虛輕緊即是熱時復一大即是驚若大小不勻即是死候也先生所論浮數為熱伏結為寒沉細為冷大小不勻為惡候數者緊也浮者輕也伏者貼也重手方見結者亂也沉者重沒謂之沉細者微也大小不勻則是或大或小而不勻是為氣不生其人必死也二十五種甚分明有二十五候定其生死抱著遍身不溫暖是血絶不癊也四肢垂軃哭鴉聲四肢垂軃者為胃絶也胃主四肢即絶不能管也鴉聲已解在形候門中啼哭無淚瀉涎清是肝絶也撏眉摘眼爪甲黑即是筋絶筋癢故撏摘其眉眼也泥壇腫起或為炕其囟門或腫或陷也將口咬人魚口急即是兩口角垂如鯽魚吸水之狀腳直肚大有青筋是筋絶不能收腳肚脹即是氣絶也上視以覷於高物目直故上視也長噓出氣黑文行氣欲絶出而不回黑文即血不癊脈吃乳不收舌出口吃乳不收則胃絶舌出口即是心絶唇不蓋齒眼坑傾則是脾絶脾主肌肉外應於唇脾絶則唇縮眼坑傾亦屬脾瀉痢多變異黤血則是心絶心主血心若絶則下血黑色臭偏搐似笑沒心情一邊搐也虛笑不止顏沒其心情此惡候也不論貴賤及男女救療十人無一生諸候並是難醫者錢乙論小兒脈法脈亂不治氣不和弦急傷食沉緩虛驚促急風浮冷沉細嬰童寶鑑論脈候指脈內候附夫小兒三歲以上七歲以下其脈駛一息七八至為平八至以上至於十至者曰大過其病為陽盛也下不及五至六至曰不足其病為陰盛也浮為風浮者陽按之不足輕手乃得如蔥管者曰浮也沉為冷沉者陰重手乃得舉指即無行於骨下曰沉也洪為熱洪者按之散大滿部狀如浮者曰洪微為寒微脈指下往來細如亂絲重手即無輕手乃得也緊為實亦曰痛緊者如絲而急按之有力曰緊也沉細為乳結亦為冷言其脈細小而沉也弦數為瘧脈弦如箏通度帶快弦急為客忤弦急如新上之弦大小不勻為中惡言其脈或大或小不依其部也脈虛病亦虛虛脈輕手得之重手即無也曰虛只因頻下臟腑即虛亦因久瀉也變蒸之脈寸口亂亂為大小不勻伏為氣伏行筋中曰伏也左手寸無脈心下痛胸中熱時時嘔口中生瘡猶乳母食冷所兼咳嗽頭有汗寒熱作喉中哽塞作聲右手寸無脈者短氣氣逆喉中咳噫猶乳母出衝風露所為也心脈滿大肝脈小急併為癇瘛瘲之疾凡寸脈但浮直上直下督脈連腰脊強不得俯仰三部脈緊急其癇可治吐哯浮者可治弦急者氣痛中惡微者可治弦緊牢強為症癖病脈隨其左右上見三部脈沉為食乳不消化緩亦同上少陰脈數為疳淋虛濡者驚風邪氣脈如雀啄若緊者風癇傷寒脈洪者易理微者難理脈來浮大者宜發汗一投一止病假令六投一止六曰病也春脈弦夏脈洪秋脈浮冬脈沉四季脈緩各推其王相表裡若浮而見病在表屬皮膚在腑而為順陽脈沉見病在裡屬臟骨髓逆行陰之理也脈在上病在上死生見焉又論死脈傷寒身大熱體黃脈沉細者死中惡脈緊細者死黃疸脈沉細腹滿者死惠眼觀證診候訣凡疾患既重次看脈息如何當以一指在魚際或太衝看若是傷寒急驚疹痘之候此為腑病得浮洪即易安沉細即難安且與回陽兩日至第三日再診之如得陽脈方許調理然陽脈取之在輕手如捻蔥管乃有滿部重按即無是也若中慢驚吐瀉瘧痢之候此為臟病得沉細即易安浮洪即難安蓋陰病脈行於內不可行於外凡一切病覺脈來三點大又三點細此亦難治大都小兒脈只看陽脈大陰脈細余不可驗也學者宜審詳之保生論小兒三歲以後或五百七十六日外皆可診兩手脈一指定三關歌曰小兒有病須憑脈一指三關定其息浮洪風盛數因驚虛冷沉遲實有積浮為風秋得浮曰平和浮者輕手來大重手來細弱如按蔥葉之狀故曰浮主小兒中風傷風咳嗽嚏噴煩躁壯熱鼻流清涕一身頭面虛浮下泄多小便如粉可與解表甚者與出汗即愈洪為熱夏得洪曰平和洪者輕手脈來大重手脈來亦大故曰洪主小兒癇發熱身生癰癤及瘰癧喉閉囟腫風熱面赤氣喘心臟有熱小便淋瀝頻患赤痢數因驚春得數曰平和數者脈來小急過數速疾故曰數主小兒夢中咬齒驚擲見人恐怖夜多盜汗白日多困氣粗不語忽瀉青糞若得數脈乃生驚候此乃驚氣傳膀胱主小兒有疝偏墜沉遲為虛冷沉遲者輕手按全不見重手按至骨脈來沉弱細小故曰沉遲主小兒脾胃虛冷泄瀉無時嘔逆不食實有積冬得實曰平和實者輕手脈不見重手脈來大故曰實主小兒臟腑有積腹脹面黃發立小便如油面仆地臥頻頻吐食腹內鳴響又積不治即成疳癆丁奚哺露候若孩兒肥實者宜與稍涼藥取積後補若孩兒羸瘦臟腑虛薄可與性溫藥取積後補凡小兒脈春數夏洪秋浮冬實脈來八至止者皆平和之脈也若脈來急如弓弦脈來兩動而止不見者皆必死之脈也孔氏家傳王叔和經小兒脈呼吸八至者平九至者傷十至者困診小兒脈多雀鬥要以三部脈為主若緊為風癇沉者乳不消弦急者客忤沉而數者骨間有熱寶童方中指脈法孩兒五七歲方診中指脈孩兒五七歲五臟脈方現中指兩畔內於中仔細看左男右女專心記左主脾肝心腎肺右主熱生驚氣疳女子背看各從類欲察病源誰得知脈洪大急來歸內此是傷寒病因熱洪大卻慢傷脾氣遲細脾虛因取極脈小急來腎虛致疾在小腸憑藥力到此醫人須用意診脈若來三兩通此為死候命須終吸人指面如弓急慢脾死候命將畢翰林待詔楊大鄴中指脈看死候法中指中間為動脈醫家莫便懷疑惻此時風滿四肢頭萬卷千書醫不得別一本五指歌曰五指指節冷驚來不可安忽然中指熱決定是傷寒中指獨自冷疹痘有多般女右男逢左八片錦中看莊氏集脈法歌小兒脈數多風熱沉伏原因乳食結弦長必動肝腸風弦數驚蛔四肢掣洪浮胸中似火燒若兼腸痛好添愁息數和平八九至此個分明不必憂
