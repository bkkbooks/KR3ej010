body:
  text: 卷第三病源形色凡一十門五臟所主病第一錢乙論五臟所主心主驚實則叫哭發熱飲水而搐虛則臥而悸動不安肝主風實則目直大叫呵缺項急頓悶虛則咬牙多缺氣熱則外生氣溫則內生脾主困實則困睡身熱飲水虛則吐瀉生風肺主喘實則悶亂喘促有飲水者有不飲水者虛則哽氣長出氣腎主虛無實也惟瘡疹腎實則變黑陷更當別虛實證假如肺病又見肝證咬牙多呵缺者易治肝虛不能勝肺故也若目直大叫哭項急頓悶者難治蓋肺久病則虛冷肝強實而反勝肺也視病之新久虛實虛則補其母實則瀉其子錢乙論五臟病肝病哭叫目直呵缺頓悶項急心病多叫哭驚悸手足動搖發熱飲水脾病困睡泄瀉不思飲食肺病悶亂哽氣長出氣氣短急喘腎病無精光畏明體骨重錢乙論肝病勝肺肝病秋見一作日哺肝強勝肺肺怯不能勝肝當補脾肺治肝益脾者母能令子實故也補脾益黃散治肝瀉青丸主之益黃散方見胃氣不和門中瀉青丸見驚熱門中錢乙論肺病勝肝肺病春見一作早晨肺勝肝當補腎肝治肺臟肝怯者受病也補肝腎地黃丸治肺瀉白散主之地黃丸方見虛寒門中瀉白散方見喘咳上氣門中錢乙論五臟相勝輕重肝臟病見秋木旺肝強勝肺也宜補肺瀉肝輕者肝病退重者唇白而死肺臟病見春金旺肺勝肝當瀉肺輕者肺病退重者目淡青必發驚更有赤者當搐為肝怯當目淡青色也心臟病見冬火旺心強勝腎當補腎治心輕者病退重者下竄不語腎怯虛也腎臟病見夏水勝火腎勝心也當治腎輕者病退重者悸動當搐也脾臟病見四旁皆仿此治之順者易治逆者難治脾怯當面目赤黃五臟相反隨證治之惠眼觀證論五臟之氣各有所主心主於脈其性動而榮於面惡於熱因熱所傷則脈濁肺主於皮其性堅而榮於毛惡於寒因寒所傷則皮澀毛立脾主於肉其性厚而榮於唇惡於濕因濕所傷則唇枯肉腫肝主於筋其性曲直而榮於爪惡於風凡驚風搐搦本因風氣激肝至令筋動發搐而指爪青黑此爪者筋之餘氣腎主於骨其性流潤而榮於發惡於燥凡疳勞久瀉下虛上盛夢中咬齒鬚髮焦枯此齒者骨之餘氣而發亦腦之髓海惠眼觀證論五臟受病心之受病既見於面黃臉赤而又胸膈煩躁口鼻乾粗及患面瘡或瀉驚膿與夫喘息聲粗見水驚怕肝之受病既見於搖頭揉眼而又遍身澀癢毛焦發立覆地而臥及眼生斑瘡或腹中氣癖與夫夜睡多汗肺之受病既見於臉白喘粗氣急而又憎寒壯熱大腸冷滑及鼻下常爛咯唾膿血與夫咳喘虛脹脾之受病既見於腹上多筋吃食難化好吃泥土糞中蟲出及瀉痢頻並多睡與夫拈眉咬甲腎之受病既見於牙齦患瘡而又胸膈焦渴小便濁水及下部開張夜中狂叫與夫弩咽多黑五臟病相生刑剋第二漢東王先生家寶論五臟相生刑剋肝屬東方木木生火金能克之旺在春三個月能克於土見秋而衰以脾為婦木為陽脾為陰也心屬南方火火生土水能克之旺在夏三個月能克於金見冬而衰脾為中宮土土生金木能克之旺在四季月四立前後各十八日能克於水三月六月九月十二月亦是旺也肺屬西方金金生水火能克之旺在秋三個月見春而衰能克於木腎屬北方水水生木土能克之旺在冬三個月見夏而衰能克於火所言肝屬木肺屬金肝卻見水沉肺卻見水浮者何也肝者謂水所生又行其陰道被水土所蔭故見水而沉及至煮熟還其本性卻又浮也其肺屬金所謂心之相近又行其陽道所以被火抽見水灌虛浮及至煮熟復還本性而卻沉矣五臟病四時所不宜第三茅先生論小兒心臟不宜夏久瀉變為痢瀉血即難當形瘦不行坐心絶生口瘡若逢如此病端是應南方若向其中得何須更忖量小兒肝臟不宜春眼愛頻頻澀渾身似醉人時時貪睡臥心煩美好嗔唇白眼胞腫狂言不欲聞東方應春候此病不宜春小兒脾臟不宜四季面愛常黃好不可見相傳體差增寒熱行難少食餐此病忌四季腳面腫相連朝來陰腫了不久在人間小兒肺臟不宜秋行後氣常急脹滿似懷身項直時時喘乳食口不侵積聚成虛氣驚多癖結成秋問逢此候一命定難生小兒腎臟不宜冬痰汗時時有尿多夜夜驚遍身生粟疥手足冷如冰口內蟲常出面黑絶精神應此北方候冬得損其身胎中滋養第四聖濟經原化篇和調滋育章曰食氣於母所以養其形食味於母所以養其精形精滋育氣味為本豈無時數之宜哉原四時之化始於木也十二經之養始於肝也肝之經足厥陰之脈也自厥陰次之至於太陽自一月積乏至於十月五行相生之氣天地相合之數舉在於是然手少陰太陽之經無所專養者以君主之官無為而已是皆母之真氣子之所賴以養形者也若夫胚膏之始食必甘美欲扶其柔脆味必忌辛懼散其凝聚既胎之後食粳稻魚雁於四月以通水精之成血食稻麥牛羊於五月以助火精之成氣食猛鷙於六月以強精之成筋食秫稻於七月以堅木精之成骨八月九月受土石之精以成膚革皮毛則形已備矣飲醴食甘輔其中和而已是皆天地動植之産子之所賴以養精者也氣味之養和理鍾萃深根固蒂其道出焉雖或氣有不調藥石以攻而子不受弊者養之有素故也或者以妊娠母治有傷胎破血之論夫豈知邪氣暴戾正氣衰微苟執方無權縱而勿藥則母將羸弱子安能保上古聖人謂重身毒之有故無殞衰其大半而止蓋藥之性味本以藥疾誠能處以中庸以疾適當且知半而止之亦何疑於攻治哉又況胞胎所繫本於生氣之原而食飲與藥入於口而聚於胃胃分氣味散於五臟苟非太毒快劑豈能遞達於胞胎耶以謂母治則過之矣胎中受病第五聖濟經原化篇氣質生成章曰具天地之性集萬物之靈水火平均氣形丸備咸其自爾然而奇耦異數有衍有耗剛柔異用或強或羸血榮氣衛不能逃乎消息盈虛之理則稟貸之初詎可一概論是以附贅垂疣駢拇枝指侏儒跛蹩形氣所賦有如此者瘡瘍癰腫聾盲喑啞瘦瘠疲瘵氣形之病有如此者然則胚胎造化之始精移氣變之後保衛輔翼固有道矣天有五氣各有所湊地有五味各有所入所湊有節適所入有度量凡所畏忌悉知戒慎資物為養者理宜然也寢興以時出處以節可以高明可以周密使霧露風邪不得投間而入因時為養者理宜然也以至調喜怒寡嗜欲作勞不忘而氣血從之皆所以保攝妊娠使諸邪不得干焉苟為不然方授受之時一失調養則內不足以為中之守外不足以為身之強氣形弗充而疾疢因之若食兔唇缺食犬無聲食雜魚而瘡癬之屬皆以食物不戒之過也心氣大驚而癇疾腎氣不足而解顱脾胃不和而羸瘦心氣虛乏而神不足之屬皆以氣血不調之過也誠能於食飲知所戒推而達之五味無所傷誠能於氣血知所調推而達之邪氣無所乘茲乃生育相待而成者也故曰天不人不因仙人水鑑小兒在母胎中一十二候一者母睡多是胎勞陰氣衰弱宜服此飲子遠志人參甘草炙防風鱉甲上各五分為末熬飲子服睡驚加少桂且之客熱中心臟逐驚也有暈帶血風須添防葵子其疾立能攻二者母多魘是胎癲風宜服此方鐵粉最宜良牛乳和相當金箔三兩片入口病難傷三者母多好閒靜處不樂人鬧此是血宮勞悶子不安也速須救療免生不被風癇所臨方水精並鐵精甘草少難任犀角研百遍作飲免疾生但若如後急加之白茯苓麥門冬六分回意更調停上研犀角水同五味藥煎作飲子服之五臟立安水精鐵器甘草茯苓麥門冬四者母食了即飢此胎中子已脾胃氣盛母即胎熱宜服桑白皮飲子人參更須入龍甲大腹空皮最養神梨葉入之三兩片作飲須添竹葉真五者母有胎入月後見丈夫即怒偏愛閒靜處是胎氣陰盛陽氣衰弱生下是女即安是兒即死須宜治之方松葉及柏枝香墨自論之三般充散吃不計女兼兒上松葉柏枝香墨並搗為末六者臨産腹痛欲死即生宜速治之方凡人多愛使飛猩飛猩蟲如齧發頭上有角吃盡飛猩兒不生欲免死時牛耳賽拭取將來自能生上飛猩毛燒灰冷水調一字七者子於胎中未生又未足月聞之作聲兼及鳴言語者凡人聞之皆是驚疑無門可治此是胎鳴急須服此神方胎鳴及作聲人間莫不驚古鼠穴中土含之立不鳴上取如彈子大一塊土含之立不鳴八子在母胎中未産母若思胎漏切須宜服此方烏牛角牛糞上併為灰乳調一字入口即便取定也九子在胎中有風生下便死蓋緣內風與外風相擊遂致兒死此事最苦何以驗之仔細看之母未産時手指甲青及下至産門如孩搐痛此是候也宜速治之免喪生命矣專意須取八月荷乳煎白蜜每相和剪取母發三七數燒灰入口去殘疴又法八月池中蓮子枝燒灰入盞乳調稀入口似神拈卻痛免生虛死女兼兒十子在母胎中死活未分憂母性命庸醫不驗虛喪生命診候晚莫知所療是以說之後人細驗用之矣雀毛三七枚燒灰牛乳煮粳糜古錢煮一個入口救孩兒又方冷宜用此方狗毛七握枚燒灰萵苣心七枝冷水和搗汁母吃救孩兒十一子在胎中母胎痛子若熱則母手指甲青黃並渴子若患冷令母心煩痛嘔逆細看症狀即知母病可療之兼療子疾方藥味訛缺十二子在胎中旬日分娩不下此為擊著外風生下多疾宜急治之服此神效走馬散子凡夏結冰寒水石燈草七枚力相宜赤龍將用三條尺赤馬尾也充散寒漿更莫疑上以上孩子十二候疾狀具述神方無不應驗矣仙人水鑑子倒生宜服此方滑石一分將為散宜蛛二分倒懸蟲蜘蛛一個燒灰童子小便調與服須臾順産效難同切忌丈夫採藥楊氏産乳方妊娠不得食雞子干鯉魚合食則令兒患瘡妊娠不得將雞肉與糯米合食令兒多寸白小兒形證論産母忌食五物食蒜無筋主生下渾身軟或衝上損眼目食鱉無鱗主生下兒項短及患蝦背龜胸食獐無膽主多驚風涎獨腎疝氣食兔無脾主缺唇或生六指患脾疾氣食野鴨無髓主患雀目鶴膝風得患小兒形證論胎內十二患小兒受胎在腹十月降生母為食前五物受病及忌八殺日行房八節日是也更忌天地交震日行房每年七月十六日是也如不慎即胎內有十二般患如右盲聾喑啞膝軟釣腎蝦背龜胸缺唇巴指鼻齆舌短拳攣五關貫真珠囊小兒五般少病候舌長知心氣盛眼中瞳仁光輝肝氣盛肌膚肥潤肺氣盛唇紅脾氣盛耳大而豐腎氣盛五關貫真珠囊小兒胎中帶下不治者疾候透鼻缺唇因犯漏胎所致也杜公兒因有月信受胎也頭縫解顱胎氣不足故也骨軟痠疼父母酒醉交合受胎也手足短小側臥受胎無鼻缺耳亦側臥受胎胎中聾啞犯天聾地啞日受胎眼盲入月多食蒜天閹石女父母大小便俱急受胎無糞門多食毒物受胎胎中無發産前多病服金石藥毒也囟腫胎氣不足齆鼻者脈通於鼻受風邪其氣不和津液停結也胎中體赤妊娠時其母取熱過度熱氣入胎生故赤猶在雖能消亦傷兒輕者三日得消胎中體黃父母飽中受胎生下身黃稟賦之殊第六聖濟經原化篇凝形殊稟章曰天地者形之大也陰陽者氣之大也惟形與氣相資而立未始偏廢男女合精萬物化生天地陰陽之形氣寓焉語七八之數七少陽也八少陰也相感而流通故女子二七天癸至男子二八天癸至則以陰陽交合而兆始語九十之數九老陽也十老陰也相包而賦形故陰窮於十男能圍之陽窮於九女能方之則以陰陽相生而成終故也元氣孕育皆始於子自子推之男左旋積歲三十而至已女右旋積歲二十而至已已為正陽陰實從之自已懷妊男左旋十月兒生於寅女右旋十月而生於申申為三陰寅為三陽而生育之時著矣其稟賦也體有剛柔脈有強弱氣有多寡血有盛衰皆一定而不易也以至分野異域則所産有多寡之宜吉事有祥則所夢各應其類是故荊揚薄壤多女雍翼厚壤多男熊羆為男子之祥虺蛇為女子之祥是皆理之可推也胎化之法有所謂轉女為男者亦皆理之自然如食牡雞取陽精之全於天産者帶雄黃取陽精之全於地産者操弓矢籍斧斤取剛物之見於人事者氣類潛通造化密移必於三月兆形之先蓋方儀則未具陽可以勝陰變女為男理固然也楊大鄴童子祕訣小兒十月養胎觸忌克罰第一月妊娠胎月本於肝臟主養魂魄故此月宜多吃酸物以助目也自然一臟強盛也物味辛辣緣肺納辛主於金剋木恐傷於肝第二個月亦然何也緣少陽脈養膽也肝合故也第三個月肺臟主養心之脈主神此月宜加辛酸之物食焦苦也緣肺主於金其臟納辛以助於金氣也食之苦物緣心納苦主火火剋金故也第四個月心臟主於養腎此月宜加增於焦以助火也緣心主於火其臟納焦苦勿食酸緣腎臟納咸主於水故也第五個月腎臟主養於脾此月宜增於咸少吃甘甜之物緣脾主於土土緣克於水故也第六個月脾臟主養氣此月加於甜物以助土土緣主於脾也第七個月筋骨養形而能動轉少食鹹物惟五味相滋甜淡得所為此月胎已通九竅上下相應也第八個月形神俱足成味俱宜減省勿食熱毒及雞兔狗豬牛馬鳥雀等物肉並是傷胎之物亦作赤瘤切宜戒之但只聽經近善居處靜室所生兒女壽永多貴切忌嗔怒頻須動作然用力行住坐臥不得久也須要慎之第九個月慎忌吃諸炙爆腥臭鱗蠱之物及壅毒肥滑黏腑之物直至月初忌之恐傷孩兒頭腦乃生下多生惡瘡壅毒第十個月嬰兒已生血脈上下循環化為乳汁遍信之道但依月次調護自然男女無克罰筋骨圓滿聰惠壽長為人易養無夭亡矣漢東王先生家寶小兒受六氣說云大凡小兒受其六氣六氣者筋骨血肉精氣也筋實則力多骨實則早行立血實則形瘦多發肉實則少病其母乳多汁則粗紫色精實則靈利多語笑不怕寒暑氣實則少發而體肥得病之源第七聖濟經慈幼篇稽原疾證章曰嬰孩氣專志一終日號而嗌不嗄和之至也然五臟未定雖微喜怒嗜欲之傷風雨寒暑飲食居處易以生患故外邪襲虛入為諸風肥甘之過積為疳黃襁褓不慎則膚腠受邪而寒熱出處不時則精神不守而客忤蘊熱而斑毒積冷而夜啼皆陰陽之寇甚於剛壯也況根於中者與生俱生如母驚傷胎生而癲疾腎氣不成生而解顱風熱傷胎生而口噤風冷傷胎生而軀啼納汙之為血癖也胎弱之為諸癇也率由孕育之初殆非一朝一夕之故是人善保赤子治法尤詳吐下灸刺尉浴粉摩泛應而機隨若病在胸中穢汁既吞必吐而愈病在腸中乳哺不進必下而愈重齶重齦治以微針暴癇身直治以灸𤋲尉風池以泄微邪浴皮膚以散寒熱摩囟以通鼻塞粉汗以密腠理至若重舌之膜斷之以爪邪厲之氣禳以祝由蓋稚弱感疾易於滋蔓惟惻怛之心者要在防微杜漸故無所不用其至也彼拘於無治或欲如田舍兒任其自然未免為失病之機過於救治或欲不問春夏蕩以快劑未免有湯液之傷是皆一偏之蔽非知治之大體也顱囟經初生小兒鵝口撮噤並是出胎客風著顱臍致有可以小灸三壯及烙愈初生小兒至夜啼者是有瘀血腹痛夜乘陰而痛則啼初生小兒一月內乳痢如膠是母寒氣傷胃所致也初生小兒一月內乳痢如血是母胸有滯熱所作也初生小兒一月內兩眼赤者是在胎之時母吃炙爆熱面壅滯氣入胎中熏兒腦所致也小兒溫熱皆同從氣實而搏胃氣然若下之氣平即愈氣虛則生驚而變癇小兒驚癇一從虛邪客熱相搏而生其候當用補養安和即愈加以性冷及太過即死小兒噦逆吐皆胃虛氣逆客於臟氣而作當和胃養氣止如下冷即極小兒霍亂吐逆皆胃氣與陰陽氣上下交爭而作當用分和補藥調養即愈余皆死小兒客忤無辜皆因客入所觸及暴露星月小兒嫩弱所以此候多惡唐孫真人玉關訣云夫小兒之病先辨形證歌曰搖頭揉目肝熱生風眵淚憎明三焦積熱鼻生清涕肺受其寒頰赤面黃風傷腑熱霍亂吐逆胃積氣傷瀉痢不常氣攻腸滑面青呵缺驚氣傳肝盜汗頻頻臟伏虛熱傷寒驚搐風盛發狂胃熱生斑氣傷冷厥長吁齧齒風盛氣生上竄搖頭涎高胃結肺壅氣傷咳嗽咯血涎盛發齁積傷風熱小便淋赤熱聚膀胱疝氣因啼胎中積結奶脾痞癖因物所傷喉閉生瘡肺之受熱愛吃泥土脾臟生疳嘔吐痰涎蛔蟲上出脫肛瀉血冷熱積傷消渴口瘡心家受熱面黃浮腫積氣所攻鶴膝解顱因風腑熱行遲語澀胎積氣傷項硬肝風氣傷木舌醫經要略病源辨別審而用之細詳使樂杜光庭指迷賦陰升陽加四時無差萬物稟天地一氣男女從精血而邪三旬而陰氣純厚子稱襁褓兩月而陽氣方生號曰嬰兒百日之內名曰奶腥至半晬而為誇乳童周期而陰陽各半孩兒千日而真氣方奢五六歲小兒之譽定十歲外童子之名華若論變蒸之候法主數家魂自變而目明魄自變而氣加百日神化而喜笑胎中有滯而顯邪蒸變兮氣血自劣不變兮真本無遮乳痢兮五日乃有撮口兮十日以遐胎驚兮未及蒸變內瘹兮百日如拿胎疸因母氣之傳熱黃病由脾胃之熱瘕熱極則咬人齧齒風盛則面色如花內熱則渾身似火腹痛則惡哭咨啀於是乎察其形色辨於邪正面黃赤而大怕體涼吐與泄而最嫌熱盛驚癇兮身體宜溫傷寒兮脈洪邪迸腹脹唯憂足冷膝沉咳嗽本喜浮滑為病消渴須身熱脈洪夜啼為逆霍亂而脈大體溫心疼憂命相順則施功用藥相反則與言危病面黃色赤唇青而吐逆堪論目赤唇紅內熱而發潮當脈唇角微赤而臉黑防驚指黃足冷而驚熱為證搖頭揉目兮肝熱多眵上竄喘粗兮風極涎諍咳嗽與鼻塞相連斑瘡與傷寒同類明之則愚化為賢悟之則超凡出聖是故小兒之候難以參詳寒多則皮膚燥澀熱盛則面赤頰黃熱氣盛則驚癇鬚髮千足冷則氣厥宜防熱連夜而陰少寒兼晝而陽傷積熱則壯熱不歇伏寒則乍溫乍涼傷寒熱兮鼻冷耳熱而喘粗麻痘熱兮兩耳角冷而是常唇黃微青而多睡乳食欲吐而脾殃睛急目青而色黔驚候涎生而胃亡但能消息而依此何慮遠近而不揚是知急驚因內熱而所蘊慢脾因中氣之虛荒肝伏熱而雀目穢兼風而臉瘡青盲肝冷翳膜膽強盜汗因內虛而起亦虛勞而骨傷兼驚伏於內痞及冷熱而兩詳鼻衄連綿心盛鼻瘍拘攣而筋脈皆冷口噤而風擊胃強客忤而物忤無異卒中而中惡同章欲識丁奚腹大氣聚成積病在腑而異治積居陰而難詳始因乳哺不消三焦難整漸次結聚成塊一身消歷胃寒而珍饌不餐脾熱而逢粗也吃疳瘦由中熱而胃傷腹脹是脾衰而氣塞吐本胃虛瀉由寒癖生戀甜肥而乃生疳蟲瘡起脾元而毒之所適心脾熱而口內生瘡二臟極而重舌相擊明之則萬舉萬全用之則功名不溺是故邪生則病至積聚則疳居皮膚澀而頭髮作穗面色赤而渴飲難除肺氣熱而鼻瘡不止大腸冷而糞如下泔心疳則五心煩熱腎疳則面腫骨疏且臟氣主失固使真氣之不疏三焦不調而形饒丹腫榮衛不治而頻出癰疽都緣皮肉之沮滯又詳血氣之無餘積成因乳食太早疳瘦由餐甜不除於是臟氣不宣乃生諸患瀉有八種驚生急慢胃逆腸寒而吐瀉並興脾肺俱虛而瀉痢無間表裡冷而水沫俱奔脾胃寒而瀉物成瓣脾熱胃寒而瀉水兼黃脾虛心熱而如湯之狀小腸傳熱而便血大腸冷極而膿綻似瀉不瀉是脾冷心熱所蒸飲水不休蓋氣盛金火相諍證頻睹則逆順方明病數見而智性方慣是知膀胱受熱尿血而必患五淋膀胱與小腸積冷偏墜而氣厥漸深傷風因當風解脫鼻塞由母氣囟侵瘧疾是暑氣之不出脫肛乃腸冷之瀉頻衣安月下抬無辜以為殃瞳子未成見希物而觸忤風搏血氣上攻而結成瘰癧熱壅臟極內沖而丹腫難禁傷飽則骨軟腳弱失乳則項細少音解顱蓋骨氣之不足鶴膝由肌肉之不任既曉病源須識浮沉驚熱兮下之當愈瀉痢兮調胃宜深風盛兮解之即退傷冷兮和胃溫陰論脈兮尺寸未定別病兮虎口紋臨次指而分於三等青紅而在於兩尋窮之則病無不辨用之則法無不深要在女尋右手男看左指氣在下紋風居中里過風關名曰命關此亦以氣風命為次定其色青之與紫先論管氣之枝初節為始若見紅紫微微脾氣常滯外有枝青兮風已入脾或見紫枝兮邪氣難止枝頭分開兮黑色相連氣虛為病兮風氣將起但觀於初節之間詳吉凶而定其病矣是知中主於風亦須詳視青紋紫枝兮慢驚當耳紫紋青枝兮似蟲不出虛驚氣散涎盛難治若見青枝沖命風盛而搐掣須當或見枝赤紋紅定知是風來侵氣紋紫枝青宜防慢驚及已忽然紋青枝紫過命關而驚候須來枝分兩頭如線細而涎潮當死紅紋微散而可醫黲黑忽見而將毀紅如米而肺熱喘泄胃而未已兩米青紫而入於命關病候雖在而去如流水紅紫迸甲而命殂內纏指面而無死若能在意而精通假使珠珍而無比茅先生小兒受病根源小兒五臟受諸病聽說根源仔細明眼赤肝家壅毒熱怕明肝與心受驚肝脾積聚成雀目嗌氣脾家積虛膨積熱在脾多愛睡牙疳奶食毒相生吐蟲大腸有餘熱脾疳吃土有風生毒食脾傢俱積熱或是瘧積又還榮大傷積食脾熱瀉耳聾腎積熱毒並重舌口瘡心極熱奶癬脾積熱氣行脾中有積腹高凸心虛見水忽然驚肺中壅熱鼻多塞木舌心腸積共停囟門腫起腎之死大腸積熱有瘡生臟中有熱常合口有積心脹眼斑成五心潮熱疳勞盛疳之餘熱障虛鳴脾臟毒盛奶不化咬奶風兼入骨驚龜背肺中有積熱龜胸客風傷背平聤耳元是腎中得毒因傷肺候分明遍身虛腫積不盡走馬疳因腎得名天瘹臍風因此得喉中痰上惡風驚小便不利緣何事積氣不散辦其形要識驚癲癇癡者肝之候與及脾驚或喜或悲人莫測邪氣入脾速療輕肚脹口瘡疳會氣逆胸涎隔熱交橫夜多盜汗如湯潑心熱不和人不明多笑是驚餘熱在不然心熱亂心驚瀉之日久驚食得冷熱相併特為生略述因由容易見免交性命入泉扄五關貫真珠囊小兒受病候多煩則面青涎盛則目轉實極則吐涎虛極則霍亂傷乳則面黃心熱則舌重生瘡撮口則屬氣齧齒兼風聲嘶而哭傷於肺虛驚面青合地臥傷於脾摸手則臟腑俱虛五關貫真珠囊小兒三結候上結者多因熱及傷寒麻豆疹子安後方結病多腮腫喉塞咽物不下中結者多因吐瀉不止被冷氣結於脾臟令上不能下食漸次氣悶便變成慢驚風下結者多因醫人錯認病源亂下轉藥後不曾調氣令大腸受風虛便結不通肚中虛鳴才下轉藥瀉住又祕結五關貫真珠囊論凡一臘已後百日已前怕有兩般病起一者天瘹天能蓋人地能載人天為父地為母蓋以天瘹驚風自天而得之二者內瘹內瘹者蓋因咽於乳母敗血乳入腹中得冷見發攻觸心胸其狀初發便不食乳口開不利手足攣搐忍其疼痛謂之內瘹也惠眼觀證論雜病形證源驚風了後又癲又癡由驚氣入心未退患龜背主因傷寒客風傷於背閉口不開主大腸積熱氣盛或驚或喜或悲驚氣入脾怕明愛暗主心與肝家熱患痢焦渴主大腸乾燥痢病渾下膏血主大腸氣虛吐血衄血主傷寒後氣血壅滯不循故道陰囊重大為腎氣傷冷流入於中下患疝氣頭面患瘡陽氣聚在頭面乘熱而生遍身壯熱口鼻乾燥頭髮作穗者主熱氣衝四肢鼻下赤爛生瘡時咳嗽主肺臟疳衝於腦遍身生瘡頭眼赤小便澀滯主心肺熱極生下多患聤耳主腦內熱風兼毒氣入腎肚干氣痛主生冷沖胃或硬物傷脾小腸急痛小便黃澀淋瀝一日兩日時時有汗或一日兩日非時壯熱乃生骨蒸莊氏家傳小兒病源夫人稟天地之精變化為形父之精為魂母之血為魄積父母之精血以成其胎懷胎一月如白露二月似桃花三月男女分四月形象足五月能動手足至九月而三轉身十月而形滿足子母分解於中有延月者少病月不足者病多生後六十日瞳人就而能識母二百一十日筋骨成而能坐三百日掌骨成而能匍匐骨木開臟腑寬毛髮長齒牙生或吐或瀉或熱或驚作時發歇豈辨孩子變蒸形狀卻呼鬼祟或即灸燒致心臟發躁變作驚風或作驚癇搐搦凡人呼作風或變奶癇瀉痢清水奶食不消上熱下冷喘息不調四肢厥冷虛汗遍身若不細觀證候病變多端不遇妙醫枉死多矣孩子未滿七歲有一十五種無辜之疾後有五疳八痢二十四候須明形證不辨根源藥應無效所謂無辜者臍風撮口口噤重舌木舌雀舌乳頰奶癇奶霍龜胸厥脅猢猻噤驚風天瘹赤瘤共十五種所謂五疳者心臟驚疳肝臟風疳肺臟氣疳脾臟食疳腎臟急疳心臟歌渾身皆壯熱肢體不能任怕冷增重覆腮紅面似金口乾常鼻燥漸次病根深只因驚撲得此病本從心肝臟歌搖頭揉口鼻白膜翳睛瞞背痛常生澀雙眸閉不觀青黃容兒醜瘡癬體消斑發立毛焦悴元因得自肝肺臟歌咳嗽多啼哭瘡生口鼻傍饒聲惟齧齒滑痢瘦尫尫肢體無筋力形容不似常吐膿並吐血此是肺家傷脾臟歌乳食難消化惟便在土泥腹高青脈現發薄頂毛稀喘息多饒嗽無歡只愛啼痢多酸臭甚此病本從脾腎臟歌瀉痢多頻並尋常只是驚糞中多米出皮上粟紋生身體烘如火才涼卻似水急疳何以療本自腎家生病證形候第八顱囟經小兒一眼青揉癢是肝疳二孩子齒焦是骨疳三肉色白鼻中干是肺疳四皮乾肉裂是筋疳五發焦黃是血疳六舌上生瘡是心疳七孩子愛吃泥土是脾疳孩子肌骨肥實皮膚白無故煩渴此自小奶猛衝損肺臟依後方內用甘草人參合飲子若氣急其骨脹起鼻連眼下臉青色呻吟之聲者此必死矣之兆不得與藥孩子痢如泔澱者難效痢如鵝鴨血者脾已爛損不宜與藥孩子凡有諸色疾苦但眼瞼下垂牽必定死矣孩子瘧者皆難效或發無時即口噤咬牙作聲此必死矣呼為瀝瘠疳瘧亦名為鎖腸疳孩子渴吃乳食夜啼作聲此即是腹肚痛孩子無故搖頭此是腦頂風孩兒吃乳食皆出此是脾冷孩子無故肚大項細四肢消瘦筋脈骨節起自是小來少乳嚼食與吃早成骨熱疳勞先宜與保童丸吃續與柴胡鱉甲飲子保童丸方見一切疳門中柴胡飲子方見行遲門中孩子頭面胸膊肌厚臂腦細瘦行走遲者是小時抱損孩子鼻流清涕或鼻下赤癢此是腦中鼻中疳極宜用後方青黛散吹鼻兼敷下赤爛處方見疳疾吹鼻門中以前並診候孩子疾狀孩子氣脈未調臟腑胞薄腠理開疏看脈以時依方用藥華他九候論屬陰慢疾四般候慢脾風慢驚風脾困虛積論此四般疾候其體一般皆瘦弱無情緒眼閉慢脈氣微沉細孩兒病候審之為妙切須仔細無令差慢脾風候吐瀉虛損脾胃而成其候面色青唇色黃口角有沫多睡不醒或時手腳似搐四肢冷脈氣沉弱歌曰慢脾之候脈微微昏昏即睡難辨之或若搖頭並口噤萬中無一可能醫慢驚風候驚痰灌心而成其候唇紅目直手微動如搐體微熱不語脈氣微沉細歌曰慢驚風候要唇紅仔細推求速有功囟腫必知無妙藥靈丹與服也成空脾困候吐瀉日久而成其候孩兒多睡眼不開饒轉動身體溫和四肢冷脈氣微沉細歌曰脾困元因轉瀉虛連連只睡不開舒倘若飼之雖吃乳蟲生口內死非殊虛積候久積頻取不盡而成一云因虛而傷積聚臟腑而成其候肚熱瀉白色多呀水奶食不化四肢冷脈氣微沉又云腹內熱身體溫和歌曰虛積之患事如何飲水頻頻不厭多若是臍凸並眼腫丹靈若有不醫他又歌曰或瀉或痢又時時穀道開張不肯肥見他飲水多頻並愚者猶將疳渴醫華他九候論屬陽急疾四般候急驚風傷寒天瘹斑疹論此四般疾候其體一般或毒或涎生此患須急醫無令慢易所傷逡巡死活頃刻專心用藥審其精微急驚風候驚涎流灌肝心二臟而成其候吊上眼手足拳搐喉內涎響渾身掣擲體熱脈洪大歌曰急驚之候本因涎積熱肝心兩所傳眼赤唇青雙手搐下涎風去是精專傷寒候冷風傷於腠戶而成其候胃氣弱內聚冷風其形候面黃頰赤鼻流清涕多啼壯熱其脈洪大不可頻與表藥歌曰傷寒患最苦尤須細審詳若言頻汗表七日見乖張但將涼藥解解晚必生黃滿口瘡難救都緣純是陽天瘹候非天瘹人也因驚熱盛而成其初得之時頻頻呵缺眼中忽然有淚不落壯熱不時手足微搐脈浮洪實大歌曰尋常天瘹病休道小兒嬌積熱心留滯眸翻涎欲潮後仰多因取仍兼唇口焦愚醫猶灸烙必死在三朝斑疹候傷寒毒傳胃而成其候有疹有麻有痘其實一體時多哭叫手脈來大渾身甚熱兩耳尖冷鼻準冷飲水多吐宜發出其瘡大為陰小為陽歌曰胃熱成斑疹須知此病由哭多心壅極舌黑是堪憂腫滿來雙水紅涎穀道流變成如此候一見命須休華他九候論小兒雜病候歌諸般雜病要須知不問嬰孩女與兒多睡只應肝是本心留積熱夜驚啼叫呼冷汗因蟲痛寒熱於中積在脾頰赤口瘡心肺壅虛風搐搦四肢垂冷滑傷脾成瀉痢或膿或血下無時積多肚大多掀水氣喘腮黃不問醫眼腫吐涎頭擺急莫教脈息慢微微患者求神兼問鬼不求良藥苦求師仙人水鑑五疳病候歌頻頻飲水心臟疳目青脅硬走連肝肚高唇白脾中起嗽甚鳴粗肺里干好食土泥愛餌酸腎疳之候細明看良醫若會通神訣死候方分有數般仙人水鑑五疳死候歌耳邊赤脈起舌上黑斑生斑點也心疳之候也吐甚眼頭認眼頭生黑點吐甚肝之死候也黑點遍身全點子遍身如黑子肺之死候齒際如同上牙齒也同上生點也疳極輪乾死必觀耳輪也腎之死候仙人水鑑小兒驚候歌地上生時睡驚風本在肝夜啼並面白肺臟與詳觀顏色時時變心形日日觀喘微脾臟乏咬齒骨家看夢裡咬齒骨家驚風又歌面白腫虛多吹乳四肢煩熱汗頻生雙腮五色時時見惡叫元來盡屬驚仙人水鑑有積病證歌腹脹時時好覆眠發黃眼赤吐並宣小便似油也更兼痢下腸鳴甚去積消症立得痊仙人水鑑小兒八般傷寒病證歌鼻塞眸黃鼻涕流非時肌熱汗無休喘鳴吐水並聲噎此是傷寒證有由仙人水鑑五疳病證歌肌膚湯熱甚羸力不能禁面黃並頰赤怕冷愛重衾口鼻常干涕根源漸次深全因驚撲起此病本從心搖頭搐眼鼻白膜上青睛齒癢多揉嘴垂眸嗽視親顏貌青碧變遍體癬塗身毛髮多焦立此病本從肝食物難消化心中好土泥肚高青脈見頭髮薄離離喘息多饒嗽無歡只愛啼痢多腥臭甚此病本從脾嗽來多喘息口鼻上生瘡糞里常堆谷身如粟密裝膨膨腹自脹日日痢非常嘔血並膿甚全因肺本傷瀉痢多頻並尋常多愛驚上焦炎似火中膈吐如傾寒熱時時有瘡盛轉轉盈急疳難治療此病腎家生王叔和小兒外證一十五候歌眼上赤脈下觀瞳仁囟門腫起兼及作坑鼻乾黑燥肚大青筋目多直視都不轉睛指甲黑色忽作鴉聲虛舌出口齧齒咬人魚口氣急啼不作聲蛔蟲既出必是死形用藥急速十無一生茅先生小兒雜病候唇紅面赤是傷寒候臉青唇黑是驚風候鼻青面白是瘧子候面黃如土是有氣來攻候茅先生辨小兒五絶歌項裊腎家絶目直絶於肝喉牽鋸脾絶舌卷向心言鼻黑膿絶肺五絶不須看茅先生小兒受諸病死候歌小兒有病實難惻下藥喉中涎黏塞兩眼半開並半閉灸烙皮膚無血色汗出如珠頭後囐目無光澤鼻乾黑衝心氣築連雙臂手足如水腳面直吐瀉無常渴嗽多混濁脈絶似沉寂眼坑陷時熱轉多腹中乾泄眼浮極胸腫心高連掣手揮手搖頭命難得是物拈來不奈何或將口齧難將息吃藥無效直穿腸啼哭無淚邪聲極喉中牽鋸吹花沫出氣長噓休奶食瀉痢清膿日轉多千萬歸冥休費力茅先生小兒又受諸病死候歌小兒死候要消詳背母搖頭搐一廂鼻上流汗肚若袋楊大鄴云兼吐榻手拿胸膈必須亡白睛貫入瞳仁內四肢不認痛無常五干五硬並五軟下氣頻頻亦不祥囟門腫氣難為療魚口邪聲立見亡指甲內有紅絲見手心紅赤似生瘡久患唇紅不須治驚來眼慢不相當眼青臉赤耳輪黑手掌無紋齒白亡鼻頭渾赤口角垂昏昏只睡口開張髮直邪聲乾啼叫歸冥休用更思量茅先生小兒外有二十四種死候太衝無脈直視看人魚口自動忽作邪聲惠眼觀證注云若時復一聲者死若氣急作聲不死滿口黏涎時時惡叫身生黑片五心凸腫舌出虛搐惠眼觀證注云舌出不動者不死或縮生瘡伏熱不退喉中空響瀉出黑血面黑狂躁吐瀉不止兩眼半開驚叫咬人指甲青黑走馬落齒囟腫或拓瀉止又瀉丹毒遍身啼高聲咽魚際不勻上件前項形候是病犯五七候十無一生惠眼觀證云凡得此候所去不遠更看脈息如何陽病得之其脈反細陰病得之其脈反洪不出一日死漢東王先生家寶諸雜病證訣慢驚風眼喜張慢脾風眼喜閉魚目定睛夜死面青唇黑晝亡啼而不哭是煩哭而不啼是躁張口出舌是風瞑目似睡不思乳食是虛搖頭項硬三焦壅搖頭項軟涎在胃清涕常出肺受寒舒手長虛聞言即悲卻是實腹痛盈盈是氣壅翻身臥是脾疾漢東王先生家寶小兒形證歌茅先生死候歌與此大同而少異此又有注故雙存之小兒形證卒難測滿口頑涎喉中塞此是風痰閉其九竅頑涎方出口中也吐瀉無時加咳嗽此為脾胃俱虛而至不能化其穀食無時瀉也咳嗽即是胃生風身上皮膚無血色即是血脈不應也汗出如油頭巘峻其汗出者即是陰陽相離榮衛相別津液為汗故如油糠其頭巘峻即是囟門崩是心絶即死目無光彩鼻中黑其鼻中黑即是肺絶鼻是肺之外應目無光彩即是腎絶腎主眼之瞳仁腎絶即目無光彩也浮胸心凸牽撮口凸言垤高也肺脹脈絶即胸凸手足如冰腳面直胃絶則手足拘直也搐搦睛斜連唇口其筋絶即搐著其眼睛也將手抱頭難可救其筋搐上故抱頭此大惡候矣眼傍青色多焦渴即是肝絶也肝主東方甲乙木其色青虛即渴矣飲水百杯猶未歇其胃管直即水不能癊也臉腫眼浮脈不來心絶則臉腫心主血故血脈不能癊故便臉腫矣是物拈身將口呷脾胃絶狀如魚口一般往往如呷水相似也啼哭無淚及邪聲則是肝絶肝主於流淚若絶則無其淚肺主聲肺欲絶聲只出而無返謂之邪聲喉中牽鋸口吹沫其喉中響是九竅被痰閉絶氣出入不能故如牽鋸之聲其沫即是衛氣出而不回此疾誠難可療之免被時人道醫殺聞是上件諸多惡候不可下藥若下藥愚人不知臟腑病絶只道醫人醫殺矣漢東王先生家寶小兒諸雜病狀小兒驚哭聲沉不響者是病重用藥難瘥若聲浮者輕調驚便瘥何謂驚哭正睡忽驚起啼哭叫不止謂之驚哭頭皮乾枯筋脈緊急唇外赤而內白有瘡痍如無津至者兼驚而難痊此是熱過極矣何以難瘥其皮膚薄則筋脈急出其唇外赤而內白者則是脾虛欲絶不能癊也久則多死其生瘡痍則肺虛燥不能榮於身故不瘥急醫防失赤眼是肝積熱其眼是肝之外應積者聚也其有積亦眼赤及其時氣歸肝故是積聚亦眼赤也怕明心肝有驚其心屬南方火驚邪所傷心肝腎其太陽則相剋矣牙疳奶食之毒其牙疳者即是牙中出血而口臭是也只因吃食饞了便脟奶與故令口臭須與涼藥及消食毒矣吃食不消是脾積冷其脾主化食而久冷即食不消宜暖脾也耳聾是腎之積其耳屬腎被積氣所攻即不聞人聲宜將轉藥入羊腎中煨服之胎癬是肺積風其胎癬即是長下身上皮起成癬只因父母或有其肺不和或是長下不避風冷也而浴得之是積滯為之也潮熱是因驚而得其潮熱者只因驚在胸膈不入臟腑故發熱不時宜與驚藥喉內如鋸是膈上客風入肺及因驚入大腸而得肺者諸臟之上蓋也亦主氣大腸是肺之腑受外風大腸受驚故如此即是夾驚傷寒耳或悲或歌是邪入脾其邪氣入脾自然無時作歌而哭故知邪氣入脾臟也口瘡肚脹疳氣逆其口瘡即是氣不順攻心心主應口舌上逆則生瘡氣逆則肚脹宜下疳藥乃氣藥服之吐蟲心與大腸熱其心與大腸俱熱則不能安其蟲故不在其大腸奔上而蛔口出久則令入黃瘦耳瘧疾是脾之積其瘧疾者是脾受其宿食在又被新食來沖其或常睡而不磨消則與脾氣相沖脾氣為正氣勝則熱為邪氣勝則寒邪正相沖故發寒熱又云有時行者則是夏受其熱氣在脾遇涼被秋風吹著則發亦是邪正交爭陰陽相交故發寒熱四季一般也開口睡是五臟毒盛其五臟受於毒氣則氣節其口開而不合也多哭是驚風入肺肺主於聲故多哭也愛吃泥土是脾生蟲其脾屬土所生其蟲因甜物及糯米食而生故使本所好吃泥土也夜多盜汗是虛熱疳氣不順其氣主於肺肺亦主其毛竅其氣不順流溢於毛孔中而津液盡作疳勞耳五心熱是疳勞手腳及囟謂之五心其疳熱則疳所也聤耳是腎積風其耳屬腎被外風入腎停滯則化膿而出於耳故知是腎積風腹脹噁心是肺中積其肺腥而有積或吐或瀉不時則知肺是中積也愛吃布腳是肺生蟲其布是肺之好也愛吃麩炭是肝生蟲愛吃鹽是腎生蟲愛吃茶末是心生蟲愛吃酸物是膽生蟲各是臟腑之所好也錢乙雜病證目赤兼青者欲發搐目直而青身反折強直者生驚咬牙甚者發驚口中吐沫水者後必蟲痛身睡善嚏悸者將發瘡疹吐瀉昏睡露睛者胃虛熱吐瀉昏睡不露睛者胃實熱吐瀉乳不化傷食也下之吐沫及痰或白緑皆胃虛冷吐稠涎及血皆肺熱久則虛瀉黃紅赤黑皆熱赤亦毒瀉青白穀不化胃冷身熱不飲水者熱在外身熱飲水者熱在內先發膿疱後發斑子者逆長大不行行則腳細齒久不生生則不固發久不生則不黑血虛怯為冷所乘則唇青尿深黃色久則尿血小便不通久則脹滿當利小便洗浴拭臍不幹風入作瘡令兒撮口甚者是脾虛或云成癇吐涎痰熱者下之吐涎痰冷者溫之口禁不止則失音遲聲亦同先發膿疱後發疹子者順先發水疱後發疹子者逆先發膿疱發後水疱多者順少者逆先水疱後斑子多者逆少者順先疹子後斑子者順凡瘡疹只出一般者善胎實面紅目黑睛多者多喜笑胎怯面黃目黑睛少白睛多者多哭凡病先虛或下之合下者先實其母然後下之假令肺虛而痰實此可下先當益脾後方瀉肺也大喜後食乳食多成癇驚大哭後食乳多成吐瀉心痛吐水者蟲痛心痛不吐水者冷心痛吐水不心痛者胃冷病重面有五色不常不澤者死呵缺面赤者風熱呵缺面青者驚風呵缺面黃者脾虛驚呵缺多睡者內熱呵缺氣熱者傷風熱證疏利或解化後無虛證勿溫補熱必隨生錢乙不治證目赤脈貫瞳仁胸腫及陷鼻乾黑魚口氣急吐蟲不定瀉不定精神好大渴不定止之又渴吹鼻不噴病重口乾不睡時氣唇上青黑點頰深赤如塗胭脂鼻開張喘急不定嬰童寶鑑諸病渡必死候汗出如珠不已汗出黏臭頭軀向後囟門腫起並陷胸陷喘氣覺冷口作鴉聲下藥不得喉內有涎黏塞指甲青黑色目直視不轉睛口中蟲出不止楊大鄴童子祕訣凡小兒先看在外形證一看唇肉不蓋齒二看鼻上紫黑色三看眼啼哭無淚四看身上不認痛五看心脹不啼哭六看大開雙眼睡七看四肢俱不收又七惡候一看囟門腫二看腳心腫三看手心腫四看臍內腫五看心上腫六看眼角垂七看抱來腳不縮以上十四候並不可治五關貫真珠囊凡兒生下七日內謂之一臘以前忌有三般病起一曰鎖禁二曰臍風三曰胎驚頌曰鎖禁目須直臍風撮口鳴胎驚唇青色三者候同名玉訣小兒五臟絶傷候歌瞪目筋拘肝腎傷胃虛驚逆面青黃心絶不言魚口噤喘促長噓肺受殃此看損絶次別生死須審詳用藥即無誤矣玉訣小兒惡候歌啼哭無聲不轉睛唇焦鼻黑臉偏青涎黏齒齧頻魚口兩腳如鉤手似釘玉訣小兒危困候歌目多直視作邪聲咬齒搖頭不轉睛僵仆面青魚口噤遍身針灸療無因鳳髓經雜病死候歌吐瀉生風眼上膜風在掌中抓不覺急驚過了喘無休慢驚項軟皮膚薄盤腸氣痛一本作蟲痛胸中抓嗽吐嘔逆心凹惡傷寒赤脈卻相交結熱面黑皮毛落疹子入腹眼不開熱瀉出蟲口乾惡鎖口腰低唇鼻青秋痢脾毒唇捲縮此病因驚兼有積豈無神仙留妙藥莊氏家傳小兒諸疾形候孩子有六件必死之狀不在用藥治療其狀失時矣第一孩子病重汗如珠流者其狀必死也第二孩子紫點干氣息冷者其狀必死也第三孩子病重臥如繩纏者四肢不遂必死也第四孩子頭足相就四肢無力者必死也第五孩子多食下痢不止口唇乾焦妄言如見神鬼必死也第六向陰引聲哭不重良藥縱其惡性必死之狀也前六般盧醫扁鵲見之亦拱手難言察形色治病第九漢東王先生家寶內臺祕論男女十歲以前凡有不安皆觀其氣色面上如青紗蓋定從髮際至印堂不以疾狀淺深有者六十日必死若至鼻柱一月須亡更到人中不過十日其色滿面即日哭傷假使盧醫亦難救療辨五臟受驚積冷熱形證圖肝臟受驚候起髮際其色淺白若至丞相即變驚風渾身發熱夜間多啼宜下驚風藥若退即可調治若其色不退下至東嶽即有死候耳前穴黑金克於木若是外候鼻乾燥眼睛吊上肝主筋筋縮則睛無光即是腎絶瞳子不轉即是肝絶爪甲黑也肝臟受積候起食倉其色微黃下侵襯眉即是受積黑睛黃赤早晚發熱則多愛睡乃有死候啼哭無淚是也肝臟受冷候面青淡白眼中淚出齒齦淡白口中清水大便酸氣日中多睡夜間煎迫者是也肝臟受熱候起正眉薄薄赤氣即沖丞相心裹於肝兩眼亦赤多有眼脂小者吐奶大者吐食有痰生風早晚發熱多啼少睡心臟受驚候起印堂其色微黑下至眉心赤則生風若至鼻柱即有死候皮無血色更生黑黶水克於火惡即雨日亥子難過兼有外候即多焦渴吃乳不收舌出口外是也心臟受積候起額角太陽穴虛兩眼白赤小便如泔面合地臥大極即吐熱氣此惡候也心臟受冷候起太陽黑筋脈子來侵印堂面色淡赤目即無光要轉奶食口吐清水日多煩渴也心臟受熱候起面頰更加赤色多驚少睡發乾頻渴鼻下赤爛口氣衝人牙床惡臭睡臥開口多有煩躁外候則吐蟲也脾臟受驚候起髮際其色微青即傳於肝若至眉心其色漸赤即傳於心若至鼻柱其色必白若分兩耳黑氣連之即生驚風如此不退一周時必死其候主唇不蓋齒口無津液此是脾絶四肢垂冷胃主四肢即是脾絶不中理也五日後寅卯時死其外候則瀉黑血也脾臟受積候口唇黃色兩眼沉腫早晚面浮太陽穴調外候頭疼腹脹大便飲食不消化頻頻夜起傷冷則瀉白糞若臟熱則赤若冷熱不調則赤白痢脾臟受冷候起眉心中嶽其色淡白來侵鼻柱又及元珠即是外候糞白食不消化泄瀉無時下應唇白乃嘔逆面色黃赤也脾臟受熱起太陽穴白薄皮起如竹托口唇乾燥兼有口氣外候若起大便亦赤夜間煩躁顛叫是也肺臟受驚候起髮鬢其色微赤傳於司空則生驚風外候氣喘無力多啼叫若至印堂即主死候作邪聲喉中響哭無淚鼻乾黑燥者是也肺臟受積候起髮際其色微赤下至眉心腹脹噁心若至鼻梁更到準頭即是死候若氣喘急不回者只三日午未時難過肺臟受傷寒候起人中下至承漿亦到下頤其色若春即青夏即赤秋即白冬即黑外候鼻涕流兩眼赤昏面頰赤喘氣喉響其惡候則面黑咬人鼻黑身熱氣喘不定是也肺臟受熱候起面頰其色青白到沖承漿若是外候鼻中出血夜間多啼人即煩渴甚此為疳也驚人腎臟候起耳前穴其色微黃下侵潮口若起外候夢裡咬牙乃侵下閣則生惡候面黑惡叫汗出如膠米嚴其耳前穴黑也積入腎臟候起兩眼深沉其色微黑眼睛微赤外候聤耳兼耳聾頭上囟門生瘡較後再發是也冷入腎臟候起額上色紫而微青下侵中嶽滿面青白多哯頑涎哯吐也乎典切亦多睡少精光也熱入腎臟候起食倉其色微赤下到準頭而還日久兩眼延爛外候耳重多有眼脂小便赤色是也茅先生辨小兒五臟各受色小兒心臟色左顴應赤色丹系心屬南方火下離心亂心中有餘熱或言風擁莫憂疑小兒肺臟色右顴白應在秋庚肺屬西方金位行若見顴中如馬尾此名氣盛氣相騰小兒肝臟色兩眼青時旺甲春在肝屬木象東君忽青胞目如藍靛即是驚癇風欲迍小兒脾臟色脾胃四季屬中央戊乙相乘土色黃外繞四唇如橘水須因積滯熱相當小兒腎臟色北方壬癸腎黑色濃水隨歸兩耳流若在耳邊垂黑髮腎家有病是因由茅先生辨小兒四季受色吉凶春青夏赤秋白平冬黑四季亦同名此為四季以上色平也春黃夏白秋青色冬赤四季黑為寧春赤夏黃秋色黑冬青四季白災輕子春黑夏青秋色黃冬白四季赤同評母春白夏黑秋色赤冬黃四季青不羸此為賊邪茅先生辨小兒面部五色小兒面帶赤色心病或驚或壯熱或傷小兒面帶黃色脾病或肚膨或肚痛或不進食或脾寒或嘔逆小兒面帶白色肺病或咳嗽或氣喘小兒面帶黑色腎病夜有虛汗或夜有虛熱小便先帶紅色後帶白色小兒面帶青色肝病身上鬚髮大瘡茅先生小兒雜病色白在右顴肺氣盛左顴微白邪干心繞唇白色氣不順左右人中脾積深胃氣不和黃色淡睛胞青色只因驚心多驚悸言顴左右肺青風喘嗽聲滿面黑時腎家冷常拋黑糞不曾停茅先生小兒五臟受赤色左顴右顴心肺熱兩眼連箱肝候同唯有四唇耳前後腎脾受熱本同宗茅先生小兒面部雜色面黃金色有積余西方青色號驚呼面紅身熱傷寒候耳冷瘡瘍是一徒此言疹痘赤言渾身熱面青色耳尖冷手足冷即是也客忤黑青翻白沫眼睛黃色積難除非時面黑多驚叫啼哭聲頻氣不蘇面黃臉赤驚疳積分明解得病當除面青面黃鼻亦癢目暗風疳是本源面黑麵青及紅熱啼呼中水患由偏錢乙面上證與茅先生五部位不同左腮為肝右腮為肺額上為心鼻為脾頦為腎赤者熱也隨證治之錢乙目內證赤者心熱導赤散主之方見實熱門中淡紅者心虛熱生犀散主之方見虛熱門中青者肝熱瀉青丸主之方見驚熱門中淡淺者補之黃者脾熱瀉黃散主之方見胃熱門中無精光者腎虛地黃丸主之方見虛寒門中嬰童寶鑑論形色凡小兒自期歲以前猶有變蒸未及診脈唯以形候而知其病矣看形候之際醫工可安神定思勿令情意惑亂其孩子又忌方睡起哭聲始斷如此則色候不正矣凡形候在辰後巳前者為夏未酷熱冬乃微和即外色不盈於面耳可以嚮明觀也嬰童寶鑑觀五臟各部色與茅先生部位同與錢乙不同心屬火其色赤南方之應王在夏外應於面之左顴故左顴上赤色如丹絲之亂理者心有餘熱亦言有風熱肺屬金其色白西方之應王在秋外應於面之右顴故右顴上白色如馬尾者為肺之盛氣肝屬木其色青東方之應王在春外應兩目故目內青色如綻者謂肝有風或云驚癇欲發脾屬土其色黃中央之應王在四季外應於合故口四畔黃色如橘者脾之有積熱腎屬水其色黑北方之應王在冬應於兩耳前流轉不定水性也故耳前黑色如鳥絲垂於水中者腎之有疾也凡色赤在左顴者心熱在右顴者肺熱在兩目者肝熱其色在於兩目眼周圍也在口四畔者脾熱在兩耳前後者腎熱凡白色在右顴者肺氣盛左顴者微邪干心口四畔者氣不順凡黃色在口及人中並左右兩邊黃者脾有疾黃色微者胃氣不和凡青色在兩眼目中白人也又在目坑者亦同也是驚欲發在左顴上心多驚悸右顴上者風入肺為咳嗽而喘凡黑色滿面者腎冷必下黑糞此者辨五臟病色更識春夏秋冬四季斷其病狀須在審詳勿令誤矣面黃白色有積面青白色有驚面色赤身熱者傷寒面色赤耳尖冷身熱者疹痘面色青黑或時吐白沫者客忤非時面上紅赤變易不定者驚眼睛黃者有積面黃兩顴小赤者驚疳面青黃鼻癢目昏者風疳面青黑色夭糾啼呼者中寒之患初生面目上鼻口左右悉黃為血𮏭人中鼻下青乳不消痢下青者衣薄中寒諸陽皆會於面陽衰本有風邪夾冷者面青鼻下兩邊赤者名赤鼻面青白軀身哭者胎中受邪面青者肝癇面赤者心癇面白者肺癇面黃者脾癇面黑者腎癇心風唇赤汗流面赤肝風兩目連額並唇青面黃脾風腹滿通身黃腎風脅有䴵𥻓面黑肺風胸滿鼻下目下色白面赤或壯熱四肢煩手足心熱為心腹熱痛面色或青或白甚者至面黑唇口爪皆青是心腹冷發痛鼻上赤色是風疳小兒傷寒鼻燥喘息鼻氣有聲者必衄候凡色者應其春青夏紅秋白冬黑在四季而黃此五色為平也凡春得黃色夏得白色秋得青色冬得赤色為微邪雖有病不治而自愈亦為欲瘥之候凡春得白色夏黑秋赤冬黃四季青此五色為惡色見之雖不患亦大凶嬰童寶鑑面部異色青色如橫針眼下死鼻上色青腹中痛死面青目黑是肝氣所傷榮衛不通難瘥青色連目入耳死赤色入口三日死赤色入眉上入目死黑色從眉繞目者七日死黑色入口二日死黑色繞口者死鼻上黑色患水腫人中黑色者死鼻色白為吐血死亦破傷出血後死白色繞眉患肺疾黃色鼻上臍中寒極嬰童寶鑑年上色謂鼻準上中為年上上為壽上鼻準頭上微微高處名曰年上看年凶吉更上一位亦有微起處名曰壽上看夭壽也上得青色白色黑色赤色並不可治雌黃色如金者平又曰春色白秋凶夏色白冬凶嬰童寶鑑四墓色從兩眉間直上至髮際左為父墓上為母墓口吻直下為男女墓四墓上有四季正色者平春得青平白在四墓七日死夏得赤平黑在四墓四日死秋得白平赤在四墓四日死冬得黑平黃在四墓者死四季黃平青在四墓者死祕要指迷形證圖惠眼觀證云虛實之狀不拘肥瘠系乎氣色有肥而氣怯瘠而氣壯怯則色軟壯則色盛由此觀之五臟之色皆見於面肝青心赤肺白脾黃腎黑雖然肝王於春心王於夏肺王於秋脾王於四季腎王於冬設或不春不冬有時而變面青黑又非系乎肝腎也時非四季有時而變面黃赤亦非系乎心脾也時非在秋有時而變面色白亦非系乎在肺也忽然青黑者主乎痛忽然黃赤者主乎熱忽然白色者主乎冷此由氣有閉滯非系乎時也泛常而色見於本部者又非此論也心肺系乎兩臉脾則見乎唇之四際肝則見乎眼之四傍腎則見乎兩鬢之際始見於本部又形於他位前所謂不可一端而取也至如脾主唇之四際其色白則主吐瀉或痢病之日久忽然紫黑此心腎之氣傳之於脾主乎敗絶不三日而死也眼之四傍其色青則主驚涎閉結微微白色交侵則肺之克肝亦死候也由是推夫五臟之氣遍行於面不可執一而視也惠眼觀證云小兒之病其實者面色紅赤風之欲生則或先搖頭或自扎眼虛者面色淡黃夾白氣之怯則頭軟弱眼目昏昏又有實而氣血閉者面色青黃夜睡多汗加之唇乾氣粗脅下刺痛晚或躁悶又有虛而大小便澀滯眼遲息緩者此脾有滑積其形候如此由目力觀之切忌小兒睡起與夫啼聲方斷此古人深戒也凡有重病氣色未定則先將手候太衝兼掐腳心或不知病乃一絶也又看眼色如何果渾濁而不光彩則死矣惠眼觀證又云小兒生下三朝七日面蔥白色者為胎氣不足近不可過六十日遠不過晬壽上一點青色驚著胎氣凡因驚後兩眼皮上筋起赤則驚積青則疳積紅則風積鼻心紅色直上此心熱主發癰瘡或夜啼睡臥不穩或熱或痢病兩眉心青氣起主著僕不然被打驚著眼坑下紅色起主心驚因人叫喚或雞犬驚著萬一胸膈煩夜或熱兩眼尾青筋直上髮際主肝氣怯弱如有疾病其筋愈青面色愈白主慢驚搐搦候大腸亦冷唇紅面赤主有傷壯熱又更啼哭必傷寒頭痛外候用手按太陽穴見動來抵手是也臉青唇黑若元有驚候則主驚氣結痛鬚髮驚也如本無驚忽然青者唇反乾燥其聲直叫此因冷物傷脾唇之四外淡白色主脾虛吐瀉及患痢如已吐瀉有黑色繞上唇者必死若患痢重則唇上一路乾白唇之四外黃主食傷脾唇之四際青色淡淡起者主脾胃有涎即發傷寒脾虛引起潮熱唇之四外赤色主心脾受熱氣血壅滯或發口瘡兩臉上有絲紋淡紅夾赤此因肺受熱主嗽或血不潮心夢多驚叫睡臥不安眼坑下青黑色繞轉主肝氣敗絶涎生又面臉上有紅絲從下直上眼尾此心肺極熱生丹瘡眼睛黃色主肺有黏積眼睛青色主肺有風氣並脾氣又白即主渴候遍身黃腫如熟李或因瀉痢手足浮腫若面色變動或青或赤耳輪冷腹內痛好吃冷水主發疹痘兩耳畔青黑筋橫過髮際主臍下痛及疝氣腎吊也生下一月或二月面色忽微微青白偃身哭者主胎中受邪氣非時面赤或壯熱四肢煩手足心熱主心腹熱痛遍身虛腫面色青黃頭皮光腫者主熱疳候氣入四肢皮上粟瘡唇口微微青黃主肝臟風熱及脾有滑積或腹痛瀉生下頭腫胎氣不足眼澀睛赤揉眼揩眼面青黃多淚主風疳在肝臟惠眼觀證小兒氣色言之難矣在視之精熟方知子細全黃色中有黃而色似乎黯者唇似微白主乎疳氣或淡淡黃而青者主肝脾皆虛或有潮熱或患瀉痢小兒疾患須先看脾氣此一臟生病最多何哉吃物無度冷熱無節因而傷損或瀉或滯或痢以致肌肉羸瘦往往傳變於丁奚哺露雖二候一同肚高腳細頭髮乾枯但丁奚者有蟲哺露者腹高青筋吃物不變是也惠眼觀證辨形色大抵氣色各隨其時而言之至如淡淡青黃脾胃虛怯而致此在春與冬末看之多患傷寒疹痘在秋於夏末觀之多患吐瀉瘧痢蓋病有陰陽各以時候擊觸而成此則言其大概無所出也宜常記之又唇之上一路白主吐唇稜上一道白及唇尖微騫主痢唇四際青主瀉唇下一抹黃主傷唇上黑色者胃氣絶必死眼下臉赤主睡不穩多啼叫眼白芨青主驚保生論辨小兒生死形色法兩眉屬木青色吉黃色主霍亂兩眼左太陽右太陰黑睛黃主傷寒白睛黃有積兩風池氣池青色主風候紅色主發熱紫色主吐逆印堂紅色主夜啼青色主溺瀉壽上年上青色主第二次受驚赤色主瀉後發躁微黃平山根青色主發熱生驚黑色及黃色甚者主死人中黑色主蛔蟲咬心患久人中縮者主死承漿地閣黃色主霍亂黑色主風雨驚赤色主痢血止口紅黃色平白色脾絶黑色繞口主死兩頤黑色主滯頤疾赤色主斑瘡眼兩頰赤色主傷寒右赤色肺臟熱主生喘左赤色心臟熱口生瘡兩金匱青色第三次驚主生風候兩耳前青色主驚兩太陽穴青色第一次驚紅色主血淋兩顴赤色主五臟皆有熱赤色連耳入目七日亡黑色繞口者二日亡黑色從眉入目者當日亡鼻乾黑色者二日亡眉青目黃者必亡面黑唇紅者必亡眉青唇黑不食者必亡莊氏家傳察小兒氣色候凡察小兒氣色先安定自己神色勿令散亂兼忌孩兒初睡起及啼哭聲未絶並未可察視面青肝病赤色心病白色肺病黃色脾病黑色腎病兩目青色主肝風驚癇兩耳前後黑主腎熱風虛多啼不得睡兩目赤色主肝臟積熱左額上有丹絲紅紋心積熱右額上白色肺邪干心右額上白色肺臟邪熱左頰上赤者肝熱右頰赤者腎積熱口四畔黃如橘脾積熱口四畔青色兼有青筋主驚口四畔白色榮衛氣滯兩目黃主積食不化疳蛔人中左右兩傍黃主胃逆面青愁思客忤覺驚人中青者主下痢面赤紅主傷寒面赤頭熱清涕傷寒疹痘瘡面青兩鼻下赤主盜汗伏冷陰證面非時紅或紅或赤變移者主時中受邪驚面黃兩額微赤主驚疳面青黃鼻癢目昏者風疳眼上赤色啼叫用力吐乳不受手足冷者死眼下青色如橫針者死黑色從眉繞目者七日死長沙醫者毛彬傳面部察色黑色發於年壽驚氣伏脾或射風池肝生風逆或連氣池大腸冷滑印堂黑耳花黑皆死候也餘部皆心不調但順榮衛別觀所定處赤色發於顴上心臟伏熱或連氣池傷寒之候風池上作輪急驚將起或於年壽上見赤是心脾極熱口內生瘡或臉上赤胃熱或生干逆或吐蛔蟲或上衝印堂下達頤門皆不好也青色發於風池者肝虛風候下繞氣池吐痢日久或當年壽上衝印堂上下傷寒夾驚之候當文武之臺入眼慢驚風起頤門久見者皆久積痞氣黃色發於頤門脾虛疳積年壽上黃大腸冷有黃到準頭脫肛風池黃脾風將起氣池黃胃弱困重生蛔臉堂上下黃脾困之候或年壽印堂黃皆吐瀉脾虛也黃繞金匱承漿脾毒積痢候白色發人中或如縑素之垂雪當人中止者初變蒸也當風氣二池皆肺壅咳嗽或文武二臺上氣滯多成積瀉或人中直上到壽上肺疳將甚也面部皆青肝絶皆赤心絶皆黃脾絶皆白肺絶皆黑腎絶心絶舌縮魚口腎絶筋拘逆冷脾絶胃逆穀不化肺絶喘促脫肛肝絶搐搦生涎並死候也治病要法第十唐孫真人玉關要訣風盛之脈須與解之驚熱之脈須與利之傷冷之脈須與溫之積聚之脈一云積熱須與下之或虛中有積熱先與利熱後與治虛熱里有虛先與補虛然後退熱次調胃氣即無誤矣惠眼觀證論治病夫驚啼者皆因滯風熱在心恐生其涎必當取下夫驚熱但治脾驚化心下涎必自安也夫疳熱者皆傷脾胃受積傳邪心腎必先解邪熱次服疳藥夫驚瀉者必當勻氣夫傷寒者微微用湯解表裡夫疳有五種在意消息若麻痘已出不可冷藥過多或成瀉痢或使毒氣不出殺人若麻痘未出則宜解之若霍亂皆因胃氣不順若三歲目忽然而閉乃成肝疳煮肝散子服之凡小兒取積藥便下勻氣湯隨之乃不損小兒惠眼觀證又云調治小兒之法當須慎護腎胃氣也緣小兒未有天癸之旺而常依四時也胃氣一虛病皆滋長輕者至重重者必死此決然之理也觀令醫者不深念慮而云小兒純陽之氣凡有疾病須當疏下是以世之為醫者執此而妄資疏泄因此而死斃者不可勝紀良可嘆也雖然疏下在乎審諦而不可過調理小兒之要也今夫五臟生病自有陰陽在臟為陰在腑為陽為陰者為陰邪所中慢驚吐瀉瘧痢之病是也為陽者為陽邪所中急風傷寒疹痘之病是也然陰陽之氣相感而動以陽感陽以陰感陰陽或未動待陰而動陰或未動待陽而動者有之矣冬末春初多患傷寒疹痘是其陽病感陽而動也夏末秋初多患吐瀉瘧痢是其陰病感陰而動也誤或冬末春初患一驚候與之化涎未與之下遷延至秋其發則慢是陽病積之為陰是感陰而動也秋末冬初患一驚候不與下涎至春氣之盛激觸而發是其陰病待陽而動也由此推之調理小兒在乎壯陰陽識虛實凡有一病知之於未然之前能審知實則生風虛則氣怯乃善矣聯珠論小兒五虛不治謂病久而虛五者或腫也手心腫臍中腫腳心腫腎陰腫舌頭腫小兒五硬不治心硬啼無淚頭硬手硬腳硬背硬小兒五軟不治手軟項軟腳軟腰軟背軟又歌曰小兒不與大人同得病多由驚熱風先治心神次除熱脈宜緊數及浮洪長沙醫者毛彬集入室生死候有候小兒定脈部左臂為肝上為肺對面為心並曉然脾病只看見勾睡腎病夜間不發作急死之候將口約忽然吐出冷頑涎如此徒勞下良藥聲細聲嘶氣血里昏昏不語大難醫狂言不認人形狀氣滿胸中也可悲久患唇紅不可醫驚來眼滿勿相窺睛青頰赤耳花黑髮直鴉聲怕亂啼手若無紋舌須黑鼻頭渾黑口雙垂昏昏只睡不開眼便是神仙難救之
