body:
  text: 卷第五初生有病凡十七門初生不作聲第一千金論云兒生落地不作聲者取暖水一器灌之須臾當啼又云兒生不作聲者此由難産少氣故也可取兒臍帶向身卻捋之令氣入腹仍呵之至百度啼聲自發亦可以蔥白徐徐鞭之即啼兒始生即當舉之遲晚則令中寒腹內雷鳴乃先浴之然後斷臍嬰孺云凡小兒落地不作聲便取冷水一器灌浴之須臾作聲也千金用暖水此用冷水既千金云由難産少氣恐不宜用冷水也仙人水鑑子初生七日以前不作聲者方胎風生下不能啼須使園中小葉葵搗取汁調熊膽末才交入口免傾危上用葵菜葉搗取自然汁調熊膽末滴三兩滴入口立便能作聲神妙初生眼不開第二祕要指迷論凡小兒生下才一七目不開此乃在母胎中受熱食麵毒致令受患用藥令母服方可愈惠眼觀證凡小兒生下中胎熱眼閉口開常作呻吟聲因受胎中熱只用涼五臟藥天竺黃散方見重舌門中及與母吃後以竹筒煎湯洗眼惠眼觀證洗眼方黃連秦皮燈心大棗等分上用竹筒煎湯洗之治小兒胎熱眼不開初生輒死第三千金論小兒初生輒死治之法當候視兒口中懸癰前上齶上有胞者千金翼云赤胞以指取頭決令潰去血千金翼云以綿拭血淨勿令血入咽入咽殺兒急急慎之初生不吃奶第四巢氏病源小兒難乳候凡小兒初生看産人見兒出急以手料拭兒口無令惡血得入兒口則兒腹內調和無有病疾若料拭不及時則惡血穢露兒咽入腹令心腹痞滿短氣兒不能飲乳謂之難乳又兒在胎之時母取冷過度冷氣入胞令兒著冷至兒生出則喜腹痛不肯飲乳此則胎寒亦名難乳也仙人水鑑子初生七日內不開口滴乳不下宜服此方土蟲三個水研之少許牙硝力莫欺雄黃少使須宜上一片金箔分四時用一角半不論四季調冷水一滴入口命能追此方自有仙人力偏能立救小新兒外臺劉氏又療小兒初生不吃奶方上以乳兩合蔥白一寸和煎一兩沸去蔥與吃即能吃乳立效以蛤蜅灌之聖惠治小兒壯熱肚脹不飲乳龍膽散方龍膽去蘆頭川升麻各半兩犀角屑檳榔川大黃銼碎微炒甘草炙微赤銼鱉甲塗醋炙令黃去裙襴各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫分減漸漸與服之聖惠治小兒腹痛不食乳人參丸方人參龍膽各去蘆頭黃連去須馬牙硝甘草炙微赤銼枳實麩炒微黃以上各半兩上件藥搗羅為末煉蜜和丸如梧桐子大每服以乳汁研二丸灌口中日四五服瘥聖惠治小兒三歲以下胃口閉不吃乳硃砂丸方硃砂牛黃麝香並細研丁香甘草炙微赤銼人參去蘆頭各一分犀角屑黃耆銼石膏細研水飛過五靈脂以上各半兩上件藥搗羅為末入研了藥都研令勻煉蜜和丸如緑豆大每服以熟水下三丸日四五服聖惠治小兒腹脹不吃乳方赤茯苓黃連去須枳殼麩炒微黃去瓤以上各半兩上件藥搗羅為末煉蜜和丸如梧桐子大三歲以下兒以乳汁化三丸灌之日四五服聖惠治小兒腹痛不肯哺乳方赤茯苓甘草炙微黃銼黃連去須各一分上件藥搗羅為末煉蜜和丸如梧桐子大每一丸研破著奶頭上令兒吮奶或研點口中亦得孔氏家傳新生小兒牙關緊不食乳上以麝香一字研細乳汁下聖惠灸法小兒初生二七日內著噤不吮奶多啼者是客風中於臍循流至心脾二臟之經遂使舌強唇痙嗍奶不得此疾若施方藥不望十全爾大抵以去客風無過灸承漿一穴七壯在下唇稜下宛宛中是也次灸頰車二穴各七壯在耳下曲頰骨後炷並如雀屎大聖惠又灸法小兒喉中鳴咽乳不利灸璇璣一穴三壯在天突下一寸陷者中炷如小麥大莊氏集俞穴灸法小兒喉中鳴咽乳不利灸璇璣三壯在天突下一寸陷者中初生吐不止第五錢乙論初生下拭掠兒口中穢惡不盡咽入喉中故吐凡初生兒急須拭掠口中令淨若啼聲一發則咽下多生諸病外臺劉氏療小兒初生吐不止方人乳二合籧篨篾少許鹽兩粟米大上三味煎三兩沸牛黃兩米許研和與服即瘥止仙人水鑑小兒不能飲乳氣喘乳入口便吐神效桃花人參務二分干棗梔子當門子各一枝白芷元精黃牙各少許黃牙即金牙也黃鹽少許陶隱居云北海黃鹽草粒粗以作魚鮓及咸菹上件同研令細勻蜜丸如麻子大煎生薑湯下二丸神效仙人水鑑小兒百日內多愛吐不止兼不飲乳方乳鮒魚一滴大腹頭七個用蒂頭乾薑香茂各燒成灰黃鹽以上各少許陶隱居云北海黃鹽草粒粗以作魚鮓及咸菹上同研令細空心一捻水服之效聖惠治小兒生下十日至半月嘔逆不止藿香散方藿香紫菀洗去苗土各一分甘草炙微赤銼半兩麥門冬三分去心焙桂心半分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫以綿點取滴口中一日次第取盡錢乙治初生吐不止木瓜丸方木瓜木香檳榔各末麝香膩粉各一字上同研麵糊為丸小黃米大每服一二丸甘草水下無時初生不小便第六初生不大便附惠眼觀證小兒生下中臍風撮口此因受胎後母食雞豬酒面薑醋之毒熱氣流入胎中兒因飲血是以生下肚膨脹臍腎腫所治以豆豉膏貼臍方見本門中及服牛黃丸方見風熱門中如覺臍四邊青黑口撮即死矣不須用藥豆豉膏亦名蔥涎膏貼初生兒臍下治大小便不通外臺劉氏治小兒初生不小便方聖惠兼治初生不飲乳云服此即小便通及飲乳也人乳四合蔥白一寸上二味相和煎分為四服即小便利神效嬰孺治未滿十日不小便方上以蒲黃一升以水和封橫骨上立通惠眼觀證豆豉膏亦名蔥涎膏黑豆一勻田螺十九個蔥一大把上搗爛用芭蕉汁調貼臍下吉氏家傳治小兒生下三五日臟腑不通並六十日內諸患粉蜜膏輕粉一錢上用蜜少許熟水解開調粉時點在兒口中極少許令瀉下一二行不可再服初生有懸癰病第七千金論曰小兒出腹六七日後其血氣收斂成肉則口舌喉頰裡清淨也若喉里舌上有物如蘆籜盛水狀者名懸癰有脹起者可以綿纏長針留刃處如粟米許大以刺決之令氣瀉去青黃赤血汁也一刺之止消息一日未消者來日又刺之不過三刺自消盡余小小未消三刺亦止自然得消也有著舌下如此者名重舌有著頰裡及上齶如此者名重齶有著齒齦上者名重齦皆刺去血汁也初生有重舌第八巢氏病源小兒重舌候小兒重舌者心脾熱故也心候於舌而主於血脾之絡脈又出舌下心火脾土二臟母子也有熱即血氣俱盛其狀附舌下進舌根生形如舌而短故謂之重舌千金論曰小兒出腹六七日後其血氣收斂成肉則口舌喉頰裡清淨也若喉里舌上有物如蘆籜盛水狀有腫起著舌下如此者名重舌皆刺去血汁也惠眼觀證凡生下中鵝口重舌重齶口瘡皆上焦熱所致此亦受胎時大受極熱急以雞內金為末乾摻口內及以硃砂膏方見驚熱門中地黃膏方見本門中輪流摻之仍以天竺黃散服之方見本門中惠眼觀證地黃膏治初生兒鵝口重舌重齶方鬱金皂莢水煮乾切細焙乾用豆粉各半兩甘草一分炙馬牙硝研一錢上用生地黃汁及蜂糖對合入盞內約二分許熬成膏和成藥每服兩皂子大香熟水含化或鵝翎掃塗口內亦得惠眼觀證金朱飲子治驚壯熱傷寒伏熱上焦虛熱重舌口鼻生瘡疹致赤眼方本名天竺黃散川鬱金銼碎皂莢水煮乾細者如膽肚極佳天竺黃甘草炙牙硝別研各半兩硃砂一分研蟬殼十四個水浸去土麝香少許上為末每服半錢至一錢以蜂糖熟水調下此藥除煩退熱葛氏肘後治卒重舌方上燒蛇蛻皮為末唾和塗舌上瘥姚和衆方同只干敷嬰孺方同用醋調沾舌下葛氏又法上用釜下土苦酒和塗舌下千金嬰孺皆云釜丹下土千金治小兒重舌方上用田中蜂房燒灰酒和塗喉下愈千金又方上以衣魚塗舌上千金翼及嬰孺方皆燒灰研敷千金又方上用三家屠肉切令如指大摩舌上兒立能啼嬰孺首用此方千金又方上用赤小豆末醋和塗舌上千金又方上燒簸箕灰敷舌上聖惠簸箕尖燒灰細研千金又方上用黃柏以竹瀝漬取細細點舌上良千金翼治重舌舌強不能收乳方上取鹿角末如大豆許安舌上日三即瘥千金翼治小兒重舌舌生瘡涎出方上以蒲黃敷舌上不過三度愈外臺古今録驗療小兒重舌欲死方上以亂髮燒灰末之敷舌上甚佳張渙用豬脂和塗之姚和衆治小兒重舌方上用馬牙硝塗舌下日三度子母祕録治小兒重舌方上用黃丹如豆大內管中以安舌下子母祕録治小兒重舌方上用烏賊魚骨燒灰和雞子黃敷喉及舌上子母祕録治小兒童舌方上用蜣螂燒研未和唾敷舌上孟詵治小兒重舌方上用小豆煮汁和鹿角灰安重舌下日三度日華子治小兒重舌鵝口瘡方上用鹿角炙尉之聖惠治小兒重舌及口中生瘡涎出方上用白羊尿塗少許口中瘥聖惠又方上用桑根上取汁塗口中瘥聖惠又方桂心一分白礬半兩上件藥搗羅為末每用少許干敷舌下日三上聖惠治小兒重舌口中生瘡涎出蒲黃散方蒲黃露蜂房微炙各一分白魚一錢上件藥都研令勻用少許酒調敷重舌口中瘡上日三用之聖惠治小兒重舌舌腫方上取牯牛乳少許與飲之聖惠治小兒重舌方上以桂心半兩為末生薑汁相和令勻每用少許塗舌下日再塗之聖惠又方上用甑帶燒灰細研敷舌下聖惠又方上用桑根白皮一兩細銼以水一大盞煎至五分去滓漸漸以匙子抄少許令兒吮之聖惠又方上用釜底墨水調塗舌下嬰孺治重舌方上取木蘭皮一尺廣四寸去皮皴切細以苦酒一升煮半升適寒溫浸兩手食久小歇須臾干復漬兩足干復漬之大良子母祕録用醋一升煮木蘭皮取汁注重舌上嬰孺治小兒心極熱口中生瘡重舌鵝口方上用柘根枝葉五升以水一斗煮二升去滓煎五合細細敷瘡上無根柘弓材亦可張渙烏魚散方治重舌病烏魚骨一兩燒灰干蜣螂燒灰蒲黃研各半兩枯白礬一分研上件同研為粉每服半錢以雞子黃調塗舌下咽津無妨千金灸法治重舌灸行間隨年壯穴在足大指歧中千金又灸法兩足外踝上三壯千金翼小兒重舌灸左足踝七壯嬰孺方灸三壯外臺古今録驗療兒重舌欲死灸右足踝三壯立愈又灸左右並良千金云灸兩足外踝嬰孺治重舌以兒置其內東向門中灸其舌三炷初生有重齶重齦第九千金論曰小兒出腹六七日後其血氣收斂成肉則口舌喉頰裡清淨也若喉里舌上有物如蘆籜盛水狀有腫起著頰裡及上齶如此者名重齶有著齒齦上者名重齦皆刺去血汁也茅先生小兒生下有中重齶重舌形候重齶為上齶肉厚者是重舌為舌上更加一重白滿口生瘡此為心熱此候乃心家大熱壅滯遂如此所治者先用硃砂膏方見驚積門中塗舌上然用牛黃膏方見膈熱門中奶上吮下一日下三服牛黃膏如此調理二日即愈張渙嬰兒初生六七日間胎毒上攻血氣不斂重齶重齦喉舌上有物如蘆籜盛水狀者名垂癰有氣脹起者急以綿纏長針留刃處如粟米許以刺之令兒氣瀉出青黃血水用鹽湯洗拭急用如聖散方與聖惠牛黃散同見本門中聖惠治小兒重齶重齦腫痛口中涎出宜服牛黃散張渙名如聖散牛黃白龍腦硃砂各一分太陰元精石一兩鉛霜半兩上件藥同細研為散每度用藥半錢先於腫起處以鈹針鈹破出血用鹽湯洗拭口然後摻藥於口中神效聖惠又方上用驢乳豬乳各一合相和煎至一合時時與兒服之聖惠又方元明粉太陰元精石各一分鉛霜半分上件藥同研令細少少敷之萬全方小兒初生口中有物脹起有著頰裡及上齶者名重齶有著齒齦上者名重齦皆刺去血汁上用蛇蛻皮燒灰細研敷之萬全又方上用田中蜂房燒灰細研敷之萬全又方上用炲煤水調塗之三方皆與聖惠同初生口中有蟲第十外臺祕要劉氏療小兒吃奶不穩三日至七日以來覺壯熱顏色赤及鼻孔黃即恐作撮口及孩子牙關裡有蟲似蝸牛亦似黃頭白蚌螺者方上燒竹取瀝半合少許牛黃與吃即便瘥外臺劉氏又方上取豬肉少許拭口即引蟲出或自消便瘥初生著噤第十一犯風噤附巢氏病源小兒噤候小兒初生口裡忽結聚生於舌上如黍粟大令兒不能取乳名之曰噤此由在胎時熱入兒臟心氣偏受熱故也聖惠論凡初生兒須防三病一曰撮口二曰著噤三曰臍風皆是急病就中撮口著噤尤甚過一臘方免此厄但看面赤喘急啼聲不出者是撮口狀候已重善救療者十不得四五若牙關緊急吃乳不穩啼聲漸小口吐涎沫是著噤常人見大小便皆通以為冷熱所得殊不知病在喉舌之間據狀亦極重矣善救療者十不得三四但依將護法防於事先則必無此患聖惠又云夫小兒初生口噤此由在胎之時熱入兒心脾心脾偏受於熱故令口噤者也千金治噤赤者心噤白者肺噤方上用雞屎白棗大綿裹以水一合煮二沸分再服聖惠治口噤方同用如豆大三枚以水下千金治小兒口噤方鹿角粉大豆末上二味等分和乳塗上飲兒千金又方上用驢乳豬乳各二升合煎得一升五合服如杏仁許三四服瘥千金治小兒口噤不能乳方上用雀屎四枚末之著乳頭上飲兒兒大十枚外臺治小兒初生口噤不開不收乳方上用赤足蜈蚣半枚去足炙令焦末研之絹篩以豬乳二合和之三四服分與之差聖惠及圖經同外臺崔氏又兒著口噤體熱者方上暖竹瀝二合分四五服之兵部手集聖惠同外臺古今録驗療小兒著噤其病在咽中如麻豆許令兒吐沫不能乳哺方上取水銀如黍米大與服覺病無早晚水銀下咽便愈以意量之不過小麻子許聖惠同食療治孩子口噤方上以蛇莓研取汁灌口中死亦再活蛇莓生下濕處莖端三葉花黃子赤似覆盆子簡要濟衆治小兒口噤方上以晚蠶蛾二枚炙令黃為末蜜和敷兒口唇內聖惠治小兒著口噤方上刮卻上齶白焌了取雀兒飯甕子並蟲細研和奶汁綿濾點口中及塗兩頰齒齦上齶舌上下聖惠又方上用新烏驢糞捩取汁塗口中咽亦無妨聖惠又方上用川椒一大兩搜麵裹為三角炙樣燒令黃熟以綿蓋兒口掏去尖如箸頭許大使椒氣入口即效如未覺即可作兩三枚時用一角氣力即盛聖惠又方看兒上齶有白點子火急以指甲刮卻仍燒胡粉紙燭子焌之瘥聖惠治初生兒口噤不開舌不能吮乳方蜘蛛一枚去足及口炙令焦細研豬乳一合上以豬乳和上件散為三服徐徐灌之神妙聖惠又方上用牛口齝草取絞汁塗上瘥聖惠又方上用白牛尿取塗口中瘥聖惠又方上用東行牛口沫取塗兒口及額上即便效聖惠又方上用葛蔓燒灰細研以一字和乳汁點口中即瘥張渙治小兒口噤立聖散方乾蠍梢七個為末膩粉末一錢干蜘蛛一個去口足先以新竹於火上炙取竹油一蜆殼許乃竹瀝也浸蜘蛛一宿炙令焦取末上件並同研令極細每服一字用乳汁調時時滴口中萬全方治小兒著口噤上凡遇兒初飲乳後以發纏指沾清水點拭了看齒根上有黃筋兩條便以葦刀子割斷點豬乳便瘥如兒口難開但先點豬乳自開祕要指迷治小兒生下一月日內牙關緊急不能飲乳口噤方上用木梳先於懷內令暖卻於耳門尖下醃一七次其病即安張氏家傳治新生兒口噤方蜈蚣全一枚蠍梢七個硼砂硃砂各三銖梅花腦麝香各一銖上件入乳鉢研嬰兒口噤以乳母唾調塗口唇四畔並牙關後小兒以舌攪藥即是安如有一切急驚生薑蜜水調一字服附犯風噤方茅先生小兒生下一百二十日內有犯風噤候口噤眼開啼聲漸小吃奶不便吐出白沫此候為兒在胎未見日月先受此病本因母受胎有疾故受毒氣生來血氣未調又被風邪所擊故有如此候所治者先下奪命散與吐風涎方見急慢驚風門中後下醒脾散有二方一方見胃氣不和門中一方見慢脾風門中夾勻氣散與服方見胃氣不和門中又下雄朱散方見驚癇門中夾硃砂膏方見驚積門中常服即愈如見手捉拳噤口不開死之候初生有鵝口第十二巢氏病源小兒鵝口候小兒初生口裡白屑起乃至舌上生瘡如鵝之口裡謂之鵝口此由在胎時受穀氣盛心脾熱氣熏發於口故也千金論曰凡小兒初出腹有鵝口者其舌上有白屑如米劇者鼻外外一作中亦有之此由兒在胞胎中受穀氣盛故也或妊娠時嗜糯米使之茅先生論小兒生下有喉痹木舌鵝口候喉中忽壅一塊肉瘤閉卻喉此為喉痹及身大熱舌硬都不轉得為木舌口更開殊不合滿口都黃如膏此名鵝口此三個候皆因熱甚生風風盛壅熱毒至此為實積實熱得此候所治者先用積實牛黃丸方見實熱門中微與通吐惡涎後用勻氣散方見胃氣不和門中然用天竺黃散方見實熱門中夾牛黃膏方見膈熱門中與服即愈如見喉內加空響似鋸及眼視面青黑不下奶食死候葛氏肘後治新生出腹鵝口方上以發纏箸沾井華水拭之三日一如此便脫去不脫可煮粟茭汁令濃以綿纏箸拭之如春夏無粟茭粟木皮亦得用井華水法千金作粟茯治法皆與葛氏同後徐王神效方治小兒鵝口噤礬石硃砂末各半分右二物合研極細敷舌上藥烈唯薄薄敷之日三以冷水洗舌以發拭白垢也外臺祕要方同千金治小兒鵝口不能飲乳方上用鵝屎汁瀝兒口中聖惠取白鵝糞以水絞取汁千金又方上用黍米汁塗之子母祕録用黍米汁千金又方上用取小兒父母亂髮淨洗纏桃枝沾取井華水東向向日以發拭口中得口中白乳以置水中七過瀝洗三朝作之聖惠云以指纏亂髮蘸溫水揀之三日勿絶效矣簡要濟衆治小兒鵝口方上用馬牙硝細研於舌上摻之日三五度聖惠云調於舌下塗之子母祕録小兒鵝口方上用桑白皮汁和胡粉敷之子母祕録小兒鵝口不乳方上用雞胵黃皮燒末乳和服千金治小兒鵝口方上用柘根淨洗細銼五升無根只以弓材亦佳水一斗煮取二升去滓更煎取五合頻頻拭齒口即瘥張渙嬰兒初生七日內胎毒者其舌上有白屑如米連舌上下有膜如石榴子大令兒語不發如鵝口狀名曰鵝口保命散方硃砂研細水飛令乾白礬燒灰各一分馬牙硝半兩細研上同再研細每服一字取白鵝糞以水攪取汁調塗舌上頜頰內未用藥時先以手指纏亂髮揩拭舌上垢然後使藥敷之孔氏家傳治小兒鵝口方上以桑汁用新綿惹之日華子用桑東行根研汁初生有木舌第十三聖惠論夫脾脈絡於舌舌者心之候若臟腑壅滯心脾積熱邪熱之氣隨脈上衝於舌本則令舌腫脹漸漸粗大若不早療滿塞口中故謂之木舌小兒尤多斯疾也千金論云夫小兒木舌其狀舌漸粗大若舌大滿口當塞殺兒也仙人水鑑小兒百日內口中有木舌方木舌要可待黃葵更入鉛牙兩相知黃丹也點之七遍立便可神方不暇藥多期聖惠治小兒木舌方上以鯉魚切作片子貼於舌上效聖惠又方上用炲煤醋和塗舌上當脫涎膜又塗之以涎膜盡舌如故即止聖惠又方紫雪一分竹瀝半合上研紫雪為末用竹瀝調下一字日三五服聖惠又方衣中白魚五枚川朴硝一分鹽少許上件藥搗細羅為散少少敷之聖惠治心脾熱毒生木舌腫滿妨悶宜服大黃散方川大黃一兩銼微炒犀角屑射干川升麻玄參大青絡石木通銼甘草炙微赤銼以上各三分上件藥搗篩為散每服五錢以水一大盞煎至五分去滓不計時候溫服聖惠治心脾壅熱生木舌腫脹宜服元參散方元參川升麻川大黃銼碎微炒犀角屑各三分甘草炙微赤銼半兩上件藥搗篩為散每服三錢以水一大中盞煎至五分去滓不計時候溫服聖惠治木舌熱腫漸大滿口宜含馬牙硝丸方馬牙硝三分細研川大黃銼碎微炒大陰元精石鉛霜麝香各細研寒水石各半兩甘草一分炙微赤銼白礬半分燒灰上件藥搗羅為末入研了藥令勻煉蜜和丸如小彈子大常含一丸咽津聖惠治熱毒攻心脾致生木舌腫痛兼咽喉不利射干散方射干川升麻木通銼馬藺微炒甘草炙微赤銼漏蘆以上各三分當歸川大黃銼碎微炒桂心各半兩上件藥搗篩為散每服五錢以水一大盞煎至五分去滓不計時候溫服聖惠又方犀角屑黃芩木通銼各一兩半漏蘆川升麻麥門冬去心羚羊角屑各一兩上件藥搗篩為散每服五錢以水一大盞煎至五分去滓不計時候溫服養生必用治木舌方大青患魚膽北方謂之青患亦云謂厚魚似鯉魚頭尖鱗青黑身狹長用膽一枚入五銖錢乙文在膽內線扎定外面墨塗三次挂梁上陰乾上每用少許冷水化開服張渙川消散治小兒木舌方川朴硝半兩紫雪一分鹽半分上件研勻細每服半錢入竹瀝三兩點白湯調塗舌上咽津無妨初生有撮口第十四千金論曰小兒初出腹骨肉未斂肌肉猶是血也血凝乃堅成肌肉耳其血沮敗不榮肌肉則使面目繞鼻口左右悉黃而啼閉目聚口撮面口中乾燥四肢不能伸縮者皆是血脈不斂也喜不育若有如此者皆宜與龍膽湯也聖惠論凡初生兒須防三病一曰撮口二曰著噤三曰臍風皆是急病就中撮口尤甚過一臘方免此厄但看面赤喘急啼聲不出者是也撮口狀候已重善救療者十不得四五但依將護法防於事先則必無此患矣聖惠又云小兒撮口者由在母胞中挾於風熱兒生之後氣血未調或洗浴當風繃袍失度一臘之內遂有斯疾但看面赤啼聲不出哺乳艱難即是撮口若過一臘方免此厄最為急疾宜速療之茅先生小兒中撮口候一來因在胞中受熱毒又因在母胞挾於風熱又因兒生之後氣血未就洗浴當風有賊風吹著故受此症是為惡候漢東王先生家寶臍風證候云孩兒生下三四日之間有臍風撮口者蓋因生下之時坐婆不諳看掌剪臍帶不定傷動臍帶外風入臍故有臍風撮口下乳不得其候面青啼聲不出唇青撮口若口出白沫四肢逆冷此是惡候張渙云嬰孩胎氣挾熱亦因母有邪熱傳染或生下洗浴當風襁褓失度致令嬰兒啼聲不出乳哺艱難名曰撮口不開病七日之內尤甚飛仙論小兒生下有臍風撮口者多是剪臍帶有所傷動被賊風入臍撮口不開下乳不得其候面青哭聲不出多撮唇口若是吐出白沫四肢覺冷必死小兒宮氣方治小兒撮口上用白殭蠶二枚為末以蜜和敷於小兒口內即瘥子母祕録治小兒撮口病但看舌上有瘡如粟米大是也上用蜈蚣取汁刮破指甲研敷兩頰內如無生者乾者亦得陳藏器治小兒撮口方上先嫠小兒口傍令見血碎雀甕取汁塗之又産育時若開諸物口不令閉多使兒患撮口聖惠治小兒新生髮噤撮口候宜服鉤藤散方鉤藤川升麻黃芩各半兩蜣螂二枚去翅足微炒上件藥搗細羅為散每服一錢以水一盞入蘆根一分煎至四分去滓徐徐溫喂之聖惠治孩子風熱撮口神效方白米五十粒朴硝半錢豉三十粒甘草生切蔥白各一寸上以童子小便一中盞煎取三合兒初生未吃奶前便以綿濡點藥口中二七滴逡巡兒腹中轉即利出臍糞然後與奶吃至七日以來每日滴三七滴永無撮口極經效方聖惠治撮口當兩乳中高下平以線量灸之三壯起死仍用後方烏驢乳一二合東引槐枝十枚各長三寸上以煻火煨槐枝入火一半看不煨頭津出即取拭卻內於乳中浸須臾便以槐枝點乳於口中大驗聖惠治小兒胎熱撮口方牛黃細研一錢竹瀝一合上件藥調令勻時時與少許服之聖惠又方蝸牛子十枚去殼細研如泥蒔蘿末半分上件藥同研令勻用奶汁和塗於口畔立瘥聖惠又方麝香硃砂各一分研蛇蛻一尺細切微炒上件藥都細研如粉每用半字以津黏兒口唇上日五七上用之聖惠治小兒撮口及發噤方上用生甘草一分細銼以水一小盞煎至六分去滓微溫與兒服之令吐出痰涎後以豬乳點口中即瘥聖惠又方上用壁魚子細研作末每服少許令兒吮之聖惠又方上用鼠蝜蟲絞取汁與兒少許服之聖惠又方赤足蜈蚣一枚雀兒飯甕子不開口者五個上和燒為末細研每服以粥飲調下二字聖惠又方上用初生豆茅爛研以乳汁調與兒吃或生研絞取汁少許與服亦得聖惠又方上用晚蠶蛾三枚炙黃研為末和蜜塗口即效若凡兒患毒必須防吐用油麻一小升去皮研絞汁二合以來用甘草半寸炙為末和油微暖日為五服嬰孺方與聖惠壁魚方以下諸方皆同治撮口聖惠又方上用蝸牛子五枚去殼取汁塗口上以瘥即止聖惠又方上用棘科上雀兒飯甕子未開口者取甕子內物和奶汁研灌之聖惠又方上用柏白皮穿作小孔子安於臍上以艾炷入柏皮孔中灸之即瘥漢東王先生家寶治嬰兒因剪臍傷於外風致唇青撮口口出白沫神妙定命散方赤腳蜈蚣半條酒炙令乾麝香少許別研川烏頭尖三個生上為末同麝香研極細每服半字煎金銀薄荷湯調下張渙急風散方治撮口蛇蛻皮微炒乾蠍梢鉤藤各一分以上搗羅為細末次用硃砂一分細研水飛好麝香牛黃各半錢並研極細上件都拌勻再研為細末每服一字取竹瀝一兩點同乳汁調下初生中臍風第十五聖惠論夫小兒臍風者由斷臍後為水濕所傷或水在繃袍之中乳母不覺濕氣傷於臍中亦因其解脫風冷所乘遂令兒四肢不利臍腫多啼不能乳哺若不急療遂致危殆者也茅先生小兒生下三臘有中臍風候腹臍腫滿口撮身熱不太故乳哺此候因母受胎時好吃豬雞酒面恣情餐啜遂流熱毒聚在胞中牙兒飲母熱血脈五臟未成就故受風邪而得若生下腹臍腫滿所治者先以硃砂膏方見驚積門中用蜜化奶上吮下然後用豆豉膏方見本門中塗臍下四邊十日之中下六服硃砂膏其疾方愈如見臍四邊黑口撮不開此為內搐不可治之不在用藥爪甲黑當日死茅先生小兒中臍風本因在胎受風熱又因斷臍後水濕所傷便是惡候聖惠方小兒臍病候古方小兒有臍風候有臍濕候有臍瘡候三者皆因斷臍之後為風濕所傷而成疾也夫風入臍令兒四肢不利多啼不能乳哺謂之臍風其中濕令臍腫濕經久不幹謂之臍濕其風濕相搏令臍生瘡久而不瘥謂之臍瘡三者有一不已則入於經脈多變為癇其已成癇者作癇治之聖惠小兒初生至七日以來臍風腫欲落封臍雄鼠糞散方雄鼠糞七枚微炒胡粉半兩大棗三分去核綿帛灰麝香細研各一錢上件藥搗研為散看臍欲落不落即用藥以敷之所以不令風入故也聖惠治孩子才生下斷了臍便敷此散冀免一臘內臍風撮口方亂髮雞子大燒令煙欲斷不斷即堪用蜈蚣一寸許燒灰羚羊角燒灰一錢麝香一小豆大雀兒飯甕子三枚上藥相和細研令勻割臍了便用敷之效聖惠又方上以瓜蒂燒灰研敷之良茅先生小兒貼臍風豆豉膏方豆豉天南星白蘞赤小豆各半兩上為末每服二大錢用芭蕉自然汁調塗臍四邊一日只一次調塗兩日兩次塗即安樂注在前良方治褓中小兒臍風撮口法每視小兒上下斷當口中心處若有白色如江豆大此病發之候也急以指爪正當中掏之自外達內掏令匝微血出亦不妨又於白處兩盡頭亦依此掏令內外斷只掏令氣脈斷不必破肉指甲勿令大銛恐傷兒甚豫為河北察訪使日到趙郡有老人來獻此法云篤老惜此法將不傳願以濟人詢之趙人云此翁生平手救千餘兒矣環趙數邑人皆就此翁治應手皆愈吉氏家傳治臍風鎖口金頭蜈蚣一個青州蠍梢四個白殭蠶七個瞿麥二字上為末用一字許吹鼻內啼時可醫更用薄荷水下一字在口初生臍腫濕第十六氣臍醃破臍附聖惠論曰夫小兒臍濕者亦由斷臍之後洗浴傷於濕氣水入臍中致令腫濕經久不幹也凡斷臍後便多著艾厚裹不得令兒尿濕著臍切須慎之往往中濕致腫至百日以後不可瘥也嬰孺論曰凡兒尿清者冷與臍中水同此當令兒腹中疼痛夭糾呼啼面目青黑此臍令至腫者當看臍腫輕重重者便即灸之八九十壯輕者臍不大腫者但出汗時啼呼者搗當歸胡粉末敷之仍灸粉絮日日尉之或至一日乃瘥以啼呼止為候顱囟治孩子臍中不幹白礬一錢煅過龍骨一分上為末入麝香少許每使拭臍乾摻之用帕裹避風聖惠方同不用麝香千金治小兒臍汁出不止兼赤腫白石脂散方上用白石脂細研熬令微暖以粉臍瘡日三四度外臺古今録驗療小兒風臍汁出甘草散方甘草炙螻蛄熬各三分上二味搗散以安臍中瘥止甚妙外臺古今録驗療小兒臍汁不瘥黃柏黑散方黃柏炙一兩釜底墨四分上二味搗和作散以粉臍中即瘥外臺古今録驗療小兒臍著濕暖鹽豉尉方上用鹽豉等分搗作餅如錢許安新瓦上炙令熱用尉臍上瘥止亦用黃柏末以粉之妙外臺備急治小兒臍赤腫方杏仁二分熬令紫色豬牙車骨中髓上二味先研杏仁入此髓和令調塗之臍上千金同外臺備急急治兒生過月臍汁出方上用絳帛燒灰研敷臍中千金同姚和衆治小兒臍腫方上用桂心炙令熱尉之日可四五度子母祕録小兒臍風濕腫久不瘥方上用蜂房燒灰末敷之子母祕録治小兒臍赤腫方上用杏仁杵如脂掌中相和敷臍上聖惠治小兒臍腫濕久不瘥封臍散方胡粉一分雄鼠糞七枚燒灰甑帶一圍燒灰乾薑灰綿帛灰白石脂各半兩上件藥相和細研加麝香末一錢看臍欲落不落即封臍便瘥如未患敷之即終不患燒藥時不得令有別灰也聖惠治小兒臍濕腫逾月不止方干蝦蟆皂莢子白礬並燒灰各一分上件藥細研令勻少少敷臍中聖惠治小兒臍中赤腫汁出不止方蝦蟆牡蠣各一枚上件藥並燒為灰細研如粉每取少許敷臍中日三兩上即瘥聖惠治小兒臍濕不幹方白礬燒灰龍骨各一分上件藥細研敷臍中取瘥為度頗囟經漢東王先生方同皆有麝香少許聖惠又方上用白礬燒灰細研敷之茅先生治小兒臍常濕不幹方上用蠶蛻燒灰入輕粉干貼錢乙柏墨散治小兒斷臍後為水濕所傷或繃袍濕氣傷於臍中或解脫風冷所乘故令小兒四肢不和臍腫多啼不能乳哺宜速療之黃柏銼釜下墨煤亂髮燒各等分上為細末每用少許敷之漢東王先生家寶治嬰兒因剪臍傷於外風故臍瘡不幹方上以綿不拘多少燒灰舊綿亦佳為末每用少許乾摻之張渙嬰兒臍瘡腫濕經久不瘥若至百日即危急方胡粉細研乾薑燒灰細研白石脂燒存性細研各一錢上件同再研用藥一字至半錢敷臍中時時用良方治小兒臍久不幹出膿赤腫及清水出上用當歸焙乾為末研細著臍中頻用自瘥豫家小兒常病臍濕伍十餘日貼他藥皆不瘥聖惠有十餘方從上試之至此方一敷而干後因尿濕瘡復病又一貼愈莊氏家傳小兒患氣臍臍大如栗虛腫而軟痛上用竹瀝塗之日數上自消莊氏家傳治嬰兒繃縛尿濕醃破上用屋爛草為末頻摻效聖惠灸法小兒臍腫灸腰後對臍骨節間三壯炷如小麥大初生有臍瘡第十七巢氏病源小兒臍瘡候臍瘡由初生斷臍洗浴不即拭燥濕氣在臍中因解脫遇風風濕相搏故臍瘡久不瘥也臍瘡不瘥風氣入傷經脈則變為癇也葛氏肘後治風臍及臍瘡久不瘥方上用干蝦蟆燒為灰敷之日三四佳千金翼臍有汁亦用此方見裹臍法千金治小兒臍中生瘡方上用桑汁敷乳上使兒飲之千金又方上用羖羊乳及血令飲之千金治小兒風臍遂作惡瘡歷年不瘥汁出不止方上燒蒼耳子粉之千金又方上用干蠐螬蟲末粉之不過三四度瘥千金治小兒臍不合方上用大車轄脂燒灰日二敷之千金治小兒臍中生瘡方上用甑帶燒灰和膏敷之子母祕録小兒臍瘡不合方上用黃柏末塗之聖惠治小兒臍瘡久不瘥方干蝦蟆一分燒灰白礬一分燒灰上件藥合研令細以敷臍中聖惠又方黃連末胡粉各半兩上件藥合研令細以敷臍中聖惠又方上用馬齒莧曝乾為末敷之聖惠又方上用龍骨燒細研為末敷之聖惠又方上用香豉炒令黃焦搗羅為末敷之聖惠又方上用伏龍肝細研敷之張渙嬰兒臍瘡不瘥風氣傳於經絡變為癇疾者宜急用金黃散方川黃連一分別為末胡粉別研龍骨燒灰別研各五錢上件同再研為細末每用少許敷臍中時時用
