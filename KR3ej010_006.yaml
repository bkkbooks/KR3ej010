body:
  text: 卷第六稟受諸疾凡十九門解顱第一巢氏病源小兒解顱候解顱者其狀小兒年大囟應合而不合頭縫開解是也由腎氣不成故也腎主骨髓而腦為髓海腎氣不成則髓腦不足不能結成故頭顱開解也嬰童寶鑑小兒客風傷腑即顱骨解囟大萬全方小兒頭病方論小兒有解顱候有囟不合候有囟陷候此三者大同而小異也解顱者謂小兒年長而頭顱開解也夫腎主骨今骨不合頭縫開解此腎氣不成故也其囟不合與囟陷雖因臟腑有熱熱氣上衝致囟或不合或陷然亦本於腎氣不足也玉訣小兒骨氣所傷候歌解顱鶴膝腑傷風囟腫因驚胃氣攻語澀行遲胎氣促筋拳瞪目是肝風此患當先行風氣利膈下涎次和臟腑即無誤也葛氏肘後方治小兒解顱蟹足骨白蘞等分細末乳汁和塗上干又敷千金治小兒解顱方熬蛇蛻皮末之和豬頰車中髓敷頂上日三四度千金又方豬牙頰車髓敷囟上瘥千金治小兒腦長解顱不合羸瘦色黃至四五歲不能行半夏尉方半夏湯洗七遍生薑芎藭各一兩細辛三兩桂心一尺烏頭去皮臍十枚上六味㕮咀以醇苦酒五升漬之晬時煮三沸絞去滓以綿一片浸藥中適寒溫以尉囟上冷更溫之復尉如前朝暮各三四尉乃止二十日愈嬰孺方只五味無生薑又不用苦酒千金治小兒解顱三物細辛敷方細辛桂心各半兩乾薑炮十八銖上末之以乳汁和敷顱上干復敷之兒面赤即愈簡要濟衆治小兒解顱不合驢蹄不許多少燒灰研以生油和敷於頭骨縫上以瘥為度聖惠治小兒解顱囟大身有痼熱頭汗出腹脹咳嗽上氣肩息脛蹇足交三歲不行皆治之鍾乳丸方鍾乳粉防風去蘆頭熟乾地黃牛黃細研甘草炙漆花嬰孺方以此一味為豺漆蓋五加皮也上各一分搗羅為末入研了藥更研令勻以犬腦髓和丸如麻子大每服以粥飲下三丸早晨午間日晚各一服量兒大小以意加減聖惠治小兒顱骨開宜塗白芨散方白芨細辛防風去蘆頭柏子仁上各一分搗細羅為散以乳汁調塗兒顱骨上日再用之嬰孺方治小兒腦長喜搖頭解顱狗腦丸方狗腦一個豺漆五加皮也甘草炙白朮防風鐘乳石乾地黃各一分牛黃二分上以狗腦丸小豆大一歲飲下二丸日再未知加之又云兒囟常令暖冷即病死嬰孺方小兒錮囟藥使腦不長芍藥粉上取黃雌雞臨兒囟上刺其冠以血滴囟上血上以芍藥粉敷之使血不見一日立瘥嬰孺方治小兒解顱囟大身羸汗出肺脹咳上氣三五歲不行狗腦丸方甘草炙地黃各三分防風白朮各二分鍾乳粉牛黃各二銖上為末狗腦丸如小豆大二歲飲服七丸日再稍加之張渙嬰兒頭骨應合而不合頭縫開解名曰解顱宜用玉乳丹方鍾乳粉依古法制煉者柏子仁別研熟乾地黃依法蒸焙者當歸洗焙乾各半兩防風銼補骨脂淨煉炒各一兩或加黃耆茯苓上件除別研者碾為細末次入鍾乳粉等拌勻煉蜜和如黍米大每服十粒煎茴香湯下乳食前萬全方治小兒解顱囟大身有痼熱頭汗出腹脹咳嗽上氣肩息脛蹇足交三歲不行皆治之磁石丸磁石火煅醋淬七遍細研飛過防風去蘆頭熟乾地黃牛黃研入甘草炙乾漆炒令煙出以上各一分上搗羅為末入研了藥更同研勻以犬腦髓和丸如麻子大每服三丸粥飲下早晨午間日晚各一服量兒大小以意加減長沙醫者丁時發傳治小兒解顱虎骨方虎骨敗龜板不灰木乳香各半兩上為末用生豬血於手心內調塗在頭縫開處以舊綿子包裹七日第八日以蔥湯水洗去前藥再用此藥塗之經年者已減一分又歇三日方再用藥塗之又服參苓散人參茯苓白附子炮羌活甘草炙芍藥白朮水煮各一分犀角屑京芎藿香後三味減一半上為末每服半錢水一盞用少金銀同薄荷三葉煎至三分溫服通驚氣囟不合第二聖惠夫小兒囟不合者此乃氣血少弱骨本不榮故也皆由腎氣未成肝肺有熱壅熱之氣上衝於腦遂令頭髮乾枯骨髓不足故令囟不合也錢乙論解顱六年大而囟不合腎氣不成也長必少笑更有目白睛多㿠白色瘦者多愁少喜也余見腎虛千金治小兒囟門不合方防風一兩半柏子仁白芨各一兩上三味末之以乳和敷囟上十日知二十日愈日一嬰孺方狗腦丸治小兒三歲不行腦長囟大頭汗出有熱足燥脛交方鐘乳石乾地黃甘草豺漆五加皮也防風各等分上為末狗腦丸如小豆大飲下二丸日進三服夜二服嬰孺方治小兒囟開不合方防風六分白芨四分梔子三分上為末以乳汁蜜和塗囟上日一度嬰孺方小兒囟開令合方防風六分白芨二分上為末乳和塗囟上日十度以知為度二十日當合錢乙治囟開不合鼻塞不通天南星大者微炮去皮為細末淡醋調塗緋帛上貼囟上火灸手頻尉之張渙嬰兒解顱囟不合囟填囟陷下不平皆由腎經虛熱宜用對囟散方蛇蛻皮一兩燒灰細研防風川大黃濕紙裹火煨存性白芨各半兩上件碾為細末入青黛半兩同研勻每用半錢以獖豬膽汁調勻用一紙囟子攤之四邊回各留少白紙用淡醋生面糊貼囟上不住以溫水潤動一伏時換莊氏家傳方治腦縫不合山茵陳一兩車前子百合各半兩上為末用烏牛乳汁調塗腳及腦縫上用帛子裹頭三日一換五上必效王氏手集封囟散方治囟開不合頭縫開張囟開崎陷咳嗽鼻塞柏子仁防風天南星各四兩上為細末每用一錢以豬膽汁調勻稀稠得所攤在緋絹帛上看囟子大小剪貼一日一換不得令乾時時以湯潤動聖惠小兒囟開不合灸臍上臍下各五分二穴各三壯灸瘡未合囟開先合炷如小麥大囟填第三巢氏病源小兒囟填候小兒囟填由乳哺不時飢飽不節或熱或寒乘於脾胃致腑臟不調其氣上衝所為也其狀囟張如物填其上汗出毛髮黃而短者是也若寒氣上衝即牢䩕音昴履頭也腫硬如履頭疊起熱氣上衝即柔軟又小兒脅下有積又氣滿而體熱熱氣乘於臟臟氣上衝於腦囟亦致囟填又咳且啼而氣乘臟上衝亦病之啼甚久其氣未定因而乳之亦令囟填所以然者方啼之時陰陽氣逆上衝故也石壁經三十六種積熱囟虛腫候歌積聚脾中熱不通致令面赤口唇紅胸高夜嗽多䐜脹休使流傳肺有風喉里作聲涎上壅囟門腫起熱來沖但教涼膈安靈府能使三朝速有功積有冷熱皆能作腫冷則糞白或酸臭氣衝人亦有蟲出其食物皆不能化腹脹滿而多困喉中亦鳴也熱則使多渴其糞赤色面亦黃赤口內臭氣亦蟲出各看其證候調治且須分水穀去積並調氣冷則溫脾胃熱則去其熱化涎止渴囟隱則冷也腫則熱也鳳髓經此候歌括一同有注云宜與金華散石壁經三十六種積熱囟虛腫候云此候宜將時氣門中三十六種除濕散濃煎桑白皮湯下小兒形證論四十八候積熱囟虛腫歌一同後云此候肺熱生風涎鳴囟腫將白丁香膏一二服或南星丸一二服便退祕要指迷論方凡小兒生下一月日內或囟門腫此乃受胎熱氣即用黃柏膏塗於足心湧泉穴如陷即用半夏膏塗手心此乃嬰兒腎流受冷氣邪干心致令病生黃柏半夏皆為末皆冷水調貼囟陷第四巢氏病源小兒囟陷候此謂囟陷下不平也由腸內有熱熱氣熏臟臟熱即渴引飲而小兒泄利者即腑臟血氣虛弱不能上衝髓腦故囟陷也聖惠治小兒臟腑壅熱氣血不榮致囟陷不平者生乾地黃散方生乾地黃二兩烏雞骨一兩塗醋炙令黃上件藥搗細羅為末不計時候以粥飲調下半錢聖惠治小兒囟陷方上取豬牙車骨髓煎如膏塗囟上良聖惠又方上以狗頭骨炙令黃搗羅為末以雞子清調塗之聖惠又方上以天靈蓋炙令黃搗羅為末以生油塗調之千金小兒囟陷灸臍上下各半寸及鳩尾骨端又足太陰各一壯滯頤第五巢氏病源小兒滯頤候滯頤之病是小兒多涎唾流出漬於頤下此由脾冷液多故也脾之液為涎脾氣冷不能收制其津液故冷涎流出滯漬於頤也五關貫真珠囊小兒滯頤疾候滯頤疾者涎流口邊無時此即因風冷入脾胃故令涎水常流惠濟方小兒滯頤候歌宜蔥湯丸取用銀白丸補滯頤為患本因傷流出清涎口角傍此患脾虛寒胃口愚夫卻道破涎囊終朝服藥全無效夜臥流涎亦汗床洗肺更宜溫胃口脾元一壯自安康千金治小兒口中涎出方以白羊屎內口中千金又方以東行牛口中沫塗口中及頤上千金又方桑白汁塗之瘥張渙小兒有多涎常留在兩口角此由脾胃有冷流出漬於頤下乃名滯頤之病宜溫脾丹方半夏一兩用生薑六兩同搗細炒令黃丁香木香各一兩乾薑白朮青橘皮各半兩上件搗羅為末煉蜜和如黍米大每服十粒米飲下量兒大小加減張渙溫胃散治脾冷流涎半夏白礬水浸炒黃人參去蘆頭肉豆蔻白朮乾薑甘草炙以上各半兩丁香一兩上件搗羅為細末每服一錢水八分一盞入生薑二片煎五分去滓溫服食前齒不生第六巢氏病源小兒齒不生候齒是骨之所終而為髓之所養也小兒有稟氣不足者髓即不能充牙齒骨故齒久不生也千金翼方溺坈中竹木主小兒齒不生正旦刮塗之即生外臺小品又方取雌鼠屎三七枚以一枚拭齒根處盡此止二十一日齒當生雌鼠屎頭尖是也千金同楊氏産乳方用三十枚仍云雌糞用兩頭丸者聖惠治小兒齒不生或因落不生方上取牛糞中黑豆二七枚小開去頭上皮以此豆頭開處注齒根上時時用之當效張渙云稟受腎氣不足者即髓不強蓋骨之所終而為髓髓不足不能充牙齒故齒不生宜香附丹方大香附子揀淨刮去皮沉香各一兩檳榔雌鼠糞燒灰乾蟾燒灰以上各半兩上件搗羅為末用羊髓四兩煮爛和成膏如黍米大每服十粒麝香湯下量兒大小加減發不生第七巢氏病源小兒頭髮不生候足少陰為腎之經其華在發小兒有稟性少陰之血氣不足即發疏薄不生亦有因頭瘡而禿落不生者皆由傷損其血血氣損少不能榮於發也千金治少小頭不生髮一物楸葉方楸葉搗取汁敷上立生千金翼取楸葉中心絞汁塗千金治小兒頭不生髮方燒鯽魚灰末以醬汁和敷之千金翼治發薄不生方先以醋泔清洗禿處以生布揩令火熱臘月豬脂並細研鐵生煎三沸塗之日三遍外臺深師療頭風烏啄膏生髮令速長而黑光潤方亦治小兒發不生烏啄莽草石南星草續斷皂莢去皮子熬澤蘭白朮各二兩辛夷人一兩柏葉切半升豬脂二升上十味以苦酒漬一宿以脂煎於東向灶釜中以葦薪煎之先置三堆土每一沸即下置一堆土候沸定卻上至三沸共置土堆上三畢成膏訖去滓置銅器中數北向屋溜從西端至第七溜下埋之三十日藥成小兒當刮頭日三塗大人數沐沐已塗之甚驗本草甑氣水主長毛髮以物於炊飲飯時承取沐頭令髮長密黑潤不能多得朝朝梳小兒頭漸漸覺有益好圖經曰小兒白禿發不生搗榆皮末苦酒調塗之聖惠治小兒腦疳頭髮連根作穗子脫落不生兼瘡白禿發不生者並宜用生髮神效黑豆膏方黑豆苣勝各三分訶梨勒皮一兩上件藥搗羅為末以水拌令勻內於竹筒中以亂髮塞口用煻灰白煨取油貯於瓷器中先以米泔皂莢湯洗頭拭乾塗之日再用十日發生聖惠又方葛根末豬脂羊脂各二兩上件藥入銚子內以慢火熬成膏收於瓷盒中每取一錢塗摩頭上日再用不過五七度效聖惠治小兒白禿不生髮燥痛宜用香薷煎方陳香薷二兩胡粉一兩豬脂半兩上件藥以水一大盞煎香薷取汁三分去滓入胡粉豬脂相和令勻塗於頭上日再用之聖惠治小兒頭禿不生髮苦癢蔓菁子散方上取蔓菁子搗為末以豬脂調塗於禿處佳聖惠又方上用貫衆燒灰細研以油調敷之聖惠又方上取麻子一升熬黑壓取脂敷頭上良聖惠又方上用鹽湯洗之生油和蒲葦灰敷之聖惠又方上用雁脂敷之佳嬰孺方治小兒發不生熊白上取塗之嬰孺又方桃葉上取汁塗嬰孺又曰煮雞子取七個剝去白熬令汁出取塗之張渙云稟受氣血不足不能榮於發故頭髮不生呼為疳病非也宜苣勝丹方苣勝一合別研當歸洗焙乾生乾地黃芍藥各一兩以上搗羅為細末胡粉半兩細研上件同研勻煉蜜和如黍米大每服十粒煎黑豆湯下兼化塗搽頭上無妨量兒大小加減發黃第八巢氏病源小兒頭髮黃候足少陰為腎之經其血氣華於發若血氣不足則不能潤悅於發故發黃也千金翼發黃方臘月豬膏和羊屎灰蒲灰等分敷之三日一為取黑止千金翼又方以醋煮大豆爛去豆煎令稠塗發千金又方熊脂塗髮梳之散頭床底伏地一食頃即出形盡當黑用之不過一升安師傳治小兒發黃極妙方破故紙不計多少銀石器中慢火炒丸上為細末用地黃汁煎成膏和為丸緑豆大每服十五二十丸鹽湯送下食前蟲胞第九謂胎中頭生瘡其瘡有蟲巢氏病源蟲胞候小兒初生頭即患瘡乃至遍身其瘡有蟲故因名蟲胞也固堤張先生論小兒蟲胞巢源徒有其證而後世不見其方大抵是小兒初生頭上便即有瘡迤邐侵淫生至身體又其瘡有蟲似從胞中有蟲也故謂之蟲胞治之之法服去蟯蟲等藥又洗貼頭瘡藥中藥蟲之藥可以為效矣子母祕録小兒頭身諸瘡有蟲燒雞卵殼研和豬脂敷之千金治小兒頭瘡方此以下數方皆能殺蟲胡粉一兩黃連二兩上二味末之洗瘡去痂拭乾敷之即瘥更發如前敷之千金又方胡粉連翹各一兩水銀半兩上三味以水煎連翹內胡粉水銀和丸敷之千金又方胡粉白松脂各二兩水銀一兩豬脂四兩上四味合煎去滓內水銀粉調敷之千金治小兒頭瘡苦參洗湯方苦參黃芩黃連黃柏甘草炙大黃芎藭各一兩蒺藜子三合上八味㕮咀以水六升煮取三升漬布搨瘡上日數遍安師傳治小兒蟲胞藥方百部雄黃黃柏上三味等分為末油調塗瘡上鶴節第十巢氏病源小兒鶴節候小兒稟生血氣不足即肌肉不充支節柴瘦骨節皆露如鶴之腳節也聖惠論夫腎臟者精神之所舍元氣之所繫若其氣強盛則骨髓滿溢故令肌體充盛之若氣血不足臟腑勞傷真氣不守邪氣所侵則腎氣虛弱骨髓枯竭不能榮華故令骨萎羸瘦也外臺祕要療小兒羸瘦惙惙常服不妨乳方甘草五兩炙上一件搗篩蜜丸如小豆大一歲兒服十丸日三盡即更合集驗方小兒稟氣不足真元怯弱肢體柴瘦補其本氣自然氣體充盛肌膚盈溢宜補腎地黃丸熟乾地黃八分焙稱山茱萸乾山藥各四錢澤瀉牡丹皮白茯苓去皮各三錢上為末煉蜜和丸如梧桐子大三歲以下二三丸溫水空心化下手拳不展第十一聖惠論夫小兒手拳者由在胞之時其母臟腑虛為風冷所乘兒生之後肝氣不足致筋脈攣縮不得伸展故令手拳不展也聖惠治小兒手拳不展是肝氣不足內傷風邪宜服薏苡仁散方薏苡仁三分秦艽去苗防風去蘆頭酸棗仁微炒甘草微炙赤銼以上各半兩當歸銼微炒桂心各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小分減不計時候服之聖惠治小兒手不展是風邪滯氣所客令榮衛不通宜服羚羊角散方羚羊角屑羌活五加皮白蘚皮桂心以上各一分麻黃半兩去節根甘草半分炙微赤銼上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小分減不計時候溫服聖惠又方麻黃半兩去節根桂心赤芍藥羌活細辛甘草炙微赤銼以上各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減溫服張渙治小兒受肝氣怯弱致筋脈攣縮兩手伸展無力宜薏苡丹方又治手拳不展當歸洗焙乾秦艽去苗薏苡仁湯浸去皮研細酸棗仁防風羌活上件各等分搗羅為細末煉蜜和如雞頭大每服一粒至二粒麝香荊芥湯化下不計時候腳拳不展第十二聖惠論夫小兒腳拳者由在胞之時其母臟腑內有積冷為風邪所乘兒生之後腎氣不足血氣未榮故令腳指拳縮不展也聖惠治小兒腳不展指拳縮宜服當歸散方當歸銼微炒麻黃去根節各半兩羌活酸棗仁微炒人參去蘆頭杜仲去粗皮微炙銼桂心上件藥搗粗羅為散每服一錢以水一小盞入生薑少許煎至五分去滓量兒大小乳食前分減服之聖惠治小兒腳拳不展筋急干細山茱萸散方山茱萸羌活薏苡仁桂心羚羊角屑當歸銼微炒甘草炙微赤銼黑豆炒熟白茯苓防風去蘆頭以上各一分生乾地黃麻黃去根節各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓每於乳食前量兒大小分減溫服聖惠治小兒腳指拳縮宜服生乾地黃丸方生乾地黃郁李仁湯浸去皮尖微炒各半兩牛膝去苗防風去蘆頭桂心海桐皮羌活白茯苓薏苡仁以上各一分上件藥搗羅為末煉蜜和丸如緑豆大每於乳食前以溫酒下七丸量兒大小加減服之張渙方小兒稟受腎氣不足者氣血未榮腳指拳縮無力不能伸展宜海桐皮散方治腳拳不展海桐皮牡丹皮當歸湯洗焙乾熟乾地黃牛膝酒浸焙乾以上各一兩補骨脂山茱萸上件搗羅為細末每服一錢水八分一盞入蔥白二寸煎至五分去滓溫服食前語吃第十三千金論小兒初出腹有連舌舌下有膜如石榴子中膈連其舌下後喜令兒言語不發不轉也可以摘斷之微有血出無害若血出不止可燒發作灰末敷之血便止小兒集驗方云小兒語吃本於心氣不足舌本無力故欲有言而舌不能運又有成於積習而然者是生而不吃一旦小兒相較而吃俗諺所謂學吃三日改吃三年是也心氣不足而舌本無力可調之以藥若其積習而成則初習之時令詳緩而語急改之為上陳藏器本草云鴝鵒主吃取炙食之小兒吃不過一枚瘥也臘月得者主老嗽明堂針灸經灸翳風二穴在耳後陷中按之引耳中手足少陽三會治耳聾口眼喎斜失缺脫頜口噤不開吃不能言頰腫牙車急痛通睛第十四龍木論論小兒通睛外障此眼初患時皆因失誤築打著頭面額角兼倒蹙撲下令小兒肝受驚風遂使眼目通睛宜服牛黃丸犀角飲子通頂石南散立效牛黃丸方牛黃白附子肉桂乾蠍芎藭石膏各一兩白芷藿香各半兩硃砂麝香各少許上為末煉蜜為丸梧桐子大臨臥薄荷湯下三丸乳母忌熱面豬肉等小兒化服亦得又犀角飲子方犀角一兩射干草龍膽各半兩鉤藤三分黃芩人參茯苓甘草炙遠志各一分上為末水一盞散一錢煎至五分食後去滓溫服通頂石南散石南一兩藜蘆三分瓜蒂五七個上為末每用一粳米許一日兩度通頂為妙安師傳治小兒通睛眼方竹葉四十九片黑豆四十九粒石決明研極細一錢上三物用水一盞半同煎至半盞遂旋隨兒大小與溫服少許令兩日盡再煎服之愍塞第十五巢氏病源小兒愍塞候人有稟性陰陽不和而心神愍塞者亦有因病而精采暗純皆由陰陽之氣不足致神識不分明也葛氏肘後方療人心孔愍塞多忘喜誤七月七日取蜘蛛網著領中勿令人知葛氏肘後又方丁酉日密自至市買遠志著巾角中還末服之勿令人知葛氏肘後又方丙午日取鱉甲著衣帶上良葛氏肘後又方取牛馬豬雞心肝干之末向日酒服方寸匕日三問一知十葛氏肘後孔子大聖智枕中方茯苓人參茯神各五分菖蒲二分遠志七分上為末水服方寸匕日三夜一服葛氏肘後又方章陸花陰乾一百日搗末暮水服方寸匕暮臥思念所欲知事即於眠中醒悟葛氏肘後又方上黨人參半斤七月七日麻谷一升合搗蒸候氣盡遍服一刀圭暮臥逆知未然之事行遲第十六巢氏病源小兒數歲不能行候小兒生自變蒸至於能語隨日數血脈骨節備成其臏骨成即能行骨是髓之所養若稟生血氣不足者即髓不充強故其骨不即成而數歲不能行聖惠論夫小兒行遲者是肝腎氣不足致骨氣虛弱筋脈無力故行遲也張渙論凡兒生至周歲三百六十日膝骨成乃能行近世小兒多因父母氣血虛弱故令胎氣不強骨氣軟弱筋脈無力不能行步嬰童寶鑑論小兒骨蒸肺脈寒長不能行顱囟經治小孩子自小傷抱腳纖細無力行立不得或骨熱疳勞肌肉消瘦柴胡飲子方柴胡鱉甲米醋塗炙知母桔梗枳殼麩炒去瓤元參升麻上件等分並細銼每日煎時三歲以下取藥半兩水五合煎二合去滓分兩服空心食前後各一服忌毒物飲後用澡浴方顱囟經澡浴方苦參茯苓皮蒼朮桑白皮白礬各半兩蔥白少許上銼細每浴時取一兩沸水二升浸藥後通溫與兒浴之避風於溫處妙千金治小兒數歲不行方取葬家未開戶盜食來以哺之日三便起行千金翼治小兒數歲不行方葬家未開戶時盜取其飯以哺之不過三日即行勿令人知之千金翼牛臍中毛主小兒久不行元和紀用經療小兒三歲不能行由虛弱受氣不足腰脊腳膝筋骨軟躄真五加皮上末之粥飲滴酒少許調一粟殼許日三服有風骨節不利者尤相宜經以四味飲黑散紫丸至聖散蜀脂飲麝香丸並此五加皮藥七方謂之育嬰七寶紫陽道士一名保子七聖至寶方專為一書者此方是也聖惠治小兒十歲以來血脈不流筋脈緩弱腳膝無力不能行步宜用生乾地黃丸方生乾地黃當歸銼微炒防風去蘆頭酸棗仁微炒赤茯苓黃耆銼芎藭羚羊角羌活甘草炙微赤銼桂心上件藥各等分搗羅為末煉蜜和丸如緑豆大食前以溫酒下十丸更量兒大小加減服之聖惠治小兒五六歲不能行者骨氣虛筋脈弱宜服益肝腎臟羚羊角丸方羚羊角屑虎脛骨塗醋炙令黃生乾地黃酸棗仁微炒白茯苓以上各半兩桂心防風去蘆頭當歸銼微炒黃耆以上各一分上件藥搗羅為末煉蜜和丸如緑豆大每於食前以溫酒破研五丸服之錢乙方同至服食法則云每服一皂子大兒大者加之仍云溫水化下日三四久服取效嬰孺方治小兒不生肌肉又三歲不能行往來寒熱如大癇數發不能灸刺用五參浴湯方大黃黃芩黃連沙參元參紫參苦參厚朴炙附子炮芍藥以上各二兩消石三兩丹參一兩雷丸五十個上以黍米淘汁三升同煎令三沸適寒溫浴了當臥汗出余汁更浴煎同上法甚者加豬蹄一具良更添水嬰孺方治小兒數歲不行方祭米飯上取墓未閉門時取米飯就墓門中哺兒二十日便行勿令人知張渙麝茸丹方治數歲不能行曾經大效麝香制研茄茸酥炙黃生乾地黃當歸洗焙乾黃耆銼虎脛骨銼塗酥炙黃上件各一兩搗羅為細末用羊髓四兩煮爛成膏如黍米大每服十粒摩沉香湯下乳食前日三服良方治小兒筋骨諸疾手足不隨不能行步運動左經丸草烏頭肉白者生去皮臍木鱉去殼別研白膠香五靈脂各三兩半當歸一兩斑蝥二百個去翅足少醋煮熟上為末用黑豆去皮生杵粉一斤醋煮糊為丸雞頭大每服一丸酒磨下筋骨疾但不曾針灸傷筋絡者四五丸必效豫鄰里胡生者一女子膝腕軟不能行立已數年生因遊淨因佛寺與僧言有一僧云能治出囊中丸十枚以四枚與生曰服此可瘥生如其言與服女子遂能立生再求藥於院僧曰非有愛也欲留以自備必欲之須合一料生與錢一千辭不受止留百錢後數日得藥並余余十餘悉歸之同院僧佐其理藥乃引得此方豫至嘉興有一里巷兒年十歲雙足不能行以一丸分三服服之盡四五丸遂得行自此大為人之所知其效甚著此藥通榮衛導經絡專治心腎肝三經服後小便少淋澀乃其驗也吉氏家傳五六歲不行方石斛牛膝鹿茸酥炙茯苓菟絲子各一分黃耆二分上件為末蜜丸桐子大每服四丸加減溫水下長沙醫者丁時發傳治大人小兒銼骨行步艱難腳足無力並皆治之續命丹防風乳香蔓荊子炒牛膝麻黃羚羊角屑酸棗仁草烏頭去皮沒藥白朮茯苓各一分天麻酒煮胡麻炒當歸續斷各半兩川烏頭去皮黃耆各四錢蒺藜半分上件以法制合為細末煉蜜為丹小彈子大每服一粒用蔥酒細嚼一日三五服用後洗藥服藥三日方洗草烏頭當歸地龍木鱉子紫貝草楸目蔥須荊芥各一兩上為末煎湯露腳指甲從上淋洗至下次用薰法柴胡草烏頭赤小豆吳茱萸羌活晚蠶沙各一兩上為末黑豆三升次用熱水泡少傾去黑豆入前件藥依舊煮盆盛熏銼閃處令出骨中汗或無力者亦依此食療白鴨卵小兒食之能使兒腳軟不行行多愛倒若鹽淹食之即宜人嬰童寶鑑灸法小兒五歲不能行灸足兩踝各三壯語遲第十七巢氏病源小兒四五歲不能語候人之五臟有五聲心之聲為言小兒四五歲不能言者由在胎時其母卒有驚怖內動於兒臟邪氣乘其心令心氣不和至四五歲不能言語也千金論小兒初出腹有連舌舌下有膜如石榴子中隔連其舌下後喜令兒言語不發不轉也可以爪摘斷之微有血出無害若出血不止可燒發作灰末敷之血便止也姚和衆云若不摘去兒啞張渙論心之聲為言若兒稍長合語而遲語由妊娠時其母因有驚怖內動於兒臟邪氣乘於心使心氣不足舌本無力故語遲也千金治小兒四五歲不語方赤小豆酒和敷舌下本草日華子云社壇余胙酒孩兒語遲以少許令吃聖惠治小兒心氣不足舌本無力令兒語遲芍藥散方赤芍藥一兩黃耆三分銼犀角屑檳榔甘草炙微赤銼以上各半兩上件藥搗粗羅為末每服一錢以水一小盞煎至五分去滓量兒大小不計時候分減溫服聖惠治小兒五六歲不語者為心氣不足舌本無力發轉不得亦云風冷傷於少陰之經是以舌難發於五音故至時不語菖蒲丸方菖蒲人參去蘆頭黃連去須以上各半兩麥門冬去心焙天門冬去心焙各一兩赤石脂丹參各三分上件藥搗羅為末煉蜜和丸如緑豆大每服以溫水研下五丸量兒大小不計時候加減服之錢乙治小兒心氣不足五六歲不能言菖蒲丸石菖蒲丹參各二錢天門冬去心焙稱麥門冬去心焙稱各一兩赤石脂三分人參半兩切去須焙上同為細末煉蜜丸緑豆大或麻子大溫水下五七丸至一二十丸不計時候日三四服久服取效又有病後腎虛不語者宜兼服錢氏地黃丸方在虛寒門中張渙菖蒲湯丹方治數歲不能語菖蒲一寸九節者遠志去心桂心以上各一兩酸棗仁黃耆人參去蘆黃連去須以上各半兩上件搗羅為細末煉蜜和如雞頭大每服一粒至二粒煎生薑湯下不拘時候張氏家傳治小兒不語方酸棗仁柏子仁各半兩郁李仁人參各一兩上為細末蜜煮糊為丸如梧桐子大小兒每服十丸若是氣虛之人只使郁李仁人參二件莊氏集腧穴灸法四五歲不語灸兩足踝上各三壯莊氏集腧穴灸法小兒至五六歲不語是心氣不足舌無力發轉難故也灸心腧三壯在第五椎下兩旁各一寸五分龜胸第十八聖惠論小兒龜胸者緣肺熱脹滿致使胸高如龜又云多食熱乳亦能致此也張渙論凡乳母乳兒常捏其宿乳夏常洗乳淨捏去熱乳若食兒飲熱乳損傷肺氣胸高脹滿令兒胸高如龜乃名龜胸聖惠治小兒龜胸肺熱壅滯心膈滿悶大黃丸方川大黃三分銼微炒天門冬去心焙百合杏仁湯洗去皮尖雙仁麩炒微黃木通桑白皮甜葶藶隔紙炒令紫色川朴硝各半兩上件藥搗羅為末煉蜜和丸如緑豆大不計時候以溫水研破五丸服量兒大小加減服之聖惠又方甜葶藶隔紙炒令紫色杏仁湯浸去皮尖雙仁麩炒微黃麻黃去蘆節川大黃銼微炒以上各半兩桂心一分上件藥搗羅為末煉蜜和丸如緑豆大不計時候以溫水研下五丸量兒大小臨時加減聖惠治小兒龜胸方上取龜尿隨多少摩胸骨上即瘥張渙治龜胸百合丹方桑根白皮木通川朴硝杏仁湯浸去皮尖川大黃天門冬去心各半兩百合一兩上件搗羅為細末煉蜜為丸如黍米大每服十粒米飲下量兒大小加減吉氏家傳龜胸方葶藶熬大黃各三分桂心一分麻黃二分去節上件為細末煉蜜為丸如梧桐子大每服十丸米飲下聖惠灸法龜胸緣肺熱脹滿攻胸膈所生又緣乳母食熱面五辛轉更胸起高出灸兩乳前各一寸半上兩行三骨罅間六處各二壯炷如小麥大春夏從下灸上秋冬從上灸下若不依此法則灸十而不能一二愈也莊氏集腧穴灸龜胸法取九家灰一料盛簸箕中令兒合面印胸跡於上於龜胸從上當中及兩邊令三姓人同下火各於灰上灸三壯棄灰於河流或水中龜背第十九聖惠論小兒龜背者由坐兒稍早為客風吹著脊骨風氣連於髓使背高如龜之狀也錢乙論龜背龜背者肺熱脹滿攻於胸膈即成龜胸又乳母多食五辛亦成又兒生下客風入骨逐於骨髓即成龜背治以龜尿點節骨取尿水法當蓮葉安龜在上後以鏡照之自尿出以物盛之張渙論嬰兒生後一百八十日始髇骨成方能獨坐若強令兒坐坐之太早即客風寒吹著兒背及脊至骨傳入於髓使背高如龜之狀乃日龜背宜松蕊丹方在後聖惠治小兒龜背麻黃丸方麻黃三分去根節桂心獨活防風去蘆頭赤芍藥川大黃銼微炒枳殼麩炒微黃去瓤松花以上各半兩上件搗羅為末煉蜜和丸如緑豆大每服以粥飲下五丸日三服量兒大小以意加減聖惠又方檳榔川大黃銼微炒各半兩桂心前胡去蘆頭防風去蘆頭赤芍藥獨活訶梨勒皮枳殼麩炒微黃去瓤松花乾用麻黃去根節以上各一分上件藥搗羅為末煉蜜丸如麻子大每服以粥飲下五丸日三服量兒大小以意加減聖惠又方龜尿摩背上瘥張渙松藥丹治小兒龜背松花洗焙乾枳殼麩炒去瓤防風去蘆頭獨活以上各一兩麻黃去根節川大黃炮前胡桂以上各半兩上件藥搗羅為細末煉蜜和如黍米大每服十粒粥飲下量兒大小加減吉氏家傳治龜背方大抵小兒此病為生時被客風吹拍著背風透於骨髓使背高如龜狀獨活丸方獨活防風桂心大黃各二分麻黃去節枳殼炙芍藥各一分上件為細末蜜丸如梧桐子大每服十丸米飲下聖惠灸法小兒龜背生時被客風拍著脊骨風達於髓所致灸肺腧心腧鬲腧各三壯炷如小麥大肺腧在第三椎下兩旁各一寸半心腧在第五椎下兩旁各一寸半鬲腧在第七椎下兩旁各一寸半
