聖惠又方上以新馬糞一塊絞取汁與服之聖惠治小兒胎寒軀啼溫中止痛雀糞丸方雄雀糞一分牛黃細研赤芍藥芎藭各半兩當歸一兩銼微炒上件藥搗羅為末煉蜜和丸如麻子大百日兒每服以乳汁下一丸日三服量兒大小以意加減服之聖惠治小兒胎寒虛脹滿不嗜食大便青夾白膿及欲發癇宜服調中丸方當歸半兩銼微炒細辛川椒去目及閉口者微炒去汗各一分附子一枚炮裂去皮臍狼毒半分炒黃巴豆二十枚去皮心出油盡杏仁十二枚湯浸去皮尖炒微黃豉四合炒微焦上件藥搗羅為末煉蜜和搗三五百杵以器盛之未滿百日兒以溫水下一丸如麻子大一二歲兒服兩丸量兒大小以意加減服之以利為度聖惠治小兒五十日以來胎寒腹痛微熱而驚聚唾弄舌軀啼上視此癇之候宜服此方豬腎一具薄切去脂膜當歸一兩銼微炒上只當歸一味粗搗二味相和以清酒一升煮至七合去滓每服取如杏仁大令兒咽之日三服夜一服量兒大小以意加減良聖惠又方衣中白魚二七枚上以薄熟絹包裹於兒腹上回轉摩之以瘥為度嬰孺治少小胎寒腹痛軀啼黃耆散方黃耆當歸芎乾薑各四分甘草三分黃芩六銖上為末二十日兒用乳汁和一胡豆大日三夜一五十日一小豆大百日二小豆大藥溫中無毒若無黃耆可缺也兒生便服使寒氣不得生亦不吐服之期年止服妙若寒氣㽲痛啼不可忍以水煮飲之如服理中丸法服藥補益之可數十倍節度無苦嬰孺治少小兒啼夜不安欲驚腹中風痛如中風發有時夜則甚如有鬼禍方當歸芍藥各一兩甘草半兩炙桂心白朮各二兩上切以水二升煮八合服一合日進三服量與服之一方無芍藥有五味子二兩嬰孺治少小軀啼掣縮吐哺當歸丸方當歸乾薑細辛附子各六銖狼毒二銖吳茱萸半合豉三合炒杏仁二十枚去皮炒上為末蜜丸黍米大小兒一丸日進三服大兒二丸量與之亦治胎寒嬰孺治小兒胎寒聚唾弄舌軀啼反張怒驚當歸散方黃耆細辛當歸黃芩龍骨桂心各二分芍藥四分上為末乳汁調服一大豆許日進三服夜一服張渙嬰兒在胎之時其母將養一切不如法及取涼飲冷過度冷氣入兒腹胃使胎氣不強致生下羸弱多病俯仰多啼名曰軀啼宜用養臟湯方川當歸一兩沉香丁香白朮桂心川芎各半兩上件搗羅為細末每服一錢水八分入生薑二片煎至四分去滓放溫時時滴口中劉氏家傳治小兒胎氣弱陰陽不調晝夜軀啼不已好乳香水中坐乳鉢研細稱沒藥別研木香薑黃各四錢木鱉子仁二十枚上先將後三味同為細末次研入上二味煉蜜和成劑收之每一歲兒可服半皂子大余以意加減煎鉤藤湯化下無時次用魏香散劉氏家傳魏香散蓬莪朮半兩濕紙裹煨真阿魏一錢上先用溫水化阿魏浸蓬莪朮一晝夜切焙乾為末每服半錢煎紫蘇米飲空心調下軀啼稍愈服開胃丸劉氏家傳開胃丸方白朮木香蓬莪朮人參當歸細銼炒各半兩白芍藥一分上為細末湯浸炊餅為丸如黍米大每服五七丸空心食前煎麝香湯下王氏手集白朮當歸煎丸方治胎寒腹痛遇夜啼叫身體軀張有如癇狀吐哯不止大便酸臭乳食雖多不生肌膚白朮當歸木香上等分為細末煉蜜為丸梧子大每服一丸煎木香湯化下夜啼第九巢氏病源小兒夜啼候小兒夜啼者臟冷故也夜陰氣盛與冷相搏則冷動冷動與臟氣相併或煩或痛故令小兒夜啼也然亦有犯觸禁忌亦令兒夜啼則可法術斷之也茅先生方小兒生下三臘以前有中夜啼其候屬陰遇起燈前後發啼至天明不住如見此候用抹唇膏方見本門中遇夜抹上下兩唇更用硃砂膏方見驚積門中夜更無啼止漢東王先生家寶小兒夜啼候諸書皆以驚啼為熱夜啼為寒獨漢東王先生以夜啼為熱必以諸啼通言之也孩兒夜啼者非是鬼神為祟蓋因胎熱伏心其母懷妊時或值熱月或好吃熱食流入胞中養後入於心臟故使熱入心而夜啼陰則與陽相刑熱則與陽相合腹中躁悶所以夜啼日屬陽夜屬陰日中不哭夜便多啼水鑑先生論云天蒼蒼天者上也人以心為帝王一身之主故呼為於蒼蒼者被外風所傷故云蒼蒼生其別物地王王地者土也脾屬中央戊己土故云地也王王者是盛也王音旺也此是脾臟熱盛小兒夜啼疏客堂心是神之舍亦呼為客堂疏者即是轉瀉錢乙論夜啼云脾臟冷而痛也當與溫中之藥及以法禳之花火膏主之方見本門中嬰童寶鑑論小兒夜啼為腹有痛處並有神祟故陰盛於夜而發也或驚亦夜啼惠眼觀證凡小兒生下一七至一百二十日或至三五歲才遇陰氣即便啼叫大種夜啼自有三說一心熱者夜啼只用硃砂膏及天竺黃散服之方並見重舌門中兼以燈花塗乳上與吃三五歲者宜以鮓湯丸療之方見急慢驚風門中二臍下痛者夜啼乃氣血所滯因而躁悶以烏梅散方見一切疳門中及槐角丸服之候有見燈愈啼者乃心氣熱極見燈不啼者乃臍下痛聊有所適亦外作驗也三無故而啼夜中面目青色不識人此邪氣所畜宜以符法及驚藥相兼服食有形證實者以鮓湯丸通利嬰童寶鑑小兒夜啼驚啼歌小兒生下有三啼一一從頭為說之邪熱在心心內躁忽然驚哭沒休時或因臟冷陰寒搏或是神祗鬼物隨夜裡不眠啼至曉夜啼根本各須知千金治小兒夜啼至明即安寐芎藭散方芎藭白朮炮防己各半兩上三味治下篩以乳和與兒服之量多少又以兒母手掩臍中亦以摩兒頭及脊若二十日兒未能服散者以乳汁和之服如麻子一丸兒大能服散者以意斟酌之千金治少小夜啼一物前胡丸方前胡隨多少搗末以蜜和丸如大豆服一丸日三服稍加至五六丸以瘥為度千金又方交道中土伏龍肝各一把上二味治下篩水和少許飲之陳藏器云灶中土乃四交道土千金又方取馬骨燒灰敷乳上飲兒啼即止千金治小兒夜啼不已醫所不治者方取狼屎中骨燒作灰末水服如黍米粒大二枚即定外臺云一枚仙人水鑑孩子夜啼方上取小孩兒頭髮三七寸燒灰湯調灌丁釘屋角並沒徹不如來取鉛中金黃丹少許熬令熟剪取發毛燒灌靈之外臺文仲隱居效方小兒夜啼不安此腹痛故至夜輒劇狀似鬼禍五味湯方五味子當歸芍藥白朮各四分甘草炙桂心各二分上六味切以水一升煎取五合分服之增減量之外臺古今録驗小兒夜啼如腹痛方䗪蟲熬令煙出芍藥炙芎藭熬各等分上三味搗末服如刀圭日三以乳服之嬰孺方以酒服外臺古今録驗又療小兒夜啼不止腹中痛宜以乳頭散方黃耆甘草炙當歸芍藥附子炮乾薑各等分上六味為散以乳頭飲兒丸可胡豆三丸大小量之嬰孺方以乳汁蜜丸子母祕録小兒夜啼胡粉水調三豆大日三服經驗方治小兒夜啼燈心燒灰塗乳與吃姚和衆治小兒夜啼取大蟲眼睛一隻為散以竹瀝調少許與吃聖惠治小兒夜啼不可禁止人參散方人參去蘆頭茯神甘草生銼川大黃銼碎微炒蛇黃牛黃細研犀角屑白芥子微炒上各等分搗細羅為散每服用水煎柳枝桃枝湯調下半錢頻服效量兒大小加減服之聖惠治小兒夜多啼不止胸滿氣脹膈中氣逆吐嘔腹痛芍藥散方赤芍藥桂心芎藭黃芩薯蕷上各等分搗細羅為散一月及百日兒每服一字粥飲調下半年至一歲兒服半錢連夜三五服隨兒大小以意加減服之神效聖惠治小兒夜啼壯熱驚懼石膏散方石膏一兩人參龍骨各半兩上件藥搗細羅為散每服一錢水一小盞煎至五分去滓量兒大小分減溫溫服之聖惠治小兒夜啼不止腹中痛宜以乳頭散方黃耆銼甘草炙微赤銼當歸銼微炒赤芍藥木香上各等分搗細羅為散每服取少許著乳頭上因兒吃乳服之聖惠治小兒腹痛夜啼牡丹丸方牡丹三分代赭石赤芍藥各半兩麝香一分細研上件藥搗羅為末都研令勻煉蜜和丸如麻子大每服以蜜湯研下三丸連夜四五服聖惠又方上以牛黃如小豆大乳汁化破服之博濟方消積滯順三焦利胸膈定氣刺攻疰脅腹脹痛女人血氣小兒夜啼多涎並宜服萬金丸舶上硫黃一分巴豆去皮稱半兩二味同以生絹袋子盛於漿水內用文武火煮一伏時令別研令細附子炮桔梗當歸陳橘去白各一分柴胡去苗青黛乾薑各半兩上為末以麵糊丸如小豆大每服二丸至三丸溫水下血氣醋湯下小兒夜啼溫水下一丸水瀉生熟水下血痢地榆湯下白痢乾薑湯下化涎生薑湯下一切氣煎生薑橘皮湯下茅先生方小兒夜啼抹唇膏蟬殼一個去足燈花兩朵硃砂少許上為末如小兒夜啼遇夜用雞冠血調藥抹兒子上下兩唇即止夾硃砂膏與服錢乙治夜啼花火膏方燈花一顆上取下塗乳上令兒吮乳錢乙當歸丸凡小兒夜啼者臟冷而腹痛也面青手冷不吮乳是也宜此方當歸去蘆頭切焙稱白芍藥人參切去頂各一分甘草炙半分桔梗陳橘皮不去白各一錢上為細末水煎半錢時時少與服又有熱痛亦啼叫不止夜發麵赤唇焦小便黃赤與三黃丸人參湯下三黃丸方見實熱門中張渙嬰兒臟寒稟氣怯弱或多囟解面色青白遇夜多啼甚者煩悶狀若神祟亦由觸犯禁忌所致此名曰夜啼宜用萬全散方沉香銼丁香人參去蘆頭五味子當歸洗焙乾各一兩赤芍藥白朮銼各半兩桂心一分上件搗羅為細末每服一錢用淡溫漿水一小盞煎至五分放溫時時滴兒口中立效嬰童寶鑑治小兒體熱夜啼不乳食紅桃散方天南星二個中心作蝸內入硃砂令滿用不咸之水調中心末塗縫上握地作坑安天南星在坑內灰蓋定以火燒色變取出為末全蠍半分末白附子大者一個膩粉一錢上件研令勻每服一字用薄荷金銀湯下萬全方治小兒夜啼及多腸痛至夜輒劇狀似鬼祟五味子散五味子當歸微炒赤芍藥白朮以上各半兩茯神陳橘皮去瓤桂心甘草炙微赤各一分上件搗羅為散每服一錢用水一小盞煎至五分量兒大小分減去滓溫服之劉氏家傳方小兒夜啼鬼箭末半錢硃砂一字上末之薄荷自然汁調下劉氏家傳又方生薑自然汁臨時塗背上心頭愈孔氏家傳治小兒夜啼歸魂散當歸不以多少為末一錢水六分煎四分溫服吉氏家傳諸驚啼夜啼硃砂膏硃砂人參白茯苓甘草各一錢腦麝各少許上末蜜為丸每服一塊如皂子大金銀薄荷湯下吉氏家傳治夜啼安神散應驚啼皆治犀角雄黃人參車前子各半兩茯苓一兩上五味為末每服一錢桃仁湯下吉氏家傳方睡洪散治小兒夜啼不住佛花三朵又名蔓陀羅花乳香硃砂各一分麝香上為細末每服半錢或一字紅酒調下穰厭法千金治夜啼方以妊娠時食飲偏所思者物哺兒即愈外臺必效小兒夜啼方以日未出時及日午時仰臥於臍上橫紋中屏氣以朱書作血字其夜即斷聲效陳藏器余云井口邊草主小兒夜啼著母臥席下勿令母知子母祕録治小兒夜啼甑帶懸戶上孟詵小兒夜啼取干牛糞如手大安臥席下勿令母知子母俱吉集驗方仙人杖小兒驚癇及夜啼安身伴睡良吉日華子云豬窠內有草治小兒夜啼安席下勿令母知日華子云烏雌雞翼治小兒夜啼安席下勿令母知聖惠方右臍下書田字瘥聖惠又方上取樹孔中草著戶上立止聖惠又方上以車輞盜安母臥床下勿令母知聖惠又方上取荒廢井中敗草懸戶上良聖惠又方上取牛糞灰安母臥床下勿令母知聖惠治小兒夜啼符法三道此符左右手貼此符臍中貼之貼房門上嬰孺治小兒夜啼法上令母脫去上衣只著中衣跪宅四角曰西方白帝東方青帝南方赤帝北方黑帝中央黃帝乞斷某甲夜啼荷恩之日奉還酒哺隨意所用還法安五畔置中庭四角故四角四畔中央一畔啓顙膽五帝說曰今日奉還隨意所吮願之劉氏家傳方小兒夜啼寫若以色見我以音聲求我是人行邪道不能見如來燒灰吞之男左一本女右一本嬰童寶鑑灸法小兒夜啼灸幼宮三壯又灸中指甲後一分萬全方灸小兒夜啼上燈啼雞鳴止者灸中指甲後一分中衝穴一壯炷如小麥大
