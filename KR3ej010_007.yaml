body:
  text: 卷第七蒸忤啼哭凡九門變蒸第一聖濟經慈幼篇形氣變成章曰天有精地有形形精相感而化生萬物故曰天地者萬物之父母也天為陽地為陰水為陰火為陽陰陽者血氣之男女水火者陰陽之證兆惟水火既濟血氣變革然後剛柔有體而形質立焉造化爐錘間不能外是以成物茲嬰孺始生有變蒸之理也原受氣之初由胚胎而有血脈由血脈而成形體由形體而能動由動而筋骨立以至毛髮生而臟腑具穀氣入胃而百神備是乃具體未形有常不變之時也若夫萌區有狀留動而生血脈未榮五臟未固尚資陰陽之氣水火之齊甄陶以成非道之自然以變為常者哉兒生三十二日一變六十四日再變變且蒸變者上氣蒸者體熱上氣則以五臟改易氣皆上朝臟莫高於肺而肺主氣故爾體熱則以血脈敷榮陽方外固陽在外為陰之使故爾積二百八十八日九變三百二十日十變且蒸是之謂小蒸畢後六十四日一大蒸積二百五十六日大蒸畢凡五百七十六日變蒸數足形氣成就每經一變則情態異常蓋天有五行御五位以生寒暑燥濕風人有五臟化五氣以生喜怒悲憂恐七情之生得非成於變蒸之候耶其候有輕重其時有遠近輕者體熱微汗似有驚候耳與後陰所會皆冷重者壯熱而脈亂或汗或否此其候也平者五日而衰遠者十日而衰先期五日後之五日為十日之中熱乃除此其時也當是時務致和平不欲驚擾灸刺湯劑皆非所宜或先變而熱作或後蒸而未解則治之當如成法或變蒸之中加以時行溫病與夫非變而得天行者其診大率相類惟耳及後陰所會皆熱為異爾學者可不審焉巢氏病源變蒸者以長血氣也變者上氣蒸者體熱變蒸有輕有重其輕者體熱而微驚耳冷髖亦冷上唇頭白疣起如死魚目珠子微汗出而近者五日而歇遠者八九日乃歇其重者體壯熱而脈亂或汗或不汗不欲食食輒吐哯無所苦也變蒸之時目白睛微赤黑睛微白千金又曰目白者重赤黑者微亦無所苦蒸畢自明瞭矣先變五日後蒸五日為十日之中熱乃除變蒸之時不欲驚動勿令旁邊多人變蒸或早或晚依時如法者少也初變之時或熱甚者違日數不歇審計日數必是變蒸服黑散發汗熱不止者服紫雙丸如小瘥便止勿復服千金翼云自當有餘熱變蒸盡乃除耳其變蒸之時遇寒加之則寒熱交爭腹痛夭矯啼不止者尉之則愈變蒸與溫壯傷寒相似若非變蒸身熱耳熱髖亦熱此乃為他病可為余治審是變蒸不得為余治其變日數從初生至三十二日一變六十四日再變變且蒸九十六日三變變者丹孔出而泄也至一百二十八日四變變且蒸一百六十日五變一百九十二日六變變且蒸二百二十四日七變二百五十六日八變變且蒸二百八十八日九變三百二十日十變變且蒸積三百二十日小蒸畢後六十四日大蒸蒸後六十四日復大蒸蒸後一百二十八日復大蒸積五百七十六日大小蒸畢也顱囟經凡孩子自生但任陰陽推移即每六十日一度變蒸此骨節長來四肢發熱或不下食乳遇如此之時上唇有珠子如粟粒大此呼為變蒸珠子以後方退熱飲子療之不宜別與方藥顱囟經以六十日為一變巢氏病源以三十二日為一變以有不同故兼存之葛氏肘後云凡小兒自生三十二日一變再變為一蒸凡十變五小蒸又有三大蒸凡五百七十六日變蒸畢乃成人其變蒸之候身熱脈亂汗出崔氏云脈亂汗出目睛不明微似欲驚及不乳哺數驚不乳哺上唇頭小白泡起如珠子耳冷尻冷此其證也單變小微兼蒸小劇平蒸五日或七日九日慎不可療若或大熱不已則與少紫丸微下葛氏肘後又云若於變蒸中加以時行溫病其證相似惟耳及尻通熱口上無白泡耳當先服黑散發汗汗出以粉敷之瘥若不盡除即以紫丸下之千金論凡小兒自生三十二日一變再變為一蒸凡十變而五小蒸又三大蒸積五百七十六日大小蒸都畢乃成人小兒所以變蒸者是榮其血脈改其五臟故一變竟輒覺情態有異單變小微兼蒸小劇凡蒸平者五日而衰遠者十日而衰先期五日後之五日為十日之中熱乃除耳兒生三十二日一變二十九日先期而熱便治之如法至三十六七日蒸乃畢耳恐不解了故重說之變蒸之日千金要翼皆與葛氏肘後諸家並並同此其中語有小異者故又載之且兒變蒸或早或晚不如法者多又初變之時或熱甚者違日數不歇審計變蒸之日當其時有熱微驚慎不可治及灸刺但和解之若良久熱不可已少與紫丸微下熱歇便止若於變蒸之中加以時行溫病或非變蒸時而得時行者其診皆相似惟耳及尻通熱口上無白泡耳當先服黑散以發其汗汗出溫粉粉之熱當歇便就瘥若猶不都除乃與紫丸下之千金又法凡兒生三十二日始變變者身熱也至六十四日再變變且蒸其狀臥端正也至九十六日三變定者候丹孔出而泄至一百二十八日四變變且蒸以能咳笑也至一百六十日五變以成機關也至一百九十二日六變變且蒸五機成也至二百二十四日七變以能匍匐語也至二百五十六日八變變且蒸以知欲學語也至二百八十八日九變已亭亭然也凡小兒生至二百八十八日九變四蒸也當其變之日慎不可妄治之則加其疾變且蒸者是兒送迎月也蒸者甚熱而脈亂汗出是也近者五日歇遠者八九日歇當是蒸上不可灸刺妄治之也千金翼兒身壯熱而耳冷髖亦冷者即是蒸候慎勿治之兒身熱髖耳亦熱者病也乃須治之千餘敘變蒸議論皆同獨用紫丸黑散敘得甚明又云變蒸中病乃須治聖惠小兒變蒸都畢凡五百七十六日乃成人血脈骨木皆堅牢也茅先生方小兒有變蒸傷寒候身壯熱唇尖上起白珠或熱瀉或呻吟或虛驚此候小兒生下便有變蒸而長意志乃四十九日一變而長骨肉此候有之所治者只用鎮心丸方見一切驚門中夾勻氣散方見胃氣不和門中與服自平和也不服藥也安樂此又云四十九日一變與前亦異漢東王先生家寶變蒸候宜用神仙黑散子三二服並調胃氣觀音散三二服方見胃氣不和門中錢乙論變蒸云小兒在母腹中乃生骨氣五臟六腑成而未全自生之後即長骨脈五臟六腑之神智也變者易也巢源云上多變氣又生變蒸者自內而長自下而上又身熱故以生之日後三十二日一變變每畢即情性有異於前何者長生腑臟智意故也何謂三十二日長骨添精神人有三百六十五骨除手足中四十五碎骨外有三百二十數自生下骨一日十段而上之十日百段而三十二日計三百二十段為一變亦曰一蒸骨之餘氣自腦分入齦中作三十二齒而齒牙有不及三十二數者由變不足其常也或二十八日即至長二十八齒以下仿此但不過三十二之數也凡一周遍乃發虛熱諸病如是十周則小蒸畢也計三百二十日生骨氣乃全而未壯也故初三十二日一變生腎志六十四日再變生膀胱其發耳與骫冷腎與膀胱俱主於水水數一故先變生之九十六日三變生心喜一百二十八日四變生小腸其發汗出而微驚心為火數二一百六十日五變生肝及哭一百九十二日六變生膽其發目不開而赤肝主木木數三二百二十四日七變生肺聲二百五十六日八變生大腸其髮膚熱而汗或不汗肺屬金數四二百八十八日九變生脾智三百二十日十變生胃其發不食腸痛而吐乳此後乃齒生能言知喜怒故云始全也太倉云氣入四肢長碎骨於十變後六十四日長其經脈手足受血故能持物足立能行也經云變且蒸謂蒸畢而足一歲之日也師曰不汗而熱者發其汗大吐者微瀉不可余治是以小兒須變蒸脫齒者如花之易苗所謂不及三十二齒由變之不及齒當與變日相合也年壯而視齒方明祕要指迷論凡小兒才生變蒸後多有身熱微瀉青黃者不可用藥止住須溫暖藥勻氣如藥力重即變成慢脾風也五關貫真珠囊小兒生下八蒸之候夫八蒸者每四十五日一蒸變變各有所屬重者五日而息也變蒸日數稍異故並載之一蒸肝生魂肝為尚書未蒸時魂未定故兒目瞳子昏蒸後肝生魂定令目童子光明二蒸肺生魄肺為丞相未蒸時魄未定故兒未能嚏嗽肺上通於鼻蒸後能令嚏嗽三蒸心生神心為帝王未蒸前神未定故兒未言語心通於舌蒸後令兒能語笑也四蒸脾生智脾為大夫藏智故未蒸前兒未能舉動蒸後令兒舉動任意也五蒸腎生精志腎為列女外應於耳故蒸後能令兒骨髓氣通流也六蒸筋脈伸故蒸後筋脈通行九竅津液轉流令兒能立也七蒸者骨神定氣力漸加故蒸後能令兒舉腳行也八蒸者呼吸無有停息以正一萬三千五百息也凡呼出心與肺吸入腎與肝故令兒呼吸有數血脈通流五十周也漢東王先生家寶小兒變蒸候歌變蒸之候若為程為程者是有數也三十二日為一度變矣一一從頭別有名第一看兒發毛立口唇尖上白珠生頭髮立而不伏又唇上有白泡子起也三兩日間起寒熱忽然發卻自住是也忽然睡里足虛驚睡中哭而不覺也或則遍身流盜汗此是氣血長不逮流於毛孔中出或然微痢腹中鳴腹中似瀉水之聲此是變實其腸胃而作聲或則因悶皮膚急忽悶皮膚急及氣急少時卻醒忽然吐逆氣交橫忽然要吐哯氣急蓋因長其氣血不覺被氣節之即吐哯不久自住也七日之中驚夢裡生不七日忽睡中驚叫人多疑床非也此是長其神氣故童子能喜笑矣但看蒸變辨其名變蒸者則是長其血氣長不逮後相滯故發熱也或是生筋骨或是正其五臟也智者將心信醫藥下愚不曉逐邪行雖然變蒸得其候還須用藥保長生亦須服和氣丸散及不可當風洗浴也長沙醫者毛彬傳療小兒初生變蒸候歌變蒸方長是嬰兒一出胎來數可推未到期年蒸八變四十九日一回期第一肝蒸生於魂雙眼雖開瞳子昏三兩日間微壯熱定目看人似欲言第二變蒸生於魄噴嚏咳嗽開胸膈見人共語笑喃喃暗裡時時長筋脈第三變蒸生於神漸能識母畏傍人血脈初生學及覆肌肉皮膚漸漸勻第四脾蒸生於智尻骨初成獨坐戲三焦胃管漸開張乳哺甘甜不肯離第五腎蒸生精志氣候相通轉流利掌骨初成學匍匐反覆捉搦能隨意第六筋骨蒸初成九竅津液皆相應時時放手亭亭立氣力加添日漸勝第七膝踝骨初成顏色紅光遍體榮舉腳抬肩便移步嘻嘻學語百般聲第八呼吸定精神風血氣脈自回輪八蒸之候細分別一一從頭為列名七日之中有乖治但看外證辨其名第一看兒毛髮立口唇尖起白珠生三兩日中寒熱起忽然睡里作虛驚或即遍身流盜汗或乃微利腹中鳴或即脊膂皮膚急忽乃嘔逆氣交橫或則困悶通身軟忽然啼哭沒心情重者不過一七日輕者三朝便得平上古聖賢制方論還須服藥覓延生葛氏肘後黑散方麻黃二兩大黃一兩杏仁二分上件並搗為散將杏仁熬別研如脂乃內散同搗令調和聖惠並炒令黑都研細漢東王先生並燒灰存性密盛器中勿令見風一月兒服如小豆一枚乳汁和咽之拘令得汗勿使見風百日兒服如棗核量大小與之佳千金要翼分兩同元和紀用經大黃只半兩千金要三味先搗麻黃大黃為散別研杏仁如脂乃細細內散又搗令調和內密器中又千金要翼黑散治小兒蒸變挾時行溫病或非變蒸時而得時行元和紀用經自四味飲以下黑散紫丸至聖散五加皮治不能行蜀脂飲麝香丸七分謂之育嬰七寶紫陽道士一名保子七聖至寶方專為一書者此方是也葛氏肘後紫丸方代赭赤石脂各一兩巴豆四十枚杏仁五十枚上件代赭赤石脂先搗細篩巴豆四十枚去心皮熬千金翼元和紀用經並三十枚又紀用經以二十枚洗沙皮製十個生用杏仁五十枚去皮令碎研如脂元和紀用經用四七個合三物搗三千杵自相看若硬加少蜜更搗密器中盛三十日兒服如麻子一丸與少乳汁令下良久復與少乳勿令多宜至日中當小下熱若不盡明旦更服一丸百日兒如小豆大小以此加減若小兒夏月多熱往往發疾此丸無所不治三二十日與一服殊佳如真代赭不可求用左顧牡蠣代之千金要翼紫丸治小兒變蒸發熱不解並挾傷寒溫壯汗後熱不歇及腹中有痰癖哺乳不進乳則吐哯食癇先寒後熱此亦元和紀用經育嬰七寶紫陽道士保子七聖方也又千金翼謂小兒氣盛有病但下之必無所損若不時下則將成病固難治矣聖惠治小兒變蒸經時不止挾熱心煩啼叫無歇骨熱面黃柴胡散方柴胡去苗甘草炙微赤銼人參去蘆頭元參各一兩龍膽半兩去蘆頭麥門冬一兩半去心焙上件藥搗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小加減服之嬰孺方治小兒變蒸壯熱不止代赭一兩半杏仁三十個別入研上為末拌和勻以黃蠟丸之二十日兒服黑散汗出後更服此紫丸子黍大一丸訖少乳乳之令藥得下兩食久復乳之勿過飽平旦一服日中藥勢盡日西久時復增丸至雞鳴時若不瘥復與一丸若愈即止三十日兒胡豆大一丸若不利壯熱者加半丸以利下為度又方云紫丸服之當利而全出若不出及不全者為病未盡更須服之有熱服紫丸子無熱有寒者勤服當歸散若黃耆散變蒸後微熱者可與除熱黃芩湯漢東王先生服黑散候有微汗渾身稍涼即用香粉散方蚌粉末拘多少研令極細水飛過麝香少許研細上為末用綿裹摻之張渙治嬰兒周晬內時或體熱眠臥不寧乳哺不調目睛不明或瘥或作三十二日一變六十四日再變甚者微驚乃長血氣名曰變蒸候過周晬漸除切不可亂投湯藥宜用清心湯方人參半兩去蘆頭麻黃去節川大黃麥門冬去心甘草炙犀角屑各一分上件搗羅為細末每服一錢水八分入杏仁一個去尖拍破同煎至四分去滓放溫時時與服張渙紫砂丹方治變蒸身熱不已代赭研細水浸一宿澄去清水焙乾當歸洗焙乾各半兩硃砂細研水飛木香人參去蘆頭各一分上件為細末與代赭石同研勻入杏仁十個去皮尖巴豆五個去心膜出油同研勻入麝香半錢拌勻滴水和如針頭大每服三粒至五粒煎荊芥湯下乳後吉氏家傳治傷寒變蒸候方當歸一錢大黃炒北黃芩川烏頭煮各一分防風半兩上件為細末每服一錢水半盞入荊芥煎四分溫服長沙醫者丁時發傳治變蒸候方變蒸日數甚分明或瀉槐黃又夾驚發熱喜啼多不乳急須勻氣便安寧勻氣散香附子甘草炙各一分天仙藤人參橘皮藿香各一錢上件為末每服半錢用米飲調下中客忤第二巢氏病源小兒中客忤候小兒中客忤者是小兒神氣軟弱忽有非常之物或未經識見之人觸之與兒神氣相忤而發病謂之客忤也亦名中客又名中人其狀吐下青黃白色水穀解離腹痛反倒天矯面變易五色其狀似癇但眼不上插耳其脈弦急數者是也若失時不治久則難治若乳母飲酒過度醉及房勞喘後乳香者最劇能殺兒也其脈急數者宜與龍膽湯下之加人參當歸各如龍膽汁分等多少也葛氏肘後論小兒病發身軟時醒者謂之癇身強直反張不醒者謂之痙凡中客忤之病類皆吐下青黃白色其候似癇但眼不上下接耳其痢水穀解離是也千金論少小所以有客忤病者是外人來氣息忤之一名中人是為客忤也雖是家人或別房異戶雖是乳母及父母或從外還衣服經履鬼神粗惡暴氣或牛馬之氣皆為忤也執作喘息乳氣未定者皆為客忤凡小兒衣布帛綿中不得有頭髮履中亦爾也白衣青帶青衣白帶皆令中忤凡非常人及諸物從外來亦驚小兒致病欲防之法諸有從外來人及異物入戶當將兒避之勿令見也若不避者燒牛屎令常有煙氣置戶前則善小兒中客為病者無時不有此病也而秋初一切小兒皆病者豈是一切小兒悉中客邪夫小兒所以春冬少病秋夏多病者秋夏小兒陽氣在外血脈嫩弱秋初夏末晨夕時有暴冷小兒嫩弱其外則易傷暴冷折其陽陽結則壯熱胃冷則下痢是故夏末秋初小兒多壯熱而下痢也未必悉是中客及鬾也若治少小法夏末秋初常宜候天氣溫涼也有暴寒卒冷者其少小則多患壯熱而下痢也慎不可先下之皆先殺毒後下之耳小兒中客急視其口中懸癰左右當有青黑腫脈核如麻豆大或赤或白或青如此便宜用針速刺漬去之亦可爪摘決之並以綿纏叉頭拭去血也少小中客之病吐下青黃赤白汁腹中痛及反倒偃側喘似癇狀但目不上插少睡耳面變五色其脈弦急若失時不治小久則難治矣欲療之方用豉數合水拌令濕搗熟丸如雞子大以摩兒囟上手足心各五六遍畢以丸摩兒心及臍上下行轉摩之食頃破視其中當有細毛即擲丸道中痛即止肘後亦收此豉方作小品方然不若如此之詳茅先生客忤形候眼翻騰腰背強直項硬手足硬返身歸後如角弓面黑色此候因兒子生下都不與出屋被人相請乳母有檐夫扛兜身帶汗氣或有腋氣或牛馬氣兒子吸著且奈兒子五臟血氣未就嬌嫩遂吸著其氣乃積在心臟日往月來被風乘虛而發此之候嬰童寶鑑小兒客忤歌客忤多因人物沖更遭鬼氣亦相同青黃吐出並白沫水穀開張腹又疼面色五般時變動脈弦急數不幹風一同癇吊多驚證兩目依常異有風千金治少小中客忤強項欲死方取衣中白魚十枚為末以敷母乳頭上令小兒飲之入咽立愈一方二枚著兒母手掩兒臍中兒吐下愈亦以摩兒項及脊強處千金治少小客忤二物黃土塗頭方灶中黃土蚯蚓屎等分搗合和水和如雞子黃大塗兒頭上及五心良一方云雞子青和如泥千金又方吞麝香如豆大許立愈聖惠研如粉清水調一字廣利方治客忤用麝香調塗兒口千金治少小犯客忤發作有時者方以母月衣覆兒上大良千金翼治小兒新生客忤中惡發癇發熱乳哺不消中風反折口吐舌並疰忤面青目上插腹滿癲癇羸瘦疰及三歲不行雙丸方上麝香牛黃黃連宣州者各二兩丹砂特生礬石燒附子炮去皮雄黃桂心烏賊魚骨各一兩巴豆六十枚去皮心熬赤頭蜈蚣一枚熬聖惠與此方同獨麝香牛黃減半蜈蚣加半上一十一味各異搗篩別研巴豆如膏乃納諸藥煉蜜和搗三千杵密壅之勿泄氣生十日二十日至一月日服如黍米大二丸四十日至百日服麻子大二丸一歲以上以意增加有兒雖小而病重者增大其丸不必依此丸小兒病客忤率多耐藥服藥當汗出若汗不出者不瘥也一日一夜四五服以汗出為瘥凡候兒中人者為人乳子未了而有子者亦使兒客忤口中銜血即月客也若有此者當尋服此藥即兒可全也口聚唾腹起熱者當灸臍中不過二七壯並勤服此藥若喜失子者産訖兒墮落地聲未絶便即以手指刮舌上當得所銜血如韭葉者便以藥二丸如粟米大服之作七日乃止無不痊也若無赤頭蜈蚣赤足者亦得三枚皆斷取前兩節其後分不可用也外臺崔氏又療兒若卒客忤中人吐不下乳哺面青脈變弦急者以浴之方取錢七十文以水三斗煮令有味適寒溫浴兒良聖惠用青銅錢一百二十文子母祕録治小兒卒客忤死燒桔梗末三錢匕飲服集驗主小兒客忤墨搗篩和水溫服半錢匕好墨入藥粗者不堪食療治小兒客忤熊骨煮湯浴之日華子治小兒客忤烏雌雞糞炒服元和紀用經療小兒客忤搗菖蒲汁內口中又生艾汁內口中又磨刀水三四滴妙聖惠治小兒血脈盛實寒熱作時四肢驚掣發熱大吐兒若已能進哺中食不消壯熱及變蒸不解中客忤人鬼氣並諸癇等並宜服龍膽散方龍膽去蘆頭鉤藤柴胡去苗甘草炙微赤銼赤茯苓黃芩桔梗去蘆頭赤芍藥川大黃銼碎微炒各一分蜣蜋三枚去翅足微炒上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小分減溫服日四五服聖惠闢小兒諸般驚叫顫瘛瘲從初養下便與乳母帶闢諸驚忤之氣雄黃丸方雄黃煎香白膠香降真香末鬼臼去毛為末各一兩虎頭骨微炙猴孫頭骨微炙各三分麝香白龍腦乳香各一分大蛇頭一枚炙上件藥都研令細用熟棗肉和丸如彈子大初長兒前先燒一丸次用絲絹袋子帶一丸於身上闢一切驚忤之氣聖惠治小兒中客忤體熱方白龍骨葛根銼各一分牛黃細研半兩上件藥搗細羅為散每服以溫水調下半錢日三四服聖惠治小兒客忤驚啼壯熱犀角散方犀角屑麥門冬去心焙鉤藤硃砂細研以上各一分牛黃細研半分麝香三豆大細研上件藥搗細羅為散入研了藥令勻每服不計時候以金銀溫湯調下半錢聖惠治小兒客忤驚啼叫方灶中黃土二兩雞子一枚去殼上件藥相和入少許水調先以桃柳湯浴兒後將此藥塗五心及頂門上聖惠又方豬乳一粟殼牛黃末一字上件藥相和漸漸滴兒中口佳聖惠治小兒卒客忤軀啼腹堅滿雀糞丸方雀糞一兩當歸半兩銼微炒上件藥搗羅為末煉蜜和丸如麻子大五十日兒每服一丸以乳汁下日三四服更量兒大小以意加減服之聖惠治小兒中客忤欲死心腹痛雄黃散方雄黃麝香上件各等分都研細為散周晬兒每服一字用刺雞冠血調灌之空心午後各一服更隨兒大小臨時以意加減嬰孺方云無麝香以牛黃代之聖惠治小兒卒中客忤方銅照子鼻上燒令赤著少許酒中淬過少少與兒服之聖惠治小兒客忤壯熱浴方白芷根苗苦參上件藥等分粗搗為散用清漿水煎入鹽少許以浴兒浴了用粉摩之佳聖惠又方上取李葉煎湯去滓溫洗浴兒瘥聖惠又方新馬糞一枚上水絞取汁與兒時時服少許聖惠治小兒客忤欲狼狽方上抱兒於廁前取屎草燒灰為末水調服少許即愈聖惠治小兒卒中客忤禁符上件符並朱書額上貼之談氏殊聖治客忤方忽爾連連哭不休渾身壯熱脈如鉤驚啼不得冤神鬼客忤傷心不自由犀角雄黃相共搗桃符煎水看稀稠人參茯苓車前子丸吃三服請不憂安神丸生犀末半錢雄黃研人參茯苓車前子各一分上為末取桃白皮一兩桃符一兩二味以水三升同煎至一升去滓更煎成膏和前藥丸如麻子大每服三丸芍藥湯下談氏殊聖又治客忤方小兒哽氣築心連喘息多愁胃口涎唯有此疾宜早治為緣客忤氣相煎看看病狀醫難效取取真珠散半錢龍腦生犀香附子小兒餐了保身安真珠散真珠末四錢生犀末二錢香附子末一錢龍腦半字上同研每服一字桃仁湯調下乳母忌生冷油膩一切毒物半月嬰孺方治中客忤人吐下面青黃脈弦急者上取水三斗煎令有味浴兒瘥嬰孺方治小兒客忤吐痢白扇湯方白扇牡蠣各四分蜀漆二分附子一分炮上以水二升煮四合適溫冷晚服一合湯方嬰孺方治小兒少小客忤痛及氣滿常痛麝香湯方麝香大豆大二顆半夏洗黃耆各一兩甘草炙乾薑桂心各半兩上水三升煮八合下麝香末再煎一小沸先食服三合嬰孺方治少小兒客忤丸方蠅屎秋夏預於蠅多處收丸之上小兒一服一黍大大兒麻子大一丸大良嬰孺方治小兒中忤一味餅方灶黃煻灰火一升上以醋溲入疏絹袋中按作餅狀摩兒胸上灰冷去之破看灰中有人毛牛馬豬羊等毛皆有形似以毛別之灰置婦人腳上先試之乃可置兒胸上仍數搖動勿令太熱張渙嬰兒血氣未實皆神氣軟弱除父母及乳養之常照管外不可令見生人及抱往別房異戶及不可見牛馬獸畜等其父母家人之類自外及寅夜行歸家亦不可見兒恐經履鬼神粗惡暴氣若犯人令兒吐下青黃赤白水穀解離其狀似發癇者但眼不上戴脈不弦急名曰客忤宜用辟邪膏方凡斷乳小兒亦有中惡卒暴者亦宜服此藥立至蘇省降真香銼白膠香沉香虎骨微炙鬼臼去毛草龍膽人參去蘆頭白茯苓上件各半兩搗羅為細末次入水磨雄黃半兩細研水飛次研麝香一錢都拌勻煉蜜和如雞頭大每服一粒煎乳香湯化下及別丸如彈子大用絲絹袋子盛令兒衣服上帶之仍臥內常燒神妙劉氏家傳方小兒客忤曉夜啼叫不已菩薩退和紙燒通赤以瓷甌蓋勿失性研入麝香少許濃煎金銀薄荷湯調下或未能飲藥只調塗乳頭上或乳汁調下嬰孺方治小兒客忤驚啼以爪爪兒手大指甲後肉際汁出即止嬰孺灸法治客忤吐不止灸手心主間使大都隱白三陰交各三炷嬰孺又灸法大椎下第五節及灸足跟後黃白肉際二七炷立瘥嬰孺載葛氏灸法小兒中客忤惡氣灸兒臍上下左右各半寸及灸兒鳩尾下一寸凡五處各三十壯都主兒百疾嬰童寶鑑小兒客忤灸九角在耳尖上入髮際又灸陽門在當陽下入髮際中人忤第三犯人噤附千金論中客忤與中人中馬忤皆通而為一治法亦多同然不能無少異爾葛氏肘後治小兒中人吐下黃水用水一斗煮錢十四文以浴之葛氏又法取水和粉並熟艾各為丸雞子大摩小兒五心良久擘毛出瘥葛氏肘後徐王神效方治小兒吐乳四肢皆軟謂之中人忤桂心三兩水二升煮取一升半分三服又將濃滓塗五心常令溫之嬰孺方治中人忤桂心二兩水三升煮一升半千金治卒中人忤方剪取驢前膊胛上旋毛大如彈子以乳汁煎之令毛消藥成著乳頭上飲之下喉即愈千金又方燒母衣帶三寸併發合乳汁服之千金又方取牛口沫敷乳頭飲之千金又方取牛鼻津服之千金治小兒寒熱及惡氣中人一物豬蹄散方豬後腳懸蹄燒末搗篩以乳汁飲一撮立效千金治少小見人來卒不佳腹中作聲者二物燒發散方用向來者人囟上發十莖斷兒衣帶少許合燒灰細末和乳飲兒即愈千金治小兒中人忤軀啼面青腹強者一物豬通浴方猳豬通二升以熱湯灌之適寒溫浴兒食醫心鑑小兒寒熱惡氣中人亦以濕豉為丸如客忤法嬰孺方治小兒中人忤方上取生肫暖湯浴肫取汁浴兒立瘥嬰孺又方馬通上燒為灰酒三升煮沸浴兒嬰孺方治小兒生五六日卒得口牽不能乳有候中人者啼聲不出死不治覺晚者死覺早者氣未入臟腑又微引乳者宜此湯治之甘草炙龍骨茯苓牡蠣蝦赤乾地黃黃芩各一分當歸桂心各半兩以上切之上取淡竹瀝一升煮取五合絞去滓下白蜜一合服之消息節之嬰孺治小兒暴驚啼絶死或外人入戶邪隨來或病人見其病名滔衆醫不治千金湯方蜀漆左顧牡蠣煅赤各一分上以漿水一升煮五合溫服一合噤不能咽含之令下即瘥附茅先生方小兒生下犯人噤候面青黑合臍眼閉吐逆不下乳此候因生下來不免外人看問或有腋氣或因婦人月假不淨或外人帶邪神觸著生下來大故乳哺使觸異氣之物氣血未就又被風邪擊致此所治者先用硃砂膏方見驚積門下乳上吮下後用鎮心丸方見一切驚門中與服即愈如見不下乳眼視肚硬死候大凡初生下兒子家中人不見不可便與外人入房看問人家各有神祗又恐婦人腋氣及月假不淨觸著恐中客忤此即是養兒之法中馬忤第四千金論曰凡諸乘馬行得馬汗氣臭未盥洗易衣裝而便向兒邊令兒中馬客忤兒卒見馬來及聞馬鳴驚及馬上衣物馬氣皆令小兒中馬客忤慎護之特重一歲兒也聖惠凡人乘馬到人家人身有馬汗不暇湯浴則須換衣服不暇換衣服即食頃間歇定方得親近小兒若不如此則小兒中馬毒客忤或初卸馬馬氣未歇將鞍轡等物逼近小兒兒聞馬嘶便驚皆因中馬毒客忤其狀腹痛吐下青黃白色水穀解離甚者致夭也千金治小兒中馬客忤法中客中人皆可用用粉為丸如豉法摩兒手足心及心頭臍上下行轉摩之咒曰摩家公摩家母摩家子兒苦客忤從我始扁鵲雖良不如善唾良咒訖棄丸道中千金又法取一刀橫著灶上解兒衣發其心腹訖千金翼以發字作撥取刀持向兒吮之唾輒以刀擬向心腹啡啡曰音非出唾貌煌煌日出東方背陰向陽葛公葛公不知何公千金翼云葛公葛母不知何公子來不視去不顧過與生人忤梁上塵天之神戶下土鬼所經大刀鍰犀對灶君二七唾客愈兒驚唾啡啡如此二七啡啡每唾以刀擬之咒當三遍乃畢用豉丸亦如上法五六遍訖取此丸破視其中有毛棄丸道中人馬客忤即愈矣簡要濟衆治小兒中馬毒客忤取馬尾於兒面前燒令兒咽煙氣日燒之瘥為度聖惠又方上取馬口角沫塗兒口中效被鬾第五繼病附巢氏病源小兒被鬾候小兒所以有鬾病者婦人懷妊有惡神導其腹中胎妬嫉而制伏他小兒令病也妊娠婦人不必悉能致鬾人時有此耳鬾之為疾喜微微下寒熱有去來毫毛鬢髮鬇鬇不悅是其證也千金論曰鬾者小鬼也音奇宜服龍膽湯方見癇門中凡婦人先有小兒未能行而母更有娠使兒飲此乳亦作鬾也令兒黃瘦骨立發落壯熱是其證也今繼病是此證嬰童寶鑑小兒微痢腹脹寒熱去來毛髮鬇鬡曰鬾疾鬾音奇是小兒鬼也蓋母腹有妊娠即腹中子之靈識之嫉妬也非母之鬾乎緣百靈娠婦身外其嬰兒眼淨即畏之致此患也千金治鬾方炙伏翼熱嚼哺之千金治少小客鬾挾實白蘚皮湯方白蘚皮大黃甘草炙各一兩芍藥茯苓細辛桂心各十八銖上七味㕮咀以水二升煮取九合分三服千金翼白馬眼主小兒鬾母帶之聖惠治小兒中鬾面色白赤而復變青者如醉色故復發作面赤若青黑色繞口不治覺病候晚者死覺之早者所中邪氣未入臟腑又微引乳者可服此甘草散方與中客忤門中方同而分兩不同又此不用竹瀝煎甘草炙微赤銼龍骨赤茯苓牡蠣燒為粉生乾地黃黃芩桂心各一分當歸半兩銼微炒上件藥搗精羅為散每服一錢以水一小盞入淡竹葉七片煎至五分去滓入白蜜一錢更煎一兩沸量兒大小以意分減溫服日三四服聖惠治小兒