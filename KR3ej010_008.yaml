醋煮乾為度天南星研為粉用薄荷汁搜和為餅炙熟上五味各半斤為末金銀箔各一百箔麝香一兩腦子半兩拌勻糯糊丸皂皂大硃砂為衣五歲以下一丸分二服三歲以下一丸分三四服薄荷湯磨下張氏家傳方治小兒驚熱蛜𧌴丸全蠍一兩炒香熟地龍去土淨半兩炒香熟上搗為細末酒麵糊為丸如豌豆大荊芥湯下更隨兒加減大小丸數及治大人小兒諸病發搐無瘹等丸了硃砂為衣莊氏家傳方治小兒驚熱水銀丸水銀黑錫火熔結為沙子各半兩天麻一分乾蠍十個白附子五個炮半夏十個炮鬱金一個上為末燒飯為丸麻子大每三丸薄荷湯下莊氏家傳方治小兒驚熱婁金丸牡蠣左顧者黃芩龍骨川大黃各半兩龍腦少許雄黃一錢用一半入藥中一半作衣上件六味各細為末後一處更研煉蜜為丸如豌豆大以雄黃滾作衣每服一丸金銀薄荷湯化下服溫水下亦得不拘時候莊氏家傳方治小兒驚風鎮心退上焦熱生砂膏硃砂三錢龍腦牛黃各一字大硼砂一錢甘草人參白茯苓各半兩上件為末再研勻入生蜜和丸如皂子大每服一丸新水化下服之莊氏家傳方治小兒驚熱消疳氣牛黃膏綠豆粉二兩光明雄黃硼砂甜硝甘草末各一分龍腦牛黃各少許上件藥同研勻煉蜜為劑薄荷水破一雞頭大下孔氏家傳方硃砂丸治傷寒及小兒熱鎮心壓驚天南星末看牛膽大小著未釀牛膽一個臘月黃牛者上釀牛膽了吊往透風處至四十九日取合時用硃砂三錢麝香一錢同研細入前末拌和勻浸牛膽皮子湯為丸丸如雞頭大每五丸用新汲水嚼下薄荷湯亦可孔氏家傳方小兒辰砂膏壓驚化涎理嗽利膈退風熱天南星炮熟辰砂研各一分蠍梢殭蠶炒研乳香研各一錢麝香研半錢上六味並須制訖秤再同研勻煉蜜少許和劑蜜不欲多每服量度多少煎金銀湯或熟水化下乳後王氏手集治風邪驚熱燥悶雄珠丸方天麻半兩防風全蠍炒殭蠶炒各二錢甘草炙牛黃別入麝香各半錢雄黃硃砂各一錢上末之煉蜜丸如雞頭大煎皂兒湯化下半丸王氏手集治小兒驚風潮熱涎盛咳嗽吐逆躁悶煩渴瘡疹不快心胸不利睡臥不安驚怖大啼虛風目澀四肢不收辰砂餅子宋羲叔方硃砂一分膽星臘月用牛膽一枚天南星末填滿於風中懸干天麻甘草炙白附子各半兩蠍梢二十一個梅花腦子一字上為末稀麵糊為丸桐子大捻作餅子每服一丸至兩丸薄荷湯化下量兒大小加減仍留少硃砂為衣趙氏家傳袖桃丸鎮心安魂魄散小兒驚熱方桃奴去毛辰砂研人參各半兩真珠犀角鎊玳瑁各一分雄黃研一錢牛黃研生腦子各半錢上為末外入乳缽同研生蜜丸隨大小丸麥門冬或人參湯化下常服如雞頭肉大小兒半之吉氏家傳治取諸驚氣風熱由末退臉赤唇紅者蛜𧌴散方蛜𧌴生白殭蠶各半兩白附子生硃砂各一錢甘草一分生麝香腦各少許羌活半錢上末每服半錢或一錢金銀薄花湯化下或有丹毒赤腫以蕓薹菜湯調下忌豬肉豉汁動風物吉氏家傳治驚退風熱解傷寒佛手散方川烏頭炮麻黃去節各一兩大黃煨甘草炙天麻生各一分全蠍七個上末每服半錢水半盞坯子兩粒煎溫服吉氏家傳治小兒心臟驚熱睡臥不穩膈實涎盛多驚紅餅子方硃砂半兩細研乳香三塊水研令勻水浸蒸餅心同硃砂一處劑成龍腦麝香各半錢牛黃一字上將龍腦麝香牛黃一處研入劑內和勻丸如梧桐子大捻作餅子每服一二餅子令薄荷湯下如痰盛加半夏一分洗七遍薑製為末入之吉氏家傳治小兒驚熱鬱金黃連甘草炮各二兩蛤粉三兩蜜一兩生一兩煉上將蜜和前藥研勻更入腦麝各一錢用熟水化開入納膏每服半皂子大薄荷湯化下吉氏家傳驚熱及晝夜俱熱或往來不定者宜服清涼膏甘草炙大黃紅芍藥馬牙硝各等分上末入麝少許蜜為膏每服一皂子大含化量虛實與服吉氏家傳驚熱牛黃丸人參茯神各一錢鬱金四錢雄黃半錢上末水化熊膽煮糊為丸如綠豆大以薄黃為衣每服五七丸淡薑湯下吉氏家傳方鬱金散退小兒一切驚熱川細鬱金半兩皂角水煮切碎焙乾白芍藥天竺黃甘草炒硼砂各一分硃砂一錢上為末每服半錢至一錢薄荷蜜水下朱氏家傳治驚退熱牛黃散鬱金半兩皂角半條同煮俟鬱金軟去皂角不用切大黃蒸三度山槐甘草炙牙硝硃砂腦麝各半兩上為末一字半錢蜜水調下朱氏家傳治小兒驚熱越桃散山梔子去皮炒石膏生藿香各一兩甘草炙三分上件為末每服一錢小兒半錢一字水一盞煎七分麥門冬熟水下亦得大小便痛澀皆治朱氏家傳治小兒心肺壅盛口舌生瘡澀壅氣促驚熱牛黃膏鬱金葛粉各一兩甘草炙三分山梔子仁半兩雄黃二錢上件為末煉蜜成膏每服一皂角子大薄荷湯化下長沙醫者丘松年傳青龍膏治驚風潮熱昏困涎盛全蠍七枚微炒白附子炮裂人參白茯苓水銀砂子各一錢防風天麻獨活螺青各二錢上除螺青水銀砂子外為細末次研入一處令勻煉蜜為丸如梧桐子大每服一丸煎金銀薄荷湯化下長沙醫者丘松年傳鎮心散鎮心安神壓驚涎涼膈祛一切風邪客熱人參遠志去心秤白茯苓甘草炙以上各一分上為細末入硃砂一錢牙硝一分細研勻每服半錢金銀竹葉湯調下長沙醫者丁時發傳治驚風熱方孩兒驚熱或悲哀咳嗽頻頻喘上來奶乳相停胃膈上轉增虛汗用心猜宜紅桃散天南星一個小者開坑入硃砂半錢入在土坑內蓋蓋少火煅存性滑石輕粉各半錢腦麝各少許全蠍二十一個全者上件為末每服一字或半錢薄荷湯調下長沙醫者丁時發傳牛黃散治小兒驚熱潮熱傷風風熱壯熱夾驚傷寒不解涎潮發搐搦退諸般熱候鬱金一兩皂角七寸巴豆二十一粒用水一升煮乾去巴豆焙乾甘草炙大黃茯苓硃砂人參各一分牙硝半兩輕粉一錢半麥門冬去心焙乾一分上為細末每服半錢麥門冬湯入蜜調下長沙醫者丁時發傳小兒心驚化涎退熱鉤藤散鉤藤山梔子仁防風甘草以上各半分上件為末每服一平錢用水四分煎二分與服長沙醫者王兊傳變蒸散治小兒體性常熱及變蒸驚熱不解夾熱煩躁時叫泣無歇及骨熱生瘡面色常黃瘦瘁不進奶食柴胡去蘆洗銼甘草炙人參去蘆洗銼元參淨洗銼各一兩麥門冬子去心一兩半龍膽草半兩若變蒸或常服只一分隨時加減上件為末每服一錢水一小盞煎至三五沸溫服一日三五服常服去疳若骨蒸煩熱服尤妙長沙醫者鄭愈傳治小兒一切驚熱生涎方龍骨一錢龍齒二錢鉛白霜三錢硃砂半錢上件為末每服半錢煎金銀薄荷湯調下長沙醫者鄭愈傳壓驚退熱下涎牛黃膏鬱金三錢雄黃甘草炙乾葛各二錢輕粉半錢川消一錢上為末煉蜜為膏梧桐子大每服一粒薄荷湯化下加減用之長沙醫者鄭愈傳治小兒獨體硃砂膏壓驚鎮心化風涎除溫壯益小兒利榮衛散膈熱硃砂人參茯苓各二錢蠍梢七個硼砂一錢牛黃腦麝各少許金銀箔各七片上件為末入乳缽研煉蜜為膏梧桐子大每服一餅食後溫薄荷湯化下長沙醫者鄭愈傳硃砂膏治小兒驚熱涎潮方甘草炙四錢蠍生用一分腦麝各少許硃砂半兩一半入藥一半為衣半夏二兩用皂角水白礬水浸一伏時久取出湯洗去滑為度切作片子焙草上件為末煉蜜為丸如皂角子大硃砂為衣每服一丸薄荷湯下長沙醫者鄭愈傳牛黃散治小兒驚熱涎作方鬱金白藥甘草炙天南星用濃即皂角水煮乾為度各一兩上為末每服半錢薄荷湯下長沙醫者鄭愈傳鎮心丸治小兒驚涎盛發熱目上眼急硃砂鐵粉水飛天竺黃鉤藤各半兩麝香一分上件為末生蜜為丸如綠豆大薄荷湯化下一二丸驚積第四茅先生小兒有驚積候忽然地身熱氣喘啼聲低夜睡覺腹裡有物跳動此候因驚久而不安傳此所治者用牛黃膏方見膈熱門中夾硃砂膏方見本門中調理即愈五訣驚積候歌先真烏犀膏取方見急慢驚風門中次調氣鎮心下涎小兒驚積每因涎積熱肝心腑臟傳哽氣面青痰愈盛胃虛頻嘔利多般石壁經三十六種內驚風漸熱候歌漸熱多因積在脾瀉如白土又如脂朝來發內頻生汗次後多煩渴水啼若取轉虛其熱盛涼心此患始相宜更看耳畔為形候赤者為風黑熱隨因積聚致深故使腹肚熱手足心亦熱又發驚候飲冷水又多煩躁渴飲至夜則多啼叫其瀉有如豆沙之狀若失治則睡重仍加手足發搐搦也治須分水穀調氣旋旋去其積次止渴發汗即愈鳳髓經此候歌括一同仍注云有風與生銀丸有熱與金葉散生銀丸方與玉訣同見急慢驚風門金葉散方見本門中小兒形證論四十八候驚風漸熱歌一同後云此候是驚積相兼潮熱早晨額上有汗便是形證只與蛜𧌴丸方見一切癇門中與服便安或不退微似疏瀉次調氣仙人水鑑取小兒驚積不動臟腑乳香丸乳香輕粉白丁香白附子生用夜明砂各一錢巴豆二七粒去油麝香一字上為末研勻麵糊為丸如麻子大每服三丸淡薑湯下仙人水鑑又犀角膏方取驚積犀角一分天南星一個乾蠍白殭蠶炒鐵粉各一錢巴豆三七粒白附子生用二個輕粉麝香各少許上為末研勻用蜜煉成膏丸如黑豆大薄荷湯下茅先生治小兒驚積驚熱硃砂膏硃砂半兩硼砂馬牙硝各三錢真珠末一錢元明粉二錢以上並別研腦麝各一字上件各為末於一處拌和合用好單角起不久其藥自成膏如小兒諸般驚用藥一黃豆大常用金銀薄荷湯少許化開下如遍身潮熱用甘草煎湯下狂躁惡叫用生地龍汁化下一臘及一月日內小兒不通下藥可用藥使乳調塗在奶上令牙兒吮奶吮下博濟方治小兒驚積鎮心臟化疾涎小朱砂丸硃砂一分細研巴豆三十粒去皮膜出油盡杏仁五枚於熟灰內過湯退皮尖一本用杏仁五十粒半夏湯洗七遍焙為末二七錢上件四味一處同研令細勻以麵糊和為丸如綠豆大二歲只服一丸荊芥薄荷湯下三歲加一丸五歲服三丸如有驚伏在內即行盡仍舊藥出如無驚藥丸更不下甚妙而復穩博濟方治小兒伏驚積在內壅並痰涎及奶癖取虛中積轉驚辰砂丸辰砂膩粉各一錢定粉半兩粉霜一錢半麝香少許白丁香半字上件六味同研為細末用粟米飯和為丸如綠豆大捏作餅子慢火內微炮令紫色用粟米飯飲化一丸微利為度博濟方治小兒驚積壯熱錢湯丸豬牙皂角燒灰硃砂滑石末各一錢天南星末半錢輕粉一分巴豆二十四粒去皮尖上件六味同研至細以寒食麵為丸如綠豆大每服一歲一丸二歲二丸三歲三丸煎錢湯下臨臥服靈苑治脾積氣及夾食結胸傷寒四肢逆冷久患冷疾兼小兒驚積食勞大效水銀丸水銀硫黃與水銀結成沙子巴豆去心皮不去油與前二味沙子同研各一兩礞石硇砂同研各半兩上五味都更研令極細以好米醋合和得所先作一地坑如茶盞大深四指浮火煆通赤去灰火以醋紙襯攤藥在內將碗子蓋土培之一宿取出浪干又再研用熟水麵糊作丸如小豆大每服二丸或三丸用生薑棗子湯下傷寒用橘皮生薑棗子蔥湯下五丸至七丸或四肢冷及時疾五七日不得汗者用龍腦麝香膩粉牛黃各少許研末調冷水吞下五七丸更看大人小兒虛實加減服靈苑取小兒急慢驚風熱積大效虎睛丸方乾蠍天南星半夏膩粉白附子各一分滑石末一錢巴豆二十五粒去皮膜細研入上件七味藥併為末用粟米飯研合為丸如綠豆大每一歲一丸如大腸風熱一歲二丸並用薄荷冷熟水吞下靈苑治小兒急慢驚風夜啼虛積痰毒宜用硃砂丹巴豆霜乾蠍天南星硃砂別研各一錢木鱉子一個炮去殼研為末上件併為末用蒸餅心研合為丸如綠豆大每一歲二丸用桃白皮煎湯令溫吞之靈苑治小兒驚風積大效軟金丹白附子大小二枚蠍尾七個金汞沙子豌豆大硃砂鉛白霜粉霜青黛各一錢膩粉一錢白礬一錢燒令汁盡巴豆二十個細研新瓦上油出上件藥併為細末用天南星劈破漿水煮令軟爛和前藥末研合為丸如梧桐子大每用荊芥龍腦湯磨下半丸至一丸便取下驚涎並不撓人有患者只一服取效譚氏殊聖治小兒驚積青龍丸青黛輕粉各一錢蠍梢三個麝香少許巴豆二七粒去皮膜油上先將巴豆於缽內細研令如面泥後入諸藥研令極細用硃砂為衣如粟殼大看小兒肥瘦加減五三丸薄荷湯下三十六種治驚風漸熱有積羚羊角湯子芩羚羊角屑等分上件為粗末每服二錢水一盞煎至五分去滓分作二服如未解加煎鳳髓經金華散退小兒一切驚風積實潮熱方鬱金皂角水煮天竺黃各一錢牙硝煨甘草炒各一分硃砂一錢半上為細末每服半錢或一字薄荷蜜水調下聚寶方真珠丸治小兒驚積食積溫壯喘粗痰滯真珠末半錢天南星炮黃膩粉白滑石續荽子去皮半夏漿水煮軟切焙各一錢巴豆二十一個去皮膜水浸一宿留油上七味為末糯米飯為丸如綠豆大二歲以下一粒二歲以上二粒三歲以上五粒七歲以上七粒取驚積蔥湯下只驚荊芥薄荷湯下臨臥服劉氏家傳香犀丸治小兒驚積鎮心臟化涎一切無辜驚疾金銀箔各三十片羌活遠志使君子炮京墨燒過全蠍白附子麻黃去根節犀角各三錢青黛細研滴乳別研熊膽蘆薈各湯化硃砂別研陳臘茶第一等好者天竺黃別研各二錢真麝香別研一錢上件為細末煉好蜜丸如小彈子大一丸分作六服用薄荷湯化下張氏家傳順氣丸治小兒驚積及男子婦人血氣臍腹疼痛大人小兒或有所傷並宜服之甘草爁芍藥洗官桂去粗皮秤川當歸焙蓬莪朮乾薑各炮陳橘皮去瓤秤川大黃濕紙裹煨切片子焙巴豆去皮用醋五升入巴豆在銀石器中熱醋盡取出研令細宣連上件等分為末以糯米粥為丸如麻子大常服三五丸至十丸茶湯溫水下如要宣轉量虛實加至十丸或十五丸食積氣積生薑橘皮湯下丈夫元氣炒茴香鹽湯下婦人血氣當歸醋湯下胸膈不快或瀉痢生薑湯下小便淋瀝燈心湯下小兒驚積薄荷湯下莊氏家傳治積驚氣牛黃夜明砂各一分苦楝子十個去皮川大黃一兩胡黃連半兩上為末用蜜丸如桐子大溫水化一丸取下為度莊氏家傳治小兒五驚積硃砂丸常服方硃砂雄黃各二字麝香一字檳榔一分大南星末白附子各一字蠍梢七個巴豆霜五個水浸研出油瓦上泣盡上件為末煮白糊為丸如粟米大一歲二丸常服荊芥湯下渾身熱亦可服三五丸王氏手集治驚積風涎潮發不住手足搐搦不省人事一醉膏方辰砂上等好者人參好者各一兩乳香一兩半明者真珠末生龍腦各一分飛羅面秤六分酸棗仁溫湯浸去皮二兩上件碾為細末一處勻和再研令細以煉蜜和新竹筒內盛用簝葉油紙封定飯上蒸一時辰取出丸如小彈子大每服一丸以法酒一大盞溫化下更以一盞投之未愈再服涎多即吐小病大便出小兒潮發搐搦以薄荷水化皂角大吉氏家傳治驚風取積及慢驚或才生下三兩日後便宜服桃紅散天南星末白附子末硃砂各一錢全蠍二十個麝香少許上同研為細末每服一字金銀薄荷湯下吉氏家傳治驚積青金膏水銀青黛各一錢蠍四個全者輕粉麝香各少許巴豆七粒去油棗子十個去皮核同水銀入缽內研如泥上將棗肉水銀一處為膏丸如綠豆大一歲一丸金銀薄荷湯下吉氏家傳治諸般積或驚怯不通取積木香散此藥立取下木香一錢陳皮去白二錢巴豆五粒去皮膜上三味炒巴豆黃色只取五片不用以前藥為末每服半錢或一字陳米飲調下如吐瀉瓦瓶煎香附子湯下大小加減服吉氏家傳治夾驚傷寒驚悸食積瀉等疾青金餅子白附子天麻殭蠶大附子炮各一錢全蠍青黛各半錢天南星酒浸煮熟三錢上件為末入水銀一錢輕粉二錢麝香半字巴豆十五粒去心膜同研細為餅子如此大每餅用腦子薄荷湯化下吉氏家傳蔥湯丸取驚積食積潮熱煩躁面赤氣喘腹脹南星末白附子末滑石末硃砂末各挑二錢匕全蠍十個輕粉挑一錢匕麝香少許粉霜挑半錢匕巴豆十四個去皮心膜出油若作真珠丸加硃砂為衣上為末稀麵糊為丸如此大每服五七丸加減取積蔥白薄荷湯臨睡時下吉氏家傳烏犀膏治小兒急驚風熱涎積但是一切熱積宜用此藥取京墨火煆水銀砂犀角屑各一分輕粉牛皮膠蚌粉炒粉霜各一錢硃砂一錢半滑石末一錢白附子一錢匕麝香少許巴豆三十粒去殼針穿燈燒存性上為細末煉蜜為丸每服一皂子大或半豆大加減服食後用薄荷湯化下涎為效朱氏家傳驚積八寶散大天南星一個文武火炮微黃色存性勿太過蓋地上出火毒為末輕粉三錢雄黃通明者腦子研麝香蠍焙為末硃砂各半錢生犀角末二錢上件勻研一月三歲以下一字以上半錢看大小加減用金銀薄荷湯下重者連服二服了睡或瀉或吐自止用和氣藥草果子一個去皮丁香木香各一錢蒸一度青皮五片去瓢炒上件末熟水下一字半錢長沙醫者丁時發傳驚積方孩兒驚積事難明涎上時時不少停眼畔山根如碧色急須與取便醒醒滾痰丸青黛粉霜水銀滑石各半錢輕粉一分蠍十四個巴豆霜二錢匕硃砂乳香百草霜各一錢香墨一寸腦麝各少許上件為末蜜丸如此大三歲以上五丸隨年歲加減用金銀薄荷湯吞下驚虛第五小兒形證論四十八候驚虛候歌長虛齧齒面青黃噎乳涎高胃氣傷嗞啀饒啼眠不得上竄氣急瀉偏黃風盛涎多應發搐變異時時色不常退取虛驚無別候痰涎墜下病何妨此候因虛成驚虛涎上可下變涎丸次補虛勻氣如咬牙啼哭微下數服通心行小腸藥即痊宜服安神散方見本門四十八候變涎丸牙硝一錢硼砂南星粉霜各半錢半夏十個去皮臍硃砂一分醋麵裹巴豆不拘多少同半夏硃砂入水煮去豆為膏用上為末皂角膏丸如綠豆大每服十粒至七粒取下驚涎次補氣凡有涎皆用此藥四十八候安神散治驚虛人參茯苓硃砂各一錢真珠半錢甘草炙三寸蟬蛻七個麝香犀角屑各少許上為末薄荷湯下一錢又解夜啼四十八候定魂湯治驚虛人參白朮茯苓各一錢酸棗仁半兩上為末飯飲下一錢如驚薄荷湯下趙氏家傳治小兒因虛生驚烏蛇丸烏蛇肉炙全蠍神麯炒白殭蠶各半兩蠍梢一分螻蛄細研候諸藥成末方用上為末酒糊丸如黃米大每服二十丸米飲下搐搦第六錢乙論肝有風目連扎不搐得心熱則搐治肝瀉青丸治心導赤散主之瀉青丸方見驚熱門中導赤散方見實熱門中錢乙論肝有熱目直視不搐得心熱則搐治肝瀉青丸治心導赤散主之方見同前錢乙論肝有風甚身反折強直不搐心不受熱也當補腎治肝補腎地黃丸治肝瀉青丸主之凡病或久皆引肝風風動而止於頭目目屬肝風入於目上下左右如風吹不輕不重兒不能任故目連扎也若熱入於目牽其筋脈兩眥俱緊不能轉視故目直也若得心熱則搐以其子母俱有實熱風火相搏故也治肝瀉青丸治心導赤散主之方見同前錢乙論驚癇發搐男發搐目左視無聲右視有聲女發搐目右視無聲左視有聲相勝故也更有發時證錢乙論早晨發搐因潮熱寅卯辰時身體壯熱上視手足動搖口內生熱涎項頸急此肝旺當補腎治肝也補腎地黃丸治肝瀉青丸主之地黃丸方見虛寒門中瀉青丸方見驚熱門中錢乙論日午發搐因潮熱己午未時發搐心神驚悸目上視白睛赤色牙關緊口內涎手足動搖此心旺也當補肝治心治心導赤散涼驚丸補肝地黃丸主之導赤散方見實熱門中涼驚丸方見一切驚熱門中地黃丸方見同前錢乙論日晚發搐因潮熱申酉戌時不甚搐而喘目微斜視身體似熱睡露睛手足冷大便淡黃水是肺旺當補脾治心肝補脾益黃散治肝瀉青丸治心導赤散主之益黃散方見胃氣不和門中瀉青丸導赤散方見同前錢乙論夜間發搐因潮熱亥子丑時不甚搐而臥不穩身體溫壯目睛緊斜視喉中有痰大便銀褐色乳食不消多睡不納津液當補脾治心補脾益黃散治心導赤散涼驚丸主之方見同前錢乙論傷風后發搐傷風后得之口中氣出熱呵欠頓悶手足動搖當發散大青膏主之小兒生本怯者多此病也大青膏方見驚熱門中錢乙論傷食後發搐傷食後得之身體溫多唾多睡或吐不思食而發搐當先定搐搐退白餅子下之後服安神丸白餅子方見本門中安神丸方見虛熱門中錢乙論百日內發搐真者不過三兩次必死假者發頻不為重真者內生驚癇假者外傷風冷蓋血氣未實不能勝任乃發搐也欲知假者口中氣出熱也治之可發散大青膏主之及用塗囟浴體法大青膏方見同上塗囟及浴體法方見本門中錢乙論搐別真假云李司戶孫病生百日發搐三五次請眾醫治作天瘹或作胎驚癇皆無應者後錢乙用大青膏如小豆許作一服發之復與塗囟法封之及浴法三日而愈何以然嬰兒初生肌骨嫩怯被風傷之子不能任故發搐頻發者輕也何者客氣在內每遇不任即搐搐稀者是內臟發病不可救也搐頻者宜散風冷故用大青膏不可多服蓋兒至小易虛易實多即生熱止一服而已更當封浴無不效者錢乙論發搐逆順云李寺丞子三歲病搐自卯至巳數醫不治後召錢氏視之搐目右視大叫哭李曰何以搐右錢曰逆也李曰何以逆曰男為陽而本發左女為陰而本發右若男目左視發搐時無聲右視有聲女發時右視無聲左視有聲所以然者左肝右肺肝木肺金男目左視肺勝肝也金來刑木二臟相戰故有聲也治之瀉其強而補其弱心實者亦當瀉之肺虛不可瀉肺虛之候悶亂哽氣長出氣此病男反女故男易治於女也假令女發搐目左視肺之勝肝又病在秋即肺兼旺位肝不能任故哭叫當大瀉其肺然後治心續肝所以俱言目反直視者乃肝主目也凡搐者風熱相搏於內風屬肝故引見之於目也錢用瀉肺湯瀉之二日不悶亂當知肺病退後下地黃丸補腎三服後用瀉青丸涼驚丸各二服凡用瀉心肝藥五日方愈不妄治也又言肺虛不大瀉者何也曰設令男目右視木反剋金肝旺勝肺而但瀉肝若更病在春夏金氣極虛故當補其肺慎勿瀉也錢乙論熱必驚搐廣親宅七太尉方七歲潮熱數日欲愈錢謂其父二大王曰七使潮熱將安八使預防驚搐王怒曰但使七使愈勿言八使病錢曰八使過來日午間即無苦也次日午前果作急搐召錢治之三日而愈蓋預見目直視而腮赤必肝心俱熱更坐石杌子乃欲冷此熱甚也肌膚素肥盛脈又急促故必驚搐所言語時者自寅至午皆心肝所用事時治之瀉心肝補腎自安矣石壁經三十六種驚風搐搦候歌多啼急搐更無偏吐瀉風傳氣不宣先愛睡中微有汗鳳髓經至此乃云原看眼中微有淚始見兒家本病源此因胃氣盛乳食太過又被物驚是致作吐或即作瀉失治即白日睡重至夜哭叫不休手足或搐搦氣粗眼急自當然面紅患在非為瘥愛哭心中卻聚涎臉有紅筋癇病作亂紋生指病應傳鳳髓經此一句云指內青紋病又傳看形定色須明審靈藥除風不在言氣粗發熱當微涼胃氣次去驚候後散其涎若涎可更看兩臉上有青色或紫紅絲如結螺之狀者其疾病未全效當調氣次去其驚風候兩手第二指亂紋生如魚刺之狀者亦同前治之也當調氣須去其驚鳳髓經驚風搐搦散句頗同仍又有注云與烏犀膏下涎次與生銀丸二方與玉訣同並見急慢驚風門中石壁經三十六種急驚偏搐候歌先看孩兒面臉青次看背上冷如冰陽男搐左無妨事忽然搐右便驚人女搐右相猶可治搐歸左畔不須聞更忌手心如水汗皺眉高腹豈安存四十八候此末二句乃云人忌悶涎傳入肺結在心中病轉深此候因受寒邪所致也若治則先調胃氣次當發汗如背上覆暖則可治若依前冷則不可治更手中汗出或臭氣或叫不止乃內瘹也不治鳳髓經此歌並同但有注云如順搐與生銀丸鎮心丸生銀丸方見一切驚門中仙人水鑑治小兒驚風搐搦龍腦膏生白龍腦半錢膩粉一分石腦油少許水銀一分好酥一塊如棗大同研細白附子一錢輕炮過天南星二錢輕炮過上為末麵糊少許研令熟於瓷石器內盛貯不得透風丸如綠豆大一二歲每服一丸三四歲以來每服二丸煎金銀薄荷湯下乳香湯亦得博濟方治小兒驚風搐搦化涎鎮心神效歸魂丹使君子二枚以麵裹於慢火中煨候面黃為度去面用之水銀結砂子香細墨蘆薈真熊膽臘茶龍腦乳香各一錢辰砂天竺黃青黛各半錢蠍梢二七枚輕粉二錢寒食麵一錢半上件十四味同研令勻細滴水和為丸如綠豆大每服一丸薄荷蜜水化下如小兒稍覺驚著化半丸與吃若能常服永無驚疾博濟方治小兒驚搐不定或因驚風已經取下此病再作氣粗喘促宜服此延壽散雞舌香大者三枚硃砂半錢五靈脂一錢半黃耆一錢上件四味同研為細末每服半錢用研糯米泔調下如孩子小隻服一字博濟方治小兒驚風搐搦痰塞在心戴眼直視或眼不開口噤四肢或冷或熱大便或秘或泄神效龍腦膏生龍腦一錢用柳木槌子研以熟腦代亦得膩粉一錢水銀半兩用臘茶半錢好酥一塊如棗大以水銀一處揩磨調塗殺研之天南星二錢先去皮臍濕紙裹熱灰內煨炮取出為末用同研石腦油冬天用半兩夏天用一分將前末同研候油入和調硬軟得所上件五味為丸如綠豆大一歲二歲三四歲一服一丸二丸煎乳香湯下不得化破服後三五頓食久取下惡物痰涎大有奇功靈苑治小兒驚風搐搦宜服水銀丸方白附子天南星各燒黑天麻水銀白殭蠶各一兩乾蠍犀角腦麝研各一分上件九味細搗羅更研令極細先用煮棗肉研殺水銀令無星後卻入諸藥末同研合作丸如梧桐子大每服一丸用薄荷湯化下汗出瘥如小可只用半丸先滴好酒浸開臥時溫酒下薄荷湯亦得太醫局方太一丹治小兒諸風驚癇潮熱搐搦口眼相引項背強直精神昏困痰涎不利及一切虛風並皆治之天南星炮烏蛇酒浸取肉各三錢乾蠍微炒一錢半白附子炮三錢半天麻去蘆頭麻黃去根節大附子炮去皮臍各半兩白殭蠶揀淨碎炒四錢以上為細末以水一升調浸三日以寒食麵一斗拌勻踏作曲須六月六日以楮葉罨七日取出逐片用紙袋盛掛當風十四日可用每曲末一兩入下項琥珀研一錢辰砂飛研六錢雄黃飛研三錢甘草炙銼為末半錢上合研勻煉蜜和丸如雞頭大每服一丸溫水化下不計時候譚氏殊聖方小兒驚搐眾疾先且用紅龍散半錢分作三服依使下十個之中十個痊龍珠龍齒鉛霜末天南星水浸七宵間若獲此方神妙理他年功行滿三千紅龍散龍腦少許硃砂半錢龍齒二錢天南星五錢先須水浸七日逐日換水日滿取出切作片子曬乾為末鉛白霜三錢上件並研令極細每服一字蔥白金銀湯下此善治小兒急慢驚風及四時傷寒渾身壯熱唇口焦乾兩目翻露手足搐搦宜服之連吃三兩服候驚汗出為妙忌一切毒物譚氏殊聖方小兒掣搐似癇風眼白唾涎向後弓聚氣擁毒心臟熱看看大命即須終雄黃犀角蛇黃等用棗為丸氣必通輕粉蜜調傾入口水銀相共立神功水銀丸水銀一錢輕粉二錢蛇黃雄黃各一大錢研生犀末半錢上同研令永星盡以陳青州棗肉丸如大豆看小兒大小加減百日內兒蜜水研下一丸忌毒物譚氏殊聖方小兒偏搐一相頻秘錄分明母受驚忽若發時唇口動剎那搦撮築心神潮來手腳皆牽動退後皮膚面色青但取茯苓參一分雄朱和合便惺惺寶壽散一名金砂散雄黃茯苓人參馬牙硝研各一分硃砂半兩研水飛過上研末熱水下半錢一歲以下一字譚氏殊聖方小兒頭痛目無光恍惚時便冷水漿頻吃水來不解渴看看手足又翻揚鬱金寒水生犀角和合沙糖服最良更取金箔粳糯米洗心除熱便安康罷搐散寒水石半兩英粉三錢犀角末一錢鬱金一個二味同為末上為末沙糖調下半錢一歲以下一字譚氏殊聖遺方治小兒驚搐黑狗糞青狗糞不以多少二味以火煆白色上二味同共研為細末入麝香少許每服一錢冷水調下譚氏殊聖遺方治小兒驚風及癇疾手足搐搦涎潮不定目睛直視不醒人事並宜服之大驚丸硃砂三錢蝦蟆灰一錢半青礞石一錢半局方用一錢鐵粉一錢局方二錢半雄黃一錢好者局方用一錢半蛇黃一錢煆碎局方用二錢上為末水浸蒸餅為丸如梧桐子大每服一丸薄荷磨剪刀水送下局方云此藥治驚化涎不用銀粉小兒臟腑口齒腸胃柔弱凡用銀粉藥切須慎之則無他苫錢乙塗囟法蜈蚣末牛黃末麝香青黛末各一字匕蠍尾去毒為末薄荷葉各半字匕上同研勻熟棗肉劑為膏新綿上塗勻貼囟上四方可出一指許大上灸手頻熨百日裡外兒可用此塗浴法又浴體法天麻末二錢蠍尾去毒為末硃砂各半錢匕麝香一字匕白礬青黛烏蛇肉酒浸焙為末各三錢匕上同研勻每用三錢水三碗桃枝一握並葉五七枚同煎至十沸溫熱浴之勿浴背錢乙麝蟾丸治驚風涎熱潮搐大幹蟾燒灰硃砂末各二錢匕龍腦一字匕麝香別研一錢匕鐵粉雄黃末蛇黃燒淬取末青礞石末各三錢匕上拌研勻水浸蒸餅心丸如梧桐子大硃砂為衣薄荷水化下半丸至一丸無時與譚氏殊聖大驚丸方同但此方有腦麝及分兩不同爾錢乙白餅子又名玉餅子巴豆二十四個去皮膜水一升煮水盡為長滑石輕粉半夏湯浸七次切焙秤為末天南星同上為末各一錢上研勻巴豆後入眾藥以糯米飯為丸小豆大捏作餅子三歲以上三五餅子以下一二餅子煎蔥白湯下臨臥旅舍備用麝香膏治小兒諸風驚涎熱發搐麝香研乳香研青黛各半兩防風末硃砂研龍膽各三錢甘草炙四兩龍腦膩粉各一錢匕天南星炮墨燒各半錢上研勻蜜劑成膏每二歲兒服半皂子大薄荷湯化下張渙遺方大黃丸治驚風潮搐背脊強直牙關緊急發歇無時白附子全蠍炒黃各三分烏蛇酒浸取肉天麻酒浸焙乾白殭蠶直者麩炒黃硃砂研半日各一兩麝香與硃砂同研雄黃牛黃真珠末腦子各一分金箔三十片天南星十個水浸三日逐日換水取出慢火煮一復時切作片子焙乾麩炒黃色用一兩上件同研前藥一處研一二日許須要極勻煉蜜為丸如雞頭大每服一丸荊芥茶清化下張渙遺方龍腦散治脾胃虛弱生風發搐全蠍白附子各二錢半烏蛇酒浸肉焙乾天南星各三錢白殭蠶四錢天麻半兩酒浸焙乾附子一個半兩者炮去皮臍上㕮咀一處用水一升浸三日取出焙乾為細末每服一錢腦子湯調下張渙遺方呼魂丹治驚風潮搐烏蛇一寸生用全蠍白附子末乾蟾各一分天漿水半分去殼青黛二錢白殭蠶直者二十一枚上為細末用獖豬膽汁和丸如綠豆大每服一丸冷水化滴鼻內候嚏噴是效然後薄荷湯化下一二丸服之張渙遺方硃砂丸治身熱涎盛發驚潮搐天漿子一十四個七個去殼硃砂半兩細研腦麝各一錢胡黃連一分上為細末煉蜜為丸如綠豆大每服一二丸薄荷湯化下聚寶方黑散子化風涎定搐開口噤利膈正狂躁雄豬指甲白黑二色各揀取空甲洗浴各人通泥罐子內放干旋炙燒通赤上留小穴子候煙出才止去火用黃土蓋一宿別研三伏時青礞石好者為末各入小合子通泥後燒通赤冷各細研水飛紙隔候乾各收之金星石末銀星石末上四味每料用錢抄黑白甲末各五匕三石末各抄一匕同研每服二錢匕漿水半盞許生油一兩滴打勻調下入口即瘥並不吐瀉自然壓下風涎小兒亦依此減服立效惠眼觀證生犀丸治急驚風發搐涎壅水銀砂子半兩用棗四個結之天麻犀角屑各一分腦麝各少許研乾蠍天南星燒過白附子飛過各一兩上八味為末用棗砂肉為丸如此大若驚頗甚以酒研下一丸常服降涎壓驚薄荷湯下半丸三十六種治驚風搐搦梨汁丸水銀半兩真蠟茶末半錢上件研勻梨汁為丸如粟米大每服五丸或十丸薄荷湯吞下連三服三十六種治驚搐蠍梢丸蠍梢巴豆各半兩青黛一兩木香一錢輕粉半分以銚子炒仍以物覆勿令氣出用慢火於銚下使豆黑裂取出去殼用上五味先以蠍梢同研輕粉於乳缽內煞極細入餘三味藥末用糊丸如小綠豆大一歲一丸薄荷湯下鳳髓經玩月散治小兒驚風搐搦眼目上視此藥搐鼻目睛便下搐搦便定才搐鼻如嚏噴可治不爾死獨角仙一個用利刀對中切作二片輕粉拌和炙令乾大全蠍一個酒浸軟利刀對中切為二片輕粉拌和炙令乾上右邊蠍共右邊角仙同為細末入細辛末匕半錢麝一豆大研勻成藥左邊蠍角仙同前法卻與貼藥上書左右二字記認男左女右用起劉氏家傳治小兒驚風眼上搐金花散川鬱金慢火炮熱打入地內候冷取出上末之二歲以下用半錢二歲以上用一錢金銀薄荷湯調下微利劉氏家傳治小兒驚風定搐搦去涎喘硃砂膩粉天麻白殭蠶炒白附子炮各半分金箔四片乾蠍七個全者半夏湯浸煮洗七遍焙半分上前二味同金箔研外五味末之和勻煉蜜丸綠豆大每服二丸荊芥薄荷湯化下或如餅以金箔為衣張渙治慢驚方同用棗肉為丸張氏家傳治小兒急慢驚涎潮熱搐不定者褊銀丸水銀鉛結砂子膩粉牛黃全蠍黃明膠鉛白霜青黛香細墨各一分川巴豆一兩去皮心用米醋煮令黃色干為度上件合和研令勻以粟米煮飲和為丸如細小綠豆大捏褊丸每服三粒至五七粒五歲以來三粒八九至十歲五粒分減虛實用之如二三歲發之盛時三五粒取下涎正氣決效如小兒常時有虛積看大小分減用取驚涎積乃妙不誤爾薄荷金銀湯下張氏家傳治小兒孩兒肝經壅目直視手足拳攣伸舒立地不得寬筋定搐羌活膏牛膝羌活蠍梢防風天麻人參乾木瓜老者當歸紫蘇根淨洗焙乾真麝香各一分硃砂白附子各半錢上件除麝香外細銼用酒浸一宿來日慢火焙乾搗為細末入麝香令勻用沙糖和為膏常服一皂子大如筋急作搐及瘡子瘛瘲每服龍眼大濃煎荊芥湯化下先搐鼻後下藥若不嚏難醫張氏家傳治驚癇風痙搐搦不知人事及治小兒驚風搐搦墜涎經驗靈砂丹銀錯末一分水銀一分二味研作母砂子分為七處真鉛丹半錢為七處上用淨熱白絹七片各包鉛丹一分銀母砂子一塊以熟白絹系之緊慢得所卻於淨水中浸少時候浸透取出置在一淨磚上各相離𬅿小後用熟炭三斤許煅過令藥包子通赤色去火停冷收之藥自成塊子大人急病一服一塊小兒分四服用蛇皮煎湯磨化下服後便睡勿怪或痢下惡物更妙張氏家傳把搐膏治小兒一切驚風方藿香葉三錢天南星白附子麻黃去節天麻各二錢白殭蠶一錢半蠍梢十兩腦麝各少許蜈蚣一枚上件為末煉蜜為丸如雞頭大每服一丸蔥白湯化下莊氏家傳治急慢驚搐搦定命丸蠍七個蘆薈熊膽龍腦各半錢瓜蒂七個蟾酥一皂大膩粉牛黃各二錢麝香一錢硃砂蛇蛻皮燒灰雄黃各一錢上研如粉用湯浸蟾酥軟用薄麵糊同搜丸如黍米大如有驚用倒流水化二丸滴在鼻內良久嚏則搐搦定如人行一二里更化二丸灌常服一歲一丸臨臥以金銀薄荷湯下不化也孔氏家傳治小兒驚風四肢搐搦五靈脂丸方五靈脂白附子生用天南星生用乾蠍生用蟬殼各半兩上為末以釅醋二大盞藥末一兩熬成膏入余藥末和勻丸如綠豆大未過百晬乳汁化破一丸二歲以下二丸漸大以意加減丸數並用金銀薄荷湯化下鼻上汗出為效王氏手集治小兒虛風潮搐一捻散方赤足蜈蚣一枚尋脊分開各令為末左右搐入鼻中左邊用左右邊用右王氏手集治小兒一切驚風夜啼搐搦潮發辰砂丹硃砂天麻南星炮殭蠶白芷各一分牛黃腦麝各少許上同末研勻粳米飯丸桐子大每服一粒金銀薄荷湯化下王氏手集治小兒驚風搐搦大驚丸方蛇含一個天麻半兩乳香一分犀角屑半錢真珠末一錢蠍梢四十九個白附子二個蓮心四十九個上為細末粟米粽為丸小雞頭大金銀箔為衣薄荷湯磨下甚者煎乳香湯送下吉氏家傳雄朱丸治驚風潮熱發搐睡臥不穩涎痰滯塞等疾乾蠍白殭蠶炒各半兩天南星炮去皮臍天麻附子炮裂去皮臍硃砂雄黃同硃砂作一處別研和勻各一分上為細末煉蜜和丸如梧桐子大以瓷合貯之每服一丸或二丸金銀薄荷湯化下量兒大小加減與服及治感寒咳嗽等疾或丸如雞頭子大亦得硃砂為衣朱氏家傳治驚搐鼻定命散麝香少許蘆薈蟬蛻瓜蒂蚯蚓蛤粉葶藶子上等分為末吹入鼻中長沙醫者丁時發傳治搐搦方孩兒搐搦漸加頻見母搖頭轉被驚忽爾發時唇眼動面還土色救無因惺惺散白附子一個炮蠍三十個全者輕粉二錢匕殭蠶三個直者白姜二塊皂子大鉛白霜一錢匕蟬蛻七個全者上件為末每服一字或半錢荊芥湯調下長沙醫者丁時發傳硃砂丹治小兒驚風定搐搦主上喘咳嗽硃砂鐵粉乾蠍天麻酒浸半夏湯浸十炮焙乾白姜白附子各一分金箔十四片上為細末蒸棗肉為丹每服一餅或半餅荊芥薄荷湯化下長沙醫者丘松年傳乳香丸治驚風潮搐白附子白殭蠶天南星薑汁製半夏薑汁製琥珀全蠍薄荷自然汁浸一宿焙乾各二分白朮人參各一分烏蛇酒浸取肉半兩以上九味為細末次入真珠末半兩硃砂半兩別研腦麝各一字別研上件一處為細末研令極勻麵糊為丸如梧桐子大每服一丸煎人參蔥白湯化下不拘時候服長沙醫者丘松年傳針頭丸治驚風潮搐韭菜地上地龍一條白頸者佳活放碟子內用輕粉炒一錢摻於地龍上蓋定候地龍死刮下身上粉不用地龍硃砂一錢細研全蠍七個取末上一處研勻乳汁為丸如粟米大每服三五丸量歲數加減煎金銀燈花湯送下長沙醫者毛彬傳蠍梢丸治小兒驚風生涎時作搐搦壯熱驚掣夜臥不安牙關緊急麝香研芎藭羌活各洗天麻洗當歸去蘆膽釀南星半夏湯洗七次薑汁煮一伏時各半兩蠍梢白殭蠶辰砂各一分研一半入藥一半為衣上件同為末研再拌勻糯米清糊為丸雞頭大用一丸荊芥湯化下如口噤用藥擦牙長沙醫者毛彬傳硃砂丸治小兒驚風搐搦涎潮發作睡中不安氣急喘悶硃砂研殭蠶直者各一分乾蠍全者白附子炮人參各一錢半南星半個炮裂銼牛黃麝香研勻各半字上件為末研再拌勻白麵糊為丸如黍米大每服十五丸或二十丸薄荷湯送下無時長沙醫者毛彬傳奪命散治小兒驚風涎潮搐搦眼上不下喘急急慢風搐皆可用赤頭蜈蚣一條去足生用瓜蒂藜蘆去須蔥頭者各一分上件為細末每發搐筆管子抄一字吹入鼻中極妙長沙醫者鄭愈傳治小兒驚搐硃砂散白殭蠶七個腦麝各一字天南星一個硃砂二錢輕粉抄一錢匕上為末每服半錢或一字以金銀薄荷湯調下小兒常服理驚毒狂語第七聖惠論夫心者火也主於血神之所舍小兒蘊積邪熱臟腑壅滯則令氣血不和心神煩亂故夜臥多狂語也嬰童寶鑑云小兒心中有客熱者即睡中語也姚和眾方小孩夜後狂語竹瀝每一歲兒連夜二合服令盡之聖惠治小兒心臟壅熱夜臥狂語及手足多掣犀角散方犀角屑川升麻黃芩柴胡去苗各三分茯神川大黃微炒鉤藤麥門冬去心焙甘草炙微赤銼以上各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五六分去滓量兒大小分減溫服聖惠治小兒心熱多驚睡中狂語煩悶赤茯苓散方赤茯苓龍齒黃芩甘草炙微赤銼鉤藤元參石膏以上各半兩川升麻三分麥門冬一兩去心焙上件藥搗粗羅為散每服一錢以水一小盞入竹葉七片煎至五分去滓量兒大小以意加減聖惠治小兒熱夜臥狂語煩渴黃連散方黃連去須川升麻黃芩犀角屑川大黃銼碎微炒麥門冬去心焙甘草炙微赤銼以上各半兩茯神三分上件藥搗細羅為散每服以竹瀝調下半錢日三四服量兒大小以意加減聖惠治小兒心熱不睡多驚狂語犀角散方犀角屑茯神人參去蘆頭天竺黃研硃砂研川升麻麥門冬去心焙葛根銼子芩黃耆銼羚羊角屑赤芍藥甘草炙微赤銼以上各一分柴胡去苗龍齒細研以上各半兩上件藥搗細羅為末入研了藥都研令勻每服以溫水調下半錢量兒大小臨時加減聖惠治小兒心臟風熱神思恍惚夜多狂語不得安眠牛黃散方牛黃細研飛過白龍腦一錢金箔五十片各細研硃砂細研飛過寒水石各半兩真珠末鉛霜細研犀角屑甘草炙防風去蘆頭黃芩以上各一分上件藥搗細羅為散入研了藥都研令勻每服以蜜水調下半錢量兒大小加減服之聖惠治小兒壯熱心神煩躁夜臥狂語龍腦散方龍腦牛黃並細研各一錢黃連去須一分犀角屑羚羊角屑琥珀末甘草炙微赤銼真珠末鐵粉細研各半兩上件藥搗細羅為散每服用蜜水調下半錢量兒大小以意加減聖惠治小兒心肺積熱黃瘦毛焦睡臥多驚狂語硃砂丸方人參去蘆頭馬牙硝各半兩腦麝細研各一錢牛黃天竺黃各細研麥門冬去心焙犀角屑茯神升麻子芩甘草炙赤銼以上各一分硃砂三分細研水飛過上件藥搗羅為末煉蜜和丸如綠豆大不計時候以溫水研下五丸量兒大小以意加減聖惠又方鉛霜牛黃各半分鐵粉一分上件藥用細研令勻每服以竹瀝調下一字聖惠又方硃砂半兩牛黃一分上件藥同研如面每服以水磨犀角調下一字驚悸第八聖惠論夫小兒驚悸者由心臟壅熱為風邪所乘邪搏於心則令多驚不安驚不已則悸動不定也外臺秘要鉤藤湯療小兒壯熱時氣驚悸並熱瘡出方鉤藤人參蚱蟬炙子芩各一分蛇蛻皮炙三寸龍齒四分碎防風澤瀉各二分石膏一兩碎竹瀝三合上十味切以水二升並竹瀝煎取七合細細服之以瘥為度外臺秘要又方茯神蚱蟬炙各二分人參三分鉤藤一分牛黃兩大豆許研杏仁十二枚去皮研龍齒碎麥門冬去心各四分蛇蛻皮三寸炙末之上九味切以水三升煎取六合去滓下牛黃末分六服消息服之令盡瘥聖惠治小兒心驚悸煩亂茯神散方茯神川升麻各三分龍齒甘草炙微赤銼各半兩寒水石石膏麥門冬去心焙各一兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓入竹瀝半合更煎二沸量兒大小以意加減聖惠治小兒驚悸情思不安人參散方人參去蘆頭甘草炙微赤銼犀角屑各半兩麥門冬去心焙龍骨各一兩茯神三分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓入地黃汁半合更煎一兩沸量兒大小以意加減溫服聖惠治小兒風熱驚悸蚱蟬散方龍齒細研人參去蘆頭各三分鉤藤杏仁湯浸去皮尖雙仁麩炒微黃各二分牛黃二錢細研蛇蛻皮五寸燒灰蚱蟬去翅足微炒茯神麥門冬去心焙各半兩上件藥搗細羅為散入研了藥都研令勻每服以新汲水調下半錢量兒大小加減服之聖惠治小兒身體壯熱驚悸神不寧安心神遠志煎方遠志去心羚羊角屑茯神甘草炙微赤銼杏仁湯浸去皮尖雙仁麩炒微黃紫菀洗去苗土龍骨防風去蘆頭各半兩龍膽去蘆頭蚱蟬去翅足百合牛黃細研麝香川升麻三分川大黃一兩銼微炒酥三兩蜜半斤上件藥先研牛黃麝香二味為粉除酥蜜等二味粗搗用水三升入銀鍋內煎至半升以新綿濾去滓卻入鍋內下牛黃麝香酥蜜等以柳篦不住手攪慢火熬如稠餳方止瓷合內盛每服取兩豆許大用溫水調服量兒大小加減服之聖惠治小兒熱多驚悸晝瘥夜甚象鬼神所著鐵粉煎方鐵粉一兩牛黃細研一分菖蒲三分酥三兩犀角屑人參去蘆頭茯神百合防風去蘆頭川大黃銼碎青黛細研細辛遠志去心芎藭麻黃去根節薯蕷甘草炙微赤銼以上各半兩蜜半斤上件藥先粗搗諸藥用水三升入銀鍋中煎至半升以新綿濾去滓卻入銀鍋內入攪如稠餳收瓷閤中每服以溫水調二大豆許日三四服量兒大小加減服之聖惠治小兒心熱多驚悸金泥煎方金箔七十五片水銀一兩半遠志一兩去心青黛麝香牛黃各一分蚱蟬三枚去翅足虎睛一對微炙酥四兩蜜半斤菖蒲鉤藤龍膽去蘆頭龍齒人參去蘆頭赤茯苓甘草炙微赤銼各三分上件藥水銀金箔同研如泥又別研麝香虎睛牛黃青黛四味如粉其餘藥搗篩為散入銀鍋中先以水二升慢火煎取半升以新綿濾去滓再入鍋內下酥蜜及金泥並研了藥等慢火煎不住手以柳篦攪如稠餳入瓷合內盛每服取二大豆許以溫水調服日三四服量兒大小以意加減服之聖惠治小兒驚悸壯熱黃瘦不思乳食天竺黃丸方天竺黃細研黃連去須柴胡去苗羚羊角屑蔓荊子犀角屑防風去蘆頭子芩川升麻麥門冬去心焙甘草炙微赤銼元參白蒺藜微炒去刺硃砂研木香以上各一分腦麝研牛黃研各一錢上件藥搗羅為末與研了藥都研令勻煉蜜和丸如綠豆大每服以溫水化下五丸量兒大小以意加減聖惠治小兒驚悸壯熱黃瘦發立牛黃丸方犀角屑天竺黃細研白附子炮裂茯神黃連去須羚羊角屑防風去蘆頭元參枳殼麩炒微黃去瓤甘菊花人參去蘆頭黃耆銼甘草炙微赤銼黃芩以上各一分牛黃細研一錢硃砂細研水飛過半兩上件藥搗羅為末入研了藥都研令勻煉蜜和丸如綠豆大每服以淡竹葉湯研下五丸日三四服量兒大小以意加減服之聖惠治小兒壯熱驚悸不得眠睡天竺黃丸方天竺黃細研黃連去須川大黃銼碎微炒牡蠣粉黃芩梔子仁遠志去心以上各半兩上件藥搗羅為末煉蜜和丸如綠豆大每服以新汲水下五丸量兒大小加減服之聖惠治小兒心熱驚悸竹瀝磨犀角飲子方竹瀝二合犀角上件藥將犀角於竹瀝內磨令濃量兒大小分減服之日三四服靈苑抱龍丸解一切熱化風痰治大人小兒風癇驚癇陽毒狂躁及心熱驚悸夜臥不安胸膈壅痰厥頭痛心神恍惚等疾翰林院方天南星一斤生硃砂細研水飛紫石英研飛白石英研飛犀角銼末各一兩牛黃研阿膠銼碎炒如珠子藿香麝香研各半兩金箔五十片雄黃水磨通明者四兩研上件一十一味搗羅細研為末更入乳缽內研如粉以黃牛膽四十五個取汁和丸如櫻桃大每服一丸以鹽一捻和藥細嚼新水吞下如牛膽少以煎水相和諸疾服之心膈清涼如冰雪便覺精神爽快也靈苑辰朱虎睛丸壓驚悸鎮心臟兼治小兒諸驚癇此方柏溫恭進過甚有功效辰錦硃砂白茯苓黃芩山梔子仁人參各一兩虎睛一對用人牛黃腦麝犀角屑各一分鉤藤大黃用濕紙裹煨熟各四兩上件一十二味並搗羅為細末以煉蜜為丸如雞頭肉子大每服一丸至二丸用金銀湯下人參湯亦得多困第九博濟方治小兒久患轉瀉過多脾胃虛弱不進飲食眼澀饒睡脾困散天南星末半錢生用冬瓜子二十七粒上件二味用漿水一盞半同煎至四分空心溫服譚氏殊聖方小兒多睡患心中漸困沉沉轉疾濃乳食昏昏全不吃四肢無力改形容莫怨灶神並家鬼秘錄分明內印風求取真珠琥珀散靈方指授急寬通琥珀散琥珀末真珠末各一分硃砂鉛白霜各半分紅芍藥一分半上為末每服一字金銀薄荷湯下保生信效方蘭臺散治小兒骨蒸勞熱骨肉五心煩躁又大病後或大下後多睡或全睡烏梅肉一兩焙乾蛇黃二兩醋淬二十遍上同為末每服二錢以虀汁調下若小兒睡起不了了者此為神不聚此能收斂之鳳髓經神白散治小兒脾困冷瀉多睡不醒嘔逆心悶亂喉內生涎神麯炙人參茯苓藿香葉甘草炒黃耆蜜炙各一分白附子炮一錢大附子一個炮去皮尖上為細末每服半錢紫蘇湯調下趙氏家傳六神湯治小兒因病氣弱或因吐瀉胃虛生風精神沉困不思乳食時時欲吐養氣補虛進食人參白朮白茯苓乾山藥綿黃耆炙刮去皮細銼各一兩甘草炙半兩上為細末每服半錢白湯點服吉氏家傳治瀉後脾胃虛四肢逆冷眼慢多困心躁吃水惺脾散冬瓜子去殼一兩桑白皮硫黃生各半兩膩粉上四味同研勻和每服半錢至一錢煎冬瓜皮湯調下日進四服服後體熱可困良久瀉疏且住卻服蘆薈丸方見疳瀉門中朱氏家傳治脾積冷多困醒脾散天南星一兩大麥糵白附子良薑用水煮天南星煮乾盡用南星去良薑以水一盞煮乾焙各一兩草果子去皮用麵裹煨香二兩上為末每服半錢用冬瓜子煎湯調不去瓜子服長沙醫者鄭愈傳治小兒驚風耽睡然後取下驚涎睡驚丸龍腦半錢硃砂二錢京墨青黛蘆薈各二錢半使君子七個膩粉二錢牛黃一字麝香半字乾蠍三個金銀箔各五片為衣上為末以寒食麵糊丸如梧桐子大金銀箔為衣二歲五歲以上二丸薄荷湯化下
