body:
  text: 卷第八驚疾潮發凡九門驚候第一巢氏病源驚候小兒驚者由血氣不和熱實在內心神不定所以發驚甚者掣縮變成癇又小兒變蒸亦微驚所以然者亦由熱氣所為但須微發驚以長血脈不欲大驚大驚乃灸驚脈若五六十日灸者驚復更甚生百日後灸驚脈乃善耳小兒形證論五臟驚傳候一肝臟驚風令小兒非時竄上眼睛手腳冷二腎臟驚風令兒齧齒面色赤三脾臟驚風令兒夜啼白日多睡四心臟驚風令兒發心熱四肢逆冷五肺臟驚風令兒口內熱喘出氣細微五臟驚邪皆因驚風傳受緣初驚有涎涎在膈上不發或即涎潮臟腑入驚邪也日久不醫致傳邪氣入於心肺或傳肝脾腎等也卻被巫師皆言有祟妖禍求神漸加深重即令小兒枉喪性命雖有名方千道須曉病源今具傳入五臟於左一驚邪入脾鄭沖虛云令兒非時噴乳嘔逆翻吐不思飲乳故成慢驚也二驚邪入心周奇云令兒非時面上赤紅惡叫四肢緩慢故成慢驚也三驚邪入肝鄭沖虛云令兒眼目上翻眼多白睛上竄引飲故驚癇也四驚邪入腎趙氏云令兒忽然面上黑色惡叫咬人故驚啼也五驚邪入肺崔氏云令兒夜多虛汗狂言亂叫或傳下利是虛驚也惠眼觀證論小兒驚候急驚者本內有風熱面色紅赤又因乳母不自調攝酒食過度或湧乳飲兒或涎停膈中或風感身內故中此疾遍身壯熱吊上眼睛四肢搐搦牙關不開胎驚者在母胎內八九月時母曾中驚胎納邪氣傳之心臟發時亦壯熱吐涎眼帶翻張此候生一月日或半月後發慢驚者榮衛皆受邪氣面無血色臟腑久冷或瀉或吐或自驚撲因而成之惠眼觀證論小兒元有驚候白日多睡遍身虛汗是驚氣納脾喘氣微細是驚氣傳肺無故咬奶是驚氣傳腎非時忽然眼睛吊上是驚氣在脾夢裡多咬牙是驚氣在骨夜啼至曉是驚氣傳心面色非時紅赤是驚氣在心上喘吃水是驚氣在肝惡聲啼叫是驚氣在腎前後心及四肢熱是驚氣傳脾欲吐瀉凡小兒驚風切忌爪甲青黑及吐出白蟲有血瀉下啼叫無淚與夫眼直半開半閉兼亦咬人時復鴉聲皆不可用藥嬰童寶鑑驚癇死候項軟無力魚口開氣粗喉中如鋸頭不直面紅如妝目陷無光齧衣並咬人兩目似開不開瀉下如瘀血身體若無筋骨胎驚第二張渙論嬰兒在母胎中之時腑臟未具神氣微弱動靜喘息莫不隨母母有所動胎必感之母若調攝失宜食飲不節喜怒不常坐臥當風遇酒房勞一切禁忌致生下兒形多怯弱頭顱開解或乳食失理洗浴當風則令兒壯熱吐哯心神不寧手足抽掣身體強直眼目張反此乃胎驚風病也石壁經三十六種胎驚候歌未出胎中一月來母驚成患子臨胎腰直哭時先口撮面青拳搐縮雙腮眼閉咬牙筋脈急鳳髓經云眼閉膠生注云眼有眵此是受氣之時若陰氣弱則胎易驚而落也陽氣弱則胎難驚而落也陽弱則手足細肌肉瘦陰弱則肉消甚然皆不能盡其天年若日月滿因驚而落者使口撮腮臉起如拳鼻多塞口噤不開甚不可作驚風醫先當微發汗次治驚調氣乳母當服調氣藥孩兒貼囟門去邪任喚千聲眼不開醫者見形須問母方知此患所從來退卻風涎為治療涎去驚邪自不回失次則目瞑不開若先治驚則作吐或瀉在秋夏必作脾風始初見之亦不可作脾風治恐汗不出而作別候也鳳髓經云歌括一同仍注云與烏犀膏次與生銀丸二方與玉訣同並見急慢驚風門中小兒形證論四十八候胎驚歌一同後說云此患在胎中時母受驚生下後二十五日發是也若不定或三十五日別日者不是胎驚醫人不識多作驚風誤矣目閉腰直腮縮拳握只與蛜𧌴丸下涎方見一切癇門中或下半丸大青丹方見急慢驚風門中飛仙論胎驚候說云凡母懷胎之日曾受驚氣傳入胎中致孩兒生下青紅色口唇時動夢裡多驚五心常熱囟門不合動多驚叫身體壯熱此胎驚候也顱囟經治小兒胎驚及癇或心熱牛黃丸牛黃龍齒馬牙硝鐵焰粉各一分上為細末煉蜜丸如梧桐子大每日乳食前熱水調破一丸灌下令母忌口張渙治胎驚聖星丹方凡諸癇皆宜服之曾經大效天南星揀四十九個一般大者五月五日取活蠍四十九個用瓦器內盛之以鹽泥固濟吊於靜室中至臘日取出揀天南星蠍螫著處有小竅子者其餘不用只將蠍螫天南星以酒浸一宿焙乾研為細末次用好辰砂一分細研水飛真牛黃麝香龍腦各一分細研上件再一處研拌勻用生薑汁和如梧桐子大每服一粒至二粒煎人參薄荷湯化下神驗張渙治胎驚白金散方又治諸癇潮發不醒者好白殭蠶半兩揀淨湯洗炒微黃色搗羅為細末次用真牛黃一錢麝香龍腦各半錢並細研天竺黃一分細研上件同拌勻每服半錢用生薑自然汁調放溫灌張渙治胎驚烏金膏又治胎癇潮發頻並烏梢蛇一條水浸去皮骨酒浸一宿焙乾蠶紙一張燒灰蟬殼全蠍各半兩以上為細末次用好硃砂半兩細研水飛金箔二十片細研龍腦麝香細研各半錢上件一處研勻煉蜜和成膏如皂皂大每服一粒煎人參薄荷湯化下張渙治胎驚太一散方凡病瘥亦宜常服天漿子乾者微炒乾蠍梢各二十一個防風銼天麻各半兩以上搗羅為細末次用硃砂半兩細研水飛麝香一錢細研上件再細研每服半錢乳汁調下張渙治胎驚天南星煎方又治胎癇潮發遲省天南星微炮白附子白花蛇酒浸洗去皮骨炙令黃各一兩乾蠍炒天麻各半兩以上搗羅為末用好酒兩大盞攪令勻於慢火上熬不住手攪以酒盡為度次用硃砂半兩細研水飛膩粉一分牛黃麝香龍腦各半錢並細研上件都入膏子內一處和看硬軟成膏如皂皂大每服一粒取竹瀝化下不計時候張渙治胎驚祛風散方又治胎癇多啼叫胡黃連半兩取末全蠍取細末犀角屑取末天竺黃別研麻黃各一分去節上件都研令勻細末每服半錢研入麝香一字乳汁調下張渙治胎驚鐵粉散方若驚風或多面赤口乾大便不利尤宜服鐵粉半兩研鬱金研牛黃研真珠末別研胡黃連取末各一分上件拌勻研細每服一字溫蜜湯調下張渙治胎驚羌活方又治胎癇昏困不省羌活獨活各一兩天麻全蠍人參去蘆頭白殭蠶微炒各半兩烏蛇肉一兩酒浸一宿焙乾上件搗羅為細末煉蜜和成膏每服一皂皂大用麝香荊芥湯化下張渙治胎驚麝香膏方又治胎癇不得安臥麝香研牛黃研白附子取末蠶蛾微炒取末白殭蠶微炒取末各一分全蠍二十一個取末上件都拌勻研細煉蜜和膏如皂皂大每服一粒煎人參荊芥湯化下張渙治胎驚銀硃丹方又治胎癇昏困涎盛乾蠍微炒天漿子微炒露蜂房各一分微炒以上三味搗羅為細末次用硃砂半兩細研水飛水銀一分用黑鉛一分同結為砂子細研牛黃細研麝香細研各一錢上件都一處拌勻研細用白麵糊和如黍米大每服五粒煎金銀薄荷湯化下乳後三十六種治胎驚硃砂膏硃砂粉霜輕粉水銀砂子各一錢乳香牙硝各半錢上為末入麝香少許棗肉為膏如皂角子大前胡湯化下孔氏家傳治小兒胎驚涎盛不飲乳半夏一枚炭火內炮令黃色研令細生薑自然汁取為丸如粟大乳汁下一丸無時服之王氏手集如聖消驚丸方治新生兒在胎中之時其母宿挾驚憂喜怒舉動驚胎致兒生後常饒驚悸眼睡不穩精神恍惚搖頭上視溫壯多睡反折啼叫口眼相引羚羊角屑犀角末麝香各一分牛膽囊天南星四兩天麻人參白茯苓各一兩白殭蠶炒全蠍炒各半兩硃砂一兩三錢半龍腦一錢上件為細末煉蜜為丸一兩作八十丸一方加硃砂一兩牛黃一分每服一丸麝香湯化下兒小塗乳上令吮之常服消磨一切驚癇驚熱第三聖惠論夫小兒驚熱者由血氣不和熱實在內心神不定所以發驚甚者掣縮變成癇也又小兒變蒸亦微驚所以然者亦熱氣盛所為者也顱囟經治孩子驚熱入心擬成癇疾面色不定啼哭不出潮熱無度不吃乳食大假眼翻露白手足逆冷呼喚不應牛黃丸牛黃研大黃獨活各一分升麻琥珀炙別研綠豆粉大麻仁別研各半兩上為末蜜丸如梧子大空心熟水下一丸頓服之食後再服一丸至十歲加金銀箔各五片忌爆炙毒物外臺劉氏療小兒眠睡不安驚啼不吃乳虎睛丸方小兒熱甚效犀角十二分屑聖惠用一兩子芩二分聖惠用半兩梔子仁十分聖惠用半兩大黃十分聖惠用半兩虎睛一枚聖惠用二枚上五味搗篩蜜和如梧桐子大每服七丸大小量之乳母忌熱面小兒熱風癇以乳汁或竹瀝研三丸服之漸增以瘥為度小兒百日以下蓐內壯熱以奶汁研四丸與服即瘥陶隱居治小兒驚熱時氣煩悶止渴瓦屋上青苔衣名屋遊剝取煮服之陶隱居本草療小兒驚熱取雞子煎用發雜熬良久得汁與兒服陳藏器本草治小兒心熱驚癇止消渴除痰唾荊木取莖截於火上燒以物盛取瀝飲之良食療治小兒驚熱犀牛角可以水磨取汁與小兒服聖惠治小兒夜啼多驚煩熱牛黃丸方牛黃細研入硃砂細研入蘆薈細研麝香細研龍齒細研當歸銼微炒赤芍藥鉤藤蝸牛麩炒令黃代赭牡蠣燒為粉各一分白殭蠶半兩細研上件藥搗羅為末入研了藥令勻煉蜜和丸如麻子大一月及百日兒每服用薄荷湯下三丸半年至一歲兒每服五丸連夜三服量兒大小加減服之聖惠治小兒驚熱睡臥不安筋脈抽掣宜服犀角散方犀角屑人參去蘆頭茯苓黃芩甘草炙微赤銼各半兩龍齒麥門冬去心焙各半兩上件藥搗粗為散每服一錢以水一小盞煎至五分去滓入生地黃汁半合不計時候量兒大小分減服之聖惠治小兒驚熱鉤藤散方鉤藤蟬殼微炒馬牙硝黃連去須甘草炙微赤銼川大黃銼微炒天竺黃細研以上各等分上件藥搗細羅為散每服半錢以水一小盞煎至五分去滓不計時候溫服量兒大小以意加減服聖惠治小兒驚熱心神煩亂手足縮掣不定龍齒散方龍齒細研犀角屑茯神人參去蘆頭赤石脂各一兩牛黃細研蟬殼微炒各一分黃芩牡蠣粉川升麻各三分上件藥搗細羅為散不計時候以荊芥薄荷湯調下半錢量兒大小加減服之聖惠治小兒驚熱煩悶天竺黃散方天竺黃細研甘草炙微赤銼川大黃銼碎微炒馬牙硝各一兩膩粉藿香各一分蒲黃半兩上件藥搗細羅為散不計時候以熟水調下半錢量兒大小加減服之聖惠治小兒驚熱下瀉不定兼渴龍齒散方龍齒蘆薈硃砂以上各細研黃連去須赤石脂鐵粉牡蠣燒成粉各一分上件藥搗細羅為散都研令勻不計時候以溫水調一字聖惠治小兒驚熱心煩不得睡臥龍腦散方龍腦細研麝香細研各半錢甘草炙微赤銼牛蒡子微炒梔子仁馬牙硝細研鬱金各一分牛黃細研半分上件藥搗細羅為散不計時候以溫薄荷湯調下半錢量兒大小以意加減聖惠治小兒驚熱煩躁不得眠臥虎睛散方虎睛一對酒浸炙令微黃蘆薈細研硃砂細研黃連去須鐵粉赤石脂牡蠣粉各一分上件藥細羅為散都研令勻不計時候以暖水調下半錢量兒大小以意加減服之聖惠治小兒驚熱煩躁手足抽掣心悸宜服茯神散方茯神龍齒川升麻犀角屑各半兩寒水石石膏細研水飛過各一兩牛黃半分細研上件藥搗細羅為散不計時候以竹瀝調下半錢量兒大小加減服之聖惠治小兒驚熱心神煩悶硃砂散方硃砂細研水飛過鐵粉各半兩遠志去心為末馬牙硝膩粉牛黃各一分龍腦麝香各半分上件藥都細研如粉不計時候以冷水調下半錢看兒大小以意加減聖惠治小兒驚熱客忤煩悶牛黃散方牛黃一兩細研麝香半兩細研雄黃細研硃砂細研子芩梔子仁人參去蘆頭川大黃銼碎微炒肉桂去粗皮甘草炙微赤銼各一分龍腦半分細研虎睛仁一對細研上件藥搗細羅為散入研了藥更研令勻不計時候以薄荷湯調下半錢量兒大