武火消令勻勿令太過研細慢火炒黃色陳皮不去白各二兩太陰玄精石一兩上件為末水煮麵糊為丸如梧桐子大小兒如麻子看大小加減服之茅先生小兒慢驚風睡驚膏方青黛末好者半錢次一錢匕全蠍二七個川巴豆七片湯浸去皮心膜又用冷水浸一宿紙揩乾輕粉重半錢水銀重一錢上以棗肉四個研殺水銀星盡可入前藥都為末研成膏用單裹角周歲用丸如此大看兒大小加減用之用童子小便和酒磨此藥灌下如兒子牙噤口不開卻將藥三二滴滴入鼻中其口自開便灌下藥不久通下涎來便依形候次看病用藥茅先生小兒慢驚風下涎後伏熱不退回陽大附散退伏熱方大附子炮人參前胡桔梗去蘆頭各半兩木香一分上為末每服半錢用薑湯調下錢乙栝蔞湯治慢驚方枯簍根末二錢白甘遂末一錢上同於慢火上炒焦黃研勻每服一字煎麝香薄荷湯調下無時錢乙宣風散治慢驚方檳榔二個橘皮甘草炙各半兩牽牛四兩半生用半炒熟上為細末三二歲蜜湯調下半錢以上一錢食前錢乙溫白丸治小兒脾氣虛困泄瀉瘦弱冷疳洞利及因吐瀉或久病後成慢驚身冷瘛瘲方天麻生半兩白殭蠶炮白附子生乾蠍去毒天南星銼湯浸七次焙各一分上同為末湯浸寒食麵為丸如緑豆大丸了仍於寒食麵內養七日取出末及養七日合成便服之每服五七丸至三二十丸空心煎生薑米飲漸加丸數多與服錢乙治小兒吐瀉或誤服冷藥脾虛生風成慢驚方大天南星一個重八九錢以上者良上用地坑子一個深三寸許用炭火五斤燒通赤入好酒半盞在內然後入天南星卻用炭火三兩條蓋卻坑子候天南星微裂取出銼碎再炒勻熟不可稍生於冷為細末每服半錢或一字量兒大小濃煎生薑防風湯食前調下無時錢乙又方半夏一錢湯洗七次薑汁浸半日曬乾梓州厚朴一兩細銼上件米疳三升同浸一百刻水盡為度如百刻水未盡少加火熬干去厚朴只將半夏研為細末每服半字一字薄荷湯調下無時錢乙鉤藤飲子治吐利脾胃虛風慢驚方鉤藤三分蟬殼防風去蘆頭切焙人參切去須焙麻黃去節稱白殭蠶炒黃天麻蠍尾去毒炒各半兩甘草炙川芎各一分麝香一錢別研入上同為細末每服二錢水一盞煎至六分溫服量多少與之寒多者加附子末半錢無時錢乙羌活膏治脾胃虛肝氣熱盛生風或取轉過或吐瀉後為慢驚者亦治傷寒用無不效羌活去蘆頭川芎人參切去須赤茯苓去皮白附子炮各半兩天麻一兩白殭蠶酒浸炒黃乾蠍去毒炒白花蛇酒浸取肉焙乾各一錢川附子炮去皮臍防風去蘆頭切焙麻黃去節稱各三錢豆蔻肉雞舌香母丁香也藿香葉沉香木香各二錢輕粉一字珍珠末麝香牛黃各一錢半龍腦半字雄黃辰砂各一分以上七味各別研入上同為細末熟蜜丸劑旋丸大豆大每服一二丸食前薄荷湯或麥門冬湯溫化下實熱急驚勿服性溫故也服無時古今論雞舌香者同異紛紛或以為番棗核或以為母丁香互相排抵竟無定説孝忠以謂最為易辨所以久無定説者惑於其名耳古人命藥多以其形似者名之如烏頭狗脊鶴蝨之類是也番棗核母丁香本二物以其皆似雞舌故名適同凡藥物名同實異如金櫻地錦之類不足怪也如雞舌香二種各有主療番棗核者得於乳香中今治傷折藥多用之母丁香即丁香之老者極芳烈古人含雞舌香乃此類也今治氣溫中藥多用之所謂最為易辨者如此張渙麝香餅子方治慢驚因吐痢生風及心肺中風尤宜服之川烏頭炮去皮臍天南星炮乾蠍梢白花蛇酒浸一宿去皮骨焙乾各半兩干赤頭蜈蚣二條酒浸酥炙黃以上並搗羅為細末次用硃砂細研水飛鐵粉乳香牛黃並細研各一分好真麝香半兩另研上件都一處研細拌勻酒煮白麵糊候冷和為餅子如雞頭大每服一粒至二粒煎人參薄荷湯化下量兒大小加減張渙烏梢丹方治慢驚因吐利後生風及心肺中風尤宜服之烏梢蛇二兩水浸去皮骨天麻白附子干全蠍人參去蘆頭半夏湯洗七次川附子炮裂去皮臍天南星微炮防風銼各一兩天漿子二十一個微炒上件十味一處用好酒浸二宿取出焙乾搗羅為細末次用水磨雄黃辰州硃砂各一兩同細研水飛焙乾同上件藥十味一處拌勻入麝香二錢生龍腦一錢研勻細糯米飯和丸如黍米大每服七粒至十粒或十五粒煎金銀薄荷湯下神驗量兒大小加減張渙螵蛸膏方治慢驚久不瘥真桑螵蛸七個炒微黃天麻半兩白殭蠶揀直者微炒蠍梢麻黃去根節各一分以上搗羅為細末次用硃砂半兩細研水飛乳香一分研硼砂研麝香各一錢龍腦半錢上件都一處拌勻煉蜜和成膏如雞頭大用金箔裹之每服一粒煎荊芥薄荷湯化下張渙青金膏方治吐利生風變成慢驚白附子烏蛇梢肉酒浸一宿焙乾乾蠍梢天麻青黛研各一分川附子一枚炮去皮臍麝香天竺黃各研一錢上件先將烏蛇梢肉等五味先搗為細末次入青黛麝香天竺黃三味拌勻煉蜜成膏如皂皂大煎人參薄荷湯化下張渙大青丹方治慢驚潮發荏苒不瘥蠍蛸白附子白殭蠶炒炙木香檳榔各一分干蝦蟆二個燒灰以上搗羅為細末次入青黛續隨子各研一分上件同諸藥一處拌勻用糯米飯和丸如黍米大每服十粒點麝香薄荷湯下量兒大小加減張渙寧眠散方治慢驚潮搐不得安臥天南星炮裂人參去蘆頭白附子各半兩乾蠍二十一個干赤頭蜈蚣一條酒浸酥炙微黃以上搗羅為細末次用乳香血竭各研一分上件同諸藥拌勻每服一字至半錢用好酒少許浸薄荷煎湯調下每兒潮搐服之得眠睡是驗次用辰砂膏相兼服之張渙辰砂膏方治慢驚潮搐昏困甚者大附子一個重六七錢以上者炮去皮臍去頂刻一孔竅子入粉霜硇砂霜各半錢入孔竅中卻用取下附子末填滿竅子用木炭火燒存性次用天南星半兩炮裂蠍梢羌活各一分上件同搗羅為細末次用好硃砂半兩細研水飛入諸藥內同拌勻煉蜜成膏和如雞頭大每服一粒至二粒點麝香薄荷湯入酒三二點同化下張渙寸金散方吐痢後生慢驚風及心肺中風尤宜服之蛇頭一個酒浸焙乾干全蠍麻黃去根節各一錢赤頭蜈蚣一條酥炙草烏頭一枚炮削去皮上件搗細羅為末每服一字入龍腦半字同溫酒調下量兒大小加減張渙妙聖散治小兒慢驚風久不瘥兩手搐搦不定干赤頭蜈蚣一條蔥汁浸一日一夜焙乾草烏頭尖二七個薄荷生薑自然汁浸一日一夜焙乾同搗羅為末麝香一錢龍腦半錢以上二味各研細入前藥拌勻上件都為末拌勻每用半字以筆管吹入兒兩鼻中候兩手定方可兼服諸驚風藥九籥衛生薰陸香丸療小兒虛風慢驚潮搐瘛瘲安神魂益心氣方血竭半兩乳香一分上件同研細火上炙為丸干時滴水丸如酸棗大每服一丸薄荷酒化下兼理婦人産後血暈不省人事旅舍備用鉤藤飲治小兒吐痢後臟虛慢驚手足時瘛瘲多睡眼上視乳食不進方鉤藤鉤子三分芎白殭蠶去嘴炒蟬蛻去足各半兩蛇皮甘草各炙一分蜣螂五枚炙去頭翅足附子炮去皮臍半兩上為末每服二錢水一盞煎至六分去滓溫分三服急驚有熱證去附子不用萬全方治小兒慢驚風及天瘹驚熱保命丸方牛黃腦麝青黛硃砂各研乾蠍白殭蠶蟬殼各微炒天麻白附子炮犀角屑天南星炮裂漿子麩炒令黃去瓤各一分蟾酥半分研入上件搗羅為末用獖豬膽汁和丸如緑豆大每服三丸薄荷湯下又以水化二丸滴入鼻中令連連嚏後再服更臨時量兒大小以意加減萬全方治小兒慢驚風四肢搐搦熊膽丸熊膽五靈脂別研杵為末飛過附子天南星乾蠍三味生用以上各半兩蟬殼去頭足生用一分上件搗羅為末以百沸湯化熊膽五靈脂二味入銀器中熬成膏和入余藥末丸如緑豆大未滿月兒以乳汁化破一丸二歲以下二丸漸大以意加之汗出為效石壁經三十六種治慢驚先宜用解表散方荊芥杏仁去皮尖或炒黃色別研各半兩京芎二錢麻黃去節防風甘草炙各半兩赤茯苓半兩或三錢半上為末每服一錢蔥白三寸薑三片水一盞煎三五沸連進二服汗出避風或煎此湯調下如常服蔥湯下半錢慢驚用平涼藥便宜審細石壁經三十六種慢驚將發用白朮麻黃散方白朮炮乾葛各一分麻黃半兩去節上件為末每服半錢荊芥湯下服後忌衝風須有汗如水出再進一二服如困睡不省即宜下琥珀散又琥珀散方上色硃砂真珠末芍藥鉛白霜上等分為末每服半錢薄荷湯調下石壁經三十六種慢驚風正發用治心煩噦惡方人參甘草炙木香沉香藿香葉白朮各一分上件為末每服一錢飯飲調下鳳隨經白鶴丹治小兒慢脾風不醒四肢冷不食嘔逆漸生風疾白花蛇肉半兩酒浸去皮骨炙黃焦白附子生用兩個白殭蠶去絲天南星去皮紅酒煮天麻輕粉各一分上為末法酒煮麵糊為丸如此大薄荷湯入酒一滴化下慢驚用銀粉藥宜審用之惠眼觀證甘乳散定慢驚風搐搦先用乳香甘遂藥壓涎定搐凡慢驚風未敢下涎且用此二藥煎服待涎不聲不搐方通利其方在搐搦門白附子川烏頭並燒存性各一錢先各以一兩可燒得二錢硃砂硼砂各一錢腦麝各少許上為末薄荷湯調下一錢至二錢國醫李安仁傳酒煎附子四神丹治小兒慢驚又治一切虛冷之疾升降陰陽順正祛邪消風冷痰涎散結伏滯氣通利關節破瘀敗凝澀奔沖矢經之血接助真氣生續脈息補腎經不足利膀胱小腸祕積固氣定喘止逆壓煩躁養胃氣療五臟虧損下虛上壅胸中痰飲臍腹冷積奔豚氣衝上下循環攻刺疼痛脾寒冷汗中風痿痹精神昏亂霍亂吐瀉手足逆冷陰毒傷寒四肢厥逆形寒惡風響暗睡臥乍靜乍亂婦人産後諸血氣逆潮迷悶欲絶赤白帶下崩漏不止應久新諸病未能辨別虛實冷熱證候用藥未效悉宜此藥分勻陰陽氣正便遂安和至不得已詳證乃服水窟雄黃雌黃辰砂透明硫黃上四物各半斤並別研水飛過滲干再同研勻用燒藥合子一個看大小用臨時先以牡丹根皮燒煙燻合子令釅煙氣黑黃色入前四物在內約留離合子口下及一指以醋調臘茶作餅子蓋定與口子口縫平用赤石脂泥固濟合子用合蓋之令岩卻用紙筋鹽泥通裹合子固濟約厚一指放令極干初用炭火燒熱次加少火燒令通赤常約令火五斤以來漸漸添火氣小卻添至五斤以來照顧勿令炭厚薄不一可添至三稱得濟去火漸令冷入在地坑內深一尺以上用好黃土蓋之候三日取出打破合子取藥細研約三十兩別人胡椒末萆撥末各七兩真赤石脂末三兩好官桂心末六兩附子及六錢以上者炮去皮臍取末十二兩以好法酒一斗熬至三升然後入附子末為糊和前藥上丸如雞頭肉大留少酒膏恐藥干候乾輕病每服一粒重病二粒至三粒米飲湯下空心食前溫酒鹽湯亦得小兒吐瀉慢驚研一粒米飲灌下如有固冷陳寒宜常久服餌如病安愈不得多服如覺熱渴即加木香桂末一錢同和服之趙丞相云此方得之國醫李安仁安仁云此藥比之四神丹尤為有造化也張氏家傳治小兒慢驚方活大馬閘一條明底經三伏者中使直者蜈蚣一條只用上截半條活死皆可上二味用藏瓶一個盛在內泥固濟火燒存性殺研細用麝香薄荷米泔水只作一服立效小兒量多少加減張氏家傳治中風及腳氣痹弱不能轉側兼治小兒慢驚小續命湯方麻黃湯炮三次焙乾桂枝甘草炙各半兩防風一分半赤芍藥白朮人參川芎附子炮裂去皮臍防己黃芩各一分上銼如麻豆大每服五錢以水一盞半煎至一盞去滓取八分清汁入生薑汁再煎兩沸溫服日二服夜二服若柔疾自汗者去麻黃夏間及病有熱者減桂枝一半冬及始春去黃芩張氏家傳小兒慢驚虛風羌活膏方羌活獨活人參茯苓防風官桂乾蠍全硫黃水銀以上各半兩麝香少許上件八味為末後將硫黃於銚子內熔汁入水銀拌和勻研為細末再研細煉蜜為膏每服皂子大荊芥湯化下莊氏家傳治小兒慢驚風有虛積軟金丹方胡黃連末青黛蘆薈香墨並研各一錢膩粉半錢使君子末五個天漿子末三個麝香一字上件為末同研如粉煉蜜為丸如雞頭大每服一丸薄荷湯化下孔氏家傳睡驚丸治慢驚方中有睡驚丸甚多此所犯之藥迥不同白附子末蟬殼末各挑一錢匕天麻末硃砂末大附子炮裂去皮臍為末青黛末天南星以白礬湯浸一宿焙乾為末雄黃末全蠍去尖毒為末各挑半錢七麝香別研半字匕腦子一字匕別研入藥上件一十一味同研令勻入飛羅面少許滴冷水為丸如此大每服一丸以薄荷湯磨破化下孔氏家傳硫黃丸治陰癇有二等小兒小便澀則硫黃丸入一分茯苓若小便不澀只一味硫黃也孔氏家傳解小兒一切傷風及慢驚脾風膏方天麻酒浸一宿切焙為末硃砂別研人參末川芎末各一錢乾蠍梢炒為末白殭蠶直者炒為末各三七個牛黃龍腦各別研一字麝香別研半錢上件九味一處又研勻煉蜜為膏每服半皂子大荊芥蔥湯化下神妙孔氏家傳小兒慢驚脾風取涎上用天南星不拘多少為末用竹瀝油調下喉涎自出趙氏家傳治小兒慢驚方上用天南星一個酒浸四十九日取出用活蠍四十九個逐個將天南星令蠍螫至蠍困即以候遍切作片子慢火焙乾研成末每服一字薄荷湯化下趙氏家傳羌活膏治小兒胃虛生風變成陰癇憂齒肉蠕目澀饒睡又療傷風壯熱寒壅風熱鼻塞呵欠精神不爽羌活獨活天麻炙川芎人參茯苓各一兩幹家薄荷直殭蠶炒各半兩全蠍一分防風一兩半上為細末煉蜜和成膏每服一皂皂大用荊芥乳香煎湯化下荊南太醫錢祐方趙氏家傳溫驚丸治小兒陰癇諸證方天南星一個炮香白芷如天南星炙京墨天南星三分之一燒過麝少許上為末糊丸作小餅如大薄荷湯化下丸了外以銀箔或金箔裹之吉氏家傳治慢驚風牛黃膏方牛黃半字棘岡子七十個去殼生硃砂半錢輕粉一錢匕上末用棘岡子肉研為膏丸如芥子大每服三丸芥菜湯下吉氏家傳治小兒慢驚饒睡眼不開方鉤藤防風去蘆各一錢蟬殼半兩蠍梢硃砂各半錢麻黃一分去節麝少許上件末每服一字或半錢煎薄荷湯調下大小加減吉氏家傳治慢驚風喉內有涎辰砂散方蛇黃一個火內煅醋淬用一錢為末白雞糞鼠屎白丁香各一錢燒為末上都入乳鉢內研勻每服半錢麝香湯調下三歲以上麝香酒調下不過三服涎必下若涎不下難治吉氏家傳治慢驚風化涎牛黃散方牛黃二錢硃砂雄黃各一錢南星一個水二盞生薑一塊槌碎同煮去薑金銀箔各五片輕粉抄一錢匕麝香半字上為細末每服一字薄荷湯調下吉氏家傳治吐瀉傳成慢驚醒脾散方厚朴一兩細銼用水一盞硇砂一豆許用水煮取出焙乾稱一錢草果子一個麵裹煨去皮及面人參茯苓各一錢甘草炙陳皮去白各半錢白豆蔻一個上末每服半錢冬瓜子煎湯調下棗湯亦得陶善化傳治小兒慢驚方上用貓糞少許燒為末以麝少許米飲下趙氏家傳治小兒慢驚萬安散方亦治慢脾風全蠍七個以生薑自然汁浸好硃砂半錢別研麻黃一錢揀細直者生薑自然汁浸薄荷原生者以生薑汁浸開每蠍一個以薄荷七葉裹遍以麻黃經系竹筋夾炙令黃色厚朴二錢去蘆頭皮生薑自然汁制白朮一錢用水七分一盞銀石器熬盡水片開焙乾上各持制了為細末再入硃砂研細新生兒半錢周晬以上一錢量兒大小加減日三服並用金銀薄荷湯下安師傳治小兒慢驚風藥方上先研臘茶一誇入生腦子半錢以湯點八分一盞用鐵杓一枚盛定將蛇黃一個於火邊頃放候炙極熱入杓內茶中淬再三至茶盡研為細末金銀薄荷湯調下一歲以下半字一歲以上一字長沙醫者丁時發傳治脾風方並歌孩兒驚久積涎生傳入脾家事不輕忽發如雷風雨勢去涎方可得安寧粉霜丸慢驚用銀粉須審用粉霜真珠末各半錢硃砂半夏生薑汁浸各一分白附子一個炒蠍十四個全者水銀一錢結砂腦麝各少許上件為末蒸餅心為丸如此大每服三丸淡薑湯吞下大小加減長沙醫者丁時發傳治慢驚方夜啼多熱無精彩口沫涎生病不消除病莫過靈藥治睡驚丸子鎮三焦睡驚丸青黛三錢殭蠶乳香天南星各半錢蠍十四個硼砂蘆薈各一錢半使君子七個輕粉硃砂各一錢龍腦薄荷一分京墨少許巴豆三個腦麝各少許上件為末蜜丸看大小金銀煎湯化下長沙醫者丘松年傳醒脾散治小兒慢驚脾困及大患後全不進乳食方大天南星一兩每一個銼作五六塊用生薑一兩切作片厚朴一兩銼碎水三升煮令南星透揀去厚朴生薑只用南星薄切焙乾冬瓜子一百二十粒鄭愈方用三十粒白茯苓半兩上為細末每服一錢水半盞生薑一片煎三分溫服或用蟬殼煎湯調下亦得長沙醫者李剛中傳治小兒因虛陰證慢驚或慢脾風藥方附子一個重六錢以上或六錢者方可用頂上剜一竅入硇砂半錢在竅中覆以附子末填竅令實不去皮臍於淨地上取一竅如附子大入附子在地竅中以土築實上以灰火一碗許蓋之次以炭火三五莖於灰火上盤飯間量附子得處為度候地冷方取出附子去皮同硇砂一處為細末防風二錢半為末全蠍為末白殭蠶直者去絲土微炒為末各四十九個明淨乳香一錢半別研為末上六味細末和合作一處入乳鉢中細細研極勻周歲以下服半平錢半歲以下嬰孩服一字周歲以上者服半平錢以上或一小平錢量輕重加減與服並用乳香湯調下長沙醫者鄭愈傳安心丸治小兒慢驚方附子一兩炮裂去皮臍全蠍半兩炒上件為末麵糊為丸如黃米大硃砂為衣每服二十丸米飲下長沙醫者鄭愈傳治小兒慢驚方附子炮去皮臍白附子生全蠍炙熟各一個蜈蚣一條炙熱上件為末用麻黃不計多少去節為末酒煮麻黃成膏和藥為丸如雞頭大一歲一丸二歲二丸用溫酒化下長沙醫者鄭愈傳治小兒慢驚睡紅散方赤頭蜈蚣一條去足蔓陀羅子一個天南星二個只取心如指頭大兩塊乳香一塊如指頭大土狗子去頭足全蠍各七個硃砂一錢腦麝各少許上件為末每服一大錢分二百服用金銀薄荷湯調下長沙醫者鄭愈傳救生散治小兒吐痢成慢驚風方全蠍七個用薄荷七葉逐個裹了以生薑自然汁浸麻黃七條候稍干系葉上串上炙令焦黃色白朮塗蜜炙黃一錢厚朴一片用草三寸水一盞煮七沸取厚朴一錢人參附子炮去皮臍各一錢上件為末每服半錢至一錢煎青水茄湯調下或蜜丸如黃米大飲湯下長沙醫者鄭愈傳治小兒慢驚風虛風湯方黑附子炮去皮臍天南星大者生去皮各一個白附子七個上件為末每服半錢水一盞入蠍梢一個同煎至六分微熱服聖惠灸法小兒緩驚風灸尺澤各一壯在肘中橫紋約上動脈中炷如小麥大
