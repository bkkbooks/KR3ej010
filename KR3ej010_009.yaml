內研細為度上色鐵粉五兩於乳鉢內研以漿水飛過候乾稱取三兩硃砂半兩研膩粉二兩天南星三兩為末上件細研令勻以麵糊為丸如緑豆大每服兩丸如有患不計時候薄荷蜜湯下日可三服大人丸如桐子薑湯亦得赤白痢二宜湯下小便不通燈心湯下霍亂木瓜湯下孔氏家傳治陽證驚風牛黃丸牛黃片白龍腦熊膽各半錢水磨雄黃半錢騏驎蠍硃砂木香各一錢真蟾酥麝香各一字上一處研為細末不入甕新粟米飯為丸小豆大常服三丸急病五丸男左女右鼻中灌為效若五七歲五七丸灌鼻內一二歲至三四歲三四丸灌先以新汲水量多少化磨破丸為汁方灌鼻內王氏手集治小兒急驚風方獖豬糞上掘地坑深尺余以豬糞攪和水澄清取一茶腳許以麝香服之立醒慢驚不可用趙氏家傳治小兒急驚龍齒膏龍齒半兩水研飛過乾山藥川甜硝人參寒水石炭火燒水飛甘草炙各一兩硃砂二錢腦麝各一錢上件為細末熟蜜和為三劑三歲兒可服雞頭大用薄荷湯化下吉氏家傳治小兒急驚鎮心散白附子硃砂研各一錢全蠍殭蠶各七個琥珀半錢研天南星一個水醋同煮令熟爛焙一字上細末入腦麝少許每服半錢薄荷水調下長沙醫者李剛中傳治小兒因熱急搐方蛇黃半兩火煅末入好醋中淬一十四遍候冷為細末雄豬糞南方取者火煅候冷杵半兩夜明砂稱二錢半細研上四味合一處細研極勻淨器收周歲以下並用半平錢兩月嬰兒一字周歲已上一平錢並用麝香湯放溫調灌下少定末退再進一服立效長沙醫者鄭愈傳桃紅散治小兒急驚風大天南星一個去心入硃砂二錢在南星內用南星封口上面再用生薑自然汁和麵餅子裹慢火內炒熱取出蠍一個全者蜈蚣一條二味用酒少許煮乾焙上件為末每服一字用金銀薄荷湯調下長沙醫者鄭愈傳水銀丸治小兒急驚諸藥不治者水銀砂子黃柏末黃芩末各半錢風化朴硝天南星炮末青黛各一錢全蠍十四個焙乾上件七味同研細方入砂子令勻浸蒸餅和為劑丸如黃米大一歲兒服二丸溫薄荷湯下不計時候服長沙醫者鄭愈傳問命散治小兒急驚發搐蜈蚣一條白殭蠶直者比蜈蚣長上件為末男左女右鼻內搐一字聖惠灸法小兒急驚風灸前頂一穴三壯在百會前一寸若不愈須灸兩眉頭及鼻下人中一穴炷如小麥大慢驚風第三聖惠論夫小兒慢驚風者由乳哺不調臟腑壅滯內有積熱為風邪所傷入舍於心之所致也其候乍靜乍發心神不安嘔吐痰涎身體壯熱筋脈不利睡臥多驚風熱不除變化非一進退不定荏苒經時故名慢驚風也宜速療之茅先生論小兒生下有中慢驚風者雙目上視雙手搐搦上喘喉中涎響乍靜乍發心神恍惚不記人事此候因驚橫心舍而成有因吐瀉而成有大患痢而成有久瀉痢後脾虛風邪所幹乘虛致此者如見此候急用小便和酒調睡驚膏方見本門中一服須臾搐定即吐兩盞以來青沫黏涎或三五盞以來方得少蘇急進勻氣散兩服方見胃氣不和門中喉中由有一二分余涎即下硃砂膏方見驚積門中次日下醒脾散三服有二方一方見胃氣不和門一方見慢脾風門中鎮心丸兩服方見一切驚門中若伏熱不退即下大附散方見本門中三日內即安如見背母搖頭噓舌出口咬奶眼障淚出偏搐死候也不治錢乙論慢驚因病後或吐瀉脾胃虛損遍身冷口鼻氣出亦冷手足時瘛瘲昏睡睡露睛此無陽也栝蔞湯主之方見本門中凡急慢驚陰陽異證切宜辨而治之急驚合涼瀉慢驚合溫補世間俗方多不分別誤小兒甚多又小兒傷於風冷病吐瀉醫謂脾虛以溫補之不已復以涼藥治之又不已謂之本傷風醫亂攻之因脾氣即虛內不能散外不能解至十餘日其證多睡露睡睛身溫風在脾胃故大便不聚而為瀉當去脾間風風退則利止宣風散主之方見本門中後用使君子丸補其胃方未見亦有諸吐痢久不瘥者脾虛生風而成慢驚錢乙論陰癇壞病云東都王氏子吐瀉諸醫藥下之至虛變慢驚其候睡露睛手足瘛瘲而身冷錢曰此慢驚也與栝蔞湯其子胃氣實即開目而身溫王疑其子不大小便令諸醫以藥利之醫留八正散等數服不利而身復冷令錢氏利小便錢曰不當利小便利之必身冷王曰已身冷矣因抱出錢曰不能食而胃中虛若利大小便即死久即脾腎俱虛當身冷而閉目幸胎氣實而難衰也錢用益黃散方見胃氣不和門中使君子丸四服方未見令微飲食至日午果能飲食所以然者謂利大小便脾胃虛寒當補脾不可別攻也後又不語諸醫作失音治之錢曰既失音何開目而能飲食又牙不噤而口不緊也諸醫不能曉錢以地黃丸補腎方見虛寒門中所以然者用清藥利小便致脾腎俱虛今脾已實腎尚虛故補腎必安治之半月而能言一月而痊也錢乙論慢驚得於大病之餘吐瀉之後或誤取轉致脾胃虛損風邪乘之凡小兒吐瀉不止即成慢驚宜速治似搐而不甚搐此名瘛瘲似睡而精神慢四肢與口中氣皆冷睡露睛或胃痛而啼哭如邪聲此證已危蓋脾胃虛損故也張渙論小兒急驚風不除進退不定荏苒經時乍靜乍發嘔吐痰涎潮搐甚者名慢驚風病宜速療之祕要指迷論凡小兒初生下不問日數或忽患慢驚醒後四肢厥冷不知人事但心中微暖即用側子湯服五關貫真珠囊小兒慢驚風候凡慢驚風身體不大熱似困而不睡間驚哭不止不肯食乳此為慢驚風之候困風盛而生也茅先生小兒受慢驚風候歌眼睛上視是風驚手足頻頻搐不定喉內涎鳴先取轉化涎不下請量情茅先生小兒慢驚死候歌慢驚風候實難醫遍體昏沉壯熱時睡臥多驚心不穩手牽腳搐喘相隨荏苒時多為此候速令下藥莫遲疑玉訣小兒慢驚虛風候歌長噓齧齒面青黃哯乳涎高胃氣傷風盛涎高生搐搦瀉痢頻頻色不常此患先調其氣後退驚風次下涎調臟腑即無誤也石壁經三十六種慢驚將發候歌未發驚時先好睡四十八候云未發慢驚先重睡睡中吐舌又搖頭面青睹發如針立鳳髓經云驚發麵紅毛髮立壯熱通身腳似鉤鳳髓經四十八候云更加手足一如鉤此候多因傷寒失治或奶母動作不定是致發熱或作吐瀉又覆被寒邪苦楚漸漸多睡少汗不食乳手足軟弱或即曲硬此當出汗醒脾去風即愈吐乳作腥生氣息額中千顆汗珠流通腸表汗兒當瘥若取之時瀉不休仍須先汗後下其下旋旋下之不可太猛並兩少溫藥生胃氣此病冷氣傷腠理不通蘊結為大患未發先困及發麵青頭額有汗吐乳腥臭若有此疾先解表後用蛜螂丸方見一切痢門中一二服肥大者微與下次調氣即安如此不退成慢脾風也鳳髓經與此歌亦同有注云先與㺽煎散表方見夾驚傷寒門中次烏犀膏散方見急慢驚風門中石壁經三十六種慢驚正發候歌噁心才作便生驚吐瀉頻頻氣上侵舌赤唇紅雙眼閉鳳髓經此三句云吐瀉才生便噁心霍亂吐乳汗柑侵舌出唇緋雙目閉搖頭髮直一如針此候亦主困傷寒氣已表發毒氣內淫傷於胃經內熱初感所以多吐或瀉渴不止失治則主多困困重則發搐不至大既緊只是或時發手足微動奈半月十日不愈亦不能絶多無汗遍身乾燥當醒脾發汗去驚悶生氣急搐雙脅口白生瘡命不任此候未生宜早治涎潮肺腑更難禁鳳髓經此一句乃云有瘡胃閉命沉沉若氣急則兩脅微動動則氣短而喘也更一句用冷藥太甚逼毒氣傷脾胃損致令口中有瘡出若赤猶可治白瘡滿口如珠子者目直視睛不轉滿面黑色無光必死鳳髓經此一篇云小兒吐瀉後成慢驚風慢脾風仍注云如口未生瘡不妨先與白鶴丹方見本門中次神白散方見多睡門中小兒形證論四十八候吐瀉傳慢驚歌后説云此候發時先吐逆醫人不識卻將調榮衛藥與服致令口生瘡成惡候先將蛜𧌴丸方見一切癇門中下胸膈風涎不吐後調氣惠眼觀證説云慢驚形候乍靜乍發或吐或瀉或因著撲或以患痢脾胃乘虛而作若見肉暈啼聲有淚手足微微掣動急下慢脾湯藥及以鮓湯丸利之方見急慢驚風門中至次日調氣兼進醒脾平胃化涎湯藥調理若先潮熱後口相牽一邊手足只搐一邊喉中作拽鋸之聲不啼無淚此候不可治三日中死死後眼生障膜而五臟絶也長沙醫者李剛中説云陰靜而緩陰慢而遲錢述慢驚得於大病之餘吐瀉之後或誤服冷藥取轉而腸胃虛弱風邪乘之似搐而不甚搐似睡而露睛手足瘛瘲或作鴉聲者此證已危蓋脾胃虛損故也是足太陰脾足陽明胃表裡俱虛相合受病風淫所勝也人皆以胃氣為本胃者水穀之海脾之大源乘納水穀清者為榮濁者為衛脾氣像土而居中洲氣血循環以灌四傍令小兒氣血未定五臟方成復因乳哺不調冷熱相搏而致吐瀉久而不瘥脾胃俱虛風邪內乘故面青昏睛睡口鼻氣冷手足瘛瘲醫或以鐵粉水銀龍腦硃砂之類是抱薪而投火也故錢用青州白丸子末金液丹末量以輕重參以分數二物和合米飲調之以主脾胃候手足溫即漸減之復投以醒脾驅風之藥此錢之垂教龜鏡也又有慢脾風亦與慢驚相似但分別輕重耳亦由小兒脾胃俱虛風邪內乘也聖惠治小兒慢驚風壯熱四肢拘急痰涎壅滯發歇不定白殭蠶散方白殭蠶蠍尾蟬殼各微炒蘆薈硃砂雄黃各細研五靈脂白附子炮裂以上各一分蟾頭一枚塗酥炙令焦黃牛黃麝香各細研半分闢宮子二枚塗酥炙令黃上件藥搗細羅為末入研了藥令勻不計時候以薄荷湯調下半錢看兒大小加減服之聖惠治小兒慢驚風心胸痰涎上攻咽喉如呀身體壯熱筋脈拘急或時發渴抽掣龍腦散方龍腦細研半分雄黃麝香蘆薈青黛牛黃天竺黃硃砂七味並細研胡黃連木香丁香熊膽犀角屑乾蠍生用膩粉以上各一分上件藥搗細羅為散同研令勻不計時候薄荷湯調半錢服之量兒大小以意加減聖惠治小兒慢驚風壯熱心煩發渴搐搦牛黃散方牛黃麝香雄黃蘆薈天竺黃夜明沙微炒犀角末胡黃連末白殭蠶末各一分乾蠍末一分半熊膽半分硃砂半兩細研水飛上都細研為散不計時候以薄荷湯調半錢服之量兒大小以意加減兼用少許吹入鼻中良聖惠治小兒慢驚風心神煩熱多驚體瘦四肢抽掣犀角散方犀角屑天麻白附子炮裂乾蠍微炒麝香牛黃細研各一分硃砂半兩細研水飛膩粉晚蠶蛾各半分上件藥搗細羅為散不計時候煎龍膽湯放溫調下半錢量兒大小以意加減聖惠治小兒慢驚風發渴不止牛黃丸方牛黃天竺黃並細研犀角屑胡黃連各半兩芎藭人參去蘆頭白茯苓丁香鉤藤龍齒細研各一分龍腦半錢細研麝香一錢上件藥搗羅為末用木蜜和丸如緑豆大每服以粥飲下三丸量兒大小以意加減聖惠治小兒慢驚風或發即戴眼向上手足搐搦烏犀散方烏犀角屑驢胎耳燒灰乾蟾燒灰白殭蠶微炒硃砂雄黃麝香牛黃天竺黃青黛六味各細研丁香以上各一分羌活半兩獨角仙三枚微炙去翅足雀兒飯甕五枚蠶紙一片出子者燒灰上件藥搗細羅為散都研令勻不計時候以溫水調下半錢量兒大小加減服聖惠治小兒慢驚風及天瘹麝香散方麝香牛黃並細研膩粉乾蠍白附子炮裂各一分上件藥搗細羅為散不計時候以薄荷汁調下一字量兒大小加減服之聖惠治小兒一臘後月內忽中慢驚風及無辜之候硃砂散方硃砂牛黃麝香細研各一分乾蠍十四枚微炒雀兒飯甕二十七枚麩炒令黃去殼上件藥細研為散不計時候以乳汁調下半錢薄荷湯調下亦得更看兒大小以意加減聖惠治小兒慢驚風墜涎真珠丸方真珠牛黃硃砂雄黃膩粉各一分上件藥都細研用粳米飯和丸如黃米大一二歲兒每服以薄荷湯下三丸日三服量兒大小以意加減聖惠治小兒慢驚風胸膈多