天麻防風丸大天麻防風人參各半兩乾蠍全者炒白殭蠶各二錢半甘草微炒硃砂研雄黃麝香各一錢錢字牛黃天南星切作片子酒浸三日各半錢白附子一錢炮裂上件研搗為細末煉蜜為丸如梧桐子大每服二丸不計時薄荷湯化下吉氏家傳治急慢驚風眼目上視手足搐搦牙關不開通頂散藜蘆不拘多少為細末用竹管吹少許入左右鼻候蘇服三黃散並和氣吉氏家傳治急慢驚風喉中有涎三黃散鬱金大者三個以一個破作二邊用巴豆一粒去殼入在鬱金內用線系定用水一盞皂角七條截斷同鬱金煮乾為度去皂角又用一個如前入巴豆一粒只以濕紙裹入火炮候紙干取出又以一個生用並巴豆一個亦生通前共生熟三枚先以鬱金焙乾為末後以巴豆三粒入鉢內研入鬱金令勻每服一字小兒半字用冷茶調下吉氏家傳治急慢驚風一字散雄黃研硃砂研各一錢川烏生藜蘆各半錢上末後入硃砂急慢驚風磨刀水下一字吉氏家傳生銀丸治小兒急慢驚風渾身制擲目睛上視喉內涎響手足瘛瘲見人怕怖宜服生銀礦半兩次煅七遍醋淬七遍京墨煅全蠍十四個薄荷葉裹炙水銀砂生犀屑真珠末麝香板青青黛洗下者輕粉硃砂各半錢龍腦一錢粉霜半錢大天南星一枚取臍為末一錢上為末杵生薄荷自然汁煮糊丸如此大每服一丸金銀薄荷湯下陶善化治小兒急慢驚風天瘹罷搐丸黑附子白茯苓蠍白附子殭蠶天南星各一兩人參二錢花蛇一錢天麻七錢烏蛇四錢硃砂六錢青黛四兩腦麝各少許水銀與黑鉛一處火上熔結成砂子二物等分熔一料約用一分急入水銀砂子慢不用水銀砂子又不用龍腦上用石腦油為丸如雞頭大每用一丸金銀薄荷湯下此急驚風如慢驚風燒青竹瀝油化下長沙胡氏家傳治小兒急慢驚風搐搦目視上不省人事大小腸不通利鐵粉散鐵粉二錢荊芥穗薄荷天南星常法制全蠍各一錢腦子麝香各半錢上為末了同細研每服一字用鵝梨汁調下安師傳治小兒急慢驚風藥方用大天南星一個剜空中入乾蠍一個硃砂一豆許在內卻傾上剜下者天南星末在上以厚麵裹煨黃熟未得開留至來日去面不用取南星等並刮下面上南星末同研細兒小用冬瓜子二十四個煎湯調下半錢兒大即用水一盞半藥二錢同煎放溫兩次服盡小兒不入食每半錢用冬瓜子湯調下便進食人家常服此藥進食若專治慢驚風即以乳香代硃砂二方皆妙長沙醫者相漹傳鐵刷散治小兒急慢驚風潮搐上視不省人事上用好者黃丹末不以多少用花葉紙三重包以線系又用生絹兩重裹了緊扎長江水浸七日一日一換數足漉控稍干於重五日用炭火三斤一煅藥上有珠子為度去火吹去灰研為末每服一字或半錢濃煎薄荷湯化下其藥傾是頻用手指研灌方得長沙醫者丁時發傳荊芥丹治小兒一切驚風夜臥多啼急慢風並宜服水銀青黛炒各二錢鉛一錢同水銀結砂子天南星炮荊芥各三錢蠍一錢半硃砂乳香炒研各半錢上為末細研勻冷水再研為丸桐子大每服一丸大小加減熟水化下長沙醫者丁時發傳治小兒急慢驚風手足眼搐頑涎壅聾耳鳴膽礬煎白湯浸一宿漉干細研石碌細研水淘泥去及石碌下面者收乾末白殭蠶炒末各一錢雄黃蠍末各半錢上並細研如粉每用一字或半錢薄荷湯下大小加減長沙醫者丁時發傳紅綿散治小兒急慢驚風癇疾吐瀉不安天麻炮麻黃去節各一分全蠍破故紙各一錢上為末每用半錢水六分紅綿少許煎四分溫服長沙醫者丁安中傳搐鼻散定小兒急慢驚風搐搦不醒用此藥搐鼻赤腳蜈蚣一條用溫湯浸軟竹切分於兩邊各分左右次用螳螂一枚亦分左右各分螳螂蜈蚣左右共焙乾研為細末男發搐用左邊藥末搐於左鼻內女發搐用右邊藥搐於右鼻內如兩手搐用左右藥搐左右鼻內長沙醫者丁安中傳垂柳散治小兒驚風搐搦涎潮及風熱上壅咽喉腫痛大黃炮熟鬱金皂角水煮五七沸焙乾甘草炙黃芩洗全蠍去土白附子炮防風洗桔梗洗白殭蠶直者雄黃研各一分胡黃連一錢上件依法制為細末每服一少半錢用垂楊柳煎湯入蜜調下長沙醫者鄭愈傳治小兒急慢驚風搐搦涎盛目睛直視克時取效救生一字散乾蠍四十九個腳手頭全不用肚為細末蜈蚣一條全者不用中節為細末雄黃半錢細研為末腦麝各少許研為細末上五味為細末每服一字用濕生蟲七個研汁薄荷湯少許同調勻與服不計時候忌一切毒物紹興己巳春長沙排岸主忠翊幼子忽患慢驚手足時搐身令汗出四肢皆若綿帶診其脈極微細其家以謂必死矣但胸前微暖口中微氣為不忍棄爾其鄭愈忽投此藥至午間已少醒至夜精神漸出不三日而平矣長沙醫者鄭愈傳勻氣散治小兒中急慢驚風取轉了用補藥丁香白朮除疳痢豆蔻青皮定粉珠甘草用和添藥力不消三度命重蘇丁香七七個白朮青皮甘草炙各一分豆蔻一個上為末每服半錢用白湯點服長沙醫者鄭愈傳治小兒急慢驚一切風下藥不得用牛黃散煮巴半分切須真一分燒礬三鬱金偏治小兒驚疾病憂心須卻喜惺惺上三味為末每服一字薄荷荊芥湯調下長沙醫者鄭愈傳聚寶蛇頭丸治小兒急慢驚風目睛上視齧齒弄舌面青口噤背強啼叫咽膈涎聲神昏不語及內瘹諸癇腹內泄瀉夜臥時驚潮熱氣喘並宜服之蜈蚣薑汁炙乾花蛇頭酒浸一宿焙乾碎各二十枚全蠍一十兩淨天南星十個薑汁煮一宿焙鉛白霜揀淨四十兩鐵粉三十兩蛇黃石八十兩醋煮七次飛研膩粉二兩研腦子細研真珠末水飛各五兩麝香研百草霜研各三兩硃砂研飛血竭細研蘆薈研各一兩白附子五十兩炮裂雄黃一兩半醋煮水飛焙乾上一十七味為末三家粽子為丸如雞頭大初生嬰孩可服半丸周晬以上可服一粒不以時候並用薄荷湯化下班防禦治小兒急慢驚風天瘹搐搦癇病應系風證悉皆療之用鴟鶚一隻不去皮毛於肚下小割破取盡腸胃卻以白礬一斤許填於腹內以滿為度卻以麻線縫合鹽泥渾固濟了用炭火一稱燒通赤煙盡撥去火候冷取去泥細研成末凡有前件證候以溫酒調下二錢兒小量多少服長沙醫者易忠信傳治小兒急慢驚癇手足掣搐上視昏睡不省角弓偏喎手足拘攣潮搐不時語澀行步不能一切風證奪命丹乳香研琥珀研天南星防風白殭蠶洗炒麝香肉別研茯神各一分酸棗仁去皮炒稱遠志去心稱各一兩蕓薹子炒半錢蟬殼洗淨四錢全蠍炒半兩天麻酒浸八錢白附子三錢天漿子二十一個蜈蚣二條炙木鱉子肉二錢研上件為細末水煮白糊為丸如梧桐子大每服量大小加減一兩丸金銀薄荷湯磨化下如急驚盛加龍腦少許同磨如慢驚即加附子少許同磨化下王氏手集灸小兒急慢驚風於兩足大指甲肉間灸三五壯須是立灸即效急驚風第二巢氏病源小兒驚者由血氣不和熱實在內心神不定所以發驚甚者掣縮變成癇又小兒變蒸亦微驚所以然者亦由熱氣所為但須微發驚以長血脈不欲大驚大驚乃灸驚脈若五六十日以灸者驚復更甚生百日後灸驚脈乃善耳聖惠論夫小兒急驚風者由氣血不和內有實熱為風邪所乘干於心絡之所致也心者神之所舍主於血脈若熱盛則血亂血亂則氣並於血氣血相併又被風邪所搏故驚而不安也其候遍身壯熱痰涎壅滯四肢拘急筋脈抽掣項背強直牙關緊急是也茅先生論小兒生下周歲以上至十歲已來有中急驚風客忤卒死此三種俱一般調理各有初受起因急驚風形候者涎響雙搐雙目直視面口青黑不記人事此候因初生下兒渾陽或將養剩有衣被蓋覆失理或因放送兒子大小便被雞犬觸驚或因人家鬧喚大聲小叫驚著遂積漸次第驚成積在心家被風邪虛乃至此候錢乙論因聞大聲或大驚而發搐發過則如故此無陰也當下利驚丸主之方見本門中小兒急驚者本因熱生於心身熱面赤引飲口中氣熱大小便黃赤劇則搐也蓋熱甚則風生風屬肝此陽盛陰虛也故利驚丸主之以除其痰熱不可與巴豆及溫藥大下之恐搐虛熱不消也小兒客忤痰熱於心胃因聞聲非常則動而驚搐矣若熱極雖不因聞聲及驚亦自發搐張渙論小兒心神多不定胞絡多積痰涎遂生邪熱若熱盛干於心神兼外傷風邪客搏使遍身壯熱痰涎壅滯四肢抽掣牙關緊急名曰急驚風病嬰童寶鑑論小兒急驚風為驚痰灌於心而眼上手足瘛瘲身熱牙關硬口噤不開者也祕要指迷論凡小兒急驚風安痊又經數日再發又安如經三四次如此後發沉重此乃惺惺形候不足憑也玉訣論小兒急驚風因風熱干心先遭驚怖前後驚涎併入於經絡之間其狀發搐眼吊唇黑口噤難開手足搐搦此病但以吐瀉鎮心調治方愈若使冷熱藥相逼恐損命也石壁經三十六種內才發急驚風候歌才發驚風看握拳指內指外細須言鳳髓經注云大拇指也陰內陽外為順候是方始手足搐搦候掌內紅潤握手指男兒大指在外女兒在內即順男左女右搐宜先一云搐令痊用藥開關雙眼下獻髓經云將藥搐鼻又將形候再重看鳳髓經云如嚏噴者不妨大忌悶涎潮入肺結向心中不解痊若男子搐右女搐左此為逆候不治頒涎如眼黏續續不斷也常利膈去涎目若開涎若散則更當服去驚調氣藥即止若目不開涎不斷者必死矣遠與涼心為治療解驚下藥始求安鳳髓經此一句云解經調氣用湯丸脈逆陰陽須意鳳髓經此一句云定搐疾時依用意用定知無命別人間男左女右搐搦順也鳳髓經急風自發歌注云先將睹月散搐鼻方見搐搦門中次鎮心丸方見一切驚門中次生銀丸方見急慢驚風門中石壁經三十六種內急驚風候歌七日歸前被物驚在七日內因驚作熱發驚也若嬰兒變蒸亦主驚慎勿冷藥過多髮直喉干瀉又青發如麻直不潤但嬰兒頻吃乳孩兒多飲水所謂喉干其瀉多則青色也但看上唇微有汗次觀印內一云腹上有青筋掌中有似桃花嫩怕物多涎聽有聲會者鎮驚為妙手莫將風熱一般名此乃外證候也若治先當鎮驚藥次定渴化涎則其疾必痊雖孩兒氣實亦當調胃氣方下驚藥慎勿過冷也鳳髓經弱風急歌一同云宜服鎮心丸生銀丸方見同前惠眼觀證急風説云內有風積熱涎急潮口中身背強直雙目閉雙手足搐或目瞪而喉中涎響不記人事急以睡驚膏方見本門中用蜜糖薄荷熟水磨下須臾吐三兩口涎眼即轉低即睡少時相次即瀉三四次青白黏涎下調氣藥次日多睡只用醒脾散方見吐利門中如不思食乃下安胃藥喉中余涎乃下化涎湯藥相夾調治三日安至第四第五日再有潮熱即是中風傷寒也即麥湯散方末見平胃丸方見噦逆門中兩日平復小方脈論説急風之候皆起於心臟也所是諸般驚疾纍積在心及至發時先壯熱次搐搦體熱極四肢煩悶渾身壯熱面頰赤色口乾舌躁皆因驚撲所致也治之在心長沙醫者李剛中説云古書無驚候陰陽癇而已故陽受之曰急驚陰受之曰慢驚故陽動而躁陽疾而速陰靜而緩陰慢而遲小兒急搐得之於熱淫所勝表裡連運久而不除肝風心火因熱相合二臟交爭其氣蕃灼而一腎水不能制二臟者也又肝上筋及目熱則筋縮急而風乘之則發搐手足不能有所制風相牽引而目上視也其有左右搐者各以其偏勝也醫便以烏蛇蜈蚣等藥是治標而不治本也故錢用瀉青丸主肝風方見驚熱門中導赤散瀉心火方見實熱門中此醫用之上藥也聖惠治小兒急驚風四肢抽掣拘急壯熱或則口噤天麻丸方天麻雄黃天竺黃麝香此三味各細研烏蛇肉蟬殼乾蠍桂心天南星白芷白附子膩粉半夏湯洗七次去滑以上各一錢上件藥並生用搗羅為末都研