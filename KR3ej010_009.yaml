body:
  text: 卷第九驚風急慢凡三門急慢驚風第一養生必用論小兒驚癇古醫經方論但云陰陽癇而今人乃云急慢驚今立方一準古聖賢為治陽癇屬腑於治癇方中去溫藥陰癇屬臟於治癇方中用溫藥寒溫等藥皆於治癇方中增損之則無失又小兒蟲證與癇相類學者審別之錢乙附方論小兒急慢驚古書無之惟曰陰陽癇所謂急慢驚者後世名之耳正如赤白痢之類是也陽動而速故陽病曰急驚陰靜而緩故陰病曰慢驚此陰陽虛實寒熱之別治之不可誤也急慢由有熱熱即生風又或因驚而發則目睛上插涎潮搐搦身體與口中氣皆熱及其發定或睡起即了了如此故急驚證也當其搐勢漸減時與鎮心治熱藥一二服直訣中麝香丸鎮心丸抱龍丸辰砂丸及至寶丹紫雪之類候驚勢已定須臾以藥下其痰熱直訣中利驚丸軟金丹桃枝丸之類或用大黃朴硝等藥利下痰熱心神安寧即愈錢乙論凡小兒急驚方搐不用驚擾此不足畏慢驚雖靜乃危病也急驚方搐但扶持不可擒捉蓋風氣方盛恐流入筋脈或致手足拘攣錢乙附方論治急慢驚世人多用一藥有性溫性涼不可泛用宜審別之又治慢驚藥宜去龍腦縱須合使必以溫藥為佐或少用之萬全方小兒諸風並天瘹客忤方論小兒有急驚候有慢驚候又有天瘹候又有客忤候此數方大同而小異夫身體壯熱忽然之間四肢抽掣痰壅口噤謂之急驚身體壯熱心神不安嘔吐痰涎睡中多驚乍發乍靜荏苒經日謂之慢驚皆由內有積熱外感風邪候有遲速因而為名其曰天瘹者蓋出於驚風之候也以其手足搐搦眼目上戴如魚之著釣遂以為名大抵因驚而生熱因熱而生風指病則謂之驚風指候則謂之天吊治法亦同其所謂客忤者取其觸忤之意小兒未有所識外人適至因而驚忤故曰客忤古人論説謂人從外來衣服經履用氣或牛馬之氣皆為忤也其狀吐下青黃赤白腹痛夭矯面色變易狀貌似癇眼不戴上其脈弦急數者是其疾也故治法有用粉丸並法術者玉訣小兒驚風候歌面青呵欠即因驚口孜啀饒啼睡不寧上竄喘粗頻發熱哯乳腸虛瀉痢青此患先除驚氣後退驚風次下驚涎後調胃氣乃安矣玉訣治驚風候云此因驚積涎實加胸膈宜生銀丸烏犀膏行風下涎方並見本門中仙人水鑑治小兒睡驚丸天南星一枚大者酒浸杵為末乳香水銀結成砂子琥珀末各一錢牛黃白龍腦各半錢青黛三錢上細研入石腦油和如有小兒患急慢驚風丸如紅豆大薄荷湯化破一丸令小兒服後睡覺頓安如大人傷風亦用薄荷湯茶嚼下一丸頓安古方治小兒急慢驚風方一甕硃砂一甕雪一個大蟲一個蠍四味勻研化作塵和時更用生人血上以雀兒飯甕兒空者一個量飛過細硃砂一甕兒膩粉一甕兒雀兒飯甕兒內取出者蟲子一個全蠍微炒一個四味研勻用乳汁調一字令兒服之王氏博濟方治小兒急慢驚風涎潮發搐不定常服解心肺痰壅不利褊銀丸水銀二兩黑鉛一分同結砂子川巴豆去皮心醋煮令黃色研一兩黃明膠一片慢火炙令黃百草霜二兩研香墨一寸研膩粉研乾蠍全整者鉛白霜研青黛研牛黃研各一分上件十一味除合研藥外細杵羅為末再一處細研千百下用粟米飯為丸如緑豆大捻褊每服五七丸乾柿湯下薄荷湯亦得更酌兒大小肥瘦虛實加減與服之唯利下青黏滑涎為效王氏博濟方治小兒急慢驚風搐搦不定中焦壅熱化痰理驚鎮心丸金銀箔各三十片牛黃研龍腦研龍齒各一錢茯苓去皮人參防葵鐵粉研硃砂研各半兩雄黃研犀角屑大黃蒸各一分上件一十三味都研勻細以煉蜜為丸如小雞頭大每服看兒大小薄荷湯化下如大人心神不定及多怔忪亦宜服之太醫局方定命丹治小兒急慢驚風天瘹撮口潮發搐搦奶癇壯熱昏塞不省蟾酥一錢乾者酒浸一宿乾蠍微炒七枚天南星炮為末一分麝香研一字白附子炮為末半分劉氏張氏方並用一分青黛研半錢上件細研令勻以粟米飯和丸如緑豆大別以青黛為衣每服一丸荊芥薄荷湯化下後困睡無疑但有患者先化半丸滴入鼻中嚏噴者必瘥太醫局方大天南星丸治小兒急慢驚風涎潮發搐目睛上視口眼相引牙關緊急背脊強直精神昏塞連日不省天南星牛膽制者半兩滴乳香研龍腦研牛黃研各半錢硃砂研極細一錢麝香研一錢半天麻去蘆頭人參去蘆頭防風去蘆頭各一分乾蠍一十四個以上杵米湯浸悶去腹內土微炒上件研杵令勻煉蜜和丸如大雞頭大每服一丸荊芥薄荷湯化下量兒大小以意加減不計時候服談氏殊聖治小兒急慢驚風牙關緊急眼睛上視胃中脹時發氣衆藥不可治奪命散乾蠍一個足尾頭甲全用少皆不妨上用大薄荷葉包定上用麻綿縛之用炭火炙薄荷連蠍香熟為末入麝香一字再合研為末每服一字臘茶清調下如病大吃半錢更看兒女歲數多少加減經驗方不用麝香用湯調下莊氏家傳方不用麝香入生龍腦少許如兒虛減腦子去茶清用薄荷湯下趙氏家傳方用竹瀝水下元和紀用經名至聖散治小兒陰陽癇手足抽掣病後虛風百種驚生惡證悉主之仍用緊小乾蠍四十九枚每一蠍以四葉薄荷包合綿線系之火炙焦去綿末之金銀湯調三豆許大三歲倍之量大小加至半匕以麝香牛黃少許調服益佳又以四味飲黑散紫丸五加皮治不能行蜀脂飲麝香丸並此至聖散七方謂之育嬰七寶紫陽道士一名保子七聖至寶方轉為一書者此方是也談氏殊聖治小兒急慢驚風麝朱散麝香一字硃砂二錢細研赤頭蜈蚣一條蠍梢七個棘岡子七個須是棘枝上者炒焙乾用肉不用殼上為末每服半錢煎金銀薄荷湯下如常服一字談氏殊聖治小兒急慢驚風真金箔銀箔各十片辰砂半兩麝香半錢白殭蠶三十個炒赤石脂醋煮防風遠志去心各一兩上件四味搗羅為細末次入先四味一處細研拌和令勻煉蜜和丸如雞頭子大硃砂為衣用蠹竹水吞下每服一丸忌死物之肉談氏殊聖治小兒急慢驚風硃砂一錢金頭蜈蚣不以多少全蠍不拘多少上件三味為末每服半字鼻內嗅之白丁香一錢膩粉一字用生薑自然汁和作餅子慢火炙熟每五歲以下至三歲重者氣實用一字以上三歲以下一字以下以上各作一帖臨時旋合和一帖入後藥一錢或半錢木鱉子仁三錢密陀僧二錢水磨雄黃一錢上三味同為細末五歲以下至三歲一錢三歲以下半錢以來蜜水米泔調下臨臥服茅先生方治小兒急慢驚風奪命散大人急中用此妙銅青硃砂各二錢膩粉半錢蠍尾一十四個去刺麝香少許上件為末每服一字半錢用薄荷臘茶清調下此藥治天吊臍風客忤卒死撮口鵝口木舌喉痹胙腮風壅並皆要此藥吐下風涎然後依形證調理漢東王先生家寶治嬰孩小兒急慢驚風手足搐搦目瞪口眼相引睡紅散方烏蛇項下七寸用酒浸一宿去皮骨炙黃色稱一錢青黛二錢蠍梢十個炒牛黃硼砂腦子水銀砂子真珠末各半錢麝香一字金銀箔各一十片烏蛇尾酒浸一宿去皮骨炙黃色蛇黃入火內燒令紅於米醋浸入煅如此三度京墨燒煙盡天南星末用生薑汁浸半夏末用生薑汁浸一宿各稱一錢上牛黃麝香硼砂腦子金銀箔先研極勻次入水銀砂子再研將余藥搗羅為末一處研勻每服嬰孩半字半歲一字一二歲半錢二三歲一錢以意加減金銀薄荷湯調下如一服搐定即便用調胃氣觀音散二三服方見單傷寒門中如小兒再作氣粗發搐宜進雞舌香散二三服方見搐搦門中錢乙豆卷散治小兒慢驚多用性太溫及熱藥治之有驚未退而別生熱證有病愈而致熱證者有反為急驚者甚多當問病者幾日因何得之曾以何藥療之可用解毒之藥無不效宜此方大豆黃卷水浸黑豆生芽是也曬乾板藍根貫衆甘草炙各一兩上四味同為細末每服半錢至一錢水煎去滓服甚者三錢漿水內入油數點煎又治吐蟲服無時良方治小兒急慢驚風黑丸膩粉一錢半墨白麵蘆薈各一錢麝香龍腦使君子去殼麵裹煨熟牛黃青黛各半錢上面糊丸梧桐子大每服半丸薄荷湯研下要利即服一丸楚州小兒醫王鑑賣此藥致厚産鑑神之未嘗傳人豫得之乃常人家睡驚丸小不同耳治驚風極效前後用之垂死兒一服即瘥保生信效方治小兒驚風芭蕉自然汁時時呷一兩口甚者服及五升必愈旅舍備用定命丹治小兒急慢驚風天瘹臍風撮口搐搦奶癇壯熱方天麻青黛各一分半天南星炮末膩粉各一兩半硃砂研白附子炮各半兩麝香二字蠍尾十四個炮上搗研勻用燒粟米飯為丸如緑豆大薄荷湯化下一丸急驚者水化滴入鼻中啼即搐定旅舍備用又方通治小兒急慢驚風手足搐搦日數十發搖頭弄舌百治不效垂困方蛇蛻皮一分牛黃一錢研上以水一盞先煎蛇皮至五分去滓調牛黃頓服五歲以上倍服萬全方治小兒急慢驚風並諸般風疾白龍丸石膏半斤火煅過如面分為三停留一停為衣川烏頭去皮天南星甘草各四兩生用肉桂甘菊花各二兩防風白殭蠶京芎各一兩半牛膝海桐皮去皮水浸麻黃去節用甘松洗川白芷藁本洗各一兩上件搗羅為散研和令勻用糯米揀擇淨煮粥研爛旋旋入藥和勻杵為劑丸如大雞頭大微幹上衣每服一丸空心夜臥用煨蔥酒嚼下如中急風用兩丸薄荷自然汁半盞酒半盞磨化灌下衣被蓋出汗婦人血風當歸酒下傷寒頭痛蔥酒下常服茶酒任下小兒急慢驚風量兒大小金銀湯磨下萬全方治小兒急慢驚風化痰鎮心七寶丹方牛黃研真珠末研鉛霜各一錢膩粉硃砂研入留一半為衣各二錢白附子天麻蠍尾炒三味各一分巴豆十一粒去皮心膜紙裹壓出油水銀三錢入黑鉛少許火上熔結砂子入上為末研勻煮棗肉研和丸如粟米大以硃砂為衣荊芥湯下三丸量兒大小加減服之聚寶方定命丹生龍腦真麝香各二錢半桃柳心各七個蟾酥一皂大上五味端五日合不得雞犬孝子婦人僧尼見細研丸如黃粟米大小兒急驚天瘹用中指點水四滴研一丸注在二鼻竅中三嚏以上即效如三嚏以下不在醫限慢驚用濃煎桃柳枝湯渾頭洗浴不得揩乾生衣裹之用藥如前三嚏以上一食久蟲子於百孔中出如三嚏以下亦不在醫限聚寶方治小兒急慢驚風金箔膏金箔二十二片赤足蜈蚣全者一條鐵粉白花蛇各三兩醋浸一宿取肉焙水銀錫結砂子硃砂研白附子輕粉白殭蠶直者乳香研各一分半夏生薑汁浸一宿焙乾半兩瓜蒂四十九枚麝香一錢研上一十三味為末石腦油為膏每服緑豆大一粒煎金銀薄荷湯化下牙關不開增一粒揩之自開聚寶方虎睛丸治小兒急慢驚風搐搦不安瘹上睛方虎睛一隻酒炙取仁青黛三錢棘岡子肉二十個硃砂研粉霜輕粉各一錢牛黃一字香好墨燒一錢麝香熊膽各半錢半夏七枚湯洗七度為末上一十一味為末湯浸蟾酥為丸如桐子大三歲以下一粒十歲以下至五歲二粒用金銀薄荷湯剪刀鐶左右各研七下灌之常驚著半粒聚寶方生薑丸治小兒虛風急慢驚風搐搦項筋緊強手足逆冷腰背拘急方蜈蚣一枚酒浸一宿乾蠍全者七枚蠶蛾十枚白殭蠶直者硃砂各一分研天南星白附子麝香當門子各一枚薄荷心七個龍腦研水銀錢結砂子各一錢棘岡子二十個炒上一十二味為細末研令勻以石腦油和為膏單子裹每服一粒如黍米大冷水調下鬚髮前服三服必效聚寶方睡脾散方治小兒急慢驚風桑螵蛸四個干薄荷葉乾蠍全者人參乾山藥天南星炮半夏生薑汁浸焙各一分上七味為細末每服半錢麝香粟米飲下聚寶方玉蕊丸治小兒急慢驚風天南星去皮臍半夏去臍白殭蠶直者各半兩定粉一錢膩粉水銀同膩粉各半錢研了上六味為末