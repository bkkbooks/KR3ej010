body:
  text: 卷第十驚瘹噤病凡十二門一切驚第一漢東王先生論小兒驚風可醫者十一非時窵眼驚入肝何以知在肝肝主筋肝受邪故搐於眼若眼赤是肝之外應故非時窵眼必糞青也夢裡咬牙驚入腎何以知在腎腎主骨齒也其齒癢及夜屬陰乃咬牙故知驚入腎也夜啼至曉驚入腸何以知在小腸小腸是心之腑心屬南方丙丁火陰陽相剋故入小腸至曉乃歇日屬陽夜屬陰乃相剋故啼爾面青下白驚入膽何以知在膽肝屬木其色青膽是肝腑故面青下白而知在膽必須吐奶也下白尿糞白也大抵面青概是寒候則二便矣氣喘吃水驚入肺何以知在肺肺主氣被驚所折其氣即喘要吃水者則是肺虛熱故知在肺要吃水也面臉紅赤驚入心何以知入心其心屬火又主血外應臉故令面赤是知入心也喘氣微細驚入肝何以知入肝其喘即是肺也肝屬木肺屬金故知陰傷陽也其人當糞青睡時手腳俱搐不定如治驚宜下洗肝丸散矣前後五心熱驚入脾何以知入脾胃與脾俱像土胃主四肢故知入脾也胃者是脾之腑其人必當吐後發熱不時是也喉內如鋸驚人大腸何以知入大腸大腸是肺之腑肺為諸臟之上蓋又主於氣入大腸則上衝咽喉作聲而響如無痰故知入大腸宜下取驚積藥無時乾嘔驚入胃何以知入胃其胃在咽喉下主化谷食被驚風入其中則癢而時時乾嘔故知在胃也宜謂胃氣後下驚風藥耳睡中驚哭渴在三焦何以知在三焦其三焦無形狀只是脂膜睡著時上焦被驚邪所幹即乃驚起而哭故知此患在於三焦發後日久自瘥只宜下驚藥也漢東王先生又論小兒驚風不可醫者七驚風爪甲黑不醫其爪甲主肝肝絶則不蔭其爪甲黑者不醫亦為血絶血不蔭則爪甲黑十無一存也驚風瀉黑血不醫此為心絶心主血心絶則不能榮於血此人不得一周時也何以知之心是五臟之主主若絶故只得一日而死也驚風日多盜汗不醫何以不醫汗者主於氣氣是衛之所繫衛絶則不管於氣故令汗出不止數日而死耳驚風忽作邪聲不醫此為肺絶聲只有出而不回肺亦主聲肺絶則聲一去而無回其人三日必死也驚風咬人不醫其咬人者是骨絶主在齒其骨若絶故令齒癢便則咬人約七日死為從里損出則遲故在七日矣驚風眼半開半閉不醫此謂之腎絶腎是五臟之根本外應其眼其眼黑腫其腎絶則無光無力不能開閉其眼四日而死何以知其腎屬北方而首末其病從下上故知只四日而必死驚風口鼻乾黑不醫此為脾絶何以知其脾絶脾主津液脾絶則津液俱無乃知是脾絶兩日死死時須寅卯時木剋土也凡是驚風者則身體壯熱臥則驚叫不時脾風多因吐而得必有風痰急驚風者只是中外邪也慢驚風者是虛積生胎驚胎熱之所為也錢乙論病誤用巫云王駙馬子五歲病目直視而不食或言有神祟所使請巫師祝神燒紙錢不愈召錢至曰臟腑之疾何用求神錢與瀉肝丸愈方見驚熱門中嬰童寶鑑論小兒驚風但身熱驚哭不止睡眠不靜手足微微瘛瘲不食乳或如傷寒候也翰林待詔楊大鄴論小兒生下百日內難養者為胃腸未整神氣微怯舉動多驚此蓋由在胎之時母多吃動風及黏滑肥膩之物炙爆諸般肉等兼嗔怒不常言話高聲交合陰陽之時搖動百脈或生時坐婆疏拙使口中不淨或帶風入四肢或浴當風包裹失度被浮熱引惡物於脾胃之間漸流散於五臟六腑毒氣既得榮衛差牙初即頻頻吐哯腹脹是常時時呵來噴去往往睡裡虛驚或即手足緩怠目帶上翻尋究病源豈是卒然保生論小兒驚候其脈急數驚者乃腎受驚也驚熱之氣流灌於心心為帝王不受觸搦既受觸搦便生風候素問云腎主怒小兒才受觸搦便有面青呵欠候孩兒面青色是驚若一次受驚看太陽左側青脈朝眼是也男左女右第二次受驚山根上青脈是也第三次受驚眼下瞼連金匱有青見是也三處皆有青者皆是受驚極候主小兒睡中驚擲見人恐怖咬齒無時喉內有涎渾身抽掣手足瘛瘲吐食非時吐舌將手拿人多哭不住凡有此者皆是驚候若小兒風熱盛乃驚痰流灌肝心二臟令小兒忽然眼目上視手足急搐惡叫暴絶悶死此名急風疾候宜與壓涎乳香散二服方見本門次與生銀丸三服方與吉氏家傳方同見急慢驚風門中下驚涎若小兒臟腑虛薄驚涎灌心胞絡令兒眼目緩慢手足微動喉內涎響渾身不熱此慢驚風候宜與生銀丸次與鎮心丸鎮心丸方與鳳髓經同見本門中若驚風死候則其脈弦大魚口開氣粗喉中如牽鋸項軟無力腳面直囟腫囟陷目似開不開瀉如痢血身體軟無力以上並是死候不可用藥醫救飛仙論小兒病候小兒非時吊上眼是肝驚小兒非時夢裡咬牙是骨驚小兒夜啼至曉是肝驚入肺小兒非時要咬奶是驚帶邪氣小兒面上青白色是驚風小兒前後心熱及四肢熱是驚小兒非時面紅赤是驚入心小兒上黑色要叫是驚風面小兒口內微喘細是驚小兒夜臥有盜汗是驚風小兒白日多睡是驚風茅先生方小兒初受驚風候歌驚風之候有多般説出根源見易難夢裡咬牙驚入骨非時眼上病歸肝夜啼到曉聲無息面黑兼青候一般前後心煩四肢熱面紅如血向心間夜啼盜汗日多困氣粗吃水肺邪干惡聲頻叫形多黑非時咬奶腎邪端口中氣喘眼直視此是驚風仔細觀又小兒驚風死候歌小兒如得驚風候指甲青兼黑似煙口吐白蟲便黑血眼開不閉半抬肩咬人白日多驚汗忽作鴉聲不可看又小兒驚風死候歌項軟都無力喉中似鋸枋面紅妝色見目暗杳無光魚口開粗氣腳項直偏長齧衣胡亂咬瘀血瀉於床睛開還又閉渾身硬似僵十般驚疾病休用更思量惠濟小兒驚風日久肝臟絶候歌壯熱頭旋不舉頭目黃眼澀也堪憂有時哯奶兼翻食四體如冰痛入喉須信本因驚患得連綿日久更何求只因命盡歸泉壤脈亂薄洪卻似鉤養生必用説諸蛇骨牙皆有大毒取之特慎傷人多損性命殭蠶去絲嘴銼碎炒赤色蛇蛻炙黃蟬蛻洗去土去頭翅足焙蛇酒浸去皮骨取肉焙乾蜣蜋去頭翅足炙令焦蛇黃燒令赤醋淬五次蜣蜋勿用傷水者驚藥內多用之故載其説於此本草治小兒夜驚大人因驚失心方上取震肉作脯與食之此畜為之天雷所霹靂者是仙人水鑑牛黃散壓驚鎮心治風退一切病鬱金二個裹炮甘草二錢巴豆三七粒出油盡半夏七個薑汁煮乾白附子去皮生用雄黃硃砂各細研犀角末乾蠍炙各一錢上為末研勻入麝香少許每服一字薄荷湯調下仙人水鑑治驚風水銀膏水銀半兩用石腦油研如泥白天南星生末白附子生末各抄一錢白龍腦生膩粉各一錢蠍梢二十一個研上為末研如泥候次日於乳鉢內取出丸如緑豆大一丸至兩丸薄荷湯下斗門方治小兒未滿月驚著似中風欲死者上用硃砂以新汲水濃磨汁塗五心上立瘥最有神效日華子治驚邪癲癇小兒客忤消食及冷氣方上並煎鐵屑汁服之陶隱居作小兒浴湯主驚忤上以升麻取葉挼汁作湯浴之陶隱居治小兒驚邪方上取燕窠與燕屎同多少以作湯浴兒療驚邪也聖惠治小兒不吃乳眼目不開手足牽挽此是驚風硃砂散方硃砂龍齒硝石各一分上件藥都細研為散每服煎竹葉湯放溫調下一字如二歲以上兒每服半錢聖惠治小兒胎風驚風搐搦狀如天瘹宜服蛜𧌴散方蛜𧌴微炒白膠香各一分白芥子三十粒阿魏半分研入白殭蠶十五枚微炒上件藥搗細羅為散不計時候以薄荷酒調下一字量兒大小加減服之良久微汗出瘥聖惠治小兒被驚風雄雞冠血上件藥一二歲每服用少許滴在口中三四歲兒每服取一小橡斗子許滴在口中一日二服博濟方治小兒驚食哽氣青黛丸青黛木香豆蔻檳榔各一分麝香一錢續隨子一兩去皮蝦蟆三個燒存性上件七味同為細末煉蜜和丸如緑豆大每服五丸薄荷湯下靈苑雄朱丹治小兒驚風方雄黃硃砂麝香各研膩粉各半兩白附子半夏湯洗七遍天南星炮川烏頭附子各生去皮臍乾蠍羌活天麻川芎肉桂去粗皮白殭蠶木香白蘚皮烏蛇花蛇並酒浸去皮骨取肉炙用以上各一兩巴豆半兩去心膜薄荷汁煮五七十沸淨洗紙裹壓出油用上二十味為末令勻粟米粥為丸如緑豆大常服茶酒下三丸冷氣生薑湯下宿食不消橘皮湯下大小便不通甘草豆淋酒下急風薄荷酒下癱緩豆淋酒下酒食傷生薑湯下元氣茴香酒下血氣荊芥酒下或醋湯下大腸祕澀生薑湯下白痢椒湯下風眼淡竹葉湯下坐間便退頭風槐枝湯下風疹蜜酒下赤白痢二宜湯下頭痛傷寒鹽湯下赤痢甘草湯下小兒疳米飲下治風眼古井水下小兒風眼古井水煎淡竹葉湯下小兒驚風薄荷乳汁下靈苑化風涎治積年心恙諸癇風癲謬忘昏亂及小兒驚風益精神開心志鎮驚消痰牛黃散方牛黃犀角屑羚羊角屑雄黃人參硼砂鐵粉鉛霜鬱金膩粉辰砂以上各一分北礬一兩半腦麝各半分金箔五十片天南星去皮心銼如骰子大入良煞黃牛膽內懸東北方上百日令乾取三兩未乾則曝令乾如急要用搗天南星末膽汁和為餅子曝乾用上為末常服一字小兒半字薄荷湯調下中風涎甚及心疾每服一錢小兒一字薄荷自然汁調下如中風吐涎臨時加膩粉半錢同服靈苑治卒中感厥諸癇小兒驚風涎滿口噤立效透關散硃砂水銀同硃砂研如鐵色無星為度龍腦膩粉以上各一錢牛黃少許上五味同研為細末分作三服同煎薄荷湯調下取出惡物五七日後更一服一月更一服小兒每服一字薄荷湯下口噤者拗開灌下甚妙靈苑硃砂散壓驚安魂定魄鎮心臟退風熱一切驚風硃砂揀去石研白附子各二錢附子一個去皮臍天南星去臍天麻乾蠍全者半夏湯洗七遍去滑為度各一分上件藥七味各細研銼碎日曬乾杵羅為極細散次入硃砂末再研合令勻以瓷罐收之二歲以下每服半字四五歲以下每服一字強六七歲半錢十二十五加至一錢如是退一切驚熱風熱咳嗽喉中壅隘並宜食後用蜜和熱水調下一切風不問急慢咬齒拗項翻眼氣粗手足搐搦並用冷茶清調下服良久膈上有風涎則吐之不爾汗出立瘥亦有尋時便定也有猛發一上者良久再進一服痰定後更加牛黃少許和前藥用薄荷蜜熟水調下日進三服若要為丸子用薄荷生薑汁蜜酒煮麵糊杵合丸如緑豆大每服用薄荷湯下五丸更量兒大小歲數臨時加減忌動風毒物太醫局潤體丸治諸風手足不隨神志昏憒語言謇澀口眼喎僻筋脈攣急骨節煩疼頭旋眩暈恍惚不寧健忘怔忪痰涎壅滿及皮膚頑厚麻痹不仁小兒驚風諸癇雄黃辰砂各水飛牛黃乳香生犀末羚羊角末麝香七味各別研如粉白龍腦別研極細沉香木香丁香藿香葉檳榔肉豆蔻仁白殭蠶微炒蒺藜子微炒蔓荊子去白皮黑附子炮裂去皮臍尖防風去蘆頭枝麻黃去根節以上各一兩人參羌活各去蘆頭白茯苓去黑皮白附子桂去粗皮晚蛾蠶微炒芎藭以上各一兩半乾蠍微炒半夏水煮三十沸薄切焙乾入生薑汁炒川烏頭炮裂去皮臍尖搗碎炒黃以上各二兩白花蛇酒浸炙去皮骨取肉天麻去苗各三兩白豆蔻仁南番琥珀別研如粉膩粉研各半兩真珠末別研如粉獨活去蘆頭各三分金箔六十片為衣上為細末入研藥令勻煉蜜搜和丸如雞頭大每服一丸細嚼溫酒下荊芥茶下亦得加至二丸如破傷中風脊強手搐口噤發癇即以熱豆淋酒化破三丸斡口開灌下少時再服汗出乃愈若小兒驚風諸癇每服半丸薄荷湯化下不拘時候服太醫局天麻防風丸治一切驚風身體壯熱多睡驚悸手足抽掣精神昏憒痰涎不利及風溫邪熱並宜服之天麻防風人參並去蘆各一兩乾蠍白殭蠶各半兩炒硃砂研水飛雄黃研麝香研甘草