人參茯苓硃砂真珠末各一錢石菖蒲末二錢金銀箔各三片水銀砂一錢半腦麝各少許上為末湯煎蒸餅心為丸如大每服七丸十丸至十五丸遠志薄荷湯下惠眼觀證大驚丸治驚氣狂躁及涎牽響一切驚疾白附子二錢硃砂一分研腦麝各半字白殭蠶半兩與附子並用麥麩炒麩黃赤去麩不用金銀箔各五片上分出一半硃砂入前二味同金銀箔研勻入麵糊為丸如大將所留出硃砂為衣一丸分作兩服蜂糖薄荷熟水磨下如大假驚疾發作一丸只作一服惠眼觀證虎眼丸鎮心化涎夜臥不穩夢中驚叫或多虛汗並宜服之硃砂白殭蠶天南星生各一分上為末麵糊為丸如大每服五丸至七丸薄荷湯吞下惠眼觀證大黃散治驚風貼囟大黃芍藥各等分上為末豬膽汁調貼之保生論乳香散治小兒驚風涎溢悶絶暴死宜用亦不吐出涎只此壓甘遂乳香各末一錢匕上為細末每服半錢或一字童子小便下妙劉氏家傳睡驚丸治小兒一切驚使君子五個燈上燒成灰金箔五片一方十片銀箔三片一方十片腦麝各少許一方各半錢膩粉約用挑半錢一方抄二錢香京墨似棗尖大上研如粉生面糊丸豌豆大每服一丸溫熟水化破下一方薄荷水下或膈上有涎即吐出腹中有積滯即瀉出如蝦蟆青苔之類大假驚風一切不須三服必效如小兒有疾即灌良久便睡如睡驚常服一丸分兩服小兒則間日可服半丸極妙劉氏家傳小兒驚熱和氣硃砂散硃砂白茯苓人參山藥各等分甘草減半半生半熟上末之驚金銀薄荷湯下和氣米飲下熱竹茹煎湯下量大小下一字或半錢或三字劉氏家傳治驚和氣止瀉痢白朮一錢切薄片蜜略塗紙襯銚慢火炒甘草半錢半生半熟蠍二個全用龍腦薄荷葉裹線系定竹夾炙候薄荷焦去之只用蠍如無生薄荷用乾者同炒令焦用上末之驚金銀薄荷湯下和氣止瀉痢米飲湯下劉氏家傳睡驚丸大治小兒驚渾身壯熱但染著驚便與服粉霜京墨燒過蘆薈各半錢天南星一錢湯浸去皮臍巴豆二粒去油使君子四個去尖麩炒黃上入腦麝少許滴水丸桐子大一歲半丸量兒大小金銀薄荷湯化下三歲以上一丸劉氏家傳驚風上吐下瀉吐痰涎方硃砂二錢麝香少許蠍一個上先碾蠍為末後研朱麝極細每服半字茶調下或奶汁下亦得劉氏家傳小童子一百二十般難驚天南星青黛併為末各挑三大錢麝香少許水銀一粒赤豆大輕粉挑一大錢巴豆七粒去油上為末一處用煮麵糊為丸如大十歲以下至一歲以上每服十丸用生蔥湯吞下早晨日午至晚連宵空心各進一服子母皆忌生冷覓菜炙爆淹藏花色酒肉又云十五歲以下至七歲十五丸七歲以下至周歲十丸周歲以下至百晬七丸皆蔥白湯下乳母依前百晬以下至滿月五丸用荊芥湯下滿月至三朝三丸用蜜薑汁少許調下以上日各空心日進三服但是不安看輕重加減與服劉氏家傳睡驚十寶丹硃砂輕粉蘆薈青黛京墨寒食麵腦麝各等分使君子比等分者一倍煨金箔十片上為末以寒食麵煮糊為丸如虎睛丸大薄荷湯化下臨臥後量大小與之金箔只為衣劉氏家傳調理諸般驚睡應丹京墨天南星白附子硃砂雄黃各末抄一錢金箔二片腦麝各少許青黛末抄半錢全蠍一枚輕粉抄三錢上為末煮糊為丸如許大小兒𬅿小壯熱金銀薄荷湯化下微微吐逆手足冷吃食進退睡中忽叫兩三聲此乃心臟驚氣不散金箔湯下三五丸臨時更煎人參湯下一服或時時瀉青物煎木瓜湯下五七丸劉氏家傳起死輕骨丹主中風癱瘓四肢不隨風痹等疾及小兒驚風麻黃去根節稱五斤銼以河水二石熬之去滓成膏桑根白皮須上下者自採銼白芷蒼朮去皮甘松只用腿川芎各二兩苦參一兩末上末之袞研極細以前麻黃膏和丸如彈子大每服一丸溫酒一碗研化頓服之臨臥取汁五七日間再服手足當即輕快小兒驚風量與之卒中涎潮分利涎後用之其效不可具述劉氏家傳紅散子治小兒壯熱發驚痰壅腳手心煩躁夜啼常服壓驚如是天瘹風亦可常服川天南星二兩以麵裹炮面熟為度此間者修制須犯生薑恐小兒難吃桔梗大防風白芷乾蠍使糯米炒焦為度各半兩麝香半銖靈砂一分腦子一銖甘草一兩生熟各半上件搗為細末次入麝香腦子靈砂乳鉢內細研拌勻每服一錢食後臨臥銀湯點吃劉氏家傳白附丸治小兒因驚或風涎盛手足欲動之疾張氏家傳治驚風天瘹眼睛搐掣手腳名真珠膏又治涎潮心舍叫喚不應並夾驚傷寒驚癇名人參丸白附子兩個大者生用天南星半兩炮全蠍三七個白殭蠶二七個直者麩炒赤色去麩人參二錢硃砂一錢腦麝乳香各少許上件為末煉蜜作丸如此大每服一丸煎金銀薄荷湯化下臨臥劉氏家傳金箔鎮心丸治小兒一切驚氣夜睡不穩喉中涎聲夢中狂叫精神躁悶並宜服之此藥不涼兼醒脾過一百日後四五日間服半丸甚妙如睡不穩便宜服之白附子一分白殭蠶直者半兩用麩炒赤色去麩硃砂一錢研腦麝各少許金銀箔各十片牛黃半錢上件為細末水麵糊為丸如此大留硃砂一半為衣服一丸或半丸煎薄荷湯化下臨臥服張氏家傳睡驚丸孩子驚風服藥後須睡一向然後取下驚涎立瘥白龍腦硃砂香墨青黛蘆薈各一錢重膩粉一錢使君子兩個麩裹煨為末上件同研令細以寒食麵作丸如梧桐子大每服一歲半丸二歲以上一丸五歲以上兩丸薄荷水化下張氏家傳琥珀丸治驚風溫壯咳嗽涎壅一切驚熱孔氏亦治邪熱多睡驚悸天麻人參防風各一兩甘草半兩炙孔氏用一兩乾蠍全者炒殭蠶各半兩牛黃一錢硃砂麝香雄黃各二錢半二味孔氏各用一兩上為細末蜜丸桐子大二三歲每服一丸薄荷湯化下張氏家傳治小兒注唇膏常服永不生風疾正心無驚多紅潤唇臉如丹常服無疳積諸癖疾患白殭蠶一兩去頭足直者生為末以薑汁和為餅子於火上炙乾又再為末復以汁為餅子干為度硃砂二錢細研用水一碗浸淘三遍去黃色傾紙上候乾研如粉細上同合和研勻煉蜜為膏入瓷合子內貯每用如雞頭大三歲只可一丸如三歲以上更分用之飲湯熟水化下張氏家傳治小兒鎮心壓驚墜涎硃砂丸硃砂細研急水飛過熟灰池滲干尤佳白殭蠶擇去絲取直直洗過焙乾新羅白附子以濕紙煨裹候令紙干取出油切成片子焙乾天南星炮裂去粗皮臍切成片子各半兩麝香半錢研入和勻乾蠍一兩銚子內慢火炒令極熱不可太過上六味各為末煮白麵糊為丸如粟米大每服十丸用煎金銀薄荷湯吞下如遇驚取下後且以此藥服一二服無不效或有虛汗用麻黃根煎湯下張氏家傳黑神丸治一切左癱右緩小兒驚風婦人産後中風心神恍惚頭目昏暈眩常服活血駐顏及治傷風鼻塞頭痛善治山嵐瘴氣其效如神桔梗麻黃去節川芎防風香白芷木賊桂心去皮紅豆縮砂仁釜墨以上各四兩大川烏頭湯洗取皮臍一斤天南星灰炒黃裂為度半斤天台烏藥沉香各一兩麝香一錢上件為末煉蜜為丸如龍眼大每服半丸蔥白一寸同嚼茶酒任下不計時候莊氏家傳治小兒退驚化涎七寶散硃砂生犀末牛黃真珠末腦麝各一錢金箔五片上件藥研如粉每服半錢薄荷水調下孔氏家傳神麯餅子治小兒諸疾丙日作曲丁日治藥亦名丙丁膏天南星烏蛇各三錢天麻麻黃去節各半兩蠍一分半白附子二錢半白殭蠶四兩大附子一枚炮裂去皮臍上為末水一升浸三日布裂去滓寒食麵一斗和勻踏作片子用楮葉罨七日取出用紙袋吊起十四日可用治小兒吐瀉過後精神困頓多睡不吃乳食四肢逆冷欲變驚以神麯四兩龍麝少許每服量多少以溫水調若已變癇哭聲如鴉面色青黃手足瘛瘲咽中不利硃砂龍麝並曲服之變癇滑利即以蜜丸曲末雞頭大溫水化下又面末一兩研入雄黃硃砂少許琥珀甘草二錢匕蜜丸雞頭大即名太一丹治小兒百疾王氏手集主勝丸治小兒一切驚蜈蚣三條飲甕兒蟲全蠍各七個粉霜硃砂硫黃水銀各一錢白麵三錢上件研細煉蜜為丸如梧桐子大每服一丸看虛實加減王氏手集睡驚丸治大人小兒一切驚牛黃犀角龍腦鉛白霜白附子蠍梢人參茯苓真珠末膩粉以上各半兩硃砂一錢金銀箔各五片麝香一字上件為細末湯浸蒸餅為丸如緑豆大每服二丸小兒每服一丸以人參茯苓煎湯吞下王氏手集遠志茯苓丸治小兒驚怖大啼及見非常之物干動神志恍惚不寧狂妄驚悸睡眠不穩多汗心忪精神暗鈍寒熱咽乾手足煩熱人參茯神各三兩遠志菖蒲各二兩上件為末二兩加桂二錢半為遠志茯神丸白麵糊為丸緑豆大每服十五丸食後煎荊芥湯下日二服王氏手集治小兒諸驚瑞紅散硃砂一分蠍梢三十條殭蠶三十個直者上為末每服一字半錢薄荷金銀湯調下逐日可常服之吳氏家傳蛇頭丸鎮心安神治驚退風癇定搐搦化痰花蛇頭連身長一尺酒浸一宿去骨鉛白霜硃砂鐵焰粉乳香各一分研天麻白附子各一分末腦麝各半錢蛇含二兩火煅通赤淬於蜜中令細碎搗羅為末水淘去黑汁土取一兩再研令極細上件為末端正陳年小半夏糊為丸如雞頭大每服半丸薄荷湯化下吉氏家傳驚風天麻神砂丸天麻殭蠶各酒浸一宿蠍炒輕粉白附子米泔水浸一宿以上各等分上為末煉蜜丸如緑豆大入硃砂麝為衣每服一丸薄荷湯下吉氏家傳鎮心驚人參丸人參芍藥甘草炙各一錢大黃二錢蒸上為末煉蜜丸如麻子大每服一丸米飲下吉氏家傳鎮心驚白霜丸鉛白霜人參茯苓各半錢麝香少許上為末煉蜜丸如青豆大薄荷湯下五丸吉氏家傳治驚風鎮心真珠丸北寒水石硬尖者細研如粉以雪水浸三宿又研以水登下腳為度再研取五錢上為細末傾出紙上攤一宿收入瓷合內收每服一字以雞子青為丸仍以雞子清磨下大熱方可服吉氏家傳治驚聖餅子天南星去皮生用白附子五靈脂全蠍並生各半兩蟬蛻生青黛各一錢麝半錢上為末用好醋一大盞煮煎成膏入藥末拌和丸如梧桐子大成餅子如未滿月一餅二歲以下二餅看大小加減煎金銀薄荷湯化下被蓋鼻上汗出方效吉氏家傳諸驚桃紅丸石燕一分燕白糞白附子硃砂各一錢輕粉半錢黃連半兩巴豆八粒油煎上為末粟米飯為丸如大一歲一丸驚風薄荷湯下驚積膩粉湯下齁䶎蜜陀僧酒煎下吉氏家傳治驚硃砂膏硃砂馬牙硝甜硝甘草炙各一錢硼砂半錢腦麝各少許上為末煉蜜為丸如桐子大看大小薄荷湯化下一丸半丸吉氏家傳治驚鎮心墜涎鎮心散半夏十個大者硼砂硃砂各一錢為末上件半夏以刀切開中心卻將硼砂等末納在內用好瓦一片安半夏卻將好醋滴在硼砂等內久炙取干研爛用粟米糊和丸如大每服五七丸金銀薄荷湯下吉氏家傳治驚鎮心丸硃砂犀角末升麻大黃各半兩上為細末蜜為丸如緑豆大每服三丸薄荷水下吉氏家傳治四足驚風大效分金散硼砂馬牙硝各半錢腦麝各一字人參甘草炙各半兩上為細末每服一字四足驚風發動如羊眼喉內無涎添用腦麝冷水下一字吉氏家傳治驚風紫霜丸紫霜天竺黃甘草炙茯苓硃砂各半分龍腦少許上為細末煉蜜丸如皂子大一歲半丸用薄荷湯化下吉氏家傳治驚風牛黃膏雄黃天竺黃甘草炙白茯苓龍腦鬱金硃砂各等分上為末生蜜丸如皂子大一歲一丸看大小薄荷湯化下吉氏家傳治驚鎮心牛黃丸牛黃雄黃銀粉硃砂各一錢全蠍一個巴豆三粒上為細末用蒸餅心丸如大每服三丸薄荷湯下驚叫夜啼煎燈心石連心湯下吉氏家傳治驚萬病太一歸魂散五靈脂生木鱉肉粉霜硃砂以上各一分膩粉一錢巴豆二十五個生川烏取心一小塊如棗大上細末每服一字蛤粉冷水調下但是久積驚癇諸疾皆治吉氏家傳硃砂膏治一切驚風諸癇暗風破傷驚涎心氣不足或久伏驚氣尸厥發即昏昧涎壅及因驚亡魂失魄舉動驚怕夢魘或歌哭不避親疏狂走不寧中風緩弱頑痹等疾小兒慢驚風悉主之附子重五錢半平正緊實一個生去皮臍取半兩拌不須用太大者天南星去皮臍取淨一個不得用小者半夏取中形丸正好者湯洗七次去滑焙乾生用天麻明淨好者去兩頭取中心切琥珀研各二錢半全蠍一分生赤足蜈蚣去頭尾足炙取二寸白殭蠶硃砂光明者各半兩研如粉麝香一分淨研上為細末入研者硃砂琥珀麝香同研勻煉蜜放冷為膏密器收每患用少許生薑自然汁化藥一皂大次用溫酒調下小兒生薑薄荷湯化下豆大看兒大小加減服之朱氏家傳治小兒諸驚天麻丸天麻全蠍炒天南星炮去皮白殭蠶直者炒各等分上為末酒糊丸如大麻子大每服一歲十丸加至十五丸荊芥湯下藥性溫可以常服永除諸風朱氏家傳治小兒驚醉驚丸青黛腦子香墨燒過各半錢蘆薈輕粉麝面各一錢麻糖三個或二個使君子二枚麵裹煨去皮切焙上件為末水為丸如緑豆大每服一丸薄荷湯化破或吞下良久睡著取下惡毒物朱氏家傳治小兒急慢驚風諸般驚五心熱桃花散硃砂一分蠍梢四十九個膩粉一錢天竺黃馬牙硝各一兩腦麝各少許上為末每服半錢用金銀薄荷湯調下長沙醫者丁時發傳聖棗丸治小兒驚風癇疾木香丁香硇砂粉霜輕粉乾漆羌花青橘皮硃砂巴豆霜各二錢上為末棗肉為丸如此大每服三丸用棗湯吞下長沙醫者鄭愈傳茯神膏治小兒驚風蠍梢茯神各半兩白殭蠶一兩硃砂一錢上件四味為末用蜜為膏每服一皂子大煎金銀薄荷湯化下長沙醫者鄭愈傳治驚風癇病咽喉有涎四肢壯熱大小便祕澀兼心神亂者神聖當歸散當歸甘草滑石通草各一分大黃芍藥各二錢上為細末每服二錢水一盞生薑三片薄荷五葉燈心少許同煎至五分小兒分數服大人作一服長沙醫者鄭愈傳蠍梢丸治小兒驚風生涎時發壯熱手足搐動夜臥不安牙關緊急蠍梢硃砂飛過留一半為衣白殭蠶各一分天麻芎藭羌活半夏湯洗七次切作片子薑汁製當歸洗牛膽制天南星麝香以上各半兩上為末糯米粥和丸雞頭大硃砂為衣荊芥湯化下一丸如口已噤先用藥擦牙長沙醫者鄭愈傳珍珠丸治小兒驚風又名白元子腦麝各一字粉霜膩粉各一錢上研為細末用糯米汁為丸如芥子大每服三丸糯米湯下長沙醫者鄭愈傳琥珀散治小兒驚風瘛瘲搐搦等病琥珀真珠末硃砂天麻黑附子酸棗仁藿香葉天南星各一分用生薑汁和餅子炙黃色蠍一十四個去毒上件為末每服一字至半錢金銀薄荷湯調下長沙醫者鄭愈傳撫驚丸治小兒一切驚青黛茯神各二兩天麻四兩蠍半兩上為末蜜丸雞頭大薄荷湯化下長沙醫者鄭愈傳治驚風吊眼回命散蜈蚣一條赤者中分為兩處蠍一個亦中分為兩處各記左右上二味左者與左右者與右各作兩處為末左右吊眼各將藥吹入左右鼻中立效長沙醫者鄭愈傳神仙奪命散人中白一兩麝香一錢蜈蚣全者一條盆消二錢上件為細末每用少許鼻內搐千金翼小兒灸法曲澤主心下淡淡喜驚陰交氣海大巨主驚不得臥陰蹺主臥驚視如見星大鐘郤門主驚恐畏人神氣不足然谷陽陵泉主心中悚惕恐人將補之解溪主瘛瘲而驚少衝主太息煩滿少氣悲驚行間主心痛數驚心痛不樂陽谷主風眩驚手卷厲兌主多臥好驚腋門主喜驚妄言面赤神門主數噫恐悸少氣間使主喜驚喑不能言二間合谷主喜驚陽溪主驚瘛通里主心下悸大陵主心中淡淡驚恐手少陰陰郤主氣驚心痛天井主驚瘛後溪主淚出而驚腕骨主煩滿驚聖惠灸法小兒睡中驚目不合灸屈肘橫文中上三分各一壯炷如小麥小兒睡中驚掣灸足大指次指之端去爪甲如菲葉各一壯炷如小麥大名厲兌穴萬全方灸法小兒身強角弓反張灸鼻上入髮際三分三壯次灸大椎下節間三壯炷如小麥大小兒但是風病諸般醫治不瘥灸耳上入髮際一寸五分嚼而取之蟀谷穴也慢脾風第二茅先生小兒生下有中慢脾風候時時吐嘔頻頻咬齒手足掣瘲舌卷頭低兩眼上視先頭低而次第高此候久瀉痢而下冷藥只止瀉痢不活得脾是以脾虛弱臟腑乘虛故此所治先用勻氣散方見胃氣不和門中調一日後便下一醉膏通下方見本門中後用治脾散方見本門夾鎮心丸方見一切驚門中建脾散常服之即愈方見胃氣不和門中若更喘吐五哽如角弓風死候不治玉訣小兒慢脾風候是傷寒疹子庸醫未明表裡使即宣利臟腑更使冷熱藥相通故小兒發搐眼不倒脾困極不醒手足不收此病但回陽醒脾調治方愈若更吐瀉必定損命也茅先生小兒受脾風歌四肢逆冷體沉迷因宣吐瀉補還遲脾胃伏際涎壅肺心生毒熱面青時如此唾為慢脾候更加喘嗽不通醫小兒形證論四十八候慢驚傳慢脾歌慢脾只因傷取轉吐瀉虛涎脾胃存四肢逆冷頻頻嘔沉困難醒豈易明唇紅目開手微搐病行心臟及脾神醫者鎮心為上法更開關竅細詳論莫令加喘頭先軟眼白曚曚命不存此病是驚風傳入胃胃兼有虛涎下大青丹一二服更將搐鼻散開關大青丹方見急驚風門搐鼻散方見本門次用醒脾散方見本門中又四十八候慢脾將死候歌驚入風癇轉在脾直眠不動臥如尸搐搦已休牽掣定為他安好不生疑便通大小難收乳遍體如冰汗若泥眼目不明常似睡睡中不覺赴幽期又四十八候慢脾侵肺歌慢脾多睡重重取吐瀉傳脾胃轉虛逆冷四肢多重困虛涎脾伏盛難除生風肺臟添邪擁任喚千聲氣不舒莫使目瞑兼項軟十中難保一人蘇茅先生小兒慢脾驚風活脾散羊糞三十一個焙丁香一百粒胡椒五十粒上為末每服半錢用六年東日照處壁土煎湯調下茅先生小兒慢脾風醒脾散馬芹子白殭蠶丁香上三味等分為末每服一錢用炙橘皮湯調下茅先生小兒慢脾風候一醉膏花蛇鼻蠍尾天南星心川烏臍大附子側白附子耳蜈蚣蟲肚上七味各半錢生用使棗肉五十個和前藥研成一塊子以腦麝滴水和丸如此大每服一丸用薄荷自然汁磨化下後通下一服依形候用串藥子調理四十八候醒脾散方天南星一個去皮臍用硃砂入在南星臍內令滿以麵裹煨火炮令黃作散白朮一分上為末每服半錢更入麝少許煎冬瓜子湯調下如為丸以生蔥涎丸如粟米大每服十丸硼砂湯下後與調胃散方見積熱門中四十八候搐鼻散瓜蒂一錢細辛半錢上為末用半字吹入鼻中打噴嚏候眼開便將大青丹取下積熱並下驚涎後調氣大青丹方見急慢驚門中惠眼觀證沒石散慢脾候此藥醒脾沒石子二個硃砂三錢滑石研白礬丁香各二錢半夏一兩生薑三兩槌爛同浸水一碗將半夏擘碎又以水同煮乾取出以面一錢乳鉢內捶爛搜作餅子炙熟為末上為末每服半錢以冬瓜子煎湯調下不拘時候劉氏家傳治小兒慢脾初生者皆可服其狀困睡不醒或啼不已全蠍兩個以竹針穿微火炙香熟末之麝少許硃砂西壁土西照久年者壁泥各半錢細研上和勻乳汁調下一字二三歲以上量添至半錢或三字亦得又濃煎金銀湯調下又蜜湯亦得劉氏家傳治小兒吐瀉後生風慢脾者多效久瀉者亦治胃虛餅子丁香五十粒藿香葉稱一分木香韶粉大附子炮各一棋子大一方各二錢上為末攪勻生薑自然汁搜作餅子用粗燈盞內水煮軟化開服或要急用作散子入棗子一枚煎劉氏家傳羌活膏治小兒急慢驚風或因吐瀉後脾胃虛傳作慢脾之疾羌活獨活人參白茯苓肉桂木香防風以上各三錢水銀硫黃全蠍各二錢金銀箔各三十片真麝香一錢上為細末蜜和為膏每服一黃豆大薄荷湯化下張氏家傳醒脾去虛風大附子一錢去皮臍炮大全蠍七個大白附子三個炮天麻二錢上件為細末每服半錢濃煎冬瓜子湯調下張氏家傳治小兒孩子因吐或瀉體虛發搐作慢脾魚口目直視睡不醒目不開鉤藤飲子鉤藤防風麝香麻黃各一分去節用蠍梢蟬殼各半分上為細末每服一字半錢一錢大小加減薄荷湯調入醋一滴調勻服如四梢厥逆入附子三兩片同水五分薄荷一葉煎二分熱服連進三二服或吐瀉體冷多睡用附子半錢炮去皮臍為末或作銼散白朮一錢肉豆蔻一個甘草炙一寸棗一個水六分慢火煎至三分溫溫服作兩服體便暖只煎使君子湯如沉香橘皮吃五六分更吃暖驚藥三兩服乳母忌口不得再驚莊氏家傳治慢脾風小續命丸附子尖一枚硫黃棗許大蠍梢七枚上為末生薑麵糊丸黃米大量兒加減十丸至百丸治小兒久瀉尫羸尤妙莊氏家傳治慢脾風極妙黑散子乾薑半兩甘草一分上同於一瓷合子內用火煅存性為末煅須恰好過則力太慢不及則性大烈每服一錢或半錢濃煎烏梅湯調下臨時更看男女大小加減服之須是目垂面白慢脾形候即與吃孔氏家傳治小兒慢脾驚風上以代赭石不拘多少細研水飛過研冬瓜仁湯調下量兒大小與半錢或一錢小兒因轉瀉後眼戴上三日不乳目精通黃如金色氣將消絶止服三服全愈王氏手集治小兒慢脾風萬安散方厚朴去粗皮以水一盞煮盡後細切焙乾白朮湯浸半日切片子用蜜塗炙香黃色硃砂各一分研麻黃半分長直者以熟湯浸軟用薑汁浸半日乾蠍七個尾梢全者每個用大葉薄荷裹上用浸者麻黃纏子微以薑汁再浸以竹箸上炙令表裡焦黃色上並搗羅極細再入乳鉢內與硃砂研千百遍每服半錢或一字煎金銀薄荷湯調下但小兒服藥後微汗出是效凡小兒欲作慢驚必先壯熱多睡頻吐若吐止即驚止吐不定作慢驚號為難治有此吐證以金液丹主之此方傳與人必不信但只與藥金液丹研開令細以滴水為丸黃米大用硃砂青黛為衣每服五十丸以上以下不濟事用米飲下定吐救生丹亦甚佳然十有三四不能止者此方百無一失若有雖止已成慢脾者萬安散救之亦無失者但費心力耳不然十有八九不救此二方不可具述千萬祕之非至誠好事者不可妄傳吉氏家傳治慢脾風硃砂散硃砂天麻各一錢殭蠶七個天南星一個白花蛇項下肉皂子大一塊麝少許蜈蚣一條上為細末每服一字薄荷湯下吉氏家傳活脾散治小兒脾困成慢脾風天南星去皮半夏白附子各半分上為末每服半錢或一錢小者一字用冬瓜子七粒薄荷一片酒少許或入水少許同煎朱氏家傳治小兒久病後或吐瀉生驚轉成慢脾後蠍梢膏蠍梢不以多少為細末一兩用新好者上用石榴一枚開作甕子去子以無灰酒半盞調蠍末入石榴以蓋子蓋定坐文武火上時時攪動熬成膏子取出於放冷每服一錢用金銀薄荷湯調下急驚勿服朱氏家傳治小兒慢脾風吐奶霍亂吐瀉丁香一錢藿香三分上為末煉蜜為丸如緑豆大每服三丸或大假吐瀉米飲下半錢安師傳治小兒慢脾風藥方小兒衆醫不效用此藥痊好附子炮裂去皮臍木香不見火懷干肉豆蔻洗生硫黃用漿水黃者赤者不用其間夾石者須去上等分為細末每用冬瓜子四十九粒水六合煎至三合入藥一錢再煎至一合為一服治身冷汗出至虛緩搐者長沙醫者毛彬傳銀白散治小兒胃虛吐瀉煩渴成慢脾者乾葛人參去蘆白茯苓山藥白扁豆各半兩半夏一分湯洗去滑薑製成餅炒黃糯米一合淘洗薑汁浸一宿炒黃上件同為細末每服二錢水八分生薑二片同六分溫服長沙醫者鄭愈傳醒脾散治小兒吐瀉脾胃生風藿香葉人參白茯苓各一錢天南星一個重七錢者去心入縮砂一錢丁香一錢在南星內上面卻用南星心末封口慢火焙熟切碎上件為細末每服半錢入冬瓜子少許同煎至三五沸溫服慢肝風第三小兒形證論四十八候慢肝風歌孩兒眼澀羞明目春不宣兮夏不通秋被毒風傷肺得次傳肝腎別尋蹤先調五臟患方退退得肝風便有功蓋為小兒元氣壯此名立號慢肝風此病肺與肝相剋見日眼不開未出月有有目腫者或出血者四十八候慢肝風羞日目腫出血宜甘膽湯方甘草一截以豬膽塗炙上為末每服半錢米泔調下四十八候云又欲去血目澀不開方蒼朮不以多少入在膽中線縛定煮熟將藥氣衝眼後更嚼藥以汁咽吐滓尤妙驚退而啞第四漢東王先生家寶治嬰孩小兒驚風並退只是聲啞不能言通關散方上以天南星炮為末每服嬰孩半字或一字三五歲半錢八九歲一錢獖豬膽汁調下令孩兒吃咽入喉中便能言語集驗方治小兒驚退而啞不能言語方木通銼防風去蘆川升麻羚羊角屑桂心以上各半兩甘草一分炙上件藥搗為粗散每服一錢水一小盞煎至五分去滓入竹瀝少許更煎一兩沸不計時候量兒大小加減服之集驗又方臘月牛膽釀天南星不拘多少上研細每服半字薄荷湯調下臨臥服兒大者服一字至半錢驚退而筋脈不舒第五漢東王先生家寶治嬰孩小兒驚風並退而汗不溜筋脈不舒不能行步天茄散方茄種見霜者細切焙附子炮去皮臍各半兩羌活一分焙上為末每服五七歲半錢八九歲一錢麝香酒調下一日三服疾愈即止趙氏家傳治小兒驚退後手足攣屈不能舒展方羌活芎藭防風去蘆天麻當歸微炒甘草炙以上各三分白附子炮一分上為細末每服一錢以薄荷酒調下日三量大小加減天瘹第六聖惠論夫小兒天瘹者由臟腑風熱脾胃生涎痰涎既生心膈壅滯邪熱蘊積不得宣通之所致也此皆乳母食飲無常酒肉過度煩毒之氣流入乳中便即乳兒遂令宿滯不消心肺生熱熱毒既盛風邪所乘風熱相兼觸於心臟則令心神驚悸眼目翻騰壯熱不休四肢抽掣故謂之天瘹也茅先生論小兒生下有中天瘹者心神不安渾身壯熱手足抽掣驚悸眼目翻騰此候因母飲食不常酒肉過度毒氣入乳宿氣滯不消心肺相搏風熱觸於心臟故有此候治者急進奪命散與吐下風涎方見急慢驚風門中然後用勻氣散方見胃氣不和門中醒脾與調勻氣後常服雄朱散方見驚癇門中夾鎮心丸方見一切驚門中健脾散方見胃氣不和門中與服安樂如見眼視魚口鴉聲眼黑無光指甲黑者死候不治張渙論小兒心膈壅滯邪熱痰涎蘊積不得宣通或乳母飲酒食肉無度煩毒之氣流入乳中令兒宿滯不消邪熱毒氣乘於心神致使驚悸眼目翻騰壯熱不休四肢瘛瘲其病名曰天瘹甚者爪甲皆青狀若神祟聖惠治小兒天瘹手腳掣動眼目不定有時笑啼或嗔怒爪甲皆青狀似鬼祟宜服龍齒散方龍齒細研鉤藤白茯苓各半兩黃丹甘草炙微赤銼鐵粉硃砂各細研川大黃銼微炒各一分蟬殼二七枚微炒上件藥搗羅為末入研了藥令勻每服一錢以水一小盞煎至六分不計時候量兒大小分減服之聖惠治小兒天瘹四肢拘急時復搐搦喉內多涎夜即驚厥宜服一字散方天南星炮裂蕎麵研入各一分闢魚兒十枚半夏七枚生用醋石榴殼一顆上件藥都搗羅為末入在石榴殼內以鹽泥封裹於灶下慢火燒以泥乾燥為度取出去殼焙乾搗細羅為散如孩兒小即用錢上一字以乳汁調灌之一歲以上即用酒調一字服之當時汗出為效矣聖惠治小兒天瘹眼目喎斜手足驚掣發歇不定牛黃散方牛黃細研乾蠍生用各半分木香一分羌活獨活白殭蠶生用硃砂細研水飛過各半兩乳香一顆如粟米大上件藥搗細羅為散都研令勻不計時候以干槐枝煎湯調下一字量兒大小加減服之聖惠治小兒天瘹牙關急硬筋脈搐掣宜服此方乾蠍七枚生用硃砂一分細研麝香牛黃各細研猢猻頭骨塗酥炙黃各半分上件藥搗細羅為散不計時候用新汲水調下半錢極者不過三服瘥量兒大小以意加減聖惠治小兒天瘹及驚風發歇不常方鸛鵲糞微炒牛黃細研各半分乾蠍五枚微炒麝香一錢上件藥同研為末不計時候新汲水調下半錢量兒大小加減服之聖惠治小兒天瘹眼目搐上筋脈急蚱蟬散方蚱蟬微炒牛黃雄黃並細研各一分乾蠍七枚生用上件藥細研為散不計時候以薄荷湯調下一字量兒大小加減服之聖惠治小兒天瘹多驚搐搦眼忽戴上吐逆夜啼遍身如火面色青黃不食乳哺並無情緒水銀丸方水銀一兩煮青州棗肉二十顆同研水銀星盡南星炮使半生使半熟白殭蠶白附子並生用鉛霜各半兩乾蠍生用牛黃麝香各一分上件藥除水銀膏牛黃麝香鉛霜三味研令勻如粉餘四味搗羅為末都研令勻用水銀膏和丸如黍米大一二歲兒每服用薄荷湯下三丸三四歲兒每服五丸不計時候量兒大小以意加減服之聖惠治小兒天瘹牛黃丸方牛黃硃砂鉤藤各一分末蟾酥麝香各半分蝸牛十枚去殼上件藥都研令細以糯米飯和丸如黍米大不計時候先以水化破二丸滴在鼻中相次即以溫水更下三丸量兒大小加減服之聖惠治小兒天瘹四肢抽掣眼目戴上精神恍惚皮膚乾燥身體似火夜臥不安心中煩躁熱渴不止宜服保生定命丹方光明砂研水飛過水銀煮棗肉研令星盡各一兩膩粉牛黃腦麝各一分金箔四十片上件藥都研如粉入水銀更都研令勻用粟米飯和丸如麻子大一二歲兒每服用新汲水研破三丸服之三四歲兒每服五丸不計時候量兒大小以意加減服之聖惠治小兒天瘹心胸痰壅攻咽喉作呀聲發歇多驚不得眠臥保命丹方乾蠍蟬殼白殭蠶各微炒天麻犀角屑天漿子內有物者白附子天南星各炮裂牛黃青黛硃砂並細研以上各一分蟾酥研入麝香細研各半兩上件藥搗羅為末入研了藥同研令勻用獖豬膽汁和丸如緑豆大每服用水少許化二丸滴三五點入