中停離作兩半個左邊者入一貼子內寫左字右邊者亦入一貼子內寫右字不得交錯麝香一錢細研先將左邊者同於乳鉢內研作細末即入左字貼內收起別用乳鉢將右邊字入麝香同研極細卻入右字貼內收不得相犯每有病者眼睛吊上只見白睛兼角弓反張更不能出聲者上用細葦筒子取左字貼納藥少許吹在左邊鼻里右亦如之用藥不可多若眼未全下更添眥小以意量度其眼隨手便下即止張渙牛黃散治天瘹清心截風牛黃半兩細研硃砂細研水飛麝香細研鉤藤蠍梢各為末天竺黃研各一分上件一處研勻每服一字新汲水調下張渙白銀丹治天瘹涎潮白附子全蠍各一分粉霜牛黃麝香各半分並研白殭蠶天南星一兩一半炮一半生用以上搗羅為細末次用牛黃等研勻用水銀半兩煮青州棗肉二十枚同研水銀星盡成膏上都和上件藥石臼內搗一二百下如黍米大每服五粒至七粒薄荷湯下張渙抵聖丹治天瘹胸膈不利乳食不下錫吝脂一兩細研水飛淘去黑水令盡牛黃鉛霜熊膽各一分並細研麝香半分研蟾酥一錢研上件同研勻粳米飯和如黍米大每服五粒至七粒新汲水下萬全方治小兒天瘹多驚搐搦眼忽戴上吐逆夜啼遍身如火面色青黃不食乳哺並無情緒銀硃丸方水銀一兩煮青州棗二十枚同研水銀星盡硃砂研作衣乾蠍生牛黃研入麝香研以上各一分天南星半炮半生白殭蠶白附子各生用鉛霜研入以上各半兩上件除水銀膏牛黃麝香鉛霜三味研令如粉餘四味搗羅為末都研令勻用水銀膏和丸如黍米大一二歲兒每服三丸用薄荷湯下至三四歲每服五丸服之劉氏家傳天瘹翻眼向上硃砂通明者三緑豆大乾蠍一枚全者銚內炒過上末之飯少許丸緑豆大患者用硃砂少許細研入酒內化下一丸頓愈吉氏家傳治小兒天瘹急驚風盛熱宜取方鬱金一塊蒸巴豆一個不去皮上件二味面北門限上杵一千杵每服一字薄荷湯下吉氏家傳治驚風天瘹牛黃膏白附子蠍鬱金雄黃各一分蟬蚷六十個膩粉半錢巴豆肉一分水浸一宿上搗研極細蜜丸入腦麝各少許每服皂子大薄荷冷水下驚風內瘹第七漢東王先生家寶論凡嬰孩小兒驚風內瘹盤腸氣瘹及蟲痛三者發作一般驚風內瘹眼尾有細碎紅脈現者是也盤腸氣瘹發動腰先曲空啼無淚上唇乾額上有汗者是也蟲痛則吐涎唇口紫色者是也如得驚風內瘹即用桃符丸服後卻進乳香丸方並見本門中並大七寶散可見霍亂吐痢門中如得盤腸氣瘹即用鉤藤膏二三服及魏香散二三服方見盤腸氣瘹門中亦須大七寶散二三服如得疳蛧蟲痛腹肚瘹痛即用乾漆散二三服並化蟲丸三五服方見蛔疳門中亦間與大七寶散服之後云蛔蚶痛者便是蛔疳石壁經三十六種內驚風內瘹候歌內瘹多啼子細看莫將蟲痛一𦨚言唇涎鼻紫為蟲痛一云蟲痛吐涎唇口紫內瘹還須黑色觀但覷紅筋生眼尾便知風候本根源四十八候云只看眼畔紅筋見有血相和點點斑鎮心使藥方為妙始覺良工按古賢其候寒熱內薄氣血凝滯蘊結不散腹中痛但調氣去其積熱積冷調毒退愈鳳髓經歌括一同有注云宜與生銀丸越桃散生銀丸方見急慢驚風門越桃散方見盤腸氣瘹門中又三十六種內驚風內瘹候云此候宜下蠍梢丸未安即微下方見搐搦門中小兒形證論四十八候驚風內瘹歌一同後云此候與蛔蟲候一般唇口紫黑是蟲候目有紅筋手在後胸高是內瘹也漢東王先生家寶治嬰孩小兒驚風內瘹桃符丸銀硃乳香各一錢研大蒜一子煨研上先研乳香極細後入銀硃再研後又同大蒜研看軟硬得所丸如此大每服半歲五丸一歲七丸二三歲十丸以意加減薄荷湯化下漢東王先生家寶治小兒驚風內瘹痛不可忍者乳香丸乳香一錢蠍梢二七枚沒藥半錢沉香一錢半上為末煉蜜丸如黍米大每服嬰孩三丸一歲五丸三歲七丸以意加減乳香湯吞下聚寶方辰砂散治小兒傷冷聚積驚風日久變成內瘹時人不識呼為祟硇砂半分紅芍藥鉛白霜各一分半琥珀研真珠不鑽者為末各一分上五味為末每服一字金銀薄荷湯調下張氏家傳小兒嬰兒孩兒內瘹止痛丸木鱉子肉胡椒各等分上為細末用黑豆末醋作糊丸如緑豆大每服三四粒荊芥湯下吉氏家傳治小兒驚積內瘹時發肚疼夜啼驚叫斬邪丹乳香沒藥鉤藤木香取見火舶上茴香炒各一錢上為末先將乳香沒藥二味乳鉢中研細然後勻諸藥切大蒜白三片研紅和前藥如梧桐子大每服十丸十五丸鉤藤茴香湯吞下無時朱氏家傳治小兒驚風內瘹腹痛不可忍沒石子丸木香螺粉燒草烏頭生用去皮尖上件等分為末用醋煮糊為丸如黍米大每服十丸淡醋吞下盤腸氣瘹第八石壁經三十六種內盤腸氣瘹候歌盤腸氣發先腰曲無淚叫啼眼乾哭口開腳冷上唇烏鳳髓經云上唇乾一云口乾腳冷額上汗流珠碌碌小腸為冷氣所薄致使痛發腰曲為腸結痛也當溫小腸則痛住次去其小腸積冷即痊安也鳳髓經歌括一同有注云宜與越桃散方見本門中小兒形證論四十八候盤氣瘹候歌上四句與前歌同下四句乃云直莫吐瀉傷榮衛經絡一定痛難屈氣通微用三兩行卻與調和自歡懌又歌痛來難忍便身黑體硬如弓一向張如婦胎中傳邪毒醫人何不用名方此候氣在小腸結卻不伸只將寬氣檳榔散與服方見煩熱門中並與白丁香膏方末見兼苗香散相兼服必愈方見肚腹瘹門中不可誤吃他藥吐瀉傷榮衛但只和氣漢東王先生有盤腸氣瘹治法在驚風內瘹論中漢東王先生家寶治嬰孩小兒盤腸氣瘹鉤藤膏方乳香研細沒藥木香炮薑黃各一錢木鱉子三個上為末煉蜜為膏每服旋絶如皂子大煎鉤藤湯化下一丸日三服漢東王先生家寶魏香散治盤腸氣瘹真阿魏一錢蓬莪朮半兩上先用溫水化阿魏浸蓬莪朮一晝夜焙乾為細末每服一字或半錢煎紫蘇米飲空心調下三十六種治盤腸氣痛宣連丸方宣連雷丸各一分木香二錢炒上為末用粟米飯和丸如麻子大每服十丸飯飲下鳳髓經越桃散治小兒盤腸氣瘹痛越桃去殼半兩入草烏少許同炒去草烏白芷一錢切上為細末每服半錢或一錢炒茴香蔥白酒下劉氏家傳治小兒盤腸氣瘹檳榔丸麻逸檳榔大腹子紅丹香匙煅上等分末之麵糊丸大麻子大三歲以下小麻子大每服十丸蘿蔔煎湯下三日燈心湯下三日霹靂湯下三日其湯用薑錢十片水一盞燒稱錘浸水候沸止溫去錘將此下藥號霹靂湯莊氏家傳安息香膏理盤腸氣瘹內瘹蟲痛外疝但諸般心腹痛皆治安息香桃仁湯去皮尖麩炒黃蓬莪朮濕紙裹煨使君子取肉切焙乾稱以上各半兩乾蠍一分阿魏一錢茴香三錢炒上七味除桃仁別研外次以阿魏並安息香以酒少許就湯瓶口上以盞盛蒸開土沙入桃仁中共研余藥同為末一處煉蜜為膏如皂皂大生薑薄荷湯化下隨兒大小加減孔氏家傳治小兒盤腸氣緣因懷子在腹中時或則其母吃冷物太多或因胎中帶不淨入孩子腹中每至夜深則陰氣盛逼令小兒腹中住至令啼哭不止故為盤腸氣也大附子尖不可長半寸去皮炮裂為末巴豆一粒去心膜並殼將豆內乳鉢內爛研成膏用竹紙一幅折揲裹之以竹棒杆令油在紙上直至捍得巴豆油極盡為度斑蝥一個去嘴及足翼只用肉先以麥麵炒熟上三味同研半日以麵糊為丸如粟米大每服五丸以少許茴香略借氣切不可多用也菖蒲茴香湯吞下臨夜服只通使一服新修合者未可用約修合百日後通用也此藥修合下經年歲轉妙唯小兒盤腸氣最佳吉氏家傳治小兒盤腸氣方蘿蔔子不拘多少炒令黃色上為細末每服半錢溫酒調下三服止腹肚瘹第九茅先生小兒生下五個月日以上至七歲有結癖在腹成塊如梅核大來去或似卵大常叫疼痛不住者亦分數類在臍下痛者為瘹氣下蕓薹散夾茴香散與吃即愈如見面黑眼視瀉黑血鼻口手足冷不進食者死蕓薹散方見本門茴香散茅先生方未得所見有四十八候茴香散方見本門茅先生小兒瘹氣蕓薹散蕓薹子炒蓬莪朮炮茴香炒青橘皮去白甘草炙以上各一兩木香炮一分上為末每服半錢一錢用鹽酒熱調下四十八候茴香散茴香炒蕓薹子各半錢田螺殼二錢甘草三寸炙川楝子一分用肉上為末每服半錢煎沉香湯調下木香湯亦得灸二十四瘹第十莊氏集腧穴灸小兒二十四種瘹法第一瘹牙關緊口不開灸耳門相對一寸七壯穴在直耳門近眼第二鬼瘹手腳冷眼不轉睛口中亂道灸大拇指後紋每指七壯在大指節上第三獐瘹渾身壯熱兩手如梳頭啼哭聲促灸兩手心及項前一寸各二七壯第四牛瘹弄唇撮口灸鬼門穴在乳下一麥粒地七壯第五瘹渾身壯熱上氣權肩喘息不調頭足俱冷肚脹灸兩肋頭併發心各七壯兩肋是章門穴第六虎瘹目不轉睛兩手不開乍寒乍熱灸百會穴大拇指節上各三七壯第七貓瘹連牙欠口吐舌上唇灸人中穴在鼻柱下玉泉穴在枕骨下一寸第四椎兩邊各一寸半各七壯第八風瘹灸玉枕穴在腦杓尖頭二七壯第九螳螂瘹撮口吐沫兩手在胸前灸肩上頭臍心各三七壯第十蛇瘹吐舌不住灸耳垂下七壯第十一脾瘹胸內氣結喘息不勻灸臍下一寸三七壯未瘥灸胃管臍上四指並穴兩旁各四指各七壯腹中鳴是效第十二血瘹瀉血不定灸大敦穴三壯在脊骨盡頭是第十三搜腹瘹腳冷瀉痢不常灸脊腧腰眼上四寸是又灸穴兩旁各一寸半各三七壯未瘥灸腰眼三七壯第十四心瘹吐逆不定身體壯熱灸百會穴三七壯未瘥灸後心三七壯第十五喑瘹不語言灸玉泉穴在玉枕下一寸又灸乳上三指各二七壯第十六臘瘹不熱乳食尋常多睡眼不開灸足踝骨上四寸男內踝女外踝各三七壯又灸髮際三七壯第十七雞瘹手愛抓人口黑色灸後心五壯未瘥灸兩手心各三七壯第十八猴瘹搐一邊眼不住灸前後心三七壯或有手如梳頭者灸第六椎兩旁各一寸半各三七壯第十九弓瘹身體壯熱脊梁急如反弓灸後心三七壯未瘥灸第九椎兩旁各一寸半三七壯第二十瘹乾嘔不定四肢無力灸氣腧五十壯第十三椎兩旁各一寸半第二十一癇瘹握兩手如弓不轉睛灸後心五十壯第二十二瘹面青撮口眼中淚下此是破軍星所作灸後心五十壯第二十三瘹驚哭不定咬牙作聲此是兼正星所作灸第五椎下兩旁各一寸半各三七壯第二十四瘹揉眼咬指甲此是文曲星所作灸兩手心三七壯未瘥灸中指頭七壯長沙醫者毛彬傳小兒驚瘹灸法牙關硬百會上灸三七壯又灸耳後一寸當時得效舌舐唇連牙欠口此名牛星瘹灸人中三七壯愛吐逆舌不住名蛇驚於承漿穴中灸三七壯愛咬人名孤瘹灸後心一百壯下元虛腹脹氣塊排連臍臍心灸一七壯翻眼抬睛名天瘹於腳大拇指當節上灸一七壯破腹害肚米穀不消腳脈不行是尋腹瘹病準前之穴灸之多睡瞑目不開內踝上面正四寸急灸之猢猻噤第十一茅先生小兒生下有中猢猻噤候身微熱雙手捉拳按在胸前口撮不開縮肩身體一似活猢猻此候因受胎六個月日母見人弄猢猻開口吸著其氣生來被風邪相擊致發此候若不速治即死經驗方治小兒中猢猻噤貓兒糞燒煙薰之即解白虎病第十二巢氏病源小兒白虎候按堪輿歷遊年圖有白虎神云太歲在卯即白虎在寅準此推之知其神所在小兒有居處觸犯此神者便能為病其狀身熱有時啼喚有時身小冷屈指如數似風癇但手足不瘛瘲耳張渙順正集香散治白虎病降真香沉香檀香各銼乳香研安息香人參去蘆頭各一兩茯神酸棗仁各半兩上件搗羅為細末每服一錢水八分一盞入麝香少許煎至五分去滓溫服留藥滓臥內燒之
