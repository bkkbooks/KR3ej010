body:
  text: 卷第十一癇論候法凡十二門癇論第一千金論曰少小所以有癇病及痙病者皆由臟氣不平故也新生即癇者是其五臟不收斂血氣不聚五脈不流骨怯不成也多不全育其一月四十日以上至期歲而癇者亦山乳養失理血氣不和風邪所中也嬰兒方云其一月三十日以上至期歲而癇者皆由五脈不流骨怯不成或乳養失所風邪所中也病先身熱掣瘲驚啼叫喚而後發癇脈浮者為陽癇病在六腑外在肌膚猶易治也病先身冷不驚掣不啼呼而病發時脈沉者為陰癇病在五臟內在骨髓極難治也病發身軟時醒者謂之癇也身強直反張如弓不時醒者謂之痙也諸反張大人脊下容側手小兒容三指者不可復治也凡脈浮之與沉以判其病在陰陽表裡耳其浮沉復有大小滑澀虛實遲駃諸證各依脈形為治神農本草經說小兒驚癇有一百二十種其證候微異於常便是癇候也初出腹血脈不斂五臟未成稍將養失宜即為病也時不成人其經變蒸之後有病餘證並寬惟中風最暴卒也小兒四肢不好驚掣氣息小異欲作癇及變蒸日滿不解者並宜龍膽湯也方見一切癇門中凡小兒之癇有三種有風癇有驚癇有食癇然風癇驚癇時時有耳十人之中惟有一二是食癇者凡是先寒後熱發者皆是食癇也驚癇當按圖灸之風癇當與豬心湯食癇當下乃愈紫丸佳方見變蒸門中凡小兒所以得風癇者緣衣暖汗出風因入也風癇者初得之時先屈指如數乃發作者此風癇也驚癇者起於驚怖大啼乃發作者此驚癇也驚癇微者急持之勿復更驚之或自止也其先不哺乳吐而變熱後發癇此食癇早下則瘥四味紫丸逐癖飲最良去病速而不虛人赤丸差駃病重者當用之本無赤丸方諸醫方並無按此服四味紫丸不得下者當以赤丸赤丸差駃病重者當用之今千金癖結脹滿篇中第一方八味名紫雙丸者用硃砂色當赤用巴豆又用甘遂此紫丸當駃疑此即赤丸也凡小兒不能乳哺當與紫丸下之小兒始生生氣尚盛但有微惡則須下之必無所損及其愈病則致深益若不時下則成大疾疾成則難治矣凡下四味紫丸最善雖下不損人足以去疾若四味紫丸不得下者當以赤丸下之赤丸不下當倍之若以下而有餘熱不盡當按方作龍膽湯稍稍服之並摩赤膏方見一切癇門中風癇亦當下之然當以豬心湯下之驚癇但按圖灸之及摩生膏方見壯熱門中不可大下也何者驚癇心氣不定一作足下之內虛益令甚爾驚癇甚者特為難治故養小兒常慎驚勿令聞大聲抱持之間當安徐勿令怖也又天雷時當塞兒耳並作余細聲以亂之也凡養小兒皆微驚以長血脈但不欲大驚大驚乃灸驚脈若五六十日灸者驚復更甚生百日後灸驚脈乃善兒有熱不欲哺乳臥不安又數驚此癇之初也服紫丸便愈不愈復與之兒眠時小驚者一月輒一以紫丸下之減其盛氣令兒不病癇也兒立夏後有病治之慎勿妄灸不欲吐下但以除熱湯浴之除熱散粉之二方並見壯熱門中除熱赤膏摩之又以膏塗臍中令兒在涼處勿禁水漿常以新水飲之小兒衣甚薄則腹中乳食不消不消則大便皆醋臭此欲為癖之漸也便將紫丸以微消之服法先從少起常令大便稀勿大下也稀後便漸減之不醋臭乃止藥也凡小兒冬月下無所畏夏月下難瘥然有病者不可不下下後腹中當小脹滿故當節哺乳數日不可妄下又乳哺小兒常令多少有常劑兒漸大當稍稍增之若減少者此腹中已有小不調也便微服藥勿復哺之但當與乳甚者十許日微者五六日止哺自當如常若都不肯食哺而但欲乳者此是有癖為疾重要當下之不可不下不下則致寒熱或吐而發癇或更致下痢此皆病重不早下之所為也此即難治矣但先治其輕時兒不耗損而病速愈矣凡小兒屎黃而臭者此腹中有伏熱宜微將服龍膽湯若白而醋者此挾宿寒不消也當服紫丸微者少與藥令內消甚者小增藥令小下皆復節乳哺數日令胃氣平和若不節乳哺則病易復復下之則傷其胃氣令腹脹滿再三下之尚可過此傷矣凡小兒有癖其脈大必發癇此為食癇下之便愈常審候掌中與三指脈不可令起而不時下致於發癇則難療矣若早下之此脈終不起也脈在掌中尚可早療若至指則病增也凡小兒腹中有疾生則身寒熱寒熱則血脈動動則心不定心不定則易驚驚則癇發速也嬰孺論小兒驚啼睡中四肢掣動變蒸未解慎勿針灸爪之也動其百脈因驚成癇也唯陰癇噤痙可針灸爪之爾嬰童寶鑑論病有變癇證凡小兒如有小疾早為尋醫勿致稽遲皆能害命凡小兒有數疾久而不醫盡變為癇壯熱久不治為癇夾驚傷寒不瘥為癇痰飲不瘥為癇發驚不已為癇洞泄不止為癇咳嗽不瘥為癇夜啼不瘥為癇客忤發不止為癇霍亂吐瀉不止為癇哯乳不瘥為癇臍瘡不幹常有青黃水出久則為癇以上病狀皆能變為癇疾也惠眼觀證論夫小兒驚不醫者成風風不醫者成癇癇不醫者成痙既成痙則難以用藥癇亦分數種有驚風癇多驚即發有乳風癇食乳沖肺即發發即吐乳急急有肝風癇四季多發發即寒熱噤有肺風癇冬月多發發即口噤面黑大抵癇病不能害命只邪氣在心須重吐下常服鎮心湯藥如覺發時一邊手足動此不可吐微覺麻痹不能舉手兼說話亦不分曉牙齒皆黑此風涎及邪氣閉塞竅內也癇候第二巢氏病源癇候癇者小兒病也十歲以上為癲十歲以下為癇其發之狀或口眼相引而目睛上搖或手足掣瘲或背脊強直或頸項反折諸方說癇名證不同大體其發之源皆因三種三種者風癇驚癇食癇是也風癇者因衣厚汗出而風入為之驚癇者因驚怖大啼乃發食癇者因乳哺不節所成然小兒氣血微弱易為傷動因此三種變作諸癇凡諸癇正發手足掣縮慎勿捉持之捉則令曲戾不隨也茅先生小兒生下有中驚癇候瞪目手雙搐搦背脊強直手足掣縮壯熱數齒時常發為驚癇茅先生小兒有中風癇候眼細眅頭項返輒啼叫瘛瘲肚中膨緊屈指此候春夏發或四季發故為之風癇驚癇風癇凡有此二候本因母將攝失理或衣厚而出腠理開張風邪乘虛而入所治者才見發時急用睡驚膏方見慢驚風門中一服半日間通下風涎惡物便進勻氣散方見胃氣不和門中醒脾散有二方一方見胃氣不和門中一方見慢脾風門中與調後常服硃砂膏方見驚積門中雄朱散方見驚癇門中與服即愈大凡癇病亦分臟腑渾身先微熱而後發癇即為腑病其寸口脈浮為陽癇此猶易治若先體不熱不因驚觸不啼不喚而得臟病為陰癇脈證更目直不作聲眼生白障牙關噤肚脹不進食下黑血死候不治漢東王先生家寶凡嬰孩小兒累受其驚用藥不瘥變作驚風十歲以上為癲十歲以下為癇風癇者因出汗解脫因風而入謂之風癇食癇者因乳哺失節多食硬物致傷臟腑或失疏利結積成塊變成其患驚癇者或因驚撲大人高聲叫喚孩兒血氣未成精神未實遂發驚癇如有此三癇牙關不開進藥不得宜先用開關散方見一切癇門中揩口兩角口自然開然後依次第用藥取效嬰音寶鑑癇病死候手足瘛瘲脈沉身體軟不時醒臥久不寤腹滿轉鳴口噤不進乳反張強直脊吐痢不止厥痛時起下血身熱痙直視瞳子不動汗出發熱不時手足瘛瘲喜驚惠眼觀證小兒癇候云發癇者只因驚後取驚氣未盡或當風坐立或再驚著其邪愈傳歸入心臟每邪氣潮心故令眼目翻張非時搐搦秘要指迷癇候云凡癇疾有數般不可盡述且說五臟表裡受風形狀初受驚癇目反視踞坐舉頭唇支青色面青黃此乃病傳於肝若唇黑眼慢旬日死風癇口吐白沫已傳受心臟放齒咬人或即口頰手指青黑或醒而發若指黑色面青黑乃五日內死臍風發癇面虛腫搐搦手足搖動兩瞼白病已傳肺面如土色者七日而死搐搦或夢中啼笑下齒咬人乃似慢脾形狀若眉帶黑色病傳入腎腎已絕旬日而死脾癇之狀喉如鋸鳴多睡不進乳口乾唇赤眼白多此病旦夕而死驚癇忤是三候第三漢東王先生論驚癇忤三候大抵略相似皆口面青黑嘔吐涎沫頭項強直手足搖動但驚即發拳搐癇即搐搦忤即掣瘲驚則喉中涎響癇則口中涎出亦涎響忤則口吐青黃白沫驚則雙目直視癇則口眼相引而目睛上搖忤則眼不上插不可得而同也然病初治之亦可一法漢東王先生家寶治嬰孩小兒驚癇忤手足瘛瘲頭項強直狀似角弓歸魂散方蠍梢一錢半炒蜈蚣赤腳者半條炙水銀粉麝腦各一字花蛇肉酒浸炙黃色秤一錢天南星切碎用生薑自然汁浸一宿令為末秤半錢川烏頭尖七個生上為末每服嬰孩半字或一字二三歲一字以上四五歲半錢金銀薄荷湯調下量兒虛實加減候癇法第四巢氏病源欲發癇候夫小兒未發癇欲發之候或溫壯連滯或搖頭弄舌或睡里驚掣數齧齒如此是欲發癇之證也千金候癇法云夫癇小兒之惡病也或有不及求醫而致困者也然氣發於內必先有候常宜審察其精神而探其候也手白肉魚際脈黑者是癇候魚際脈赤者熱脈青大者寒脈青細為平也鼻口乾燥大小便不利是癇候眼不明上視喜陽是癇候耳後完骨上有青絡盛臥不靜是癇候青脈刺之令血出也嬰童寶鑑云耳後高骨上有叄伍路青脈如線起者宜為爪破令其血出也小兒發逆上啼笑面暗色不變是癇候鼻口青時小驚是癇候目閉青時小驚是癇候身熱頭常汗出是癇候身熱吐哯而喘是癇候身熱目時直視是癇候臥惕惕而驚手足振搖是癇候臥夢笑手足動搖是癇候意氣下而妄怒是癇候目瞳子卒大異於常是癇候喜欠目上視是癇候咽乳不利是癇候身熱小便難是癇候身熱目視不精是癇候吐痢不止厥痛時起是癇候弄舌搖頭是癇候以上諸候二十條皆癇之初也見其候便爪其陽脈所應灸爪之皆重手令兒驟啼乃絕亦依方與湯嬰孺云並服五石紫丸湯直視瞳子動腹滿轉轉鳴下血身熱口噤不得乳反張脊強汗出發熱為臥不寤手足掣瘲喜驚凡八條癇之劇者也如有此非復湯爪所能救便當時灸之千金又曰若病家始發便來詣師師可診候所解為法依次序治之以其節度首尾取瘥也病家已經雜治無次序不得制病病則變異其本候後師便不知其前證虛實直依其後證作治亦不得瘥也要應精問察之為前師所配依取其前蹤跡以為治乃無逆耳前師處湯本應數劑乃瘥而病家服一二劑未效便謂不驗以後更間他師師不尋前人為治寒溫次序而更為治而不次前師治則弊也或前以下之後須平和療以接之而得瘥也或前人未下之或不去者或前治寒溫失度後人應調治之是為治敗病皆須邀射之然後免耳不依次第及不審察必及重弊也截癇法第五聖惠論小兒未發癇之前及欲發癇之後或壯熱連滯或搖頭弄舌或眼目抽掣如此是欲發癇宜早療之也張渙論小兒驚不已即變成癇疾又有不因驚而變成癇者然初亦有證可驗未發之前身體壯熱連滯不歇素有痰涎咽中呀呷作聲或搖頭弄舌眼目斜視眠睡驚掣如此必是欲發癇之證宜截之外臺救急中軍候黑丸療諸癖結淡飲等大良方治小兒欲發癇方桔梗桂心各四分巴豆八分去心皮熬芫花十二分熬杏仁五分去皮尖二仁者熬上五味先搗桔梗桂心芫花成末別搗巴豆杏仁如膏合和又搗一千杵下蜜又搗二千杵丸如胡豆漿服一丸取利可至二三丸兒生十月欲癇發可與一二丸如黍米大諸腹不快體中覺患便服之得一兩行利即好忌豬肉生蔥蘆筍等物聖惠治小兒未滿百日聚口吐沫此欲作癇候腹內有冷熱癖實宜服牛黃散方牛黃細研細辛黃芩當歸銼微炒甘草炙微赤炒防風去蘆頭各一分柴胡一分半去苗川大黃銼碎微炒