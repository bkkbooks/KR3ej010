酒糊丸菜子大每服七粒至十粒薄荷薑湯下一日三服一月見效三十六種治驚風三發成癇羌活膏羌活人參桂心防風各半錢蠍硃砂硫黃茯苓木香各一錢腦麝各少許上為末煉蜜為膏入金銀箔各十片袞研加減多少用薄荷湯下張氏家傳五癇丸治小兒五癇驚悸狂叫發搐上盛涎潮等疾如尋常涎盛看緊慢並宜服之不動臟腑養小之家宜預合以應倉卒其驗如神方皂角去皮捶碎水三四升浸取汁濾過銀器重湯熬成膏白礬枯過細研各四兩半夏洗七次上等辰砂別研天南星炮各一兩蠍梢炒白殭蠶直者炒上等雄黃別研白附子各半兩麝香別研烏蛇酒浸去皮骨焙乾炒各一錢蜈蚣大者一條去頭足酒浸炙上件為末先用皂角膏子和未能就次用生薑汁煮糊為丸硃砂為衣小兒六七歲如綠豆大每服三四十粒三四歲二三十粒一二歲如麻子大一二十粒並用薄荷湯下生薑湯亦得孔氏家傳治小兒急慢驚風天瘹撮口搐搦奶癇壯熱定命丹蟾酥一錢乾者酒洗一宿乾蠍七個天南星一分白附子末青黛各半錢麝香少許上件為末以粟米粥和丸如綠豆大別以青黛為衣湖南路鈐陳防禦所傳扁金丹治小兒胎風諸癇手足瘛瘲目睛上視頸項緊急強直或搖頭弄舌牙關緊急口吐痰沫反拗多啼精神不寧睡臥多驚吐利生風昏塞如醉方白花蛇去骨酒浸焙乾秤防風去蘆頭焙乾秤蜈蚣要赤者不去頭足全用炙乳香研極細各半兩蠍一扁瘦全者炙用硃砂研極細各一兩天南星火燒存性大草烏頭火燒存性各一兩半麝香一錢研細牛黃半錢研細上件十味除研者外並搗羅為極細末然後與研者藥一處再研勻用水浸吹餅和為丸如梧桐子大捏扁每服三餅子用荊芥湯化如稀糊抹入口中漸漸嚥下候一時辰更進一服神效吉氏家傳治暗風癇疾取涎積倒地不知人事五星丸此方神妙取下病積白丁香赤小豆各三十個乳香一分輕粉半錢重巴豆一十四粒去油用上末滴水為丸分作十一丸每服一丸水半盞磨化下臨發時服取下積涎如青黑色是應如十年內此一服便瘥更無再作以上者半月日再一服永除次服硃砂鎮心藥吉氏家傳治一切驚癇鐵彈丸五靈脂四兩川烏頭二兩炮去皮臍生烏犀乳香沒香各一兩牛黃麝香各一分上七味各為細末臘日重午日人不得語打井花水和丸如此大合時忌見雞犬婦人收起藥方得語用牙隱破荊芥湯下一丸朱氏家傳治因驚過發疳但或受風熱積未洗除心臟積熱壅毒雖設湯散療治日久不退至熱過涎生膈上壅塞心胸氣亂交橫變生癇疾其候發來一日數次變候轉頻吐瀉氣弱未曾補治宜服勝金丸方腦麝蘆薈牛黃胡黃連末上等分研細熊膽汁為丸綠豆子大每服三丸米泔水研下東京石魚兒班防禦扁金丹治小兒胎風諸癇手足瘛瘲目精上視搖頭弄舌頸項強直牙關緊急口吐痰沫反拗多啼精神不寧睡臥多驚吐利生風昏塞如臥之疾天南星炮白花蛇酒浸三日炙熱去骨全蠍麝香並別研草烏頭燒灰存性各半兩蜈蚣一條蘸酒炙熟乳香硃砂各別研一分上件為細末酒浸蒸餅和作餅子如此大每服三兩餅薄荷湯化下三歲以上服五餅與陳防禦方不同班防禦又方全蠍散全蠍半兩白附子硃砂別研各三分白殭蠶二錢麝香一錢別研上件為細末每服半錢荊芥湯入酒少許同調服灸癇法第九千金論曰小兒新生無疾慎不可逆針灸之如逆針灸則忍痛動其五脈因喜成癇河洛關中土地多寒兒喜病痙其生兒三日多逆灸以防之又灸頰以防噤有噤者舌下脈急牙車筋急其土地寒皆決舌下去血灸頰以防噤也吳蜀地溫無此疾也古方既傳之今人不詳南北之殊便按方而用之是以多害於小兒也所以田舍小兒任其自然皆得無有夭橫也小兒驚啼眠中四肢掣動變蒸未解慎不可針灸爪之動其百脈仍因驚成癇也惟陰癇噤痙可針灸爪之凡灸癇當先下兒使虛乃乘虛灸之未下有實而灸者氣逼前後不通殺人癇發平旦者在足少陽晨朝發者在足厥陰日中發者在足太陽黃昏發者在足太陰人定發者在足陽明夜半發者在足少陰上癇發時病所在是視其發早晚灸其所也又癇有五臟之癇六畜之癇或在四肢或在腹內審其候隨病所在灸之雖少必瘥若失其要則為害也千金五臟癇灸法肝臟癇灸足少陽厥陰各三壯心癇灸心下第一肋端宛宛中此為巨闕又灸手心主及少陰各三壯脾癇灸胃管三壯俠胃管旁灸二壯足陽明太陰各二壯肺癇灸肺俞三壯又灸手陽明太陽各二壯腎癇灸心下二寸二分三壯又灸肘中動脈各二壯又灸足太陽少陰各二壯膈癇灸風府又灸頂上鼻人中下唇承漿皆隨年壯腸癇灸兩承山又灸足心兩手勞宮又灸兩耳後完骨各隨年壯又灸臍中三十壯上灸五臟之癇千金六畜癇灸法馬癇灸項風府臍中三壯病在腹中燒馬蹄末服之良聖惠灸僕參各三壯在足跟骨下白肉際陷中拱足取之牛癇灸鳩尾骨及大椎各三壯嬰孺方云一土燒牛蹄末服之聖惠只灸鳩尾一穴三壯羊癇灸大椎上三壯聖惠炙第九椎下節間三壯豬癇灸耳後完骨兩旁各一寸七壯聖惠灸巨闕三壯在鳩尾下一寸陷中犬癇灸兩手心一壯灸足太陽一壯灸肋戶一壯嬰孺方云犬癇灸手心一壯灸足陽明各一壯肋戶一壯灸腳頭兩室各一壯雞癇灸足諸陽各三壯聖惠灸手少陰三壯在掌後去腕半寸陰郄穴陷者中上灸六畜之癇千金暴癇灸法小兒暴癇灸兩乳頭女兒灸乳下二分治小兒暴癇者身軀正直如死人及腹中雷鳴灸太倉及臍中上下兩旁各一寸凡六處又灸當腹度取背以繩繞頭下至臍中竭便轉繩向背順脊下行盡繩頭灸兩旁各一寸五壯若面白啼聲色不變灸足陽明太陰上灸暴癇千金頭部灸癇法若目反上視眸子動當灸囟中取之法橫度口盡兩吻際又橫度鼻下亦盡兩邊折去鼻度半都合口為度從額上髮際上行度之灸度頭一處正在囟上未合骨中隨手動者是此最要處也次灸當額上入髮際二分許直望鼻為正嬰孺方云次灸額上髮際五壯不言入發二分次灸其兩邊當目瞳子直上入髮際二分許嬰孺方同止言直上入髮際不言二分次灸頂上回毛中次灸客主人穴在兩眉後際動脈是嬰孺方云客主人在眉後髮際動脈是次灸兩耳門當耳開口則骨解開張陷是也次灸兩耳上卷耳取之當卷耳上頭是也一法大人當耳上橫三指小兒各自取其指也次灸兩耳後完骨上青脈亦可以針刺令血出嬰孺方云至此又有次灸鼻人中口上灸當令近鼻又云次灸承漿次灸玉枕玉枕在項上高骨是也次灸玉枕次灸兩風池在項後兩轅動筋外發際陷中是也次灸風府當項中央髮際亦可與風池三處高下相等次灸頭兩角兩角當回毛兩邊起骨是也嬰孺方至此又有太極者可灸兩眉頭也上頭部凡十九處嬰孺方云二十三處兒生十日可灸三壯三十日可灸五壯五十日可灸七壯病重者具灸之輕者惟灸囟中風池玉枕也艾使熟炷令平正著肉火勢乃至病所也艾若生炷不平正不著肉徒灸多炷故無益也嬰孺方云去頭部凡二十三處此亦不可一時下灸待諸處無效即續次灸之輕者囟中額中髮際鼻人中耳門風池玉枕可也凡灸頭風大人多者不過三十壯此則沉者不可頓灸可日日灸之也又灸口吻各二七壯千金腹部灸癇法若腹滿短氣轉鳴灸肺募在兩乳上第二肋間宛宛中懸繩取之當瞳子是次灸膻中次灸胸堂次灸臍中嬰孺方於臍中字下獨有百壯字次灸薜息薜息在兩乳下第一肋間宛宛中是也次灸巨闕大人去鳩尾下一寸小兒去臍作六分分之去鳩尾下一寸是也並灸兩邊嬰孺方又於此注云鳩尾在臆前蔽骨下五分是也次灸胃管次灸金門金門在穀道前囊之後當中央是也從陰囊下度至大孔前中分之上腹部十二處嬰孺方云腹部十四處胸堂巨闕胃管十日兒可灸三壯兒一月以上可五壯陰下縫中可三壯或云隨年壯千金背部灸癇法若脊強反張灸大椎並灸諸臟俞及督脊上當中從大椎度至窮骨中屈更從大椎度之灸度下頭是督脊也上背部十二處十日兒可灸三壯一月以上可灸五壯千金手部灸癇法若手足掣瘲驚者灸尺澤嬰孺方云肘中約中動脈次灸陽明次灸少商次灸勞宮嬰孺方云掌中央動脈次灸心主次灸合谷嬰孺方云手大指歧骨間次灸三間嬰孺方云大指次指本節後內側臼中次灸少陽右手部十六處其要者陽明少商心主尺澤合谷少陽也壯數如上千金足部灸癇法又灸伏兔嬰孺方云膝上六寸次灸三里次灸腓腸次灸鹿溪次灸陽明次灸少陽次灸然谷嬰孺方云在足二踝前骨下臼中上足部十四處皆要可灸壯數如上手足陽明謂人四指凡小兒驚癇皆灸之若風病大動手足掣瘲者盡灸手足十指端又灸本節後嬰孺方云諸穴不可悉灸候諸處無效方灸之千金翼云灸第二椎及下窮骨兩處以繩度中折繩端一處是脊骨中也凡三處復斷此繩作三折令各等參合如厶字以一角主中央灸下二角夾脊兩邊便灸之凡五處也以丹注所灸五處各百壯削行為度膀繩嬰孺方又云凡灸癇得啼為輕易治不得啼為重難治小兒生十數日便得癇者皆可灸也可灸一壯其要極者三五壯諸家灸癇法外臺甲乙經灸本神在曲差旁一寸半在髮際一云直耳上入髮際四分足少陽陽維之會灸五壯主頭目眩痛頸項強急胸脅相引不得傾側癲疾不嘔沫小兒驚癇外臺甲乙經灸臨泣當目上眥直入髮際五分陷者中是少陽太陽之會灸三壯主頰青不得視口沫泣出兩目眉頭痛小兒驚癇反視外臺甲乙經灸筋縮在第九椎節下間督脈氣所發俯而取之灸三壯主小兒驚癇瘛瘲狂走疾脊急強目轉上插聖惠灸長強一穴在腰俞下脊體骸端陷者中灸五壯主腰脊急強不可俯仰癲狂病大小便難洞泄不禁五淋久痔小兒驚癇病聖惠灸瘛脈二穴一名資脈在耳內雞足青脈是穴主頭風耳後痛小兒驚癇瘛瘲嘔吐泄注驚恐失精視瞻不明眵夢灸三壯針入一分聖惠小兒驚癇灸鬼祿穴一壯在唇內中央絃上炷如小麥大用鋼刀決斷更佳聖惠秦承祖灸小兒胎癇奶癇驚癇狐魅神邪及癲狂病諸般醫治不瘥者以並兩手大姆指用軟絲繩子縛之灸三壯艾炷著四處半在甲上半在肉上四處盡燒一處不燒其疾不愈神效不可量也諸癇灸一壯炷如小麥大嬰孺方審是癇候急灸頂上旋發中若眼直視灸兩目直瞳子髮際各一處心下一寸宛宛中脊當兌骨上一處大顴一處各灸二七壯頂上多灸益良更見有癇候灸兩乳內各一寸七壯累試大效萬全方小兒驚癇者先驚怖啼叫後乃發也灸頂上旋毛中三壯及耳後青絡脈炷如小麥大一法灸鬼祿穴在上唇內中央絃上小兒風癇者先屈手指如數物乃發灸鼻柱上髮際宛宛中三壯炷如麥大小兒食癇者先寒熱灑淅乃發也灸鳩尾上五分三壯癇瘥復發第十成痼疾也巢氏病源小兒患癇瘥後更發候癇發之狀或口眼相引目睛上搖或手足瘛瘲或背脊強直或頭項反折或屈指如數皆由當風取涼乳哺失節之所為其瘥之後而更發者是余勢未盡小兒血氣軟弱或因乳食不節或風冷不調或更驚動因而重發如此者多成常疹凡癇正發手足掣縮慎勿持捉之捉之則令曲戾不隨也嬰童寶鑑癇瘥後復發者為熱未退乳食不節更傷風冷而復發也千金茵芋丸治少小有風癇疾至長不除或遇天陰節變便發動食飲堅強亦發百脈攣縮行步不正言語不便者服之永不發方茵芋葉鉛丹秦艽鉤藤皮石膏杜蘅防葵各一兩菖蒲黃芩各一兩半松蘿半兩蜣螂十枚甘草三兩炙上十二味末之蜜丸如小豆大三歲以下服五丸三歲以上服七丸五歲以上服十丸十歲以上可至十五丸聖惠嬰孺方分兩少異聖惠治小兒諸癇復發不問風之與熱發作多少般數並宜服紫金散方紫金粉一兩半一名赤烏腳川大黃銼碎微炒各三分牡蠣粉三分麻黃去根節三分石膏細研水飛過地骨皮赤石脂各一兩烏蛇肉炙令黃防風去蘆頭黃芩赤芍藥葛粉甘草炙微赤銼牛黃細研秦艽去苗各半兩羌活桂心各一分半當歸一分銼炒朴硝一錢半寒水石一兩虎睛一對微炙上件藥搗細羅為散都研令勻每服煎竹葉湯調下半錢更量兒大小以意加減服聖惠治小兒驚癇復發眩悶倒蹶或湯火不避及除百病鉛丹丸方鉛丹硃砂細研水飛過鐵粉各半兩牛黃雄黃各細研細辛獨活露蜂房炙黃人參去蘆頭漢防己桂心甘草炙微赤銼川椒去目及閉口者微炒去油各一分蜣螂五枚微炙蛇蛻皮五寸炙黃雞頭一枚去毛炙令黃赤茯苓一兩上件藥搗羅為末煉蜜和搗三二百杵丸如綠豆大每服以粥飲下五丸量兒大小以意加減聖惠治小兒諸癇復發使斷根源天漿子丸方天漿子十四個去殼別研蠐螬三分微炒芎藭半兩知母人參去蘆頭生乾地黃桂心各半兩蚱蟬半兩去翅足微炒嬰孺用一分川大黃一兩半銼碎微炒嬰孺用十分蜣螂三枚去翅足微炙牛黃一分細研嬰孺用三分虻蟲三枚炒黃嬰孺用三分炙上件藥搗羅為末煉蜜和搗三二百杵丸如綠豆大每服以粥飲下三丸日三服更量兒大小以意加減聖惠治小兒驚癇發動經年不斷根源鴟頭丸方鴟頭一枚死者炙令黃色桂心赤芍藥茯神露蜂房炙黃甘草炙微赤銼當歸銼微炙芎藭丹參牛黃細研莨菪子炒令黑各半兩蜣螂七枚去翅足微炙蛇蛻皮五寸炙黃麝香一分細研上件藥搗羅為末煉蜜和搗三二百杵丸如綠豆大每服以溫水下五丸看兒大小加減服之嬰孺治癇三十年患者亦瘥方苦參三大斤童子小便一斗二升煎苦參取六升上以糯米及曲和前汁作酒十餘日當熟澄清一服半雞子許四五歲兒服一升永瘥非止癇疾但腹中諸病悉治神驗曾試亦治一切氣塊宿冷瘕癖心痛惡病皆治之放三二年酒不壞可多作以救人神妙嬰孺治少小驚癇發動經年不斷根源鴟頭丸方鴉頭一個桂心六分茯神五分蜣螂蚱蟬各炙十四個芍藥甘草炙黃芩當歸芎丹參麝香各四分峰房牛黃各二分蛇蛻皮五寸炙莨菪子八合酒浸炮干蒸之大黃八分上為末蜜丸小豆大一服七丸日三服稍增之與聖惠鴟頭丸分兩味數皆不同嬰孺治發癇雖瘥余疾慮動防疾鎮心銀屑丸方銀屑黃耆大黃鱉甲炙甘草炙各四分細辛桂心各二分茯苓柴胡黃芩人參芍藥各三分葵子二分牛黃一分上為末蜜丸大豆大一服五丸日三服常服大良嬰孺治發癇雖已瘥而根源不斷至長將除疾銀屑丸方銀屑一銖紫菀細辛麻黃去節黃芩各一分人參炙大黃甘草炙各二分牛黃四銖上為末蜜丸小豆大一服二丸日三張渙化痰丹治胞絡痰涎諸癇瘥後皆宜常服半夏一兩湯洗七遍乾薑微炮川黃連去須桂心南木香各半兩以上先搗羅為細末次用牛黃麝香各研一分硃砂一兩細研水飛巴豆十個去皮心膜炒黃別研上件都一處拌勻滴水和如黍米大每服三粒至五粒溫粥飲下未周晬嬰兒乳汁下謂如三歲至七歲不過五粒量兒大小加減莊氏家傳斷癇丸治胎驚癇疾愈而仍發證候多端連綿不除方黃耆鉤藤鉤子細辛甘草炙各三分蛇蛻皮三寸炙牛黃五大豆許別研蟬殼四枚洗去土微炒去足上七味末之棗肉和丸如綠豆大每服百晬內三兩丸三二歲十丸四五歲十五丸十歲二十丸煎人參湯下不計時候癇瘥身面腫第十一巢氏病源小兒發癇瘥後身體頭面悉腫滿候凡癇發之狀或口眼相引或目睛上搖或手足掣瘲或背脊強直或頭項反折或屈指如數皆由以兒當風取涼乳哺失節之所為也其癇瘥後而腫滿者是風癇因小兒厚衣汗出因風取涼而得之初發之狀屈指如數然後掣瘲是也其癇雖瘥氣血尚虛而熱未盡在皮膚與氣相搏致令氣不宣泄故停併成腫也集效方治小兒癇瘥後氣血尚虛而熱在皮膚與氣相搏遍身頭面皆腫宜服黃芩湯方黃芩澤瀉通草太通也各八分木豬苓去皮柴杏仁湯浸去皮尖各六分柴胡桑白皮各七分澤漆葉四分上為粗末每服抄三錢水盞半煎至五分去滓量大小乳食後放溫服集效又方龍膽葵子葳蕤茯苓前胡各一分上五味為粗末每服方寸匕水一大盞煎至五分小兒乳食後服一合癇瘥不能語第十二巢氏病源小兒發癇瘥後六七歲不能語候凡癇發之狀口眼相引或目睛上搖或手足瘛瘲或脊背強直或頸項反折屈指如數皆由以兒當風取涼乳哺失節之所為也而癇發瘥後不能語者是風癇因兒衣厚汗出以兒乘風取涼太過為風所傷得之其初發之狀屈指如數然後發瘛瘲是也心之聲為言開竅於口其癇發雖止風冷之氣猶滯心之絡脈使心氣不和其聲不發故不能言也集效方治小兒癇瘥後風冷留滯於心絡使心氣不和語聲不發宜千金大補心湯方黃芩附子炮去皮臍各一兩甘草茯苓桂心石膏半夏遠志去心各四兩生薑六兩大棗二十枚飴糖一斤乾地黃阿膠麥門冬去心各三兩上十四味㕮咀每服一大撮入前飴糖半匙許水一盞半煮至半盞量兒大小分減空心乳食前服日二
