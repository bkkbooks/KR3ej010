頭水三碗煎三五沸適寒溫浴兒先洗頭面次浴身體為佳孔氏家傳治小兒因吐利慾作癇宜服五苓散方見傷寒自汗門中五臟之癇第六千金論五臟之癇灸法並在後篇也肝癇之為病面青目反視手足搖嬰童寶鑑云手足瘛瘲心癇之為病面赤心下有熱短氣息微數嬰音寶鑑云短氣微喘脾癇之為病面黃腹大喜痢肺癇之為病面目白口沫出嬰童寶鑑云肺癇面目反視如枯骨口吐涎沫腎癇之為病面黑目正直視不搖如屍狀膈癇之為病目反四肢不舉腸癇之為病不動搖嬰童寶鑑云腸癇身體手足並不動搖但直而不至痙上五臟癇證候嬰童寶鑑五臟癇外又有異癇面白啼呼色有變易錢乙論凡治五癇皆隨臟治之每臟各有一獸並五色丸治其病也犬癇反折上竄犬叫肝也羊癇目瞪吐舌羊叫心也牛癇目直視腹滿牛叫脾也雞癇驚跳反折手瘲雞叫肺也豬癇如屍吐沫豬叫腎也五癇重者死病後甚者亦死錢乙論五色丸方硃砂半兩研水銀一分雄黃二兩熬真珠末一兩研鉛三兩同水銀熬上煉蜜丸麻子大每服三四丸煎金銀薄荷湯下六畜之癇第七千金論六畜之癇灸法並在後篇馬癇之為病張口搖頭馬鳴欲反折牛癇之為病目正直視腹脹羊癇之為病喜揚目吐舌豬癇之為病喜吐沫嬰童寶鑑云豬癇口吐涎沫依目視人犬癇之為病手屈拳攣嬰童寶鑑云手屈兩足拳攣雞癇之為病搖頭反折喜驚自搖上六畜癇證候嬰童寶鑑六畜癇外又有烏癇唇口撮聚目手俱搖蛇癇身軟頭舉吐舌視人博濟方治小兒五般癇牛癇即牛聲馬癇即馬聲狗癇即狗吠羊癇即羊鳴雞癇即雞鳴五癇病者腑臟相引邪氣盈起寒厥各識手顧口吐沫須臾如蘇復作神效雄黃丸方與錢氏五色丸同但博濟水銀用八分耳錢氏五色丸方見前篇一切癇第八外臺小品載元中記曰天下有女鳥一名姑獲又名釣星鬼也喜以陰雨夜過飛鳴徘徊人村裡喚得來也是鳥淳雌無雄不產喜落毛羽於中庭置入兒衣中便使兒作癇必死即化為其兒也是以小兒生至十歲衣裳不可露七八月尤忌之張渙論小兒癇疾最惡病自古說癇止有三種至晉唐間神仙名醫諸人方治講究一切諸癇惠眼觀證癇病形候大抵數類皆因積驚過時而發邪氣傳歸心臟每發時屈指如數物良久眼直視口嚼涎沫腰背強直忽然死良久即蘇一日之中常三五次發其候手足逆冷是也醫者只作驚風治之必難得痊此病驚邪氣傳入筋骨以睡驚膏重下數口白涎方見急驚風門中次用硃砂膏方見驚熱門中夾用去風藥調理如吐後或不說話無妨為吐損心氣至來年此時又恐再發復下前件藥即瘥吉氏家傳癇有八候前曰僕後曰僵晝曰陽夜曰陰罵人曰顛笑人曰邪一日十數次發曰癇小年有此患曰呆茅先生小兒初受癇病歌渾身壯熱腰背強兩眼瞪眅是尋常四肢抽掣多啼叫時發時醒仔細詳又小兒癇病死候歌四肢瘛瘲脈還沉身體如綿不暫醒緊噤牙關難進乳更兼腹滿轉虛鳴汗出熱來時又至渾身壯熱喜生驚直饒便是盧醫手手足蹤橫也不停石壁經三十六種驚風三發惡候歌搐來三度便成癇愛哭心中聚毒涎曾被醫人頻為取散入筋間病益傳鳳髓經云心脈傳雙眼有如羊未睡四肢軟弱不能安四十八候歌同此一句乃云口生白沫不堪言鳳髓經云此一句云涎如膿白不能安涎生光泡無他事卻請醫流仔細看此始初失治則便有此候本法當散其風須表之類其目如羊眼半開半合手足皆軟若色光明並睡易覺即易治若睡重面無光澤其睛不轉者不治也鳳髓經此歌亦同仍有注云與白鶴丹方見慢驚門中生銀方見急慢驚風門中小兒形證論四十八候驚風三發惡候歌一同後云此病驚風后醫人取散驚涎入經絡為癇每發口生白沫如水泡光者醫得若同碎點者難除若要患痊宜久服蛜𧌴丸此藥不吐不瀉只磨經絡驚涎蛜𧌴丸方見本門中本草治小兒癇方烏鴉一枚臘月者上入瓦缶泥煨燒為灰飲下子母秘錄治小兒癇方鱉甲炙令黃色上搗為末取一錢乳服亦可蜜丸如小豆大服子母秘錄治小兒癇方刮青竹茹三兩上以醋三升煎一升去滓服一合兼治小兒口噤體熱病一方只用竹瀝一合溫與兒服之孟詵治小兒癇疾方牡鼠一枚上取腹大貪食者可以黃泥裹燒之細揀去骨取肉和五味汁作羹與食之勿令食著骨甚瘦人葛氏方治小兒方卒得癇刺取白犬血一棗許合之又塗身上葛氏肘後方治卒得癇鉤藤甘草炙上各二分水五合煮取二合服如小棗大日五夜三葛氏肘後又方水銀小豆許上先將水銀安一瓷盞中沉湯煮之一食久服時勿大仰兒頭恐入腦亦可以壓切熱矣近世多不煮只以紙裂過服葛氏肘後方小兒百日病癇蛇蛻湯蛇蛻皮三寸炙聖惠用五寸鉤藤黃耆細辛甘草炙各二分大黃四分蚱蟬去足四枚炙聖惠去頭足牛黃五大豆許上八味切以水二升半煮取一升一合百日小兒一服二合甚良外臺備急云療少小百二十種癇病胸中病若窮地無藥可一二味亦合不可備用然大黃不得闕葛氏肘後小兒二十五癇大黃湯方大黃甘草炙當歸各一兩細辛二分上搗篩以一指撮著一升水中煮取二合一歲兒溫與一合日二得下即愈葛氏肘後江荔萬病湯主小兒癇方當歸細辛礬石燒甘草炙各一兩上以水四升煮取一升去滓納白蜜雞子大分為五服當日令盡則大良葛氏肘後療小兒癇極方茯苓龍齒各二分鉤藤芍藥黃芩各一分甘草半分蚱蟬二枚去翅足炙牛黃二大豆許上搗細研末入竹瀝一合研候湯欲成下以東流水二斗銀器煮金銀各十兩取五升入藥煎取一升半間乳細細與服此療未出月小兒若大即加藥此方是張大夫家秘千金龍膽湯治嬰兒出腹血脈盛實寒熱溫壯四肢驚掣發熱大吐哯者若已能進哺中食實不消壯熱及變蒸不解中客人鬼氣並諸驚癇方悉主之十歲以下小兒皆服之小兒龍膽湯第一此是新出腹嬰兒方若日月長大者以次依此為例若必知客忤及有鬾氣者可加人參當歸各如龍膽多少也一百日兒加三銖二百日兒加六銖一歲兒加半兩余藥皆準耳龍膽鉤藤皮柴胡黃芩桔梗芍藥茯苓千金翼作茯神甘草炙各六銖蛜𧌴二枚大黃一兩上十味㕮咀以水一升煮取五合為劑也服之如後節度藥有虛實虛藥宜減藥與水也兒生一日至七日分一合為三服兒生八日至十五日分一合半為三服兒生十六日至二十日分二合為三服兒生二十日至三十日分三合為三服兒生三十日至四十日盡以五合為三服皆得下即止勿復服也千金治少小癇心腹熱除熱丹參赤膏方丹參雷丸芒硝戎鹽大黃各二兩千金翼各三兩上五味㕮咀以苦酒半升浸四種一宿以成煉豬肪一斤煎三上三下去滓乃納芒硝膏成以摩心下冬夏可用一方但用丹參雷丸亦佳千金小兒出胎二百許日頭身患小小瘡治護小瘥復發五月中忽小小咳嗽微溫和治之因變癇一日二十過發四肢縮動背脊身夭䠷眼反須臾氣絕良久復甦已與常治癇湯得快吐下經日不間爾後單與竹瀝汁稍進一日一夕中合進一升許發時小疏明日與此竹瀝湯得吐下發便大折其間猶稍稍與竹瀝汁竹瀝湯方竹瀝五合黃芩三十銖羚羊角鎊屑木防己各六銖大黃二兩茵芋三銖麻黃去根節白薇桑寄生萆薢甘草炙各半兩白朮炮六銖一方作白鮮上十二味㕮咀以水二升半煮取藥減半納竹瀝煎取一升分服二合相去一食久進一服一方無萆薢千金翼治小兒癇方上將馬絆繩煮洗兒外臺備急又療少小二十五癇大黃湯方大黃甘草炙甘皮當歸各一兩細辛半兩上五味搗篩以三指撮著水一升煮取二合一歲兒服一合日二外臺古今錄驗赤湯療二十五種癇吐痢寒熱百病不乳哺方大黃五兩當歸芍藥黃芩栝蔞甘草炙桂心人參赤石脂牡蠣熬紫石英麻黃去節各二兩上十二味搗篩令調盛以韋囊八歲兒以干棗五枚用水八合煮棗取五合兩指撮藥入湯中煮取三沸去滓與兒服之取利微汗自除十歲用棗十枚三指撮藥水一升煮三沸服之此湯療小兒百病及癇神驗外臺備急又療百日及過百日兒發癇連發不醒及胎中帶風體冷麵青反張宜服麻黃五癇湯方麻黃去節二分嬰孺方用一分羌活乾葛各二分甘草炙二分嬰孺用一分半枳實曲炒二分嬰孺方用三分杏仁二十枚去皮尖碎嬰孺方用四十個升麻黃芩大黃各四分柴胡芍藥各三分鉤藤皮一分嬰孺方用一分半蛇蛻三寸炙嬰孺方用二分蚱蟬二枚炙去足翅石膏六分碎上十五味切以水二升並竹瀝五合煎取六合每服一合佳嬰孺方用水二升半竹瀝二合煮取六合半為五服聖惠治小兒五種癇手足動搖眼目反視口吐涎沫心神喜驚身體壯熱硃砂散方硃砂牛黃並細研白蘞露蜂房杏仁湯浸去皮尖雙仁麩炒微黃各一分桂心半兩上件藥搗細羅為散入研了藥令勻每服以乳汁調下一字日五服量兒大小加減服之聖惠治小兒諸癇驚惕掣瘲及中客忤宜服牛黃丸方牛黃細研人參防風各去蘆頭細辛赤芍藥栝蔞根當歸以上各半兩蚱蟬七枚去翅足微炙嬰孺用二分川大黃一兩銼碎微炙甘草三分炙微赤銼蛇蛻皮五寸炙令黃色嬰孺方用三分麝香一分細研嬰孺方用二分巴豆三十粒去皮心研如膏上件藥搗羅為末入巴豆研令勻煉蜜和搗三二百杵丸如麻子大初生一月至百日兒每服一丸一歲至三歲服兩丸四歲至五歲兒每服三丸並用薄荷湯下令快利為度嬰孺方云若兒惕惕驚及中人溫壯發熱腹滿有不調增服令快利為度量兒大小虛實與服聖惠治小兒未滿月及出月壯熱發癇宜服鉤藤散方嬰孺方用鉤藤湯分兩並不同鉤藤皮一分嬰孺方用二分半蚱蟬二枚微炒嬰孺方用一枚去頭足炙柴胡去苗川升麻黃芩各半兩甘草一分炙微赤銼石膏一分細研嬰孺方用二分蛇蛻皮五寸微炙嬰孺方用二寸川大黃半兩銼碎微炒嬰孺方用三分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓入竹瀝半合更煎三兩沸量兒大小分減溫服嬰孺云得利見湯色出者停後服至五六十日兒一服一合若連發不醒者加麻黃一分去節聖惠治小兒初生百日內發癇蚱蟬散方蚱蟬微炙赤芍藥各三分黃芩甘草炙微赤銼黃耆銼細辛各半兩鉤藤半分嬰孺方用二分蛇蛻皮五寸炙令黃色嬰孺方用二分牛黃一分細研麝香一錢細研嬰孺方用半分川大黃一錢銼碎微炒上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小分減溫溫服之嬰孺方云治小兒五十日發癇諸藥不愈者又云五十日兒麝香牛黃不必兩用十一物者治百日兒也聖惠治小兒百日內發癇連發不醒及胎中帶風體冷麵青身體反張麻黃散方麻黃去根節甘草炙微赤銼鉤藤各一分羌活柴胡去苗各三分川大黃銼碎微炒川升麻子芩各一分枳殼麩炒微黃去瓤葛根銼各半兩蛇蛻皮五寸炙令黃石膏一兩半細研蚱蟬二七枚微炙杏仁半兩湯浸去皮尖雙仁麩炒微黃上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓更入竹瀝半合煎三二沸量兒大小分減服之聖惠治小兒諸癇宜用固囟大黃膏方川大黃三分雄黃丹參黃芩各一分生商陸一兩豬脂一斤雷丸附子去皮臍生用各半兩上件藥搗碎以豬脂先入鍋中以文火熬令熔以綿濾過然後下藥煎令七上七下去滓細研雄黃下膏中攪令至凝於瓷器中盛每用少許熱炙手摩兒囟及掌中背脅皆使遍訖以蛤粉粉之聖惠治小兒癇及百病傷寒雷丸膏方雷丸一分甘草一兩嬰孺方用五分莽草川升麻各一兩嬰孺方用二味各二兩防風一兩去蘆頭嬰孺用五分桔梗二分去蘆頭白朮三分嬰孺方用二分上件藥搗羅為末以豬膏一片先入鐺慢火煎令熔後下藥末以柳篦不住手攪成膏綿濾入瓷合盛之每有患者摩其頂及背上嬰孺方云東郡濮陽張子良不用針灸只用此膏小兒癇及腹中病熱摩腹背令適待乾粉之立愈靈苑大金箔丸治一切風及大人小兒諸癇解心胸壅熱消痰墜涎金銀箔各一百片辰砂一兩研牛黃研生犀末丁香沉香真珠末木香腦麝琥珀末硼砂烏蛇肉酒浸炙去皮骨天麻酒浸炙雄黃研蠍梢白殭蠶附子炮去臍皮天南星炮防風白附子甘草炙以上各一分香墨半兩燒上件二十四味杵羅為細末入研者藥同一處勻合又將金銀箔入水銀三分同研如泥再同研令勻煉蜜為丸如綠豆大每服大人五丸用薄荷酒下小兒三丸薄荷湯下靈苑治大人小兒一切風及久患癇病天烏散方一名狐肝散臘月烏鴉一隻去毛羽及嘴爪腸胃臘月野狐肝一具同前物入餅子內固濟燒為灰麝香研天麻犀角屑各半兩乾蠍白殭蠶蟬殼牛黃研更多益妙荊芥取穗藿香天南星去心白附子膩粉研桑螵蛸須用臘月抹取桑上者佳各一兩烏蛇二兩酒浸炙去皮骨上件一十六味並精細杵羅為末每服半錢用煎荊芥湯或豆淋酒調下空心小兒用薄荷湯調下一字嬰孺治五歲兒壯熱發癇疹自下痢五癇湯方大黃十二分鉤藤皮蜂房麻黃去節各二分柴胡梔子仁知母芍藥升麻各七分蚱蟬三個石膏十分碎蛇蛻皮五寸炙杏仁六分上水七升煮二升去滓稍稍如人肌暖以拭身嬰孺治新生兒客忤中惡癇發乳哺不消中風反折蹙口吐舌並疰忤面青目下垂腹滿丁奚羸瘦脛交三歲不能行麝香雙丸方麝香牛黃黃連各二兩桂心雄黃烏賊魚骨炙丹砂附子炮巴豆六十粒去皮炒特生礜石燒煉半日各一錢蜈蚣一個去頭足上十一味別研巴豆如脂和末勻蜜和杵三千下拍合收勿泄氣十日至一月兒服一米許百日至三百日兒服二麻子許以意增減兒雖小病甚者增大其丸不必依此小兒病率多耐藥服當汗出若不汗及不覺瘥一日一夜四五服以汗出及瘥為限為嬰兒中人亦為客忤婦人月水來未盡了觸兒子亦為客忤若喜失子產生輒死者兒落地啼聲未絕便以指刮舌上當時銜血如薤葉者便與二丸米大一日一服七日乃止無不全者若不全合一劑當合半劑者用巴豆三十個若三分合一者用巴豆二十七粒亦不隨余藥減其然者正以此為良爾若無赤頭足蜈蚣者只取赤者三條斷其頭並項後二節用之其餘者不堪用也嬰孺治小兒癇時時發作將成厥宜服鎮心丸方人參桂心蜀椒茯苓附子炮各三分細辛乾薑半夏牛黃各二分桔梗十分白薇五分防葵四分上為末蜜丸小豆大先食服五歲六歲三丸日三往來寒熱及虛熱者可作知母丸若胸上氣脹可作杏仁煎嬰孺黃帝石室紫藥神丸治小兒十二癇方丹砂九分別研大黃六分桂心半夏洗各四分牛黃黃連各五分雲母七分雄黃二分特生礜石十二分煉上為末更入巴豆二分心去炒雷丸三分真珠一分代赭二分乾薑三分各為末新絹袋盛蒸如十斛米熟方取牛黃桂薑代赭別為末與前相和勻以蜜杵丸黍大一歲兒乳頭上下一丸十歲小豆大一丸日三服嬰孺治少小百癇崇命湯方當歸細辛龍骨牡蠣各二分石膏大黃芍藥黃芩赤石脂桂心各一分甘草四分乾薑三分上十二味㕮咀五歲兒五指撮以水七合大棗五個去核煮取三合日三服一服一合若夏天二服自下者用赤石脂量兒大小增減若有熱若驚加黃芩二分以韋囊盛藥大驗嬰孺治少小二十五癇日數百發者治之無不效曾青湯方曾青甘草炙二分當歸細辛芍藥獨活大黃麻黃去節各三分上八物水三升煮取七合一月兒服如杏核二月二杏核大小以此為準湯訖要當抱兒令汗出若先下者勿令汗出若自汗出去麻黃加麻黃根一分若腹中急痛加當歸芍藥一分若縮口聚唾夭紏者加細辛一分若中風身強戴眼反折者加獨活一分要當消息視病所苦依病增減藥藥皆令精新或分五服日三夜二小有癇候便可作服無病候亦可服令兒終身不病癇日中數百發者此湯治之無不瘥者嬰孺治少小眾癇乳哺不時發溫壯吐利驚掣胎寒腹痛一十五癇四味大黃湯方大黃四分芍藥當歸甘草炙各二分上四物以水三升煮取一升去滓一月兒服一杏核許日三服百日兒二杏核大小以此為率若發熱加麻黃二分去節有毒當切之先煮數沸去沫納諸藥若反折戴眼掣縮者加細辛四分若乳哺不消壯熱有實者增大黃令倍諸藥不爾等分大黃刀劈破勿令有碎末無其疾不須增益兒有大小強弱以意增減一方諸藥等分兒下痢者減大黃三分之一服湯令母抱之令小汗出病甚者令大汗出畢溫粉粉之下痢者勿令出汗也日夜可四服兒夜啼有微熱口銜乳若不安皆可服一方治下粗篩盛以韋囊欲合小劑用水一升半煮三指撮藥內湯中更三沸令得六合絞去滓服之皆當取真新藥方可用也小兒氣弱惡藥不精非但無益乃更損兒可不慎乎此方屢試有驗王汝南方又戴眼中風身體當強增獨活二分大妙便是葛氏肘後及元和經四味飲子但分兩不同及又有加減藥爾肘後與元和經方已收溫壯門中嬰孺治少小癇手足掣瘲十指顫舌強獨活湯方獨活麻黃去節人參各二分大黃四分上四物水二升煮麻黃減三合去沫納諸藥煎九合為三服大有神效嬰孺治少小生七日已後患癇茯苓鉤藤湯方鉤藤茯苓各二分甘草炙大黃煨各一分上四味水一升煮取三合為五服當大驗嬰孺治少小發癇經日不解諸治不瘥口焦面赤黑胸中有熱茵陳湯茵陳大黃黃芩各四分黃連硝石無以芒硝代之甘草炙各二分上六物水三升煮取一升二合內硝石烊盡為三服嬰孺治期歲至四歲兒壯熱大驚發癇蚱蟬湯方蚱蟬二