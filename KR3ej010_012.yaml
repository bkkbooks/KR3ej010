去翅足炙上件為末研煉蜜為丸四五歲如赤豆大五丸日再服大兒十丸米飲下忌生冷油膩外臺古今録驗療五癲牛癲則牛鳴馬癲則馬嘶狗癲則狗吠羊癲則羊鳴雞癲則雞鳴五癲病者腑臟相引盈氣起寒厥不識人氣急掣瘲吐沫久而得蘇雄黃丸方千金名雄雌丸雄黃研雌黃一方無一方用一兩真珠末水銀各一兩熬千金水銀使八分鉛丹二兩熬成屑千金此一味是鉛丹砂半兩研千金用二兩上六味搗和以蜜又搗三萬杵為丸先食服胡豆大三丸日再驚癇亦愈良千金範汪同兒三丸如小豆忌生血物聖惠治小兒心臟積熱時發癲癇嘔吐涎沫作聲迷悶鐵粉丸方鐵粉龍齒各細研一兩鉛霜麝香各細研天南星各一分天麻三分硃砂細研水飛過水銀黑鉛各半兩與水銀結為砂子細研上件藥搗羅為末都研令勻以煉蜜和丸如緑豆大每服以竹瀝研化五丸服之量兒大小以意加減聖惠治小兒癲發動無時心悶吐沫雄黃丸方雄黃鐵粉各細研硃砂細研水飛過各半兩獖豬膽二枚熊膽一分鯉魚膽七枚烏牛膽半枚青羊膽二枚麝一錢細研上以諸般膽汁相和令勻即入諸藥末和丸如緑豆大每服以金銀湯下五丸量兒大小以意加減聖惠治小兒五歲至七歲發癲癇無時發動口出白沫遺失大小便不覺虎睛丸方虎睛一對細研硃砂細研水飛過半兩雷丸三分露蜂房煅炙麻黃去根節子芩甘草炙微赤銼天麻鉤藤各半兩防葵川大黃銼碎微炒龍齒細研梔子仁石膏細研水飛過蚱蟬去翅足微炙各一兩銀箔三十片細研麝香牛黃各細研蛇蛻皮銼微炒各三分羌活柴胡去苗白蘚皮川升麻沙參去蘆頭各三分上件藥搗羅為末煉蜜和搗三二百杵丸如緑豆大每服以粥飲下五丸量兒大小加減服之聖惠治小兒癲癇瘛瘲發歇無時地龍散方乾地龍半兩微炒虎睛一對微炙人參一分去蘆頭以上三味同搗羅為末金銀箔各三十片硃砂雄黃天竺黃代赭鉛霜鐵粉各一分上件藥都研細入前三味研令勻每服以溫水調下半錢更看兒大小加減聖惠治小兒癲癇至大不瘥或發即口出白沫並大小便出不知虎睛丸方虎睛一對酒浸一宿微炒細研硃砂石膏各細研水飛過鐵粉龍齒細研各一兩露蜂房微炙羌活鉤藤防葵麻黃去根節川升麻各半兩細辛一分牛黃半分細研蚱蟬四枚去翅足炙上件藥杵羅為末都研令勻煉蜜和丸如麻子大每服以溫水下五丸量兒大小加減服之聖惠治小兒癲癇連年不瘥方鉛水銀各二兩硫黃鐵粉各一兩上先將鉛於鐺子中令消即下硫黃炒不住手就鐺研攪待硫黃煙氣似息入水銀又攪次下鐵粉以武火燒少時將出一夜露地出火毒後研令極細即以粟米飯和丸如緑豆大每於食後以金銀湯下五丸量兒大小以意加減聖惠治小兒癲癇等疾方光明硃砂二兩顆塊者上以金箔隨硃砂顆塊大小各裹之用磁石末入固濟了瓶子中實築中心留一坑子即以硃砂置坑子內上更以磁石末覆之瓶子口更以鉛一片可瓶口大小蓋之以文火養七日火常令露鉛以箸刺得入養一七日後去鉛大火煅之候冷出於乳鉢中細研即置於通油鉢子內上以馬牙硝末遍覆之即置飯甑中蒸一炊久其硃砂化成水有患者食後以溫水調下半錢量兒大小以意加減服之聖惠治小兒癲癇欲發即精神不足眼目不明瘛瘲惡聲嚼舌吐沫雌雄丸方雌黃細研炒令褐色黃丹炒令褐色各一兩麝香一分上件藥相和細研如粉用牛乳一升慢火熬成膏可丸即丸如緑豆大每服以溫水下三丸日三服量兒大小以意加減服之聖惠治小兒癲癇發歇不定硃砂丸方硃砂細研水飛過鉛霜鐵粉馬牙硝各一兩上件藥細研如面以棗肉和丸如緑豆大每於食後以熟水下三丸量兒大小以意加減嬰孺治小兒一二歲發癇至大不瘥成癲病發無時口出白沫並大小便不知出虎睛丸方虎睛一具酒浸一宿炙黃丹砂鐵粉精子芩大黃龍齒梔子仁銀屑各四分蜂房炙鉤藤皮柴胡白蘚皮麻黃去節雷丸炙各二分羌活沙參升麻各三分牛黃半分蚱蟬四枚去翅足自死者防葵蛇蛻皮各七分炙細辛一分半石膏五分上為末蜜丸四五歲服大豆大十丸與顱囟經藥味同只多牛黃及分兩不同張渙熊膽丹方治癲癇鎮心安神真熊膽鐵粉各細研硃砂細研水飛生天南星末雄黃水磨精明者別研各半兩粉霜一分研腦麝各研一錢上件同拌勻用獖豬膽一枚取汁和諸藥丸如黍米大每服十粒至二十粒煎金銀薄荷湯下張渙天麻散方祛風治癲癇天麻防風麻黃去節根各一分甘草炙川升麻羌活黃芩川大黃炮各半兩上件搗羅為末每服一錢水一盞煎至五分去滓放溫服張渙黑錫丹方治癲癇及諸癇胞絡涎盛黑錫二兩同水銀半兩慢火結砂子鉛霜鐵粉各細研半兩麝香一分細研天南星一兩炮取末上件同再研勻滴水和如黍米大每服十粒煎竹葉湯下張渙日應丹方治癲癇連年不瘥黑錫硫黃水銀細研鐵粉研各一兩金銀箔各三十片上件將錫於鐺子內熔令消即入硫黃炒不住手就鐺研攪候硫黃煙氣似息次入水銀鐵粉金銀箔同攪用緊火燒少時都傾出露地一宿出火毒再研和勻用粟米飯和如緑豆大每於食後服五粒至七粒煎人參湯下量兒大小加減
