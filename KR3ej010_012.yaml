body:
  text: 卷第十二五癇異治凡五門風癇第一巢氏病源小兒風癇者由乳養失理血氣不和風邪所中或衣厚汗出腠理開張聖惠於此又云當風解脫風因而入如得之時先屈指如數乃發掣縮是也當與豚心湯又病先身熱瘛瘲驚啼喚而後發聖惠以喚字為笑字癇脈浮者為陽癇內在六腑外在肌膚猶得易治病先身冷不驚瘛不啼喚乃成病聖惠亦以喚字為笑字發時脈沉者為陰癇內在五臟外在骨髓極者難治病發時身軟時醒者謂之癇身強直反張如尸不時醒者謂之痙診其心脈滿大癇瘛筋攣肝脈小急亦癇瘛筋攣尺寸脈俱浮直上直下此為督脈必腰背強直不得俯仰小兒風癇三部脈緊急其癇可治小兒脈多似雀鬪聖惠云雀啄要以三部脈為主若緊者必風癇凡諸癇發手足掣縮慎勿持捉之捉之則令曲戾不隨也千金治少小風癇積聚腹痛夭矯二十五癇大黃湯方大黃人參細辛乾薑當歸甘皮各三銖甘皮嬰孺方用甘草上六味㕮咀以水一升煮取四合服如棗許日三千金治小兒風癇胸中有痰白羊鮮湯白羊鮮三銖蚱蟬二枚大黃四銖甘草炙鉤藤皮細辛各二銖牛黃如豆大四枚別研蛇蛻皮一寸上八味㕮咀以水二升半煮取一升二合分五服日三若服已盡而癇不斷者可更加大黃鉤藤各一銖以水漬藥半日然後煮之此方與聖惠分兩稍異圖經篋中方治小兒風癇上取蠍五枚以二大石榴割頭去子作甕子納蠍其中以頭蓋之紙筋和黃泥封裹以微火炙乾漸加火燒令通赤良久去火待冷去泥取中焦黑者細研乳汁調半錢匕灌之便定兒稍大則以防風湯調末服之外臺廣濟療大人小兒風癇卒倒嘔沫無省覺方麻黃去節大黃牡蠣熬黃芩各四兩寒水石白石脂石膏研赤石脂紫石英滑石研各八兩人參桂心各二兩蛇蛻皮一兩炙龍齒六兩研甘草三兩炙上十五味搗為散用藥八兩以一薄絹袋盛散藥用水一升五合煮取七合絞去滓頓服之日再服一方水二升煮散方寸匕取一升去滓服之少小百日服一合熱多者日二服三五日一服亦得本方無麻黃龍齒蛇蛻皮忌海藻菘菜生蔥熱面蕎麥豬肉蒜膩黏食外臺廣濟又方鉤藤皮麻黃去節各二分龍齒六分研綿裹銀一斤寒水石二十分梔子擘二十分知母二十分石膏碎綿裹二十分升麻十分杏仁去皮尖雙仁研二十分子芩十四分蛇蛻皮七寸炙蚱蟬四枚去足翅炙柴胡十分芍藥沙參各八分生葛汁五分蜜七合牡牛黃如大豆粒十枚煎成研下之上十九味切以水六升淡竹瀝二升合煮取二升四合絞去滓內杏仁脂葛汁蜜於微火上煎攪不停手冷餘二升三合成三四歲一服二合五六歲一服二合半日再服稍增兒若大便澀者加大黃十分慎熱面炙肉魚蒜黏食油膩冷水聖惠治小兒風癇筋脈抽掣夜臥驚悸四肢煩躁皮膚壯熱天竺黃散方天竺黃牛黃各細研知母赤芍藥犀角屑鉤藤元參桔梗去蘆頭龍骨川大黃銼碎微炒白殭蠶微炒茯神以上各一分蜣螂七枚去足微炒檳榔一枚紙裹微煨上件藥搗細羅為散每服以薄荷湯調下半錢一日五服隨兒大小以意加減聖惠治小兒心臟久積風熱發癇或遍身壯熱多饒痰涎睡即驚悸手足抽掣水銀丸方水銀黑鉛各半兩同水銀銚子內慢火結砂子細研乾蠍二十一枚頭尾全者微炒半夏湯浸七遍去滑白附子炮裂天麻鬱金麝香各一分細研上件藥搗羅為末都研令勻用糯米飯和丸如麻子大每服以薄荷湯下三丸量兒大小以意加減聖惠治小兒風癇發動無時壯熱心煩筋脈拘急牛黃散方牛黃硃砂各細研木香白殭蠶微炒乳香各一分乾蠍七枚微炒羌活半兩上件藥搗細羅為散不計時候以溫竹瀝半合調下半錢量兒大小以意加減聖惠治小兒風癇並心熱多驚七寶鎮心丸方虎睛一對酒浸微炙用硃砂細研水飛過雄黃琥珀真珠末各半兩金銀箔各五十片腦麝各一分上件藥都細研如面以棗肉和丸如緑豆大每服以井華水下三丸量兒大小以意加減聖惠治小兒風癇精神昏悶遍身壯熱不得睡臥茯神散方茯神木通銼人參去蘆頭川升麻子芩犀角屑各一分鐵粉龍齒各三分蜣螂三枚微炒去翅足上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓入竹瀝半合不計時候量兒大小分減溫服聖惠治小兒心臟壅熱變為風癇身體壯熱驚悸不安心神煩悶多啼少睡犀角散方犀角屑羌活川升麻柴胡去苗各三分茯神白蘚皮葛根各半兩銼甘草炙微赤蛇蛻皮炙各一分蚱蟬三枚微炒去翅足石膏二兩細研鉤藤半兩麥門冬一兩半去心焙川大黃銼碎微炒子芩各一兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小以意加減服之聖惠治小兒風癇自三歲以來至十歲不瘥發時口中吐白沫大小便不覺虎睛丸方虎睛一對酒浸炙令黃硃砂細研水飛過麻黃去根節鉤藤柴胡去苗白蘚皮川升麻雷丸沙參去蘆頭牛黃細研各半兩防風去蘆頭子芩川大黃銼研微炒鐵粉銀屑細研梔子仁羌活各三分龍齒細研石膏細研水飛過各一兩蚱蟬四枚微炒炙去翅足細辛一分上件藥搗為末煉蜜和搗三二百杵丸如緑豆大三歲以下以薄荷湯下三丸日三服三歲以上以意加丸服之聖惠治小兒風癇及一切驚熱蛇蛻皮散方蛇蛻皮五寸燒灰細辛鉤藤黃耆銼甘草炙微赤鉛霜各半兩研川大黃一兩銼碎微炒蚱蟬四枚微炙去翅足上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓入牛黃末一字放溫量兒大小臨時加減服之聖惠治小兒風癇及天瘹宜服雄黃散方雄黃熊膽各半錢硃砂天麻末鉛霜各一分牛黃晚蠶蛾天竺黃各半分馬牙硝半兩麝香一錢上件藥同研如粉常以不津器貯之每服用溫水調下半錢量兒大小以意加減服之聖惠治小兒風癇發即迷悶手足抽掣口內多涎良久不醒牛黃丸方牛黃麝香各細研乾蠍半夏湯洗七遍去滑蟬殼各一分天南星白附子白殭蠶天麻各半兩上件藥並生用搗羅為末又以水銀一兩煮棗三七枚去皮核與水銀同研令星盡入煎藥末和丸如緑豆大如隔日發者每服煎黃牛乳汁下三丸日三服如驚風即煎荊芥湯下兩丸聖惠治小兒風癇手腳抽掣翻眼吐沫久患不可者宜服黑金丹方黑鉛水銀天南星炮裂搗羅為末各半兩上件藥先熔鉛為汁次下水銀結為砂子細研與天南星末和勻以糯米飯和丸如緑豆大每一歲兒以乳汁研一丸服之兒稍大以意加之聖惠治小兒風癇睡中驚叫兩眼翻露及臍風撮口天瘹驚風並服此牛黃散方牛黃鉛霜各一分天竺黃半兩馬牙硝一兩上件藥細研為散不計時候以熱水調下半錢量兒大小以意加減聖惠治小兒心熱風癇發歇不定方天靈蓋塗酥炙微黃黃連去須一分上件藥搗粗末為散每服一錢水一盞煎取五分去滓溫服量兒大小以意加減聖惠治小兒風癇化涎水銀丸方水銀一兩生黑豆末二錢上以棗瓤同研令星盡丸如緑豆大一歲兒每服以乳汁下一丸良久吐出黏涎神效兒稍大加丸服之聖惠治小兒二十五種風癇無時發動宜服天麻散方天麻防葵真珠末天竺黃細研威靈仙蜣螂微炒川芒硝各三分牛黃一分細研上件藥搗細羅為散更研乳入每有疾之時取雞冠血三兩滴子與新汲水一合打散令勻調下半錢更隨兒大小以意加減嬰孺敕賜神驗方治少小熱風癇兼失心者菖蒲石上一寸九節者宣連白朮車前子生地黃苦參地骨皮各一大兩上為末蜜丸大如黍米每食了服十五丸不拘早晚以飲下不論治疾兼令人長壽忌豬羊肉血飴糖桃梅果物藥宜常服之嬰孺治少小兒風癇發無時數已下虛不足後治風虛黃耆湯方黃耆麻黃去節蚱蟬炙甘草炙當歸細辛桂心芍藥人參各二分蜣螂四個炙牛黃半分蛇蛻皮一寸炙上件十二物水五升煮取一升半一服二合常用神效良嬰孺治少小風癇晝夜數十發麻黃湯方麻黃去節黃芩黃連大黃各一分甘草二分炙上五物水一升先煮麻黃五沸去沫納諸藥煮五合為五服日夜再服嬰孺治少小風癇屢經發動獨活酒方獨活甘草木防己各四分乾薑細辛各五分鴟頭二個桂心二兩鐵粉一兩人參七分上九物入絹袋中酒四升浸五夜初服半合日二嬰孺治少小風癇發動手足不仁木防己酒方木防己十四分鉛丹防風桂心龍齒各八分丹砂甘草炙各六分獨活二十分細辛當歸乾薑各五分莽草一分上切入絹袋中酒五升浸五日熟取初服半合日三嬰孺治小兒風癇掣瘲戴眼極者日數十發雷丸膏方雷丸莽草各如雞子黃大豬脂一斤上先煎豬脂去滓下藥微火上煎七沸去滓逐痛處摩之小兒不知痛處先摩腹背乃摩余處五十遍勿近陰及目一歲兒以帛包膏摩微炙身及治大人賊風嬰孺治風癇掣瘲身體汗出而頭獨不出灸頂上旋毛中以小炷勿令大三炷訖以白朮湯浴之方白朮五兩碎上取白米泔二升同煮三沸適寒溫洗頭及身立瘥嬰孺又方菖蒲上煮為湯浴兒大良嬰孺治少小風癇發作言語謬錯紫石酒方紫石英八分附子炮三分鐵精茯神獨活各五分遠志去心桂心各六分牛黃蜂房炙各二分乾薑甘草炙人參各四分上以絹袋盛清酒五升浸五宿初服一合日二服張渙烏蛇散方專治一切風癇角弓反張潮搐甚者及心肺中風並宜服之烏蛇梢一兩生用白附子半夏各一分天麻白殭蠶人參去蘆頭全蠍羌活石菖蒲一寸九節者各半兩川附子一枚重半兩微炮去皮臍上件搗羅為粗末每服二錢水兩盞入生薑十片薄荷五葉同煎至一盞濾去滓放溫時時滴口中張渙蜣螂方治諸種風癇干蜣螂三分微炒威靈仙洗焙乾天麻防葵各半兩蠍梢一分以上搗羅為末次用川芒硝天竺黃各一分同細研上件與諸藥一處拌勻每服一字至半錢乳香湯調下張渙蚱蟬湯方治諸風癇胸中痰盛干蚱蟬七枚微炙白蘚皮一兩鉤藤細辛去土川大黃銼微炒天麻牛黃別研各一分蛇蛻皮五寸許炙令黃上搗羅為末同牛黃拌勻每服一錢水八分入人參薄荷各少許同煎五分去滓稍熱服張渙茯神湯方治風癇身體壯熱不除精神恍惚茯神綿黃耆獨活防風羚羊角屑各一兩肉桂桔梗甘草微炒麻黃去根節各半兩上件搗羅為細末每服一錢水一小盞入荊芥乳香各少許煎五分去滓放溫服張渙芎犀散方治風癇多因不省川芎犀角屑獨活各一兩蠍梢人參天麻各半兩上件搗羅為細末每服一錢水八分一盞入生薑兩片薄荷兩葉煎至五分去滓溫服劉氏家傳治風癇及小兒驚風上以芭蕉自然汁時時呷一兩口甚者服及五升必愈亦治小兒驚風邵孚仲通直云加麝香更佳豫見蔣元明祕校云風蚛牙頤頰腫痛以自然汁一碗煎及八分乘熱嗽牙腫處嗽盡即止凡是風牙用之必愈頤頰腫而牙齦痛者風牙也頤頰不腫只牙齦腫痛者蚛牙也吉氏家傳治一切風癇木賊半兩為末臘茶一錢半上件為末拌勻每服一錢以磨刀清水調下不計時候服罷吃少人參吉氏家傳治熱風癇茯神丸茯神鐵粉參各八分龍齒梔子仁子芩升麻各六分門冬子三分上末煉蜜為丸如麻子大食前漿水下二三十丸吉氏家傳治風癇水銀丸水銀雄黃蛇黃各一分輕粉生犀末各二錢上細研水銀入肉棗丸如此大蜜水化二丸驚癇第二巢氏病源小兒驚癇候驚癇者起於驚怖大啼精神傷動氣脈不定因驚而發作成癇也初覺兒欲驚急持抱之驚自止故養小兒常慎驚勿聞大聲每持抱之間常當安徐勿令驚怖又雷鳴時常塞兒耳並作余細聲以亂之驚癇當按圖灸之摩膏不可大下何者驚癇心氣不足下之內虛則甚難治凡諸癇正發手足掣縮慎不可捉之捉之則令曲戾不隨也本草治小兒驚癇方上以豬齒燒