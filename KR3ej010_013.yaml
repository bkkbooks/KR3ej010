body:
  text: 卷第十三胎風中風凡十門胎風第一聖惠論夫小兒在胎中之時臟腑未具神氣微弱其母或調適失宜食飲不節嗔怒無度舉動驚胎或坐臥當風或觸冒寒暑腠理開泄風邪所傷入於胎中兒生之後邪氣在於臟腑不得宣通而又洗浴當風包裹失度冷觸臍帶風傷四肢乳哺不調痰熱壅積則令壯熱吐哯睡里饒驚心神不安手足抽掣身體強直眼目反張故號胎風若風熱不除變成癇疾也石壁經三十六種內胎風候歌人間此患太幽微此患醫流必少知一百日中同一氣三周天度是胎期子生身熱如湯潑胎熱還因是母肥腦額有瘡難得效必因胎內與夫為生瘡兩腳如穿爛此去難推五歲期一臘未經先撮口兩拳雙握背腰齊便知臟腑生邪毒只限三朝骨肉離男子握拳指歸里女兒向外不堪醫須看逆候難行藥更求筋脈在中眉眉裡有筋紅碧色一云青碧色四十八候云紅兼赤算來有命莫相疑若有黑光千萬死鳳髓經云眉裡赤紅四十八候此一句云黑綠若還兼青色此身何處覓良醫此產母食毒物或多飲酒便胎氣熱孩兒生下一如湯潑身赤有溜氣常急者不治或有白溜者亦然過三歲則定婦人八九個月有身尚未止房事所以額上並腳上有瘡其瘡雖較較而復發甚者必主臍風撮口牙關緊急受命亦短不盡天年也若生下孩兒手大指握拳時男子指在外女子指在內則順也逆者必死若眉中上下青紅鮮靜者生若色不快則惡候須節次看證候調理小兒形證論四十八候胎風歌同後云此候如是頭長子或母身大或夏天抱惜過度初生七八日間發後看大拇指男兒向外女兒向里更看赤脈在眉間形證順則安逆則死多有醫人不識呼作脾風者誤也可下蛜𧌴丸方見一切癇門中或大青丹方見急慢驚風門中三五歲方進通經散方見本門聖惠治小兒胎風搐搦筋脈拘急牙關或時緊硬犀角丸方犀角屑天南星炮裂白附子炮裂乾蠍微炒天麻麻黃去根節各半兩白花蛇一兩酒浸去皮骨炙令黃以上七味搗羅為末用無灰酒二大盞攪令勻於慢火上煎旋添酒不住手攪以酒盡為度次入牛黃膩粉硃砂水銀以棗肉研令星盡各一分麝香半分虎睛一對微炙龍腦一錢上件藥並細研都入酒煎膏內看硬軟和丸如綠豆大不計時候以竹瀝下三丸量兒大小加減服之聖惠治小兒胎風驚熱手腳急強天竺黃散方天竺黃細研胡黃連犀角屑天麻酒浸焙乾蟬殼微炙各一分牛黃半分細研上件藥搗為散都研令勻不計時候以新汲水調下一字二歲以上加藥服之聖惠治小兒胎風驚熱搐搦心神煩亂或渴牛黃散方牛黃細研半分人參去蘆頭甘草炙微赤銼鬱金川大黃銼碎微炒硃砂細研水飛過胡黃連各半兩真珠末一分上件藥搗羅為細散都研令勻不計時候以蜜水調下半錢量兒大小以意加減服之聖惠治小兒胎風心熱驚癇硃砂散方硃砂牛黃天竺黃鐵粉各一分麝香半分上件藥都研令細每服以竹瀝調下半錢不計時候量兒大小以意加減聖惠治小兒胎風驚熱牛黃散方牛黃硃砂並細研各一分天竺黃鉛霜各細研人參去蘆頭各半兩馬牙硝一兩細研上件藥搗羅細為散每服以薄荷湯調下半錢量兒大小加減服之聖惠治小兒胎風及驚風虎睛丸方天麻酒浸焙乾乾蠍微炒烏蛇肉炙微黃羌活獨活殭蠶微炒麝香細研各一分虎睛一對酒浸炙微黃上件藥搗羅為末以麵糊和丸如綠豆大每服三丸研破不計時候以薄荷湯服之聖惠治小兒胎風發作抽掣渾身急強眼目反張水銀丸方水銀天麻酒浸焙乾天南星炮裂白附子炮裂白殭蠶乾蠍並微炒各一兩腦麝細研藿香各一分上件藥搗羅為末先用少許棗泥研水銀星盡與諸藥末同研令勻煉蜜和丸如綠豆大不計時候以薄荷酒研三丸服之量兒大小以意加減得汗出立效聖惠治小兒胎風手足搐搦遍身壯熱牛黃丸子方牛黃硃砂各細研犀角屑蠍梢炒水銀用黑鉛一分同結砂子細研天漿子天南星炮裂各一分麝香一分細研上件藥搗羅為末以糯米飯和丸如綠豆大不計時候以薄荷湯化破三丸服之量兒大小以意加減聖惠治小兒胎中久積風熱發渴手足搐搦多驚不睡露蜂房丸方露蜂房炒令黃色天南星炮裂各半分蠶蛾微炒硃砂細研水飛過各半兩天漿子三十枚微炒乾蠍微炒膩粉牛黃細研水銀以棗泥研令星盡各一分上件藥搗羅為末都研令勻以煉蜜和丸如綠豆大不計時候煎槐柳薄荷湯下五丸量兒大小以意加減聖惠治小兒胎風搐搦壯熱多驚天竺黃丸方天竺黃細研天南星炮裂胡黃連各半兩鉛霜牛黃並研細各一分上件藥搗羅為末研入牛黃等令勻用棗肉和丸如綠豆大不計時候以乳汁研破三丸服之量兒大小以意加減如三歲以上用酒及荊芥湯下聖惠治小兒胎風手足抽掣宜服牛黃丸方牛黃天竺黃各半兩羌活末麝香各一分蠍二枚頭尾全炒上件藥研羅為細末煉蜜和為丸如麻子大一二歲兒不計時候以薄荷湯下三丸三四歲兒每服五丸量兒大小以意加減聖惠治小兒胎風四肢驚掣痰涎壅滯宜服水銀丸方水銀半兩黑錫半兩同結作砂子天麻酒浸焙乾乾蠍微炒半夏湯洗七遍去滑鬱金白附子炮裂各一分上件藥搗羅為末以軟飯和丸如綠豆大不計時候以薄荷湯下一丸量兒大小加減服之四十八候治小兒胎風通經散方人參茯苓硃砂各一分當歸半兩蠍牛膠各一錢蟬蛻七個紅芍藥二分甘草五寸炙犀角少許上為末每服一錢半麥門冬湯調下杏仁湯亦可張氏家傳蠍梢散治小兒胎風天瘹客忤急慢驚風往來潮搐涎盛喘逆哽氣不安人參三錢白殭蠶一分直者全蠍一十四個辰砂真麝各一分上件三味為細末外再入辰砂麝香同研勻每服一字金銀薄荷湯調下如慢驚即入白附子末一分一切風第二千金翼丹參膏主傷寒時行賊風惡氣在外肢節痛攣不得屈伸項頸咽喉痹塞噤閉入腹則心急腹脹胸中嘔逆藥悉主之病在腹內服之在外摩之緩風不遂濕痹不仁偏枯拘屈口面喎斜耳聾齒痛風頸腫痹腦中風痛石癰結核瘰癧堅腫未潰敷之取消及赤白癮疹諸腫無頭作癰疽者摩之令消風結核在耳後風水遊腫疼痛㿇㿇針之黃汁出時行瘟氣服之如棗大一枚小兒一切風以意減之方丹參蒴藋根各四兩秦艽三兩羌活蜀椒汗去目閉口者牛膝烏頭去皮連翹白朮各二兩躑躅花菊花莽草各一兩上十二味切以苦酒五升麻油七升合煎苦酒盡去滓用豬脂煎成膏凡風冷者用酒服熱毒單服齒痛綿沾嚼之仙人水鑑黃鹽方治小兒百日內患風不計名目好惡悉皆主之黃鹽一斤研陶隱居云北海鹽黃草粒粗以作魚鮓及咸菹薄荷一斤搗取汁水銀一兩入二味中同煅一復時通赤水成霜去鹽取之然後入藥桃花菊花黃蜀葵花薄荷花牛蒡子各二分寒水石一分上並生搗如粉入水銀霜同研令勻以蜜為丸如麻子大若是患風者不計好惡病狀服之神妙外臺張文仲療一切風及偏風發四肢口目喎戾言語謇澀其湯不虛人勝於續命湯故錄傳之特宜老小用之方羌活防風各二兩生地黃汁竹瀝荊瀝以上三味汁各取一升五合蜀附子大者一枚生用去皮八九破重一兩者有神上六味切內前三瀝汁中寬火煎取一升五合去滓溫分二服服比相去八九里若風甚頻服五六劑驗不可論特宜於老小等無問冬夏並宜服之無忌隔三日服一劑益佳忌豬肉蕪荑外臺張文仲治小兒一切風寒水石煮散方寒水石石膏滑石白石脂龍骨各八兩桂心甘草炙牡蠣熬各二兩赤石脂乾薑大黃各半兩犀角一兩屑上一十二味搗以馬尾羅篩之將皮囊盛之急系頭掛著高涼處欲服以水一升煮五六沸內方寸一匕藥煮七八沸下火澄清瀉出頓服之每日服亦得百無所忌小兒服之即以意斟酌多少忌生蔥海藻菘菜博濟方治小兒癱緩一切風疾傷寒小兒驚風等雙丸子天麻輕炙蠍梢須是蜂全者天南星炮過蠶蛾生犀鎊末羚羊角鎊末硃砂別研藿香葉白檀香烏蛇酒浸去皮骨輕炙零陵香各一兩天雄尖麝香各半兩牛黃一分雄黃一錢狐肝一具水煮薄切焙乾別杵烏鴉一隻去嘴爪腸肚於瓦罐內燒為灰別研羅入諸藥末內上件一十七味藥並揀擇淨分兩秤足依法修制搗了然後更細研令勻煉蜜為塊硬軟得所卻於石上捶三百下用垍器盛每服二丸薄荷湯下大人白豆大小兒綠豆大丸卒患並三服癱緩中風即膩粉三大錢水調同藥化下小兒驚風金銀薄荷湯下婦人血風併產前產後中風手足彎曲當歸紅花酒下傷寒豆淋酒下三五丸博濟方治一切風毒上攻心胸不利口舌乾澀風虛痰壅不思飲食及風毒下注腰腳疼痛脾虛體黃腎敗骨弱疏痰利膈治癱緩等一切風疾小兒驚風透水丹川大黃益智子去皮茯苓去皮茯神去皮木蔓荊子去花葉威靈仙去土天麻仙靈脾去梗吳白芷山梔子七稜小者為上去皮各一兩麝香一分別研細墨一分別研太醫局方燒用醋淬研川烏頭四兩生用去皮臍太醫局方用河水浸半月三日一換水切作片焙乾鹽一兩炒黃去鹽上並生為末入麝香墨拌和勻蜜搜和入臼內杵一萬下丸如梧子大每服薄荷汁溫酒下兩丸如卒中研四丸用皂角白礬溫水下立效癱緩風每日服三五丸常服一丸茶酒任下小兒驚風入膩粉少許薄荷汁化半丸灌之瘰癧蔥茶清下一丸忌動風毒物博濟方大治大人小兒一切風疾但服此藥無不應效神寶丹自然銅半斤金星礬石禹餘糧石石膏以上各一兩先將上件四味藥用炭火煅通赤傾在釅醋內淬如此凡一七度了放干後都搗羅為末入在瓷盆內以湯淘洗二十度候浮盡上面黑汁澄淨了只收在底真實藥於瓷器內慢火逼盡水脈後細研乃用諸藥如後蔓荊子威靈仙茯苓去皮天竺黃天仙藤白殭蠶鉛白霜蛜𧌴去毒麩炒白蒺藜旋覆花莽草犀角鎊半夏湯洗去涎七次麩炒黃色藿香以上各一分桑螵蛸瓜蒂各二七個赤小豆四十九粒人參檳榔半生半熟各半兩劍脊烏蛇酒浸去皮骨炙黃用肉一兩真虎骨一兩酒浸炙黃白龍砂以白犬先系定將粟米喂三日取其第三日糞淘取粟米焙乾用一兩上件藥修制搗羅了次用下項藥好硃砂一兩飛牛黃龍腦各一分麝香膩粉乳香各少許上以六味藥研殺如塵用前藥攪和令勻用槐膠水煮麵糊和得所入鐵臼搗熟丸如彈子大焙乾每一粒豆淋酒磨下作十服每五服後浸皂角水磨下服之小兒患即酌大小以意加減與服用薄荷金銀湯磨下神效不可俱迷靈苑生朱散治大人小兒一切風及驚癇風癇久不瘥者鐵粉天南星炮牛膝人參天麻炙黃丹炒令紫色青黛附子炮去皮臍乾蠍生雄黃半夏生薑汁浸一宿炒以上各一兩輕粉硃砂各一兩麝香半錢研入上一十四味同杵羅為細末每服一錢溫酒調下小兒一字薄荷湯調下忌動風毒物靈苑太乙流金火道散治大人小兒一切風方躑躅花肉桂去粗皮乾薑刮去皮附子去皮臍並生為末以上各一錢半匕上九味各須研碾令極細又同研令勻凡氣厥及廁上中惡大人小兒卒中感厥諸疾不醒人事手足搐搦戴目悶絕及元氣血氣上衝痛悶欲絕者頭風夾腦風傷寒不解皆吹鼻內大人一字小兒半字得嚏為效再用不嚏者難理也傷寒仍以蔥汁為丸如綠豆大每服七丸用薄荷薑臘茶下傷寒久不解者蔥酒下十丸立效太醫局婁金丸治諸風神志不定恍惚去來舌強語澀心忪煩悶口眼喎斜手足嚲曳及風虛眩冒頭目昏痛或施運僵仆涎潮搐搦卒中急風不省人事小兒驚風諸癇並皆治之天竺黃白附子炮牛黃研腦麝研各一兩天麻去苗防風去蘆頭白花蛇酒浸去皮骨焙各三兩細辛去苗洗焙天南