一兩雷丸二兩半白朮炮桔梗各二十銖上㕮咀以不中水豬肪一斤煎為膏以煎藥微火上煎之消息視稠濁膏成去滓取如彈丸大一枚炙手以摩兒百過寒者更熱熱者更寒小兒雖無病早起常以膏摩囟上及手足心甚闢寒風千金治大人小兒中風發熱大戟洗湯方大戟苦參上二味等分末之以藥半升白酢漿一斗煮三沸適寒溫洗之從上下寒乃止立瘥小兒三指撮漿水四升煮洗之仙人水鑑子生七日以後半月以前手腳抽動者庸醫皆云是天瘹風此即誤兒性命又云客忤此是在母胎中骨節及毛孔中邪風生後四肢被外風所幹致有此疾根源在胎為骨節風是陰陽不正之氣所幹兒子生後不為天瘹風治之神妙莫越此門又云有孕之後父母交通惡氣形胎所以此疾余治之法曾驗千餘家一一皆應非志士勿可妄傳號曰水銀膏水銀一大兩以青竹筒子貯之從十二月臘日下廁中鉛為蓋密封閉勿令穢汙入內五月五日取出其銀並飛上鉛蓋上如霜雪取下即入諸藥青黛黃蜀葵花各一分牙硝三分胡黃連末六分上研鉛霜令極細取白羊骨中髓丸之如綠豆大以水研一丸灌之立效仙人水鑑孩子手腳搐挽號為骨節風俗呼為天瘹已在前說手與足其理不同今後重明以救生命腳搐手不搐者宜使此方竹瀝和黃連更入一銖鉛黃丹是熬令充作散塗足不抽牽上緣孩子未及百日骨節未開宜作此治之切不得灸也灸即火氣攻心其風難得可除依此萬不失一也外臺千金排風湯主大人小兒諸毒風氣邪風所中口噤悶絕不識人身體疼煩面目暴腫手足腫方犀角末羚羊角末貝齒末升麻末上四味各一兩和勻以藥四方寸匕水二升半煮取一升去滓服五合煞藥者以意增之若腫和雞子敷上日三老小以意亦可多合用之深師同聖惠治小兒中風筋脈拘急項強腰背硬手足搐搦發歇不定羚羊角散方羚羊角屑防風去蘆頭麻黃去根節黃芩桂心細辛甘草炙微赤銼以上各半兩羌活三分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓入竹瀝半合更煎一兩沸溫服量兒大小加減頻服汗出效聖惠治小兒中急風口眼俱搐腰背強直手足拘急牛黃散方牛黃三分細研天南星一分生使麝香細研膩粉研入各一錢桑螵蛸三分微炒乾蠍半生用半微炒白花蛇腰已前者酒浸去皮骨炙令微黃各一兩半上件藥搗細羅為散都研令勻每服以溫酒調下一字量兒大小以意加減服之聖惠治小兒中風四肢拘急心神悶亂腰背強硬天南星丸方天南星炮裂膩粉研入牛黃麝香並研細各一分白附子炮裂半夏湯洗七次去滑麻黃去根節槐子炒防風去蘆頭硃砂細研水飛過犀角屑各半兩五靈脂乾蠍微炒各一兩金銀箔各三十片上件藥搗羅為末入研了藥都研令勻用醋一大盞入藥末一半以慢火熬成膏次入余藥末和丸如綠豆大一歲一丸二歲二丸三五歲至三丸以溫酒下日三四服聖惠治小兒中風口眼偏斜筋脈拘急及胎中疾病硃砂丸方硃砂半兩細研水飛過乾蠍微炒牛黃麝香各細研天麻白附子炮裂白殭蠶微炒乾薑炮裂銼各一分上件藥搗羅為散入研了藥令勻用軟粳米飯和丸如黍子大每服以乳汁化下三丸日三服更量兒大小加減服之聖惠治小兒中風手足搐搦及驚風牛黃丸方牛黃細研乾蠍微炒防風去蘆頭麝香鉛霜各細研南星炮裂各一分犀角屑天麻天竺黃細研白附子炮烏蛇肉炙令黃硃砂細研水飛過各半兩膩粉一錢上件藥搗羅為末入研了藥令勻煉蜜和丸如綠豆大每服用溫薄荷酒研下三丸更量兒大小加減服之聖惠治小兒中風口眼牽急硃砂丸方硃砂細研水飛過蛜𧌴去足微炒白殭蠶微炒天南星炮裂各半兩上件藥搗羅為末以麵糊和丸如綠豆大每一歲一丸以薄荷湯下聖惠治小兒中破傷風沒心草散方沒心草半兩白附子一分炮裂上件藥搗細羅為散每服以薄荷酒調下一字量兒大小加減服之聖惠治小兒汗出中風身體拘急壯熱苦啼丹參散方丹參半兩鼠糞三七枚微炒上件藥搗細羅為散每服以漿水調下半錢量兒大小加減服之聖惠治小兒中風吐涎鬱金散方鬱金末半兩膩粉一錢巴豆十二顆以小便浸一宿去皮出油研如膏上件藥都研令勻每服以橘皮湯調下一字吐涎出即效量兒大小加減服之太醫局和師牛黃丸治大人小兒卒暴中風眩暈倒僕精神昏塞不省人事牙關緊急目睛直視胸膈喉中痰涎壅塞及諸癇潮發手足瘛瘲口眼相引項背項直並皆治之牛黃麝香輕粉粉霜並細研各半兩金箔為衣銀箔研各一百片雄黃辰砂石碌並研水飛蛇黃磁石石燕子併火燒醋淬九次細研各一兩上件都研勻細用酒煮麵糊和丸如雞頭大每服一丸煎薄荷酒磨下老人可服半丸小兒十歲以下分為四服蜜水磨下四歲以下分為五服未滿一歲可分七服如牙關緊急以物斡開灌之譚氏方治小兒初中風癱緩一日內膽礬細研如面每使一字許用溫醋湯下立吐出涎漸輕譚氏方治小兒中風牙關不開天南星一個煨熟紙裹封角未要透氣於細處剪雞頭大一竅子透氣於鼻孔中牙關立開養生必用續命湯治中風痱身體不能自收口不能言冒眜不知痛處拘急不得轉側婦人產後去血老人小兒並可服風痱身無痛處四肢不收言不變智不亂有知可治麻黃去節三兩桂去盡皮當歸切人參去蘆石膏乾薑甘草炙各二兩芎白芍藥各一兩杏仁去皮尖麩炒黃半兩上為粗末每服三錢水一盞半煎至一盞去滓取七分清汁溫服日三忌如常春中覆取微汗嬰孺治少小風邪言語錯亂不知人鴟頭酒方鴟頭一個秦艽丹參石南草獨活防己細辛以上各四分芍藥八分上切入絹袋清酒五升浸之隨時日數服半合日三服嬰孺治小兒卒肩息上氣不得安惡風入肺麻黃湯方麻黃四兩去節桂心五分