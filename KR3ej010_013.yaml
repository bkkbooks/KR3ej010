草微炙荊芥去枝梗各半兩上件藥搗羅為細末每服一錢水一盞入生薑二片薄荷三葉煎五分去滓放溫熱服張渙又方半金散白殭蠶炒黃全蠍炒天麻炙烏蛇肉酒浸去皮骨焙乾各一兩以上搗羅為細末次用硃砂半兩細研水飛龍腦一錢研上件拌勻每服半錢溫酒調下保生信效方起死輕骨丹主大人小兒中風癱瘓四肢不隨風痹等疾麻黃去根節秤五斤銼河水二石熬之去滓成膏桑根白皮須自採土下者銼白芷蒼朮去皮甘松只用腿子余者不用川芎各二兩苦參三兩半上六味為末磙研勻細以前麻黃膏和丸如彈子大每服一丸溫酒一盞研化頓服之臨臥取汗五七日間再服手足當即輕快小兒驚風量與之卒中涎潮分利涎後用之余表伯常器之博士昔時使子弟開藥肆所售回生輕骨丹皆一千一粒售者盈門莊氏家傳治小兒風濕筋脈緩弱腳膝無力或手足偏痑拽語謇羚羊角散羚羊角屑白蘚皮防風去苗各三分酸棗仁二兩微炒五加皮刮去粗皮茯神官桂去粗皮各半兩獨活黃耆去蘆頭各一兩上件為粗末每服二錢水一中盞同煎至六分去滓溫服不拘時候日三服如有熱入竹瀝半合同服兼治語澀舌謇大人亦可服加錢數神驗嬰童寶鑑灸法小兒半身不隨灸百會在頭中心次灸風池次灸曲池肘橫紋上曲腕取之次灸膝腿並三里各三壯中風口喎斜僻第九巢氏病源小兒中風口喎斜僻候小兒中風口喎斜僻是風入於頷頰之筋故也足陽明之筋上夾於口手三陽之脈偏急而口喎斜僻也聖惠治小兒中風口喎斜僻手足不遂風入於臟或語不得心神昏悶防風散方防風去蘆頭川升麻桂心羚羊角屑麻黃去節羌活芎藭杏仁湯浸去皮尖雙仁麩炒微黃以上各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓入竹瀝半合更煎兩沸分溫兩服如人行十里再服衣蓋令汗出為效量兒大小以意加減聖惠治小兒中風口喎斜僻漢防己散方漢防己防風去蘆頭川升麻桂心芎藭羚羊角屑麻黃去根節各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓入竹瀝半合更煎一兩沸不計時候量兒大小分減溫服聖惠治小兒中風面引口偏身體拘急舌不能轉宜服生地黃飲子方生地黃汁竹瀝各三合獨活末三分上件藥相和煎至四合去滓不計時候量兒大小分減溫服聖惠治小兒中風口喎斜僻宜塗蟬殼散蟬殼五月五日採東南枝上者寒食白麵上件藥各等分都研令細以釅醋調為糊如患左斜右邊塗之右斜左邊塗之候口正急以水洗卻藥聖惠又方上用栝蔞瓤以水絞取汁和大麥面搜作餅子炙令熱熨正便止勿令太過聖惠治小兒中風口眼偏斜身上頑麻方蓖麻子別研樗根皮為末栝蔞瓤炒乾為末各一兩上件藥同研令勻以大麥麵餅子摻藥末在上左患貼右右患貼左以慢火熁正急去之身上有頑麻津唾調藥摩之錢乙附方治小兒驚風中風口眼喎斜語不正手足偏舉全蠍散全蠍去毒炒殭蠶直者炒川芎黃芩去心大天南星湯浸七次去皮臍切焙甘草炙桂枝不見火赤芍藥麻黃去節各三兩天麻六錢上件藥為粗末每服三錢水一盞半姜七片煎至七分溫服無時量大小與之日三四服忌羊肉張渙防己湯方治小兒中風口眼喎斜漢防己天麻炙川芎川升麻各一兩桂心羚羊角屑麻黃去根節秤各半兩上件搗羅為細末用杏仁一分湯浸去皮尖研勻同拌每服一大錢水一盞入生薑三片薄荷兩葉煎至五分去滓稍熱時時與服張渙又方赤箭湯赤箭一兩白殭蠶白附子獨活麻黃去根節秤白花蛇酒浸去皮骨以上各半兩搗羅為細末次入杏仁二十個麩炒去皮尖細研上件同拌勻每服一錢水八分入石榴皮少許煎五分去滓溫服莊氏家傳治小兒偏窵風口面喎斜上用赤足蜈蚣一條以竹刀子平截斷各為末各貼下左動用右右動用左者入麝香少許同研中風失音不語第十巢氏病源小兒卒失音不語候喉嚨者氣之道路喉厭者音聲之門戶有暴寒氣客喉厭喉厭得寒即不能發聲故卒然失音也不能語者語聲不出非牙關噤也嬰童寶鑑小兒中風體緩痛聲不出歌風冷傷筋脈四肢全不仁痛因冷熱氣緩是一邊生寒客於喉厭啼聲似啞人溫和湯藥進不爾損精神千金石膏湯治小兒中風惡痱不能語口眼了戾四肢不隨方石膏一合麻黃八銖去根節甘草炙射干桂心芍藥當歸各四銖細辛二銖上八味㕮咀以水三升半先煮麻黃三沸去上沫納諸藥煮取一升三歲兒分為四服日三聖惠治小兒中風失音不語四肢壯熱木通散方木通銼防風去蘆頭川升麻羚羊角屑桂心以上各半兩甘草一分炙微赤銼上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓入竹瀝半合更煎一兩沸不計時候量兒大小加減服之聖惠治小兒中風失音不語諸藥無效通神方亂髮燒灰桂心各一兩上件藥搗羅為末不計時候以溫酒調下半錢量兒大小加減服之聖惠治小兒中風失音不語咽中不利筋脈拘急烏犀丸方烏犀角屑牛黃細研白附子炮裂附子炮裂去皮臍白殭蠶微炒乾蠍微炒天南星生用半夏湯洗七次去滑各一分膩粉一錢研入上件藥搗羅為末用軟飯和丸如黍米大不計時候以薄荷生薑湯研下三丸量兒大小加減服聖惠治小兒中風失音不能啼白丸子方白殭蠶半兩微炒藿香乾蠍微炒桑螵蛸微炒各一分天南星三分生用膩粉一錢研入上件藥搗羅為末煉蜜和丸如黃米大不計時候用薄荷湯入酒少許研五丸服之量兒大小以意加減聖惠治小兒中風失音不語肢節拘急腰背強直羚羊角丸方羚羊角屑防風去蘆頭羌活硃砂細研水飛過天麻炙白附子炮裂各半兩蠍梢微炒牛黃麝香並細研各一分上件藥搗羅為末入研了藥都研令勻煉蜜和丸如綠豆大不計時候以薄荷酒研下兩丸量兒大小以意加減聖惠治小兒中風失音不語舌根強硬方陳醬汁半合人乳二合上件藥相和合令勻少少與兒服之聖惠治屍厥不語返魂丹方生玳瑁硃砂雄黃白芥子麝香各一分上件藥同研如粉於瓷器中熔安息香和丸如綠豆大或沖惡不語不計時候以小便下五丸孩子熱風只一丸張渙竹瀝膏方治小兒中風失音不語牙關緊急竹瀝依法旋取生地黃取汁蜜各半合以上攪勻桂心為末石菖蒲一寸九節者取末各一兩上件都一處調勻慢火熬成膏硬軟得所如皂皂大每服一粒取梨汁化下張氏家傳救生菖陽湯治小兒中風昏困及醒後不語石菖蒲天麻生烏蛇肉全蠍白殭蠶附子炮去皮臍羌活人參白附子各半兩半夏洗七次一分上為粗末每服三錢水兩盞生薑五片薄荷五葉煎至一盞濾去滓溫熱時時服張氏家傳醒脾散治小兒驚搐後不語防風冬瓜子各半兩人參一分甘草炙三錢上件為細末每服一錢用水一盞入竹葉數片燈心少許同煎至七分去滓食後溫服臨睡
