body:
  text: 卷第十四身熱等病凡十一門溫壯第一巢氏病源小兒溫壯者由臟腑不調內有伏熱或挾宿寒皆搏於胃氣足陽明為胃之經主身之肌肉其胃不和則氣行壅澀故蘊積體熱名為溫壯小兒大便其糞黃而臭此腹內有伏熱宜將服龍膽湯若糞白而酢臭則挾宿寒不消當服紫雙丸輕者少服令默除之甚者小增令微利皆當節乳哺數日令胃氣和調若不節則病易復復則傷其胃氣令腹滿再三利尚可過此則傷小兒矣千金龍膽為方見一切癇門紫雙丸方見積聚門中葛氏肘後治多溫壯熱實及治諸百病方大黃四分甘草炙當歸芍藥各二分上水一升六合煮取八合分為三服此古方四味飲而元和紀用經乃有療小兒百疾加減四味飲法仍云自四味飲以下紫丸等七方謂之育嬰七寶紫陽道士一名保子七聖至寶方專為一書者此方是也此飲理小兒胎寒腹痛乳哺不時溫壯發熱吐利不常諸驚掣縮二十五癇肌膚喜瘡遇時而發作口瘡惡核赤目黃瘦大小變蒸用芍藥白者赤者各半如宣泄即用純赤者生用二分癘疫溫壯肺邪不利寒熱發時加二分通用四分也利小便用赤色者及驚狂瘡疥赤目瀉血當歸肉多枝少氣香者生用二分欲血脈流暢不為瘡瘍惡核者及止腹中痛胎寒腹痛啼聲不已者加二分通用四分也如理寒熱破積解溫壯加大黃如牛舌緊硬用蜀中者如欲泄利宣蕩推陳去熱即用河西錦紋者生用二分葛氏原用四分紫陽保子方減二分下利者又減一分只用一分也甘草赤黃斷理緊而易折者炙銼二分虛熱者加一分通用三分也及解煩止渴寒熱邪氣大能安神定驚和而不寒有國老之尊號也四味以水三升煮去滓月內兒服一杏核量之日三百日兒服一粟殼量之日三一二歲兒兩粟殼量之為一服日三一歲兒以上隨大小增之兼乳母服尤良依上法增減正藥外若發驚及溫壯外有冒寒邪以去節麻黃一分水三升煮去沫去滓內正藥煎如本方服之若驚風反折戴眼掣縮加細辛四分內一料正藥增水至四升煮取一升五合若中風身體強戴眼者加獨活二分內一料正藥中水如正方煎服大神驗葛氏肘後治溫壯又方大黃黃芩各四分甘草三分炙細辛二分上水五升煮取一升二合分三服此方小兒數服不癇若卓卓驚加鉤藤二分胡治云此治小兒有病大效千金竹葉湯主五六歲兒溫壯腹中急滿息不利或有微腫亦主極羸不下飲食堅痞手足逆冷方竹葉切一升小麥半升甘草炙黃芩栝蔞根澤瀉茯苓知母白朮大黃各一兩桂心二銖嬰孺用三銖生薑一兩半人參二兩千金翼用一兩嬰孺用半兩麥門冬半夏各二兩當歸十八銖上十六味㕮咀以水七升煮小麥竹葉取四升去滓內藥煎取一升六合分四服千金治小兒夏月患腹中伏熱溫壯來往或患下痢色或白或黃三焦不利竹葉湯方竹葉切小麥各五合黃芩一兩六銖茯苓十八銖柴胡人參麥門冬甘草炙各半兩上八味㕮咀以水四升煮竹葉小麥取三升去竹葉小麥下諸藥煮取一升半分三服若小兒夏月忽壯熱燒人手洞下黃溏氣力惙然脈極洪數用此方加大黃二兩再服得下即瘥聖惠治小兒溫壯或下之後而熱不除舌大不含乳胸中有痰口中生瘡兼驚悸宜服黃芩散方黃芩川大黃銼碎微炒各一兩鉤藤甘草炙微赤銼川芒硝各半兩蛇蛻皮三寸炙黃上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓入牛黃少許量兒大小分減溫服聖惠治小兒身體溫壯心神不安犀角散方犀角屑鉤藤黃芩梔子仁川大黃銼碎微炒各半兩甘草一分炙微赤銼上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓看兒大小分減微溫服之聖惠治小兒溫壯身體常熱不止牛黃散方牛黃細研甘草炙微赤銼各半分梔子仁子芩柴胡去苗龍膽去蘆頭各一分上件藥搗細羅為散入研了藥令勻每服半錢以金銀溫水調不計時候服量兒大小臨時分減服之聖惠治小兒溫壯常欲飲水胡黃連散方胡黃連犀角屑牛黃細研入龍膽去蘆頭川大黃銼碎微炒甘草炙微赤銼知母各一分麥門冬半兩去心焙上件藥搗細羅為散每服以沙糖水調下半錢量兒大小以意加減聖惠治小兒健驚溫壯可吃乳天竺黃散方天竺黃細研鉤藤赤芍藥人參去蘆頭各一分甘草炙微赤銼牛黃細研各半分上件藥搗細羅為散入研了藥更研令勻不計時候以蜜水調下半錢量兒大小以意加減聖惠治小兒溫壯及驚熱牛黃丸方牛黃天竺黃腦麝並細研熊膽各一分犀角屑胡黃連末山梔子仁末郁李仁湯浸去皮研入各半兩上件藥同研令勻以糯米粥和丸如麻子大不計時候以薄荷湯下三丸量兒大小以意加減嬰孺治少小病後腹中不調飲食不節腹滿溫壯並中人客忤兼冷乳有所為將服雀屎丸方雀屎牛黃各一分芎芍藥乾薑甘草各二分麝香三分小麥面三分大黃當歸人參各三分上為末蜜丸麻子大一服三丸日進三服欲令下五丸常將三丸乳前後哺之無妨可更加黃耆黃芩各二分炒嬰孺治小兒多溫壯熱實百病飲子方大黃四分甘草炙芍藥各二分上以水一升六合煮取八合分為三服嬰孺治小兒脅下實股惕惕已發溫壯傷寒柴胡湯方柴胡當歸細辛各三分黃芩大黃升麻五味子紫菀各二分牛黃一分杏仁四十枚去皮炒上切以水五升煮二升每服二合日進三服夜二服量兒大小以意用之無牛黃以麝香代之嬰孺治少小有熱服藥大下後身溫壯胸中有熱結五味湯方五味子三分黃芩柴胡芒硝麥門冬去心石膏末各二分黃連甘草炙當歸各一分大黃四分上水二升七合煮一升三合去滓內芒硝令烊二百日兒服三合日進三服夜一服有痰必吐張渙治溫壯麝香丹方人參去蘆頭木香各半兩胡黃連鉤藤赤芍藥各一分上件為細末次入好麝香一錢牛黃半錢拌勻糯米粥和丸如黍米大每服五粒至七粒煎陳橘皮湯下不拘時候吉氏家傳七寶散治小兒溫壯伏熱傷寒煩躁面赤氣喘夜熱曉涼當歸芍藥甘草炙大黃蒸熟各一分麻黃去節三分白朮麩炒荊芥穗各二錢上為細末每服半錢至一錢水半盞蔥白一寸薄荷一葉煎至三分溫溫並三服要瀉熱服壯熱第二巢氏病源壯熱候小兒壯熱者是小兒血氣盛五臟生熱熏發於外故令身體壯熱大體與溫壯相似而有小異或挾伏熱或挾宿寒其挾伏熱者大便黃而臭挾宿寒者糞白而有酸氣此二者腑臟不調冷熱之氣俱乘腸胃蘊積漸染而發溫溫然熱甚盛是溫壯也其壯熱者是血氣盛熏發於外其發無漸壯熱甚以此為異若壯熱不歇則變為驚極重者亦變癇也錢乙論風溫潮熱壯熱相似云潮熱未晚間發熱過時即退來日依時發熱此欲發驚也壯熱者一向熱而不已甚則發驚癇也風熱者身熱而口中氣熱有風證溫壯者但溫而不熱也錢乙附方論小兒壯熱昏睡傷風風熱瘡疹傷食皆相似未能辨認間服升麻葛根湯惺惺散方並見本卷傷寒門小柴胡湯方見傷寒頭汗出門中甚驗蓋此數藥通治之不致誤也惟傷食則大便酸臭不消化畏食或吐食宜以藥下之張渙謹按小兒冬末春初溫厚之衣或乳母恣食酒面甘肥等令兒心肺不和內蘊邪熱因其解脫風邪傷於皮毛傳入腑臟則令胸膈痰滯身體壯熱心神驚悸又似傷寒時氣瘡疹之類乃名風熱候莊氏家傳小兒壯熱有七候傷寒候渾身壯熱時時舌出繳唇斑瘡候咳嗽嗄聲渾身壯熱唯耳鼻不熱不然噦逆也風熱候渾身壯熱鼻兩邊胞動吸吸然甚者鼻內生瘡手有血紋也氣積候渾身壯熱早晨手足冷曉沉重困悶晚哺發潮熱虛積候渾身壯熱腳冷手不冷積在左肋即右腮赤在右肋即左腮赤也驚熱候亦渾身壯熱愛睡妄語睡便仰臥驚跳啼叫搖頭弄舌上竄也喉痹候亦渾身壯熱時時發嗽思冷水飲喉中痛時復小寒是也以上七候宜在審詳用藥葛氏肘後徐王神效方百日兒患壯熱氣急唯得欹眠眼不開小便黃赤方上服水銀如大豆一粒日十度三日瘥止不瘥更服水銀太冷切宜消息用也千金治小兒肉中久挾宿熱瘦瘠熱進退休作無時大黃湯方大黃甘草炙芒硝各半兩石膏一兩大棗五枚桂心八銖上六味㕮咀以水三升煮取一升每服二合千金治少小有熱不汗二物通汗散方雷丸四兩粉半斤上搗和下篩以粉兒身千金調中湯治小兒春秋月晨夕中暴冷冷氣折其四肢熱不得泄則壯熱冷氣入胃變下痢或欲赤白滯起數去小腹脹痛極壯熱氣脈洪大或急數者服之熱便歇下亦瘥也但壯熱不吐下者亦主之方葛根黃芩茯苓桔梗芍藥白朮藁本大黃甘草炙各六銖上九味㕮咀以水二升煮取五合服如後法兒生一日至七日取一合分三服生八日至十五日取一合半分三服生十六日至二十日取二合分三服生二十日至三十日取三合分三服生三十日至四十日取五合分三服恐吃五合未得更斟酌之其百日至三百日兒一如龍膽湯加之千金治小兒腹大短氣熱有進退吃食不安谷為不化方大黃黃芩甘草炙芒硝麥門冬各半兩石膏一兩桂心八銖上七味㕮咀以水三升煮取一升半分三服期歲以下兒作五服千金青木香湯浴小兒壯熱羸瘠方青木香四兩麻子仁一升虎骨五兩白芷二兩竹葉一升上五味㕮咀以水二斗煮取一斗稍稍浴兒千金治小兒暴有熱得之二三日李根湯方李根桂心芒硝各十八銖甘草炙麥門冬去心各一兩上五味㕮咀以水三升煮取一升分五服千金治少小身體壯熱不能服藥十二物寒水石散粉方寒水石芒硝滑石石膏赤石脂青木香大黃甘草炙黃芩防風芎藭麻黃根上各等分合治下篩以粉一升藥屑三合相和復以篩篩之以粉兒身日三外臺以牡蠣代防風余並同千金治少小新生肌膚嫩弱喜為風邪所中身體壯熱或中大風手足驚掣五物甘草生摩膏方甘草防風各一兩白朮桔梗各二十銖雷丸二兩半上㕮咀以不中水豬肪一斤煎為膏以煎藥微火上煎之消息視稠濁膏成去滓取如彈丸大一枚炙手以摩兒百過寒者更熱熱者更寒小兒雖無病早起常以膏摩囟上及手足心甚闢寒風千金治少小身熱李葉湯浴方李葉無多少㕮咀以水煮去滓將浴兒良千金翼治少小身熱不去寒熱往來微驚方大黃黃芩各一兩栝蔞根三分甘草炙牡蠣熬人參白石脂硝石龍骨凝水石各半兩桂心滑石碎各二兩上十二味㕮咀加紫石英半兩以水四升煮取一升半分服三合一日令盡外臺崔氏療少小身熱方白芷煎湯浴兒佳根苗皆得外臺崔氏又方苦參湯浴兒良藥性論治小兒身熱秦白皮一升水煎作湯澄清浴瘥冷洗赤眼亦效日華子治小兒壯熱一切瘡疥皮膚瘙癢梓白皮煎湯洗之梓枝皮有數般惟楸梓佳余即不堪日華子治小兒壯熱棗葉煎湯浴和葛粉裛之聖惠治小兒壯熱口乾心煩不欲乳食宜服犀角散方犀角屑黃耆銼各一分黃芩麥門冬去心焙柴胡去苗川升麻甘草炙微赤銼各半兩上件藥搗粗羅為散每服一錢以水一小盞入淡竹葉七片煎至五分去滓量兒大小分減溫服聖惠治小兒壯熱驚悸大小便赤澀鉤藤散方鉤藤天竺黃細研地骨皮各一分犀角屑赤茯苓龍膽去蘆頭川芒硝甘草炙微赤銼各半兩川大黃三分銼碎微炒上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小分減溫服聖惠治小兒壯熱心神不安人參散方人參去蘆頭鉤藤赤茯苓川升麻各半兩犀角鎊山梔子甘草炙微赤銼各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小分減不計時候溫服聖惠治小兒期歲至三歲壯熱大黃散方川大黃銼碎微炒一兩石膏一兩半柴胡去苗川升麻枳殼麩炒微黃去瓤黃芩赤芍藥梔子仁知母