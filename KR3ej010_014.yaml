薄荷生薑治冷氣入薑棗水一盞煎七分用藥二錢少異莊氏家傳小兒傷風上以京豉及蔥生研作靨貼囟上如有邪氣者以京豉及桃頭生研貼如前方孔氏家傳治小兒風吹妄著渾身壯熱頭疼面頰赤多渴參苓散人參茯苓甘草炙白朮各一分黃芩乾葛各半兩上為細末每服一錢水五分姜一片棗半個煎四分通口服王氏手集百解散治小兒傷風瘡疹之類黃耆青皮茯苓栝蔞根甘草炙紫菀白朮各一兩百合一兩半上為細末每服一錢水八分盞煎至四分通口服得少汗為妙吉氏家傳治小兒驚風奶食不化成外傷風壯熱氣粗慢風搖頭口眼不開及赤白痢金箔丸金箔四十九片硃砂水銀膩粉牛黃青黛蟬殼白殭蠶麻黃去節白附子蠍天麻酒浸炙犀角末天南星炮各二錢真麝香隨多少上件都為末將金箔硃砂水銀膩粉同研細傾入諸藥煉蜜為丸如梧桐子大每服二丸薄荷湯化下長沙醫者丘松年傳蠍梢散治傷風發熱睡臥不安直視涎盛時作驚掣全蠍一十半個甘草炙川芎各二錢麻黃去節秤防風薄荷葉各一錢上為細末入硃砂一錢細研入藥末內令勻每服一錢水半盞煎三分溫服傷暑第七太醫局香薷丸治大人小兒傷暑伏熱躁渴瞀悶頭目昏眩胸膈煩滿嘔噦噁心口苦舌乾肢體困倦不思飲食或發霍亂吐利轉筋並宜服之香薷去土紫蘇莖葉並用去粗梗乾木瓜各一兩丁香白茯神去衣薷香葉去土甘草炙銼檀香銼各半兩上為細末煉蜜為丸每兩作三十丸每服一丸至二丸細嚼溫湯下或新汲水化下亦得小兒服半丸不計時候太醫局枇杷葉散治大人小兒冒暑伏熱引飲過多脾胃傷冷飲食不化胸膈痞悶嘔噦噁心頭目昏眩口乾煩渴肢體困倦全不思食或陰陽不和致成霍亂吐利轉筋煩躁引飲枇杷葉去毛淨炙陳橘皮湯去瓤焙丁香各半兩香薷三分厚朴薑汁塗炙四兩乾木瓜白茅根麥門冬湯去心焙乾甘草炙各一兩上件藥搗羅為末每服二錢水一盞入生薑二片煎至七分去滓溫服溫水調下亦得如煩躁用新汲水調下不計時候小兒三歲以上可服半錢更量大小加減張渙治小兒伏暑嘔吐者最宜服之清膈飲子方香薷淡竹葉去枝梗剪葉焙乾各一兩白茯苓人參去蘆頭半夏湯洗七次焙乾檀香甘草炙各半兩白粳米一合上搗羅為粗末每服一錢水一大盞煎七分去滓放溫時時如熱水令兒服之量兒大小加減莊氏家傳治小兒中暑吐利上以白蒺藜苗研汁服長沙醫者丁時發傳治小兒中熱面赤身如水熱或眼赤鬱金三枚用皂角水煮乾甘草馬牙硝各一分當歸二錢上末細研一字或半錢冷水調下傷寒第八巢氏病源小兒傷寒候傷寒者冬時嚴寒而人觸冒之寒氣入腠理搏於血氣則發寒熱頭痛體疼謂之傷寒又春時應暖而反寒此非其時有其氣傷人即發病謂之時行傷寒者小兒不能觸冒寒氣而病傷寒者多由大人解脫之時久故令寒氣傷之是以小兒亦病之診其脈來一投而止者便是得病一日假令六投而止者便是得病六日其脈來洪者易治細微者難治也巢氏病源小兒傷寒解肌發汗候傷寒是寒氣客於皮膚寒從外搏於血氣腠理閉密冷氣在內不得外泄蘊積故頭痛壯熱體疼所以須解其肌膚令腠理開津液為汗發泄其氣則熱歇凡傷寒無問長幼男女於春夏宜發汗又脈浮大宜發汗所以然者病在表故也千金論曰夫小兒未能冒涉霜雪乃不病傷寒也大人解脫之久傷於寒冷則不論耳然天行非節之氣其亦得之有時行疾疫之年小兒出腹便患斑者也治其時行節度故如大人法但用藥分劑少異藥小冷耳聖惠論凡嬰孩傷寒不可以燥藥發汗也發汗則孩子一向躁極於臟腑熱極傷於心氣多厥不可治也若以性寒湯藥陽受於冷冷熱相擊孩子一向驚叫不睡熱衝於腦頭縫開張皮肉筋脈急脹不可治也若以性熱湯藥餌之乃助於陽也陽極則陰必爭也四肢汗出如油手足或熱或冷多狂癲驚瘈即不可治也茅先生小兒有傷寒候身微熱口孜啀吐乳鼻塞咳嗽此候因抱兒子當風處吹著背俞至此所治者當日下天麻散二服方見本門中硃砂膏二服方見驚積門中其患即愈不得誤動臟腑茅先生傷寒變蒸夾驚夾食中風所中傷寒各說有一因依根源各別下藥有殊如調理上件傷寒傳變吐不可止大小便不通大渴耳內膿出身上生斑點赤心狂眼視鼻口乾燥死候不治漢東王先生家寶傷寒病證嬰孩小兒單傷寒者渾身壯熱鼻流清涕身上寒毛起咳嗽欲喘宜用解傷寒紅綿散三二服間調胃氣進乳食觀音散三二服如有餘熱未退睡里多驚須進七寶輕青丹三二服紅綿散輕青丹方並見本門中再服調胃氣觀音散三二服方見胃氣不和門中漢東王先生家寶小兒傷寒可醫者七鼻內清水是傷寒鼻者是肺之外應傷寒故外風吹著身皮毛及發皆主於肺故令外涕流出清水身寒毛立後則身熱躁叫口乾耳冷汗出是傷寒傷寒者是邪氣傷其正氣正氣軟弱則不能主於身被邪氣攻出故為汗汗出多則令面黃無力後若不止則體虛生風宜補實之鼻塞是傷寒傷寒是外邪傷肺所受則正在肺邪氣傷正氣則滯榮衛不通故乃鼻塞是發汗後更與通關藥耳面赤是傷寒傷寒是傷氣及邪氣入腹其肺當旺不肯受邪肺者受患其初傳心則心氣虛故令面赤則口乾夜間不臥陰陽相剋日中可解則涼藥服之吐白水是傷寒何以吐白水其傷寒受在於胃其胃氣為邪所傷胃弱則吐白水若吐食則入脾瘥後須變身黃脾胃俱象土故色黃宜早暖脾胃耳兩眼黃赤是傷寒傷寒是先受在脾在其色黃次傳在肝主眼故邪傷於肝故共脾邪入之故令眼黃赤宜以洗肝後發汗耳小便黃赤是傷寒傷寒者寒氣傷肺肺虛故不受於心心實傳腑心以小腸為腑受邪則滯榮氣則赤後則尿如血通小便後取之不可醫者六傷寒面黑者不治傷寒氣傷皮膚本入肺肺傳腎腎主水水屬北方其色黑復傳心心屬火其水大能剋火故令面黑不治傷寒大小腸痛不治其傷寒受在肺肺以大腸為腑臟不能受倒傳出一臟不再傳入心則火剋金心將小腸為腑故大小便痛耳傷寒忽作邪聲不治此是傷寒邪氣傷肺肺主聲肺被邪傷絕則聲出不回如便作邪聲是肺絕也傷寒叫聲不出不治此是傷寒入腎失解腎氣絕不能作聲即死耳傷寒糞黑不治何以瀉黑血糞其傷寒邪傷肺肺絕不能行血其血黑色從大腸中下如死鵝鴨一般即死如大便無赤黑不妨卻是熱盛宜與涼藥耳傷寒爪黑不治爪黑者傷寒傳肝其邪勝正氣絕肝主筋及主諸爪甲肝絕則不能榮於爪故為死之形也上件其傷寒皆是邪氣傷於臟腑滯其血氣則寒熱血脈亂不能飲食其頭痛面赤者則是陽毒其面青不語多哭身寒是為陰毒凡傷寒三日前宜汗三日後宜轉又云陰毒宜回陽先與熱藥後方汗陽毒宜解先與涼藥後與汗之取轉亦此說三日前汗三日後轉此大略之言耳有初得便宜轉者有得之三兩日後宜汗者不可拘此嬰童寶鑑小兒傷寒為客風傷於腠理攻於皮膚故身熱頭痛不食氣多嘔逆驚啼面赤而喘活人書序小兒傷寒與大人治法一般但分劑小藥性差涼耳尋常風壅發熱鼻涕痰嗽煩渴惺惺散主之方與錢乙同見本門中咽喉不利痰實咳嗽鼠黏子湯主之方見瘡疹門中頭額身體溫熱大便黃赤腹中有熱四順散方與葛氏同見溫壯門中連翹飲三黃丸主之頭額身體溫熱大便白而酸臭者胃中有食積雙丸主之三方見本門中小兒無異疾唯飲食過度不能自節心腹脹滿身熱頭痛此雙丸悉治之小兒身體潮熱頭目碎痛心神煩躁小便赤大便秘此熱劇也洗心散方見傷寒大小便不通門調胃承氣湯主之方見傷寒自汗門頭疼發熱偎人惡寒者此傷寒證也升麻湯主之方見傷寒口內生瘡門中十物升麻湯無汗者麻黃黃芩湯有汗者升麻黃芩湯皆要藥也二方並見本門小兒尋常不可過當服涼藥胃冷蟲動其證與驚相類醫人不能辨往往復進驚藥加腦麝之類遂發吐胃虛而成慢驚者多矣小兒須有熱證方可疏轉仍慎用丸子藥利之當以大黃川芎等㕮咀作湯液以盪滌蘊熱蓋丸子巴豆乃攻食積耳翰林待詔楊大鄴問小兒傷寒瘟疫者為何答曰神氣雖丸性情未定衣裳不擇於厚薄或恣情而脫著嬌縱不常生冷盡意或過餐寒熱之物因此致患頭疼氣促發熱增寒或飲多尚渴或虛汗連連精神口孜啀因綿綿用藥須精審其根源察病表裡仍看脈體未可便下切須要知虛實消停藥分切在意處方治之惠眼觀證傷寒外證一見眼睛黃赤及鼻塞遍身壯熱口鼻出清水非時冷汗加之咳嗽氣閉毛起小便如粉汁此皆是傷寒候傷寒候如覺面帶黑色大小腸干痛上吐下瀉氣又刺痛耳內膿及眼生浮膜皆惡候也惠眼觀證小兒傷寒形候亦分數類有兼驚挾實驚氣溫候三證一兼驚者因患驚風三日後治得驚退第四日至五日忽有嗽息粗大面色恍惚變動無時上渴不止急且治脾宜下麥湯散方末見平胃丸方見噦逆門中附子散方見虛寒門中萬一記之不得下冷藥恐冰卻脾氣伏熱不退二挾實者本因孩兒肥實吃食無度傷飽而閉卻胃氣其候嘔逆一見唇紅面赤便問曾吐嘔逆無如已曾吐嘔逆必須頭痛或瀉不止乃用鮓湯丸方見急慢驚風門中通利後勻氣散方見胃氣不和門中夾麥湯散服之驚氣者本因氣膨脹咳嗽咽喉中涎響心間煩躁臟腑疼痛夢中虛驚先用烏犀膏方見熱門中滾涎次下麥湯散及大驚丸方見一切驚門中相夾服至兩日方下鮓湯丸通利一二日氣行後常服醒脾平胃湯藥如傷寒後或遍身生黑黯血所謂蘭斑形證下可用藥三溫壯者亦渾身微熱面紅常困睡微汗因客風吹著毛竅冷氣急鼻塞大體與變蒸相似只下麥湯散與紅綿散紅綿散方見瘡疹已出未出門中治之亦安小方脈論傷寒皆因三陰三陽受病緣未辨東西不能言語雖即遍身壯熱四肢不任其狀多喘難為識候凡傷寒與諸熱疾皆同奈諸熱不生呻吟惟傷寒呻吟眉聚是也宜服麥煎散方未見茅先生小兒初受傷寒候歌小兒傷寒身壯熱面赤唇紅眼赤黃身上寒毛初凜凜更兼冷汗潤汪汪鼻中清涕涓涓滴小便如粉又如漿上喘鼻塞將加嗽口乾嘔逆是尋常看有諸般難治療別為章句好看詳茅先生小兒傷寒死候歌傷寒吐不止便溺更難通汗後發熱渴耳中瘡潰膿身生斑黑點鼻丘出傾筒咳嗽四肢厥心狂下所攻體軟睡不寤腹脹喘聲雄手足心熱痛此候命須終茅先生小兒又傷寒死候歌小兒傷寒面黑色耳內有膿聲噎塞氣逆吐瀉轉加增大腸干泄眼浮極醫士精神還更昏千萬歸泉休廢力玉訣小兒傷寒候歌鼻多清涕肺傷風寒氣相傳鼻不通壯熱脈浮生內熱發驚涎盛轉加濃夫小兒傷寒者先與治風後與下涎次謂胃氣也石壁經三十六種正受傷寒候歌傷寒初得渾身熱惡哭多啼無喜悅眼紅臉赤類驚風鳳髓經此一句云只看眼急以驚風卻被醫人道驚熱但須涼膈莫令渴渴便飲水無休歇若將三黃散子服汗出身輕便無熱風邪寒入肌體汗閉熱氣內蘊致使煩躁而多渴喘嗽汗不得泄發熱不止若服冷藥太甚則使汗不出而反作別候也須先出汗次涼膈方愈若不然則慢脾慢驚緣此得之鳳髓經歌同仍注云與三黃散方見本門中次麥湯散方未見小兒形證論四十八候正受傷寒歌一同後云此為正受傷寒目急壯熱氣喘嗽面赤先與解表散吃方見慢驚風門中後用南星丸退風熱方見傷寒變疹門中如不退卻將三黃散與吃方見本門中千金治少小傷寒莽草湯浴方莽草半斤牡蠣四兩雷丸三十枚蛇床子一升大黃一兩上五味㕮咀以水三斗煮取一斗半適寒溫以浴兒避眼及陰千金治