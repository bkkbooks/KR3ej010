如大每服三丸五丸以歲數加減米湯泡生蔥吞下服時須令嬰孩小兒空心不可吃乳食稍飢方可進藥如膈上有物食勢須吐出如膈下有食方得轉瀉切忌生硬米實肉食等物近夜臨臥服尤佳漢東王先生家寶治嬰孩小兒夾食傷寒又治夾驚傷寒溫壯等薄荷散方杜薄荷半兩去粗梗取嫩者羌活全蠍炒麻黃去節殭蠶直者去絲炒天竹黃各一分甘草半分炙白附子半錢上為末每服嬰孩一字二三歲半錢四五歲一錢以水一藥注或半銀盞煎十數沸服漢東王先生家寶治夾食傷寒取下欲補虛調胃氣進乳食止吐瀉人參散方人參蓮肉去心焙茯苓各一分黃耆半兩槌蜜水拌炙甘草炙二錢上為末每服嬰孩一字二三歲半錢四五歲一錢以水一藥注或半銀盞入棗子半片煎十數沸服夾驚傷寒第十一巢氏病源小兒傷寒兼驚候傷寒是寒氣客於皮膚搏於血氣使腠理閉密氣不宣泄蘊積生熱故頭痛體疼而壯熱也其兼驚者是熱乘心心主血脈小兒血氣軟弱心神易動為熱所乘故發驚驚不止則變驚癇也茅先生有小兒中兼驚傷寒候大熱狂躁荒虛亂言上渴此候因驚熱候傳此所治者急用麥湯散三服方見本門中微汗出次日下硃砂膏二服方見驚積門中熱漸退第三日下青金丹方見本門中通三次用勻氣散方見胃氣不和門中醒脾散有二方一方見胃氣不和門一方見慢脾風門中相夾與服第四日身猶有伏熱即下大附散方見慢驚風門中夾回陽散與服方見本門即愈漢東王先生家寶夾驚傷寒病證並方夾驚傷寒候渾身壯熱心躁發渴睡里多驚手足不定兩面頰赤色眼腥瞪腥音性瞪音鄭直視也小便赤宜用薄荷散三二服方見夾食傷寒門中及輕青丹三二服方見單傷寒門中間用調胃氣藥方見夾食傷寒門中更進七寶牛黃丸治驚及金蓮散三二服退熱方並見本門如依次用藥不退往往變作驚風自有驚風諸方玉訣小兒傷寒驚搐歌傷寒驚搐即生涎胃熱乘虛遍體斑頰赤口乾皮受熱涎高風盛發狂言風盛太過者先與解之涎實者下之傷冷溫之熱即利之利涎調氣即無誤也玉訣小兒傷寒驚搐候歌傷寒熱病胃邪攻燥渴頻頻面色紅本是先傳心與肺急須解利治驚風此乃傷寒在表宜坯煎散方見本門中次烏犀膏利涎方見急慢驚風門中又與調榮衛切忌用熱藥石壁經三十六種夾食驚傷寒候歌腳冷頭燒氣不和漸生喘急愛眠多有時夢裡須頻搐鳳髓經云夢裡驚擲極嗽生涎不奈何吐沫且汗方為妙解熱消涎去久疴汗出除驚方已疾其餘平藥與調和先調氣次發汗和解解即涼膈膈涼則涎自化矣涎化則搐自住小兒形證論四十八候夾驚傷寒歌一同後云此患有先受傷寒後受驚亦有先驚而後受傷寒如先受傷寒即先退傷寒後退驚先受驚即先退驚也如退驚與南星丸方見傷寒變疹門中如有餘熱更一服大青膏大青膏方未見大青丹方見急慢驚風門中如退傷寒即與解表散方見驚風門中後服調胃散方見積熱門中保生論小兒傷寒並夾驚候其脈浮洪傷寒者小兒內停冷乳包嚼之食外傷冷風於腠戶令兒面色黃兩頰紅色鼻塞氣喘身上寒毛起鼻流清涕咳嗽噴嚏煩躁吐食頻多下泄小便如粉皆是傷寒候若加睡中驚擲狂叫臥不安穩是夾驚傷寒宜與坯煎散並三服出汗次與鎮心丸若只大喘啼叫是傷寒正受候宜與三黃散三服次與麥湯散三服退熱坯煎散與鳳髓經同見本門中鎮心丸方與吉氏同見一切驚門中三黃散與四十八候同見單傷寒門中麥湯散方見本門中博濟方治小兒驚風傷寒四五日未得汗搖頭揚手上竄多啼叫不睡吃水不休鉛白霜丸鉛白霜硃砂馬牙硝人參天竺黃甘草炙各半兩山梔子一兩上件七味為末煉蜜為丸如桐子大每服一丸冷熟蜜湯化下茅先生小兒諸病青金丹青黛羅過平錢滿挑一錢滑石末天南星丁香羅過各二錢輕粉重二錢水銀秤二錢先以錫二錢於銚子內煮熔便放水銀拌和瀉去於地冷用川巴豆去皮心膜七十二片無缺損者井華水浸一宿懸當風處吹乾爛研上前件藥同拌合軟飯為丸如此大巴豆不出油依形證用湯使下項傷寒後取積淡煎蔥湯吞下取疳蟲用牛肉炙汁下驚風肚中緊硬面青黑金銀薄荷蔥湯吞下因傷食肚中及腹皮上微熱肚脹夜間作熱以疳又不是疳面青黃色眼微黃此腹中有積用皂角子二七粒灰內煨過用水一盞煎至半盞下有積作瀉魚鮓湯下氣積炒茴香湯下依前件下藥周歲十四丸三歲十八丸七歲二十四丸看大小加減仍須是四更初下此藥天明通下積來積儘可依形證候下藥補之臨吃此藥恐先吐下𬅿小涎來不妨茅先生方小兒回陽散蒼朮一兩米泔汁浸一宿甘草炙白朮炮陳橘皮去白各半兩木香大附子炮子去皮秤各一錢上為末每服一大錢用鹽湯空心點服回陽散可夾傷寒藥與服看形候下之茅先生方小兒傷寒夾驚麥湯散知母人參茯苓杏仁去白肉桂石膏滑石甜葶藶甘草炙地骨皮各等分麻黃去節加一兩多上為末每服一錢看大小用麥煎湯調下依形候調理漢東王先生家寶治嬰孩小兒諸驚及癇手足搐搦眼腥瞪七寶牛黃丸硃砂粉霜輕粉各一錢牛黃半錢腦麝各一字上為末糯米糊丸如大每服二三歲半丸四五歲一丸煎金銀薄荷湯磨下月內小兒一丸分四服百日內者一丸分三服量兒大小壯怯及病輕重加減漢東王先生家寶治嬰孩小兒潮熱金蓮散兼治傷寒夾驚連翹山梔子去殼甘草炙防風蟬殼洗去土令淨各等分上為末每服嬰孩一字二三歲半錢四五歲一錢以水一藥注或半銀盞煎十數沸服張渙金泥膏方治傷寒邪熱乘心兼發驚病菖蒲一寸九節者用遠志去心鉤藤各一兩人參去蘆頭草龍膽甘草炙各半兩以上搗羅為細末次用水銀一分牛黃別研麝香研各一錢金箔二十片將水銀研如泥上件與諸藥一處拌勻用蜜半斤酥四兩用銀鍋或石鍋中先入水二升除出金泥酥蜜外先入諸藥慢火熬至一升新綿濾去滓方再不酥蜜金泥攪勻用柳枝不住手攪熬成膏用瓷合盛每一豆大薄荷湯化下張渙防風天麻膏方祛風鎮驚及傷寒夾驚防風天麻人參去蘆頭各一分甘草炙白殭蠶干全蠍白附子各半兩以上搗羅為細末次用硃砂細研水飛一兩牛黃研一分麝香研一錢上件都研勻煉蜜和如皂皂大每服一粒用薄荷湯化下嬰童寶鑑治小兒夾驚夾風傷寒俠食微轉千金丸方硃砂末一錢重膩粉一分麝香半錢全蠍白丁香各七個末上件和勻白飯為丸如蘿蔔子大薄荷湯下一歲三丸玉訣治小兒傷寒驚搐梨漿餅子治風下涎輕粉半兩鐵粉荊芥穗辰砂臘茶各一錢郁李仁七個出油粉霜半錢牽牛子二十七個微炒腦麝各少許上為末煉蜜為餅子加減用梨汁薄荷湯化下玉訣坯煎散治夾驚傷寒及解驚發汗全蠍川烏炮去皮尖甘草炙硃砂大黃炮羌活川芎麻黃去節天麻酒浸白殭蠶去絲以上分兩元本闕腦麝各少許上末之每一錢半錢入坯子五粒蔥白半寸煎三四沸通口服並二三服出汗三十六種治夾驚傷寒白附子散白附子硃砂各三分全蠍一分半黑附子炮去皮臍雄黃羌活各半兩石膏七錢半麻黃一兩去節腦麝隨意入別研上件為末每服半錢一字薄荷臘茶調下有熱再服鳳髓經坯煎散治小兒夾驚傷寒渾身壯熱睡中驚擲咳嗽煩躁下泄多川烏頭半兩炮裂去皮尖大黃蒸熟三錢雄黃白附子甘草炮川芎天麻殭蠶去足各一錢麝香少許麻黃去節四錢上為末每服半錢或一錢大者一錢半水半盞入坯子三粒蔥白半寸同煎數沸溫溫服如出汗並三服保生論麥湯散治小兒變蒸伏熱傷寒咳嗽噴嚏體熱面赤麻黃去節滑石甘草杏仁去皮尖大黃北葶藶子地骨皮上各等分為細末每服半錢一錢或一字小麥薄荷湯下劉氏家傳紅綿散治小兒夾驚傷寒吐逆躁悶熱渴夜啼不睡常服溫平鎮心不涼過一百日後六七日間進一服不妨全蠍人參白茯苓天麻各一錢麻黃半兩去節大辰砂一錢上件為細末將辰砂研細一同和勻每服一小錢水少許薄荷一葉同煎十沸溫溫服吉氏家傳治驚胃氣虛弱吐後手足搐搦眼下及唇青者不進飲食是夾驚傷寒沒石子膏沒石子三個生用人參訶子炮白朮各二錢丁香五七個甘草炙半兩香附子三十七個去皮上末勻煮豬肉煞研丸如梧桐子大不進飲食白朮湯下吉氏家傳治夾驚傷寒鐵刷散麻黃去根節一兩甘草炙半兩細辛半兩石膏葶藶青皮各一分杏仁十二個上末如小兒傷寒三二日壯熱不曾調理外風把定關竅傷寒面黃白色壯熱微渴此是傷寒候三五日內心藏熱面赤唇紅多躁壯熱熱極生涎即為驚也元初傷風為傷寒此候為夾驚傷寒也如此患先下異功散二服紫蘇木瓜湯煎後以此藥半錢水一盞姜三片煎至四分溫服頭面微有汗解傷寒不退如壯熱煎勝金散如壯熱後多睡更煩躁口乾手足冷此是外風把定關竅用綿煎散一服發汗汗出關竅通只用異功散二服和氣更服此藥解傷寒異功散方見胃氣不和門吉氏家傳勝金散治小兒傷寒熱驚風麻痘瘡疹潮熱天南星一兩白附子半兩雄黃一錢上為末每服一錢水一盞蔥白三寸同煎三分作三度與作三服吉氏家傳治傷寒退熱綿煎散麻黃去節一兩天麻紫蘇天南星油煎赤色殭蠶各半兩上件末小兒傷寒驚風𬅿子壯熱面赤沉困頭疼不進飲食用水一盞藥半錢綿一片薄荷湯下睡時更煎鐵刷散一服夾驚傷寒無驚只是傷寒二日進二服取效吉氏家傳解傷寒通利夾驚發汗紫散子但是傷寒身熱急服如是積卻服經驗方銀夜丸紫散子方天麻生一兩川芎半兩鐵粉三分上色者硇砂一錢上末入腦麝各少許同研每服一字半錢金銀薄荷湯下並服二服汗自出朱氏家傳天竺黃散治小兒傷寒退驚涎白殭蠶鬱金蟬蛻甘草炙天竺黃山梔子各等分上為末每服半錢金銀薄荷煎湯下長沙醫者丁時發傳乳香膏治小兒夾驚傷寒壯熱涎鳴風熱壅盛鎮心化涎退熱定搐搦乳香膏硃砂鉛白霜天竺黃葛粉人參茯苓各半兩天麻甘草各三錢炙白附子一分乳香二錢牛黃腦麝各半錢上為細末煉蜜為丸如梧桐子大薄荷湯化下二丸長沙醫者丁時發傳治小兒夾驚傷寒渾身壯熱涎盛發搐搦蠍七個荊芥麻黃去節白礬白附子各二錢蘇木少許上為細末每服一錢水一盞煎五分服長沙醫者鄭愈傳治夾驚傷寒無惜散浮萍紫背者一錢犀角屑半錢鉤藤鉤三七個上為末每服半錢蜜水調下連進三服出汗為度後常服亦佳
