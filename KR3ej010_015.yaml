body:
  text: 卷第十五傷寒變動凡二十門傷寒自汗第一巢氏病源小兒傷寒汗出候傷寒者是寒氣客於皮膚搏於血氣使腠理閉密氣不宣泄蘊積生熱故頭痛體疼壯熱也而汗出者陽虛受邪邪搏於氣故發熱陰氣又虛邪又乘於陰陰陽俱虛不能制其津液所以傷寒而汗出也活人書論傷寒小兒大人治法一般但小分劑藥性差涼耳問自汗者何也衛不和自汗病人臟無他病時發熱自汗出而不愈者衛不和也先其時發汗則愈屬桂枝也太陽病發熱汗出者此為榮弱衛強故汗出欲救風邪者宜桂枝湯又云病常自汗出者此為榮氣和榮氣和者外不諧也以衛氣不共榮氣諧故爾以榮行脈中衛行脈外復發其汗榮衛和則愈傷風自汗太陽病發熱汗出惡風脈緩為中風屬桂枝湯又云太陽病項背強几几反汗出惡風桂枝加葛根湯主之汗出而渴者五苓散不渴者茯苓甘草湯雖然仲景云傷寒自汗用桂枝然桂枝湯難用須是仔細消息之假令傷風自汗若脈浮而弱設當行桂枝服湯後無桂枝脈息證候而煩者即不可再服也若傷寒自汗出而小便數者尤不可與桂枝也仲景云太陽病自汗四肢拘急難以屈伸若小便難者可桂枝湯內加附子服之若小便數者慎不可與桂枝附子湯宜服芍藥甘草湯若誤行桂枝附子攻表便咽乾煩躁厥逆嘔吐作甘草乾薑湯與之以復其陽若厥愈足溫更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者與調胃承氣湯微溏則止其譫語緣芍藥甘草湯主脈浮自汗小便數者寸口脈浮為風大為虛風則生微熱虛則兩脛攣小便數仍汗出為津液少不可誤用桂枝宜服芍藥甘草補虛退風熱通治誤服桂枝湯後病證仍存者也陽明病自汗不惡寒反惡熱濈濈然汗自出者屬陽明也若陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓復利其小便故也故仲景云陽明病發熱汗多者急下之陽明病其人汗多以津液外出胃中燥大便必硬譫語者屬調胃承氣湯雖然陽明汗多急下若小便自利者此為津液內竭雖爾不可攻之須自大便導之宜用蜜煎導法陽明病汗出而脈遲微惡寒者表未解也宜服桂枝湯陽明法多汗若脈浮無汗而喘者發汗則愈宜麻黃湯也亡陽自汗太陽病發汗多遂漏不止其人惡風當溫其經宜桂枝加附子湯傷寒尺寸脈俱緊而汗出者亡陽也此屬少陰法當咽痛而復吐利其人熱不去內拘急四肢疼厥逆而惡寒者四逆湯主之汗多不止者可用溫粉撲之若汗多不止必惡風煩躁不得臥者先服防風白朮牡蠣湯次服小建中湯所合用方盡見本門活人書仲景桂枝湯桂枝芍藥各三兩甘草二兩上銼如麻豆大每服抄五錢匕水一盞半入生薑五片棗子二枚煎至一盞去滓溫服須臾啜熱稀粥一盞以助藥力溫覆令一時許遍身漐漐微以有汗者佳具加減法若桂枝湯自西北二方居人四時行之無不應驗江淮間唯冬及春可行之自春末及夏至以前桂枝證可加黃芩一分謂之陽旦湯夏至後有桂枝證可加知母半兩石膏一兩或加升麻一分若病人素虛寒者正用古方不再加減也戒曰桂枝最難用雖雲表不解脈浮可發汗宜桂枝湯須是病人常自汗出小便不數手足溫和或手足指稍作微冷少頃卻溫身雖微似煩而又憎寒始可行之若病人身無汗小便數或手足冷不惡寒或飲酒家不喜甘者慎不可行桂枝也仍有桂枝證服湯已無桂枝證者尤不可再與活人書仲景桂枝加葛根湯桂枝甘草各一兩葛根二兩芍藥麻黃各一兩半上銼如麻豆大每服抄五錢匕生薑四片棗子一個水一盞半煎至八分去滓服覆取微汗活人書仲景五苓散豬苓去黑皮稱白朮茯苓去皮稱各三分澤瀉一兩一分桂枝去皮半兩不見火上各事持搗篩為散拌勻每服抄三錢白湯調下此藥須各自事持稱見分兩然後合活人書仲景茯苓甘草湯茯苓桂枝去皮各二兩甘草炙一兩上銼如麻豆大每服抄五錢匕水一盞半生薑五片煮至八分去滓溫服活人書仲景桂枝加附子湯桂枝去皮芍藥各一兩半甘草炙一兩附子炮去皮用半兩上銼如麻豆大每服抄五錢匕生薑四片棗子一個水一盞半煮至八分去滓溫服活人書仲景芍藥甘草湯白芍藥甘草炙各二兩上銼如麻豆大每服抄五錢匕水一盞半煮至八分去滓溫服活人書仲景甘草乾薑湯甘草炙四兩乾薑二兩上銼如麻豆大每服抄五錢匕水一盞半煮至八分分減服活人書仲景調胃承氣湯甘草一兩芒硝一兩一分大黃去皮二兩上銼如麻豆大每服五錢匕水一大盞煎至七分去滓服活人書仲景蜜煎導若土瓜根及大豬膽汁亦可為導煎蜜四兩上一味內銅器中微火煎之稍凝如飴狀攪之勿令焦著欲可丸捻作挺如指許長二寸當熱時急作冷時硬令頭鋭內穀道中以手急抱欲大便時乃去之活人書仲景麻黃湯麻黃一兩半去節桂枝一兩甘草炙半兩杏仁三十五個去皮尖上銼如麻豆大每服抄五錢匕水盞半煮至八分去滓溫服覆取微汗不須啜粥加減法傷寒熱病藥性須涼不可太溫夏至後麻黃湯須加知母半兩石膏一兩黃芩一分蓋麻黃湯性熱夏月服之有發黃斑出之失唯冬及春與病人素虛寒者乃用正方不再加減活人書仲景四逆湯甘草二兩炙乾薑一兩半附子一個生用上銼如麻豆大每服四錢以水一盞半煮至七分去滓溫服強人加附子半個加乾薑一兩半活人書仲景溫粉法白朮藁本芎白芷各等分上搗羅為細末一兩入米粉三兩和之粉撲周身止汗無藁本亦得活人書防風白朮牡蠣湯防風獨莖者去蘆頭牡蠣炒黃白朮各等分上搗羅為細末每服二錢以酒調下米飲亦得日進二三服汗止便服小建中湯活人書仲景小建中湯桂枝一兩半去皮芍藥三兩甘草一兩膠飴半升舊有微溏或嘔者去膠飴上銼如麻豆大每服抄五錢匕水一盞半生薑四片大棗一個煮至八分去滓下膠飴兩匙許再煎化溫服日三服夜二服尺脈尚遲再作一劑加黃耆末一錢煎造飴膠法糯米一升揀淨洗大麥蘖末六兩上米一如炊飯甑上至氣溜取下傾入一盆子入蘖末一合並湯盞來許拌勻再上甑至飯熟卻入盆子內都以蘖末拌勻入一瓷罐子可容五升許冬月罐子可令熱春秋夏溫冬月用湯二升許入罐子內罐子內飯上湯三指許即得布並紙三五重蓋定更以綿或絮包定近火春秋夏即溫和至一宿見米浮在水面上即以布絞裂取清汁銀石器內煎至面上有膜即以木萆不住手攪至稀糊以瓷器收夏月置井中庶不酸傷寒頭汗出第二活人書論傷寒小兒大人治法一般但小分劑藥性差涼耳問頭汗出者何也病人表實裡虛元腑不開則陽氣上出汗者見於頭凡頭汗出者五內乾枯胞中空虛津液少也慎不可下下之者謂之重虛然頭汗出者有數證傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦有里也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也小柴胡湯主之傷寒五六日已汗下胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此表未解柴胡桂枝幹薑湯主之病人但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃五苓散茵陳湯陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之心下緊滿無大熱頭汗出者茯苓湯主之仲景云傷寒心下緊滿無大熱但頭汗出者此名為水結在胸脅以汗頭出別水結證用小半夏加茯苓湯活人書仲景小柴胡湯柴胡四兩黃芩一兩半若腹中痛者去黃芩加芍藥一兩半若心下悸小便不利者去黃芩加茯苓二兩人參一兩半若不渴外有微熱者去人參加桂枝一兩半溫覆微汗愈若咳嗽者去人參並棗子加五味子一兩一分乾薑一兩甘草一兩半半夏一兩一分湯洗若胸中煩不嘔者去半夏人參加栝蔞實半枚用四分之一若渴者去半夏更加人參三分苦栝蔞根二兩棗子六枚若脅下痞硬去棗子加牡蠣二兩熬上銼如麻豆大每服抄五錢匕生薑四片棗子一個水一盞半煮至八分去滓溫服日三服活人書仲景柴胡桂枝幹薑湯柴胡二兩桂枝去皮黃芩各一兩半栝蔞根二兩乾薑甘草炙牡蠣熬各一兩上銼如麻豆大每服抄五錢匕水一盞半煮至八分去滓溫服食頃再服活人書仲景五苓散方見傷寒自汗門中活人書仲景茵陳蒿湯茵陳蒿嫩者一兩半大黃半兩去皮梔子大者三枚半上銼如麻豆大以水二大白盞先煮茵陳減半盞次內二味煮八分去滓溫服日三服小便當利尿如皂莢汁狀色正赤一宿腹減黃從小便中去也活人書仲景梔子豉湯肥梔子十四枚掰香豉四合上銼如麻豆大每服五錢水一盞煎至八分去滓溫服得快吐止後服活人書赤茯苓湯赤茯苓陳橘皮湯浸去白瓤焙人參去蘆頭各一兩半夏湯洗七遍去滑芎藭白朮炮各半兩上件藥搗為粗末每服四錢以水一鍾半生薑五片煎至七分去滓不計時候溫服活人書小半夏加茯苓湯半夏五兩湯浸洗七遍白茯苓三兩去黑軟皮上銼如麻豆大每服半兩水三盞煎至一盞稱生薑四錢取自然汁投藥中更煎一兩沸熱吃不拘時候傷寒咳嗽第三傷寒後咳嗽附巢氏病源小兒傷寒咳嗽候傷寒是寒氣客於皮膚搏於血氣使腠理閉密氣不宣泄蘊積生熱故頭痛體疼而壯熱其嗽者邪在肺肺候身之皮毛而主氣傷寒邪氣先客皮膚隨氣入肺故令嗽重者有膿血也巢氏病源小兒傷寒瘥後猶嗽者是邪氣猶停在肺未盡也寒之傷人先客皮毛皮毛肺之候肺主氣寒搏於氣入五臟六腑故表裡俱熱熱退之後肺尚未和邪猶未盡邪隨氣入肺與肺氣相搏故傷寒後猶病嗽也活人書論傷寒小兒大人治法一般但小分劑藥性差涼耳問咳嗽者何也傷寒咳嗽有兩證有太陽證咳嗽小青龍小柴胡也有少陰證咳嗽真武湯四逆散豬苓湯也大抵熱在上焦其人必飲水停心下則肺為之浮肺主於咳水氣乘之故咳而微喘仲景云傷寒表不解心下有水乾嘔發熱而咳小青龍湯主之小便不利小腹滿者去麻黃加茯苓往來寒熱胸脅滿痛或咳者小柴胡湯主之小柴胡去人參大棗加五味子乾薑若少陰證咳嗽四肢沉重疼痛小便不利自下利而咳真武湯主之真武湯加五味子乾薑大抵傷寒水氣皆因飲水過多古人治水氣而咳者病在陽則小青龍湯主之病在陰則真武湯主之四肢厥逆腹中痛或泄利而咳四逆散主之四逆散加五味子乾薑下利六七日咳而嘔渴心煩不得眠豬苓湯主之古今録驗橘皮湯治嗽佳石壁經三十六種內傷寒咳嗽候唇青四十八候云唇白鼻紫嗽聲連肺胃於中養毒涎夜嗽胸高兼肚脹汗收髓熱氣難宣食逆復翻言語重嗽聲頻作豈能痊行風發汗方為妙定使風除絶本源內熱蘊積賊風所傳是致寒熱相感便生咳嗽久則胸高如覆杯也肚脹聲重須當發汗行風次與調氣化涎利膈若腹臟結則當利動即瘥鳳髓經此候歌括一同仍注云與坯煎散方見夾驚傷寒門次杏仁膏方見久嗽門小兒形證論四十八候傷寒咳嗽歌一同後云此是傷寒傳成吐逆咳嗽先與解表散方見慢驚風門中退傷寒後用疏風檳榔散方見煩熱門中然後用嗽藥三二服千金治少小傷寒發熱咳嗽頭面熱者麻黃湯方麻黃生薑黃芩各一兩甘草炙石膏芍藥桂心各半兩杏仁十枚湯浸去皮尖上八味㕮咀以水四升煮取一升半分二服兒若小以意減之傷寒證治亦用此治傷寒發熱咳嗽聖惠治小兒內中冷氣及傷於外寒咳嗽或時寒熱頭痛白朮散白朮紫菀洗去苗土麻黃去根節厚朴去粗皮塗生