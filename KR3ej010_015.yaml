搗羅為末與鐵粉硃砂同研令勻煉蜜和丸如緑豆大不計時候以溫水下五丸量兒大小加減服之聖惠治小兒傷寒後餘熱不除四肢不利宜用此湯浴方川大黃甘草防風去蘆頭丹參白朮各半兩雷丸三分上件藥搗粗羅為散每服用一兩以水三升煎至二升半去滓看冷熱於密室中浴兒後宜避風隔日再用嬰孺方先用豬脂和此藥摩兒頭至足令遍身又取三指撮白水在內和三升煮三沸浴兒謂之摩膏方太醫局白虎湯治傷寒大汗出後表證已解心胃大煩渴欲飲水及吐或下痢後七八日邪毒不解熱結在裡表裡俱熱時時惡風大渴舌生乾燥而煩欲飲水數升者宜服之又治夏月中暑毒汗出惡寒身熱而渴石膏洗二十五斤知母一百五十兩甘草煙七十五兩上為細末每服三錢以水一盞半入粳米三十餘粒煎至一盞濾去滓溫服小兒量力少少與之或加人參少許同煎亦得食後服此藥立夏後立秋前可服春時及立秋後並亡血虛家並不可服治傷寒本當取仲景白虎湯方證牽引緣此方敘出邪毒不解熱結在裡故再收之嬰孺治傷寒除熱粉散雷丸三兩牡蠣桂心各一兩上為粉以粉兒身上張渙清涼湯方解傷寒邪熱餘毒當歸大黃生地黃各一兩芍藥甘草炙各半兩上件藥搗羅為細末每服一錢以水八分入竹葉薄荷各少許煎至五分去滓溫服長沙醫者丁時發傳黃耆散方治小兒傷寒汗利以後餘熱不除口乾心煩不欲乳食黃耆知母茯苓人參甘草炙各一錢麥門冬半兩去心上為末每服一錢水一小盞煎至五分去滓不計時候服傷寒勞復第十七活人書論傷寒小兒大人治一般但小分劑藥差涼耳問傷寒瘥後發熱者何也此名勞食復也病新瘥血氣尚虛津液未復因勞動生熱熱氣既還復入經絡名曰勞復仲景云傷寒瘥以後更發熱小柴胡湯主之脈浮者以汗解宜柴胡桂枝湯脈實者以下解宜大柴胡湯又大病瘥後勞復者枳實梔子湯主之千金勞復起死人麥門冬湯又有食復者大病新瘥脾胃尚弱穀氣未復強食過多停積不化因爾發熱名曰食復大抵新病瘥多因傷食便作痞乾噫食臭腹中雷鳴下痢等症可與生薑瀉心湯仲景於枳實梔子湯證云若有宿食內大黃如博棋子五六枚服之愈黃帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而強食故有所遺也若此者皆病已衰而熱有所藏因其穀氣相搏兩熱相合故有所遺也帝曰善治遺奈何岐伯曰視其虛實調其逆從可使必已食肉則復多食則遺此其禁也廣濟療患勞復雄鼠屎散方許仁則七味蔥白湯皆可選用之耳千金要治小兒傷寒病久不除瘥後復劇瘦瘠骨立五味子湯五味子十銖甘草炙當歸各十二銖芒硝五銖石膏一兩大黃麥門冬黃芩前胡黃連各六銖上十味㕮咀以水三升煮取一升半服二合得下便止計大小增減服外臺療傷寒瘥令不復白芷散方白芷十二分白朮十分栝蔞五分桔梗四分細辛三分附子炮去皮乾薑桂心各二分防風八分上九味搗篩為散以粳米粥清服一錢匕食已服二錢小兒服一錢常以雞子作羹吃粳米飯多少與病人服之亦未必常雞子羹粳米飯如服藥訖即扶起令行步仍擳頭洗手面食輒服之勞行如前則不復浩云數用佳範汪同忌豬肉桃李雀肉胡荽蒜青魚鮓生蔥生菜一方有人參三分活人書仲景小柴胡湯方見傷寒頭汗門中活人書仲景柴胡桂枝湯柴胡二兩半夏三錢一字洗甘草半兩炙桂枝去皮黃芩人參芍藥各三分上銼如麻豆大每服抄五錢匕生薑四片棗子一枚水一盞半煮至八分去滓溫服活人書仲景大柴胡湯方見傷寒嘔啘門中活人書仲景枳實梔子湯枳實二枚去瓤麩炒梔子七枚肥者豉二兩上以清漿水二盞半空煮退八分內枳實梔子取九分下豉再煮五六沸去滓溫服覆令汗出若有宿食內大黃如博棋子五六枚同煎活人書麥門冬湯麥門冬一兩甘草二兩上銼如麻豆大先用水二小盞入粳米半合煎令米熟去米約得水一小盞半入藥五錢棗子二枚竹葉十五片同煎至一盞去滓服不能服者綿滴口中活人書仲景生薑瀉心湯方見傷寒下痢門活人書廣濟雄鼠屎散方雄鼠屎二七枚兩頭尖者是梔子十四枚掰枳殼二枚炙上為粗末每服四錢以水一盞半入蔥白二寸豉三十粒同煎一盞分二服勿令病人知鼠屎活人書許仁則七味蔥白湯蔥白連須切半升乾葛切三合新豉半合綿裹生薑切一合麥門冬去心生地黃三兩勞水四升以杓揚之一千過名勞水上前藥用勞水煎之三分減二去滓分二服漸漸覆之取汗傷寒失音第十八聖惠論夫喉嚨者氣之所以上下也喉厭者聲之門戶也舌者聲之機口者聲之扇也風寒客於喉厭之間故卒然無音皆由風邪所傷故致失音不語也其小兒傷寒失音者風寒邪氣之所傷也茅生生小兒傷寒失音語不得方金毛狗脊甘草各等分上為末每服一錢用黃蠟一塊指頭大水六分同煎四分服集驗方治小兒傷寒失音不語桂指面大上含桂漸漸聲音如舊王氏手集治大人小兒感風寒失音三拗湯麻黃不去根節甘草不炙杏仁不去皮尖上三物等分每服三指撮水一大盞煎至七分去滓時時溫溫呷傷寒變疽第十九石壁經三十六種內傷寒變疽候歌先前五日臉紅鮮鳳髓經第一句云已前七日唇臉青一見生人怕又驚四十候此兩句云傷寒變疽七日前兩瞼唇青怕語言驀睹胸前如痣子鳳髓經云驀然胸前赤痣色漸同梅李一般形血光齒上時聞臭指甲無紅色似銀食者可醫無苦病不識言風道熱驚用藥表脾涼上膈心涼疽伏始安寧鳳髓經歌括一同兩句小異外有注云宜與二聖散表出方見傷寒變疹子門中四十候傷寒變疽歌一同後云此候指甲白牙上有血為證表發只用參苓散涼心經用南星丸方見傷寒變疹門中不退用解表散方見慢驚風門去毒托裡散亦可方見傷寒變疹門中四十八候治嗽化痰參苓散人參麻黃甘草炙款冬花各一分半夏小者如魚眼大湯浸十二次葶藶各半錢馬兜苓三個上末每服半錢用桑白皮湯下傷寒變疹第二十石壁經三十六種內傷寒變疹子候歌預先五日戰如寒不覺看來又似癇才發有同梅李樣眼睛青碧臉紅鮮手心如火發毛立睡里狂言臥不安躁熱嫌人撥手睡又生喘急氣相連二三歲時為疹子此候須知有病源智者莫令通臟腑只將丸散表心間能催疹子添光大鳳髓經云涎散疹生如片火七日如期定卻安此傷寒不曾表內證故令毒氣攻內而未曾安也又凡在冬月春夏初切在精明色候慎不可與驚風一例而治若有候但依前旨必無夭枉者矣鳳髓經歌括同有注云宜與二聖散表出後用牛蒡散解方見本門中小兒形證論四十八候傷寒變疹子歌一同後云此候先有蘊熱忽至風傷腠理發熱狂言氣急生涎用天南星丸退心間風涎微用解表退傷寒量虛實宣瀉托裡散勻氣如不宣卒未安一方並見本門小兒形證論四十八候傷寒變疹子歌后云此候初如傷寒或似驚風須要辨別仔細既是出在皮膚只宜平和湯藥解表勻氣更量實肌體肥瘦聊與通利關竅勻氣疹痘論與諸家瘡疹説若皮膚中未見乃可通利若是已在皮膚切忌通利也蓋內虛即毒氣反入能損人命鳳髓經二聖散治小兒疹痘欲出不出服此發出浮萍香白芷各等分上為細末每服半錢或一錢麝香酒下鳳髓經牛蒡散治小兒疹痘不出或用藥發出後餘熱未退發渴熱水乃下血斑疹用此藥解甘草節荊芥穗牛蒡子略炒上等分為末每服一錢半解毒薄荷湯下未出紫草湯下進數服須得身上出者方下此藥小兒形證論四十八候天南星丸方治急驚風因赤體或浴或變蒸遂停留不去因滯潮熱亦可服天南星一個去皮硃砂一錢蠍半錢輕粉少許上為末酒麵糊丸如緑豆大每服七粒薄荷湯下日進二服四十八候治傷寒變瘡疹通關勻氣托裡散人參麻黃去節甘草節各一分白朮蔓荊子紫草各一錢白茯苓半兩升麻半分上末一錢瘡未出用好酒調下如已出香熟水調下
