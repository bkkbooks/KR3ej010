小兒嗽和胃止逆寬利胸膈思乳食半夏半兩湯浸洗去滑白朮人參甘草炙乾薑各二錢半上為細末生薑汁打麵糊為丸緑豆大每服十丸乳食後稍空煎生薑湯下王氏手集墜痰丸治小兒痰實咳嗽壯熱生驚呀呷喘滿頭痛心忪胸膈不利心嘈噁心半夏一兩生薑制天南星米泔浸切作片子炙杜薄荷白茯苓白礬灰人參各半兩上件為細末生薑汁打麵糊為丸每服五七丸至十丸生薑薄荷湯下長沙醫者丁時發傳華蓋散治小兒痰壅咳嗽桑白皮炙一兩甘草炙黃耆炙各三錢桔梗洗三分上為細末每服半錢湯點服長沙醫者丁時發傳小兒化涎去風止咳嗽方半夏三分湯洗七次天南星半兩炮甘草三錢炙皂角子二十一粒炒焦上為末每服一錢水六分入生薑二片同煎三分去滓溫溫服長沙醫者丁時發傳治小兒痰鳴咳嗽氣粗不食涎潮牽牛丸定喘牽牛取末半兩螺青白礬火飛各一分硼砂一錢巴豆燈上燒杏仁各七粒上件為末水煮糊為丸緑豆大每服七粒淡薑湯下長沙醫者丁時發傳治丈夫婦人小兒痰鳴涎響咳逆喘嗽半夏丸半夏半兩上用大蘿蔔一個開一小竅子取成罐子入半夏在內用好醋煮透赤色取出細研蘿蔔半夏如泥又別研入硃砂雄黃各一錢同為丸緑豆大每服量兒小大五七丸至十丸生薑湯下長沙醫者鄭愈傳治小兒涎盛咳嗽上膈壅熱鉛白霜百藥煎各半兩上件為末煉蜜和丸如桐子大每服一丸用薄荷湯化下不計時候寒嗽第九錢乙論寒熱相反云京東轉運使李公有孫八歲病嗽而胸滿短氣醫者言肺經有熱用竹葉湯牛黃膏各二服治之三日加喘錢曰此肺氣不足復有寒邪即使喘滿當補肺脾勿服涼藥李曰醫已用竹葉湯牛黃膏錢曰何治也醫曰退熱退涎錢曰何熱所作曰肺經熱而生嗽嗽久不除生涎錢曰本虛而風寒所作何熱也若作肺熱何不治其肺而反調心蓋竹葉湯牛黃膏治心藥也醫有慚色錢治愈千金紫菀湯治小兒中冷及感寒暴嗽或上氣喉咽鳴氣逆或鼻塞清水出者方紫菀杏仁黃芩當歸甘草炙各半兩麻黃桂心橘皮青木香各六銖大黃一兩嬰孺方用一兩半上十味㕮咀以水三升煮取九合去滓六十日至百日兒一服二合半一百日至二百日兒一服三合千金五味子湯治小兒風冷入肺上氣氣逆面青喘迫咳嗽晝夜不息食則吐不下方五味子當歸各半兩乾薑桂心各六銖細辛三銖人參紫菀甘草各六銖款冬花三銖大黃一兩半麻黃六銖嬰孺方用半兩上十一味㕮咀以水二升半煮取九合去滓兒六十日至百日一服二合半一百日至二百日一服三合其大黃別浸一宿下一方無款冬花大黃有大棗三枚千金治小兒暴冷嗽及積風冷嗽兼氣逆鳴菖蒲丸方菖蒲烏頭炮去皮尖杏仁礬石細辛皂莢各六銖款冬花乾薑炮桂心紫菀各十八銖蜀椒五銖吳茱萸六合上十二味末之蜜丸如桐子大三歲兒飲服五丸加至十丸日三兒小以意減之兒大以意加之暴嗽數服便瘥太醫局潤肺散治小兒寒壅相交肺氣不利咳嗽喘急語聲不出痰涎壅塞胸膈煩滿鼻塞清涕咽喉干痛麻黃去根節人參去蘆頭各二兩貝母去心麩炒黃杏仁湯浸去皮尖焙令乾麩炒黃各二兩半甘草炙銼一兩陳橘皮湯浸去白一分桔梗阿膠炒令黃各半兩上件同杵羅為細末每服一錢水八分煎六分去滓溫服食後太醫局華蓋散治小兒肺感寒邪咳嗽上氣胸膈煩滿項背拘急聲重鼻塞頭昏目眩痰氣不利呀呷有聲紫蘇子隔紙炒麻黃去根節湯浴過杏仁去皮尖炒桑白皮蜜炙赤茯苓去皮陳皮去白各半兩甘草炙一分上七味為末每服一錢水一小盞煎至五分去滓溫溫服太醫局人參半夏丸治小兒肺胃受冷咳嗽氣急胸膈痞滿喉中呀呷嘔吐涎沫乳食不下亦治瘧嗽人參去蘆頭細辛去苗陳橘皮各二兩丁香半夏湯浸七次切焙厚朴去粗皮各四兩上為細末用生薑汁打麵糊和丸如麻子大三歲兒服二十丸生薑湯下食後服量兒大小加減嬰孺治少小肺冷嗽呼吸多要得於寒者紫菀丸方紫菀三分礬石燒桂心各二分上為末雞子黃和丸小豆大乳送三丸大人七丸日三常用良嬰孺治小兒風冷入肺嗽日夜不息晝或小瘥至夜即甚食飲不下五味湯方五味子甘草炙當歸人參麻黃去節紫菀桂心款冬花各三分細辛地黃各一分棗二十枚劈上水三升先煮麻黃去沫下藥煮一升一服二合小兒一合錢乙百部丸治小兒肺寒壅嗽微喘百部焙乾稱麻黃去節先作末各三分杏仁四十粒去皮尖微炒煮三五沸研入藥上拌和勻熟蜜為丸皂子大溫水化下三二丸無時日三四此本方也仲陽加松子仁五十個糖丸之含化大妙張渙木香半夏丹治小兒胃寒咳嗽木香半夏湯浸七次焙乾肉豆蔻各一兩藿香葉丁香白朮炮各半兩上件搗羅為細末取生薑自然汁和如黍米大每服十粒煎人參湯下量兒大小以意加減惠眼觀證皂莢丸治小兒冷嗽皂莢不蚛者炙肉桂去皮白薑炮上等分為末煉蜜為丸如此大每服五丸大小加減熟水吞下王氏手集紫蘇杏仁散治小兒感寒肺氣壅滯壯熱咳嗽鼻塞清涕語聲不出胸膈膨脹痰實嘔逆咽嗌疼痛煩渴喘急紫蘇炙杏仁各炒甘草炙麻黃去節各等分上為粗末每服一錢水六分煎至三分去滓食後溫服王氏手集潤肺膏丸治小兒寒壅咳嗽水蓼桑鈄覆盆子枸杞子各半兩皂兒炮杜茴香生薑甘草各一兩京三稜炮胡桃十個上為細末煉蜜為丸一兩作八十丸細嚼溫熟水下兒小白湯化下王氏手集五味子膏調勻小兒肺胃止咳嗽嘔逆中寒喘滿可思乳食五味子人參白朮官桂乾薑上各等分為細末煉蜜為丸一兩作八十丸每服一丸沸湯化下日三四服吉氏家傳治小兒一切寒嗽川烏大者炮去皮尖上為細末用生薑自然汁為丸如小緑豆大每服七丸或十丸大人亦可服熟水下硃砂為衣熱嗽第十錢乙論溫冷用藥云東都張氏孫九歲病肺熱他醫以犀珠龍麝生牛黃治之一月不愈其證嗽喘悶亂飲水不止全不能食錢氏用使君子丸益黃散張曰本有熱何以又行溫藥他醫用涼藥攻之一月尚無效錢曰涼藥久則寒不能食小兒虛不能食當補脾候飲食如故即瀉肺經病必愈矣服補脾藥二日其子欲飲食錢以瀉白散瀉肺遂愈十分張曰何以不虛錢曰先實其脾然後瀉肺故不虛也談氏殊聖方小兒頻嗽又饒啼喘息時時似火堆此是乳食沖膈熱莫冤神灶恐延遲沙糖元劍塗酥炙杵合依方請不疑更取麥門知母等三焦洗了是良醫知母散知母麥門冬甘草各一分生皂角半分去皮酥炙用盆子合出火毒上為末每服二錢水一盞同煎至八分分五服放冷下嬰童寶鑑治小兒咳嗽解風熱一捻金方白殭蠶直者一兩甘草半兩炙延胡索一分上件為散每服一捻齏汁調下良方治小兒熱嗽馬牙硝白礬各八兩黃丹一分上同研入合子固濟火燒令紅覆潤地一夜再研加龍腦半錢甘草湯下一字或半錢張氏家傳治孩兒虛熱生涎咳嗽人參散方人參貝母去心炒款冬花去皮半夏水煮透干為末用薑汁作餅子焙乾甘草炙黃各一錢上件為細末每服半錢水四分入杏仁二粒去皮尖同煎至二分溫服莊氏家傳治小兒脾肺壅熱咳嗽金華散並氣粗喘貝母七分漢防己甘草炙各半分馬牙硝半兩上件為細末每服半錢水四分或一錢煎溫服一日三服如壅甚時時與服無妨吉氏家傳治小兒上焦壅熱及心肺虛熱嗽不止清肺丸好連翹一兩腦子少許研上末煉蜜丸彈子大食後臨臥含化忌豬肉濕面長沙醫者丁時發傳半夏散治小兒肺熱咳嗽止瀉潤肺半夏一兩薑汁貝母三分柴胡去蘆杏仁炒研川升麻桑白皮炙地骨皮款冬花麥門冬去心馬兜苓青橘皮各半兩甘草一分炙上為末每服一錢薄荷一葉綿一片裹藥末用水一盞生薑一片棗半枚煎五分用盞盛放火上時時溫服忌生冷毒物久嗽第十一聖惠治小兒嗽久不止心神煩悶栝蔞煎方栝蔞一顆熱者去仁以童子小便一升相和研絞取汁酥一兩甘草一分生為末蜜二兩上件以銀鍋子中熳火煎如稀餳每服以清粥飲調下半錢日四五服量兒大小以意加減聖惠治小兒嗽久不止不灰木散方不灰木用牛糞塗燒令通赤貝母煨令黃甘草炙微赤銼以上各半兩上件藥搗粗羅為散每服一錢以新汲水一小盞點生油一二滴打令散煎至五分去滓分溫二服日四服量兒大小以意加減嬰孺治小兒咳嗽經年不瘥喉鳴喘成疹麻黃丸方麻黃去節細辛甘草各二分炙款冬花柴胡紫菀茯苓百部枳實炙各三分貝母大黃各五分黃芩四分杏仁六分炒上為末蜜丸烏豆大四五歲兒一服二十丸日再稍加之嬰孺治小兒久嗽上氣連年胸中迫滿不得臥但常抱坐附子煎丸附子二個炮款冬花芎各二升細辛礬石各五分飴糖二升蜀椒一升去汗目合口者紫菀十分五味子四分竹根射干各一把白朮二分桂心三分酒三升上十二味以酒煎候竹根黃黑去滓下飴糖於酒中更煎令可丸服桐子大一丸至十丸嬰孺治小兒嗽經時不瘥一嗽氣絶及傷肺見血桑白皮煎方桑根白皮切五合東行者白狗肺一具切甘草茯苓升麻貝母各二十分芍藥杏仁炒各十分李根白皮切四分淡竹青皮八分款冬花麥門冬去心各六分蜜地黃汁各一升黃芩十一分上以水一斗煮及三升去滓下杏仁膏地黃汁蜜微火上煎不住攪至二升三合綿濾絞汁二三歲兒一合溫服之日進五服夜三服鳳髓經杏仁膏治小兒日久咳嗽不瘥杏仁去皮尖茯苓去皮各一分不蛀皂角一挺重一錢半去皮蜜炙干上為細末煉蜜為膏一皂子大薄荷蜜水下莊氏家傳治小兒久嗽不止柴胡去蘆黃芩各半兩甘草炮一分上為末每服一錢煎蔥湯調下不過再服長沙醫者丁時發傳治大人小兒久嗽不止痰吐喘悶氣噎知母散知母貝母柴胡黃耆炙紫菀洗馬兜苓半夏白礬水煮干為度杏仁研去皮尖桑白皮炙白礬研款冬花各等分上為細末每服一錢水七分盞同煎三分去滓時時服或生薑自然汁煮糊為丸每服五七丸生薑湯下長沙醫者丁時發傳貝母散治小兒久嗽氣急貝母煨微黃杏仁湯浸去皮炒麥門冬去心款冬花各一分紫菀半兩去苗上為末用乳汁調下半錢長沙醫者丁時發傳半夏丸治小兒久嗽痰吐頭疼半夏天南星各一兩皂角水二味煮乾白礬石膏川烏頭炮各一分上為末生薑自然汁為丸緑豆大每服十丸生薑湯下
