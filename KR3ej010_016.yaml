body:
  text: 卷第十六咳嗽諸疾凡十一門咳嗽第一巢氏病源小兒嗽候嗽者由風寒傷於肺也肺主氣候皮毛而俞在於背小兒解脫風寒傷皮毛故因從肺俞入傷肺肺感寒即嗽也故小兒生須常暖背夏月亦須生單背襠若背冷得嗽月內不可治百日內嗽者十中一兩瘥耳嬰孺論曰嗽病所生兒離其母獨居而啼其氣未定因而乳之啼時陰陽俱盛虛實更作肺胃受邪故令兒嗽漢東王先生家寶治嗽病症小兒發嗽由風寒傷於肺月內小兒不可治也百日內嗽者十中可一兩全活爾宜先進麥湯散二三服方見傷寒發斑門中以金花散二三服方見本門間觀音散二三服方見胃氣不和門中大凡小兒尤宜慎風不可使嗽錢乙論咳嗽云夫嗽者肺感微寒八九月間肺氣大旺病嗽者其病必實非久病也其症面赤痰盛身熱法當以葶藶丸下之方未見若久者不可下也十一月十二月患嗽者乃傷風嗽也風從背脊第三椎肺俞穴入也當以麻黃湯汗之方未見有熱證面赤飲水涎熱咽喉不利者宜兼甘桔湯治之方見實熱門中若五七日間其症身熱痰盛唾黏者以褊銀丸下之方見痰涎門中有肺盛者咳而後喘面腫欲飲水有不飲水者其身即熱以瀉白散瀉之方見喘咳上氣門中若傷風咳嗽五七日無熱證而但嗽者亦葶藶丸下之方未見後用化痰藥有肺虛者咳而哽氣時時長出氣喉中有聲此久病也以阿膠散補之方見喘咳上氣門中痰盛者先實脾從以褊銀丸微下之方見同前涎退即補肺補肺如上法有嗽而吐水或青緑水者以百祥丸下之方見瘡疹倒黶門中有嗽而吐痰涎乳食者以白餅子下之方見搐搦門中有嗽而略膿血者乃肺熱食後服甘桔湯方見同前久嗽者肺亡津液阿膠散補之方見同前咳而痰實不甚喘而面赤時飲水者可褊銀丸下之方見同前治嗽大法盛即下之久即補之更量虛實以意增損錢乙論嗽病訣死云東都藥鋪杜氏有子五歲自十一月病嗽至三月未止始得嗽而吐痰乃外風寒搐入肺經今肺病嗽而吐痰風在肺中故也宜以麻黃輩發散後用涼藥壓之即愈時醫與鐵粉丸半夏丸褊銀丸諸法下之其肺即虛而嗽甚至春三月間尚未愈召錢氏視之其候面青而光嗽而喘促哽氣又時長出氣錢曰病困十已八九所以然者面青而光肝氣王也春三月者肝之位也肺衰之時也嗽者肺之病肺自十一月至三月久即虛痿又曾下之脾肺子母也復為肝所勝此為逆也故嗽而喘促哽氣長出氣也錢急與瀉青丸瀉之方見驚熱門中後與阿膠散實肺方見同前次日面青而不光錢又補肺而嗽如前錢又瀉肝瀉肝未已又加肺虛唇白如練錢曰此病必死不可治也何者肝大王而肺虛絶肺病不得其時而肝勝之今三瀉肝而肺病不退三補肺而肺證猶虛此不久生故言死也此證病於秋者十救三四春夏者十難救一果大喘而死嬰童寶鑑咳嗽死候嗽而眼時上視下青黑糞五關貫真珠囊小兒咳嗽候因乳哺無節傷於肺或乳之次與氣相沖氣乳相沖於肺故令氣逆而嗽也惠眼觀證凡生下一月至百日或周歲或三五歲以上嗽分數種有奶下嗽者因吃熱奶傷肺而得只下溫肺散方見疳嗽門中及人參膏塗唇方見本門中有齁䶎嗽氣急嗽速早起眼腫乃下渾金丹方見咳嗽作呀呷聲門中量大小與吐下涎即用勻氣化涎涼心肺藥服之有疳嗽者此因久瀉脾胃虛上嗽發熱攻擊心氣宜先以疳藥蘆薈丸方是人常服者夾烏犀丸方見肥疳門中服之後用退心熱及防己丸治之方見疳嗽門中有傷寒嗽者此因客風在肺其肺氣伏熱嗽後多吐宜以金粉散治之方見傷風嗽門上件諸般嗽如脾胃氣實胸膈太壅先以鮮湯丸利之方見急慢驚風門中茅先生小兒受咳嗽死候歌咳嗽胸高喘氣粗眼睛上視定還除時時下糞青並黑不食看看命即無葛氏肘後療小兒咳嗽方紫菀六分貝母二分款冬花一分上搗為散每服如豆大著乳頭上令兒和乳咽之日三四乳母勿食大咸醋物聖惠用清粥飲調一字千金治少小嗽八味生薑煎方生薑七兩乾薑四兩桂心二兩甘草款冬花紫菀各三兩杏仁蜜各一升上合諸藥末之微火上煎取如飴餔量其大小多少與兒含咽之百日小兒如棗核許日四五服甚有驗千金治少小十日以上至五十日卒得聲咳吐乳嘔逆暴嗽晝夜不得息桂枝湯方桂枝半兩甘草二兩半紫菀十八銖麥門冬一兩十八銖上四味㕮咀以水二升煮取半升以綿著湯中捉綿滴兒口中晝夜四五過與之節乳哺千金治小兒嗽日中瘥夜甚初不得息不能復啼四物款冬丸方款冬花紫菀各一兩半桂心半兩伏龍肝六銖上末之蜜和如泥取如棗核大敷乳頭上令兒飲之日三敷之漸漸令兒飲之孫真人治小兒咳嗽方生薑四兩上銼碎水五升煎湯與兒沐浴仙人水鑑小兒百日內嗽逆不止方咳嗽不止使神攻梔子乾薑力不同乳煎一合分三分必定獲安五臟通上此是五臟氣不和小孩子不宜大藥外臺小品療少小咳嗽腹脹七物小五味子湯方五味子研紫菀各二分黃芩甘草炙麻黃去節生薑桂心各一分上藥㕮咀以水一升煮取七合分五服忌如常法外臺小品又療少小十日以上至五十日卒得暴咳吐乳嘔逆晝夜不得息四物湯方桔梗紫菀各三分甘草炙一分麥門冬去心七分上藥切以水一升煮取六合去滓分五服以瘥為度千金有桂心無桔梗以水二升煮取一升以綿著湯中捉綿滴兒口中晝夜四五過與節哺乳外臺劉氏療小兒咳嗽不得臥方甘草炙六分桔梗四分桑白皮貝母茯苓各三分大青吳藍五味子人參各二分上九味切以水二升煮取八合去滓量多少大小與服忌如常法勝金方治小兒咳嗽上以蜂房二兩淨洗蜂糞及泥土以快火燒為灰每服一字飯飲下聖惠治小兒心胸煩悶體熱咳嗽天門冬散方天門冬去心焙桑根白皮銼赤茯苓柴胡去苗百合紫菀洗去苗土藍葉甘草炙微赤銼以上各半兩上件藥搗粗羅為散每服一錢以水一小盞入生薑少許煎至五分去滓量兒大小以意分減溫服聖惠治小兒咳嗽胸中滿悶不欲乳食陳橘皮散方陳橘皮湯浸去白焙桔梗去蘆頭雞蘇杏仁湯浸去皮尖麩炒微黃人參去蘆頭各一分貝母煨微黃半兩上件藥搗粗羅為散每服一錢以水一小盞入燈心十莖煎至五分去滓溫服日三四服量兒大小以意加減聖惠治小兒咳嗽壯熱胸膈壅滯麥門冬煎方麥門冬去心一兩生薑半兩汁酥蜜各二合杏仁湯浸去皮尖二兩上件藥先以水一大盞煎麥門冬及杏仁至四分入沙盆內研絞取汁卻入銀器中次內生薑汁等以熳火熬成膏收於瓷器中每服以清粥飲調下半茶匙日三服夜一服量兒大小以意加減聖惠治小兒卒得咳嗽吐乳桔梗散方桔梗人參去蘆頭陳橘皮湯浸去白焙各一分甘草炙略赤銼麥門冬去心焙紫菀去苗土各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒以大小分減服之聖惠治小兒咳嗽頭熱令乳母服百部散方百部貝母煨黃紫菀洗去苗土葛根銼各一兩石膏二兩上件藥搗篩為散每服三錢以水一小盞入竹葉二十片煎至六分去滓每服食後令兒飲乳甚佳博濟方治大人小兒咳嗽大妙犀灰散巴豆杏仁去尖半夏各等分上用一合子盛之以赤石脂閉縫了用三斤炭火煆令透赤即取出放冷細研如粉小兒半字淡薑湯調下大人咳嗽薑湯下一字靈苑治小兒咳嗽金杏煎丸杏仁四十九個去皮尖生研栝萎大者一枚不蚛皂角一錠捶碎生百部一兩三味各用水挼搗碎絞取濃汁以上入銀石器內慢火熬成膏入後藥牽牛子搗一味末一兩木香半兩為細末上入煎藥膏內杵為丸如緑豆大每服五丸至七丸用糯米飲下量兒大小加減丸數茅先生小兒咳嗽雌黃丸方雌黃細研雞內金是雞糞黃延胡索半夏生用上件各等分為末用棗肉為丸如此大每服七丸十丸用燈心湯吞下與呀呷門惠眼觀證內金丸同為各有牽引故兼存之茅先生治小兒咳嗽金杏丸方杏仁去皮尖漢防己甜葶藶馬兜苓去皮上等分為末用蜜和丸如此大每服十丸用麥門冬湯吞下茅先生小兒是嗽奶豆膏栝萎瓤蜜各半盞人參鉛白霜各半兩陳槐花一分栝萎子一百二十粒上將栝萎瓤及蜜煉成膏入諸藥末同為膏每服一大黃豆大用杏仁煎湯調服之嬰孺治小兒嗽體羸弱不堪治者貝母煎方貝母杏仁研泥各六分升麻甘草炙黃芩各三分紫菀三分半款冬花二分蜣蜋五個去羽上為末以蜜二斤和末入銅器中沸煎湯內煎之不住手攪如飴煎成拍合收以匕抄棗核大一歲啖七粒日四五服百日兒四五枚量兒與之嬰孺治小兒嗽方紫菀射干各五分貝母升麻各十分杏仁研成膏別入柴胡茯苓芍藥黃芩各八分甘草四分炙枳殼六分炒竹葉切一升蜜十合上以水三升煮及一升八合去滓下杏膏蜜熳火煎取一升六合一歲兒服一合嬰孺治少小兒嗽生薑煎方生薑七兩乾薑桂心杏仁各二兩甘草紫菀各三兩款冬花三合蜜一升上微火煎如飴含棗核大一枚咽汁日進四五服如百日兒含半棗許漢東王先生家寶治小兒嬰孩咳嗽金花散方鬱金防風半夏各一分巴豆二十一粒皂角一莖上以水一升於銀器內煮令乾去巴豆皂角不用以溫湯澤洗餘三味焙乾為末每服嬰孺一字二三歲半錢或一錢薄荷蜜熟水調下漢東王先生家寶治不因傷風得嗽名曰胃氣嗽藿香散方藿香二十一葉枳殼二片用濕紙裹煨令熟蚌粉一塊如枳殼大上為末每服嬰孩一字二三歲半錢蜜飯飲調下不過二三服安張渙馬兜苓丹方治小兒肺壅咳嗽大便不利馬兜苓紫蘇子人參去蘆頭各一兩款冬花木香各半兩併為細末次用杏仁一分湯浸去皮尖細研上件同拌勻煉蜜和如黍米大每服十粒煎生薑湯下量兒大小加減張渙順肺湯方治小兒心肺不利咳嗽半夏湯浸七次焙乾紫蘇葉各一兩陳橘皮湯浸去白款冬花桂心木香五味子各半兩上件搗羅為細末每服一錢水八分一盞入生薑人參各少許煎至四分去滓放溫服張渙養肺湯方治小兒嗽溫養肺胃紫菀洗去土焙乾半夏湯洗七次款冬花真阿膠各一兩人參去蘆頭桂心各半兩上件搗羅為細末每服一錢水一小盞入生薑二片糯米五粒煎至五分去滓放溫時時服張渙遺方雄黃膏治月里兒咳嗽並三歲以下皆可服雄黃一錢細研杏仁七粒去皮尖半夏七個童子小便浸一宿切作片子焙乾末上一處研勻用生薑自然汁半兩蜜半兩一處入藥末於罐子內重湯內熬用柳枝子攪成膏每服一皂皂大塗奶頭與兒吮或糯米飲調下聚寶方補肺散治大人小兒咳嗽不以深淺皆效款冬花鐘乳石研五日水飛稱甘草桂心取有末者白殭蠶直者鉛白霜研各半兩白礬三錢飛馬屁勃半錢木香上九味為末每服半錢手心攤得令薄用荻筒子中心令淨吸盡以蜜半匙細細吃送下如患年深以蜜作麵糊下藥齁䶎燒蘿蔔下小兒蜜水調一字吃忌酒膩物惠眼觀證人參膏治小兒嗽塗唇膏人參馬兜苓各一錢款冬花半錢上為末煉蜜為膏每服少許塗兒唇上同乳服之劉氏家傳牙兒咳嗽注唇膏雌黃一錢白殭蠶直者三個去絲略焙上研細煉蜜調得所抹唇上或乳頭上孔氏家傳治乳下嬰兒咳嗽注唇膏甜葶藶搗爛訖即於紙上炒熟一分乳香為末一錢白殭蠶直者十四枚研細天南星一個上四味先將乳香末入葶藶末內和為劑再研為末次入諸藥袞研濕紙裹之慢火炮以紙焦為度取出去黑者不用只用黃者末一錢入麝香少許每用一字置於乳上乳兒乳母忌冷物如要為膏即煉蜜為之注兒唇上自然並乳咽下王氏手集治小兒嗽方百部黃蠟杏仁各一兩上件同搗分七服豬胰子內炙