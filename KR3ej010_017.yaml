秋氣傷於風則病盛矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱先傷於風而後傷於寒故先熱而後寒亦以時作名曰溫瘧夫病瘧六七日但見熱者溫瘧也千金常山湯治小兒溫瘧方常山一兩切小麥三合淡竹葉切一升外臺用一握上三味以水一升煮取五合一日至七日兒一合為三服八日至十五日兒一合半為三服十六至二十日兒三合為三服四十日至六十日兒六合為三服六十日至百日兒一服二合半百日至二百日兒一服三合外臺方同但云一歲至七八歲兒增藥水並以此為率千金又方上用鹿角末先發時便服一錢匕千金又方上用鱉甲灰以酒服一錢匕至發時服三匕並以火灸身千金又方上燒雞肶胵中黃皮末和乳與服男雄女雌千金灸法小兒溫瘧灸乳下一指三壯瘧疾寒而後熱第十一巢氏病源痎瘧候夫痎瘧者夏傷於暑也其病秋則寒甚冬則寒輕春則惡風夏則多汗然其蓄作有時以瘧之始發先起於毫毛伸欠乃作寒栗鼓頷腰脊痛寒去則外內皆熱頭痛而渴欲飲何氣使然此陰陽上下交爭虛實更作陰陽相移也陽並於陰則陰實陽虛陽明虛則寒栗鼓頷巨陽虛則腰背頭項痛三陽俱虛陰氣勝勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱內外皆熱則喘而渴欲飲此得之夏傷於暑熱氣盛藏之於皮膚之內腸胃之外此榮氣之所舍此令汗出空疏腠理開因得秋風汗出遇風乃得之及以浴水氣舍於皮膚之內衛氣並居衛氣者晝日行陽此氣得陽如出得陰如內搏是以日作其間日而作者謂其氣之舍瀉內搏於陰陽氣獨發陰邪內著陰與陽爭不得出是以同日而作千金常山丸治大人小兒痎瘧説不可具方常山知母甘草炙大黃各三分麻黃去根節一兩上五味末之蜜和丸如梧子大五丸小兒黍米大三丸熟水下漸加至五丸服瘥為度與寒多於熱門中活人書祛邪丸方味都同而分兩不同千金治大人小兒肺熱痰聚胸中來去不定轉為瘧其狀令人心寒寒甚則發熱熱間則善驚如有所見者常山湯方常山三兩秫米三百二十粒甘草半兩上三味㕮咀每服三指撮水一盞煎至五分發時連服三服一法前件藥水七升煮取三升分三服至發時令三服盡兒小者服一合二合活人書治瘧疾先寒後熱兼治支結柴胡八兩人參炙半夏浸七次切黃芩桂去皮以上各三兩上銼如麻豆大每服抄五錢匕水一盞半薑七片棗二個煎至八分去滓取六分清汁溫服日三夜二若渴去半夏加人參栝蔞根同煎服瘧疾寒熱更作第十二巢氏病源往來寒熱瘧候此由寒氣並於陰則發寒風氣並於陽則發熱陰陽二氣更實更虛故寒熱更往來也全生指迷論曰若其人翕翕如熱淅淅如寒無有時度支節如解手足痠疼頭目昏暈此由榮衛虛弱外為風邪相乘搏於陽則發熱搏於陰則發寒又不治成勞氣宜荊芥散方在後全生指迷論又曰若寒熱如瘧不以時度腸滿膨脝起則頭暈大便不通或時腹痛胸膈痞悶此由宿谷停留不化結於腸間氣道不舒陰陽交亂宜備急丸方在後全生指迷荊芥散荊芥穗人參白朮當歸切洗焙黃耆芍藥桂去皮各一兩柴胡去苗二兩甘草炙半兩上為粗末每服五錢水二盞煎至一盞去滓溫服全生指迷備急丸大黃濕紙裹煨巴豆去皮心去油乾薑去皮等分上為細末煉蜜和丸如豌豆大每服一丸米飲下羸人服一丸如緑豆大以大便快利為度瘧疾熱而不寒第十三巢氏病源夫病瘧六七日但見熱者溫瘧也溫瘧方見先熱後寒又有疸瘧候夫疸瘧者肺素有熱氣盛於身厥逆上下中氣實而不外泄因有所用力腠理開氣寒舍於皮膚之內分肉之間而發發則陽氣盛氣盛而不衰則病矣其氣不及之陰故但熱不寒寒氣內藏於心而外舍於分肉之間令人消爍脫肉故命曰疸瘧其狀但熱不寒陰氣先絶陽氣獨發則少氣煩啘手足熱而嘔也聖惠治大人小兒疸瘧但熱不寒嘔逆不下食宜服香豉飲子方香豉半合蔥白七莖切常山檳榔各三分川升麻一兩知母生地黃切鱉甲塗醋炙令黃去裙襴用各一兩半上件藥銼碎都以水二大盞半煎至一盞半去滓不計時候分為三服一日服盡小兒服一合聖惠又方常山甘草生地骨皮各一分生鐵一斤打碎如棋子大上件藥細銼都以水二大盞於星月下浸一夜橫刀一口安在藥上早晨煎取一盞去滓空腹分為二服重者不過二劑瘥小兒服一合聖惠治大人小兒疸瘧發作不定但熱不寒宜服此方常山桃仁湯浸去皮尖雙仁麩炒微黃黃丹炒令紫色各一兩香豉一合炒乾上件藥搗羅為末煉蜜和丸如梧子大每至發日空心煎桃仁湯下十丸於發時再一服小兒粟米大五丸聖惠治小兒痰熱發瘧知母散方知母鱉甲塗醋炙令黃去裙襴各一兩牡蠣粉常山各半兩上件藥搗細羅為散每服以粥飲調下半錢日二服量兒大小以意加減聖惠治小兒瘧疾煩熱牛黃丸方牛黃杏仁湯浸去皮尖雙仁麩炒微黃各一分上件藥同研如膏煉蜜和丸如麻子大每服以溫水下三丸日三服量兒大小加減服張渙知母丹治小兒發熱瘧甚者知母微炒鱉甲酥炙去裙襴川大黃細銼微炒赤茯苓硃砂細研水飛各一兩川朴硝川升麻各半兩龍腦一錢研上件同拌勻煉蜜和丸如黍米大每服五粒至七粒生薑湯下大便利下即愈量大小加減活人書治瘧疾但熱不寒者知母六兩甘草炙二兩石膏一斤桂去皮稱三兩粳米二合上銼如麻豆大每服五錢水一盞半煎取八分去滓服瘧疾寒而不熱第十四巢氏病源寒瘧候此由陰陽相併陽虛則陰勝陰勝則寒寒發於內而並於外所以內外俱寒故病發但戰栗而鼓頷頤也全生指迷論大人小兒瘧疾若寒從背起冷大如手不甚戰栗似欲發熱而汗出或即頭痛嘔吐時作其脈遲小此由脾胃素弱因氣寒而收聚水穀不能克化變而