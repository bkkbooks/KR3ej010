body:
  text: 卷第十七寒熱瘧瘴凡二十二門痰實第一巢氏病源小兒痰候痰者水飲停積胸膈之間結聚痰也小兒飲乳因冷熱不調停積胸膈之間結聚成痰痰多則令兒飲乳不下吐涎沫變結而微壯熱也痰實壯熱不止則發驚癇千金治小兒痰實結聚宿癖羸露不能飲食真珠丸方真珠半兩麥門冬去心一兩蕤仁去皮二百枚巴豆去皮膜四十粒上四味末之蜜丸期歲兒服二丸如小豆大二百日兒服如麻子二丸漸增以知為度當下病赤黃白黑葵汁縱下勿絶藥病盡下自止久服使小兒肥白以試驗千金治八歲以上兒熱結痰實不能食自下方芍藥梔子知母大黃各二兩柴胡二兩六銖升麻黃連黃芩各二兩半竹葉切一升半桔梗一兩半細辛十五銖上十一味㕮咀以水六升煮取一升八合去滓分四服十歲兒為三服外臺有枳實杏仁各一兩半而無桔梗黃連千金治十五以下兒熱結多痰食欲減自下方大黃柴胡黃芩各三兩枳實麩炒一兩十八銖升麻芍藥知母梔子各二兩半生薑十八銖杏仁湯浸去皮尖二兩竹葉切一升半上十一味㕮咀以水六升半煮取二升十歲至十五歲者分三服經驗後方治大人小兒痰實久患風癇纏喉風咳嗽遍身風疹急中涎潮等此藥不大吐逆只出涎水方瓜蒂不限多少上細碾為末壯年一字十五以下氣怯小兒半字早晨井華水下一食須含沙糖一塊良久涎如水出年深涎盡有一塊如涎布水上如鑑矣涎盡食粥一二日如吐多困甚即咽麝香湯一盞即止矣麝細研溫水調下昔大平尚書覺昏眩即服之取涎有效聖惠治小兒痰實壯熱心胸壅悶不欲乳食前胡散方前胡半兩去蘆頭枳殼麩炒微黃去瓤赤茯苓川大黃銼碎微炒甘草炙微赤銼各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服日三四服更量兒大小加減服之聖惠治小兒痰氣結實煩壅半夏散方半夏湯洗七遍去滑川大黃銼碎微炒甘草炙微赤銼各一分前胡半兩去蘆頭川朴硝一兩上件藥搗粗羅為散每服一錢以水一小盞入生薑少許煎至五分去滓溫服日三四服量兒大小以意加減聖惠治小兒痰壅結實時欲嘔吐陳橘皮散方陳橘皮湯浸去白瓤焙桑根白皮銼麥門冬去心焙各半兩川大黃銼碎微炒前胡去蘆頭川升麻各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服更量兒大小以意加減聖惠治小兒五六歲痰實不散宜服此方前胡去蘆頭川大黃銼碎微炒枳殼麩炒微黃去瓤甘草炙微赤銼各一分川朴硝一兩上件藥搗粗羅為散每服一錢以水一中盞入生薑蓮子大煎至六分去滓量兒大小分減溫服聖惠治小兒痰實壅悶時復嘔吐不欲乳食赤茯苓散方赤茯苓川朴硝各半兩甘草炙微赤銼陳橘皮湯浸去白瓤焙旋覆花一分上件藥搗粗羅為散每服二錢以水一小盞入生薑如蓮子大煎五分去滓量兒大小分減溫服聖惠治小兒痰實心胸不利多欲嘔吐前胡散方前胡去蘆頭半兩貝母煨令黃白朮桑根白皮銼人參去蘆頭各一分陳橘皮半分湯浸去白瓤焙上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小加減服之聖惠治小兒痰實往來寒熱不欲飲食肌體羸瘦芒硝丸方川芒硝川大黃銼碎微炒代赭石各半兩半夏湯浸七遍去滑甘遂微炒各一分杏仁十粒湯浸去皮尖雙仁麩炒微黃上件藥搗羅為末煉蜜和丸如緑豆大空心以溫水下兩丸量大小加減與服之靈苑治小兒痰實結滯時發寒熱胸中涎壅及哮呷喘急煩躁不得睡眠犀角丸方犀角一錢醋末白朮桔梗陳橘皮各一錢金銀箔各用三片以水銀一錢結成砂子巴豆三粒去皮以棗子一個裹之燒令香熟只取巴豆細研上件七味同研令勻以煉蜜為丸如小豆大每服一丸至二丸用薄荷水研下量兒大小臨時加減丸數嬰孺治小兒膈上有痰飲瘧候方常山五分知母四分松蘿甘草炙各三分上水一升浸一宿煮五沸去滓空心服三合當出痰為度張渙香橘皮丹消小兒宿食痰滯陳橘皮去白焙乾木香各一兩白朮炮草豆蔻麵裹微炮牽牛子薑黃各半兩上件搗羅為細末滴水和丸如黍米大每服十粒煎蔥白湯下大小便澀或不通即乳食前服之張渙枳殼湯治小兒痰實壯熱不除枳殼麩炒去瓤半夏湯洗七遍焙乾木香前胡各一兩乾薑甘草炙各半兩上件搗羅為細末每服一錢水一小盞入生薑三片陳橘皮少許同煎至六分去滓放溫服張渙前胡半夏丹治小兒痰實壯熱前胡半夏各一兩湯洗七遍焙乾川朴硝麥門冬去心大黃炮各半兩上件搗羅為細末取生薑汁和丸如黍米大每服十粒煎人參湯下張渙神麯湯治小兒痰實神麯微炒薑黃木香半夏用生薑八兩切作片子同搗成膏慢火焙炙令黃各一兩甘草炙青橘皮炒黃白茯苓各半兩上件搗羅為細末每服半錢入鹽少許沸湯點放溫熱服張渙白金丹消小兒痰實利胸膈前胡桑白皮銼半夏湯泡七遍白朮炮各一兩人參去蘆頭陳橘皮各半兩甘遂一分微炒上件搗羅為細末煉蜜和丸如黍米同大溫水下五粒至七粒周晬小兒並二三歲只可服三粒以上臨時加減保生信效方逍遙丸治膈實氣痞痰盛喘促半夏湯浸洗七次焙二兩枳實去瓤麩炒檳榔銼赤茯苓去粗皮各一兩上同為細末生薑自然汁煮麵糊和丸如緑豆大每服二三十丸荊芥湯送下別作小丸與小兒吳氏家傳治大人小兒風壅咽喉不利痰實煩渴困倦頭昏或發潮熱及一切風痰瘡疥並宜服之龍腦薄荷葉去沙土用十兩栝蔞根生用一兩荊芥穗生用四兩甘草生用五兩一分縮砂仁生用三兩上件為細末每四兩藥末入炒鹽末一兩研勻以瓷器盛貯每服一錢如茶點吃吉氏家傳治小兒生百日以來痰實柴胡半分當歸大黃各二銖甘草炙茯苓各三錢上水四合煎取一合去滓分兩日與服吉氏家傳又方黃連人參朴硝各三銖上以水二大合煎半合三次與服吉氏家傳小兒二歲痰實方白檳榔一枚青木香半分大黃一分茯苓二分上以水五大合煎二合去滓服二次吉氏家傳又方黃連黃芩生薑各二分上以水五合煎三合去滓服盡吉氏家傳治四五歲兒痰實大黃人參各一分厚朴甘草各半分朴硝二銖湯化上以水五大合煎二合去滓下朴硝一日服之吉氏家傳治六歲兒痰實半夏洗七次草果子各二枚朴硝二銖生薑二塊各如杏仁大上末以水六合煎三合去滓下朴硝空心日二服吉氏家傳治七八歲兒痰實黃芩前胡各一分黃連三分山梔子七個上末以水九合煎五合服長沙醫者丁時發傳黑散子治小兒涎壅咳嗽吐逆天南星半夏豬牙皂角巴豆白礬上件等分入瓦罐子用火煅存性每用半錢齏汁調下或麥門冬桑白皮湯入蜜下長沙醫者鄭愈傳治小兒咽喉涎鳴如鋸兼傷寒身熱面赤一切涎等壞涎丸方半夏二錢研以生薑自然汁搜作餅子用慢火炙黃干粉霜鉛白霜巴豆霜雄黃蠍梢各半錢上各為末再研令勻稀曲糊為丸如此大取涎每服五丸用燈心湯化破如涎未下再用燈心湯投下即吐如取涎連三服即瀉補之寒熱往來第二巢氏病源小兒寒熱往來候風邪外客於皮膚而內痰飲漬於臟腑致令血氣不和陰陽更相乘克陽勝則熱陰勝則寒陰陽之氣為邪所乘邪與正相干陰陽交爭時發時止則寒熱往來也張渙論小兒內有痰飲漬於臟腑因外感風邪與正氣相干則成寒熱往來之病甚者已漸羸瘦又痰實壯熱不除者變成驚癇又夏傷於暑者至秋成瘧嬰童寶鑑小兒寒熱往來歌邪入皮膚里遠歸臟腑巡陰陽多鬥爭寒熱往來頻千金治小兒卒寒熱不佳不能服藥莽草湯浴方莽草丹參桂心各三兩菖蒲半斤蛇床子二兩雷丸一升上六味㕮咀以水二斗煮三五沸適寒溫以浴兒避目及陰千金治小兒忽寒熱雷丸湯浴方雷丸二十枚大黃四兩苦參石膏各三兩黃芩一兩丹參二兩上六味㕮咀以水二斗煮取一斗半浴兒避目及陰浴訖以粉粉之勿厚衣一宿復浴千金治小兒生一月至五月乍寒乍熱方上細切柳枝煮取汁洗兒若渴絞冬瓜汁服之仙人水鑑孩子百日內忽有寒熱何以治之與冷藥吃即乳寒嘔逆若熱藥治之其病加甚無神法聖術因循喪兒之命博覽石室祕方用之應妙桃花蔭末一錢余甘草充湯力更殊藍花只消一兩字陰乾灌之入口立消除上三味為末每服半錢湯調灌之傷寒類要療小兒寒熱及熱氣中人上用豬後蹄燒灰研末以乳汁調一撮服之效聖惠治小兒寒熱往來面色痿黃柴胡散方柴胡半兩去苗石膏一兩川大黃銼碎微炒麻黃去根節秦艽去苗常山各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服日三服量兒大小以意加減太醫局小柴胡湯治大人小兒傷寒溫熱病身熱惡風頸項強急胸滿脅痛嘔噦煩渴寒熱往來身面皆黃小便不利大便祕硬或過經未解或潮熱不除及瘥後勞復發熱頭痛婦人傷風頭痛煩熱經血適斷寒熱如瘧發作有時及産後傷風頭痛煩熱並宜服之柴胡去蘆頭稱半斤黃芩人參去蘆頭稱甘草炙各三兩半夏湯洗七次焙乾稱二兩半上五味同為粗末每服三大錢以水一盞半入生薑五片棗一個掰破同煎至七分濾去滓稍熱服不計時服小兒分作二服更量大小加減張渙秦艽湯方治小兒寒熱往來病秦艽去苗鱉甲醋炙微黃去裙襴各一兩川大黃銼碎微炒麻黃去根節各半兩竹茹甘草炙各一分上件搗羅為粗散每服一錢水一盞入蔥白二寸同煎至五分去滓溫服量兒大小加減張渙又方人參前胡散人參去蘆頭前胡柴胡去苗各一兩桔梗地骨皮甘草炙半夏湯洗七遍焙乾各半兩上件搗羅為細末每服一大錢水一小盞入生薑二片煎至半盞去滓放溫服量兒大小加減張渙又方芍藥湯赤芍藥一兩黃芩當歸銼焙乾柴胡各半兩肉桂甘草炙各一分上件搗羅為細末每服一錢水八分一盞入生薑二片棗一枚同煎至五分去滓溫服量兒大小加減莊氏家傳療少小卒寒熱不佳不能服藥李葉浴兒方上用李葉不拘多少煮湯又白芷又苦參王氏手集柴胡人參湯治小兒脾熱生風往來寒熱柴胡人參芍藥茯苓甘草炙上等分每服二錢水一盞入生薑三片煎至四分溫服寒熱五臟煩滿第三巢氏病源小兒往來五臟煩滿候風邪外客於皮膚而內痰飲漬於腑臟致令血氣不和陰陽交爭故寒熱往來而熱乘五臟氣漬不泄故寒熱往來而五臟煩滿玉訣小兒寒熱虛積候歌頻頻發熱藏中圖有積因傷未退除頰赤口瘡多躁渴痰生不食胃還虛此患先調氣次取虛積下涎後補虛即安也玉訣又寒熱虛積候云此候先調氣次解虛熱有熱不去下真珠丸取方在後玉訣真珠丸治小兒寒熱虛積五臟煩滿及下風涎積滯驚食疳積南星半夏滑石各末二錢輕粉四錢匕巴豆二七粒去心油上末之麵糊丸芥子大每服十五二十丸煎蔥湯吞下寒熱腹痛第四巢氏病源小兒寒熱往來腹痛候風邪外客於皮膚而內痰飲漬於腑臟血氣不和則陰陽交爭故寒熱往來而臟虛本挾宿寒邪入於臟與寒相搏而擊於臟氣故寒熱往來而復痛也千金治小兒寒熱進退啼呼腹痛生地黃湯方生地黃桂心各二兩上㕮咀以水三升煮取一升期歲以下服二合以上三合聖惠治小兒寒熱往來啼呼腹痛宜服赤芍藥散方赤芍藥當歸銼碎微炒寒水石甘草炙微赤銼黃芩各半兩桂心一兩上件藥搗粗羅為散每服一錢以水一小盞入生地黃半分煎至五分去滓不計時候溫服量兒大小加減服之聖惠治小兒脅下有氣塊腹痛喘逆氣息難為往來寒熱羸瘦不食馬通粟丸方馬通內粟細辛紫菀洗去苗土杏仁湯浸去皮尖雙仁麩炒微黃各三分石膏五味子秦