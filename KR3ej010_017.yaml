小計可得下合數與之藥無毒下疹疹未盡更合若堅實多者加黃芩細辛一兩大效嬰孺治小兒瘧經時不斷斷已復發脅下有痞堅如手者方芫花炒硃砂各二分上為末蜜丸二百日兒黍米大丸日二不知稍加之嬰孺治少小瘧有痞堅滿癖疾除熱下氣知母丸方知母甘草炙常山各一兩麻黃二兩去節上為末用蜜和丸如小豆大一服五丸日進三服比至欲發三服畢非發日亦可服若加大黃一兩能治骨間熱臥不安瘧後頭面浮腫第二十二聖惠治小兒瘧發後肚脹兼頭面浮腫宜服防葵散方防葵柴胡去苗川大黃銼碎微炒桑根白皮銼各用半兩嬰孺各用一分甘草一分炙微赤銼上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服日三服量兒大小加減服之嬰孺方云忌菘菜油膩生冷黏滑物乳母同忌
