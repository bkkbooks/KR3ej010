化下疹痘論滑石散方滑石甘草炙各半兩上件為末每服一錢半雞子清酒少許調下疹痘論脫齒散方上以人牙齒脫落者不拘多少於瓷瓶內固濟大火煅令通赤候冷取出為末用薄荷酒調下半錢良久脈平和毒氣散瘡如粟米疹痘論小兒瘟毒痘瘡不出方生地黃四兩淡豆豉四兩上以豬脂一斤和勻露一宿煎至六分候冷三分減去一分去滓下雄黃末一錢麝香半錢攪勻量大小飲若太多反有所損活人書活血散治疹子或出不快上用白芍藥末一錢酒調如欲止痛只用溫熱水調下九籥衛生紫金散療小兒瘡疹不快倒黶紫草蛇蛻皮炒焦牛李子炒各半兩上同為粗末每服一錢水七分煎至四五分去滓溫服九籥衛生如聖散療小兒斑瘡不快欲倒黶黑凹者上用赤芍藥不以多少杵為細末每服半錢煎葡萄酒冷調下張銳雞峰方治小兒斑瘡出不快上用開花蘿蔔煎汁時時與飲之張銳雞峰方治瘡疹熏發不快咽喉不利方見瘡疹攻咽痛門中錢乙附方消毒散同董汲紫草散治小兒伏熱熱在胃經暴發痘疱瘡疹一切惡候出不快小便赤澀心腹脹滿方見瘡疹倒黶門錢乙四聖散同玉訣酒調散治發瘡疹不出牛蒡子五錢炒紫草麻黃去節各五錢臭椿子去皮為末一錢當門子五粒末一字上以溫酒調下一字半錢三十六種內瘡子候有紫草湯麻黃去節人參各一分杏仁七粒去皮上為粗末都用水二盞煎至一盞去滓卻分為三四服溫下分作二日服未可用諸藥劉氏家傳小兒發斑瘡大蟬蛻二十一個去足洗甘草一錢半上用水半碗煎至一盞旋於服盡效已用驗莊氏家傳治小兒痘瘡出不快並傷寒不語干野人糞炭火煅為灰腦麝各少許上為末每服一二錢新蜜水調下王氏手集透肌散治臟腑蘊熱毒氣熏發肌肉身生疹痘喉舌生瘡毒氣未快懊悶氣喘煩渴多睡精神昏塞方見已發未發門中活人書化毒湯同王氏手集治小兒斑瘡不發方上以乳香研細用豬心血為丸櫻桃大水磨下一丸吳氏家傳小兒瘡疹不透上旋取豬心血調麝香少許兩手心中塗之並塗些小口唇上即出極妙趙氏家傳至聖木星飲子治小兒瘡子不出及不快方硃砂一分鬱金半兩上為細末每用一字或二字量兒大小入龍腦少許以新汲水茶腳少許同調勻然後刺獖豬尾血滴三點子入藥汁中令服不過一二時辰瘡子出便紅活兒無他病神妙長沙醫者鄭愈傳治麻痘不快紫草膏方紫草白附子各一錢麻黃去節甘草炙各二錢全蠍十個殭蠶炒二個上件為末用蜜一兩酒半盞入紫草煎數沸後令旋施同和前藥丸如皂角子大每服一粒用紫草湯化下續用黃耆散調治方見瘡疹後解餘毒門中瘡疹倒黶第七靈苑治時疾發豌豆及赤瘡子未透心煩狂躁氣喘妄語或見鬼神龍腦子方上用龍腦一錢細研旋滴豬心血和丸如雞頭肉大每服一丸紫草湯化下少時心神便定得睡瘡疹發透依常將息取安也活人書既與此方同又與雞峰方錢乙方同仍於小豬尾尖取血三五點研入生腦子少許新水調下名豬尾膏錢乙附方用豬心血和腦子用新汲水化下未省以溫酒化下譚氏殊聖治小兒瘡疹毒氣不散出不快及觸犯黑色奪命膏方上用黑熟牛李子七日八日內採於盆內研汁生絹裂去滓用銀器盛慢火熬成膏瓷器內收常令透風每服一皂大煎杏膠化下如人行二十里更進一服其瘡疹自然紅色毒氣慢此藥神妙不可說一切瘡疹出不快並可服錢乙方同名牛李膏又名必勝膏云至秋結實黑丸成穗或無生者市肆中買乾者為末水熬代用董汲治小兒瘡疹痘疱惡候見於皮膚下不出或出而不長及黑紫內陷亦用此藥仍云汲小年病此危惡殆極父母不忍視遇錢乙下此藥得安因懇求得真方遂傳於世惟於收時不知早晚故無全效今並收時載之九日後收取研濾成膏每膏二兩研入好麝香半錢收貯不津器中九籥衛生方同但用桃膠半兩牛李子一兩炒為粗末每服一錢水七分煎至四五分去滓溫服治療亦同錢乙百祥丸治瘡疹倒黶黑陷一名南陽丸上用紅牙大戟不以多少陰乾漿水煮軟去骨日中曝乾復內汁中煮汁盡焙乾為末水丸如粟米大每服一二十丸研赤脂麻湯下吐利止無時錢乙又方藍根散板藍根一兩甘草銼炒三分上同為細末每服半錢或一錢取雄雞冠血三二點同溫酒少許食後同調下此二方若無此證勿服錢乙附方治瘡疹出不快及倒黶四聖散紫草茸木通銼枳殼麩炒去瓤秤黃耆切焙各等分上同為粗末每服一錢水一中盞煎至八分溫服無時錢乙附方治瘡疹倒黶黑陷上用人牙燒存性研入麝香少許每服三錢溫酒少許調下無時張渙神通散治瘡疹毒氣少大小便利倒伏不出生乾地黃炒乾地龍緊確者去土微炒各一兩以上搗羅為細末次用好硃砂一兩細研水飛上件同拌勻每服一字煎胡荽酒少許同溫湯調下張渙山梔湯方治麩疹及斑毒狀如蚊蚤所齧若毒盛色黑者兼宜服後方宣毒膏山梔子仁白蘚皮赤芍藥川升麻各一兩寒水石甘草炙各半兩上件搗羅為細末每服一錢水八分一盞入紫草薄荷各少許煎五分去滓放溫服張渙宣毒膏方治毒氣盛瘡疹已出不快倒黶急服此藥曾經大效獖豬臘八日取尾後一刺血一升先用新泥盆盛好硃砂細研水飛揀乳香細研各一兩甘草末馬牙硝各半兩腦麝各細研一分上件一處同豬血拌調細勻用一寬舊竹筒一個底留一節都入諸藥在筒內用蜜紙數重系垂於大糞坑屋梁上至清明日取出曝乾更入腦麝各一錢研細勻滴水和丸如皂大煎人參湯化下若毒盛瘡黑倒黶服之者瘡疹紅活再長神妙疹痘論化毒散方鬱金一枚甘草炙一分上用水半碗同煎令水乾去甘草將鬱金切作片子令乾為末入生腦子半錢研令勻用生豬血研成稀膏子煎薄荷湯化下一錢不過二服其毒氣從手足心出乃瘥此五死一生之候若便血瘡壞無膿者十死不治一法可用蟬蛻末半錢好腦子一皂子大豬心血三皂子大和作膏子用熱酒浸紫草令溫化下服移時身上發大熱瘡毒頓出然後依證調治良方療瘡疹欲發及已發而陷伏者皆宜速治不爾毒入臟必致困宜服此與靈苑有加減上取臘月豬血瓶盛掛風中令乾用半棗大加龍腦大豆許溫酒調下沈醫加綠豆英粉半棗大同研病微者即消甚則瘡發愈余家小女子病傷寒但腹痛甚晝夜號呼手足厥冷數日漸加昏困形證極惡是時例發瘡子余疑其為醫以藥伏之先不蓄此藥急就屠家買少許生豬血時盛暑血至已敗惡無可奈何多以龍腦香和灌之一服遂得少睡須臾一身皆瘡點然遂安不爾幾至不救活人書無比散治瘡疹惡候不快及黑瘡子應一切惡候硃砂一兩先研如粉牛黃腦麝膩粉各一分研細上同研細如有患者小兒一字大人半錢水銀少許同小獖豬尾上血三二滴新汲水少許調服先寧穩得睡然後取轉下如爛魚腸葡萄穗之類臭涎惡物便安小兒用奶汁滴尤妙九籥衛生倍金散療小兒瘡疹倒黶黑色窮賊子炒二兩神麯炒半兩減杖花山果子和核各一兩上同為粗末每服一錢水八分入荊芥七穗紫草十根煎至四分去滓溫服聚寶方定命硃砂散治小兒瘡子毒氣不出或出後乾黑色服此藥發出毒氣瘡子細紅而出硃砂半兩生龍腦滴乳香馬牙硝四味各研甘草為末各一錢上五味研勻用十二月新獖豬血半升同研勻取青竹筒長二尺留兩頭節開一頭作竅子注藥在內黃蠟塞定以油絹緊裹封勿令透氣埋地坑中至一百五日取出水洗掛風中四十九日劈開取藥研為細末每服半錢新水調下聚寶方抵聖丸治小兒斑瘡不出反入方上取十二月老鴉左翅不計多少風中令乾辰日燒為灰用中等獖豬嘴上刺血為丸如雞頭大每服一丸取獖豬尾上血少許溫水同化下未效三二時間更一服董汲救生散治小兒瘡疹膿疱惡候危困陷下黑色方獖豬血臘月內以新泥罐子內盛掛於屋東山陰乾取末馬牙硝研各一兩硼砂硃砂牛黃腦麝各一錢上同研極細每二歲兒取一錢新汲水調下大便下惡物瘡庖紅色為度不過再服神驗無比董汲玳瑁散治小兒瘡疹熱毒內攻紫黑色出不快方上用生玳瑁水磨濃汁取一合獖豬心一個取中血一皂子大同研以紫草濃煎湯調都作一服張氏家傳胃愛散調理小兒脾虛吐瀉如斑瘡不出醫人不識形候便將冷藥冰卻瘡子致令內伏不出將此胃愛散調理如身體汗即不用控心散發也如無汗出即用控心散發之後下羌活散與胃愛散羌活散控心散方見瘡疹已出未出門中糯米一兩干淡木瓜三分甘草一分丁香二十五粒以上四味一處同炒焦黃為度藿香菜紫蘇葉各一分上件藥同一處令乾碾為細末每服一錢半錢煎粟米棗子湯調下張氏家傳脫殼散上以雞抱出殼子於新瓦上焙乾去膜取殼搗研如粉遇小兒斑瘡倒攧不出或臟腑糞血糞黑頭瘡昏睡不醒用酒調一字塗兒唇上令兒舐或以酒調塗風池背上心前此名脫殼散或熱湯調一字吃之張氏家傳又方化斑散石膏火煅或用濕紙裹炮令透為末或用泥團燒之取出去火毒為細末知母片切焙乾為細末上對等分用熟水調一字服之或調塗唇上去頭疼除昏發泄瘡子此名高母化斑散治小兒斑瘡此二方極妙然後方恐太涼張氏家傳紫草湯治小兒疹痘欲黑方見瘡疹出不快門中養生必用方同莊氏家傳小兒瘡疹倒攧不出者人齒一枚燒灰研細赤小豆七粒為末上同作一服薄荷溫酒調下莊氏家傳小兒斑瘡倒攧並黑色者謂之鬼瘡子上用人齒不拘多少炭火燒灰研細獖豬尾血調下二錢移時再服莊氏家傳又方赤馬糞乾者白礬各一兩上入甘鍋子內以礬在下用泥固濟牢固用炭火三斤煅以火盡為度候冷取出細研入腦麝各一字再研勻十歲以下半錢匕十歲以上一錢匕芫荽酒調下更看疾勢加減莊氏家傳治瘡子倒黶方上用臘月中大糞燒灰為末入生龍腦少許細研每服半錢新汲水下王氏手集治痘瘡倒黶不出方牛蒡子半兩炒紫草一分上為末每服一錢入麝香少許溫酒調下不過三服立愈王氏手集治大人小兒瘡子倒搐方白花蛇連骨一兩慢火炙令乾勿焦大丁香二十一粒上為末大人每服一大錢小兒半錢以水解淡酒調下如黑搐者服之移時重紅生如聖王氏手集治瘡子倒黶方上用橄欖子核中截斷水磨少許服立發趙氏家傳麻黃湯治斑瘡倒黶上用麻黃三十寸去節蜜拌炒令香紫色為度水一盞煎六分服余得此方後往知滾州仙源縣值工筆李用之子斑瘡倒黶已至危困投此藥一服瘡子便出其應如神未至胃爛便血者皆可治長沙醫者鄭愈治瘡子倒黶上用濕生蟲不計多少焙乾為末酒調下一字瘡疹太盛第八煩喘躁渴附活人書犀角地黃湯治傷寒及溫病應發汗而不發汗內有瘀血者及鼻衄吐血不盡內有餘瘀血面黃大便黑者此方主消化瘀血兼治瘡疹出得太盛以此方解之犀角屑一兩如無以升麻代之生地黃半斤芍藥三分牡丹去心一兩上銼如麻豆大每服五錢匕水一盞半煮取一盞有熱如狂者加黃芩二兩其人脈大來遲腹不滿自言滿者為無熱不用黃芩疹痘論甘草散方若瘡未出及雖出燥渴者宜服上用大甘草不以多少炙過為細末每服一錢或二錢水一盞煎至六分去滓不計時候呷之以少解利熱毒即住若瘡出遲當服紫草飲子方見瘡疹初出門與聖惠同大人當針兩腕硯子骨間男左女右取之或灸一壯亦助發出疹痘毒氣已發不必用之疹痘論瘡疹若煩喘甚者即用麻黃湯主之方麻黃杏仁桑白皮甘草炙各一分上件為銼散每藥一兩用水七合煎至四分放溫服若脈數有熱未退入竹瀝一半代水煎或咽喉痛並嗽入