卒防風各一兩甘草半兩上為末水二盞散二錢煎至三五沸淋洗眼立效聖惠治小兒疹痘瘡入眼並無辜氣入眼密蒙花散方密蒙花三兩青葙子一兩決明子車前子各一兩上件藥各搗羅為末每服以密蒙花一錢半諸藥各半錢相合令勻用羊肝一大片切破摻諸藥在肝內以濕紙裹煨令熱空心量力與食之錢乙治小兒痘瘡入眼及無辜氣入眼方同名羊肝散活人書治疹痘瘡並諸毒氣入眼亦名密蒙花散譚氏殊聖治瘡子入眼仙靈脾散仙靈脾威靈仙各等分上件為末每服二錢食後用米飲調下小兒半錢與趙氏家傳方同趙氏名二仙散治斑疹入眼因食毒突睛出外養生必用治目暴赤腫痛小兒斑瘡入眼方苘子炒香蔓菁子絹袋盛飯上蒸熟取出焙乾炒令香甘草炙木賊去節各等分上為末沸湯點一錢食後服日三養生必用治小兒斑瘡入眼方穀精草蛤粉等分上為末每服一錢豬肝二兩來批開摻藥在內捲了青竹葉裹麻縷扎定水一碗煮令熟入收於瓷瓶內熏眼候溫取食日作不過十日退活人書治小兒瘡子入眼方同名蛤粉散錢乙蟬蛻散治斑瘡入眼半年以里者一月取效蟬殼去土取末一兩豬懸蹄甲二兩罐子內鹽泥固濟燒存性上二味研入羚羊角細末一分拌勻每服一字百日外兒半錢三歲以上一二錢溫水或新水調下日三四夜一二食後服一年以外難治錢乙附方治瘡疹太盛宜服此調肝散令不入眼方見已出未出門中聖惠犀角飲子同錢乙附方治瘡疹入眼馬屁勃蛇皮各半兩皂角子十四個上入小罐子內鹽泥固濟燒存性研細溫酒調下一二錢食後服董汲方同名蛇蛻散錢乙又方治瘡疹入眼成翳栝蔞根半兩蛇皮二錢上同為細末用羊子肝一個批開入藥末二錢麻纏定米泔煮食頻與食之未能食肝與乳母多食董汲方同名真珠散仍云少小未能食即羊肝令熟研和為丸如黃米大以米泔下十丸或乳上與亦可日三服錢乙又方上用蟬殼末水煎羊子肝湯調服二三錢凡痘瘡才欲著痂即用酥或面油不住潤之可揭即揭去若不潤及遲揭瘡痂硬即隱成瘢痕張渙決明丹方治疹痘瘡後毒氣入眼決明子密蒙花各一兩青葙子車前子川黃連去須羚羊角屑者半兩上件搗羅為細末煮羊肝一具切破同諸藥搗一二百下如黍米大每服十粒荊芥湯下乳食後量兒大小加減張渙護目膏方截斑毒入眼黃柏蜜炙綠豆紅藍花各一兩甘草半兩生用上件搗羅為細末研勻用好脂麻油調如薄膏從耳前眼眥外塗之時時用惠濟論威靈散治小兒斑瘡雀目眼生翳障遮瞞威靈仙仙靈脾甘草炙茯苓子芩青葙子大青芍藥大黃蒸上等分為細末每服半錢或一錢獖豬膽二個批開摻藥末在內麻皮纏米泔煮熟放冷吃良方治小兒豌豆瘡入目痛楚恐傷目上用浮萍陰乾每服一二錢隨兒大小以羊子肝半個入盞子內以杖子刺傷爛投水半合絞取肝汁調下食後服不甚者一服瘥已傷目者十服瘥邢州杜醫用此藥前後效者甚多疹痘論蕤仁散方蕤仁去灰炙黃芩梔子仁黃連黃柏皮川升麻甘草炙各一兩上為細末每服二錢用水一盞煎至六分去滓食後溫服量兒大小如生翳障重者兼密蒙花散疹痘論密蒙花散方密蒙花三兩別為末井泉石青葙子決明子車前子各一兩上為細末密蒙花散半錢末與蕤仁散半錢相和合羊肝一片切破摻藥末在肝內濕紙裹火煨令熟空心量力食翳膜退即止服活人書決明散治疹痘瘡入眼方決明子赤芍藥甘草炙各一分栝蔞根半兩上搗羅為末每服半錢蜜水調下逐日三服活人書撥雲散治疹痘瘡入眼及生翳方上用桑螵蛸真者一兩炙令焦細研搗羅為細末入麝香少許令勻每服一錢生米泔調下臨臥服活人書通聖散治疹痘瘡入眼及生翳方白菊花如無只甘菊花代之然不如白菊綠豆皮穀精草去根各一兩上搗羅為細末每服用一大錢乾柿一個生粟米泔一盞共一處煎候米泔盡只將乾柿去核與食之不拘時候一日可吃三枚日淺者五七日可效遠者半月餘聚寶方泉石散治小兒風熱攻眼及斑瘡入眼井泉石先為末再研水飛蟬殼蛇皮甘草三味炙以上各一兩上四味為末每服半錢至一錢蜜水調下忌油膩劉氏家傳小兒目中痘瘡成翳方大黃炒為細末挑二錢水銀半錢上用男人津唾化水銀為泥次入大黃末方入冷水調塗腮上如干時用水濕之極效劉氏家傳治眼昏澀赤脈侵睛淚多或作翳障羚羊角丸方羚羊角屑黃芩大黃芥菜子各二錢半當歸元參甘草炙木賊蟬殼去足珍珠末決明子炒各半兩荊芥穗川白芷蒼朮用米泔汁浸一宿焙乾各二兩羌活一兩上件為末煉蜜為丸如蟬子大每服一丸食後用荊芥湯嚼下小兒斑瘡眼看兒大小加減用蟬殼湯化下食後服張氏家傳治孩子痘瘡入眼蕤仁桃仁杏仁各七個皮尖次入膩粉龍腦硇砂牙硝各一錢研極細上用白砂蜜調末炙三次收之每用一粟米點立效張氏家傳治小兒麩痘瘡入眼昏暗翳膜遮障金花散黃連去須菊花枸杞子各一兩牛蒡子煅炒半兩甘草三分炙上件搗羅為末每服一錢薄荷湯調下不計時候服張氏家傳治小兒斑瘡入眼黃連菊花密蒙花各半兩蛇皮一條燒灰存性甘草炙一分上件為散煉蜜丸如綠豆大冷綠豆湯下五丸十丸加減用張氏家傳治小兒斑瘡入眼蛇蛻散蛇蛻皮馬屁勃皂角不蚛者穀精草上四味各秤等分同入瓦藏瓶內用鹽泥固濟木炭燒令通赤出於地坑子內出火毒候冷取出細研為末每服一字溫米泔調下莊氏家傳樺皮散治小兒斑瘡入眼及裹黑睛樺皮頭髮蛇蛻各半兩上細銼淨器內點火燒之候煙盡研細每服半錢煎黑豆湯入酒三滴調下日五服莊氏家傳又方上用蠶沙燒灰為末每服一錢以米泔研生綠豆七粒調下每夜一服病去即止莊氏家傳斑瘡入眼方上用黃芩為末臘月內黃牛膽內就吊於北陰中旋丸綠豆大曲湯下五丸只一服退隔年者三服至五服三年外者不醫王氏手集小兒瘡疹入眼方地骨皮鹽豉等分於新瓦上焦上為末每服一錢陳粟飲調下日三服神妙善化陶宰治小兒斑瘡入眼上用一鱔魚以針刺血貯器內點入眼即愈甚佳長沙醫者丁時發傳治斑瘡入眼方斑瘡入眼莫尋常熱氣流來到此方鶴頂一膏能取效時間病退號醫王黃芩散謂塗藥如鶴頂黃芩山梔子黃丹各等分上件為末用牛蒡子葉杵汁調塗在頂門長沙醫者丁安中傳治斑瘡翳障眼不見光明宜服蟬蛻散如睛爆破不可醫蟬蛻去土蛇蛻炙川升麻洗蒺藜炒去角黃連炒穀精草大青葉仙靈脾威靈仙井泉石各半兩硃砂研螺粉各一分上為細末每服半錢或一錢蜜水調下大人小兒加減服長沙醫者鄭愈傳治小兒斑瘡入眼甘菊花散方甘菊花穀精草石決明各等分上件為末每服二錢水一盞入乾柿子一個同煎至七分只服乾柿細嚼服聖惠灸法小兒斑瘡入眼灸大杼二穴各一壯項後第一椎下兩傍各一寸半陷者中炷如小麥大瘡疹後解餘毒第十五聖惠治小兒疹痘瘡出盡後宜服大黃散方川大黃銼碎微炒黃芩黑參各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫量兒大小分減服之萬全方同疹痘論若瘡毒出盡後宜服黃芩散以解餘毒方黃芩大黃各半兩山梔子仁三分元參六錢上件為粗末用末一兩水二升煎至八合去滓量大小服嘔吐當先定疹痘論瘡毒出盡服黃芩散以解餘毒嘔吐先定尚口赤有瘡下部亦有瘡自下利者服黃連散方黃連厚朴炙各一兩陳皮杏仁去皮炙枳實麩炒麻黃去節乾葛各半兩上件為銼散每服藥一兩水一升煎至半升量大小與服一日三服下利後別看形候用藥疹痘論瘡疹出後煩喘小便不利者宜進燈心湯主之燈心一把鱉甲醋炙黃秤取二兩上為銼散每服用一兩水八合煎取四合量大小溫服董汲甘露飲方解胃熱及小兒瘡疹已發後餘熱溫壯齒齦宣腫牙痛不能嚼物飢而不欲食煩熱身面黃及病瘡疱乳母俱可服之方見瘡疹攻咽痛門中錢乙方同董汲調肝散敗肝臟邪熱解散斑疹餘毒方見瘡疹已出未出門中聖惠犀角散同劉氏家傳治嬰孩小兒斑瘡餘熱不退槐花散方槐花赤小豆各炒二錢麝香少許研上為細末每服半錢用蜜湯調下不計時候王氏手集治痘疹出欲盡便服之如入眼即自退淨心散方蛇蛻一條燒灰不蚛皂角十挺燒灰甘草生用為末各半兩上研細每服一錢熱水調下小兒半錢王氏手集牛黃生金散解利瘡子虎杖滑石各一兩甘草二錢五分藿香一錢頭高上為細末每服一平錢水八分煎至三分去滓通口服兒大增之吉氏家傳牛蒡散治小兒疹痘不出或用藥發出後餘熱未退發渴飲水乃下血斑疼痛用此藥解方見瘡疹攻咽痛門中錢乙消毒散同此以薄荷湯調下一錢未出者紫草湯長沙醫者鄭愈傳黃耆散方黃耆柴胡乾葛甘草各一錢半上為末每服半錢薄荷三葉湯水五分煎至三分作三呷空心服瘡疹後減瘢痕第十六巢氏病源傷寒發痘瘡後減瘢候傷寒病發瘡者皆是熱毒所為其病折則瘡愈而毒氣尚未全散故瘡痂雖落其瘢猶黶或凹凸肉起所以宜用消毒減瘢之藥以敷之譚氏小兒方療小兒面上瘡痘子瘢上用黃明膠慢火炙為末溫酒調服一錢匕出者服之無瘢未出服之瀉下譚氏小兒方療痘瘡瘢黶上以密陀僧細研水調夜塗之明旦洗去平復矣聖惠治小兒熱毒發疹痘瘡初愈宜塗瘡瘢方蒺藜子豉各一兩梔子仁二兩上件藥搗細羅為散用醋漿水調如泥每夜塗瘡上來日以淡漿水洗之聖惠又方胡粉一兩膩粉一分上件藥相和研令勻入煉了豬脂拌和如膏薄薄塗瘢上每夜塗之至明以漿水洗之聖惠又方鷹糞白一兩衣中白魚二十枚上件藥細研入白蜜調和如稀湯用塗瘡瘢上聖惠又方牡蠣煅為粉三兩土瓜根一兩上件藥搗細羅為散每夜取二錢用白蜜調塗面及瘡瘢明旦以暖漿水洗之聖惠治小兒傷寒熱毒斑瘡疹痘瘡瘥後減瘢膏方馬齒莧自然汁一升煉成豬脂三兩上件藥相和以慢火煎成膏日夜塗瘡瘢上聖惠又方羊𦚠一具用酒一升浸一宿來日攪濾去汁取羊𦚠盡去筋膜牛酥四兩上二味入銀銚子內慢火煎三五沸新綿濾入淨器中盛每夜取塗面上來日用生甘草一兩以漿水二大盞煎七八沸去滓放溫洗面聖惠又方豬𦚠一斤天鼠二枚上二味細切入銚子內煎煉令天鼠焦絞濾取膏日夜摩塗瘡瘢上聖惠又方上用顱鷀糞二兩研如粉以煉了臘月豬脂三合調攪令勻塗於瘡瘢上聖惠又方上用川升麻不計多少細銼用水煎去滓取汁以綿沾汁洗拭瘡瘢上聖惠又方豉一升羊糞一合上件藥相和以水一斗煎十餘沸去滓看冷暖洗浴瘡瘢聖惠又方上用黃柏細銼二兩以水二升煎取一升去滓摩拭瘡瘢上聖惠又方上用赤小豆末一兩以雞子白調如稀餳塗瘡瘢上聖惠又方上用上好白蜜不計多少通身塗瘡痂落無瘢聖惠治小兒疹痘瘡並減瘢痕方上用羊𩩅骨髓一兩煉之入輕粉一分研成白膏於瓷合內盛用塗瘡上減瘢極效張渙青金散方治痘瘡麩疹瘡瘢不省白蒺藜山梔子併為細末青黛研細各半兩膩粉研一分上件一處都細研為末每用少許生油調塗瘡上良方療病豌豆瘡欲無瘢上頻揭去痂勿令隱肌乃不成瘢縱揭傷有微血但以面膏塗即無苦也瘡家不可食雞鴨卵即時盲瞳子如卵白其應如神不可不戒也
