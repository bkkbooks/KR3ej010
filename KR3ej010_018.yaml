body:
  text: 卷第十八斑疹麻痘凡十六門瘡疹論第一聖惠論嬰孩患疹痘瘡子者皆是積熱在於臟腑蒸鬱熱毒散於四肢小兒皮肉嫩弱多成此疾凡食乳嬰孩湯藥不可與童兒同同療則藥過劑必有損也蓋由飲啜熱乳在於臟腑熱極方成此疾腑熱生於細疹臟熱生於痘瘡若用湯藥宜療於乳母也又絕乳嬰孩患者由積熱伏在於脾肺之間而不早以湯藥療於病源養熱行於四肢榮衛之中漸透皮表成疹痘而乃出於膿水也嬰兒之性自然陽盛而陰微也臟腑陰陽氣逆大小便多秘不通也才覺是此疾即可便與疏利即輕患也若疹痘已出即不可疏轉若疹痘出定卻宜利大小腸按扁鵲及倉公論云療於嬰孩服以湯散性有可餌之者不可餌之者宜先和節陰陽調治榮衛方利臟腑即熱氣漸解也凡絕乳嬰孩生於疹痘或未出以前是此疾候按扁鵲論云可先以油劑服之方見瘡疹初出門中行解四肢熱極或疹痘已出不可以油可服平和湯藥療於肝臟解於敗熱慮毒攻肝後衝於眼目生於障翳今睹時醫及疾患之家疹痘未出以前多是誤認疾候皆以他藥解之其間或餌以燥藥或餌以冷藥不無夭傷時醫用藥直候瘡疹子出病家方覺患者住餌醫者拱手已患之後俗多禁餌致大小便不通不能調於湯藥和於臟腑遂停敗熱在於臟腑之間攻於肝臟疹痘才愈致令衝於眼目成於障翳不過醫治瞳人眼目遂損因茲無所見也養生必用論治瘡疹曰陽明主肌肉瘡疹毒氣泄於肌肉始覺必以利藥利之宣其毒也又其始難知蓋與傷寒和類不可不審也小兒身熱耳冷尻冷咳嗽瘡疹候也又一歲之中瘡疹大小相類此疫氣也當作疫氣治之傷寒至陽明經亦用利藥須是未見是瘡疹疑貳之間乃可利及見是瘡疹不可利也錢乙論瘡疹候面燥腮赤目胞亦赤呵欠頓悶乍涼乍熱咳嗽嚏噴手足稍冷夜臥驚悸多睡並瘡疹證此天行之病也惟用溫涼藥治之不可妄下及妄攻發受風冷五臟各有一證肝臟水疱肺臟膿疱心臟斑脾臟疹歸腎變黑惟斑疹病後或發癇余瘡難發癇矣木勝脾木歸心故也若涼驚用涼丸溫驚用粉紅丸方並見一切驚門中錢乙論小兒在胎十月食五臟血穢生下則其毒當出故瘡疹之狀皆五臟之液肝主淚肺主涕心主血脾為裹血其瘡出有五名肝為水疱以淚出如水其色青小肺為膿疱以涕稠濁色白而大心為斑主心血色赤而小次於水疱脾為疹小次斑瘡其主裹血故色亦黃淺也涕淚出多故膿疱水疱皆大血營於內所出不多故斑疹皆小也病疱者涕淚俱少譬胞中容水水去則瘦故也始發潮熱三日以上熱運入皮膚即發瘡疹而不甚多者熱留膚腠之間故也潮熱隨臟出如早食潮熱不已為水疱之類也瘡疹如出之時五臟證見惟腎無候但見平證耳䯌涼耳涼是也䯌耳俱屬於腎其居北方主冷也若瘡黑陷而耳䯌反熱者為逆也若用百祥丸牛李膏各三服不愈者死病也凡瘡疹若出辨視輕重若一發便出盡者必重也瘡夾疹者半輕半重也出稀者輕裡外肥紅者輕外黑裡赤者微重也外白里黑者大重也瘡端里黑點如針孔者勢劇也青乾紫陷昏睡汗出不止煩躁熱渴腹脹啼喘大小便不通者困也凡瘡疹當乳母慎口不可令飢及受風冷必歸腎而變黑難治也有大熱者當利小便有小熱者宜解毒若黑紫干陷者百祥丸下之方見瘡疹倒黶門中不黑者慎勿下更看時月輕重大抵瘡疹屬陽出則為順故春夏病為順秋冬病為逆冬月腎王又盛寒病多歸腎變黑又當辨春膿疱夏黑陷秋斑子冬疹子亦不順也雖重病猶十活四五黑者無問何時十難救一其候或寒戰噤牙或身黃腫紫宜急以百祥丸下之復惡寒不已身冷出汗耳䯌反熱者死病也何以然腎氣大王脾虛不能制故也下後身熱氣溫欲飲水者可治以脾土勝腎寒去而溫熱也治之宜解毒不可妄下妄下則內虛多歸於腎若能食而痂頭焦起或未焦而喘實者可下之身熱煩渴腹脹而喘大小便澀面赤悶亂大吐此當利小便不瘥者宣風散下之方見慢驚風門中若五七日痂不焦是內發熱氣蒸於皮中故瘡不得焦痂也宜宣風散導之用生犀磨汁解之使熱不生必著痂矣瘡疹由內相勝也惟斑疹能作搐疹為脾所生脾虛而肝王乘之木來勝土熱氣相擊動於心神心喜為熱神氣不安因搐成癇斑子為心所主心生熱熱則生風風屬於肝二臟相搏風火相爭故發搐也治之當瀉心肝補其母栝蔞湯主之方見慢驚風門中瘡黑而忽瀉便膿血並痂皮者順水穀不消者逆何以然且瘡黑屬腎脾氣本強或舊服補脾藥脾氣得實腎雖用事脾可制之今瘡入腹為膿血及連痂皮得出是脾強腎退即病出而安也米穀及瀉乳不化者是脾虛不能制腎故自泄也此必難治錢乙論瘡疹標本云睦親宮十太尉病瘡疹眾醫治之王曰疹未出屬何臟腑一醫言胃大熱一醫言傷寒不退一醫言在母腹中有毒錢氏曰若言胃熱何以乍涼乍熱若言母腹中毒發屬何臟也醫曰在脾胃錢曰既在脾胃何以驚悸醫無對錢曰夫胎在腹中月至六七則已成形食母穢液入兒五臟食至十月滿胃管中至生之時口有不潔產母以手拭淨則無疾病俗以黃連汁壓之云下臍糞及涎穢也此亦母之不潔餘氣入兒臟中本先因微寒入而成瘡疹未出五臟皆見病證內一臟受穢多者乃出瘡疹初欲病時先呵欠頓悶驚悸乍涼乍熱手足冷面腮燥赤咳嗽時嚏此五臟證具也呵欠頓悶肝也時發驚悸心也乍涼乍熱手足冷脾也面目腮頰赤嗽嚏肺也惟腎無候以在腑下不能食穢故也凡瘡疹乃五臟毒若出歸一證則肝水疱肺膿疱心斑脾疹惟腎不食毒穢而無諸證瘡黑者屬腎由不慎風冷而不飽內虛也又用抱龍丸數服愈方見風熱門中以其別無他候故未發出則見五臟證已出則歸一臟也錢乙論熱傳瘡疹云四大王宮五太尉因墜鞦韆發驚搐醫以發熱藥治之不愈錢氏曰本急驚後生大熱當先退其熱以大黃丸玉露散惺惺丸加以牛黃龍麝解之不愈至三日肌膚尚熱錢曰更二日不愈必發斑瘡蓋熱不能出也他醫初用藥發散發散入表表熱即斑生本初驚時當用利驚藥下之今發散乃逆也後二日果斑出以必勝膏治之方見瘡疹倒黶門中七日愈錢乙論瘡疹有誤云睦親宅一大王病瘡疹始用一李醫又召錢氏錢留抱龍丸三服李以藥下之其疹稠密錢見大驚曰若非轉下則為逆病王言李已用藥下之錢曰瘡疹始出未有他證不可下也但當用平和藥頻與乳食不受風冷可也如瘡疹三日不出或出不快即微發之微發不出即加藥不出即大發之如大發後不多及脈平無證者即瘡本稀不可更發也有大熱者當利小便小熱者當解毒若出快勿發勿下故止用抱龍丸治之方見同前瘡痂若起能食者大黃丸下之方未見一二行即止今先下一日瘡疹未能出盡而稠密甚則難治此誤也縱得安其病有三一者疥二者癰三者目赤李不能治經三日黑陷復召錢氏曰幸不發寒而病未困也遂用百祥丸為藥方見同前以牛李膏為助方見瘡疹倒黶門中各一大服至五日間瘡復紅活七日而愈蓋黑者歸腎也腎王勝脾土不剋水故脾虛寒戰則難治所用百祥丸者以瀉膀胱之腑腑若不實臟自不盛也何以不瀉腎曰腎主虛不受瀉若二服不效即加寒而死錢乙論傷寒瘡疹同異云傷寒男體重面黃女面赤喘急增寒各口中氣熱呵欠頓悶項急也瘡疹則腮赤燥多噴嚏悸動昏倦四肢冷傷寒常發散之治瘡疹行溫平有大熱者解毒余見前說錢乙附方論小兒耳冷䯌冷手足乍冷乍熱面赤時嗽時嚏驚悸此瘡疹欲發也未能辨認間服升麻葛根湯方見單傷寒門中消毒散方見瘡疹攻咽痛門已發未發皆宜服仍用胡荽酒方見瘡疹初出門黃柏膏見瘡疹護面目門聖惠方同暑月煩躁食後與白虎湯方見實熱門玉露散方見驚熱門中熱盛與紫雪方見瘡疹攻咽痛門咽痛或生瘡與甘桔湯方見實熱門甘露飲子方見瘡疹攻咽痛門余依錢氏說大人同張渙論小兒瘡疹之疾與大人傷寒病相似雖治療不同蓋或愈或危皆六七日之間小兒往往多有此疾豈不慎哉且瘡疹皆由積熱在於臟腑蒸鬱熱毒發於四肢小兒皮肉嫩弱多成此疾邪熱在臟即生痘瘡蓋臟屬陰大體難治若邪熱在腑則生細疹腑屬陽大體易治且如乳下嬰兒周晬已里至二三歲宜少服藥量其輕重將湯藥與乳母服之其乳母切宜諸般忌慎若湯藥與兒多服則反為累也若五六歲至十歲已外童兒則方可施為湯藥然邪氣熱多在脾肺間若不求其本早以湯藥治之養熱氣行於四肢即利害甚多蓋童男長大則肌膚稍實毒氣難出若方覺似瘡疹便早疏利即熱輕易療蓋小兒瘡疹未出以前或熱乘於心心神易動即發驚癇若醫者湯藥不相投即危殆矣若疹痘已出長快自不可動利正如大人傷寒下之早也且如古之名醫不出倉公扁鵲孫思邈巢元方輩論小兒疾症湯藥有可服者有不可服者宜先服順陰陽調榮衛後方利臟腑即熱漸除又扁鵲論曰小兒瘡疹未出以前多是誤認以他藥解之或以燥藥或以冷藥不無夭傷深戒時醫及病家慎之至時拱手無及又瘡疹欲出切宜護目若熱衝於眼目致損瞳人世間小兒瘡疹多入眼目遂生障翳凡小兒稍大六歲至十四歲皆屬童男初覺頭痛壯熱腰背疼重熱甚則手足厥冷卻似挾寒全在詳察脈理疾狀脈但多洪數甚大不定若小便多赤大便多秘此證正宜先疏利也應瘡疹早出若才出皆不可轉利也渙頃時禁中供應湯藥屢嘗調治此證皆獲寧愈在外治過尤多蓋不敢越古人之論疹痘論夫疹痘瘡者因熱積臟腑蒸郁毒氣而生若腑間伏熱則生細疹赤瘡俗呼為麻子是也若臟間伏熱則生痘瘡形如豌豆者是也其始也熱毒積於脾肺之間治之不早流注四肢榮衛之中而成其疾初覺受病多似傷寒而身色與四肢俱赤壯熱頭痛腰脊疼只鼻耳尖冷足指冷兼咳嗽眼青黃色也小便大便秘兩手脈洪數者乃是疹痘之症也其有冬月天氣溫暖仍感乖候之氣未即發動至春又被積寒所折毒氣不得泄至夏初得熱其春寒方解冬溫毒氣始發者及有不因冬溫四時自天行者又有小兒熱毒之氣傷天令不時之氣而發者有感寒邪伏熱毒真元之氣被熱毒邪氣渾雜而發者近世醫流議者云痘瘡始於魏晉腳氣肇於晉末或云建武中於南陽徵虜得之仍呼為虜瘡或言永徽四年此疾自東域流於海內且人之有生臟腑受寒熱邪氣而為病凡感之者則受若言今有古無豈可同草木之類所產有方而苗裔留傳於天下哉巢氏又呼為發瘡及呼為胞瘡麩瘡此皆分陰陽所受人凡覺冬有非節之暖當瘡未發而預防之先急下其毒凡春冬之間未嘗無此疾夭枉者十有五六而因醫死者大半蓋證候形色所發不同致有誤認其候有三五日遍身粟生時作咳嗽耳尖冷毛寒肌慢眼澀不開作寒欲以溫暖覆之者初覺之時當用薄荷散微微發汗次進調中散二方見瘡疹已出未出門瘡即自愈服薄荷散汗未出者亦服調中散即汗出漸漸解若作寒熱其脈反遲者進脫齒散方見瘡疹出不快門或患者寒熱不定目澀耳鼻冷此邪毒不傳諸臟便攻皮膚而作或出遲者亦服脫齒散凡有三五日鼻中壅喉咽不利咳嗽目赤毛焦肌膚緊脈洪大而數此應疹痘之候順者宜煎薄荷散發汗則瘡毒自出或鼻中壅咽喉不利目赤額紅脈不甚洪大者亦是瘡疹之候皆宜服脫齒散瘡如出白珠子或出紅小瘡子者乃是解也或鼻壅唇焦脈細面色痿黃時變青色皮膚慢吐清涎者亦是疹子之候此皆因醫人誤下涼藥太多致令瘡難發凡瘡毒血氣順脾溫則易發若服涼藥過多則血澀氣弱脾冷則瘡毒難泄遂變惡候此候亦服薄荷散並脫齒散若面青氣粗大小便不通瘡毒未發宜進滑石散方見瘡疹出不快門中如大小便不通利則服脫齒散次觀色候調治或有面色赤者亦是瘡疹候若先赤而後青為逆候也或患數日面色青或痿黃四肢微冷上喘不涎手足搐縮以三焦氣壅血脈凝滯氣不得相榮當用薄荷散發泄瘡毒小兒初得病便驚狂身熱汗出問之身不憎寒並不惡風脈洪數者皆當下之覺得有此證疹痘未發之前當服當歸散方見瘡疹未見乃可疏利門或有先頭疼口鼻出熱氣憎寒壯熱胸膈痞噎生涎心逆作渴不止足指冷口作臭氣兩手脈弦而或微脾脈弦數者此因失飢傷邪熱當發赤疹及有患頭疼身不大熱口鼻有熱氣咽喉干痛口頰生瘡兩目如火熱耳尖手足稍冷兩手脈洪大後三二日必作渴面赤時作憎寒心逆口作臭氣目忽如硃色亦是伏瘡疹之候亦先當去邪毒藥須用大黃湯蕩之不可用巴豆水銀輕粉此等則無去熱毒之理反傷於臟也或覺已結於皮毛之間微微似出慎不可利或誤利之則瘡毒反沒蓄伏心間邪入肺中瘡毒內壞而死若瘡疹既出太盛竇膿水者卻當以大黃藥微利除毒如未發毒疹以前曾經利者即不用大黃藥但以解熱藥除其敗毒多有愚俗禁服藥餌只望巫祝不以藥泄利瘡毒致令大小便不通停熱毒於臟腑攻衝眼鼻咽喉腫塞口舌壞爛束手受死及有疹症口進涼藥或調氣藥恣其所措既疹痘已出之後又復猛利用藥既失疾勢已壞雖扁鵲無門救療所以時人不能盡其天年又按扁鵲活疹痘之法覺有疹痘之症先用油麻劑方見瘡疹初出門解四肢極熱如服藥了良久就臥少時服至三五服大小便利四肢熱退邪毒漸解疹痘既出亦輕若曾服大黃散利者亦不必服此嬰兒服此頗有益或有未經解利而瘡毒已發者服解毒必聖散或升麻散發散二方見瘡疹已出未出門博濟養生必用方同若瘡毒在肌膚三四日隱隱不發者則急用紫草飲子方見瘡疹初出門與聖惠同至數服則瘡疹出凡瘡疹未發前當用黃柏膏見瘡疹愛護面目門聖惠方同塗兒面頰眼目之間仍續用胡荽酒方見瘡疹初出門噴背上四肢令速發出也若瘡未出及雖出躁渴者宜服甘草散方見瘡疹太盛門中以少解利熱毒即住若瘡出遲亦當服紫草飲子大人針兩腕硯子骨間或灸一壯亦助發出疹痘毒氣若已發則不必用之如瘡候未作膿心膈躁睡不安者服青黛散黑豆汁二方見瘡疹未見乃可疏利門若瘡毒出盡後宜服黃芩散以解餘毒若嘔吐服此嘔吐自定若赤口有瘡下部亦有瘡自下利者服黃連散或瘡疹出後煩喘小便不利者宜進燈心湯二方並見瘡疹後解餘毒門中若瘡疹煩喘甚者即用麻黃湯方見瘡疹太盛門中或咽喉痛並嗽則加入麝香其有服冷藥太過咳嗽手足冷脈遲者煎炮乾薑炙甘草各四錢水一升二合取四合服之其或下痢赤黃膿血及渾身熱當與薤白湯方見瘡疹便膿血門中解去惡積便瘥有疹痘安便攻動眼生翳膜腫脹者皆因肝臟敗熱停留所致切忌用點者藥惟宜利脾肺解肝熱毒仍於眼邊上下貼熁藥以散毒氣當服蕤仁散若生翳障重者兼密蒙花散量力服食二方並見瘡疹入眼門中翳膜退則止凡有時氣天行瘡痘者則急預服豆湯則不發瘡方見如前黑豆汁是或發瘡而因天行熱氣疱瘡自疼壯熱則當以桂枝及去節麻黃黃芩各半兩為末量大小一二錢暖水調下覆令汗出又以葛根散解肌出汗方見瘡疹已出未出門中凡身疼壯熱頭痛若不與小汗無由表散大便久秘毒氣藏伏心腹脹滿不與微利無由釋去邪毒切在消息若痘瘡已出者不可發表更增瘡爛若發膿痛甚者即用乾淨黃土羅細為末敷之仍數數食蜜若瘡勢稍輕者則用川芒硝以豬膽汁調塗瘡上勿令動著直候瘡痂落有大段瘡發不通臥席者用麥麩簟臥將息如痘瘡作漿戴白膿者其毒輕或紫黑色隱隱在肌肉裡者其毒重甚者五臟咽喉內皆有瘡其大便澀出血瘡黑靨不出膿者死舌黑鼻有黑氣者死其或疹痘未出以前熱毒內逼目睽上竄驚叫有如驚風者此乃瘡欲出之候若誤認為驚風調治毒氣內蓄邪熱不泄乃死或有惡瘡既出譫語不止此是惡候更以冷藥解利則使聲喑瘡疹反沒乃死或用燥藥太過咽喉腫痛猛發鼻血喘嗽而死或瘡作白疱忽然蓄入臟腑漸作紫黑無膿日夜煩悶者服化毒散方見瘡疹倒黶門中其毒氣當從手足心出乃瘥此五死一生之候若便血瘡壞無膿者十死不治候大熱瘡毒順出然後依證調理有患瘟毒豆瘡不出者一法以地黃雄黃令飲然不可太多太多則反有所損或飲啜食熱乳積於腑臟者當兼用藥療乳母嬰兒孩童之性陽盛而陰微臟腑陰陽氣稍差逆大小便多不順利自扁鵲太倉公論療嬰孩藥性有可餌者皆先知節氣陰陽治之利臟腑則病勢漸解也張仲景論孩兒初生下時宜進地黃汁點在孩兒口中退下黑屎至壯年不患瘡疹及小兒生下未滿一百日以來如遇天氣和暖無惡風之時抱於日中使皮膚緊密常奈風日若只在房室之間或常於溫暖之處忽乍見風日使寒邪之氣伏積臟腑若遇天氣不調多作瘡疹之候若瘡疹出方得寒邪散毒氣消也若孩兒患瘡子父母即不得行房若有觸犯使瘡疹不出毒氣入心悶亂而死若已出之候觸之則令其瘡黑爛痛極如刀割爾設或瘡疹得安其瘢經年黑色仲景謂瘡疹未生之間宜於房室燒赤朮豬甲二物辟惡氣父母常戒其色欲亦令人守房室門勿令外人入房恐有觸犯令小兒瘡疹難出或得上喘面青黃色者猶良若因此犯而死者不可勝數又有疹痘安後瘡痂雖落其瘢猶黶肌肉或凹凹再作瘡疹此因安後不解利毒氣留滯敗熱後肌肉之間也余歷究諸古今方目漢魏以前瘡疹之說經方不載惟扁鵲有油劑仲景有數方悉已修錄昔宋之秦承祖晉中書令王珉各有一方亦見於後自後巢元方乃論疹痘之症太平聖惠稍編其方諸家方書亦少有載者今所習諸方皆世良工經用調理得效秘而不傳者愚不忍坐視其人之亡故敘其傳變脈證病候及藥以廣其傳庶使患者免罹夭傷之苦矣活人書論小兒瘡疹與傷寒相類頭疼身熱足冷脈數疑似之間只與升麻湯方見傷寒發斑門緣升麻湯解肌兼治瘡子已發未發皆可服但不可疏轉此為大戒傷寒身熱固不可下瘡疹發熱在表尤不可轉世人不學乃云初覺以藥利之宣其毒也誤矣又云瘡痘已出不可疏轉出得已定或膿血太盛卻用疏利亦非也大抵瘡疹首尾皆不可下小兒身熱耳冷尻冷咳嗽輒用利藥即毒氣入里殺人但與化毒湯紫草木通湯二方並見瘡疹已出未出門鼠黏子湯方見瘡疹攻咽痛門出得太盛即用犀角地黃湯解之方見瘡疹太盛門中若瘡痘出不快煩躁不得眠者水解散方見時氣門中麻黃黃芩湯方見傷寒門中升麻黃芩湯方見傷寒門中活血散主之方見瘡疹出不快門黑瘡倒黶豬尾無比散龍腦膏子無不驗也三方並見瘡疹倒黶門中若熱毒攻咽喉痛如聖湯方見瘡疹攻咽痛門瘡痘入眼決明散撥雲散密蒙花散通聖散蛤粉散主之五方並見瘡疹入眼門治瘡疹之法無出此矣全生指迷論曰瘡疹之疾見巢氏病源及千金要方所載或附於時行熱病之後亦無專論的確主療之法或出於俗傳俚語執以為法今初得此疾往往以胡荽酒葡萄酒及投以諸溫熱藥咸云發之使快或出之未快隱隱在皮膚間則以火煅人齒酒調服之又云始得此疾不可投之涼藥恐胃冷致瘡不能發出多以為瘡疹宜溫余自歷事以來嘗見執此論者致使病人耳目口鼻悉平咽中閉塞大便堅秘小便皆血如此死者幾三十餘人又或見疱瘡其頭黑色凹而不起者則謂之倒黶亦由始得之失於調解更增暖溫湯藥孤陽無陰郁毒不散熱無從出反攻腑臟其氣俱絕故使凹而不起又加溫藥以發之其斃者不可勝數余嘗究此疾大抵亦時氣之一端有如癮疹麩片狀者有赤熱如斑狀者有如豌豆之狀者或大小不等皆出膿水者亦謂之膿庖蓋毒氣有淺深故發之有異狀其先風邪外客於皮膚熱不得發泄者則為癮疹之狀但皮膚癢瘙而其疾亦輕其先熱蘊於內外與風邪相連客搏於血則為赤斑之狀其毒氣深蘊伏於臟腑閉於經絡內外相合熱蓄血聚壅過不行結而成膿則為疱瘡大抵其疾始發令人掏去痂令血出則定無瘢子若從他至干定隱一瘢子也劉洙並無方訣內所引方與眾人方同董汲斑疹總論曰夫生民之道自微而著由小而大此物理灼然不待經史證據可知然小兒氣稟微弱故小品方云人生六歲以上為小六歲以下經不全載所以乳下嬰兒有疾難治者皆為無所依據至如小兒斑疹一候不惟脈理難辨而治療最比他病尤重始覺證與傷寒陰癇相近通都輔郡名醫輩出則猶能辨其一二遠地左邑視病不精失於詳審投藥暴妄加之小兒臟腑嬌嫩易為傷動斑疹未出往往疑為傷風即以麻黃等藥重發其汗遂使表虛里實若為陰癇治之便用溫驚藥品則熱勢愈盛直至三四日證候已定方得以斑瘡藥治之則所失多矣大率世俗醫者斑疹欲出多以熱藥發之遂使胃中熱極其初作時即斑疹見於皮下其已出者變黑色而如陷既見不快又用熱藥熏蒸其疾斑疹得熱則出愈難轉生熱證大小中間且與少惺惺散唯候一二日若身上無赤點必是傷風須候他五六日必自安若是傷食熱一二日決自安若是一二日身上有赤點大便二三日不通須用少藥動若是大便如常切不可與他藥吃恐冰住不出若是患到四五六日卻泄瀉須與他理中丸及溫中藥吃其瀉便止若到四五日不大便瘡子又盛出卻喘粗氣急腹脹小便赤澀須用四順散通之甘草大黃芍藥當歸若得通氣不喘腹不脹便休與藥吃漸次安愈若初覺有赤點子大便如常小便赤須用藥通過大便要出快也若出得色紅而快更不須通也世人言小兒瘡已出更不得下設若瘡子半出半不出或盛出卻大便不通小便赤澀喘粗腹脹吤齒唇乾口燥引渴譫語急當下也不下則不可若半出半不出或盛時卻下利支厥嘔逆腹脹吃噫須急與理中四逆姜附湯之類不須疑已試甚良瘡子發如膿窠不肯黶者但調沙糖水與吃瘡子將欲干時須得兒頭痛發熱皮毛灑淅如寒手足耳鼻時冷胸中煩躁如以針刺其皮中時或瘙癢甚者至於昏睡譫語其脈或大小不定其應指必疾甚者至於六七至非必日數深而後見亦有始得之便發此證者慎無惶惑亂作別治故將往者為可鑑及取近世已驗之法條次於下其疾始覺頭痛發熱微寒煩躁咽痛者則以四味升麻湯方見瘡疹已出未出門養生必用同若瘙癢成癮疹者則以荊芥湯時嘔者宜小柴胡湯不惡寒但煩躁小便赤澀多渴成赤斑點者則以竹葉湯犀角飲子四方並是瘡疹已出未出門中大便不通者則以四順飲子葛氏四味飲同方見溫壯門中若昏甚譫言大便不通則與大承氣湯方見瘡疹大小便不通門若大便自利黑黃色此毒氣亦有所出亦不必廣於湯劑恐重增他病其大便已利不得以溫藥助之則其瘡亦希少而自快利但只以升麻湯荊芥湯最佳方見同前劉洙小兒瘡子訣若小兒覺身熱或是瘡痛又恐是傷風傷寒又恐是傷食未辨明便不通更以巴豆取積藥下之則使兒臟腑內虛熱又不除邪氣益深變為喘滿便血或為疱癰身體裂破遂使百年之壽一旦為俗醫所誤者可不痛哉大抵斑疹之候始覺多咳嗽身體溫壯面色與四肢俱赤頭痛腰疼眼睛黃色多睡睡中瘛瘲手足厥耳尖及尻冷小便赤大便秘三部脈洪數絕大不定是其候也其乳下兒可兼令乳母服藥其證候未全或未明者但可與升麻散解之其已明者即可用大黃青黛散等涼藥下之次即與白虎湯升麻白虎二方並見瘡疹已出未出門如秋冬及春寒未用白虎湯之時但加棗煎服不必拘於常法仲景云四月後天氣大熱即可服白虎湯方同前特言其梗概耳大率疹疱未出即可下已出即不可下出定即宜利大小便其已出未快者可與紫草散方見瘡疹出不快門救生散玳瑁散之類其重者以牛李膏散之二方並見瘡疹倒黶門或毒攻咽喉者可與少紫雪及如聖湯無不效也二方並見瘡疹攻咽痛門其餘熱不解身熱煩渴及病疹兒乳母俱可與甘露飲方見瘡疹後解餘毒或便血者以牛黃散治之方見瘡疹便膿血門兼宜常平肝臟解其敗熱慮熱毒攻肝即衝於目內生障翳不急醫治瞳人遂損尤宜慎之然已出未平切忌見雜人恐勞力之人及狐臭熏觸故也未愈不可當風當風即成瘡疥如膿疱出可燒黑醜糞灰隨瘡貼之則患愈而無瘢也及左右不可缺胡荽蓋能御汗氣惡氣故也如兒能食物可時更少與葡萄蓋能利小便及取如穗出快之義也小兒斑疹本以胎中積熱及將養溫厚偶胃中熱故乘時而作外臺方云胃爛即發斑微者赤斑出極者黑斑出赤斑出五死一生黑斑出十死一生其腑熱即為疹蓋熱淺也臟熱即為疱蓋熱深也故證色論云大者屬陰小者屬陽汲總角而來以多病之故因而業醫近年累出諸處治病當壬申歲冬無大雪天氣盛溫逮春初見小兒多病斑疹醫者類如前說如投以白虎湯之類即竊笑云白虎湯本治大人蓋不知孫真人所論大人小兒為治不殊但用藥痢有多少為異耳則是未知用藥之法故多失誤今傳選諸家及親經用有效者備錄為書劉氏家傳初虞世以涎比山澤之氣非也山澤氣蒸潤而已故雖山石氣亦能到譬如釜上甑蒸氣亦蒸潤內外滲漉涎則濃濁滯礙非山澤之氣可比中風人涎如鰾膠挽不斷又豈能入關節初虞世所著必用方大有益於世雖是謂中風不可吐又謂小兒瘡疹當轉瀉此二說誤人甚多小兒瘡疹轉瀉則虛毒氣內攻百無一生張氏家傳惺惺散出和劑方小兒傷寒壯熱當先服此藥極驗次服人參羌活散如壯熱未退切不可與通利大便及涼藥恐是瘡疹如吃涼藥誤矣瘡疹候第二巢氏病源傷寒發痘瘡候傷寒熱毒氣盛多發疱瘡其瘡色白或赤發於皮膚頭作瘭漿戴白膿者其毒則輕有紫黑色作根隱隱在肌肉裡其毒重則甚者五內七竅皆有瘡形如發痘故以名焉茅先生小兒生下有麻痘候各有所說痘候早晨渾身微微地熱日午後大熱眼白加黃色兩脅下吸吸動更發甚如驚風遍身大熱手足逆冷此病屬臟所治者只用獨勝散與發痘方見瘡疹已出未出門慎不得瀉恐水入大腸痘子不出瀉下如赤豆汁及朝出暮黶或出如掌大赤色及痘口內有臭氣唇黑色死候大凡痘只得用獨勝散散發出痘將息安樂後可用青金丹取下余積方見積聚門中後用勻氣散補之方見胃氣不和門中常服硃砂膏方見驚積門中即愈第一先莫吐瀉恐水入大腸成惡候茅先生小兒麻候渾身微熱午後大熱眼不白不黃微加赤色手足冷吐逆此候屬腑所治者亦依痘候調理惡候一同嬰童寶鑑小兒疹痘為臟腑積熱發於皮膚為之其熱在腑發之即疹也腑屬陽其發之微熱在臟發之即痘也臟屬陰發之甚未發同一治未出可下解熱而退既出慎勿下之及冷藥逼之其病不出在內害人也嬰童寶鑑斑痘死候斑痘出後熱不去大瀉而渴有此疾皆因已出後服冷藥逼在肺中也煩躁迷悶不食大小便難五關貫真珠囊小兒痘瘡所主候凡小兒痘瘡瘡外應之候若壯熱汗不流先躁而出者主心也先嗽而出如砂子形者主肺也先肚痛而出疹子者主脾也先如瘧而發渴後為水疱或有黯血者主腎也先目赤如珠暗流羞明出瘡子或有硬膿而不破者主肝也茅先生麻痘不通治惡候歌斑瘡出後熱難除冷藥先冰在腹居渴甚瀉多便溺澀不餐躁發命須臾玉訣小兒斑疹候歌傷寒胃熱作斑瘡倒黶因風氣受傷太過損肝多紫黑大為陰盛小為陽此患未出多不辨之只作傷寒調治多誤如太過者解之玉訣小兒斑疹候歌目澀語聲短發熱有時涼手耳如冰冷三關洪又長又一玉訣斑疹候歌與此同但第一句云氣喘聲多促餘三句並同又云宜發散石壁經三十六種內瘡子候歌鳳體經以此候為傷寒變麻子歌括一同小兒瘡子候偏多咳嗽涎潮作久疴發熱發寒發寒一云發驚如怕物看燈停目眼光多四十八候此句云驚如羊眼白相過喉中自響如齁䶎吐後常添氣不和夢裡發來如急搐唇紅臉赤脈交多渴水心煩多躁熱耳冰足冷發溫和舌上有瘡如粟子定知三日熱來多此病變成麻子候草將涼藥與相過認取證形為妙手只須平藥病消磨此因溫熱毒氣在人至春人感寒邪陰陽相錯在腑作細赤瘡疹在臟則為痘瘡雖有前候切看手足稍冷尻陰冷腹中痛硬是瘡疹候若誤投驚藥則反受毒邪內攻其瘡不出更服熱藥則使瘡黶陷而受死矣但服調氣升發散藥必愈瘡疹未見乃可疏利第三聖惠凡斷乳嬰孩童子患疹痘疾候初覺多似傷寒面色與四肢俱赤壯熱頭痛腰背疼足多厥冷眼睛黃色脈息但多洪數絕大不定小便赤少大便多秘才覺四肢色候及脈息雖是疹痘疾未攻皮毛穴出者便可以服餌勻和臟腑疏利遂下若疹已結在皮毛穴處微微似出即不可疏泄也或疹出太盛痘穴膿水者卻可疏利也王氏手集世之論瘡疹者莫不以古書之說才覺便與疏利為非以錢氏之說治以溫涼之藥不可妄下為是遂以謂近世小兒瘡疹之出得無橫夭者皆錢氏之功也蓋小兒腸胃嬌嫩若妄取轉便見內虛熱氣反入必能殺人故以瘡疹倒黶而死者皆取轉之罪也此說誠是然而不考其言遂失其意殊不知古書所謂疏利者乃云先和節陰陽調治榮衛方利臟腑即熱氣漸解又曰嬰兒之性自然陽勝而陰微也臟腑陰陽氣逆大小便多秘不通也才覺是此疾即可便與疏利即輕患也若疹痘已出即不可疏利又曷嘗使人瘡疹之出便即取轉耶況疏利與取轉相去遼遠疏利者必以輕涼之藥微利動之如青黛黃連之類是也取轉者以峻快之藥極轉下之如巴豆芒硝之類是也不可同日而語愚醫不詳古意輒以疏利便為取轉得不誤耶況取轉之際曾先和節陰陽調治榮衛乎小兒已大小便不通乎才覺之說即是瘡疹未見醫者取轉之時知瘡疹之已出未出乎又曾知疹痘出即不可疏轉之語乎蓋庸醫往往見是瘡疹便與取轉云使瘡疹出快所以多誤也錢氏之說云此天行之病唯用溫涼藥治之不可妄下及妄攻發亦曷嘗有此證不得疏利之語乎妄下非疏利之比至如初虞世猶具誤解其意乃以瘡疹比傷寒至陽明亦用利藥殊不知傷寒至陽明則宜下既庸醫不曉古意又使善醫者以此印證其說不疑為非故特為辨其瘡疹之初果有此證則宜與疏利特不可取轉耳聖惠治小兒熱毒盛發疹痘瘡初發早覺者宜服此方上用黃連一兩去須搗篩為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減溫服聖惠又方上用波斯青黛如棗核大以水調服之疹痘論同用溫磨刀水調下疹痘論當歸散方川當歸一兩甘草一分上為細末每服二錢水一中盞豆豉十粒同煎至六分去滓量兒大小服以利動為度逐日冷吃甘草汁三歲以下一歲以上加減服疹痘論如瘡候未作膿心膈燥睡不安者方上用黑豆煮汁溫徐徐服之亦解疹痘論又凡有時氣天行瘡痘者則急預之豆湯小豆黑豆綠豆各半升甘草一兩炙上用水九升煮候豆熟為度逐日空心任意飲七日後瘡必發快瘡疹初出第四聖惠小兒未與疏轉急服紫草飲子方上用紫草二兩細銼以百沸湯一大盞沃便以物合定勿令紫草氣出量兒大小溫溫服半合至一合服此藥瘡子雖出亦當輕爾諸方書莫不以服紫草為先聖惠治小兒疹痘欲令速出宜用胡荽酒方疹痘論萬全方董汲法同上用胡荽三兩細切以酒二大盞煎令沸沃胡荽便以物合定不令氣出候冷去滓微微從頂以下噴背膂及兩腳胸腹令遍勿噴於面錢乙用好酒二盞煎一二沸入胡荽四兩再煎又云病人左右常令有胡荽即能闢去汗氣瘡疹出快瘡疹忌外人及穢濁之物雖不可受風冷然亦不可擁遏常令衣服得中並虛涼處坐臥聖惠治小兒臟腑伏於熱毒未成疹痘疾候四肢微覺有熱食物似減頭髮干立或時額多微熱宜服生油方疹痘論及萬全方同上用生油一小盞以人體熟水一小盞旋旋傾熟水入油盞內不住手以杖子打攪疹痘論云以楊柳枝攪直候入熟水盡更打令勻如蜜即止夜臥時三歲前至百日及一晬內每服二蜆殼五歲至七歲每服三蜆殼十五歲以前每服三大蜆殼至半合直至大人每服一合至二合量大小增減與服之服後良久令臥少時服三五服大小便利四肢熱退疹痘不生也萬全方云扁鵲論可先以油劑服之行解四肢熱極或疹痘已出不可以油可服平和湯藥療於肝臟解於敗熱慮熱毒太盛瘡疹已出未出第五宋秦承祖方治瘡疹漸作身熱似傷寒候只耳尖腳稍冷或腹痛者是瘡疹上用蟬蛻二十一個洗去泥為末用水一盞慢火煎至七分去滓量大小溫服如覺瘡疹已出便依前服三五次若冷服即有瘡痕若不是瘡疹候誤服無害晉中書令王珉治傷寒時氣熱毒豌豆瘡方上用樺皮木銼煎汁溫服取安千金治發豌豆瘡方上以小兒著取月水汁和水浴之仙人水鑑治豌豆瘡方乾漆人中白尾松灰各少許牙硝一分上同研令細空心冷漿水調下半錢以吐為度再服一錢得利三兩行其瘡自除神效仙人水鑑小兒患豌豆瘡眾醫不瘥服者神妙天麻甘草各一寸發灰黃丹熬各一分馬牙硝三分五色豆各七粒黃鹽一分陶隱居云北海黃鹽草粒粗以作魚鮓及咸菹上一十一味搗為散空心取一錢冷水調服利下瘡隙瘥子母秘錄治小兒斑瘡豌豆瘡上用發灰飲汁服三錢匕藥性論去小兒豌豆瘡方上用臘月兔肉作醬食藥性論又方上用臘月兔毛煎湯洗豌豆瘡及以毛敷甚良聖惠治小兒疹痘瘡出後咳逆脅痛吃食不下赤茯苓散方赤茯苓甘草炙微赤銼大青川升麻枳殼麩炒微黃去瓤各半兩梔子仁一分上件藥搗粗羅為散每服一錢以水一小盞入苦竹葉一七片豉三十粒煎至五分去滓分為三服日三四服看兒大小以意加減聖惠治小兒疹痘瘡及赤瘡子犀角散方犀角川大黃銼碎微炒桑根白皮銼鈞藤甘草炙微赤銼麻黃去根節各一分龍膽去蘆頭半分石膏栝蔞瓤黃耆銼各半兩上件藥搗粗羅為散每服一錢水一中盞煎至三分去滓分溫三服量兒大小加減服瘡子退後濃磨犀角水塗之更良錢乙附方同治瘡疹太盛令不入眼名調肝散博濟方治瘡疱將出未能勻遍透肌解毒必勝散上以牛蒡子不限多少炒令熟杵為細末每服一錢入荊芥二穗水一盞同煎至七分放溫與服如瘡疹已出更與服亦妙疹痘論必勝散同靈苑治時行豌豆瘡及赤瘡疹子未發令內消已發者解利毒氣令不太盛玳瑁湯方生玳瑁生犀各以冷水磨濃汁二合上同攪令勻每服半合微溫服一日四五服為佳養生必用小兒瘡疹始作與傷寒相類頭痛憎寒壯熱疑似之間先與解肌湯已發未發皆可服又名升麻湯升麻白芍藥乾葛甘草炙各等分上為末每服二錢水一盞煎至七分去滓溫服日三甚即連夜服貧家緩急亦可湯點眼身心煩熱即溫服寒多即熱服必用方疹痘論活人書全生指迷論董汲方皆同茅先生小兒發疹痘獨勝散牛蒡子半兩白殭蠶一分上為末每服一大錢水六分盞紫草二七寸同煎四分連進三服其痘便出妙茅先生小兒麻痘方上用荊芥少許爛研以新井水將布帛裂過入一