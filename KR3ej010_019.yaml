子仁十個乾葛全蠍炙馬牙硝各一分殭蠶七個炒蟬蛻三七個洗去尾頭足上件為末入硃砂麝香和勻再勻每服一字薄荷蜜水調下夜啼不止燈心湯下積熱第七玉訣論積熱者因口不慎味常餐黏食腥膻肥膩冷滑瓜果之物已傷脾胃病也胃腑虛微結實難化生瘡瘢積或胸脅之間攻衝榮衛嘔逆氣粗眼澀加渴泄瀉兩脅脹滿以湯散續便宜疏宣服千金丸方見本門形證論四十八候心臟積熱歌孩兒有積饒多渴乳食都忘困難撥壯熱瀉食食不消四肢逆冷吐時厥須知心臟積居中取積於中方退熱熱退調和即有功莫使結毒恐驚掣此病先取積後調氣此小余熱不妨取虛中積皂角膏方見本門靈苑治小兒諸驚積熱解痰毒金砂丹方光明砂麒麟竭沒藥甘草炙各一分生白麵麝香各二錢上件六味各研杵為末同合和勻以軟飯為丸如小豆大每服臨臥時用薄荷水化下一丸如解食毒用好茶下三丸更用四量小兒年數大小臨時加減太醫局妙香丸取小兒積熱方辰砂飛研九兩牛黃膩粉腦麝四味並研各三分金箔九十箔研巴豆三百一十五粒去皮心膜炒熟研如面油上合研勻煉黃蠟六兩入白沙蜜三分同煉令勻為丸每兩作三十丸解五毒治潮熱積熱等疾如治潮熱積熱傷寒結胸發黃狂走躁熱口乾面赤大小便不通煎大黃炙甘草湯下一丸毒利下血煎黃連調膩粉少許下如患酒毒食毒茶毒氣痰伏痞吐逆等並用膩粉龍腦米飲下中毒吐血悶亂煩躁欲死者用生人血下立愈小兒百病驚癇急慢驚風涎搐搦龍腦膩粉蜜湯下緑豆大二丸諸積食積熱頰赤煩躁睡臥不寧驚哭瀉痢並用金銀薄荷湯下更量歲數加減如大人及婦人因病傷寒時疾陰陽氣交結伏毒氣胃中喘躁眼赤胡發不定再經日數七八日以上至半月日未安醫所不明證候脈息交亂者可服一丸或分作三丸亦得並用龍腦膩粉米飲調半盞以來下此藥一服取轉下一切惡毒涎並藥丸瀉下如要卻收水洗淨以油單子裹埋入地中五日取出可再與大人小兒依法服一丸救三人即不堪使如要藥速行即用針札一眼子冷水浸少時服之即效更速太醫局天竺飲子治大人小兒臟腑積熱煩躁多渴舌頰生瘡咽喉腫痛面熱口乾目赤鼻衄丹瘤結核癰瘡腫痛又治伏暑躁熱瘡疹餘毒及大便下血小便赤澀方甘草銼煨二十斤大梔子去皮炒連翹各四十兩栝蔞根十斤雄黃飛研五兩鬱金用皂角水煮切作片子焙乾稱二十兩上為細末每服一大錢食後臨臥用新水調服小兒半錢臨時更量兒大小以意加減服錢乙桃枝丸疏取積熱及結胸又名桃符丸方巴豆霜川大黃末黃柏末各一錢一字輕粉硇砂各半錢上為細末麵糊丸粟米大煎桃枝湯下一晬五七丸五七歲二三十丸桃符湯下亦得未晬三二丸臨臥玉訣千金丸取積熱方生大黃滑石研皂角炙巴豆去殼出油盡上等分為末麵糊丸如粟米大每服五丸十丸茶湯下玉訣治小兒驚風積熱鎮心定魄安魂去風方牛黃腦子鉛白霜各三錢硃砂川甜硝各一錢上件藥一處研如膏薄荷溫水下一字二歲以下半字風搐搦研犀角溫水下四十八候治小兒心臟積熱皂角膏方硇砂飛過粉霜各一錢輕粉白丁香各半錢乳香二錢巴豆十五粒去油上用棗肉丸如梧桐子大量兒大小加減臨臥皂角煎湯下四十八候皂角膏取積熱後服調胃散方人參三錢白朮二錢半甘草炙白茯苓罌粟子各一錢白附子半分藿香丁香各半錢上末紫蘇湯下半錢一錢劉氏家傳李琬防風散治小兒五臟積熱驚風頭面赤熱口舌生瘡好飲冷宜服之防風去蘆頭甘草炙黃柴胡去苗連翹山梔子上件等分杵為粗末每服一錢水五分煎三分去滓溫服一歲兒一服可分四次三歲兒可作兩服飲之大小量力加減張氏家傳威靈仙丸治小兒積熱方威靈仙大黃當歸甘草炙芍藥上為細末煉蜜丸如彈子大每服一粒食後與服莊氏家傳治小兒積熱五金丸一名五毒丸方雄黃一分鬱金一錢巴豆和殼稱一錢去殼並心膜十重紙壓去油用霜上為末醋糊為丸如緑豆大每服一丸柏枝湯下午中一更各一服治小兒積熱毒生丹瘡並吐血下血等熱毒之疾治藥毒氣毒陽毒陰毒食毒薄荷酒或薑蜜湯下如中藥毒以伏龍肝為末水調下治腹脹氣急大小便不通痰喘咽疼腮腫腮高卒中不語大消痰毒莊氏家傳治小兒積熱諸疾初冬孩子壅熱涎嗽宜服此藥名為蟬殼丸蟬殼麝香天南星各半分硃砂二分蠍一個首足全上件為末爛飯和丸粟米大一服五七丸熟水吞下莊氏家傳退小兒積熱越桃飲子方山梔子甘草炙大黃紅芍藥各一分連翹黃芩各半分上件六味一處為末每服半錢至一錢用蜜湯調下大退積熱莊氏家傳涎壽膏療小兒心臟積熱大人小兒口瘡方白羯羊膽一隻臘日者或臘月者皆可馬牙硝半兩硃砂一分上細研盛於膽內當風懸之候過清明可開再研極細入腦麝少許生蜜和為膏子以瓷器中盛量兒大小加減干服如紫雪法莊氏家傳治小兒上膈積熱化涎利胸膈治咽喉方硼砂鉛霜牙硝甘草以豬膽四個去火二醮汁炙盡為度各一兩龍腦少許上先將四味研細後將甘草別搗為末拌勻每服一字以新水調下趙氏家傳春疏下積熱切忌用元子藥徒損胃氣積熱不行方錦紋大黃生切碎煨一分甘草一寸許炙切碎不蛀肥皂角一寸許不用切上件三味用水一平碗同煎至半碗以下去滓臨臥帶熱服次日取下熱氣更看大便黑色即一年無病如不動即別作一料加生薑製厚朴二錢切碎同煎須天氣晴明服十五歲以上可作一服小兒量度與之吉氏家傳治積熱金露散方鬱金一個水煮五次焙天竺黃大黃蒸三次切乾地黃牙硝各一分甘草半兩炙上件細末每服半錢漿水調下實熱第八錢乙附方凡小兒實熱疏轉後如無虛證不可妄溫補熱必隨生