黃腦麝各少許馬牙硝甘草炙雄黃漿水煮各半兩川大黃鬱金各一兩並漿水煮上件八味內三味用漿水一升煮至三分之二出曬乾入余藥一處研如面煉蜜為丸丸如緑豆大每服三丸新水磨下量兒小大與之孔氏家傳治小兒熱只吃調胃承氣湯極妙李閣使家只用此藥才有熱量虛實與之勝如與他藥最效方見傷寒卷中王氏手集心臟實熱安魂定魄紫霜散子硃砂一兩半鐵粉半兩鉛白霜天竺黃甘草炙人參使君子各一錢腦子半錢研入上為末以瓷器盛每服半錢蜜水調下吉氏家傳治諸熱金花散方人參茯苓硃砂各一錢白附子大黃炒各一分蟬蛻五個蠍二個甘草半兩殭蠶七個鬱金半兩皂角水一碗煮乾為度上件為末小兒風熱疳熱膈熱赤眼口瘡用三服荊芥薄荷湯調下米飲亦得如不思食以人參湯下驚熱金銀薄荷湯下吉氏家傳金華散退小兒一切風實熱潮熱方鬱金皂角水煮天竺黃各一錢牙硝煅甘草炒各一錢硃砂一錢半上為細末每服半錢或一字薄荷蜜水調下極熱第九千金翼七水凌主大熱及金石發動金石凌不利及小兒發熱者服之方朴硝滷咸如凌者各五斤芒硝三斤如雪者滑石一斤半玉泉石石膏凝水石如雪者各一斤上七味各別搗粗篩凍淩水寒泉水各五升霜水雪水雨水各一升露水東流水各五升半上七味澄令清銅器中內上件七味散極微火煎取七升一宿澄清內瓷坩中淨處貯之以重帛系口一百二十日皆如凍凌狀成如白石英有八稜成就或大如箸有長一尺者名曰七水凌有人服金石發熱者以井華水和五分分服之一服極熱即定傷寒發熱一刀圭小兒發熱與麻子許不可多用神驗買藥不得爭價皆上好者合藥以臘月臘日為上合時以清淨處先齋七日不履穢汙喪孝産婦之家及不得令雞犬六畜産婦六根不全具及多口饒言人見之不信敬人勿與服之服藥得熱退之後七日乃慎酒肉五辛勿復喜惡口刑罰仍七日齋戒持心清淨千金翼紫雪主腳氣毒遍內外煩熱口生瘡狂叫走及解諸石草熱藥毒發卒熱黃等瘴疫毒最良方通治老小熱毒金一斤寒水石石膏磁石各三斤並碎上四味以水一石煮取四斗去滓內後藥升麻一升元參一升羚羊角屑青木香犀角屑沉香各五兩丁香四兩甘草八兩炙上八味㕮咀於汁中煮一斗去滓內硝石四升朴硝精者四升於汁中煎取七升投木器中硃砂粉三兩麝香粉半兩攪令相得寒之二日成於霜雪紫色強人服三分分服之當利熱毒老小以意增減用之一劑可十年用之千金翼元霜主熱風熱氣熱瘴熱癃惡瘡毒內入攻心熱悶服諸石藥發動天行時氣溫疫熱入腑臟變成黃膽蛇螫虎齧狐狼毒所咬毒氣入腹內攻心熱須利病出用水三四合和一小兩攪令消服之兩次久當快利兩行即瘥小兒熱病服棗許大即瘥方金五十兩磁石三斤碎石膏五斤碎寒水石六斤研如粉上四味以兩斛水煮取六斗澄清升麻元參各一斤羚羊角八兩犀角青木香各四兩沉香五兩上六味細切內上件汁中煮取二斗澄清朴硝末芒硝各六升麝香一兩後入上三味內汁中漬一宿澄取清銅器中微微火煎取一斗二升以匙抄看凝即成下經一宿當凝為雪巴黑耳若猶濕者安布上日乾之其下水更煎水凝即可停之如初畢密器貯之此藥無毒又主毒風腳氣熱悶赤熱腫身上熱瘡水漬少許綿貼取點上即瘥頻與兩服病膈上熱食後服膈下熱空腹服之卒熱淋大小便不通服一兩丸有患熱者皆宜服之痰涎第十聖惠夫小兒多涎者是風熱壅結在於脾臟積聚成涎也若涎多即乳食不下涎沫結實而生壯熱也錢乙論熱不可下云朱監簿子五歲夜發熱曉即如故衆醫有作傷寒者有作熱治者以涼藥解之不愈其候多涎而喜睡他醫以鐵粉丸下涎其病益甚至五日大引飲錢氏曰不可下之乃取白朮散方見胃氣不和門中末一兩煎藥汁三升使任其意取足服朱生曰飲多不作瀉否錢曰無生水不能作瀉縱瀉不足怪也但不可下耳朱生曰先治何病錢曰止瀉治痰退熱清神皆此藥也至晚服盡錢看之曰更可服三升又煎白朮散三升服盡得稍愈第三日又服白朮散三升其子不渴無涎又投阿膠散二服而安阿膠散方見喘嗽上氣門中錢乙附方治小兒驚風痰熱堅癖能不用水銀輕粉甚便如不得已用之僅去疾即止蓋腸胃易傷亦損口齒五關貫真珠囊小兒疾飲喉水食停積胸膈結聚成痰痰多則乳食不下吐涎壯熱熱不止即發驚癇圖經云薄荷治小兒風涎為要切之藥仙人水鑑青虛丸治陽實涎盛膈不利小兒驚風涎盛伏一切暑毒鎮心祛邪定恍惚方沒藥青黛鉛白霜連珠紫甘遂微炒膩粉各三錢生龍腦二錢水銀半兩黑鉛半兩如常法結成砂子每用三皂子大上七味合研勻水煮薄糊為丸如梧桐子大每服一丸至二丸熱極以麥門冬龍腦冷熱水化下大燥生揉薄荷自然汁入龍腦化下伏一切暑毒新汲水入龍腦化下小兒驚風金銀薄荷冷湯入龍腦化下一丸聖惠治小兒脾風多涎心胸壅悶不下乳食昏昏多睡鉛霜散方鉛霜牛黃龍腦各細研半夏湯浸七遍去滑各半分白附子炮裂馬牙硝防風去蘆頭硃砂天竺黃各細研犀角屑細辛黃芩甘草炙微赤銼各五分上件藥搗細羅為散入研了藥令勻不計時候用薑蜜溫水調下一字更量兒大小以意加減聖惠治小兒脾肺風熱膈上多涎心神昏悶少欲乳食防風散方防風人參各去蘆頭羚羊角屑甘草炙微赤銼枳殼麩炒微黃去瓤黃芩各一分半夏半分湯洗七遍去滑上件藥搗粗為散每服一錢以水一小盞入生薑少許煎至五分去滓不計時候量兒大小加減溫服聖惠治小兒心脾壅熱多涎牛蒡子散方牛蒡子梔子仁甘草微炙赤銼川硝鬱金各半兩枳殼一分麩炒微黃去瓤上件藥搗細羅為散入龍腦半錢同研令勻不計時候用薄荷水調下半錢量兒大小加減服之聖惠治小兒脾熱乳食不下胸膈多涎半夏丸方半夏半分生薑湯洗七遍去滑皂角子仁半兩上件藥搗羅為末用生薑汁和丸如麻子大不計時候以溫水下三丸隨兒大小以意加減聖惠又方上取東行牛口中沫塗於兒口內效聖惠又方上取白羊糞少許入水研取汁塗兒口中效聖惠又方上取鹿角末炒令焦更研令細以清粥飲調下一字聖惠又方上取牛噍草絞取汁少少與服之博濟方治上焦風壅化痰涎利胸膈逐風祕白龍丹雷丸末二錢甘遂末三錢龍腦少許牽牛一兩杵取末六錢不用再羅者粉霜輕粉各四錢入白麵少許三味同研令勻細滴水和作餅子於慢火煨令熟放冷再研令細上件同為細末研令勻入青州棗煮熟取肉和為丸如緑豆大每服五七丸溫漿水下如一切風癇驚搐涎滯並以漿水下七丸及至十丸如小兒痰熱及渴不止頭疼但頻少與服自然消痰大人風氣壅盛上焦不利最宜服此更在臨時酌其加減太醫局水銀扁丸子治小兒驚風壯熱涎盛喘粗或發搐搦目睛上視及因乳哺不節胸滿嘔逆精神迷悶發癇瘛瘲並宜服之水銀黑鉛同與水銀結砂子巴豆去皮心酸醋煮令黃各一兩膩粉乾蠍全者鉛白霜青黛百草霜牛黃四味研各一分香墨燒淬三錢黃明膠炙令黃燥一錢三字上為細末入研藥勻以陳粟米飯為丸如緑豆大捏扁每一歲兒服一丸二歲服二丸三歲服三丸四歲以上服四丸用乾柿湯下薄荷湯亦得更量虛實加減服利下青黏滑涎為度乳食後服此藥不得化破太醫局比金丸治小兒驚風體熱喘粗涎嗽心忪頰赤大小便不利夜臥不穩方膩粉研滑石各十五兩青黛研二兩半天南星炮十二兩半巴豆去皮取霜七百個上為細末以麵糊為丸如麻子大每服一歲一丸薄荷溫水下如急驚風頭熱足冷口噤面青筋脈抽掣上膈頑涎疾狀甚者加一兩丸煎桃符湯下疏利下蘊毒熱涎立便安愈小兒瘡疹後餘毒不解尤宜與服食後太醫局靈砂歸命丹治小兒蘊積邪熱潮熱不除頰赤口乾心膈煩躁痰涎不利睡臥不安或發驚癇涎潮搐搦又療積滯不消下利多日腹中㽱痛煩渴嘔噦服藥調和不能愈者並可服之上以妙香丸一丸分作五十丸每服二丸金銀薄荷湯下更量歲數加減如驚癇搐搦龍腦膩粉蜜湯下欲服此藥先效尤速以冷水浸少時服之妙香丸方見積熱門談氏殊聖治小兒驚悸心忪化涎痰利胸膈煩熱止咳嗽金珠丸方天南星炮白礬焙半夏湯浸七遍硃砂研細各半兩人參乾山藥各一錢膩粉二錢金箔十片上為細末薄荷汁同水打糊為丸如緑豆大金箔為衣每服一丸食後生薑湯下量力服錢乙褊銀丸治風涎膈實上熱及乳不消腹脹喘粗等方巴豆去皮心油膜研細水銀各半兩黑鉛二錢半同水銀結砂子麝香半錢別研好墨八錢研上將巴豆末並墨再研勻和入砂子麝香陳米粥和丸如緑豆大捏扁一歲一丸二三歲二三丸五歲以上五六丸煎薄荷湯放冷送下不得化破更量虛實增減並食後錢乙三聖丸化痰涎寬膈消乳癖化驚風食癇諸疳小兒一歲以里常服極妙方小青丸青黛一分牽牛末三分膩粉一錢並研勻麵糊丸黍米大小紅丸天南星末一兩生硃砂半兩研巴豆一錢取霜並研勻薑汁麵糊丸黍米大小黃丸半夏生末一分巴豆霜一字匕黃柏末半字匕並研勻薑汁麵糊丸黍米大以上百日者各一丸一晬者各二丸隨乳下錢乙鐵粉丸治涎盛潮搐吐逆方水銀砂子二分硃砂鐵粉各一分輕粉二錢天南星炮裂去皮臍取末一分上同研水銀星盡為度薑汁麵糊丸粟米大煎生薑湯下十丸至十五丸二三十丸無時錢乙銀液丸治驚熱膈實嘔吐上盛涎熱水銀半兩天南星二錢炮白附子一錢炮上為末用石腦油為膏每服一皂皂子大薄荷湯化下長沙醫者鄭愈傳小兒利膈下涎去心胸噎塞不止並咳嗽神白丸方天南星半夏湯洗七遍各半兩白殭蠶白礬生用各七分上件為末用杏仁七個去皮尖巴豆一粒同研勻再用去皮生薑汁為丸如梧桐子大陰乾每服五丸暴嗽生薑湯吞下久嗽嚼胡桃肉黃蠟各少許吞下
