body:
  text: 卷第十九諸熱痰涎凡十門胎熱第一茅先生小兒生下二七日有中胎熱候遍身黃疸腫滿眼不開作呻吟聲此候本因母受胎時身體不安而服藥牙兒在胎中受毒藥至有此候所治者先以紫龍水一日三次洗牙兒然用牛黃膏奶上吮下方見膈熱門中一日下四服如此調理三日愈如見肚膨身黃腫不退握拳眼視不治紫龍水方無錢乙論胎膽云小兒生下肌肉厚遍身血色紅滿月以後漸肌瘦目白睛粉紅色五心熱大便難時時生涎浴體法主之又云胎怯者生下面色無精光肌肉薄大便白水身無血色時時哽氣多噦目無精彩當浴體法主之又云胎熱則生下有血氣時叫哭身壯熱如淡茶色目赤大便赤黃糞稠急食乳浴體法主之更別父母肥瘦肥不可生瘦瘦不可生肥也浴體法見搐搦門中茅先生小兒中胎熱歌孩兒生下中胎熱面瞼口鼻悉皆黃此是血殂須細審忽然著病見危亡靈苑銀液丹治大人小兒一切諸風諸癇手足拘急眼目不定心煩吐逆兼治小兒胎熱攻注脾胃面色多變水瀉涎滯並皆治之黑鉛半斤煉十遍稱取三兩再於鍋內熔成汁水銀三兩投入汁中結作砂子分為數塊用絹袋子盛以甘草水煮半日候冷細研天南星三分為末膩粉一分硃砂半兩細研鐵粉將水飛過候乾稱三兩用上五味同一處研勻以麵糊為丸如緑豆大每服五丸用薄荷蜜湯下不計時候大人丸如梧桐子大薑湯下吃後微利為妙萬全方治小兒胎熱心臟氣壅煩熱驚悸硃砂丸通明硃砂龍膽去苗黃連各半兩鉛霜研入鐵粉細研各一分牛黃細研一錢上件為細末都研令勻以粟米飯和丸如緑豆大每服五丸以薄荷蜜水送下量兒大小加減膈熱第二亦名壅熱太醫局涼膈散治大人小兒腑臟積熱煩躁多渴面熱頭昏唇焦咽燥舌腫喉閉目赤鼻頜頰結硬口舌生瘡痰實不利涕唾稠黏睡臥不安譫語狂妄腸胃燥澀便溺祕結一切風壅膈熱並宜服之川大黃銼朴硝甘草爁各二十兩山梔子仁薄荷去土用葉黃芩各十兩連翹二斤半上為末每服二錢水一盞入竹葉七片蜜少許同煎至七分去滓食後溫服小兒可服半錢更隨歲數加減服之得利下住服太醫局龍石散治大人小兒上膈壅熱口舌生瘡咽嗌腫塞疼痛妨悶每用少許摻貼患處咽津小兒瘡疹毒氣攻口齒先用五福化毒丹掃後用此藥摻貼立效硃砂飛研二兩生腦子研一分寒水石燒通赤二斤上為末每日五七次用夜臥摻貼妙太醫局牛黃涼膈丸治風壅痰實蘊積不散頭痛面赤心煩潮躁痰涎壅塞咽膈不利精神恍惚睡臥不安口乾多渴唇焦咽痛頜頰赤腫口舌生瘡牛黃一兩一分研甘草十兩銼爁寒水石粉牙硝枯過細研石膏細研各二十兩紫石英細研水飛腦麝研各五兩牛膽制天南星七兩半上為末煉蜜為丸每兩作三十丸每服一丸溫薄荷人參湯嚼下食後服小兒常服半丸治急驚一丸並用薄荷水化下太醫局甘露丸治大人小兒風壅痰熱心膈煩躁夜臥不安譫語狂妄目赤鼻衄口燥咽乾療中暑解熱毒方寒水石粉二斤馬牙硝枯過三兩甘草炙銼一兩鉛白霜龍腦各三分上為細末用糯米粉為糊丸如彈子大每服用生薑蜜水磨下半丸新汲水亦得小兒一丸分五服食後太醫局硃砂丸鎮心神化痰涎利咽嗝止煩渴方硃砂飛研五十兩寒水石燒通赤研四兩腦子研牙硝枯研各一兩梅花腦子麝香各研半兩硼砂一分研甘草五斤浸汁熬成膏子上研勻用甘草膏和每兩作一百丸每服一丸含化小兒夜多驚啼薄荷水化下一丸茅先生小兒牛黃膏治膈熱及諸熱鎮心解毒方川鬱金半兩用皂角三寸巴豆七粒水一碗銚白煮乾不用皂角巴豆馬牙硝甘草炙各半兩硃砂一錢硼砂寒水石各一分腦麝隨意入上件為末煉蜜為膏許大每服一丸麥門冬熟水化下良方解暴熱化涎涼膈清頭目龍膽丸草龍膽白礬燒沸定各四兩天南星半夏各二兩半水浸切作片用漿水雪水中拌同煮三五沸焙乾取各稱二兩上為末麵糊為丸梧桐子大每服三十丸臘茶清下食後臨臥麵糊須極稀如濃漿可也應痰壅膈熱頭目昏重服之頓清嶺南瘴毒才覺意思昏悶速服便解咽喉腫痛口舌生瘡凡上壅熱涎諸證悉可服小兒尤食張氏家傳龍腦飲治小兒上膈壅熱目赤多淚方川鬱金半兩炮牙硝一兩別研肉桂生甘草炙白蒺藜炒去皮各一分上件五味為末用薄荷蜜水調下半錢或一字量兒大小加減食後臨臥日進三二服莊氏家傳初夏上焦壅熱方鉤藤紫河車白芍藥等分上為粗末每一錢水六分煎至四分去滓冷服夜臥莊氏家傳老張萬回小兒方洗心經退膈熱牛黃散子牛黃一分胡黃連三兩大黃一兩半甘草炙犀角末各半兩上為末每服半錢一字薄荷溫水調下莊氏家傳小兒鎮心涼膈硃砂膏方硃砂甘草各半錢龍腦半分人參一分上件搗為末滴水為丸如此大每服一丸用薄荷湯或竹葉湯調下王氏手集生金散治膈熱方寒水石半兩生甘草二兩炙鬱金三分乾山藥一兩上為細末每服半錢至一錢生薑薄荷湯化下食後朱氏家傳涼心臟治膈熱方草龍膽甘草炙鉛白霜白礬白藥子各等分上件為末每服半錢蜜水調下朱氏家傳治小兒心肺壅熱唇口澀面赤口乾驚熱大小便不利四時飲子山梔子仁甘草炙芍藥大黃煨各等分上件為粗散每服三錢水一盞半煎至一盞澄清溫服作二服長沙醫者丁時發傳天竺黃散治小兒上焦熱煩躁方天竺黃甘草炙硃砂研雄黃研白附子全蠍輕粉鬱金皂角水煮焙乾各一分牙硝半兩腦麝各少許上為末每服半錢薄荷湯調下蜜丸亦得胃熱第三脾熱附巢氏病源小兒胃中有熱候小兒血氣俱盛者則臟腑皆實故胃中生熱其狀大便則黃四肢溫壯翕然體熱錢乙論弄舌者脾臟微熱令舌絡微緊時時舒舌治之勿用冷藥及下之當少與瀉黃散漸服之方見本門亦或飲水醫疑為熱必冷藥下之者非也飲水者脾胃虛津液少也又加面黃肌瘦五心煩熱即為疳瘦宜胡黃連丸輩胡黃連丸方見病後虛羸門中大病未已用藥弄舌者凶嬰童寶鑑小兒胃熱歌胃熱皆因氣血強四肢溫壯小便黃表裡熱時煩躁甚渴多身體恰如湯聖惠治小兒胃中熱心腹煩悶不欲乳食麥門冬散方麥門冬去心焙赤茯苓黃芩茅根銼甘草炙微赤銼以上各半兩蘆根二分銼犀角屑一分上件藥搗粗羅為散每服一錢以水一小盞入竹葉七片煎至五分去滓不計時候量兒大小分減溫服聖惠治小兒胃中熱煩悶不欲乳食身體黃多渴栝蔞散方栝蔞蘆根銼柴胡去苗黃芩各三分川大黃炒甘草炙川芒硝麥門冬去心焙石膏各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服更量兒大小以意加減聖惠治小兒胃中熱煩悶不食蘆根散方蘆根銼茅根赤茯苓黃芩麥門冬去心焙甘草炙微赤銼以上各半兩上件藥搗粗羅為散每服一錢以水一小盞入小麥五十粒糯米五十粒生薑少許煎至五分去滓量兒大小以意加減溫服聖惠治小兒胃中熱日漸肌瘦梔子仁散方梔子仁甘草炙黃連去須黃芩以上各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小以意加減溫服聖惠又方甘草炙微赤銼川大黃銼微炒各半兩栝蔞根三分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服量兒大小以意加減嬰孺治小兒胃中熱便利赤黃而難或四五日乃便利此為胃中熱故也大黃四兩甘草一兩炙栝蔞二兩棗二個上以酒水各一升煮一升服一雞子許日進三服錢乙論瀉黃散又名瀉脾散藿香葉七錢山梔子仁一兩石膏半兩甘草三兩防風去蘆切焙四兩上銼同蜜酒微炒香為細末每服一錢至二錢水一盞同煎至五分溫服清汁無時南方多以寒水石為石膏以石膏為寒水石正與京師相反乃大誤也蓋石膏潔白堅硬有牆壁而寒水石則軟爛以手可碎外微青黑中有細紋方書中寒水石則火煅用之石膏則堅硬不可入火如白虎湯用石膏則能解肌熱破痰治頭痛若用寒水石則誤矣又有一等堅白全類石膏而方敲之亦皆成方者名方解石也代石膏用之南人有不信此説者孝忠嘗相與同就京師大藥肆中買石膏寒水石方解石三種又同詣惠民和劑局及訪諸國醫詢證之皆合此説乃信服孝忠頃編保生信效方已為辨論恐小兒尤不可誤故復見於此錢乙藿香散治脾胃虛有熱面赤嘔噦涎嗽及轉過度者藿香一分用葉半夏曲炒甘草炙麥門冬去心焙乾稱石膏各半兩上同為末每服半錢至一錢水一中盞煎至七分食前溫服活人書甘露飲子治胃中客熱口臭不思飲食或飢煩不欲食齒齦腫疼膿血舌口咽中有瘡赤眼目瞼重不欲開瘡疹已發未發並宜服熟乾地黃生乾地黃天門冬麥門冬各去心焙枇杷葉去毛枳殼麩炒去瓤黃芩石斛去苗山茵陳甘草炙各等分上為細末每服二錢水一盞煎至六分去滓溫服食後臨臥聚寶方四倍散治小兒胃熱咽喉不利發歇如瘧喘真珠末四錢生犀末二錢香附子一錢龍腦半錢上四味為細末一服一字煎桃仁湯調下乳母忌生冷孔氏家傳治小兒臟腑不調脾胃有熱大便黃色燈心一把扁竹一錢槐花一錢甘草炙二錢上水三盞同煎至一盞去滓溫冷細服風熱第四素問通評虛實論帝曰乳子而病熱脈細小者何如岐伯曰手足溫則生寒則死乳子中風熱喘鳴肩息者脈何如岐伯曰喘鳴肩息者脈實大也緩則生急則死聖惠論夫小兒心肺壅滯內有積熱因母解脫風邪傷於皮毛入於臟腑則令惡風壯熱胸膈煩悶目澀多渴故曰風熱也漢東王先生家寶小兒發熱煩叫不時面青謂之風熱錢乙論急欲乳不能食云猶客風熱傳於臍腹流入心脾經即舌厚唇燥口不能吮乳當涼心脾顱囟經治孩兒風熱側柏散方側柏鬱金天麻酒浸一宿乾蠍天南星地黃去土子芩大黃以上各半兩上為散治風及驚暖酒下退熱每夜熟水下半錢元和紀用經蜀脂飲主小兒百病服之消風涼肌解熱止煩不生瘡癤除寒熱痰涎赤目咽痛血痢渴躁長肌肉利心肺有補身體有瘡膿潰亦腫悉能療之蜀脂炙黃耆也一味末之黃耆生隴西即陽者火焦色黃白甘美生白水者冷補性隴西省最好皮赤色專主消瘡磨腫出原寧宜洲者亦佳折之若綿不斷者為上等也甘草四分之一上為末方寸匕水一升煎三分減一分三服溫涼通性大小以歲加減之一方每服水五合二説不同今以藥末隨病隨歲揆度而準之經以四味飲黑散丸至聖散五加皮治不能行麝香丸此蜀脂飲七方謂之育嬰七寶紫陽道士一方名保子七聖至寶方專為一書者此方是也聖惠治小兒風熱心膈煩悶身體壯熱嗜睡多渴羚羊角散方羚羊角屑麥門冬去心甘草炙微赤銼各三分白蘚皮川升麻茯神人參去蘆頭黃耆銼各半兩上件藥搗篩為散每服一錢以水一小盞煎至五分去滓入竹瀝半合更煎一兩沸分為二服更量兒大小以意分減溫服聖惠治小兒心肺風熱壅滯胸膈不利白蘚皮散方白蘚皮犀角屑黃芩知母防風沙參人參三味去蘆頭以上各半兩甘草一分炙微赤銼上件藥搗篩為散每服一錢以水一小盞煎至五分去滓量兒大小分減溫服聖惠治小兒肝肺風壅致心膈不利痰嗽大麻仁散方大麻仁犀角屑百合杏仁湯浸去皮尖雙仁麩炒微黃以上各半兩檳榔一分牛黃龍腦各細研一錢上件藥搗細羅為散煎生薑甘草湯調下半錢量兒大小以意加減聖惠治小兒風熱心神煩躁少得睡牛黃丸方牛黃一錢細研硃砂細研水飛過犀角屑川升麻各半兩人參防風各去蘆頭麥門冬去心焙黃芩赤茯苓甘草炙微赤銼各一分上件藥搗羅為散入研了藥更研令勻煉蜜和丸如緑豆大每