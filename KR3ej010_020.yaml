body:
  text: 卷第二十虛熱蒸疸凡九門虛熱第一錢乙論肺虛熱云唇深紅色治之散肺虛熱少服瀉白散方見喘咳上氣門中錢乙論虛實熱證云朱監簿子五歲忽發熱醫曰此心熱也腮赤而唇紅煩躁引飲遂用牛黃丸三服以一物瀉心湯下之來日不愈反加無力而不能食又下之便利黃沫錢曰心經虛而有留熱在內必被涼藥下之致此虛勞之病也錢先用白朮散生胃中津方見胃氣不和門後以生犀散治之方見本門朱曰大便黃沫如何曰胃氣正即瀉自止此虛熱也朱曰醫用瀉心湯何如錢曰瀉心湯者黃連性寒多服則利能寒脾胃也坐久衆醫至曰實熱錢曰虛熱若實熱何以瀉心湯下之不安而又加面黃頰赤五心煩躁不食而引飲醫曰既虛熱何大便黃沫錢笑曰便黃沫者服瀉心湯多故也錢後與胡黃連丸治愈方見病後虛羸門中養生必用治風勞氣冷百疾薯蕷丸並治風弦背拘倦胸滿短氣羸瘦飲食少小兒泄利多汗發熱方薯蕷三兩當歸桂去皮大黃豆卷炒熟乾地黃神麯各一兩乾薑三錢白蘞二錢甘草炙二兩八錢人參阿膠炒令白各七錢芎白芍藥白朮麥門冬去心焙杏仁去皮尖麩炒黃防風去蘆各六錢柴胡去苗桔梗白茯苓各半兩上為細末煉蜜丸彈子大濃煎棗湯空心嚼一丸日午每服有熱人即丸如桐子大空心日午米飲下二十丸止於三十丸錢乙秦艽散治潮熱減食蒸瘦方秦艽去頭切焙甘草炙各一兩干薄荷葉半兩勿焙上為粗末每服一二錢水一中盞煎至八分食後溫服錢乙治面黃頰赤身壯熱補心安神丸方麥門冬去心焙馬牙硝白茯苓乾山藥寒水石研甘草各半兩硃砂一兩研龍腦一字研上末之煉蜜丸雞頭大每服半丸沙糖水化下無時錢乙生犀散治目淡紅心虛熱方生犀二錢錯取末地骨皮自採佳赤芍藥柴胡根乾葛銼各一兩甘草炙半兩上為粗末每服一二錢水一盞煎至七分溫服食後錢乙地骨皮散治虛熱潮作亦治傷寒壯熱及餘熱方地骨皮自採佳知母銀州柴胡去蘆甘草炙半夏湯洗七次切焙人參切去頂焙赤茯苓各等分上為細末每服二錢薑五片水一盞煎至八分食後溫服量大小兒加減張渙秦艽散治肌熱病方秦艽一兩川大黃銼碎微炒黃耆赤小豆糯米各半兩上件搗羅為細末每服一錢水一盞煎至五分去滓溫服食後莊氏家傳人參犀角散治小兒榮衛不和上焦虛熱因積變為肌熱肌熱不已變為疳勞夜汗頰赤多嗽不止方人參茯苓白朮各半兩犀角柴胡去苗鱉甲醋炙甘草炙半夏薑製各一分上八味為末薑棗煎每服半錢水半盞煎至三分濾滓溫服食後莊氏家傳初秋虛熱驚悸方藿香土瓜根各二兩甘草一兩炮草豆蔻半兩上為粗末每服一錢水五分煎至三分溫服莊氏家傳治小兒因患體虛時復發熱不思飲食或多驚悸壯氣補虛黃耆丸方黃耆薄切用蜜炒黃色人參柴胡去苗淨洗干薯蕷赤茯苓各半兩黃芩小緊者生犀末各一分上件細銼焙燥搗為末煉蜜為丸如大櫻桃大麥門冬熟水磨下莊氏家傳治小兒虛熱煩渴又療因吐瀉煩渴不止及疏轉後並宜服之人參散方人參五兩茯苓八兩三錢甘草一兩煨桔梗乾葛銼生犀各半兩上為末每服一大錢水一中盞入燈心五莖同煎至六分放溫不計時候煩渴者入新竹葉孔氏家傳治童男室女潮發虛熱煩躁羸瘦方柴胡地骨皮各半兩甘草炙細辛各一分上為末二錢水一盞煎七分溫服孔氏家傳桃奴丸治心虛有熱恍惚不常言語錯亂尸注客忤魘夢不祥小兒驚癇並宜服方桃梟七枚別為末桃不成實各在枝上者桃仁十四枚去皮尖安息香以無灰酒酌多少研飛去砂石銀器中慢火熬成膏硇合貯之雄黃用桃葉煮研飛取各三分辰砂生玳瑁各一兩琥珀別研黑犀石上水磨澄去水取各半兩牛黃腦麝各一分別研上為細末和入煎膏丸如雞頭大密器封閉淨室安置煎人參湯磨下一丸食後服病去止藥未知加丸數孔氏家傳童男室女肌瘦潮熱方上用青蒿焙乾為末每服三錢甘草一寸烏梅一個小麥五十粒河水一盞煎七分溫服骨熱第二病初則骨熱病劇則骨蒸聖惠論凡小兒一歲至十歲衣絮皆不得著新綿又不得冬天以火烘炙衣服與著亦令兒體熱勿食桃杏令兒體熱因傷寒病後未滿百日勿食羊肉狗肉令兒體熱或作骨蒸也仙人水鑑小兒患骨熱勞漸漸瘦弱不能食宜服此方號神明丸子鼓子花雄黃紫石英遠志各二分檳榔一枚生桃仁去皮尖光明砂各一分研金箔一片上八味同研令細以蟾酥為丸如麻子大每日米飲下一丸忌果子博濟方治小兒骨熱晚後多發熱面赤五心煩四肢無力飲食減少夜多盜汗面色痿黃犀角散犀角鎊末柴胡去蘆頭枳殼麩炒去瓤麥門冬去心茯苓去皮芍藥大黃桑白皮黃耆人參各一分鱉甲一個九肋者醋炙令黃上件一十一味同為細末每服半錢用桃仁七個漿水煮麥門冬一十九個去心與桃仁同研令細入水一盞與藥同煎至六分去滓溫服早食後臨臥各一服亦治大人盜汗聖惠治小兒骨熱瘦瘁心神煩躁不得睡臥胡黃連散方胡黃連知母地骨皮黃芩梔子仁川升麻犀角屑甘草炙微黃銼杏仁湯浸去皮尖雙仁麩炒微黃各一分柴胡鱉甲塗醋炙令黃去裙襴各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小分減服之聖惠治小兒自小傷抱腳脛纖細無力行立不得或骨熱疳瘦柴胡飲子方柴胡去苗桃嫩枝銼各三分甘草一分微炙知母桔梗去蘆頭枳殼麩炒微黃去瓤元參川升麻鱉甲塗醋炙令黃去裙襴各半兩上件藥細銼和勻每取一分以水一中盞煎至六分去滓不計時候分為三服更量兒大小以意加減聖惠治小兒骨熱口乾煩悶不欲食飲四肢羸瘦知母飲子方知母川大黃銼碎微炒常山犀角屑枳殼麩炒微黃去瓤龍膽去蘆頭鱉甲塗醋炙令黃去裙襴各半兩甘草一分炙微赤銼柴胡三分去苗上件藥細銼和勻每取一分以水一中盞煎至六分去滓分為三服或吐瀉三兩行便安更量兒大小臨時以意加減服之聖惠治小兒骨熱黃瘦不食多臥胡蜣螂散方胡蜣螂兩枚去翅足微炒赤芍藥川大黃銼碎微炒赤茯苓枳殼麩炒微黃去瓤紫菀洗去苗土甘草炙赤銼人參去蘆頭蛇黃牛黃並細研以上各一分柴胡半兩熊膽細研生薑切燒灰各半分麝香一錢細研鱉甲一分塗醋炙令黃去裙襴上件藥搗細羅為散每服以溫水調下半錢日三服量兒大小以意加減聖惠治小兒五歲至十歲以來骨熱及手足心煩悶不欲飲食秦艽散方秦艽去苗甘草炙微赤銼各一兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服更隨兒大小以意加減聖惠治小兒骨熱體瘦心神煩躁天靈蓋散方天靈蓋一枚塗酥炙令黃黃連半兩去須上件藥搗細羅為散每服以粥飲調下半錢日三四服量兒大小加減服之聖惠治小兒骨熱煩躁黃瘦飲食無味胡黃連丸方胡黃連人參去蘆頭羚羊角屑地骨皮黃耆銼木香犀角屑甘草炙微赤銼葳蕤各一分柴胡去苗麥門冬去心焙秦艽去苗鱉甲塗醋炙令黃各半兩上件藥搗羅為末煉蜜和丸如緑豆大每服以溫水下七丸日三服量兒大小增減服之聖惠治小兒骨熱羸瘦雖食不生肌肉宜服獺肝丸方獺肝微炙人參龍膽各去蘆頭黃芩黃連去須白朮枳殼麩炒微黃去瓤鱉甲塗醋炙令黃去裙襴各半兩麥門冬一兩去心焙柴胡三分去苗桃仁二十枚湯浸去皮尖雙仁麩炒微黃上件搗羅為末煉蜜和丸如緑豆大每服溫水下七丸日三服隨兒大小加減聖惠治小兒骨熱日漸瘦弱不能飲食光明砂丸方光明砂紫石英各細研水飛過鼓子花雄黃各半兩檳榔三枚桃仁湯浸去皮尖雙仁炒微黃遠志去心各一分金箔三十片細研上件藥搗羅為末都研令勻煉蜜和丸如麻子大以粥飲下五丸日三服量兒大小增減服之聖惠治小兒骨熱宜服黃連丸方胡黃連乾蟾酒浸去骨微炙各三分麝香一分細研上件藥搗羅為末都研令勻煉蜜和丸如緑豆大每服以粥飲下五丸日三四服量兒大小以意加減張渙地骨皮湯治骨熱肌瘦方地骨皮胡黃連各一兩犀角屑桃嫩枝柴胡去苗川大黃知母鱉甲塗醋炙黃去裙襴各半兩上件搗羅為細末每服一大錢水一盞煎至五分去滓溫服食後張渙又方連艽散黃連去須秦艽去苗各一兩甘草半兩天靈蓋一枚塗酥炙黃上件搗羅為細末每服半錢粥飲調下量兒大小加減萬全方治小兒骨熱煩躁黃瘦飲食無味胡黃連丸胡黃連人參羚羊角屑地骨皮黃耆犀角屑木香甘草炙葳蕤各一分鱉甲醋塗炙令黃麥門冬去心焙柴胡秦艽並去苗各半兩上件藥搗羅為末煉蜜和丸如緑豆大每服七丸以溫水下日三服量兒大小加減服張氏家傳豬肚丸治小兒骨熱體瘦面色痿黃臍腹時痛胸膈滿悶全不入食常服退黃長肌肉進飲食解虛勞行滯利關節方南木香半兩宣州黃連生乾地黃青橘皮銀州柴胡去根及土鱉甲九肋者水煮去裙襴用童子小便炙黃各二兩上件藥搗羅為細末用豬肚一個盛藥在內緊繫定口慢火湯煮令香熟去線搗豬肚同藥令極爛丸如麻子大每服二十丸至三十丸溫米飲下日進三二服食前後皆可服莊氏家傳治小兒骨熱羸瘦方柴胡當歸上等分為末每服三錢水一盞煎八分入蜜少許或用蜜丸亦得吳氏家傳生犀角飲子治小兒至十歲肌體煩躁或夏月食桃杏不節酸熱之類或因傷寒後肌熱羸瘦或食羊肉令兒體熱或作骨蒸瘦瘁潮熱頰赤口乾五心煩躁雖能飲食食不生肌夜有盜汗甚則多令伏臥好食泥土應小兒一切蒸熱治之無不效者方羚羊角鎊便此不用犀角地骨皮紫菀去葉麥門冬去心焙秦艽去土苗大黃生用枳殼去瓤麩炒焦柴胡去蘆茯苓赤芍藥人參桑白皮不出土白者黃耆生羌活半夏湯洗十次碾成末用薑汁製作餅炙黃上為散子每服一錢水一中盞煎至五分食後夜臥去滓溫服小兒一歲至五歲每服半錢孔氏家傳治小兒骨熱漸瘦眠臥盜汗升麻散方升麻人參茯苓鱉甲酥炙甘草炙黃芩柴胡各等分上為粗末馬尾羅羅過每服半匙水一盞煎五六分去滓食後臨臥服長沙醫者鄭愈傳殺蟲去骨熱進食駐顏蝦蟆丸方蝦蟆紫斑者一個去腸爪甲用薑汁塗炙黃干別研蘆薈研鶴蝨宣連各二錢胡黃連一錢上為末取獖豬膽汁為丸緑豆大每服三丸飯飲下日進三服骨蒸第三骨熱骨蒸雖有淺深皆可通用翰林待詔楊大鄴問小兒日漸黃瘦衰弱皮膚不潤者為何答曰因胎氣虛損筋脈衰弱本因強行交會或成娠孕事出偶然或母有宿疾久冷血海氣衰羸瘦胎內自已虧傷及至養得自然尫悴此蓋由父母之遺氣若非巧憑按治之方終也積為沉疴其中或少乳多哺咀嚼之食腸胃轉轉幹慘兒少者俗號腑干長成者則呼為骨蒸本孩子夭傷蓋不精明古始通達聖情不知自古迄今已論之也太醫局生犀散治小兒骨蒸肌瘦頰赤口乾日晡潮熱夜有盜汗五心煩躁四肢困倦飲食雖多不生肌肉及大病瘥後餘毒不解或傷寒病後食羊肉體熱不除並宜服之羚羊角鎊地骨皮去土秦艽去苗並土麥門冬去心枳殼麩炒去瓤大黃蒸切焙柴胡去苗茯苓去皮赤芍藥桑白皮銼黃耆銼人參去蘆頭鱉甲湯煮去裙襴塗醋炙黃上各等分搗為粗末每服二錢水一盞入青蒿少許煎至六分去滓溫服食後兒小即分為二服聚寶方龍虎煎治癱瘓風並童男童女骨蒸勞氣倒垂楊柳枝筋粗者東南上採細銼勻槐角不種者桑枝如柳枝三味各稱一斤十月盡十二月上旬採天仙藤半斤細銼上四味合用十歲以下童男小便二斗以來同浸一宿於淨鍋內入河水一斗同小便熬不得水