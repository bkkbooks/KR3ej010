上下直點令繩中停中心在墨點上於上下繩盡頭以白圈記兩穴白圈是灸處以上是第三次點兩穴謂之四花灸兩穴各百壯三次共六穴各取離日量度度訖即下火準須三月三日又最佳疾瘥百日內慎飲食房室安心靜處將息若一月後覺未瘥復初穴上再灸以上六穴名六花今具崔知悌點穴圖自大拇指端當腳跟向後至曲身軍大橫紋當中自鼻端量向上循頭縫至腦後灸腦門禁穴循脊骨引繩頭向下至繩盡處當脊骨以墨點之合口以繩子按於口上鉤起繩子中心至鼻柱下便齊兩吻截斷將量口吻繩子展直於前來脊骨上墨點處橫量兩頭以白圈記白圈記是灸穴墨點處不是灸穴以上第一次點二穴取一繩繞項向前雙垂與鳩尾齊翻繩頭向項後以繩兩頭夾項雙垂循脊骨向下至兩繩頭盡處以墨點記之以繩子令人合口橫量齊兩吻截斷用量口吻繩子於脊骨墨點上橫量兩頭以白圈記白圈記是灸穴墨點不是灸穴以第二次量口吻繩子於第二次雙繩頭盡處墨點上直上一直量盡頭用白圈記以上是第二次點二穴此係已點成四花凡骨蒸之候所起辨驗有二十二種並依上項灸之一胞蒸小便赤黃二玉房蒸男遺尿失精女月漏不調三腦蒸頭眩熱悶四髓蒸覺髓沸熱五骨蒸齒黑六筋蒸甲熱七血蒸發赤八脈蒸急緩不調九肝蒸或時眼前昏暗十心蒸舌焦或瘡或時胸滿十一脾蒸唇焦熱或口瘡十二肺蒸口乾生瘡十三腎蒸耳乾焦十四膀胱蒸右耳焦十五膽蒸眼目失光十六胃蒸舌下痛十七小腸蒸下瀝不禁十八大腸蒸右鼻孔痛十九三焦蒸乍寒乍熱二十肉蒸別人覺熱自覺冷二十一皮蒸皮肉生雞肉起二十二氣蒸遍身壯熱不自安息用尺寸取穴法凡孔穴尺寸皆髓人身形大小須男左女右量手指中心一節兩橫紋中心為一寸艾炷大小法凡艾炷須令足三分若不足三分恐覆孔穴不備穴中經脈火氣不行即不能抽邪氣引正氣雖小兒必以中指取穴為準艾法端午日日未出以艾中以意求其似人者輒拮之以灸殊有效幼時見一書中雲爾忘其為何書也艾未有真似人者於明暗間苟以意命之而已萬法皆妄無一真者此何疑耶用火法黃帝曰松柏柿桑棗榆柳竹等木用火灸必害肌血慎不可用凡取火者宜敲石取火或水晶鏡子於日得太陽火為妙天陰則以槐木取火亦良灸後宜服治勞地黃丸地黃丸方生地黃汁青蒿汁薄荷汁童子小便好酒各二升同煎成膏入柴胡去蘆鱉甲醋炙秦艽各一兩硃砂麝香各半兩研上五味為末入膏和為丸如桐子大每服十五至二十丸溫酒下切忌生冷物盜汗第四巢氏病源小兒盜汗候盜汗者眠睡而汗出也小兒陰陽之氣嫩弱腠理易開若將養過溫因於睡臥陰陽氣交津液發泄而汗出也養生必用童男室女小兒肌瘦有汗但用平和養氣血溫藥自無虞矣用朮桂地黃當歸芎等錢乙論盜汗者睡而自汗出肌肉虛也止汗散主之方見喜汗門中遍身汗香瓜丸主之方見本門中若胃怯汗出則上至項下至臍此胃虛也當補胃益黃散主之方見胃氣不和門中錢乙論治病有等云張氏三子病歲大者汗遍身次者上至項下至胸小者但額有汗衆醫以麥煎散治之不效錢氏曰大者與香瓜丸次者與益黃散二方同見前小者與石膏湯錢乙方與諸方竹葉石膏湯並同各五日而愈遍身者盜汗也上至項下至胸者胃虛也額有汗者喜汗也五關貫真珠囊小兒盜汗候陰陽氣弱腠理易開因於眠臥陰陽氣交津液發泄故為虛汗嬰童寶鑑小兒心膈發熱時痢盜汗者多病疳也嬰童寶鑑小兒盜汗歌小兒氣血未調和腠理開舒易染疴將養過溫成盜汗早須醫理莫蹉跎玉訣小兒盜汗虛熱歌盜汗頻頻氣受傷臟中虛熱小便黃夜間發熱無時節頰赤唇乾口有瘡此患先退熱後調其氣次和臟腑故無誤也小兒形證論四十八候盜汗歌頻頻生盜汗虛熱小便黃夜臥時煩熱鳴牙腎受傷氣粗還氣細肝內要消詳此病是因傷氣非風蘊熱乃三焦不得通暢出汗恐久成驚風候先將南星丸利三焦方見傷寒變疹子門次下大青丹方見急慢驚風門中得心氣不驚恐汗不止先服防風湯一二服補氣定汗方見本門千金治少小盜汗三物黃連粉方黃連牡蠣貝母各十八銖上以粉一升合搗下篩以粉身良嬰孺方同無粉一味千金此由心臟熱之所感宜服犀角飲子方聖惠同治小兒盜汗體熱瘦瘁多驚犀角十八銖茯苓一兩麥門冬一兩半甘草炙半兩白朮炮六錢上五味㕮咀以水九合煎取四合分服加龍齒一兩佳外臺延年治小兒盜汗方麻黃根雷丸牡蠣熬各三兩甘草三兩炙乾薑一兩粱米一升上六味搗粉以粉身汗即止孫尚藥治小兒盜汗潮熱往來方南蕃胡黃連柴胡各等分上搗羅極細煉蜜和丸如雞頭大每服二丸至三丸銀器中用酒少許化開更入水五分重湯煮三二十沸放溫食後和滓服陳藏器治小兒盜汗方上用牡蠣煅赤搗為粉粉身汗止聖惠治小兒盜汗體熱咽乾犀角散方犀角屑茯苓麥門冬去心焙黃耆銼人參去蘆頭各半兩甘草一分炙微赤銼上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小以意分減聖惠治小兒體熱盜汗心煩不欲乳食黃耆散方黃耆銼硃砂細研水飛過各半兩龍腦一錢細研人參去蘆頭川升麻川大黃銼微炒甘草炙微赤銼天竺黃一分牡蠣粉一分上件藥搗細羅為散不計時候煎竹葉湯調下半錢量兒大小加減服之聖惠治小兒夜後常有盜汗黃瘦龍骨散方白龍骨牡蠣粉黃耆銼人參去蘆頭熟乾地黃甘草炙微赤銼麻黃根各半兩麥門冬一兩去心焙上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小以意加減聖惠治小兒盜汗不止咽喉多幹心神煩熱麻黃根散方麻黃根敗蒲灰麥門冬去心焙黃耆銼