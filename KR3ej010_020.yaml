芩半兩小麥半合上件藥都銼以水二大盞煎取一盞去滓不計時候量兒大小分減溫服聖惠又方生葛汁竹瀝各二合上件藥汁相和令勻不計時候服半合量兒大小以意加減聖惠治小兒熱渴不止膩粉散方膩粉一分皂角一挺不蚛可長七八寸者去黑皮塗酥炙令香熟上將皂角搗羅為末入膩粉同研令勻不計時候以溫水調下一字量兒大小以意加減聖惠治小兒熱渴久不止石蓮散方石蓮心三十枚炒令黃浮萍一分上件藥都以水一中盞入生薑少許煎至六分去滓每服半合徐徐服之看兒大小以意加減聖惠又方上用葛根半兩細銼以水一中盞煎至六分去滓不計時候分減溫服聖惠治消渴飲水過甚並小兒渴疾方黃狗膽獖豬膽各一枚上件狗膽併入豬膽內陰乾候堪丸即丸如梧桐子大每服以麝香湯下二丸小兒半丸茅先生治小兒諸渴龍涎膏方上用陰林下大螺不以多少去殼爛研入盡粉看與其螺一樣多入腦少許同研滴水為丸此大每服十丸十四丸用枇杷葉火炙去毛濃煎湯吞下以藥丸懸起當風處吹極久甚妙茅先生治小兒諸渴及疳渴及解諸般熱胡黃連散方胡黃連麥門冬子乾葛元參甘草炙枇杷葉炙去毛上各等分為末每服一錢水七分一盞生薑一片同煎五分後放蜜三五滴同煎至四分溫服如無龍涎膏此藥大妙方在前嬰孺治小兒夏天服藥大下後胃中虛熱渴欲飲水麥門冬湯方麥門冬去心甘草龍骨各四分枳實炙黃芩茯苓人參各三分上以水四升煮取一升半為三服服此湯後渴不瘥取水芹煮濃汁飲之間湯湯服之甚者恣意與之服嬰孺治小兒渴不止方上取冬瓜炮過杵絞汁一升量大小與之服嬰孺治小兒壯熱渴兼嘔不止蘆根飲子方生蘆根切五合淡竹青皮人參各八分桔梗五分知母十分粟米三合上以水五升煮之一升半量兒大小與之服嬰孺治小兒熱渴或吐下後虛熱渴栝蔞湯方栝蔞五分黃芩三分知母蘆根各二分生米一合生麥門冬三分去心上切以水五升煮二升如飲漿水度服之嬰孺治小兒夏天服藥大下後胃中虛熱渴唯飲水麥門冬方麥門冬四分去心甘草黃芩各三分龍膽二分乾葛六分上以水四升半未食溫分三服服此不瘥取水芹煮濃汁恣與飲勿禁節之嬰童寶鑑治小兒渴不止腹急身熱浮水散方蝸牛二七個甘草水洗草龍膽一兩末以蝸牛搜作餅子後陰乾上件為末每服一捻許浮水與飲只一服效小方脈論治渴先下淋藥方鬱金滑石各一兩旱蓮子半兩上件為末每服半錢煎蔥湯調下急進三服涼心藥小方脈論欲止渴以涼心臟藥方烏賊魚骨海浮石各一兩蒲黃炒半兩上件為末每服半錢用枇杷葉煎湯下莊氏家傳小兒疳渴及大人酒渴方枇杷葉去毛炙赤者甘草炙乾薑炮桑白皮上等分為末每服一錢熟水調服莊氏家傳小兒因疾而致渴甚者疾未除不免與水水須入烏梅陳小麥煎水與雖多飲無害即化入小便而出不攻大腸矣莊氏家傳治小兒渴疾方龍膽半兩洗生為末熊膽一錢托胎五個生細研上件三味一處每服一字用井花水三合調下孔氏家傳治小兒消渴方上取熟瓜切作二片去青並子用手取瓤以水調瓜瓤飲之立愈吉氏家傳治小兒虛渴方藿香甘草炙馬牙硝苦參各一錢乾葛二錢上件為末每服一錢水五分煎至四分溫服吉氏家傳治虛渴調中散方人參白朮各半錢肉桂犀角藿香甘草炙各一錢上件為末每服半錢棗湯調下吉氏家傳潤肺止渴紫蘇丸方紫蘇白梅肉各五兩官桂三分上件為末煉蜜丸如雞頭大每服一丸含化吉氏家傳治渴塗唇瑞蓮膏方旱蓮子心浮石乾葛海螵蛸蒲黃各等分上件為末煉蜜為膏逐時丸如緑豆大極渴煎枇杷葉湯下看兒大小加減小渴可只塗唇上長沙醫者丁時發傳治小兒大人渴方上用枇杷葉三兩去毛燒灰為灰汁要一大盞入桑白皮二寸同煎七分溫服日五七服長沙醫者鄭愈傳治渴不止蓮房飲子方蓮房紫蘇乾葛各一分木香一分甘草炙草果子各三分上為粗末以水一碗煎至七分濾滓溫服聖惠灸治小兒飲水不渴面目黃者只陽剛二穴各一壯在第十椎下兩傍各三寸陷者中炷如小麥大黃疸第八胎疸附巢氏病源小兒黃疸病候黃疸之病由脾胃氣實而外有溫氣乘之變生熱脾與胃合候肌肉俱象土其色黃胃為水穀之海熱搏水穀氣蘊積成黃蒸發於外身疼膊背強大小便澀皮膚面目齒爪皆黃小便如屋塵色著物皆黃是也小便宣利者易治若心腹小便澀者多難治也不渴者易治渴者難治脈沉細而腹滿者死也巢氏病源小兒胎疸候小兒在胎其母臟氣有熱熏蒸於胎至生下小兒體皆黃謂之胎疸也錢乙論黃相似云身皮目皆黃者黃病也身痛膊背強大小便澀一身盡黃面目指爪皆黃小便如屋塵色著物皆黃渴者難治此黃疸也二證多病於大病後別有一證不因病後身微黃者胃熱也大人亦同又有面黃腹大食土渴者脾疳也又有自生而身黃者胎疸也古書云諸疸皆熱色深黃者是也若淡黃兼白者胃怯胃不和也嬰童寶鑑小兒百日黃疸歌百日孩兒急發黃非干溫疫與時殃當來只為胎中熱慎莫交人灸作瘡千金翼秦王九疸散兼治大人小兒方胃疸食多喜飲梔子仁主之心疸煩心心中熱茜根主之腎疸唇乾葶藶子主之熬脾疸尿赤出少惕惕恐栝蔞主之膏疸飲少尿多秦椒瓜蒂主之椒汁膏一作肺舌疽渴而數便鍾乳主之肉疸小便白凝水石主之研髓疸目深多嗜臥牡蠣澤瀉主之肝疸胃熱飲多水激肝白朮主之上一十一味等分隨病所在加半搗篩為散飲服五分匕日三稍稍加之方寸匕兒小者量與之茅先生治小兒面黃腫方瓜蒂半兩丁香一錢上為末每服一字搐入鼻中取下黃水從鼻中出然後用天竺黃散與服方見實熱門中茅先生治小兒遍身二十四般疸毒方屋下乘漏泥灶心土白繕土寒水石上四味等分每用為末使雞子清調塗便沒此患先用實積牛黃丸通下方見實熱門中後補常服天竺黃散方見同前嬰孺治小兒身體面目悉黃此是榮衛氣伏熱於內所為蠐螬丸方干蠐螬大棗取肉各一升蟅蟲虻蟲杏仁各半升地黃十兩黃芩芍藥各三兩水蛭一百個甘草炙半斤又云半升上為末煉蜜丸小豆大酒下三丸日三張渙治小兒黃疽雙連丹方川黃連去須胡黃連各一兩上件搗羅為細末用黃瓜一枚去瓤留一小蓋子入藥末後以蓋子蓋定用麵裹慢火燒令面焦去面搗熟丸緑豆大每服七粒至十粒溫水下量兒大小以意加減惠眼觀證治黃疸水腫丁香散方丁香七粒瓜蒂四十九個硇砂一分上為末令細黃昏時蘘荷根丁子點藥入鼻搐之一更時腥臭水出漸膿至五更水盡一夜三五遍換丁子次日調氣至日夜依前用之五夜爛肉落方住藥以烏犀膏方見風熱門中吃一月日惠眼觀證治小兒黃疽遍身虛腫其色如金藿香散方藿香一分瓜蒂四十九個赤小豆四十粒上為末每服一字半搐入兩鼻中須臾黃水出至二更待頭痛即住次日自腰以上黃退白色惠眼觀證截腰下黃色大青飲子方大青燕口連翹甘草炙黃芩田藍如皂角子川芎各等分上為末每服一大匙水一碗半煎至半碗一日之內作六服須臾小便下如金色如此吃五日吉氏家傳治小兒身體黃及小便黃眼白睛黃即是疸也宜此方茵陳大黃各一分山梔子仁三個朴硝一分上以水五合煎二合去滓服之吉氏家傳又方桑白皮麻黃去節秦艽各一分大黃二分上以水三合入牛乳三合同煎二合半一歲兒日服一合吉氏家傳又方茵陳二分大黃秦艽各三分山梔子仁郁李仁別杵如泥朴硝各四分上件末蜜丸梧桐子大熟水化下長沙醫者鄭愈傳治疸時行身熱遍體黃升麻散方升麻甘草炙各二錢常山一分上為末每服半錢棗子一個水八分同煎四分隔宿露了天明早晨服奶母忌毒物黑疸第九千金翼治大人小兒黃疸變成黑疸醫所不能治方上用土瓜根搗取汁一升頓服之病當從小便出小兒分減服葛氏亦治小兒四歲發黃千金翼治大人小兒黃黑等疸方當歸三兩桂心六兩干棗一十七枚去核麥門冬一升去心大黃一兩茵陳黃芩黃耆一本無乾薑茯苓芍藥黃連石膏碎人參甘草炙各二兩上一十五味㕮咀以水一斗煮取三升半分四服小兒分減服千金翼赤苓散主黑疸身皮大便皆黑通治大人小兒方赤小豆三十枚茯苓切女萎各六銖雄黃一銖瓜丁四銖甘草炙二銖上六味以水三升煮豆茯苓取八合搗四味為散和半錢匕服之須臾當吐吐即愈亦主一切黃小兒服半字匕
