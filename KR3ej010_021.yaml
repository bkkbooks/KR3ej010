body:
  text: 卷第二十一諸寒羸瘦凡十六門胎寒第一巢氏病源小兒胎寒候小兒在胎時其母將養取冷過度冷氣入胞傷兒腸胃故小兒生之後冷氣猶在腸胃之間其狀兒腸胃冷不能消乳哺或腹脹或時谷利令兒顏色青皅時啼者是胎寒痛也千金翼論兒生有胎寒則當腹痛痛者躽啼時時吐哯或腹中如雞子黃者按之如水聲便沒沒已復出此無所苦爾宜早服當歸丸方見躽啼門千金方同黃耆散即愈方闕茅先生有小兒初生下一日胎寒候口舌冷腹虛鳴面臉青色吃乳有妨此形候本因受胎六個月日母有疾被伏熱往來牙兒胎中飲熱血故受胎疾之病治者先以硃砂膏方見驚門中奶上吮下然後用鎮心丸方見一切驚門磨與相夾用之一日下四服至晚有紅涎通利即下勻氣散方見胃氣不和門中二服治之即愈如見都不進奶及肚膨脹手握拳目微視面黑色死候不治此茅先生一證用涼藥為母伏熱往來兒飲熱血後茅先生歌中卻云風邪夾冷巢氏病源始云母取冷過度冷氣入胞又云兒腸胃冷不能消乳巢氏病源與茅先生有不同處宜審處之慧眼觀證凡生下中胞寒其候本因受胎六七個月母有疾被寒熱往來或傷冷毒兒在胎中飲血故受胎積所以生下口冷腹脹以大驚丸方見一切驚門中研與牙兒吃及參苓散方見胃氣不和門中服之養其氣茅先生有小兒中胎寒歌人中鼻下有青色乳見難消痢色同衣薄中寒如是此風邪夾冷上來攻聖惠治小兒胎寒聚唾弄舌躽啼反張怒驚當歸散方當歸銼微炒細辛黃耆黃芩龍骨細研桂心赤芍藥一兩半上件藥搗羅為散每服以乳汁調下一字日三服更看兒大小以意加減服之妙嬰孺治少小大便青不欲食皆是胎寒當歸丸方當歸人參芍藥芎各三分甘草四分上為末乳汁和先食服麻子大一丸日進三服未知稍加之嬰孺治少小胎寒大人虛冷內或有實不可吐下虛冷服礬石丸方上用馬齒礬石燒汁盡為末棗膏丸大人服梧桐子大二丸小兒以意減之心腹中溫暖為度有實實去無實下自斷神良嬰孺治少小胎寒腹痛大便青芎丸方芎麝香芍藥當歸各二分黃耆蟅蟲各三分炒牛黃一分上為末蜜丸二三日兒胡豆大一丸不知稍加之一方有甘草無人參嬰孺治小兒胎寒腹中㽱痛黃耆湯方黃耆黃芩芍藥各六分當歸二分甘草芎各四分生薑八分上以水五升煮一升五合去滓百日兒半合分三服虛寒第二錢乙論腎虛若兒本虛怯由胎氣不成則神不足目中白睛多其顱即解囟門也面色㿠白此皆難養縱長不過八八之數若恣色欲多不及四旬而亡或有因病而致腎虛者非也又腎氣不足則下串蓋骨重惟欲墜於下而縮身也腎水陰也腎虛則畏明皆宜補腎地黃丸主之方見本門張渙論小兒脾胃虛弱不能飲食或經諸大病已漸損傷榮衛致令肌體羸瘦時時下痢面色青白變成虛羸病宜用丁香黃耆散方見本門錢乙地黃丸方熟乾地黃焙稱八錢山茱萸乾山藥澤瀉牡丹皮白茯苓去皮各三分上為末煉蜜和丸如梧桐子大三歲以下一二丸至三丸溫水空心化下張渙丁香黃耆散方綿黃耆銼丁香人參去蘆頭當歸洗焙乾白朮炮鱉甲塗醋炙黃去裙襴各一兩胡黃連甘草炙各半兩上件搗羅為細末每服一錢水一盞入生薑二片棗二枚同煎五分去滓溫服食前惠眼觀證附子散治吐瀉及傷寒脾虛腹熱或手足冷虛汗不已喉內虛喘此藥能回陽一名回陽散附子炮去皮尖北前胡甘草人參桔梗各半兩麻黃去節一兩上為末隨大小加減每服半錢至一錢淡淡薑湯調下此藥能補虛寶童方治腹內虛鳴烏藥丸天台烏藥蒼朮各二兩細銼炒令黃色用木香甘草各一分肉豆蔻二枚上為末醋糊為丸如此大每服七丸至十丸薑炒蔥酒下劉氏家傳水仙丹童男室女一切損病皆可服好辰砂四兩細研水飛過上用白芨一兩木通半兩白蘞半兩清麻油四兩將上件藥三味同熬用文武火時以箸點藥在水中候油暈不致散漫即去藥存油攤冷旋旋取和前項硃砂末一如面劑候和成即用新水一盆揉皂角在內將和成硃砂洗去油為度別用淨器以新水浸之每服五七丸至十丸旋丸如梧桐子大水一日一易上用濕紙蒙蓋以防塵土治男子丈夫婦人及童男室女五勞七傷一切損病骨蒸瘴癘三消水腫腳氣癱瘓凡藥不能效者悉能治之張氏家傳三洞白丹治脾胃重傷虛羸短氣泄瀉痢疾水穀不化全不入食脾胃欲絶服之見效如神琥珀砒一分研如粉白石脂一兩研上同研令勻膩以糯米煮漿拌勻為丸如大陰乾令透排鋪新瓦上安紅熟炭排滿煅成灰放冷取出大人每服三粒甚者五粒各以清飯下小兒用小丸子服了忌吃熱物半時吉氏家傳和氣散小兒或面青黃手足逆冷不思食方厚朴半兩薑煨人參茯苓甘草炮各一兩茴香二錢上件為末加減用水煎長沙醫者鄭愈傳治虛寒吐瀉或取轉後皆可服補藥人參茯苓各二錢硫黃半錢訶子肉一分上為末每服半錢水一小盞薑棗同煎六分連進二服忌生冷胸中有寒第三巢氏病源胸膈有寒候三焦不調則寒氣獨留膈上不通則令兒乳哺不得消下嗌酸臭胸脹痞滿甚則氣息喘急聖惠治小兒胸膈有寒或時嗽逆不欲乳食訶梨勒散方訶梨勒一兩煨用皮白朮五味子麥門冬去心焙白茯苓甘草炙微赤銼人參去蘆頭陳橘皮湯浸去白瓤焙各半兩細辛一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服更量兒大小加減服之聖惠治小兒胸中有寒多吐清水不能乳食人參散方人參去蘆頭厚朴刮去皺皮塗薑汁炙令香熟陳橘皮湯浸去白瓤焙當歸丁香白朮各半兩上件藥搗粗羅為散每服一錢以水一小盞入生薑少許同煎至五分去滓不計時候溫服量兒大小以意增減聖惠治小兒胸中有寒乳哺不消腹中痞滿逆不能乳食肉豆蔻散方肉豆蔻人參去蘆頭白朮白茯苓藿香甘草炙微赤銼木香厚朴刮去皺皮塗生薑汁炙令香熟訶梨勒煨用皮各半兩乾薑炮裂銼半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服日三服量兒大小加減之服聖惠治小兒胸中有寒氣逆嘔吐溫膈散方人參去蘆頭丁香草豆蔻去皮甘草炙微赤銼陳橘皮湯浸去白瓤焙各一分訶梨勒半兩煨用皮上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服更量兒大小加減服之聖惠治小兒胸中寒氣積滯氣逆不下乳食草豆蔻散方草豆蔻三枚去皮人參前胡各去蘆頭檳榔炙一分訶梨勒半兩煨用皮甘草半兩炙微赤銼上件藥搗粗羅為散每服一錢水一小盞煎至五分去滓不計時候溫服更量大小以意加減聖惠治小兒胸中寒氣結塞不通時欲嘔吐前胡散方前胡人參各去蘆頭白朮陳橘皮湯浸去白瓤焙高良薑銼厚朴去皺皮塗生薑汁炙令香熟藿香各用一分甘草半分炙微赤銼上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服更量大小以意加減談氏殊聖方渾身壯熱四稍寒與食千般總不看多睡沉沉饒眼澀遍身如粟怯衣單都緣冷氣攻心肺乾嘔時時乳不餐桔梗白朮白附子水銀調合永身安術靈丹白朮微炒苦桔梗各半兩香附子一分半黑錫砂一分水銀並錫各半結者上併為末次入肉豆蔻末二錢和麵三錢同煮糊為丸如緑豆大每服三丸空心乳食前溫水下日三服忌毒物嬰孺治小兒胸中冷氣停結方黃耆三分當歸芍藥甘草炙人參芎細辛各二分上切以水二升煮取一升一服一合日進三服夜一服胸膈滿痛第四巢氏病源小兒胸脅滿痛候看養小兒有失節度而為寒熱所傷寒氣入腹內乘虛停積後因乳哺冷熱不調觸於宿寒與氣相擊不散在於胸膈之間故令滿痛也五關貫真珠囊小兒氣痛候因生冷所傷而成只在臍上下左右痛是氣宜木香散治之方見本門千金治少小脅下有氣內痛喘逆氣息難往來寒熱羸瘦不食馬通粟丸方馬通中粟十八銖杏仁湯浸去皮紫菀細辛各半兩石膏秦艽半夏湯浸七遍茯苓五味子各六銖上九味末之蜜丸如小豆十丸日三服不知加至二十丸五關貫真珠囊木香散順氣寬中治胸脅痞塞心腹刺痛脅肋脹滿飲食減少吞酸嘔逆噎悶一切氣疾並皆治之木香青橘皮各三兩薑黃麥蘖去土炒各五兩蓬莪朮四兩甘草銼炒鹽炒各十一兩上為末每服一錢沸湯點服不計時候外臺甲乙經灸法勞宮一名五里在掌中動脈灸二壯主熱病發熱滿而欲嘔噦三日以往不得汗怵惕胸脅痛不可反側咳滿溺赤大便血衄下吐嘔吐血氣逆噫不止嗌中痛食不下善渴口中爛掌中熱風熱善怒中心善悲纍嘔噓唏善笑不休煩心咳寒熱善噦少腹積聚小兒口中腥臭胸脅支滿黃疸黃目心痛第五聖惠夫小兒心痛者本非起於心即邪客於心主之脈夫少陰者心也五臟六腑之所主也精神之所舍其臟堅固邪不能幹干之即傷心傷心即神去神去即死矣故諸邪在於心者皆在於心包絡脈包絡者心之別脈也故少陰不病夫心痛者邪氣上逆痞而不散或傷寒氣邪冷搏於經絡故發心痛也茅先生論小兒生下五個月日上至七歲有結癖在腹成塊如梅核大來去或似卵大常叫疼痛不住者亦分數類在心頭痛者為抱心氣在左脅下痛者為痃氣在右脅下痛者為癖氣在臍下痛者為吊氣在心頭痛者下金鈴散方見本門中夾勻氣散與服方見胃氣不和門中在右脅下痛者下蓬莪朮散夾健脾散與服在臍下痛者下藝臺散夾茴香散與吃即愈如見面黑眼花瀉黑血鼻口冷手足冷不進食死余方並見痃癖吊氣本門中注嬰童寶鑑云小兒悒心啼有時歇者心痛嬰童寶鑑云小兒心痛是邪氣攻於胃管也葛氏肘後小兒卒心痛腹脹堅如石滿氣喘息方上以好鹽如雞子大漿水三升煮取三沸內攪消取半分為三服神驗大良外臺範汪芫花湯主卒心痛連背背痛連心心腹並懊痛如鬼所刺絞急欲死者芫花大黃各十分上搗下篩取四方寸匕著二升半苦酒中合煎得一升二合頓服盡須臾當吐吐之便愈老小從少起此療強實人良若虛冷心痛恐未必可服外臺千金療老小卒中惡心痛方苦參三兩好酸醋一斤半上二味以醋煮苦參取八合強人頓服老小二服聖惠治小兒心痛但覺兒將手數數摩心腹即啼是心痛不可忍宜服芍藥散方赤芍藥人參去蘆頭白朮黃芩川大黃微炒銼當歸以上各一分上件搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減溫服聖惠治小兒心痛手足不和木香散方木香白朮桔梗赤茯苓各一分高良薑半分上件藥搗粗為散每服一錢以水一小盞煎至五分去滓稍熱頻服量兒大小以意加減聖惠治小兒心痛不可忍桃仁散方桃仁湯浸去皮尖雙仁麩炒微黃赤芍藥桔梗桂心以上各半兩甘草一分炙微赤銼上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小以意加減聖惠治小兒心痛發歇不定蓬莪朮散方蓬莪朮人參去蘆頭桂心黃芩木香地黃甘草炙微赤銼以上各一分上件藥搗細羅為散每服不計時候以橘皮湯調下半錢量兒大小以意加減服之聖惠治小兒心痛不止桂心散方桂心當歸銼微炒梔子仁各半兩上件藥搗細羅為散每服不計時候以橘皮湯調下半錢量兒大小以意加減茅先生治小兒心痛金鈴散金鈴子炮去皮稜蓬莪朮炮各一兩茴香木香炮荊三稜炮各半兩上件為末每服一錢半錢用熱酒調下張氏家傳治男子女人小兒脾疼久腫心氣痛患木香兩塊如一皂子大丁香三七粒乳香半塊如一皂子大胡椒四十九粒巴豆去皮不出油斑蝥去皮頭足翼各二七個五靈脂一塊中指大上七