件藥搗羅為末煉蜜和丸如麻子大不計時候以粥飲下五丸量兒大小以意加減聖惠治小兒羸瘦體熱心神煩悶小便赤黃宜服秦艽丸方秦艽去苗桑皮銼枳殼麩炒微黃去瓤地骨皮黃耆銼人參去蘆頭赤茯苓甘草炙微赤銼犀角屑各半兩龍膽去蘆頭一分柴胡三分去苗上件藥搗羅為末煉蜜和丸如緑豆大不計時候用粥飲下五丸更隨兒大小加減聖惠治小兒雖食不著肌膚羸瘦骨熱小便赤黃麥門冬丸方麥門冬去心焙一兩人參黃耆銼青蒿子黃連去須桑皮枳殼麩炒微黃去瓤地骨皮各半兩柴胡去苗三分上件藥搗羅為末煉蜜和丸如緑豆大不計時候以熟水研下五丸量兒大小以意加減聖惠治小兒羸瘦體熱乳食全少宜服燒黃瓜丸方黃瓜大者一枚陳皮湯浸去白瓤焙黃連去須各半兩鱉甲童子小便浸三宿炙微黃去裙襴胡黃連柴胡去苗各一兩上件藥搗細羅為散以黃瓜切開頭去瓤內藥末令滿以切下蓋子蓋之用蕎麥麵和溲固濟可厚三分於塘灰火內燒令面焦黃為度取出去面放冷入麝香一錢都研和丸如緑豆大每服食前米飲下七丸更量兒大小以意加減聖惠治小兒脾氣不和食少無力肌膚羸瘦溫脾散方訶梨勒皮人參去蘆頭各三分白朮木香黃耆銼白茯苓藿香陳皮湯浸去白瓤焙桔梗去蘆頭各半兩甘草炙微赤銼一分上件藥搗粗羅為散每服一錢以水一小盞入生薑少許棗一枚煎至五分去滓不計時候量兒大小增減溫服聖惠治小兒脾胃久虛吃食減少四肢羸瘦五香煎方丁香沉香木香藿香白朮各一兩麝香三錢細研入白茯苓陳皮湯浸去白瓤焙黃耆銼各一兩訶梨勒皮甘草炙微赤銼各半兩上件藥搗篩為散以水五升慢火煎至一升以布絞汁卻入鍋內煎麝香及蜜三合生薑汁半合棗肉二十枚慢火熬成膏每服以粥飲調下半茶匙量兒大小以意加減嬰孺治小兒羸瘦食進少不生肌肉下焦冷雞骨丸宿黃雌雞取胸前及脅骨一具淨去肉令乾酒浸一宿炙令黃甘草小草各炙三分蜣螂五個炙桔梗白朮茯苓芍藥各四分人參黃芩各五分檳榔六分上為末蜜丸小豆大三歲兒十五丸日再服嬰孺治小兒胃氣不調不嗜食不生肌肉大黃丸方大黃乾地黃茯苓當歸柴胡杏仁各三分上為末蜜丸麻子大飲下五丸日進三服張氏家傳解小兒肌熱或時泄瀉及有積滯不思飲食肌肉消瘦宜服豬肚丸鱉甲一兩用童子小便並醋共一升熱浸炙盡為度白朮薯蕷各一兩胡黃連人參去蘆頭青橘皮紫菀去土桃仁去雙仁湯浸去皮尖木香甘草炙各半兩柴胡去蘆頭一兩一分上件藥搗羅為末入在淨豬肚內系定煮令極爛為度出與藥同杵令黏丸如梧桐子大每服二十三十丸不計時候溫水飲下張氏家傳香甲丸治男子婦人童男室女氣血虛疏肌膚消瘦百節痛潮作溫五心煩熱四肢逆冷可思飲食中滿氣滯婦人經血凝澀建脾胃暢神氣充肌膚澤顏色柴胡生乾地黃荊三稜各三分鱉甲醋煮黃神麯炒杏仁熟乾地黃麥蘖炒各一兩牛膝木香薑黃當歸各半兩白朮芎各一分上為細末白麵糊丸如梧桐子大每服十丸空心茶清下或米飲亦得聖惠灸法小兒羸瘦食飲少不生肌膚灸胃俞穴各一壯在第十二椎下兩旁各一寸半陷者中炷如小麥大嬰童寶鑑灸三壯病後虛羸第十四巢氏病源小兒虛羸候此謂小兒經諸大病或驚癇或傷寒或溫壯而服藥或吐利發汗病瘥之後血氣尚虛脾胃猶弱不能傳化穀氣以榮身體故氣力虛而羸也錢乙論虛羸云脾胃不和不能乳食致肌瘦亦因大病或吐瀉後脾胃尚弱不能傳化穀氣也有冷者時時下痢唇口青白有熱者溫壯身熱肌肉微黃此冷熱虛羸也冷者木香丸主之夏月不可服如有證則少服之熱者胡黃連丸主之冬月不可服如有證則少服之二方並見本門錢乙論用藥識證云鄭人齊郎中者家好收藥散施人其子忽臟熱齊自取青金膏三服並一服而服之服畢至三更瀉五行其子困睡齊言曰睡多亦驚又與青金膏一服又瀉二行加口乾而身熱齊言尚有微熱未盡又與青金膏其妻曰用藥十餘行未安莫生病否召錢氏至曰已成虛羸先多煎白朮散時時服之方見胃氣不和門中後用香瓜丸方見盜汗門中十三日愈外臺千金療少小傷寒久病不除差復劇羸瘦骨出五味子湯方五味子十銖大黃六銖麥門冬六分去心芒硝五分石膏一分甘草炙當歸黃芩黃連前胡各一分上十味切以水三升煮取一升半分服二合下利即止增減量之效錢乙木香丸木香青黛別研檳榔豆蔻去皮各一分麝香別研一錢半隨續子去皮一兩蝦蟆三個燒存性上為細末蜜丸緑豆大每服三五丸至一二十丸薄荷湯下食前錢乙胡黃連丸方胡黃連黃連各半兩硃砂別研一分上以上二物為細末研入硃砂末都填入豬膽內用淡漿水煮以杖子於銚子上用線釣之勿著底候一炊久取出研入蘆薈麝香各一分飯和丸如麻子大每服五七丸至三二十丸米飲下食後病後聲不出第十五錢乙論腎怯失音相似病吐瀉及大病後雖有聲而不能言又能咽藥此非失音為腎怯不能上接於陽故也當補腎地黃丸主之方見虛寒門中失音卒病耳吉氏家傳小兒患後聲不出方酸棗仁去殼一錢白茯苓半錢硃砂二錢上件為末丸如大每服一丸人參湯下病後不能語第十六聖惠治小兒諸病後六七歲不能語雞頭丸方雄雞頭一個燒灰蟬三枚微炒甘草炙微赤銼遠志去心木通銼各半兩麥門冬去心焙人參去蘆頭各一兩當歸銼微炒黃耆銼芎藭各三分上件藥搗羅為末煉蜜和丸如緑豆大每服以粥飲下五丸量兒大小加減不計時候服之錢乙附方同云久服取效雞蟬二物宜求死者用之不可旋殺孫真人所謂殺生求生去生更遠不可不知也
