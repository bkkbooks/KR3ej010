芩各二分葶藶四分炒上為末蜜為丸小豆大一丸日進三服千金附方治小兒食不知飢飽方上用鼠屎二七枚燒為末服之丁奚第九巢氏病源小兒大腹丁奚候小兒丁奚病者由哺食過度而脾胃尚弱不能磨消故也哺食不消則水穀之精減損無以榮其氣血致肌肉消瘠其病腹大頸小黃瘦是也若久不瘥則變成谷症傷飽名哺露病一名丁奚三種大體相似輕重立名也五關貫珍珠囊小兒丁奚謂之鼓槌鶴膝候凡小兒或因吐而瀉久不瘥或病退不能行膝大腸紅號曰丁奚七歲以下號鼓槌風十五以下名鶴膝風蓋此並是風冷傷於腎所致腎主骨故也莊氏家傳疳肚丁奚辨證云小兒腹大如有青筋見即曰疳肚也如無青筋乃名丁奚是因過飽傷食而得之嬰童寶鑑小兒丁奚歌腹高頸細體痿蕤精彩全無只愛啼久病谷症脾胃裹小兒如此號丁奚葛氏肘後若患疳氣大腹瘦弱方上搗生薤根以豬脂煎稍稍服之葛氏又方上用熟炙鼠肉若伏翼肉哺之本草亦治哺露葛氏肘後小兒丁奚癥癖黃瘦發脫等病方代赭研大黃硃砂研各四分龜甲炙三分芍藥青木香杏仁去皮熬別研巴豆去心皮別研熬知母各二分上搗篩蜜丸百日兒服如胡豆大二百日兒服如小豆大三百日兒如大豆四百日兒如梧桐子每服微下為限大效千金仙人玉壺丸治小兒羸瘦丁奚不能食食不能化方雄黃藜蘆丹砂礜石一方用礬石巴豆去皮膜各二兩萬全方止用各一兩八角附子炮裂去皮臍二兩萬全方卻用三兩上六味先搗巴豆三千杵次用礜石又搗三千杵次內藜蘆三千杵次內附子三千杵次內雄黃三千杵次內丹砂三千杵內蜜又搗萬杵佳若不用丹砂者內真珠四兩每內藥輒治五百杵內少蜜恐藥飛揚治藥用王相吉日良時童子齋戒為良天晴明日無雲霧白晝藥成密器中封之勿泄氣著清潔處小兒百病驚癇痞塞及有熱百日半歲者以一丸如黍米小兒乳頭與服之一歲以上如麻子一丸日三以飲服小兒大腹及中熱惡毒食物不化結成積聚服一丸小兒寒熱頭痛身熱及吐哯服一丸如麻子大小兒羸瘦丁奚不能食食不化漿水服二丸日三又苦酒和如梧子敷腹上良聖惠治小兒丁奚骨中微熱腹內不調食不為肌膚或苦寒熱腹大雞骨丸方雄雞骨一具炙令黃赤芍藥半兩赤茯苓半兩嬰孺用一兩石膏細研水飛過川大黃銼碎微炒紫菀洗去苗土各半兩嬰孺各用五分陳橘皮半兩湯浸去白瓤嬰孺用三分白礬燒灰細辛洗去苗土附子炮裂去皮臍各半兩黃芩甜葶藶隔紙炒令香各三分桂心三分嬰孺用二分上件藥搗羅為末煉蜜和丸如麻子大每服以粥飲下五丸日三服更量兒大小以意加減嬰孺方同但分兩殊仍云康氏方聖惠治小兒丁奚癥癖黃瘦發脫代赭丸方代赭細研川大黃銼碎微炒硃砂細研水飛過各半兩鱉甲半兩塗醋炙令黃去裙襴嬰孺用三錢三字巴豆霜半分嬰孺用一分赤芍藥木香知母杏仁湯浸去皮尖雙仁麩炒微黃各一分上件藥搗羅為末都研令勻煉蜜和丸如麻子大每服以粥飲下二丸更量兒大小加減服之日一二服以溏利為度嬰孺方同專治癥癖聖惠治小兒丁奚雖食不生肌肉腹大食不消化宜服赤芍藥丸方赤芍藥川大黃銼碎微炒鱉甲塗醋炙令黃去裙襴各三分桂心赤茯苓柴胡去苗各半兩上件藥搗羅為末煉蜜和丸如麻子大每服煎蜜湯下五丸日三服聖惠治小兒丁奚肚大青脈起不生脂肉四肢乾瘦頭大發黃麝香丸方麝香細研肉豆蔻去殼乾蟾塗醋炙令黃夜明砂地龍並微炒各一分硃砂細研水飛過五靈脂各半兩白礬灰一分蜣螂三枚去翅足炙令熟上件藥搗羅為末都研令勻煉蜜和丸如綠豆大每日空心以溫水下五丸晚再服量兒大小以意加減聖惠治小兒丁奚腹脹乾瘦毛髮焦黃宜服二聖丸方大蝦蟆一枚端午日收眼赤者佳臭黃二兩為末上淨取卻蝦蟆腸肚然後滿腹著臭黃末以紙裹上以泥封令乾更泥如此可三遍待泥干即於大火中燒令煙盡搗羅為末用粟米飲和丸如粟米大兒一歲以粥飲下一丸服藥後以生熟水浴兒拭乾以青衣覆之令睡良久有蟲出即效聖惠治小兒丁奚肚大四肢瘦弱野鼠丸方野鼠一枚去皮臟炙令焦乾薑炮裂銼厚朴去皮塗薑汁炙令香熟用之桂心甘草炙赤銼各一分上件藥搗羅為末以棗肉和丸如綠豆大三歲兒每服用生薑湯下七丸日三服量兒大小以意加減聖惠治小兒丁奚腹脹頭大頸細手腳心熱唯吃冷水此是脈藏內疳大黃丸方川大黃一分銼碎微炒蛇蛻皮二條燒灰蟬殼三七枚巴豆霜一字鉛霜半錢細研干蝦蟆一枚塗酥炙黃皮巾子灰有孔子處取半錢上件藥搗羅為末都研令勻煉蜜和丸如綠豆大三歲兒每服空心以漿水粥飲下三丸後以桃柳湯洗拭乾以青衣蓋良久有蟲出為妙量兒大小以意加減服之嬰孺治小兒羸瘦不生肌食飲不多腹大面目痿黃不長主百病鱉甲丸方鱉甲炙桂心各三分大黃五分人參前胡茯苓乾地黃芍藥乾薑各二分黃芩一分半䗪蟲十枚炙上為末蜜丸小豆大三丸日進三服量與之佳嬰孺芍藥丸治小兒百病有寒熱大腹食不消化不生肌肉痿痹方芍藥茯苓大黃各五分柴胡四分鱉甲三分炙桂心二分人參一分一方二分上為末蜜丸三歲以下服三小豆大不知加之七八歲三桐子大不知加之若腹堅大者加鱉甲一分渴者加栝蔞二分病甚者服二十日效已試大良一方有杏仁二兩人參三分嬰孺治新生少小兒客忤所中驚癇發熱哺乳不消中風反掣口吐舌卒疰逢忤面青目上搖腹滿丁奚羸瘦頸交三歲不能行麝香紫雙丸方麝香黃連丹砂烏賊魚骨桂心各一兩雄黃附子炮去皮臍牛黃各二兩特生礜石半兩燒赤足蜈蚣一條炙巴豆六十粒去皮心入絹袋子內灰煮半日上為末蜜和杵三千下垍合密收勿令燥泄兒生十日二十日三十日服二黍大四十日至百日服二麻子大一歲三歲以意增之大其丸子兒雖小而宿實甚者當加丸子不必依此例也巴豆別研入藥內嬰孺治小兒不生肌肉丁奚大腹食不消芍藥丸方芍藥大黃各一兩桂心二兩茯苓柴胡各四兩上為末蜜和杵熟一歲大豆許二丸不知稍加之食後服煉蜜須三五沸用嬰孺治小兒傷食失衣當風溫冷水浴苦腹大丁奚時利寒熱如瘧不欲飲食不生肌及消羸不欲動搖方人參麥門冬去心大黃黃耆苦參炒芎礜石煅甘草炙各三分半夏洗遠志去心黃芩各二分硝石四分上為末蜜丸黑豆大先食服三丸四歲桐子大三丸量與之嬰孺治腹中有熱滿不思飲食及大小便不利若苦腹痛癖便膿血下重丁奚大腹痛脫肛脅下有痞方狼毒二分附子一個炮川椒汁巴豆去皮各四分上為末以飴丸茱萸大茶飲下一丸天明及日一再服一丸數服消痞下食日進三服嬰孺治小兒堅痞面黃羸瘦丁奚不欲食食不生肌膚心中慒慒煩悶發時時寒熱五臟虛脹腹中㽲痛常若下痢八痞丸方蜀漆七分細辛四分龍膽五分乾薑二分附子四分炮牡丹虻蟲疑是䗪蟲非虻蟲蝟頭酒浸炙黃曾青無曾青空青代之桂心各三分上為末蜜丸桐子大飲下二丸日進三服以知為度忌豬魚生菜等物張渙大麝香丹方治小兒羸瘦腹大見青筋及丁奚等病方麝香粉霜各研硃砂細研水飛白礬灰各半兩五靈脂肉豆蔻仁乾蟾塗酥炙各一兩乾地龍一分炒夜明砂半兩干蜣螂七枚去翅炙黃熟上件搗羅為末與硃砂等同研勻細煉蜜和丸黍米大每服三粒至五粒溫水下量兒大小加減服之莊氏家傳治小兒疳氣腹大氣急不思飲食塌氣丸方青橘皮不拘多少用湯浸開巴豆每青橘皮一個用巴豆一個使麻線系合熱麩中炒熟去巴豆不用上搗羅為末麵糊為丸如綠豆大三歲以上每服五丸或七丸米飲下不計時候哺露第十巢氏病源小兒哺露候小兒乳哺不調傷於脾胃也脾胃衰弱不能飲食血氣減損不榮肌肉而柴闢羸露其哺臟腑之氣不宣則吸吸苦熱謂之哺露也嬰童寶鑑小兒哺露歌小兒哺露病尫羸飢飽多傷損在脾臟腑不通身有熱如柴骨立漸枯衰聖惠治小兒哺露傷飽手足煩熱羸瘦不生肌肉雞骨丸方雞骨煮熟黃雌雞左右肋骨一具炙黃赤芍藥川大黃銼微炒紫菀洗去苗土赤茯苓柴胡去苗各半兩細辛黃芩桂心各一分上件藥搗羅為末煉蜜和丸如綠豆大每服以溫水下五丸早晨晚後各一服量兒大小加減服之聖惠治小兒哺露腹堅體熱羸瘦鱉甲丸方鱉甲塗醋炙令黃去裙襴肉蓯蓉酒浸一宿刮去皴皮炙令乾各三分常山半兩上件藥搗羅為末煉蜜和丸如麻子大每服以粥飲下五丸日三服量兒大小以意加減或下青白黑物即愈聖惠治小兒哺露失衣當風濕冷水浴苦腹大時痢或寒熱如瘧不欲食縱食不生肌肉或不消化四肢羸瘦人參丸方人參去蘆頭麥門冬去心焙半夏湯洗七遍去滑黃耆銼川大黃銼碎微炒白茯苓柴胡去苗黃芩以上各三分訶梨勒煨用皮甘草炙微赤銼鱉甲塗醋炙令黃去裙襴各一兩芎藭半兩上件藥搗羅為末煉蜜和丸如麻子大一二歲兒每服以粥飲下三丸四五歲兒服五丸日三服量兒大小以意加減嬰孺治少小積寒久熱不能食飲食不化哺露堅痞大腹下痢不禁芍藥丸方芍藥紫菀各三分桂心茯苓鱉甲炙各二分柴胡一分大黃五分上為末蜜丸如桐子大一歲以上每服三丸日進三服病甚者夜一服三歲以上加至十丸無忌哺露氣盛者加鱉甲四分嬰孺治小兒哺露腹堅熱下痢不止方鱉甲常山各一分肉蓯蓉半分上為末蜜丸小豆大一服二丸便下青赤白黑久寒自除嬰童寶鑑小兒哺露灸大椎穴又灸尺澤在腕內橫紋中尖又灸九角
