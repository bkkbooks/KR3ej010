body:
  text: 卷第二十二癥瘕積聚凡十門積聚第一茅先生小兒有奶積候但是吐下奶來有臭酸氣此候因兒叫未住母將奶與吃致不消化日久停滯胃冷而至此所治者先用丁香散方見瀉痢門中調胃後下實積牛黃丸方見實熱門中取下奶積後下勻氣散補方見胃氣不和門中常服健脾散方見胃氣不和門中即愈茅先生小兒有食積候夜間肚微微作熱或嘔或瀉此因飲食傷飽而更睡至此所治者下實積牛黃丸通下後用勻氣散補氣二方並見同前常服萬靈丸方見本門即愈茅先生小兒有氣積候面黃白不進食肚微痛夭矯啼叫此因患諸般氣候久而不安傳歸氣積至此所治者用萬靈丸勻氣散醒脾散有二方一方見胃氣不和門中一方見慢脾風門中健脾散相夾調理即愈余方見同前茅先生小兒有中脾積候面黃如土色或帶黃而面帶虛臍上微痛肚皮熱飲食減少才食便言臍上及肚中痛所食不化頭微熱此因先食硬物不然冷物所傷在脾所治者先下青金丹方見本門中取下脾中積後用勻氣散醒脾散補常服健脾散萬靈丸即愈余方並方同前茅先生小兒有虛中積候渾身微熱不思飲食渴日多昏眜抱著一似睡未覺此候因多端久泄瀉不止而虛得此候所治者先下青金丹通盡肚中積後用勻氣醒脾散調理常服萬靈丸保童丸方見一切疳門中調理即愈余方並見同前茅先生小兒有實積候大便不通風毒瘡癤喉閉胙腮喉中涎響此因兒子生來飢猛飲食無度至有前件候所治者先用奪命散方見急慢驚風門中吐下熱涎後勻氣散醒脾散調理二方見同前常服牛黃膏方見膈熱門中鎮心丸方見一切驚門中天竺黃散方見實熱門中與服即愈其前項諸般積氣候各說分明下藥各有等降若然前積調理不退如變面黑久瀉不止腹肚脹滿手心自生瘡氣出粗瀉黑色瘦弱不能坐立眼視鼻口燥黑死候不治漢東王先生家寶小兒積病可醫者九面上虛腫是積積者是脾之所繫脾主身之肌肉故應面故知是脾積其脾系土土無正形故早晚浮腫不定多則早浮其睡則脾不磨上面作腫若病後有此證則是虛中積宜用調脾消積行氣等藥面合地臥是積何以合地其受積在脾是冷積何以知之其脾好土故知之在脾其冷者屬陰故知傷冷硬食得之宜下熱積氣藥耳腹脹是積其積在肺何以知之其肺主於氣才當受積其氣便冷腹脹滿氣急故知之在肺如腹脹先宜調氣後轉轉後更宜調氣小便如油是積其積在小腸何以知之其積受於脾脾當轉心心不受觸則入小腸小腸是心之腑故知在小腸則節其水道小便如米泔油相似也發黃是積是積傷心氣心主血脈蔭遍身毛髮被積氣所幹則發黃故知是積傷心宜下空心散方未見及取積藥此人必時復發熱也赤白痢是積其積在肺受傳大腸及有外傷冷而得何以知之其肺主西方庚辛金其色白後赤則是外邪故知肺傳大腸則為赤白痢也宜取後調氣兩眼黃赤睛青是積其積在肝何以知之肝主東方甲乙木色青卻被積氣所幹即黃赤睛青者眼屬五臟肝是其主肝若受積故令眼睛青是肝受積若傳膽其人口苦不要吃物宜涼藥退之遍身虛腫是積其積不在臟只在腑何以知之為其積曾取後被藥發動即不在臟故出皮膚之間為腫也只宜下取虛中積藥然後補之耳多瀉白糞是積是受冷積在脾何以知之脾主化受冷積在脾冷滑而瀉白糞故知在脾宜先轉後熱藥補之漢東王先生家寶小兒積病不可醫者六喘急是肺積肺主氣其喘急則肺絕其人當面白全無血色故不可醫也面黑是腎積其人面黑者是腎絕也人當不辨好惡眼直無光只得一日而死也吐熱氣是榮積其不醫者是血絕不可治也血主心心不能管故出熱氣不止耳手腳心生瘡是衛積衛者氣也胃氣不生故手足生瘡若衛絕則氣不回只得半日而死也噁心吐乾嘔是胃積何以不醫胃主化食其胃絕則惡吐故不治其人必食乳不化不食亦干吐嘔面色青黃無血色也瀉久住又瀉是積咬脾爛何以知其脾爛其人當瀉白糞為食不消住了卻放糞赤黑而死即知脾爛不可治錢乙論積病口中氣溫面黃白目無精光或白睛多及多睡畏食或大便酸臭者當磨積宜消積丸方見本門甚者當白餅子下之方見搐弱門中後和胃嬰童寶鑑論小兒五積為臟氣不行蓄積一處不動故曰積夫心為伏梁在臍上上攻其心下攻胃口脾為痞氣在胃口上橫之肝為肥氣在臍之左邊肺為息賁在臍之右畔腎為賁屯在臍之下各有變動非食之所成乃氣積也臟屬陰故在一處而不動也嬰童寶鑑小兒有聚謂六腑之氣留聚也腑屬陽陽氣運轉不停故其聚不定一處發而腹痛積聚之候皆面黃瘦劣嗞啀不生肌肉發立或肌體浮腫腹急多困多為水氣五關貫珍珠囊辨小兒積候面虛腫腹肚脹多睡小便如油瀉痢眼黃頭髮疏黃腹內虛鳴吐逆五關貫珍珠囊論虛中積候凡驚中虛積者謂因驚取復驚發動是也所下糞青穢凡虛中有積者因傷食而瀉又吐如此漸虛其病未瘥故曰虛積也又虛中之積有積而頻頻取轉卻取轉不著致其積尚伏故亦曰虛中積若驚積取下則糞隨驚青如是食積即糞成塊子凡疳中虛積者因疳病轉瀉虛而疳不退故虛中爾所取下糞裹白色也小兒形證論八種疾病楊玄操云多吐多瀉多困多熱是也面腫手腳腫是虛中有積腹脹不思飲食是胃中有積合面吃土炭痢痛大腹中有積面多黑困不眼開脾臟中有積小便似油腳手腫腎臟中有積渴瀉不止膀胱中有積腹內虛鳴小便赤黃小腸中有積多吐逆不吃食上膈中有積惠眼觀證臟腑積候渾身虛腫者脾之有積久取不下號曰虛中積先塌氣後取之肚腹腫四肢黃色者受水氣須取之小便如米泔肝臟受積此候用取之頭髮黃者疳勞候欲發此背之積用取之眼睛黃鼻出水者肝肺有積曰風疳之候當取之赤白滯痢者此臟腑內又積用取之腸內虛鳴者此氣蟲之候用取之多吐逆或日近及氣酸臭可取若已又不可遽取恐作慢脾且調理合地而臥此蟲攢心用取之保生論小兒積病脈其脈沉實積者小兒恣餐毒食瓜桃李果肥滑黏膩之物蘊成積聚其形候面色黃白頭髮焦立腹脹虛鳴面仆地臥小便如油頻頻多滑久患赤白痢以上皆是積病若小兒肥實宜與蔥湯丸取方見驚積門與吉氏同次銀白散補方見乳癖門中玉訣同保生論小兒積病死候其脈洪大下黑血形瘦不行坐久患積腹急如鼓項軟四肢冷口噤都不食以上並是死候不可用藥醫救茅先生小兒初受諸積歌小兒諸積病還因乳哺成先從腹肚脹次及面虛盈多睡面合地小便似油清發黃兼滑瀉吐逆肚虛鳴白痢更並赤眼黃因得名茅先生小兒又受積歌小兒因受諸般積面腫腹脹因傷食腹內虛鳴合地臥多渴發黃並痢疾眼黃吐逆並多睡尿色如泔疳積極茅先生又小兒積病不治歌候得小兒諸積病百個難醫一個命胃積多生手掌瘡疳勞吐瀉應難整孩兒生下五色惡瘦弱伶仃無瘥日久瀉止來又忽瀉口中熱氣奔奔突手足生瘡朝暮熱不用苦藥多是卒茅先生小兒六般積不治歌小兒六件積為凶面黑瘦惡藥難沖久瀉多方止不住手腳心痛命須終頰紅熱極並驚久口中熱氣命還窮玉訣小兒積傷候歌積傷腹痛啀饒啼喘促痰高乳食稀瀉痢無常頻發熱面黃虛腫本傷脾此患看虛實與下次調胃氣即妙又一本云此看虛實先取蔥湯丸方見驚積門中與吉氏同次銀白散補方見乳癖門中千金治小兒結實乳食不消心腹痛牛黃雙丸方牛黃太山甘遂各半兩珍珠六銖杏仁浸去皮尖芍藥黃芩各一兩巴豆去皮膜十八銖上七味末之蜜丸一歲兒飲服如麻子二丸但隨兒大小加減之千金紫雙丸治小兒身熱頭痛食飲不消腹中脹滿或小腹絞痛大小便不利或重下數起小兒無異疾惟飲食過度不知自止哺乳失節或驚悸寒熱惟此丸治之不瘥更可重服小兒欲下是其蒸候哺食減少氣息不快夜啼不眠是腹內不調悉宜用此丸不用他藥數用神驗千金不傳方臣億等詳序例中凡云服紫丸者即前變蒸篇中十四味者是也云服紫丸不下者服赤丸赤丸差駛病重者當用之方中並無赤丸而比用硃砂又力緊於紫丸疑此即赤丸也巴豆去皮十八銖麥門冬去心十銖甘草炙五銖甘遂硃砂各二銖蠟八銖蕤核仁湯浸去皮十八銖牡蠣火煅令赤八銖上八味以湯熟洗巴豆研新布絞去油別搗甘草甘遂牡蠣麥門冬下篩訖研蕤核仁令極熟乃內散更搗二千杵藥燥不能相丸更入少蜜足之半歲兒服如荏子一雙一歲二歲兒服如半麻子一雙三四歲者服如麻子二丸五六歲者服如大麻子二丸七歲八歲服如小豆二丸九歲十歲微大於小豆二丸常以雞鳴時服至日出時不下者投粥熱飲數合即下丸皆雙下也下甚者飲以冷粥即止外臺曾青丸療大人小兒久寒積聚留飲宿食天行傷寒者服之二十愈久服令人延年益壽浩仲堪云扁鵲曾青丸療久癖積聚留飲宿食天行傷寒咳逆消渴隨病所在久病羸瘦老少宜服藥或吐或下或汗出方曾青朴硝各二分茯苓寒水石大黃附子炮各三分巴豆二分去心皮熬上七味各異搗下篩巴豆硝石合搗六千杵次內附子搗相得次內茯苓搗相得次內大黃搗相得次內曾青搗相得次內寒水石搗相得次內蜜和搗千杵大人服如大豆二丸小兒五歲以下如麻子大一丸二三歲兒如黍米一丸如服藥以飲薄粉粥清下當覆臥令汗出吐下氣發作服二丸霍亂服三丸泄瀉不止服一丸可至二丸一方用曾青三分忌豬肉冷水蘆筍大酢崔氏同外臺療小兒痰實結聚宿癖羸露瘦弱不能飲食真珠丸方真珠研半兩蕤仁五十枚一云二百枚麥門冬去心一兩巴豆七枚去心皮熬一云四十枚上四味搗篩蜜和丸期歲兒服二丸小豆大二百日兒服如麻子大二丸漸增以知為度當下病赤黃白黑葵汁勿絕藥病盡下自止久服令小兒肥白無病已試驗嬰孺方同用丹砂不用真珠博濟方消除積滯化胃久伏積聚丹砂丸巴豆一分去皮以米醋煮一二十沸卻入新水內洗七遍淨去膜並心皮入乳缽內一向研如粉量出油豆蔻四個為末木香硃砂細研各一分上件同研令細以麵糊和為丸如菘菜子大每服三五丸小兒一丸酒食所傷鹽湯下溫水亦得小兒疳氣肚脹腹聚米飲下博濟方下虛中積久曾取轉不得者抵聖丸犀角鎊末二錢蠍梢三七個銀末硃砂各一錢巴豆二十枚去皮膜芫花二錢同巴豆用好醋二盞煮令醋盡揀出巴豆以冷水浸洗控干芫花再炒令乾搗末取二分用上件同為細末再研如面將巴豆別研如糊和勻以水煮麵糊為丸如小綠豆大如小兒因驚積聚黏滑毒物在於脾胃累曾取下變成虛積棗湯下體熱困悶眼合不開黃連甘草薄荷桃仁湯化膩粉一字許下一歲以上三歲以下二丸小可只一丸米飲下大人吃食吐逆心腹脹滿夜有盜汗日漸羸瘦用薑棗湯下婦人血氣米醋湯下五七丸更在臨時約其虛實加減用之張氏家傳方同名紫金丹博濟方治小兒虛中有積時作壯熱煩渴腹臟不調聖餅子延胡索七個大者石燕子一枚為細末粉霜半錢膩粉五錢上件四味同研至細滴水和為餅子如黑豆大以灰火燒熟再研為末以水和為丸如豌豆大每服一丸嚼破溫湯下臨臥服靈苑治小兒虛積乳癖軟金丹方膩粉二錢硼砂皂子大硇砂半皂子大黃連元精石黃鷹條粉霜各半錢巴豆一個分作兩片半生用半燒過上件八味細研令勻用棗瓤和搜以面劑裹文武火中煨面熟取藥旋丸如黃米大每服用甘草薄荷湯下一二丸量兒大小加減靈苑治驚風止吐逆腹內有症積疏臟腑大丸方滑石三分天南星二錢膩粉一錢巴豆七粒去皮紙裹壓去油上件四味並同研為細末以糯粥研為丸如黃米大若腹內有症積臨臥時炮皂角子煎湯下驚著用蔥白湯下若有涎吐逆用丁香母一個煎湯下每服一丸至三丸量兒大小加減太醫局七宣丸療風氣結聚宿食不消兼沙石皮毛在腹中及積年腰痛冷如冰石腳氣衝心煩憒悶亂頭旋暗倒肩背重悶心腹脹滿胸膈閉塞風毒氣連及頭面大便或秘小便時澀脾胃氣痞不能飲食腳轉筋掣痛攣急心神恍惚眠寢不安等疾大黃濕麵裹煨十五兩桃仁去皮尖爁六兩枳實爁木香柴胡去苗洗訶梨勒皮各五兩甘草爁四兩上為末煉蜜為丸如梧桐子大每服二十丸米飲下食後或臨臥服稍增至四十丸取宣利為度量虛實增減覺病勢退即服五補丸不關男女老少並可服餌量力加減譚氏殊聖方小兒心硬辨應難撞肋衝心有數般忽即當心一片硬不然分作兩邊安丁香牛黃石膏共天竺生犀丸作丹更入茯苓並枳殼頻服三粒必心寬鎮心丸丁香半分天竺黃石膏各一分生犀末一錢牛黃少許上為末蜜丸如綠豆大每服二粒春夏枳殼湯下秋冬茯苓湯下茅先生小兒諸積病青金丹滑石末白丁香羅過天南星各二錢匕青黛羅過平錢滿挑二錢輕粉重二錢水銀秤二錢先以錫二錢於銅銚內煮溶便以水銀拌和瀉出於地冷用川巴豆去皮心膜七十二片無缺損者井華水浸一宿懸當風處吹乾爛研上前件藥同拌合用軟飯為此大巴豆不出油依形證用湯使下項傷寒後取積痰煎蔥湯吞下取疳蟲用牛肉炙汁下驚風肚中緊硬面青黑金銀薄荷蔥湯吞下因傷著肚中及腹皮上微熱肚脹夜間作熱似疳又不是疳面青黃色眼微黃此肚中有積用皂角子二七粒灰內煨過用水一盞煎至半盞下有積作瀉魚鮓湯下氣積炒茴香湯下凡下此藥周歲十四丸三歲十八丸七歲二十四丸看大小加減下須是四更初下至天明通下積來盡時可依形證候下藥補之臨吃此藥恐先吐下些小涎來亦不妨茅先生小兒諸積萬靈丸依形證用之木香黃連蓬莪朮各半分陳橘皮青橘皮各去皮瓤一分檳榔一個重錢半已來者用上為末每匕藥一錢用巴豆一粒去心膜用醋煮巴豆一個煮藥令巴豆紫色用杏仁一個去皮尖燈火上煅留性二味都研用醋麵糊為丸如許大每服五丸七丸十丸薄荷薑湯吞下嬰孺治小兒結實不散乳食不消心腹痛雙丸子方太山甘遂炒牛黃各二分真珠一分杏仁湯去皮尖芍藥各四分上為末蜜丸麻子大一歲兒飲下二丸量兒加減嬰孺治小兒痰實結聚麥門冬雙丸子方麥門冬四分去心蕤仁二百枚去皮膜丹砂三分巴豆四十枚去皮心炒上為末蜜丸黍米大一歲二丸三二歲服麻子大四丸外臺方同用真珠不用丹砂嬰孺治孩子自下後得寒熱血結成癖氣在左脅下或寒飲或冷食積聚氣動胸心留熱不下食飲暗瘦宜先服少飲子散氣下食後服紫雙丸去宿積自充溢也飲子方紫雙丸見前千金方柴胡茯苓人參白朮鱉甲醋塗炙香熟各二分上切如豆大水二升煮五合空心分溫三四服相去如人行一二里久再服粥以將息嬰孺治小兒核腫壯熱有實方麝香三銖別研湯熟入大黃前胡各四分甘遂石膏各三分黃芩甘草炙青木香各二分上為粗末水七升煮一升九合每服三合日四服下夜三服嬰孺治小兒腫滿結實諸治無益者太山甘遂丸方太山甘遂炒葶藶炒芍藥郁李子杏仁去皮尖炒車前子黃芩豬苓各三分澤漆葉炒鱉甲炙各二分柴胡四分上為末蜜丸竹葉飲下以利為度一二歲兒服小豆大十丸四五歲服十五丸以意量之漢東王先生家寶靈砂丹下虛中積臟腑虛滑泄瀉久經取轉裡急後重久積惡痢暴瀉不止神效無比方通明硇砂一錢細研顆塊辰砂通明有牆壁者一分細研上二味袞研極細用蠟半兩先於盞內溶成汁入去皮巴豆取三七粒全者煎候巴豆紫色為度即漉出巴豆細研入前二味再研勻於黃蠟內三分中取一分再溶成汁傾藥於內急攪令勻刮出於瓷合內取收之每服暴瀉惡痢旋㔢三丸如綠豆大濃煎艾湯先呷三五口然後吞下水瀉冷水吞下如取積每服三丸如梧桐子大濃煎甘草湯放冷吞下臨臥服其久積藥隨積下其小可不動便安錢乙消積丸方丁香九個縮砂仁十二個烏梅肉三個焙巴豆二個去皮油心膜上為細末麵糊丸黍米大三歲以上三五丸以下三二丸溫水下無時錢乙紫霜丸消積聚巴豆去油心膜杏仁去皮尖各二十一個代赭石一錢研細水飛上為細末飯丸如粟米大每服三五丸至十丸煎皂角仁湯下無時兒小者減之錢乙真珠丸取小兒虛中一切積聚驚涎宿食乳癖治大小便澀滯療腹脹行滯氣木香白丁香真者丁香末輕粉各半錢留少許為衣白滑石末二錢巴豆仁十四個水浸一宿研極膩上為末研勻濕紙裹燒粟米飯丸麻子大一歲一丸八九歲以上至十五歲服八丸炮皂子煎湯放冷下挾風熱難動者先服涼藥一服乳癖者減丸數隔日臨臥一服錢乙消堅丸消乳癖及下交奶又治痰熱膈實取積硇砂末巴豆霜輕粉各一錢黃明膠末五錢細墨少許水銀砂子兩皂子大上同研細末少入麵糊為丸如麻子大倒流水下一歲兒服一丸食後張渙萬靈丹治小兒脾胃久不和挾積服溫熱藥皆不效此藥神妙肉桂川黃連蓬莪朮各一兩肉豆蔻仁檳榔陳橘皮去白焙乾木香丁香各半兩以上搗羅為細末次用巴豆去皮心膜杏仁麩炒去皮尖二件並於燈下燒灰存性各二七個上件同再搗拌勻滴水丸黍米大每服未周晬一粒二三歲二粒三四歲三粒五七歲五粒十歲以上七粒用生薑湯放冷下乳食後久積或乳癖並宜常服嬰童寶鑑治小兒積聚黃瘦吐食比亭丸方比亭馬牙硝硃砂各末一錢匕膩粉一錢巴豆六十個去殼細研出油上件研勻用餅劑中裹之煨令熟去餅硬者留少許潤者滴水為丸如綠豆大荊芥湯下一歲一丸良方治小兒虛中積朝發寒熱心腹脹滿疼痛者妙香丸辰砂一兩牛黃生龍腦麝香各一分金箔一十四片粉霜膩粉各一錢蠟二兩巴豆一百二十個肥者上丸如彈子大量虛實加減龍腦漿水下夜半後服臟虛即以龍腦米飲下每服三丸如小豆大欲藥勢緩即按令扁疾堅者加至十丸皆以針刺作數孔以行藥力小兒取積丸如綠豆治小兒吐逆尤效此藥最下胸中煩及虛積九籥衛生飛霜丹理一切虛中積下痢膿血裡急後重臍腹撮痛方硇砂三分去砂石秤粉霜三錢上件同研勻用薄紙拗作小紙箱子方闊二寸半深四分許將藥末鋪在箱內次掘一地坑深三四寸其闊約碗蓋得著用火燒令極熱即去其火惟留熟火三兩挺鋪在坑底置藥箱子在內火上急用瓷碗蓋坑口周圍以細土壅塞無令透煙凡燒須防蓋定後火滅頻以手按試碗足熱方可燒時須用好熟炭火即不滅也大約令燒如兩炊飯久即藥成也如火滅即再裝火燒之燒及兩炊飯久便候碗冷即開碗取出藥燒碗上有藥煙著碗亦一處揩下再研令細凡藥得熟自於火上凝更次入膩粉九錢匕龍腦一錢匕又再滾研令勻水浸蒸餅心丸如綠豆大大人每服十丸至十日時一服取下黑物不用服補藥發時一服如用補只煎醋石榴皮湯與吃日二服逐日下黑物為效忌雞魚果子乳母亦忌吉氏家傳取積雄黃丸方雄黃三錢鬱金半兩巴豆二十粒去皮膜出油上末麵糊丸如蘿蔔子大加減與服每服五丸空心茶清下吉氏家傳取積青榴丸方輕粉炒一錢匕青黛炒三錢匕腦麝各半字重巴豆去心油春冬三十五粒秋夏二十四粒上末麵糊丸如此大每服五丸米飲化下吉氏家傳消渴去積紫霜丸方大赭石木香炮乳香肉桂杏仁去皮尖丁香各一錢陳皮一錢半去白巴豆十五粒去油肉豆蔻一個炮上件末煮麵糊如此大每服七丸飯飲下吉氏家傳取小兒一切積累用藥取不下腹脹瀉痢頻並乳香丸方乳香硇砂沒藥各一塊皂子大芥菜子四十九粒巴豆一粒生上用大棗一枚裹濕紙重封灰火內炮熟取出去紙與棗子肉乳缽內研為膏若不通研入少許飛羅面丸如綠豆大每服七丸周歲三丸三更用淡薑湯下取下原傷物吉氏家傳治驚疳積滯或渴或瀉或熱蘆薈丸方蘆薈一錢先乳缽內研使君子不去皮殼蕪荑半錢去皮取仁檳榔一個胡黃連沉香木香各一錢麝少許龍膽草硃砂各半錢夜明砂二錢絹袋洗去土上焙乾末用醋膽丸如此大每服十粒米飲下常服妙吉氏家傳治小兒久積驚疳退積滯化風涎利膈鎮心真珠丹真珠末巴豆霜去油用霜滑石各一分半夏三分姜浸七次續隨子仁三分白附子半兩寒食麵二分天南星半兩姜浸七次上末滴水丸如此大每服二丸二歲者一二丸加減用蔥白湯下疳積使君子湯下吉氏家傳治果子傷積追魂散方白丁香輕粉官桂去皮各三錢上末冷水調下半錢睡時服來日取下所傷物用異功散煎紫蘇冬瓜湯調三服和氣異功散方見胃氣不和門中吉氏家傳取驚積桃符丸方硃砂天麻末鈆白霜各半錢輕粉二錢水銀皂子大巴豆三粒去皮膜上末入飛羅面滴水丸如此大驚候壯熱或吐或瀉脈沉緩眼色困此是驚積周歲以下五丸桃符湯下加減服之吉氏家傳鎮心取積睡驚散鬱金半兩辰砂半錢麝香乳香各一字陳皮二兩去白用一分巴豆十四粒同鬱金炒熟不用巴豆上末每服一字看大小加減薄荷湯下吉氏家傳治虛中積勝金餅子方粉霜延胡索巴豆霜各半錢輕粉一錢硃砂一塊皂子大石燕一個上末冷水為餅子如梧桐子大每服一丸皂子湯下大小加減吉氏家傳治小兒諸般氣積木香散或驚結不通此藥立取下方木香末一錢半陳皮二錢巴豆五粒去心膜上將陳皮巴豆同炒黃色只取下巴豆五片余不用與前木香末同研勻每服半錢或一字陳米飲下若吐瀉瓦缸內煎香附子湯下大小加減吉氏家傳惺惺丸治小兒疳勞黃瘦虛中伏積久患赤白痢但是虛中伏積宜用此藥取更不動臟腑方陽起石輕粉粉霜黃鷹條白丁香各一錢硃砂一錢半硇砂挑一錢匕小銀砂一錢石燕一個火煅五次湯淬五度上為細末湯浸蒸餅為丸如此大每服七丸十丸至十五丸用火煆皂皂蔥白湯下非時服不動臟腑長沙醫者丁時發傳治小兒驚熱乳食積聚不消硃砂丸方硃砂膩粉麝香雄黃各半分巴豆七粒去皮出油上件為末蜜丸如粟米大一歲一丸荊芥湯下大小加減長沙醫者丁時發傳青黛三聖丸治小兒痰涎膈實奶癖驚風消奶食蛔疳疳積腹痛常服極妙青黛一分牽牛末三分膩粉一錢上為末麵糊為丸米飲下長沙醫者鄭愈傳大碧丹水癖食癖五積果子毒但是腹中疾並治五積奶不消四季服之光明砂二錢滑石膩粉白上硫黃鷹糞各一錢小巴豆七粒斑者去心膜水浸一宿淘二七度研如泥去油上為末一處同研令勻入巴豆膏浸煎紅米飯為丸青黛為衣半周一丸一歲二丸量大小加減用之春冬煨皂角湯秋夏煎蘿蔔湯下如驚煎金銀薄荷湯下長沙醫者鄭愈傳三出丸去積聚方陳皮去瓤縮砂藿香京三稜蓬莪朮芫花各一分同醋煮乾為度巴豆五十粒和殼瓦上焙焦為度上先六味為末次外杵巴豆令爛方與諸藥相拌令勻以醋麵糊為丸如綠豆大硃砂為衣每服三五丸薄荷湯化下乳食後癥瘕第二巢氏病源小兒癥瘕癖結候五臟不和三焦不調有寒冷之氣客之則令乳哺不消化結聚成癥癖也其狀按之不動有形段者癥也推之浮沉者瘕也其弦急牽強或在左或在右者癖也皆由冷氣痰水食飲結聚所成故云癥瘕癖結也聖惠論夫小兒寒溫失調飲食不化與臟氣相搏結聚不動名為癥也其食結在腹喜寒四肢洒洒如霍不能飲食常自隱隱而痛此則食癥也嬰童寶鑑小兒瘕者在腹中疼痛癥不痛定一處者瘕也翰林待詔楊大鄴問小兒結癥成塊者為何答曰小兒不慎嗞味嘗吃黏滑膩肥腥羶瓜果胃口不和結實難化癥痞於胸膈之間攻衝榮衛則嘔逆頻頻喘粗眼澀更加頻渴或歸於下部則泄瀉頻並兩脅虛脹便只和脾胃或更疏瀉或則飲食不化漸次成癥大約諸般皆婦人體息須憑救療使早暮痊除不尋根源久而為薨五關貫珍珠囊小兒癥瘕候凡應癥瘕癖結並是撫養乖理哺餵不時致乳食結聚而不化故成此疾惠眼觀證凡小兒生下有瘕癖氣有疳蟲攢心氣有胎驚疝氣有抱心吊氣瘕氣者發時橫來左右脅下築痛或多吐逆急下鮓湯丸通利方見急慢驚風門中後以勻氣散服之見胃氣不和門中疳蟲攢心氣者其候伏面服蟲藥如渴水未住便下塌氣散方見腫滿門中夾黃連飲子服之方見本門胎驚疳氣者生下多夜啼或吊上腎乃以寬氣藥參苓散治之方見胃氣不和門中又用蔥涎膏貼外腎方見初生不大小便門中醒後汗出又渴水無時乃以槐角丸方見腹痛門中及寬氣藥調理二三日亦已通利與勻氣生下未周歲至兩歲一見陰腫者此胎中大受極熱或父之傳受先用牛黃丸療之方見風熱門中後勻氣始用蕓薹子為末冷水調貼之如未退卻用寒水石白繕土酸醋調塗乃常吃鬱金甘草牙硝三味為末蜂糖熟水調下嬰童寶鑑小兒癥瘕歌三焦不調順胸中寒氣極痞滿喘還粗噫出酸氣息乳哺不能消結聚成癥癖有形名曰癥浮動當為積弦強癖之源分明記胸臆外臺廣濟療少小及大人腹中宿食積成癥癖兩脅妨滿氣息喘急不能食面黃日漸瘦腹大脹硬除百病紫雙丸方聖惠名代赭丸代赭丹砂各研大黃各八分青木香五分聖惠用二兩當歸五分聖惠用一兩桂心四分聖惠用二兩犀角屑三分聖惠用二兩巴豆六分去心皮別搗聖惠用半兩上八味搗篩蜜和丸如桐子大人小兒量之十歲兒服大豆許二丸六歲者小豆許二丸以下臨時斟酌要瀉病出為度久疾日一丸以溏瀉而已不在猛瀉忌如常法姚和眾方治小兒癥瘕上用煮老鼠肉汁煮粥為食聖惠治小兒癥瘕壯熱頭痛嘔逆腹痛寒熱頭髮作穗及食癖乳癖氣鱉甲散方鱉甲一兩塗醋炙令黃去裙襴枳殼麩炒微黃去瓤木香川大黃銼微炒京三稜微煨銼檳榔各半兩人參去蘆頭赤茯苓柴胡去苗各三分桂心一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服日三服量兒大小以意加減聖惠治小兒癥瘕羸瘦鼠肉煎方鼠肉五兩生用鱉甲三分生用甘遂一分末陳橘皮半兩湯浸去白瓤焙上件藥除甘遂末外並銼以水二大盞煎至五分去滓下甘遂末勻攪一二百日兒奶癖一日與服之盡半合二三歲兒一日服盡一合四五歲兒一日服盡二合如利多即少服看兒虛實與服之如是利不止煮大麥麵湯解煮鼠肉汁作粥服之亦佳聖惠治小兒癥瘕脅下堅硬如石四肢黃瘦不欲乳食甘遂丸方甘遂煨令微黃蕤仁湯浸去皮研入各一分雄黃細研丹砂石膏各細研水飛牡蠣燒為粉各半兩麝香半分細研巴豆半分去皮心絹囊盛於淳酒中煮半日取出焙乾上件藥搗羅為末與巴豆都研令勻煉蜜和丸如黍米大每服以粥飲下一丸日二服量兒大小加減服之聖惠治小兒癥瘕羸弱不能乳食鱉甲丸方鱉甲塗醋炙令黃去裙襴京三稜微煨銼川大黃銼碎微炒檳榔郁李仁各半兩湯浸去皮微炒木香青橘皮湯浸去白瓤焙肉桂去皴皮柴胡去苗人參桔梗各去蘆頭防葵各一分上件藥搗羅為末煉蜜和丸如綠豆大五六歲兒空心以粥飲下七丸晚後再服更隨兒大小以意加減聖惠治小兒癥瘕腹痛黃瘦大黃丸方川大黃三分銼碎微炒知母牡蠣燒為粉枳殼麩炒微黃去瓤當歸各半兩銼微炒鱉甲一兩塗醋炙令黃去裙襴上件藥搗羅為末煉蜜和丸如綠豆大三四歲兒每服空心以粥飲下五丸晚後再服更量兒大小以意加減聖惠治小兒癥瘕百病疳痼腹脹黃瘦發歇不常客忤疳痢及吐逆不定心腹多痛及驚風天瘹等牛黃丸方牛黃細研犀角屑木香當歸各微炒各半兩人參去蘆頭川大黃銼碎微炒光明砂細研水飛過檳榔各三分麝香細研一分鱉甲一兩塗醋炙令黃去裙襴巴豆以淡漿水一碗大煮盡去皮出油別研各一分代赭二分肉豆蔻二枚去殼杏仁二十枚湯浸去皮尖雙仁麩炒微黃上件藥搗羅為末都研令勻煉蜜和丸如綠豆大百日以下兒乳汁下一丸二三歲兒空心粥飲下二丸胸膈有病吐出在臟腑有病即利出惡物為驗後又得吃漿水粥一日其利自止五日至十日吃一服永無滯結更量兒大小加減服之聖惠又方硃砂細研杏仁各一分湯浸去皮尖雙仁別研如膏巴豆霜半分鱉甲塗醋炙令黃去裙襴犀角屑各半兩上件藥搗羅為末入巴豆杏仁都研令勻煉蜜和丸如黃米大百日兒乳汁下一丸三四歲兒薄荷湯下三丸隨兒大小加減服之聖惠治小兒食癥或時寒熱四肢黃瘦不欲飲食礞石丸方礞石乾薑炮裂為末杏仁湯浸去皮尖雙仁麩炒微黃各一分巴豆去心皮紙裹壓去油硇砂各半兩以上五味研令細以米醋一茶碗煎如膏次用京三稜微煨銼皂莢去皮塗酥炙令黃去子蓬莪朮各一分上件藥搗羅為末以所煎膏和丸如綠豆大三歲兒每服以茶清下一丸兒稍大臨時以意加之張渙方三稜煎同治脾虛挾積聖惠治小兒食癥寒熱羸瘦不能飲食宜服防葵丸方防葵京三稜微煨銼各半兩肉豆蔻去殼木香枳殼麩炒微黃去瓤麝香各一分細研川大黃銼碎微炒鱉甲各一兩塗醋炙令黃去裙襴上件藥搗羅為末煉蜜和丸如綠豆大三歲兒每服以粥飲下五丸日二三服更量兒大小以意臨時加減聖惠治小兒食癥久不消代赭丸方代赭細研巴豆去皮心研紙裹壓去油丁香各半兩黃連去須五靈脂桂心各一分麝香細研膩粉各一