拌勻以粳米飯和丸如黍米大每服十粒煎人參湯下量兒大小加減張渙五靈脂丹久嗽恐成疳常服尤佳方五靈脂蟬殼微炒款冬花各半兩蟾頭一枚塗酥炙微黃以上併為細末次用青黛細研雄黃細研各一分上件藥一處拌勻糯米飯和丸如黍米大每服十粒煎人參湯下不拘時候量兒大小加減萬全方治小兒肺疳壯熱憎寒腹脹下利皮膚乾燥眼澀揉鼻乳食難化日漸羸瘦麝香丸麝香細研熊膽研入各半錢赤茯苓一錢款冬花杏仁麩炒微黃胡黃連蘆薈研京三稜微炮桂心川大黃微炒各一分當歸微炒木香各半分檳榔三枚上件搗羅為末煉蜜和丸如緑豆大每服五丸乳食前以溫粥飲下量兒大小以意增減萬全方治小兒肺疳不欲乳食時復腹痛胡黃連丸胡黃連當歸銼微炒訶梨勒皮木香各半兩青橘皮湯浸去白瓤焙紫蘇子杏仁湯浸去皮尖麩炒微黃各一分麝香研入一錢上件搗羅為末用粟米飯和丸如緑豆大每服三丸以粥飲下量兒加減服張國林小兒肺疳方安師云此方救人甚多渠家見單賣此藥真珠七十粒辰砂半錢人參甘草各二錢麝香半字輕粉五錢匕白附子一個上件先將人參甘草銼碎炒熟白附子炮碾末次研入真珠辰砂麝香輕粉勻畢每服半錢或一字用金銀薄荷煎湯調服日進一服食後只三服其肺疳立愈長沙醫者鄭愈傳治腹脹似鼓兼日晚肚熱名為氣疳木香散方木香一錢牛蒡子瓦上焙炒陳皮各二錢膩粉一字上件為末每服半錢陳橘皮湯調下急疳第九亦名腎疳聖惠夫小兒急疳者由乳哺不調甘肥過度之所致也甘味入於脾而動於蟲但蟲因甘而動傷於臟腑若上蝕齒齦則生瘡出血齒色紫黑下蝕腸胃則下利無常肛門開張生瘡赤爛皮焦發立乳食不消身體羸瘦若不早療便至膏肓故曰急疳也聖惠治小兒急疳羸瘦下利口內生瘡殺蟲雄黃丸方雄黃蘆薈青黛硃砂各細研龍膽去蘆頭黃柏微炙銼黃礬燒令通赤當歸銼微炒白礬燒令汁盡細辛莨菪子水淘去浮者水煮芽出炒令黃甘草炙微赤銼各一分麝香一錢細研蚱蟬三七枚微炒去翅足乾蟾一枚塗酥炙令黃上件藥搗羅為末入研了藥令勻以麵糊和丸如緑豆大不計時候以粥飲下五丸量兒大小以意加減聖惠治小兒急疳蟲口內及齒齦作瘡宜敷熊膽散方熊膽細研甜葶藶微炒莨菪子炒令微黑蝦蟆灰人糞灰白礬灰麝香細研雄黃細研蘆薈細研硫黃細研以上各一分上件藥搗羅為散都研令勻如有瘡處宜薄敷之如鼻癢即取少許逐日吹鼻中二三遍以瘥為度聖惠治小兒急疳癢隨爪作瘡瞬息大如錢或在頭面口齒中宜敷蚺蛇膽散方蚺蛇膽三大豆許黃礬白礬灰蘆薈麝香以上各一錢上件藥細研為散若頭面身上有瘡以清泔洗裛干敷一大豆許良久水出即止重者不過三度瘥如在口齒中宜頻貼之聖惠治小兒急疳瘡纍醫未效蝸牛灰散方蝸牛灰白狗糞灰蜣螂灰白礬灰人糞灰蘆薈蝦蟆灰蘭香𦾮灰蚺蛇膽蜘蛛灰地龍灰以上各一分上件藥搗細研如粉以葦管斜批吹少許入鼻中如齒齦上有瘡即蜜和塗於紙上貼之下部有瘡即納之聖惠治小兒急疳口生白瘡諸疳並主之方熊膽蚺蛇膽蘆薈龍腦牛黃麝香以上各一分上件藥細研以井華水一小盞攪和令勻瓷器盛重湯緩火數以篦攪盞四畔勿令藥幹著盞欲吹鼻時先七日孩子及乳母斷生冷漿豆諸葷辛熱面魚肉等兼少食鹽然後取二豆許漸漸吹鼻及塗口瘡上聖惠治小兒急疳瘦弱生瘡宜服天靈蓋丸方天靈蓋一兩砒霜半分胡黃連半兩人糞半兩莨菪子一分上件藥都以黃泥裹燒令通赤去泥放冷取藥入麝香半分同研為末以麵糊和丸如黍米大不計時候以乳汁研下一丸一歲一丸三丸以上不得加服聖惠治小兒急疳蟲蝕口鼻及下部生瘡方乾蟾一兩半為末半兩燒灰銷金銀甘堝一兩銀末一大豆許人糞灰一兩麝香一兩上件藥搗羅為細散有蟲蝕處即著藥粉之三七日以來勿食一切膩肥聖惠治小兒急疳口鼻及下部皆赤爛方大蒜二兩甜葶藶半兩干蝦蟆一兩乾地龍二枚亂髮灰一分上件藥細銼相和入竹筒中置瓦內以煻灰火燒之取瀝少少塗兒口鼻頂項及殼頭等處聖惠又方精白羊肉二兩蕪荑仁半兩豉一合川椒二七粒去目醬豆一匙上件藥相和爛研令細每取一棗大敷瘡上日三易之蔓菁花盛時並根拔取陰乾上件根莖一握去頭尾以大麥面並醬汁和作團裹之於炭火中燒令煙盡取出候冷入麝香一錢同研為末每貼時先以米泔淨洗取帛拭乾後可敷藥若兒小恐痛甚以意少少敷之不過三數遍瘥口鼻及下部瘡悉治之談氏香連散急疳頻瀉緑和青好睡多饒局緑驚才覺翻身還又瀉唇乾焦渴欲煙牛胡黃連熊膽各一錢丁香麝蘆薈各半錢五靈脂赤箭芝白龍骨各一分末半錢陳米飲下日夜五六服張渙立聖膏治急疳侵蝕人乳半合黃鹽粟大白礬棗大石膽豆大研綿裹內乳汁中浸一宿有味慢火熬膏塗口如鼻瘡滴入有腫處以三稜針刺去血後塗聖惠多青礬升麻丁時發治急疳蘆薈丸急疳頻瀉色偏青多睡身黃作怒睛蘆薈杵丸多與服莫交傳久肚膨脝蘆薈黃柏大黃各一錢硃砂半錢巴豆一粒去油上件為末用獖豬膽汁調於飯上蒸少時入麝香少許為丸如大每服三五丸熟水吞下
