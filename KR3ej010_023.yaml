下二丸十歲以下三丸食後用熟水吞下日進五服如患風熱大便澀用急湯下五丸至七丸以通利為度如未通更進一服忌雞肉肥膩甜等物靈苑木香丸兼治小兒七歲以上五般疳氣肚痛腹脹氣喘方木香厚朴用生薑自然汁浸過炙令黃色為度川大黃微炒人參各一兩檳榔三兩雞心者芍藥肉桂去粗皮羌活京三稜獨活川芎乾薑炮各半兩肉豆蔻六個去殼大附子一分炮去皮臍陳橘皮二兩用湯浸去白瓤干取一兩上件藥一十五味精細揀擇杵為末以瓷罐盛密封系如要服食用生牽牛子末二兩藥末二兩同研合和一處以煉蜜為丸如梧桐子大心腹脹滿一切風勞冷氣臍下刺痛口吐清水醋心痃癖氣塊男子腎臟風毒攻刺諸處及腳氣目眩頭痛心間不快者臨臥用橘皮湯下三十丸來日微轉為度如未瘥則每夜更服十丸覺安便止忽渾身壯熱四肢疼痛不可忍口內狂言此是陽毒傷寒經三日後臨臥時溫水下三十丸如未轉時更加丸數婦人血海不調刺痛積年血塊胃口嘔逆涎沫手足煩頭熱不思茶飯用生薑湯下三十丸以轉為度如未瘥則每夜更服十丸疾瘥即止小兒七歲以上五般疳氣肚痛腹脹氣喘空心用生薑湯下三五丸飽悶不消腹泄不止臨臥暖酒下三十丸一服必愈若食毒癰疽發背半身不遂並皆治之談氏殊聖方五歲疳傳力最微頻頻咨啀更饒啼形容疲弱聲無力滿口生瘡發又稀此病名為疳膈疾三焦流轉卻還脾紫花石膽當門子紅橘蒼甘請不疑龍香散白朮炮一分石膽半錢研麝香少許龍齒陳皮末各一錢上為末米飲下半錢二歲以下一字談氏殊聖治五疳羸瘦毛髮稀疏揉鼻咬甲好食泥土腹大頸細痢如泔澱乳食不消小便白濁蝦蟆丸方緑礬半斤為末棗一升半去核上先用醋五升並礬煮棗熟後入黃連四兩訶子去核二兩使君子二兩夜明砂二兩蝦蟆四個燒灰存性同搗碎入前藥內攪勻直到乾焦為度再杵羅為末棗肉丸如黍米大三四歲每服三十丸米飲下乳食前漢東王先生家寶治小兒五疳不長肌膚不思飲食日漸黃瘦常服殺蟲蘆薈丸方蘆薈蕪荑去皮青黛檳榔宣連各一分蟬殼二十一個胡黃連半兩真麝香少許獖豬膽二枚上為末豬膽為丸如大麻子大每服五七丸十歲小兒三二十丸並用飯飲吞下張渙夜明丹治五疳腹脹目澀多睡方夜明砂一兩微炒干蝦蟆五個燒存性併為細末次用蘆薈青黛胡黃連草龍膽苦楝根各半兩上件一處拌勻粳米飯和丸如黍米大每服十粒米飲下不拘時候量兒大小加減嬰童寶鑑治小兒五疳聖功散方苦楝根生子東引者米泔浸一宿鶴蝨上件為散每服半錢熟水調下連進二服西京丁左藏柏葉散治五疳腳細肚脹方側柏葉五兩干為末白附子炮蜣螂炮熟焙乾麥芽炒各一兩木香三錢伏苓人參青皮去白各一分上為細末每服一錢米飲調下忌生冷油膩果子西京丁左藏蘆薈丸治小兒五疳方青黛胡黃連麝香蘆薈雷丸貫衆牛黃生用鶴蝨各半兩地龍蛇蛻燒灰各一分上為細末蒸餅心和丸芥菜子大空心米飲下三歲五丸西京丁左藏青黛丸治小兒五疳方青黛雄黃牛黃麝香巴豆去心膜各一分胡黃連半分上為細末生醋為丸如黃米大每服二丸空心溫酒下劉氏家傳治小兒五疳羸瘦合面臥地筋青腦熱吐瀉無度渾身壯熱口舌生瘡痢下膿血心腹脹滿喘促氣急乳食全少多啼嘔逆飲食不化或時憎寒多涕咳嗽鼻下赤爛十指皆癢蝕於唇齒生瘡出血肛門不收毛髮焦黃但是疳疾神效金蟾丸方干蝦蟆五個燒灰胡黃連鶴蝨肉豆蔻苦楝根白皮雷丸蘆薈蕪荑各半兩雄黃一分飛過上為末麵糊為丸緑豆大雄黃為衣每服十五丸飯飲下張氏家傳香蟾丸治五疳殺蟲消肚膨止痛住瀉痢生肌膚方干蝦蟆酥炙黃色大黃連洗去須蕪荑仁蘆薈上各等分為末豬膽麵糊為丸如此大每服四十粒用飯飲吞下不拘時一日二服至三服忌生冷宿食毒物張氏家傳五膽丸治小兒五疳方五靈脂黃連上等分搗羅為末用蒸餅滴水為丸如黍米大每服五丸至七丸米飲湯吞下張氏家傳五疳丸方熊膽蕪荑去皮各一錢麝香一字胡黃連別杵為末稱一分大幹蟾用上別去膊銼碎入在藏瓶內鹽泥固濟以炭火燒通紅取出停一夜取藥研為細末稱一分上件先將蕪荑研極細次入麝香次入胡黃連蟾末研令勻傾出卻研熊膽以沸湯熔化再入前四味更研令勻糊為丸如緑豆大每服二三歲十丸四五歲十五丸米飲下食前服莊氏家傳熊膽丸治小兒五疳八痢肌瘦體黃雖進奶食不長肌膚及療諸疳等疾方熊膽一分宣連胡黃連各末硃砂別研白蕪荑仁蘆薈各研草龍膽木香各末麝香各一錢肉豆蔻三個上十物併合和一處研勻用獖豬膽取汁化熊膽和為丸如小緑豆大每服一歲兒三丸二歲五丸量兒大小加減日一服溫米飲下莊氏家傳治五疳蘆薈丸方蘆薈宣連胡黃連三味等分同入湯浸慢火煎令味濃上揉宿蒸餅和得所丸如緑豆大空心米飲下隨小兒大小加減丸數若能只服濃藥汁尤妙王氏手集治五疳消化宿滯進食長肌肥孩兒保童丸方胡黃連草龍膽末炒紫色稱各半兩使君子木香蘆薈細研各一錢大麥蘖半兩巴豆三七個去皮心同麥蘖炒令蘖紫色去巴豆不用以蘖為末川苦楝一分炒紫色上為細末同研令細用醋糊為丸如緑豆大每服十粒至十五粒米飲下不計時候服此藥大治小兒疳腹脹王氏手集使君子丸治五疳羸瘦毛髮稀疏揉鼻咬甲好食泥土腹大泄瀉痢如泔澱乳食不消小便白濁進乳食殺疳蟲方使君子二十一個沒石子肉豆蔻各三個黑附子炮木香各半兩檳榔二個訶子皮十二個去核縮砂仁二十個去皮上件藥搗研為末麵糊和丸如緑豆大每服十五丸食前溫米飲下吳氏家傳黃耆飲子治小兒五疳或傷脾腹脹發黃時時壯熱頭上虛汗日漸黃瘦或泄瀉方綿黃耆一兩人參陳皮微炙不去白白茯苓白檳榔極大者甘草炙各半兩肉豆蔻一個小者上為粗末每服三錢水一大盞慢火煎至七分濾去滓時時與服溫吃趙氏家傳治小兒五疳退熱黃榮肌膚解積熱壓驚消進飲食方使君子二十一個胡黃連半兩五靈脂蟾頭炙令焦各一分麝半錢研蘆薈熊膽各研二錢上為末燒粟米飯為丸緑豆大每服二十丸米飲下吉氏家傳治十五種風五疳氣疾變蒸傷寒肚上青筋頭髮稀少吃泥土撏眉毛咬指甲四肢羸瘦疳蛔咬心瀉痢頻頻饒驚多嗽疳口鼻赤疳眼雀目神效牛黃膏方牛黃真珠末各半錢輕粉蘆薈鉛白霜水銀用少錫研細砂子各一錢雄黃各二錢熊膽用溫水化入衆藥白附子青黛硃砂胡黃連各二錢腦麝少許上件為末蜜丸如此大如小兒非時天瘹手足搐搦喉內作涎聲用麝香薄荷湯磨下一丸小兒五疳四肢瘦小肚高撏眉咬甲發疏肚上青筋用飯飲化下一丸或變蒸久瀉痢疳眼等疾用鳩梨化下一丸奶母忌鴨肉三五日如諸般驚積在腹並疳蛔肚脹危困不可治者此藥治之朱氏家傳治五般疳氣黃連丸方黃連蕪荑炒去衣龍膽草鬱金各等分上為末米糊為丸麻子大每服十丸飯湯下長沙醫者丁時發傳治五疳方五疳五色在消詳黑氣侵唇入死鄉肚大渴時身火熱雄黃丸子是奇方雄黃丸雄黃黃連各一分巴豆半分白薑一分巴豆白薑用醋一碗煮乾為度不用巴豆硃砂一錢上件為末蒸餅心丸每服五丸七丸熟水吞下蕭景仁獻海上方治小兒五疳丸黃連大黃黃柏苦參各二錢蕪荑使君子一個上用醋煮糊為丸如小緑豆大每服五丸白湯吞下空心服蕭景仁獻治小兒患後不思飲食方上用黃連不以多少為細末獖豬膽為丸如緑豆大每服五丸麥門冬熟水吞下風疳第五亦名肝疳風疳生核附聖惠云小兒風疳者由肝臟壅熱乳食不調之所致也是以孩子十旬之內三歲之間氣血未調骨木輕軟凡為動靜易為所傷若乳母昧於寒暄失於調適滋味不節喜怒無常或外中風寒內懷驚怒便即乳兒邪氣未除傷兒臟腑致成風疳也其狀搖頭揉目眼赤多睡腦熱發焦百脈拘急漸漸黃瘦者是其候也聖惠治小兒風疳日漸羸瘦多睡壯熱面色青黃或時吐乳龍腦散方腦麝牛黃雄黃硃砂各細研熊膽蚺蛇膽並研黃連去須蛜𧌴微炒天麻蝸牛炒令微黃藍葉川大黃銼微炒五靈脂馬兜鈴以上各一分上件藥搗細羅為散入研了藥令勻每服以溫水調下半錢量兒大小以意加減聖惠治小兒風疳剜鼻揉眼不知癢處胡黃連丸方胡黃連人參去蘆頭地龍微炒代赭細研赤石脂各半兩蝸牛肉二枚豬牙皂莢二挺去黑皮塗酥炙焦黃去子大蜣螂五枚去翅足微炒青黛蟾酥並研入木香檳榔黃連去須天麻當歸銼微炒犀角屑乾蠍蟬殼各微炒羌活使君子白蕪荑驢胎耳炙令焦黃蛤蚧頭尾全者塗酥炙微黃硃砂麝香蘆薈牛黃並細研各一分上件藥搗羅為末入研了藥令勻以獖豬膽汁和丸如緑豆大每於空心以粥飲下三丸量兒大小以意加減聖惠治小兒一切風疳搐搦牛黃丸方牛黃硃砂雄黃龍腦各細研黃連去須桂心白附子炮裂川大黃銼微炒膩粉研入人參去蘆頭茯神巴豆二十枚去皮心研紙裹壓去油上件藥搗羅為末都研令勻以栝蔞瓤和丸如緑豆大濃煎蔥白湯下三丸取下惡物為度量兒大小以意加減聖惠治小兒肝肺風熱心脾壅滯體瘦壯熱致成風疳宜常服解風熱殺疳蘆薈丸方蘆薈天竺黃青黛硃砂各細研蚺蛇膽研入胡黃連蛇蛻皮灰使君子天麻丁香黃連去須木香以上各一分白龍腦牛黃各細研一錢蟬殼微炒麝香細研各半分上件藥搗羅為末入研了藥令勻煉蜜和丸如緑豆大每服空心及近晚以粥飲下三丸量兒大小臨時加減聖惠治小兒一切風疳日漸羸瘦體熱心驚搖頭揉鼻四肢煩躁皮膚黃黑毛髮乾枯日久不瘥蟬殼丸方蟬殼微炒硃砂麝香雄黃各細研甜葶藶隔紙炒令紫色各一分乾蠍微炒龍腦牛黃炒細研各半分青黛半兩細研蜣螂五枚去翅足炒微黃膩粉一錢研入蟾頭一枚塗酥炙微黃烏蛇三分酒浸去皮骨炙令微黃巴豆十枚去皮心研紙裹壓去油上件藥搗羅為末入研了藥令勻用豬膽汁和丸如黃米大每服以粥飲下三丸量兒大小以意加減聖惠治小兒風疳身體壯熱或時吐逆心神煩躁胡黃連方胡黃連犀角屑蘆薈天竺黃各細研燕脂研入羚羊角屑各半兩麝香牛黃硃砂雄黃各細研天漿子白殭蠶乾蠍並微炒各一分蟾酥一錢研入上件藥搗羅為末都研令勻以豬膽汁浸蒸餅和丸如麻子大每服以粥飲下三丸不計時候量兒大小以意加減聖惠治小兒風疳羸瘦蛇蛻皮丸方蛇蛻皮燒灰天南星炮裂乾蠍蟬殼各微炒蘆薈硃砂並細研各一分蟾頭一枚炙令黃天漿子七枚微炒青黛半兩細研蜣螂七枚去翅足微炒上件藥搗羅為末獨頭蒜燒熟並醋飯和丸如緑豆大每服空心以粥飲下三丸量兒大小加減聖惠治小兒風疳肌體多熱煩渴心躁夜不得眠臥蘆薈丸方蘆薈細研天麻胡黃連各半兩麝香鐵粉熊膽雄黃硃砂各細研乾蠍微炒水銀以上各一分上件藥搗羅為末以棗肉研水銀星盡都和丸如緑豆大每服以溫水下三丸量兒大小以意加減聖惠治小兒風疳鼻口多癢肌體羸瘦搖頭揉目昏昏多睡夜明砂丸方夜明砂乾蠍白殭蠶各微炒白附子炮裂牛黃麝香硃砂青黛各細研甜葶藶隔紙炒令紫色以上各一分蟾酥半分烏蛇三分酒浸去皮骨炙微黃雀兒飯甕二七枚上件藥搗羅為末用豬膽汁和丸如緑豆大每服以粥飲下三丸量兒大小增減服之談氏殊聖方肝疳腹脹體痿黃面色如金形漸傷咬甲撏眉多吃土愛鹽糟米怕羹湯朝朝曩瀉吐還逆晝夜頻添不忍當但取密陀僧作末為丸令服號醫王玉合