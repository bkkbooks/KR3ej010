body:
  text: 卷第二十三五疳辨治凡九門五疳論第一聖惠論夫小兒托質胞胎成形氣血誕生之後骨肉輕軟腸胃細微哺乳須是合宜臟腑自然調適若乳母寒溫失理動止乖違飲食無常甘肥過度喜怒氣亂醉飽傷勞便即乳兒致成疳也又小兒百日以後五歲以前乳食漸多不擇生冷好餐肥膩恣食甘酸臟腑不和並生疳氣凡五疳者一曰肝疳其候搖頭揉目白膜遮睛流汗遍身合面而臥目中澀癢肉色青黃發疏頭焦筋青腦熱腹中積聚下痢頻多久而不痊轉甚羸瘦此是肝疳亦名風疳也二曰心疳其候渾身壯熱吐利無恆頰赤面黃胸膈煩滿鼻乾心燥口舌生瘡痢久不痊多下膿血有時盜汗或乃虛驚此是心疳亦名驚疳也三曰脾疳其候腹多筋脈喘促氣粗乳食不多心腹脹滿多啼咳逆面色痿黃骨立毛焦形枯力劣胸膈壅悶水穀不消口鼻常干好吃泥土情意不悅愛暗憎明腸胃不和利多酸臭此是脾疳亦名食疳也四曰肺疳其候咳嗽氣逆皮毛乾焦饒涕多啼咽喉不利揉鼻咬甲壯熱憎寒口鼻生瘡唇邊赤癢腹內氣脹乳食漸稀大腸不調頻頻泄利糞中米出皮上粟生此是肺疳亦名氣疳也五曰腎疳其候肌骨消瘦齒齦生瘡寒熱有時口鼻乾燥腦熱如火腳冷如冰吐逆既增乳食減少瀉痢頻並下部開張肛門不收疳瘡癢痛此是腎疳亦名急疳也今以一方同療之故曰五疳也漢東王先生家寶治五疳論小兒五疳因過食甘甜或因驚氣入腹或緣患後不長肌肉致成疳疾不思乳食朝好暮惡或發潮熱四肢羸瘦腹急氣喘頭髮稀疏喜食泥土變成疳勞宜進雞肉煎丸方見疳勞門中及消疳蘆薈丸方見五疳可治不可治門中兼服調胃氣觀音散方見胃氣不和門中並四順散方見溫壯門葛氏肘後四味飲同錢乙論五疳論肝疳白膜遮睛當補肝地黃丸主之方見虛寒門中心疳面黃頰赤心壯熱當補心安神丸主之方見虛熱門中脾疳體黃腹大食泥土當補脾益黃散主之方見胃虛不和門中腎疳極瘦身有瘡疥當補腎地黃丸主之肺疳氣喘口鼻生瘡當補脾肺益黃散主之二方見同嬰童寶鑑五臟五疳論心臟生疳狀如大人勞疾兩頰赤色面色黃白身體壯熱胸中滿悶鼻口生瘡氣喘嘔逆膿黑痢赤虛汗饒多漸加消瘦此心疳也肝臟受疳目生白膜面色青黃夜汗饒多時加氣擁搖頭鼻癢毛立發稀覆地而臥腹中症塊下痢無時常加羸瘦此肝疳也脾臟受疳糞中有米臭氣糟酸好食泥土心腹脹滿肚有青脈咳嗽噁心口鼻乾焦情懷不樂憎明好暗肌肉內消此脾疳候也肺臟受疳咳嗽氣喘鼻下生瘡咬指捻眉吐利冷沫腹滿不食壯熱憎寒皮上粟生喉中嗌塞洞赤白泔皮膚燥澀此肺疳候也腎臟受疳下冷上熱洞泄脫肛下部開張更加疳𧈟渾身瘡癬時發憎寒奶食不消夜多啼叫小便如水胸脅似湯日漸尫羸久而沉困此是腎疳候也凡上件疳皆屬五臟六腑也五疳候第二茅先生論小兒生下有五疳風疳主肝候面青黃色眼生障膜頭搖揉眼鼻驚疳主心候面黃赤身壯熱或瀉色青黑驚叫口鼻乾燥遍身虛汗氣疳主肺候面黃白咳嗽鼻下赤爛上渴氣喘毛髮焦黃形容枯瘦食疳主脾候面色痿黃腹熱青筋好吃泥土撏眉咬甲多喘叫糞內有蟲細如馬尾憎寒熱急疳主腎候面青黑不進奶食虛汗口生瘡疝氣上焦熱愛吃冷水鼻口乾燥上件五疳其候各別逐一各有所管下藥各有能通能實能冷能溫具説可依調理莫亂差誤風疳欲要調理先用勻氣散方見胃氣不和門中夾醒脾散有二方一方見胃氣不和門中一方見慢脾風門中及鎮心丸方見一切驚門調理得退三五分並進得食便下青金丹方見夾驚傷寒門中一服與通下肝上被虛涎蓋之而又眼開通得積盡再下勻氣散醒脾散與調一日腹臟調和後常服鎮心丸夾蘆薈丸方見一切疳門中牛黃膏方見膈熱門中與服如此治之即愈驚疳所治先將勻氣散夾醒脾散硃砂膏方見驚積門中活脾散有二方一方見胃氣不和門中一方見慢脾風門中四個藥相交調理三二日漸次精采有黃糞下來便下青金丹通下積再下勻氣散醒脾散補氣後常服硃砂膏夾蘆薈丸調理即愈氣疳所治者先用調中飲方見胃氣不和門中夾醒脾散雌黃丸方見咳嗽門中龍涎膏方見熱渴門中四個藥相夾調理二三日漸退便下青金丹通下積再下勻氣散補氣後常服蘆薈丸調中飲與服即愈脾疳所治先用勻氣散醒脾散兩個藥調理三二日漸有黃糞變時便下檳榔散方見蟲動門中下疳蟲盡時再下勻氣散補除又將調中飲夾醒脾散再調理二日又下青金丹取疳積再將勻氣散補氣後常服蘆薈丸健脾散方見胃氣不和門中調理即愈急疳所治者先用沉香睡驚飲方見霍亂門中夾鎮心丸及調中飲龍涎膏夾硃砂膏與調二三日漸精采便下青金丹與通積再用勻氣散補後常服蘆薈丸金鈴散方見心痛門中硃砂膏調理即愈前件五疳候狀各別下藥各有文理莫令誤下上件五疳如調理不退形候傳變唇口生瘡鼻口黑燥瀉出黑血項軟遍身冷舌卷骨露惡瘦死候不治茅先生小兒五疳死候歌腳心襯著都不覺抱著昏沉手足垂疾狀未除身體冷無休泄滑沫相隨項筋舒展全無力五絶疳勞仔細知漢東王先生家寶小兒五疳歌心驚疳渾身壯熱盛四肢全不任面黃並臉赤怕冷愛重衾口鼻常乾燥根源即漸深只因驚撲著此病本從心肝風疳搖頭揉口鼻白膜眼中瞞揩磨常淚出兩目不曾干顏容面青色渾身瘡癬斑毛焦併發立此病本從肝脾瀼疳食物難消化心中愛吃泥腹高青脈起頭髮薄稀疏喘息饒呵欠無歡只欲啼痢多酸臭氣此病本從脾肺氣疳啼多並嗽逆口鼻腔生瘡昏昏饒愛睡體瘦又滑腸四肢無氣力容貌不同常瀉膿並吐血此是肺家傷腎家急疳瀉痢時頻並吐逆轉加深大腸肛又脫壯熱腹兼驚乳食全難進肢梢冷似冰急疳難治療本是腎家興五疳可治不可治候第三聖惠小兒五疳可治候論凡小兒疳在內眼澀腹脹痢色無常或如泔澱日漸羸瘦此候可療若鼻下赤爛自揉其鼻頭上有瘡生痂痛癢漸漸流引繞於兩耳時時目赤頭髮稀疏腦皮光緊頭大項細肌體羸瘦亦可治也若唇口被蝕齒齦作五色或盡峭黑舌下有白瘡上齶有竅子口中時有臭氣齒齗漸染欲爛亦可治也若下部開張有時赤爛癢不可忍下痢無常亦可治也若疳蝕脊膂十指皆癢自咬指甲頭髮作穗脊骨如鋸有時腹脹有時下痢若急治之無不瘥也聖惠小兒五疳不可治候論凡小兒肝臟疳若目睛帶青脈左脅下硬多吐涎沫眼角左右有黑氣所沖不可治也心臟疳若愛驚啼常好飲水便食辛味耳邊有脈舌上有黑靨者不可治也脾臟疳若肚大唇無血色人中平滿下痢無度水穀不消好吃泥土皮枯骨露不可治也肺臟疳若咳逆氣促多瀉白米身上有斑生如粟米大色若黑者不可治也腎臟疳若愛食酸鹹飲水無度小便如乳牙齒青黑耳腦幹燥肩豎骨枯不可治也又五疳有五絶候一襯著腳中指底不覺疼二抱著手足垂彈無力三病未退遍身不暖四臟腑瀉青涎及沫不止五項筋舒展無力如此之候皆不可治也凡醫用藥切在審詳也五疳第四顱囟經治小兒五疳兼腹肚虛脹疳氣煩悶或時燥渴紫霜丸方大黃黃連代赭各一分硃砂麝香各少許杏仁去皮尖別研肉豆蔻巴豆去皮以冷水浸別研各一兩上件細研以蜜為丸如赤豆大每服空心米飲下一丸五歲十歲只可服五丸臨時加減忌冷水油膩炙爆仙人水鑑治小兒五疳八痢急慢驚風日漸羸瘦宜服肥孩兒蘆薈丸蘆薈白附子末白蕪荑末各一錢硃砂胡黃連末雄黃各二分青黛黃連末各七分輕粉抄一匕訶子二個末使君子二十個燒麝香半錢巴豆十四個去皮心膜用紙十重出油上十三味先將十二味合研勻次入巴豆霜再研如面拌和勻用熊膽少許熱湯半盞浸湯瓶口上良久熊膽溶作水濾去滓入面半匙煮成糊和藥丸如小緑豆大每服五七丸用薄荷湯吞下聖惠治小兒五疳頭熱眼澀胸高腳細頭大腹脹面黃鼻乾驚悸盜汗肌肉羸瘦寒熱不定宜服金蟾丸方乾蟾一枚大者塗酥炙令焦黃地黃半兩微炒麝香半分細研天竺黃硃砂雄黃各細研胡黃連蛇蛻皮灰蟬殼微炒各一分莨菪子半合水淘去浮者水煮令芽出候乾炒令黃黑色上件藥搗羅為末都研令勻以糯米飯和丸如緑豆大每服以粥飲下三丸量兒大小加減服之聖惠治小兒五疳頭大項細心腹脹滿皮膚干皺毛髮焦黃鼻下赤爛口舌生瘡瀉痢不止日漸羸瘦四靈丸方大蟾一枚去卻四足擘開腹去腸肚入胡黃連末一兩在腹內以線縫合用濕紙三兩重裹沙泥四面固濟令乾微火出陰氣便用熟火三斤燒令通赤即住待冷去泥及紙灰搗細羅為末更入後藥蘆薈麝香熊膽各一分上件藥同研令細以麵糊和丸如麻子大每服以粥飲或奶汁下三丸日三服三歲以上加丸服之聖惠治小兒五疳乳食不長肌膚心腹脹滿或時下痢壯熱昏沉眼澀口乾愛吃生冷毛髮乾立揉鼻多嚏日漸羸瘦五疳丸方太醫局方名五疳保童丸青黛雄黃麝香蘆薈各細研熊膽研胡黃連黃連去須龍膽去蘆頭苦楝根白鱔魚炙令焦黃蝦蟆灰蝸牛炒冷微黃夜明砂微炒蟾頭一枚炙令焦黃五倍子青橘皮浸去白瓤焙天漿子內有物者微炒各一分上件藥搗羅為末都研令勻用粳米飯和丸如緑豆大每服以粥飲下三丸日三服量兒大小以意加減聖惠治小兒五疳面色痿瘁頭熱發乾胃氣不和心腹滿悶宿食不消或時下痢瘦弱無力宜常服使君子丸方使君子丁香沒石子胡黃連夜明砂微炒黃連去須微炒肉豆蔻去殼熊膽青黛蘆薈並細研各一分腦麝各細研一錢蟾頭一枚炙黃焦上件藥搗羅為末燒粟米飯和丸如緑豆大每服以粥飲或新汲水下五丸日三服三歲以上加丸服之一方用眉醉皂子大聖惠治小兒五疳羸瘦毛髮乾黃吃食不常雄黃丸方雄黃麝香蘆薈各細研黃連去須胡黃連各一分蟾頭一枚炙令焦黃硃砂半兩細研水飛過上件搗羅為末都研勻豬膽汁和丸如緑豆大每一歲一丸新汲水下日三服聖惠治小兒五疳毛髮乾立枯瘦煩熱肚大腳細蟾頭丸方蟾頭一枚炒令黃焦青黛龍腦各細研巴豆去皮心研紙裹壓去油乾蠍炒白附子炮膩粉研入各一分牛黃麝香天竺黃雄黃硃砂各細研一分上件藥搗羅為末入青黛等同研令勻以水浸蒸餅和丸如緑豆大每一歲以粥飲下一丸聖惠治小兒五疳寒熱腹脹四肢嬴弱殺疳丸方青黛二錢蟬殼五枚微炒硃砂雄黃熊膽蘆薈麝香各細研蛇蛻皮灰膩粉研入一分胡黃連一分瓜蒂二七枚田父一枚炙令黃蟾酥兩皂莢子許大研入上件藥搗羅為末都研令勻熬獖豬膽汁浸蒸餅和丸如黃米大每服以薄荷湯化破三丸服量兒大小以意加減聖惠治小兒五疳形體羸瘦蛇蛻皮丸方蛇蛻皮一條燒灰麝香半分細研夜明砂地龍各微炒青黛細研各一分乾蟾一枚炙令黃焦蚱蟬四枚微炒去翅足上件搗羅為末糯米飯丸如緑豆大每服粥飲下五丸日三服量兒大小增減聖惠治小兒五疳煩熱羸瘦不欲乳食青黛丸方青黛細研訶梨勒皮各三分麝香蘆薈熊膽硃砂各細研一分上件藥搗羅為末都研令勻以粳米飯和丸如緑豆大每服以沙糖水下三丸日三服三歲兒以上加丸服之聖惠治小兒五疳百病無辜一切痢肌膚羸瘦牛黃丸方牛黃硃砂各細研牡蠣粉人參去蘆頭杏仁湯浸去皮尖雙仁研如泥各一分赤石脂代赭石各細研半兩虎睛一對酒浸一宿微炙巴豆十枚去皮心研紙裹壓去油上件藥除杏仁巴豆外搗羅為末都研令勻煉蜜和丸如緑豆大每一歲以冷水下一丸聖惠治小兒五疳驚熱保童丸方