body:
  text: 卷第二十四無辜疳凡五門無辜疳第一亦名無辜病無辜痢病附巢氏病源小兒無辜病候小兒面黃髮直時壯熱飲食不生肌膚積經日月遂致死者謂之無辜言天上有鳥名無辜晝伏夜游洗濯小兒衣席露之經宿此鳥即將從上過而取其衣與小兒著並席與小兒臥便令兒著此病聖惠小兒無辜腦後有核如彈丸捏之皮下轉是也凡小兒有此物如禽獸舌下有噤蟲若不速去當損其命此核初生軟而不痛中有蟲如米粉得熱漸長大大則筋結定定即蟲隨血氣流散有所停留子母相生侵蝕臟腑肌肉作瘡或大便泄膿血致使小兒漸漸黃瘦頭大發立手足細弱從茲夭折也聖惠夫小兒無辜痢者大腹泄痢膿血毛髮皮膚枯槁肌體日漸瘦羸腸胃既虛痢無時節故名無辜疳痢也漢東王先生家寶小兒無辜疾者古云天上有一鳥名無辜因曬小兒衣物失取過夜遇此鳥過尿之令兒啼叫諸病所生日漸黃瘦者非也蓋此是八邪所傷得之其八邪者飢飽勞役風驚暑積謂之八邪久則令人日漸黃瘦吃食不長肌肉夜間多哭身上或發微微壯熱多渴吃食不知飢飽或生瘡癬是也嬰童寶鑑小兒無辜之疾者腹中有塊身上生癰肌體羸瘦毛髮焦落有腹氣喘冷痢脫肛吃食愛吐即是無辜明其病據者是也按元中記云有一雌禽無雄一名姑護一名瘹星鬼此禽但喜夜飛於人家庭院見露小兒衣即忙立其上遺其毛羽令兒患無辜之疾至死不埋死後即其魂魄化為斯鳥之子也俗雲天瘹即非天瘹人乃指鳥之為害爾故名曰瘹星鬼也萬全方小兒無辜論夫小兒無辜疳者其候面黃髮直時時壯熱身無潤滋頭露骨出腦熱腹脹好食肉醬飲水無度因而成痢痢如泔色背冷腹熱又生積塊腦後有核是也玉函關無辜論云自永徽四年有鳥焉自西域而來轉於海內形如鴟雕又若伏翼不知其何物也亦無有能識者晝隱石室中夜出撮蚤毛翅有毒蟲如毫末遺於衣上入肌膚毛孔中致寒熱不常作疾狀類疳若襁褓嬰兒不慎於衣服或洗或浴夜張於檐楹則致蟲毒而作是疾病由無辜而得故號曰無辜疾凡浴衣服濯以蘭湯烘以軟火永無害焉又有寒溫不常乳食不節傳作疳疾狀類無辜面黃發疏身體枯羸齒腥血出頭鼻生瘡寒熱往來夜臥多汗便餐泥土臟腑不調似結似痢糞中蟲出尿如米泔作諸疳者未有不因冷積留滯蘊熱不除寒溫飢飽喜怒虛實八證之中肝心脾肺腎五臟之內言其五八者原自此始若久不瘥手足如筒龜胸鋸脊壯大青筋肉乾骨露項細喉出喘促不常溫潮間作寒競無時口含清涎乳食向減漸成疳勞惡瘦之候函關別論解顱鶴膝六腑停風哺露丁奚五臟失血言胎而受焉或見身體如紫光目黃睛散喘促心陷兩脅腠滿刺痛氣短皮生紫瘡牙根黑爛舌如白梅乾噦塞逆乳食直瀉滿面槁色唇如枯骨耳焦乾黑皆為惡候不可治療未有此證並分輕重得疾之源用藥調理朱氏家傳無辜病八片綿歌孩子無辜氣多因母作為若人能慎護安得見尫羸驚薄成風疾暄寒作氣痿須交除病乳莫更著重衣吃食無令早能言不怕遲論中八不許胸起力頻微頭皮光哲哲毛髮薄離離肝擁侵雙眼脾黃入四肢渾身生癮疹遍體是瘡痍瀉痢無休歇憎寒少定時繡球全不顧竹馬豈能騎白暈眸中現清涎口畔垂鬥牙須咬甲舉手要揩眉夜夜餐瓜果朝朝食土泥胃傷腸肚脹肺盛喘何疑飲食無休歇耽眠似醉迷葛氏肘後療小兒無辜疳痢方龍骨當歸黃連人參各二兩甘草一兩炙上五物搗下篩蜜和丸如梧子大一服兩丸白飲下之日再五歲以上服五丸若不能吞丸即研飲與之此方是張大夫傳效外臺崔氏無辜閃闢或發乾瘰癧頭髮黃聳分去或乍痢乍瘥諸狀既多不可備說大黃煎丸方大黃九兩錦紋新實者若微朽即不堪用削去蒼皮乃稱上一味搗篩為散以上好米醋三升和之置銅碗內於大鐺中浮湯上炭火煮之火不用猛又以竹木篦攪藥候堪丸乃停於小瓷器中密貯兒年三歲一服七丸如梧子日再服常以下青赤膿為度若不下膿或下膿少者稍稍加丸下膿若多丸又須減病重者或至七八劑方盡根本大人小兒不等以意量之此藥唯下膿及宿結不令兒痢禁牛馬驢雞豬魚兔肉生冷黏滑油膩小豆蕎麥乳母亦同此忌外臺劉氏療孩子頭干肚中有無辜者益腦散方地榆六分蝸牛十二分熬青黛三合麝香人糞燒灰蘭香根燒灰蚺蛇膽各一分龍腦香兩豆許上八味搗散以飲下半錢匕量兒大小與服之忌如常法外臺備急療小兒無辜疳痢方當歸龍骨黃連人參沒石子甘草炙各一兩上六味搗散蜜丸服三丸日再以瘥為度大小增減量之外臺救急療小兒瘦頭干無辜兼痢方上用馬齒莧搗絞汁服三合以瘥止子母祕録治小兒無辜痢赤白兼成疳方上用胡粉熟蒸熬令色變以飲服之傳驗治一歲至兩歲小兒無辜病方上用夜明砂熬搗為散任意拌飲並吃食與吃三歲號干無辜聖惠治小兒無辜疳項細肚大毛髮乾立作穗鱉甲散方鱉甲三分塗醋炙黃去裙襴檳榔三顆沉香漏蘆牛蒡子炒使君子赤芍藥訶梨勒皮甘草炙微赤銼以上各半兩上件搗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減溫服聖惠治小兒無辜疳氣寒熱積滯不化腹肚脹痛人中白散方人中白一分麝香半分蝦蟆塗酥炙焦蘆薈各半兩上件藥細研為散每日空心及晚後用熟水調下半錢服後當下惡物量兒大小加減服之聖惠治小兒一切無辜疳黃瘦腹痛或痢有蟲冷之與熱悉主之硃砂丸方硃砂一分細研一方用三分菖蒲漏蘆各一兩雄黃一分研細一方用三分乾蟾一枚塗酥炙令黃麝香一兩細研一方用一分萬全方亦用一分上件藥搗羅為末都研令勻用粟米飲和為丸如麻子大每服以粥飲化下二丸空心午後各一服隨兒大小以意加減聖惠治小兒無辜疳及諸驚熱牛黃丸方牛黃麝香硃砂珍珠各細研牡蠣燒為粉各一分赤茯苓赤芍藥各三分虎睛一對酒浸炙微黃杏仁湯浸去皮尖雙仁麩炒微黃甘遂煨令黃甘草炙微赤銼巴豆去皮心研紙裹壓去油各半兩上件藥搗羅為末都研令勻用蒸餅和為丸如麻子大百日兒每服以乳汁下一丸二歲以粥飲下三丸量兒大小以意加減聖惠治小兒無辜疳宜常服蟬殼灰丸方蟬殼灰澱花蛇蛻皮灰附子去皮臍生用硃砂麝香並細研各一分乾蠍二十一枚微炒上件藥搗羅為末都研令勻以熟水浸寒食蒸餅和丸如麻子大每服以粥飲調化五丸量兒大小以意加減聖惠治小兒無辜疳腹中癖起四肢瘦弱宜常服鱉甲丸方鱉甲塗醋炙令黃去裙襴黃連去須夜明砂炒桔梗去蘆頭各一兩麝香一分細研訶梨勒二枚一生一熟煨蠍虎一枚雄者微炙上件藥搗羅為末煉蜜和丸如緑豆大每服以粥飲下五丸日三服量兒大小加減服之聖惠治小兒無辜疳方干蝦蟆三枚塗醋炙黃焦苣勝半兩微炒上件藥搗羅為末入少許五味和為劑內入羊腸兩頭緊繫於麩碗中安之上以麩覆之卻將碗合蒸一炊久去麩取藥並羊腸細切搗如膏更入煉蜜和丸如緑豆大每服以粥飲下七丸日二服量兒大小以意加減聖惠治小兒無辜疳腦熱發乾立吹鼻散方硝石三分熊膽一分麝香一大豆許上件藥相和細研為散取一小豆許吹兩鼻中得黃水出為效聖惠治小兒冷熱無辜疳或時驚熱或時夜啼大便青黃白汁頭熱身熱頭髮作穗四肢黃瘦不多食物決明子丸方上用馬蹄決明子二兩搗羅為末煉蜜和丸如麻子大每於食後以熟水下三丸更量兒大小加減服之聖惠治小兒無辜疳肚脹或時瀉痢冷熱不調宜服漏蘆散方上用漏蘆一兩搗細羅為散每以豬肝一兩散子一錢鹽少許斟酌以水煮熟空心頓服粥飲下聖惠又方上用地膽草搗羅為末每服以羊肉二兩藥末一錢入鹽少許以水煮熟空腹頓服聖惠治小兒無辜疳痢久不瘥漸至羸弱硃砂散方硃砂細研白馬夜眼微炒丁香地榆微炙銼各一分上件藥搗細羅為散每服以粥飲調下半錢日三服服訖即吃雞肝粟米粥飲效聖惠治小兒無辜疳痢鼻中干塞眼內有白暈黃昏不見物體熱心煩口乾頂上生瘡胡粉散方胡粉白龍骨末胡黃連末各二錢上件藥同炒過後更研令細每服以雞子清調下半錢日三四服量兒大小加減服之聖惠治小兒無辜疳痢羸弱不欲飲食及腹內蟲作動多吐清水漏蘆丸方漏蘆二兩豬肝爆干楮株根白皮銼各一兩上件藥搗羅為末煉蜜和搗一二百杵丸如彈子大每服以溫水研一丸不計時量兒大小分減服之聖惠又方上用雞肝一具薄切爆干搗細羅為散每服以粥飲調下半錢日三服每吃藥後宜吃粳米軟飯少許聖惠又方上用地膽草一兩搗細羅為散每服一錢以豬肝一兩入鹽少許煮熟不勒時候量兒大小分減食之聖惠治小兒無辜疳痢不止方上用沒石子二枚炒令赤黑色搗細羅為散以面半匙和作餅子爆熟卻研為末不計時候以粥飲調下半錢量兒大小加減服之博濟方煅金液丹小兒三五歲患無辜瀉痢亦可服硫黃一名石亨脂一名金液取三五兩至十兩並煅得舶上黃為第一余黃並使得但無夾雜為上碎碾入罐子內可及八九分無妨上件藥取煅藥罐子一個盛藥在內下蓋子了採狗蹄草一大握本名石龍芮水鑑草一大握稻田中生一莖四花如田字亦名水田草獨莖生將二草入鐵臼內爛搗更入一掬黃土同杵勻如泥若無上件二草且只使益母草代之亦可便將裹藥罐子底下並周匝可厚五六分只至口縫不裹然後置於平地上四面簇炭五六斤上面安熟火一斤已來燒之直候火燒藥罐子九分來通赤專看口縫處有碧焰子起便急手撥炭火急將柴灰三斗都蓋勿令氣焰出直候冷撥灰取出刮去泥土以上是煅一度訣也度度依此煅之第二度依前法杵藥草裹固煅之如前法煅五度若火候得所煅出如熟雞子香即是候也若急要服只煅兩度亦可服之煅度數多者為妙煅度數足便於淨地上埋爐子一宿出火毒凡遂度了刮去下面砂石尤妙又取出爐子於銚子內著水煮一二十沸然後敲破爐子取藥杵爛更入乳鉢內點煎水研爛如泥並無粗者卻研令乾每一兩藥用蒸餅一兩已來浸握出水了入藥內和合更於茶臼內杵令勻如面可丸如桐子大日曬乾孩子留末子細研以米飲調以盂子灌之夜啼心驚奶傷有痰涎者並速研藥一分以來令服之日二服自然便效逐下積物多多與服並無忌若三五歲患無辜瀉痢並服之談氏殊聖方小兒腹脹氣頻粗喘息多饒四體虛乍熱乍寒時乍瀉衝心撞肋號無辜乾薑巴豆醋中煮油盡神功總不如更入雄朱相共合小兒得吃重命蘇救生丸子巴豆醋一升入乾薑三塊同煮醋盡取巴豆仁研如泥雄黃各半兩硃砂一分研上以蒸餅為丸如黃米大芍藥湯下兩丸忌毒物靈苑方同張渙蠍虎丹截無辜疳祛毒方乾蠍虎一枚雄者微炙蝸牛殼澱花蘭香根各一分以上搗羅為細末次入水磨雄黃麝香各細研一分龍腦半分細研上件同拌勻煎米醋打白麵糊和丸黍米大每服十粒煎脂麻湯下乳食後張渙香甲湯截無辜疳癖方沉香鱉甲塗酥炙令黃去裙襴牛蒡子微炒安息香訶梨勒皮炒乳香研各半兩漏蘆一兩上件搗羅為細末同乳香拌勻每服一錢水八分入人參少許煎四分去滓放溫熱服量兒大小加減張渙無辜疳痢玉粉散定痢截疳方胡粉一兩白龍骨水磨雄黃各細研微炒楮木根白皮漏蘆白馬夜眼洗淨焙乾各半兩上件搗羅為細末都拌勻每服一字至半錢以雞卵清調下乳食前張渙二肝丹治無辜疳痢不止方地膽草菖蒲一寸九節者漏蘆各一兩胡黃連地榆各半兩以上搗羅為細末次用雞肝薄切豬肝同入鹽少許用諸藥煮肝熟各一兩上件同於石臼中搗一二百下成膏和丸如黍米大每服十粒麝香湯下食前服量兒大小加減張渙梅肉散治無辜疳疾渴不止眼出障翳身體浮腫方烏梅肉炒乾綿黃耆乾葛各一兩川黃連栝蔞根乾薑炮甘草炙各半兩上件搗羅為細末每服一錢水一盞煎至六分放溫時時與服張渙藍葉湯治無辜疳血痢不斷方藍葉一兩地龍人參去蘆須烏梅肉冬瓜仁黃連赤茯苓蝸牛殼微炒各半兩上件搗羅為細末每服一錢水一小盞煎至六分去滓溫服乳食前張渙天靈丹治無辜疳痢久不瘥方天靈蓋一個乾蟾一兩燒灰胡黃連莨菪子水淘去浮者炒令黑色各半兩砒霜一分同天靈蓋濕紙三五重裹膠泥固濟於木炭火上烘令通赤取出候冷以上都搗羅為細末次入麝香一分上件都拌勻軟飯和丸如黍米大每服五粒乳汁下量兒大小加減服之張渙溫臟湯治小兒無辜疳痢久不止手足逆冷方肉豆蔻去殼乾薑炮各一兩龍骨當歸厚朴去粗皮塗生薑汁炙令香熟各半兩附子一枚重半兩炮去皮臍茅香半分銼上件搗羅為細末每服一錢水八分一盞入生薑三片煎至五分去滓溫服乳食前張渙朴附丹治無辜疳痢赤白相雜方厚朴塗生薑汁炙令香熟訶梨勒皮麵裹炮各一兩附子一枚炮去皮臍龍骨烏梅肉赤石脂各半兩上件搗羅為細末煉蜜和丸如黍米大每服十粒米飲下乳食前劉氏家傳治孩子無辜疳痢方上用威靈仙洗焙為末好酒和令微濕入竹筒內牢塞口九蒸九曝如干添酒重濕之以白飯和丸如桐子大每服二十至三十丸溫酒下如孩子不能飲令母含藥灌之張氏家傳保重丹治小兒三十六種無辜閃癖驚癇魍魎一切病悉療之巴豆去皮尖膜炒令紫水煮六七分裹以新布去油牡蠣粉炒黃牛黃各一分硃砂杏仁湯浸去皮尖雙仁者各一兩虎睛一枚上件藥杵為末更研為粉巴豆杏仁別研為膏煉蜜為丸入臼杵三千下後丸以密器盛每服二丸如梧子大用米飲下吉氏家傳治小兒三十六種無辜閃癖驚癇魍魎保童丸方巴豆去心炒黃色再炙除油牛黃各一分杏仁去皮尖硃砂各一兩虎睛一個上末巴豆杏仁別研為膏煉蜜為丸臼中杵三千下後丸如桐子大密器盛載每服二丸米飲下如小兒一切痢口生瘡鼻下赤及下部生瘡飲食不進日漸黃日晚面頭赤色夜多盜汗驚悸睡中呷笑眼睛膜白與冷藥即瀉與熱藥即口鼻生瘡盛或皮膚壯熱並宜服之無辜針烙法第二聖惠凡小兒無辜疳頭干發立身無滋潤頭露骨出腦熱腹脹鼻中多癢好食醬肉數渴飲水則多為痢痢如泔色背冷腹熱腹中有塊漸加黃瘦或有邪鬼之作亦是閃癖之類腦後兩邊皮中有筋肉結作小核如杏子大多時不除即流入腹中遂成前狀須有烙破結子者或有炙其結子者又有割皮挑出結子者稍勝於炙然病者至深小兒忍痛不任恐動其脈往往變為癇疾今參詳最妙者是烙烙亦更無別法但看小兒病狀相似有結子者速依此法烙之上以鐵針尖利者燒針頭似火色看核子大小作一紙鈈子束定無辜仍須捏定以針當中烙之可深二豆許即貼沉香膏方在次聖惠治小兒針無辜核後宜煉沉香膏貼之方沉香一兩銼黃丹六兩上件藥以清麻油一升先下沉香煎候香焦黑漉出下黃丹不住手攪以慢火煎之候滴於紙上如黑錫無油旁引即膏成每貼法以篦子於爛帛上攤膏令稍薄貼之一日一換勿令風著針處為妙聖惠治小兒針烙後宜服壓驚茯苓散方茯神川升麻犀角屑各半兩代赭細研川大黃銼碎微炒鉤藤各一分上件藥搗粗羅為散每服一錢以水一小盞煎至四分去滓放溫漸漸服之聖惠治小兒無辜針烙後宜服消腫利氣壓驚犀角散方犀角屑琥珀蘆薈各細研訶梨勒皮以上各半兩龍齒三分細研黃連去須麝香細研檳榔乾薑炮裂銼各一分上件藥搗細羅為散每服以粥飲下半錢日三服看兒大小以意加減聖惠治小兒無辜針烙後宜服青金丹方巴豆去皮心硫黃各一兩苦楝根皮醋石榴根皮銼各二兩上件藥於鐵鼎子內滿著水煮七晝夜如水乾即旋添熱水日滿即去楝根石榴根取巴豆並硫黃同研更入桂心檳榔木香細辛末各一分馬牙硝橘皮乾薑藍花末各半分同研令勻用飯和丸如麻子大每日空心以溫水下兩丸常得溏利為效三歲以下日服一丸聖惠又方上用青黛半兩細研為散每服以水磨犀角調下半錢空心午後各一服量兒大小以意加減嬰童寶鑑灸法小兒無辜丁奚灸眉沖從瞳子直上髮際一寸是又灸玉枕在頂上高骨各三壯一切疳第三聖惠夫小兒疳疾者其狀多端雖輕重有殊形證各異而細窮根本主療皆同由乳哺乖宜寒溫失節臟腑受病血氣不榮致成疳也其五臟及諸疳等今以一方同療之故謂一切疳也錢乙論諸疳云疳在內目腫腹脹利色無常或沫青白漸瘦弱此冷證也疳在外鼻下赤爛自揉鼻頭上有瘡不著痂漸繞耳生瘡治鼻瘡爛蘭香散方見鼻疳門中諸瘡白粉散主之方見疳瘡門中肝疳白膜遮睛當補肝地黃丸主之方見虛寒門心疳面黃頰赤身壯熱當補心安神丸主之方見虛熱門中脾疳體黃腹大食泥土當補脾益黃散主之方見胃氣不和門中腎疳極瘦身有瘡疥當補腎地黃丸主之筋疳瀉血而瘦當補肝地黃丸主之肺疳氣喘口鼻生瘡當補脾肺益黃散主之骨疳喜臥冷地當補腎地黃丸主之諸疳皆依本臟補其母及與治疳藥冷則木香丸熱則胡黃連丸主之二方並見病後虛羸中疳皆脾胃病亡津液之所作也因大病或吐瀉後以藥吐下致脾胃虛弱亡津液且小兒病疳皆愚醫之所壞病假如潮熱是一臟虛一臟實而內發虛熱也法當補母而瀉本臟則愈假令日中發潮熱是心虛熱也肝為心母則宜先補肝肝實而後瀉心心得母氣則內平而潮熱愈也醫見潮熱妄謂其實乃以大黃牙硝輩諸冷藥利之利既多矣不能禁約而津液內亡即成疳也又有病癖其疾發作寒熱飲水脅下有形硬痛治癖之法當漸消磨醫反以巴豆硇砂輩下之小兒易虛易實下之既過胃中津液耗損漸令疳瘦又有病傷寒五六日間有下證以冷藥下之太過致脾胃津液少即使引飲不止而生熱也熱氣內耗肌肉外消他邪相干證變諸端因亦成疳又有吐瀉久病或醫妄下之其虛亦甚津液燥損亦能成疳又有肥疳即脾疳也身瘦黃皮乾而有瘡疥其候不一種種異端今略舉綱紀目澀或生白膜唇赤身黃干或黑喜臥冷地或食泥土身有瘡疥瀉青白黃沫水利色變易腹滿身耳鼻皆有瘡髮鬢作穗頭大項細極瘦飲水皆其證也大抵疳病當辨冷熱肥瘦其初病者為肥熱疳久病者為瘦冷疳冷者木香丸熱者胡黃連丸主之方見同上冷熱之疳尤宜如聖丸方見疳瀉門中故小兒之臟腑柔弱不可痛擊大下必亡津液而成疳凡有可下量大小虛實而下之則不至為疳也初病津液少者當生胃中津液白朮散主之方見胃氣不和門中惟多則妙余見下張渙論小兒百晬以後形骨輕軟腸胃細微乳哺須是合宜臟腑自然調適若乳母寒溫失理動止乖違飲食無節甘肥過度喜怒氣亂醉飽傷勞便即乳兒定成疳病又周晬以後五歲以前食物漸多不擇生冷恣食肥膩甘酸並生疳氣但小兒一切疳病種類甚多最為緊急嬰童寶鑑諸疳通論夫小兒疳證互諭多端言詞煩迷愈失大旨但小兒發立焦黃肌體瘦劣腹肚疼痛愛吃泥土瀉痢無常盜汗不止腹大即喘腳細難行洞下脫肛時時壯熱面覆地臥心喜啼呼腹中蟲生糞中有米便如泔澱嘔吐無時有似瘦勞更加寒顫如此之狀即是疳也凡一十二種各異其名在心為驚疳在肝為風疳在肺為氣疳在脾為肉疳在腎為急疳此五臟之五疳外更十二般疳而重言別論乾疳雖能乳食見者皆餐最便酸鹹之物急疳瀉痢脫肛其糞五色雖食不生肌肉睡多汗出此急疳之候也風疳手足顫瘲雙目微牽或笑或嗔爪甲青色狀如神祟此風疳之候也肉疳眼澀而痛食物不消體羸黃瘦四肢無力腹脹氣喘此肉疳之候也脊疳蟲攻脊膂指背皆癢頭髮焦立皮肉枯燥兩脅脹滿一日數利脊如鋸齒此脊疳之候也口疳唇皮齒黑舌上生瘡兩齦潰爛並蟲自出此口疳之候也腦疳鼻下赤爛以手自揉身熱體干目赤如朱此腦疳之候也食疳夜間潮熱或即憎寒手足俱冷能乳即瘦有如盜汗此食疳之候也奶疳因病後得之乳母壅毒衝上或是吃乳母之𩲻奶也初只氣促雖能乳食漸加羸瘦瀉久不止三焦壅熱五臟困乏此奶疳之候也蛔疳合面而臥氣急面黃時哭聲高又似心痛或即發作有時只在月初謂月朔蟲頭舉也脾疳常吃泥土生米及鹽心意不悅身體黃口內多涎瀉痢有蟲此脾疳之候也氣疳或吃熱乳或因重病漸成此患忽然咳嗽初得更服冷藥使日夕渾身壯熱腳冷如冰氣促而喘漸漸目昏此氣疳之候也惠眼觀證疳病形候本因餐瓜果油膩恣食甘甜黏滑之物故生疳氣但見肌肉瘦弱肚高腳細臟腑或閉或泄或澀或瀉或滯或痢則先調氣兩日後量大小下鮓湯丸通利方見急慢驚風門中如許得脈細實則重下鮓湯丸取下惡物次日塌氣方見腫滿門中勻氣方見胃氣不和門中醒脾方見利門中平胃方見噦逆門中調理後常服烏犀角丸方見肥疳門中夾蘆薈丸方未見參苓散方見胃氣不和門中吃一月日長肥即安若久患纍經醫治傳變成骨蒸疳勞口生瘡上焦虛熱往來荏苒歲月即成丁奚哺露此由脾氣大瘕虛怯先宜塌氣二日氣行即下醒脾貴得氣實而進少食卻與勻氣夾柴胡丸與服方見骨蒸門中退骨蒸熱如或熱退即下蘆薈治勞此病但多用勻氣調理丁奚哺露二候一同但丁奚尤可便用鮓湯丸利之取下疳蟲若哺露腸腹多青筋及吃物不變且用前調理候一月氣實乃可通利莊氏家傳小兒二十四候第一候瀉膿血日漸瘦是冷熱疳第二候腳細肚高胸前骨生愛吃泥土酸鹹日久通身黃時時吐逆下痢腹內疼痛是脾疳第三候鼻下赤爛愛揉眼兼血痢是肺疳乃因吃著承熱物或病奶所損心肺加之咳嗽更以服涼冷藥過多便上熱下冷漸漸昏沉日夜煩哭第四候皮膚皺面無顏色身上燥癢心煩第五候頭生瘡毛髮稀疏鼻生瘡是肺疳第六候頭生瘡毛髮稀焦是肝疳第七候牙變黃赤不定是腎疳第八候頭髮焦乾鼻下瘡生是肺疳第九候咬指甲毛髮作穗四肢沉重是心疳第十候肚上筋生齒齦蟲蝕是骨槽疳第十一候吐逆腹脹是胃疳又名奶疳第十二候齒齦臭爛面無顏色心不思食是脾疳又名口疳第十三候愛合面臥多睡如醉腹脹氣急蓋是因曾吃生肉如此腹內有蟲是心脾疳第十四候鼻內干痛口中臭氣齒根有鮮血是肝肺疳第十五候腳細肚高並肚上有青脈是脾疳第十六候非時生瘡愛吃冷水是熱疳第十七候皮膚上生粟子糞中米出是脾冷疳第十八候氣滿腹脹及口乾是心胃疳第十九候愛餐生米麵炭磚瓦是脾胃疳第二十候揉鼻揩眼及咬指甲愛飲水是肝渴疳第二十一候多寒熱愛臥不起是骨熱疳第二十二候愛飲水眼目不開是肝疳第二十三候肌體或熱或涼發渴無時是急疳第二十四候齒齦黑唇頤開開則赤是心疳積熱顱囟經治小兒孩子諸色疳疾或腹內虛脹驚癇頭髮立常咬手指脊疳疳勞臂脛細弱仍立不得及鼻下常赤清涕涎流不止舌上生瘡腦疳口疳腹上筋脈保童丸方虎睛半隻硃砂麝子各一分牛黃龍腦巴豆芎藭桔梗羌活枳殼檀香茯神人參當歸代赭鶴蝨白朮各半兩上為末下香砂巴豆拌令勻煉蜜丸如梧子大一歲至五歲每日一丸十歲每日兩丸並空心米飲下但稍知孩子病甚即加藥與之孩子未較奶母忌生冷油膩炙爆毒魚大蒜米醋顱囟經治孩子疳痢諸色疳並一十五種病狀一腹大二皮膚黑黃三骨節粗四眼赤五口赤六鼻中生瘡七頭髮黃八咬指甲九愛吃土十愛吃甜物十一身熱十二頭大十三臍凸十四項細十五面無光並宜常服保童丸方硃砂半分牛黃麝香蟾酥各少許阿魏二分上先將硃砂於淨器中研如粉入諸藥一時以蒸餅為丸忌羊血生冷等顱囟經治孩子疳氣或釀肚脹上筋脈頭大項細吃物不知足夜中即起腹內長鳴方大黃一兩陳橘皮二兩酸醋二合浸二日曬乾蜣螂二十個去翅足子熱燒醋安之以杯蓋地上去火毒候冷取出炒過上件為末蜜為丸每日空心熟水下十丸忌如常葛氏肘後小兒一切疳方上用牛筋術白皮少許搗取一合或半合與服之仙人水鑑小孩子頭髮焦黃赤日漸黑瘦宜服此百中散方黃葵花白芷延胡索各二分檳榔十分生用鬱金四分干蚯蚓一條生用黃鹽六分陶隱居云北海黃鹽草粒粗以作魚鮓及咸葅干蝦蟆末少許白米一勺牛肉脯二分倒懸囊一個灰蜘蛛是上搗為末煉蜜為丸如麻子大空心煎骨汁下一丸與吃了專候所往取下蟲此疾求除根本集驗方治小兒疳氣不可療神效丹緑礬用火煅通赤取用釅醋淬過復煅如此三度上細研用棗肉和丸如緑豆大溫水下日進兩三服子母祕録治小兒疳方上用益母草絞汁稍稍服益母草茺蔚草也俗名郁具金田野間甚多小兒宮氣方治小兒一切疳疾蝸牛殼七個淨洗不得自塵令乾上向酥蜜中瓷盒盛卻用紙糊於飯甑內蒸之下饋即安置至飯熟取出細研漸漸吃一日令盡之藥性論殺疳蟲治疳瘦方上端午日取蝦蟆眉脂以硃砂麝香為丸如麻子大疳瘦者空心一丸腦疳以奶汁調灌鼻中顱囟經以此藥治一切疳吹鼻不吃食療治小兒疳方上瓜葉陰乾研末酒服半錢元和紀用經麝香丸主小兒疳瘦面黃發穗骨立減食肌熱驚癇疳蟲麝香蘆薈胡黃連末上等分研勻滴水丸黃米大一歲三丸三歲五丸至七丸人參湯下日三無比奇效一云胡黃連四分餘二物各二分療疳痢溫瘧無比尤驗一名聖丸疳藥無如此者小兒癲癇驚風五疳三蟲服之立見功效蛔蟲作疾枯悴久痢不住熱藥調護最難得法唯此若神經以四味飲黑散紫丸至聖散五加皮治不能行蜀脂飲並此麝香丸七方謂之育嬰七寶紫陽道士一名保子七聖至寶方專為一書者此是也聖惠治小兒一切疳腹肚脹滿手腳枯細眼目口鼻生瘡身體壯熱痢下泔澱日漸羸瘦面無光澤青黛散方青黛雄黃石鹽各細研硃砂細研水飛過白礬燒令汁盡薰陸香研入各一兩麝香細研蚺蛇膽研細辛黃連去須青礬黃礬各燒通赤鹽緑黃柏銼苦參銼桂心杏仁湯浸去皮尖雙仁麩炒微黃乾薑炮製銼藜蘆去蘆須各半分附子炮裂去皮臍熊膽研入莨菪子水淘去浮者水煮令芽出焙乾炒令黑黃色石膽細研各一分蝦蟆一枚塗醋炙微焦上件藥搗細羅為散同研令勻如疳在內三歲每服以井花水一合調下半錢一歲一字三歲以上臨時加之若口內疳瘡以蒜一片研和少許散每夜塗之須臾自然流引涎出若鼻內有瘡用蒜如皂莢子大研和少散納入鼻中若外有疳瘡以豬脂和散塗之立瘥聖惠治小兒一切疳五膽丸方龍膽去頭蘆虎膽熊膽豬膽蘆薈亦名象膽麝香白礬灰荊芥各一分上件藥都研為末先取東引石榴根半斤碎銼以水三大碗煮至半碗去滓以慢火煎如膏下諸藥末又熬令可丸即丸如緑豆大用瓷器中收如患諸疳有蟲者或揩鼻揩眼手剜指甲及下部者取一丸以荊芥湯化為汁候兒睡後點少許於鼻中腦上十指下部中蟲聞皆化為水聖惠治小兒一切疳面腫項細腹肚脹滿四肢羸瘦身上生瘡鼻流清涕頭髮稀疏日漸尫弱夜明砂丸方夜明砂蟬殼各微炒蘆薈熊膽硃砂青黛各細研蜣螂微炒去翅足蛇蛻皮燒灰半兩蟬頭一枚炙黃焦麝香牛黃各細研一分上件藥搗細羅為散以糯米納在豬膽中水煮熟取出糯米為丸如黍米大每服以薄荷湯下五丸量兒大小加減服之聖惠治小兒一切疳青金丸方蝦蟆三分塗酥炙黃焦鶴蝨半兩黃連去須膃肭臍酒製炙微黃麝香細研夜明砂微炒蘆薈砒霜以熟絹裹取生豬肉半斤重裹炙豬肉熟取出各一分上件藥搗羅為末研入麝香令勻煮棗肉和丸如梧桐子大三歲以下以粥飲研破一丸服三歲以上相度加丸服之聖惠治小兒一切疳青金丹一名還命保生丹神祕百發百中極驗方雌蟾一枚仍以端午日午時取之用蠅子系雙腳稍寬得所勿令損傷以胡黃連一寸許當心以線系一半令入蟾口中須系令定倒懸之以生銅器盛取蟾涎至黃昏卻解放勿令傷損只取其涎蟾肚下有斑點者是雄不堪用白淨者是雌蟾也青黛蘆薈人糞蟬殼豬牙皂角雄黃各一分上件藥用瓷瓶一所納藥入瓶中密蓋瓶口黃泥固濟候乾以炭火燒之令通赤去火待冷打破瓶取藥細研為末用蟾涎並麝香一分和研令勻丸如緑豆大用銅盒子盛之如有小兒患一切疳先令暖漿水浴以軟帛子拭乾後更以溫水下五丸量兒大小加減服之若藥干便以乳汁浸化破與服須臾似醉勿怪是藥力如蟾涎較少和藥較硬即更添入乳相和同研為妙聖惠治小兒一切疳抵聖丸方麝香熊膽硃砂各細研瓜蒂蚺蛇膽各一分蟾頭一枚炙令焦黃赤小豆炒熟牛黃細研各半分上件藥搗羅為末都令研勻煉蜜和丸如緑豆大每服以粥飲下三丸如兒小即以乳汁化破與服量兒大小以意加減服之聖惠治小兒一切疳神效使君子丸方使君子沒石子木香胡黃連黃連去須熊膽蘆薈各細研訶梨勒皮阿膠搗碎炒令黃燥仙靈脾天靈蓋塗酥炙令黃各半兩麝香一分細研上件藥搗羅為末用水浸蒸餅和丸如麻子大每服以粥飲下三丸日三服隨小兒大小加減用之聖惠治小兒一切疳長肌肉丁香丸方母丁香二七枚胡黃連黃連去須各半兩硃砂一分牛黃一分麝香各細研一分蝦蟆一枚用酒二升爛煮去骨入豬膽汁更熬成膏蕪荑一分豬膽五枚去汁上件藥搗羅為末入諸藥於蝦蟆膏內和丸如粟大空心粥飲下五丸日晚再服聖惠治小兒一切疳胡黃連丸方胡黃連蘆薈研細麒麟竭地龍微炒熊膽研入各半兩蟾酥半錢上件藥搗羅為末用麵糊和丸黃米大空心以粥飲下三丸晚後再服聖惠治小兒一切疳肌體乾瘦發立毛焦心神煩熱熊膽丸方熊膽研入蝸牛炒令微黃黑狗膽黃連去須胡黃連丁香麝香細研沉香鯉魚膽水銀以棗肉少許研令星盡青黛各一分上件藥搗羅為末和研令勻煉蜜和丸如黃米大不計時候以冷水下五丸粥飲下亦得量兒大小加減服之聖惠治小兒一切疳日漸黃瘦無問遠近皆效龍膽散方龍膽去蘆頭木香蝸牛炒令黃夜明砂地龍各微炒熊膽蘆薈麝香並細研各一分硃砂細研水飛過青黛細研各半兩乾蟾頭一枚炙令黃焦上件藥搗羅為末每服以粥飲調下半錢量兒大小以意加減更吹少許入鼻中蟲子自出黃白色可醫黑色難治聖惠治小兒一切疳頭髮成穗面目痿黃鼻癢口乾愛食泥土心腹虛脹肚有青筋四肢壯熱蘆薈丸方蘆薈細研丁香各半兩生麝香各細研胡黃連木香牛蒡子各一分熊膽半錢細研狗膽豬膽蟾頭塗酥炙微焦各一枚蝟膽七枚龍腦一錢細研雞膽十枚上件藥搗羅為末用豬膽汁和丸如麻子大每服以冷水下一丸兩歲以上加丸數服之聖惠治小兒一切疳體瘦皮乾毛髮焦黃心熱煩渴殺疳保童丸方青黛半兩熊膽蘆薈蟾頭灰蝸牛炒令黃為末水銀以少棗肉研令星盡各一分黑狗膽一枚鯉魚膽五枚麝香半分上件藥以青黛等細研次下諸膽研令勻入煉了蜜和丸如黃米大每服以冷水下五丸量兒大小加減服之聖惠治小兒一切疳田父丸方田父大蝦蟆也田父一枚塗酥炙蛇蛻皮一條母丁香二七枚夜明砂微炒麝香細研各一分乾漆搗碎炒令煙出硃砂細研各半兩上件藥搗羅為末先取半兩用醋一中盞熬成膏後入余藥和丸如黍米大每服以粥飲下三丸量兒大小以意加減聖惠治小兒一切疳青黛丸方青黛一分腦麝膩粉蟾酥各一錢上件藥並都研令細用水浸蒸餅和丸如緑豆大每服以溫水下三丸量兒大小加減服之聖惠治小兒一切疳心腹虛脹愛食泥土四肢壯熱闢宮丸方闢宮一枚去頭腳尾麵裹煨熟麝香半錢細研熊膽研入黃連去須各一錢上件藥搗羅為末蟾酥和丸如黍米大每服研豬肝汁下五丸量兒大小以意加減靈苑千金丸方治小兒一切疳久令兒肥壯無疾川楝子肉川芎等分上二味同為末以豬膽汁杵和為丸如麻子大量兒大小加減丸數每以飯飲吞下一日二服常服三丸至五丸張氏家傳丸如緑豆大分五分用硃砂青黛白定粉光墨密陀僧名為五色丸非時進米飲下孔氏家傳治疳熱下蟲方同用臘月干豬膽膏為丸如干湯化動丸緑豆大十丸十五丸肉湯下疳蟲如發便看即見稍遲便化太醫局蘆薈丸治疳氣羸瘦面色痿黃腹脅脹滿頭髮作穗揉鼻咬甲好吃泥土痢色無定寒熱往來目澀口臭齒齦爛黑常服長肌退黃殺疳蟲進乳食干蝦蟆大皂角以上二味淨分同燒灰存性為末每末一兩入下項藥青黛一分研蘆薈研麝香研硃砂飛研各一錢上合研勻用湯浸蒸餅和為丸如麻子大每服三歲服二十丸不計時候溫米飲下更量大小加減談氏殊聖方聤耳頭瘡面腫光撏眉咬甲色痿黃咨啀尿白時赤痢炙燒食療未相當夜明砂共炙蟾末蘆薈神功等麝香如此勿令遲救療四味元來藥最良烏光丹一名明蟾丸夜明砂干半兩蟾末五分但是蟾頭炙令焦黃勿燒為灰麝香蘆薈各一錢上為末蒸餅皮為丸如緑豆大溫水下三丸茅先生小兒疳及諸病保童丸方皂角灰川烏頭炮硫黃別細研陳橘皮去瓤各一兩白姜半兩川巴豆六十粒去皮心膜不去油浸湯一宿別研上件為末拌合用軟飯為丸如緑豆大每服十丸濃煮飯飲下茅先生小兒疳疾蘆薈丸方黃連木香檳榔丁香各半兩膩粉一錢蕪荑去皮取一分青黛羅過三錢一錢半入藥一錢半為衣麝香少許上為末研勻用豬膽五個川巴豆二十粒同豬膽盞盛於飯面上蒸三五次取出只用豬膽油不用巴豆將油拌前藥為丸此大每服十丸十四丸用蔥飯煎飲下茅先生治小兒疳方上用豬膽一個以黃連末實一半用巴豆一粒須是全不損者安其中又以黃連末實之及滿著飯甑內蒸熟取出黃連去巴豆及豬膽汁為細丸每服五十丸陳米飯飲吞下嬰孺青黛散治小兒五種疳若在內則眼澀腹脹痢色無常定或如疳澱日漸羸瘦此內疳之疾也若鼻下赤爛自揉其鼻頭上有瘡瘡不著痂漸流利繞耳生瘡有時目赤頭髮漸稀頭皮光緊漸漸嬴瘦頭大項細此名頭疳也若唇口被蝕齒齦作五色或盡峭黑舌下白瘡上齶有孔子口中見臭氣齒齦被蝕口唇敗爛此名口疳也若疳蝕脊膂十指皆癢自咬甲頭髮焦乾兩膂虛空脊梁如鋸有時腹脹有時下痢此脊疳也若下部開脹痢下膿血有時赤爛癢不可忍痢無其度臭不可堪此名急疳之候也此五種疳候同治一方使用各別須審形候依疳治之大驗青黛二兩麝香雄黃硃砂石鹽蚺蛇膽鹽緑細辛黃礬燒汁盡薰陸香黃連黃柏苦參杏仁去皮尖炒桂心乾薑各一兩藜蘆燒灰莨菪子炒附子炮半兩上十九味為散令勻垍含收之量病傳藥若疳在內以井華水調下三服止且將息不減再服一杏仁許三歲半錢量大小以意加減若口中有瘡用酥少許每夜安唇內須臾自至瘡所若鼻中瘡及鼻赤爛以酥和緑豆大兩丸納鼻中日三二度若頭上瘡以散敷之下部外赤爛以散敷之若脊膂空虛准前與服仍以酥和散摩脊膂上亦治野雞痔病綿裹納之外有頭者掐破以散敷之又治有瘡無名諸癬疥用豬脂和塗之大人口中有瘡綿裹含之小兒白禿瘡以泔清洗去痂拭乾先塗油後敷散瘥忌漿水熱面豬魚雞齏蒜滑膩一切動風物嬰孺治小兒疳或頻壯熱眼赤澀多揩眼揉鼻及頭生瘡毛髮自落或視物不明手足心熱時出蛔蟲或身生肥瘡及作痢或青黃赤白不定口及下部生瘡乃至齒落生無辜兄弟姊妹相傳而死者神驗方黃連苦參粉龍膽各一分木香丁香青葙子犀角併為末各半分硃砂研青黛麝香發燒灰各一銖緋絹方一寸燒灰石硫黃雄黃礬石燒灰胭脂研蚺蛇膽各一銖和前藥都研上為末蜜丸如小豆大空腹清白飲下三丸日再服又有半豆許為末吹鼻中取其一豆許吹下部中亦取少許貼牙齦上忌腥臊鮓魚一切毒物雞豬菘菜芹菜等物錢乙膽礬丸治疳消癖進食止瀉和胃遣蟲方膽礬真者一錢為粗末緑礬須真者二兩大棗四十個去核好醋一升以上四物同熬令棗爛和後藥使君子二兩去皮枳實三兩去瓤炒黃連訶梨勒去核各一兩併為粗末巴豆二七個去皮破之以上五物同炒令黑約三分干入後藥夜明砂一兩蝦蟆灰存五分性一兩苦楝根皮末半兩以上三物再同炒候乾同前四物杵羅為末上用前膏和入臼中杵千下如末成旋入熟棗肉亦不可多恐服之難化太稠即入溫水可丸即丸如緑豆大每服二三十丸米飲溫水下不拘時良方治小兒諸疳諸痢食傷氣脹體羸頭大頭髮作穗壯熱不食多困齒爛鼻瘡丁奚潮熱等疾牛黃煎方牛黃二錢麝香一錢龍腦半錢大蚵蚾一枚去皮骨腹胃炙為末無灰酒一盞獖豬膽一枚同熬成膏胡黃連訶子炮使君子去殼蟬殼不洗沒石子蘆薈蕪荑熊膽夜明砂硃砂雄黃各一分木香肉豆蔻春夏各半分秋冬各一分上丸如麻子大飲下五七丸驚疳金銀薄荷湯下乾疳腹脹桃仁茴香湯下疳蟲東引石榴苦楝根湯下五歲以上十丸此丸尤治疳痢挾熱而痢者不可服良方治瘴及五歲以上疳氣腹脹氣喘木香丸青木香大附子炮去皮臍人參厚朴官桂去無味者羌活京三稜獨活乾薑炮甘草炙芎藭川大黃銼微炒芍藥各半兩內豆蔻六枚去殼止瀉方用雞心檳榔陳橘皮去白各二兩牽牛子一斤淘去浮者揩拭乾熟搗取末四兩余滓不用上十五味為末瓷器盛之密封臨服用牽牛末二兩藥末一兩同研令勻煉蜜為丸如梧桐大心腹脹滿一切風勞冷氣臍下刺痛口吐清水白沫醋心痃癖氣塊男子腎臟風毒攻刺四體及陽毒腳氣目昏頭痛心間嘔逆及兩脅堅滿不消臥時橘皮湯下三十丸利為度此後每夜二十丸女人血利下血刺痛積年血塊胃口逆手足心煩熱不思飲食薑湯下三十丸取利每夜更服二十丸小兒五歲以上疳氣腹脹氣喘空心溫湯下五七丸小者減丸數服凡胸腹飽悶不消脾泄不止臨臥溫酒下取利食毒癰疽發背嵐瘴氣才覺頭痛背膊拘急便宜服之快利為度常服可以不染瘴疾凡瘴疾皆因脾胃實熱所致常以涼藥解膈上壅熱並以此藥通利彌善此丸本治嵐瘴及溫瘧大效李校理敦裕嘗為傳刻石於大庾嶺蒙效者不可勝數豫伯氏任閩中嘗擁兵捕山寇過漳浦軍人皆感瘧用此治之應時患愈豫在江南時值歲發溫瘧以此藥濟人其效如神皆以得快利為度又記凡久瘧服藥訖乃灸氣海百壯又灸中管三十壯尤善張氏家傳云刑部李學士治疳御瘴方得之於馬都丞分兩稍別木香附子各二兩大黃人參厚朴各一兩桂檳榔豆蔻陳皮各三兩余皆半兩牽牛子一升聚寶方朝黃連丸小兒常服疳藥方胡黃連半兩宣連白蕪荑仁木香各二兩上四味為末獖豬膽和於盞內坐飯甑中蒸兩度丸如粟米大每服二十丸米飲下西京丁左藏黃瓜丸治小兒疳疾熟黃瓜一個去瓤留蓋納好黃連蓋卻又蒸熟去黃連白蕪荑仁麥蘖夜明砂龍膽草各一分巴豆炒去皮膜五錢神麯豬膽浸一宿慢火炙麝香各半兩上為細末用蒸黃瓜丸如緑豆大常服三丸飯飲下西京丁左藏紫霜丸治小兒五疳八痢及一切疳木香赤石脂龍骨枳殼去瓤麩炒附子白姜炮黃連肉豆蔻密陀僧各半兩巴豆一十五個去皮膜漿水半盞煮盡水去油細研用麝香半錢上為末蒸餅心和丸如麻子大一歲一丸三歲五丸每服三丸湯使如後常服溫水吞下鼻癢腦疳橘皮湯下吐瀉食疳生薑湯下羸瘦脾疳煎棗湯下疳氣肚脹橘皮湯下筋疳多瀉鹽湯下肝疳眼澀生瘡黃連湯下骨蒸熱覆地食泥土臘茶清下西京丁左藏蝦蟆丸肥孩兒常服得效方干蝦蟆大者一個泔浸三宿去腸肚頭爪淨洗酥炙令黃香陳皮去白一分胡黃連一兩鬱金蕪荑仁各半兩上為末於陶器內用獖豬膽汁和令稀稠得所放飯上蒸熟為度取出半日丸如緑豆大常服五七丸陳米飲下西京丁左藏龍膽丸治小兒疳兼肥孩兒方龍膽草二兩青黛一兩麝香一分上同研勻饅頭底水浸爛如糊和丸如緑豆大常服殺蛔進食長肌膚大有神效食後每服米飲下三丸至五丸惠眼觀證烏梅散治疳病經取腹中疼痛方烏梅延胡索各一分上二味為末每服一大錢水八分一盞甘草一寸捶碎煎至四分去滓溫服劉氏家傳小兒疳蘆薈丸方蘆薈研黃連去毛白朮使君子肉蕪荑仁不見火各一分巴豆半兩連殼銀器內煅存性取一分上末之研飯丸如粟米大每服五丸或七丸飯湯下劉氏家傳治疳方草龍膽末之白蕪荑仁去皮研各一兩上米飲丸如此大不拘時候此藥能進食長肌肉須小兒會食方可服蓋吃食方可疳也日二三歲至十數歲者可服初服三五日問下疳蟲是效每服五丸劉氏家傳象守陳南仲治小兒一切疳諸藥無效方上用大麻子取瀝和干蒸餅末為丸如緑豆大每服十五二十粒空心粥飲下張氏家傳治小兒諸般疳神麯散方神麯陳橘皮不去膜大黃紙裹炮熟芍藥各三銖桔梗芎厚朴薑製枳殼去瓤麩炒白茯苓各一分人參四銖甘草二分炙上為細末無時候入姜一片如茶法煎一錢匕服張氏家傳沉香丸治小兒疳氣方沉香巴豆麵裹油煎令黃色即出入乳鉢研如面肉豆蔻大黃濕紙裹煨香熟木香乾薑炮各一兩檳榔二兩半青橘皮三分上件八味麵糊為丸如緑豆大小兒疳氣以薑橘皮湯下一丸至二丸量大小加減吃莊氏家傳治小兒諸疳頭面微腫腹內作痛色黃肚脹不思飲食多嗽不止蘆薈丸方蘆薈研蕪荑各半分乾蟾用頭並脊背稱木香宣連干蝸牛辰砂研各一分熊膽真者研一錢丁香二錢新者麝香一字稱研使君子取仁一分上為細末麵糊為丸麻子大每服二十丸加至三十丸日三兩服米飲下此藥常用至效須久服見功莊氏家傳小兒疳傷丸子方黃連巴豆去皮心出油了蕪荑萆薢各半兩上為末獖豬膽丸入麝少許硃砂為衣如麻子大米飲下一兩丸量兒大小莊氏家傳疳藥保童方硃砂一分研石菖蒲牛膝官桂各半分上同為末用白羊腎一對煮熟一處搗和丸如緑豆大空心溫水下二丸莊氏家傳疳疾二十四候第一候瀉膿血日漸瘦是冷熱疳宜服八香丸方胡黃連一錢腦麝各半錢牛黃半分蘆薈一錢半蟾酥五十子作塊者亦得白花蛇半兩酒浸去骨蠍梢一分上為細末豬膽丸如黃米大每服五丸米飲下一日三服如患甚仍用生米泔調作散半錢服治小兒脾疳面黃多睡手足浮腫方桑白皮焙漢防己焙人參茯苓胡黃連炮麝香各一分上為末煉蜜丸如麻子大用米飲下五丸一日二服第二候腳細肚高胸前骨生愛吃土泥酸鹹日久通身黃時時吐逆下痢腹內疼痛是脾疳宜服此虎睛一對焙牛黃硃砂麝香各一分桔梗半兩煨上為末煉蜜丸生薑湯下三丸至五丸治小兒脾疳瀉血肚大氣喘方丁香白朮龍腦乾蠍胡黃連夜明砂炒各一分上為末軟飯丸米粒大蕪荑湯下第三候鼻下赤爛愛揉眼無血痢是肺疳乃因吃者乘熱物或病奶所損心肺加之咳嗽更以服涼冷藥過多便上熱下冷漸漸昏沉日夜煩哭方龍腦硃砂各一分鉤藤玄參各一兩胡黃連半兩炮麝香一錢上為末煉蜜丸如黃米大米飲下三丸至五丸治小兒五疳八痢及發焦黃肚脹手足瘦細肚上筋脈起揩眼鼻涕垂至口咬指甲或下部生瘡及大小便不通宜服此藥療之方蘆薈夜明砂炒蛇蛻皮灰黃牛角屑各一分蟾酥少許上為末更入麝香少許煉蜜丸如緑豆大每服三丸用米飲下服藥間仍先用桃柳湯洗浴孩兒了將青皂衣蓋之更用藥一丸至二丸安在孩兒臍中便著醋麵糊與青皂帛貼之候蟲出為度如無蟲但汗出為妙服藥三日後宜減一丸第四候皮虛皺面無顏色身上燥癢心煩宜用藥療之治小兒五疳面色黃瘦身體壯熱吃乳食不能消化眼目澀痛及胸膈痰涎愛食酸鹹常多瀉痢宜服此方胡黃連母丁香黃連微炒去毛蘆薈熊膽研各半兩麝香一分細研蟾頭一枚塗酥炙焦黃上為末用牛膽和丸緑豆大如患心臟疳煎蕪荑甘草湯下三丸食疳瀉血或赤白痢新汲水下三丸吐逆不止及水瀉生薑湯下眼疳羊子肝血與酒和看多少微煎下三丸第五候毛髮稀疏鼻生瘡是肺疳治小兒一切疳肌膚消瘦瀉痢不止口鼻生瘡水穀不化方蝦蟆灰白礬烏賊魚骨炙密陀僧各一分麝香半分上為末煉蜜丸如豆大溫水下三丸聖惠方同但麝香用半兩第六候頭生瘡毛髮稀焦是肝疳方肉豆蔻蟾灰全者各一個桔梗炮茯苓煨大黃煨各一兩腦麝各一錢上為末軟飯丸麻子大粟米飲下三丸只可兩服治小兒頭項細心腹脹滿皮膚干皺毛髮焦黃鼻下赤爛口舌生瘡瀉痢不止日漸羸瘦方大蟾一個去四足劈開腹去肛腸入胡黃連一兩和在內線縫合以濕紙三重裹用泥固濟四面令乾微火出陰氣更用炭三斤燒令通赤即住候冷淨去泥土細研如粉麝香熊膽蘆薈各半兩上一處細研如泥麵糊丸如麻子大米飲下三丸乳汁亦得三歲以上加丸第七候牙變黃赤不定是腎疳宜服此藥治小兒腎疳並疝氣偏墜寒熱方沒藥炮甘草各一分硫黃木香炮胡黃連各一分上為末用蒸棗肉丸如麻子大蓯蓉湯下三丸可兩服治小兒五疳瘦羸定命牛黃丸方牛黃硃砂雄黃麝香丁香腦子各一錢瓜蒂三個蟾酥半分上為末用溫水浸蟾酥和丸如楑米大每服先用溫水化兩丸滴入兩鼻中令嚏三五聲再以溫水下三五丸日可三服神妙聖惠亦有此方但瓜蒂用三十枚丁香一分余藥皆同第八候頭髮焦乾鼻下瘡生是肺疳理小兒五疳八痢腹脹羸瘦頭髮焦乾口鼻生瘡方黃連白蕪荑與黃連同炒焦夜明砂用水淘五次焙各一兩上為末獖豬膽汁和丸如緑豆大三丸至五丸不計時候麥門冬熟水下久患疳氣服藥無效或腹脹氣促不能飲食米欲下取出疳蟲即瘥第九候咬指甲毛髮作穗四肢沉重是心疳治五疳八痢心藏熱方蘆薈半兩研輕粉青黛香墨飛羅面各一錢使君子一個蝸牛五個和肉炒焦細研麝香半錢上為末研細滴水為丸芥子大生地黃汁化下一丸至二丸薄荷湯亦得治小兒疳渴常服五疳不生方大蝦蟆兩個長流水內刮去肚腸之法酒三升瓶內煮令爛去骨研如粉黃連四兩別為末麝香一錢硃砂一錢半上先將蝦蟆膏與黃連末同研後更與麝香硃砂等研勻作丸如緑豆大每服十丸陳米飲下如患疳用黃蠟茶調下如難丸入些酒麵糊不妨第十候肚上筋生齒齦蟲食脾骨槽疳治小兒脾疳手足浮腫方桑白皮炮漢防己人參茯苓胡黃連麝香各一分上為末煉蜜丸如麻子大食前米飲下五丸與第一候第一方同治小兒疳蝕動唇齒及瘡生方蟾頭一個大者燒灰麝香半錢上研勻如粉摻於瘡上立效治小兒一切疳毒有瘡方苦楝皮五斤銼七姑葉半兩銼甘草白礬各二兩蔥白十莖上粗搗令勻用水五斗煮五七沸旋旋添洗瘡處如久患兩服立效第十一候吐逆腹脹是胃疳又名奶疳治小兒因吃著患熱病奶次腹痛並及驚風毒奶便乃下痢吐逆又名奶疳桃仁去皮尖炒胡黃連各半兩沉香硃砂別研各一分金箔五片上為末軟飯丸麻子大米飲下五丸奶汁下亦得治小兒胃疳及進食方胡黃連蘆薈各一分肉豆蔻一個檳榔乾蟾炙各半個夜明砂半分炒硃砂麝香各半錢上為末煉蜜丸如緑豆大一歲一丸米飲及乳汁下亦得如是疳盛次加二丸至三丸取下蟲屎為驗五日一服第十二候齒齦臭爛面無顏色心不思食是脾疳又名口疳治小兒唇口及齒根宣露牙齦生瘡臭爛方葶藶炒胡黃連各二錢黃丹半兩上為末每半錢於牙齦上貼之不得咽津治小兒鼻下赤爛心煩躁鼻中生瘡漸漸轉多及身上焦燥日夜疼痛急治之方訶子二個豆蔻三個黃連六分防風半兩硃砂一分上為末飯丸麻子大每服荊芥湯下三丸第十三候愛合面臥多睡如醉腹脹氣急是心脾疳治小兒合面臥地多睡或氣急面黃哭聲高叫或心痛口乾蓋是因曾吃生肉如此腹內有蟲鶴蝨二分茯苓一兩煨木香一分苦楝根三兩檜株根半兩上先將二味根用水一斗煎成膏然後杵三味為末搜和成丸黍粒大每服三五丸米飲下治小兒一切疳蝸牛丸方蝸牛四十九枚用小罐子一個泥固濟令密燒通赤煙盡為度去泥只用蝸牛灰蛇蛻皮二條為末蘆薈熊膽夜明砂淘泥炒黃連各一分瓜蒡一十四個別為末麝香半錢乾蟾一個要前腳以前一截用泥固濟罐子與蛇皮一處燒煙盡為度用上為末豬膽丸緑豆大飯飲下三丸聖惠方同第十四候鼻內干痛口中臭氣齒根有鮮血是肝肺疳治小兒腸鳴瀉痢口鼻乾常有鮮血日夜痛方白朮炮硫黃各一分枳殼炒胡黃連當歸各半兩上為末每服半錢熟水調下治小兒一切疳方蟾頭一個炙膩粉豆豉蕪荑黃連各一分上為末軟粟米飯為丸麻子大早晚米飲下第十五候腳細肚高並肚上有青脈是脾疳治小兒通身黃瘦大小便結澀脾所召也漢防己炒甘草炙各一兩桑白皮木通木香各半兩檳榔一個胡黃連一分上為末每服一錢水七分盞生薑少許煎至五六分溫二服治小兒疳氣進飲食黃耆散方黃耆五味子厚朴薑汁炙白朮陳橘皮芍藥甘草炙蒼朮乾薑乾蠍當歸各一兩木瓜三兩上為末每服半錢米飲調下第十六候非時生瘡愛吃冷水是熱疳治小兒肝臟風熱眼中不見物及有汗方石決明乳香各一分龍膽二分大黃半兩煨上為末每服兩錢用薄荷溫水調下治小兒一切疳熱渴方蚧蝦蟆大者用二個蝸牛蟲半升用井水淘洗淨為度然後用新瓦罐子一個入二味蟲在罐內用鹽泥固濟了不得透風更進火燒令通赤候冷二味取出不用餅子大黃黃連各二分麝香一分上為末麵糊為丸如芥子大每服三丸至五丸米飲下第十七候皮膚上生粟子糞中米出是脾冷疳治小兒疳氣脾虛冷香連丸方胡黃連宣連各半兩上為末軟飯為丸如黍米大每服空心夜臥用溫水下五丸治小兒一切疳方蘆薈胡黃連硃砂青黛麝香各一分蟾酥少許上為末飯為丸芥子大每服空心臨臥溫水下五七丸第十八候氣滿腹脹及口乾是心胃疳治小兒疳氣腹虛腫有似水氣方肉豆蔻一個木香炮麝香硃砂各一分胡黃連半兩煨上為末飯為丸麻子大米飲下三五丸治小兒通黑狀如鬼形是疳病所致方丁香木香熊膽乾薑各一分蜣螂一個去手足用麵炒上為末蜜丸如麻子大每服三丸五丸二宜湯下如無只米飲下第十九候愛餐生米麵炭甑瓦是脾胃疳治小兒驚風五疳蘆薈丸方蘆薈胡黃連牛黃天竺黃草龍膽茯苓各半兩腦麝人參川大黃雄黃各一分生犀屑二分上為末煉蜜丸緑豆大每服三丸薄荷湯下溫酒亦得化下亦無妨治小兒夜間壯熱或憎寒手足冷雖然能食只是消瘦往往下痢方胡黃連一兩桔梗一分麝香一錢鐵焰粉二分炒上為末糯米糊研作丸麻子大米飲下三五丸第二十候揉鼻揩眼及咬指甲愛飲水是肝渴疳宜先用止渴藥治小兒疳渴方人參乾葛黃芩柴胡甘草炮各一分上為末每服一錢水一盞煎五分去滓候冷分為五服每吃藥時更點鉛白霜寒水石共研一字服之方治疳小兒殺疳令肥保貞丸方上用大蝙蝠一個用罐子內盛火煅存性候冷研細麝香少許用粳米飯為丸黍粒大熟水下三丸第二十一候多寒熱愛臥不起骨熱疳用藥療之治小兒骨熱解毒犀角散方柴胡銀州者川大黃甘草炙川芎茯苓芍藥面葛桑白皮地骨皮山梔子仁黃芩貝母各半兩上為末每服一大錢水一盞入青蒿一枝小麥十粒煎七分溫溫服大假有患更入麻黃連翹二味與前藥等分為末煎服之見效治小兒因驚後天瘹並一切疳熱黑錫丸方黑錫一塊可半果子大水銀半兩金銀箔各一兩以上四味同熬細作砂子蘆薈半兩硃砂牛黃各一分上為末煉蜜丸緑豆大一歲以下梨汁化一丸服之一歲以上用酒或溫水下兩丸第二十二候愛飲水眼目不開是肝疳治小兒手足動眼目不開有時語笑或即嗔怒兼多驚手指甲青狀形似死妄稱天瘹通神丸方茯苓龍齒各煨半兩鉛丹胡黃連各一分銀箔五片麝香一錢釣藤一兩煨上為末煉蜜丸麻子大每十丸米飲下治小兒疳渴和氣止吐逆方人參白茯苓各一兩木香藿香甘草炙各一分乾葛二兩上為末每服一錢水一盞煎七分去滓溫溫服第二十三候肌體或熱或涼發渴無時是急疳治小兒驚熱後生疳宜服天竺黃丸方天竹黃研青黛白附子黃連炒地龍炒麝香研夜明砂淨洗炒用龍膽各一分乾蠍五個炒上為末拌和勻用糯米粥丸如麻子大淡薑湯下三丸切忌雞肉第二十四侯齒齦黑唇懶開赤則心疳積熱治小兒心臟積熱生疳桃花丸方寒水石一兩用炭火燒熱研如面細硃砂半錢細研合和如桃花色上為末水浸蒸餅丸如粟米大冷水下三五丸服旬日自然安妙莊氏家傳治小兒疳蘆薈丸方蘆薈大蝦蟆一個用酥塗炙令黃青黛鶴蝨黃連各等分上為末用豬膽為丸如麻子大米飲下五丸三歲以上十丸如要治風疳更入羌活莊氏家傳蘆薈丸治小兒疳及驚熱方蘆薈一兩使君子用仁青黛各半兩胡黃連一兩半上為細末入麝香一錢研勻獖豬膽為丸黃米大每服一二十丸溫熟水下莊氏家傳治小兒疳藥方胡黃連丁香蘆薈各半兩牛黃半錢麝香半字熊膽一分上件六味滴水為丸每服五丸冷水下莊氏家傳治小兒夏至後立秋前宜服殺疳退黃瘦肥孩兒使君子丸方使君子宣連胡黃連木香丁香天竺黃肉豆蔻各二分先搗為末後研雄黃青黛麝香牛黃各一分蝦蟆一個去肚中物酒浸一宿炙黃焦為末龍腦少許上件為末用狗膽湯浸一宿取汁相和麵糊為丸如黍米大米飲下隨小兒大小加減服莊氏家傳治小兒有疳頭大項細潮熱及驚四肢羸瘦鼻下赤爛口舌生瘡瀉利不調或時嘔吐腳細肚大毛髮焦黃一切驚疳宜服此藥方大蟾一枚去腳肚腸四足淨洗入胡黃連一兩在內用線縫合濕紙三五重裹然後泥固候乾用炭火三斤燒令通赤為末入諸藥合和雄黃末麝香各一分牛黃生龍膽各半分蘆薈二錢上件都細研為末合一處研細又卻取糯米粥為丸如黃米粒大每服五七丸溫米飲下莊氏家傳治小兒疳氣方蘆薈天竺黃牛黃熊膽胡黃連輕粉青黛雄黃各一錢上件同研細入獖豬膽和丸黃米大米飲下五七丸孔氏家傳截疳丸方巴豆六錢去皮膜紙囊裹出盡油取霜黃連半兩為末輕粉一錢匕京三稜炮取末二錢麝香半錢匕皂角和皮用四錢炙令半生半熟拌上為末以爛飯為丸如緑豆大更以硃砂為衣每服臨臥米飲吞下量兒歲數加減初服時四歲小兒可三丸不瀉瀉即歇一日與五丸常服止一兩丸孔氏家傳治小兒疳藥方黃連二兩川楝子一兩芎半兩上為末豬膽汁拌和卻入豬膽中線子系定於石器內漿水煮五七沸取出掛風一宿傾出為丸如緑豆大每服五七丸米飲下孔氏家傳搜疳丸方胡黃連半兩宣連蕪荑仁各一兩麝香少許上為細末次入蕪荑研勻方入麝以獖豬膽汁煮麵糊為丸如緑豆大每服二十丸米飲下不拘時日二三服孔氏家傳治疳亦可常服方豆蔻仁使君子仁南木香各一分黃連半兩上為細末飯為丸每服十丸飯飲下孔氏家傳毛世顯小兒疳藥方上用牛膽釀五靈脂研細再用膽汁丸每服五七丸米飲下孔氏家傳小兒疳藥方黃連二兩蕪荑略炒去扇胡黃連各一兩青橘浸去白使君子用仁神麯炒各半兩麝香研一分上為細末豬膽熬面為糊丸如粟米大每服十丸熟水下孔氏家傳治疳無比丸方代赭石二錢蕪荑去皮雷丸乾漆神麯各半兩上為末粟米糊為丸如芥子大每七丸至十丸米飲下食前日二用麝熏之如有蟲即下王氏手集治小兒疳患牛黃膏方巴豆紙二十重裹出油盡白雪色鬱金為衣各一兩英粉二兩不可見火做粉臘日入水瓶盛用糯米一升至清明日取曬乾使君子十個大者用肉雷丸半兩上件為末麵糊丸如大飲下三五丸量大小王氏手集斧磓丸殺疳溫脾胃思食生肌韓道昌方沒石子白者肉豆蔻去皮各一個使君子十四個去皮楝丁香蘆薈細研木香細銼碙砂水飛荊三稜微炮銼碎胡黃連各半兩以上九味同為末白礬緑礬膽礬各半兩上件三味礬用釅醋一升去核熟棗肉一兩只得於石器內慢火熬成稀膏後入九味藥在內熬稠取出石上塗少熟油磓千百下丸如緑豆大每服三五丸食前陳粳米飲下趙氏家傳治小兒十五種疳蘆薈丸方蘆薈銼研一分白蕪荑焙川芎炒各半兩使君子麵裹炮一兩上三味搗為細末入蘆薈於乳鉢內同研極細以羊膽三個取汁和蒸餅為丸如麻子大每服五七丸米飲下吉氏家傳治疳肚如鼓方密他僧風化灰各一錢黃丹半錢上為末以豬肉炙一片用藥半錢蘸上與吃如不食吃乳母嚼與吉氏家傳治諸疳蚵蚾丸方蚵蚾一個淘浸一宿去骨炙黃色胡黃連末巴豆去心油醋煮十數沸青黛硃砂為衣各一錢麝香少許定粉一分研宣連一兩煨去毛後炮出火氣上件為末紅米飯丸每服二丸米飲下乳汁亦可吉氏家傳治疳皂角丸方乳香沒藥麝香各少許檳榔硃砂各一錢膩粉二錢巴豆七粒白丁香四十九粒上各細研用煮棗肉為丸緑豆大每服三丸皂角湯下吉氏家傳治一切疳蘆薈丸方蘆薈硃砂各一錢蕪荑胡黃連各二錢熊膽半錢巴豆去盡油二七粒蟾一個麝香少許上末用醋酒化蘆薈糊和丸如緑豆大每服五丸飯飲下吉氏家傳治疳調中順氣丸方枳殼一兩大黃一兩半炒木香柴胡各半兩桂心一分人參茯苓各三分上末煉蜜為丸如緑豆大每服五丸香熟水下吉氏家傳治疳困方龍膽草蚌粉上件等分每服半錢米飲下吉氏家傳治諸疳蚵蚾丸方巴豆十五粒冷水浸去心皮膜出油用水煮十沸硃砂為衣青黛定粉各一錢麝香半錢胡黃連一兩去毛炒地上去火毒上末紅米飯丸如緑豆大每服三五丸米飲下或乳香湯下不計時朱氏家傳疳藥常服長肌膚去百蟲保童丸方青黛宣連硃砂各二錢蘆薈一錢使君子十個腦麝各半錢上件八味用獖豬膽煉過為丸三丸五丸熟水下長沙醫者鄭愈傳治小兒疳疾方宣連用巴豆半兩拍碎水三升煮令乾用水洗宣連去巴豆不用使君子仁蕪荑仁各一兩青黛半兩肉豆蔻二兩醋麵裹煨熟輕粉麝香各少許上為末麵糊為丸如黃米大每服五七丸飯飲吞下不計時候洪州張道人傳治小兒一十二種疳肝疳急疳風疳肉疳脊疳蟲疳腦疳食疳蛔疳脾疳腎疳心疳定生死有此候者取得蟲青者死黃者可治須服定命丹方木香夜明砂麝香各一分蟬蛻三個胡黃連二錢金銀箔各五片上件為末軟大米飯為丸麻子大米飲下三粒日三服忌酸鹹油膩第一肝疳小兒雖飲奶乳漸喜肉食尤愛酸鹹只服前定命丹次服此藥肉豆蔻三個枳殼焙三分茯苓胡黃連各半兩大黃甘草各一兩丁香麝香各二錢上八味為末每服一字米飲下日二服久者五服有效第二急疳小兒疳痢下赤色膿血下部脫肛雖有精神命在須臾但服此沉香丸方沉香人參蠍胡黃連乳香各一分龍骨甘草各一兩上件棗肉為丸麻子大每服三丸米飲下日二服久患七服見效第三風疳小兒手足拘拳眼目不開有時自笑或嗔怒驚叫手爪甲青狀似鬼形色似天瘹須服此金箔茯苓散金箔五片茯苓牛膝胡黃連各一兩龍骨一分生木香麝香各一錢上件為末每服一字米飲下日二服忌油膩第四肉疳眼目常痛飲食不下食物不消日漸羸瘦服此調中丸鱉甲醋炙當歸黃耆人參附子炮桂心胡黃連各一兩雄黃少許上為末棗肉為丸麻子大每服三丸米湯下忌魚油物第五脊疳十指爪甲癢痛頭髮焦乾腹肚虛鳴脊骨如鋸時時下痢狀如青澱或膿或血服此硃砂丸方天靈蓋炙一個柴胡燒白朮麝香各一錢檳榔一個上件蒸棗為丸如麻子大每服三丸米飲棗湯下第六口疳漏失第七腦疳鼻下赤爛身心煩躁鼻內生瘡頭髮自落日夜痛無休歇狀似鬼形服此安息丸方安息香丁香胡黃連麝香雄黃各一兩肉豆蔻二錢金銀箔各五片上件煉蜜為丸麻子大每服三丸米飲下第八食疳小兒夜間壯熱或時憎寒手足或冷兼生陰汗漸加消瘦多饒虛腫往往下痢鐵粉丸方鐵粉此是熬鹽𬅿子凡要用將燒紅或醋潑外其鹽霜色起刮鐵粉也硃砂各二錢木香桔梗各半兩胡黃連一錢青州蠍五個上件為末白米飯丸麻子大每服三五丸米飲下第九蛔疳小兒合地面無顏色啼聲乍高狀似心痛往往口乾發動有時醫人不識妄呼見祟不知小兒曾吃生肉肉化為蟲此方大效苦楝丸苦楝根鶴蝨硃砂各一兩檳榔三個麝香一錢上件為末麵糊丸小豆大每服三丸白湯下日可三服忌毒物第十奶疳由乳母胃氣不足小兒吃著冷奶便生吐逆漸成奶疳宜急治莫交腫毒便身通黃狀似橘皮宜服木香散方黃耆人參龍腦各一分蠍乾薑橘皮去白各一兩附子甘草各一兩上件為末每服一字乳香湯調服日進二服重者不過七服忌毒物第十一脾疳小兒常吃泥土日久遍身通黃人不識或呼為陰黃宜服虎睛丸方虎睛一個牛黃二錢桔梗麝香胡黃連各一錢上件為末煉蜜為丸麻子大每服三丸食前米飲下日二服第十二肺疳小兒多是吃著熱味食及病奶損傷心肺便生喘嗽愚醫不辨冷熱以藥攻之變成黃腫漸覺昏沉服此杏仁散杏仁二七個甘草款冬花各二錢麝香胡黃連各一錢半夏湯洗七度半兩上件為末每服一字棗湯調下日進二服五疳出蟲第四諸疳蟲附聖惠論夫小兒五疳之疾皆由乳哺不調寒溫失節之所致也若久而不瘥則腹內有蟲肌體黃瘦下痢不止宜服藥出之則疳氣漸退其蟲狀如絲髮或如馬尾多出於腹背及頭項上若蟲色黃白芨赤者可療青色者不可療也顱囟經治孩子疳痢辨蟲顏色定吉凶硃砂丸方硃砂半石蓮大阿魏如硃砂大蝙蝠血三兩滴眉酥少許上細和少許口脂調先桃柳枝煎湯浴兒後看小兒大小以緑豆大填兒臍中貼之用青衣蓋兒看蟲出來黃色輕青黑色重聖惠治小兒五疳及驚風出蟲定生死乾蟾丸方乾蟾一枚五月五日者良蛇蛻皮一條大者穀精草二兩與以上藥同入罐子內以鹽泥固濟曝乾燒令通赤放冷研胡黃連瓜蒂母丁香以上二味同研末牛黃白龍腦硃砂雄黃蘆薈天竺黃麝香各細研一分青黛半兩上件藥都入乳鉢內研令極細用獖豬膽汁煎麵糊和丸如緑豆大一二歲兒以溫米泔半合化下五丸服藥後以桃柳湯浴兒著青衣蓋疳蟲當出衣上及眉毛鬢邊如細麩片子或如摻面塵毒黑色者難治黃白色易醫仍宜粥飲下二丸日三服甚者半月內瘥聖惠治小兒五疳瘦弱毛髮乾焦口鼻多癢有蟲宜用麝香丸方麝香蘆薈粉霜硃砂細研各一分蟾酥一白豆許大皂莢三寸燒為灰蛇蛻皮五寸燒灰蝙蝠三枚取血拌入藥末上件藥都細研以油熔蠟和丸如小豆大先以桃柳湯洗兒後用藥一丸塗於臍中上以醋面封之良久即蟲出黃白赤者易治黑者難療聖惠治小兒五疳四肢乾瘦腹脹氣粗頻揉鼻眼宜服出蟲蘆薈丸方蘆薈牛黃各細研蟬殼各一分膩粉粉霜硫黃細研麝香細研各一錢田父一枚燒煙似絶便住青黛半兩細研巴豆十枚去皮心研紙裹壓去油蛇蛻皮一條燒灰上件藥搗羅為細末入研了藥令勻以粳米飯和丸如緑豆大每服溫水下兩丸良久煎桃柳水浴兒後以青衣蓋遍身當有蟲出白黃者可治青黑色者難治之聖惠治小兒五疳四肢黃瘦腹脹氣粗發乾作穗眼鼻多癢精神昏悶不欲乳食宜服出蟲水銀丸方水銀三分硫黃二味結為砂子細研砒霜硃砂細研水飛過蘆薈細研各半兩蛤蚧一枚塗酥炙令微黃烏驢蹄灰蟾灰雄黃蟬殼微炒天靈蓋塗酥炙黃焦故皮巾子白狗糞灰各一分上件藥搗羅為末入研了藥令勻以苦參半斤銼碎用水五升浸一宿煮至一升去苦參後熬成膏用和諸藥丸如緑豆大後入去卻汁獖豬膽內盛懸於舍東陰七日候乾以麝香蜜水下三丸後便煎桃柳湯浴兒了以青衣蓋遍身蟲出或泄惡氣並瀉惡物便是病源已出小兒每三歲加一丸服之聖惠治小兒五疳下痢羸瘦鼻癢有蟲田父散方田父炙微黃胡黃連各三分夜明砂微炒蛇蛻皮燒灰各半兩白礬灰莨菪子水淘去淨者炒令黃黑色各一分牛黃硃砂麝香各細研一分上件藥搗羅為末都研令勻以糯米飯和丸如緑豆大一二歲兒空心以熟水下三丸服藥後用桃柳湯洗浴兒了以青衣蓋覆良久當有蟲子出黃白赤者易治黑色者難醫量兒大小加減服聖惠治小兒五疳有蟲定命天靈蓋丸方天靈蓋灰汗襪灰麝香驢蹄護干灰各一分砒霜半分蟾酥一片如柳葉大上件藥都研為末煉蜜和丸如麻子大空心以溫水下二丸後以桃柳湯浴兒了澄浴水清看盆內當有蟲如蟻子白即吉黑即凶更看兒大小以意加減服之聖惠治小兒五疳久不瘥羸瘦極甚出蟲丸方硃砂麝香牛黃蝸牛子炒微黃夜明砂微炒熊膽各一分蟾酥半錢上件藥都細研以麵糊和丸如緑豆大每服以溫水下三丸更別以水研一丸滴向鼻中得嚏五七聲良久當有蟲汗出立效聖惠治小兒五疳出蟲乾蟾丸方乾蟾燒灰一枚天靈蓋燒灰半兩麝香細研半分蟬殼微炒去足鱉甲塗酥炙黃焦去裙襴各一分上件藥搗羅為末用燒飯和丸如緑豆大二歲以下以蛤粉湯下一丸三歲以上至五歲二丸服藥後續以桃柳湯浴兒後用青衣蓋之當有蟲子出赤白者易治黑者難醫聖惠治小兒五疳出蟲熊膽丸方熊膽硃砂麝香蚺蛇膽各細研蜣螂微炒瓜蒂以上各半兩上件藥搗羅為細末入研了藥令勻用獖豬膽汁和丸如緑豆大先用桃柳湯浴兒了用粥飲下三丸以青衣蓋當有蟲出也聖惠治小兒五疳有蟲定命散方干蝦蟆燒灰一枚蛇蛻皮炒令黃蟬殼各一分上件藥搗羅為末入麝香末半錢研勻但是一切疳至午時後以暖水調下半錢一二歲即服一字後煎桃柳湯放溫浴兒了便用青衣蓋當有蟲出即效聖惠治小兒五疳手足乾瘦腹脹筋起鼻癢昏沉多睡宜服出蟲蟾頭丸方蟾頭塗酥炙黃焦二枚青黛細研皂莢先於廁中浸七日後以水洗淨刮去黑皮塗酥炙令焦黃去子硫黃細研一分巴豆去皮心研紙裹壓出油七枚麝香細研半分上件藥搗羅為末煉蜜和丸如緑豆大空心以粥飲下三丸良久當有蟲出量兒大小以意加減服之聖惠治小兒五疳頰熱乾瘦或渴不欲乳食宜服出蟲蘆薈散方蘆薈細研胡黃連熊膽研入硃砂細研各半兩雄黃細研代赭各一分麝香細研半分乾蟾一枚塗酥炙焦黃上件藥搗細羅為散先用桃柳湯浴兒後以粥飲調下半錢然後著青衣蓋覆其蟲自出量兒大小加減服之聖惠治小兒五疳羸瘦腹脹不欲乳食宜服出蟲螳螂散方螳螂炒令黃三分蝸牛子炒令微黃蟬殼微炙各七枚丁香地龍微炒各三分蟾酥研入麝香蛇蛻皮灰各一錢上件藥搗細羅都研為散先以桃柳湯浴兒後以粥飲調下半錢便以青衣蓋覆當有蟲子自出赤白者易治青黑者難治聖惠治小兒五疳體熱乾瘦發立鼻癢有蟲不欲乳食青黛丸方青黛蘆薈各細研人中白各半兩豬牙皂莢生用蟬殼微炒各半分麝香細研一分胡黃連三分蟾涎人乳汁各少許上件藥搗羅為末取五月五日午時修合以粽子內棗肉及蟾涎乳汁和丸如黍米大先以桃柳湯浴兒後以粥飲下三丸後著熱青衣裹兒看身上有蟲出青黑者不堪白黃赤者易瘥錢乙胡黃連麝香丸治疳氣羸瘦白蟲作方胡黃連白蕪荑去扇各一兩半黃連木香各半兩辰砂別研一分麝香別研一錢上為細末麵糊丸緑豆大米飲下五七丸至十丸三五歲以上者可十五丸二十丸無時錢乙榆仁丸治疳熱瘦悴有蟲久服充肥方榆仁去扇黃連去須各一兩上為細末用豬膽七個破開取汁與二藥同和入碗內甑上蒸九日每日一次候日數足研麝香半錢湯浸宿蒸餅同和成劑丸如緑豆大每服五七丸至一二十丸米飲下無時錢乙大蘆薈丸治疳殺蟲和胃止瀉方蘆薈研木香青橘皮胡黃連黃連白蕪荑去扇稱雷丸鶴蝨微炒各半兩麝香別研二錢上為細末粟米飯丸緑豆大米飲下一二十丸無時張渙桃柳湯服諸疳蟲藥後用此法助之方桃枝柳枝各二兩上件並銼碎以水兩大碗煎數沸通手浴兒甚佳浴兒畢用一青衣服蓋之疳蟲自出為驗張渙雄黃丹治五疳羸瘦或多生蟲方胡黃連乾蟾酥炙黃川黃連去須白蕪荑各一兩乾漆半兩以上搗羅為細末次用麝香一分細研水磨雄黃半兩細研上件一處都拌勻以豬膽汁和丸如黍米大每服十粒以新汲水下量兒大小加減張渙豬肚丹治小兒疳瘦益汗多倦少力大便有蟲曾經大效方川黃連揀淨木香胡黃連各一兩肉豆蔻白蕪荑蘆薈羌活鱉甲酥炙去裙襴各半兩上件搗羅為細末用獖豬肚一個洗刮令淨先以好香白芷二兩納肚中蒸極熟去白芷不用卻入諸藥縫合再蒸如泥取出同豬肚搗二三百下成膏如黍粟大每服十粒米飲下不拘時候量兒大小加減西京丁左藏黃連丸治小兒五疳出蟲方巴豆去心膜出油細研黃連末熊膽焙研如是新者盞內坐於瓶上慢火熬干如糊和藥各一分上件勻或滴水丸如麻子大每服三丸米飲下莊氏家傳小兒取疳蟲方檳榔二個為末蕪荑鶴蝨炒狼牙各一兩上為末每服二錢飯飲調下三歲者臥時沙糖下二錢妙孔氏家傳殺疳蟲藥方上用苦參炒帶煙出為末米飲下王氏手集五疳出蟲神聖五疳丸方獨腳仙二個紅娘子七個榆株者青黛半兩眉酥雄黃各半錢胡黃連麝香熊膽蘆薈各一錢上件為細末用豬膽一個藥入在內飯上蒸過丸如芥子大每服一丸倒流水少許用箸頭化破男左女右鼻內灌之良久頭面上蟲出如蟣蝨為效王氏手集治小兒疳瘦有蟲諸藥不效者方蛤蚧一個頭腳全者湯浸去皮骨取肉以手拔碎使君子二十個去殼湯浸去皮用竹刀子切焙乾上二味一處以石碾為末用獖豬子肝連下切可重三四兩許批作三四重逐重將藥末摻在肝上以新箬葉包裹麻皮纏縛研倉米飲三二合慢火煮令熟取出放溫去箬葉切與小兒吃作三次與食未會吃物將肝碎焙乾碾為末米飲調與服或作小丸子亦得當取下蟲來大忌犯鐵器吉氏家傳治疳積殺蟲吐逆歸命丸方生犀一分牛黃豬膽雄黃狗膽鯽魚膽牛膽各半兩四膽皆陰乾用上七味都末取水煮麵糊為丸如麻子大每服三丸加減煎棗湯下吉氏家傳治疳積有蟲勝金散方丁香生犀各半兩川楝子蕪荑蘆薈各一錢上為末每服半錢陳米飲下吉氏家傳治五般疳氣出蟲方乾地黃蜣螂炙蛇皮炙胡黃連蟬蛻等分上末入麝香少許醋丸如緑豆大七歲以下四丸二歲二丸忌毒物吉氏家傳治熱疳出蟲方夜明砂蝸牛子麝香各少許上研夜明砂及麝以蝸牛子為丸緑豆大每服三丸粥飲下良久桃柳枝並乳香湯浴用青皂衣裹定孩兒一食間遍身蟲出後用補藥黃柏蜜炙炒黃為末半錢粥飲下吉氏家傳治小兒肚大有蟲方苦參宣連各半兩膩粉一錢上末每服一錢沙糖酒調下四更時與服宣下蟲妙吉氏家傳治疳蟲咬心痛勝金丸小兒蟲咬痛鑽心日夜連連不可禁蘆薈牛黃龍齒麝胡黃連合勝如金熊膽汁丸如小豆每服三粒自功深須著米泔交送下免憂蟲蝕敢來侵龍齒蘆薈麝香各一字牛黃半字胡黃連半錢上搗研極細熊膽為丸小豆大米泔下三丸朱氏家傳治小兒疳氣不思飲食常服退疳殺蟲龍膽丸方龍膽草苦參川楝子各等分上件為末水煮糊為丸如黍米大每服十五丸飯湯吞下日進三服長沙醫者鄭愈傳治小兒疳蟲肥潤臟腑進食殺蟲保童丸方鶴蝨大黃蘆薈各一分半龍膽半錢木香青皮各一錢肉豆蔻一個宣連胡黃連各一錢半入巴豆肉一錢同炒過去巴豆不用上為末麵糊為丸如此大每服十丸或七丸米飲下兼能止痢白痢白薑湯下赤痢甘草湯下水痢陳米飲下常服薄荷湯下疳疾吹鼻第五顱囟經治孩子吹鼻青黛散方青黛細辛各一錢宣連瓜蒂蘆薈地龍各半錢硃砂一字上為末細研和合吹鼻中入麝香少許顱囟經保童丸方硃砂麝香新蟾酥各等分上研合成劑盒子內盛丸如麻子大又於一盒子內浸一丸以箸頭點入鼻中亦名問命丸但孩子病甚即與吹之或得七噴可以治之五噴即甚三兩噴必死矣此不可深著水浸臨時入水亦不畏顱囟經治孩子腦疳鼻癢毛髮作穗面色赤益腦散方地榆炙蝦蟆燒各一分蝸牛殼二十一個青黛石蜜各二分麝香二大豆許上為散吹鼻當有黃水出忌甜物聖惠治小兒一切疳吹鼻問命散如嚏多疾輕易療如不嚏者必死矣青黛散方青黛細研細辛各半兩蘆薈麝香各細研瓜蒂乾地龍微炒黃連去須各一分上件藥搗細羅為散每用少許吹在鼻中得嚏即吉聖惠治小兒一切疳吹鼻亦名通頂散方白礬灰麝香熊膽各細研藜蘆去蘆頭丁香黃連去須胡黃連干蝦蟆灰細研各一分赤小豆二百粒上件藥搗細羅為散都研令勻每用少許吹鼻中當有蟲出聖惠治小兒一切疳腦悶昏沉宜先用吹鼻散方青黛研躑躅花各一分黃連去須瓜蒂乾地龍炒麝香研各半分上件藥杵羅為末用少許吹在鼻中若嚏五七遍其疾則輕若三兩嚏者急治之如不嚏必死之候聖惠治一切疳吹鼻散方瓜蒂赤小豆炒熟各二七枚胡黃連半分倒鉤棘針二十枚上件藥搗細為散每日早晨以半字吹兩鼻中並用粥飲調一字灌之每一度吹鼻灌藥一服聖惠治小兒一切疳羸困腦悶定命通頂散方滑石干燕脂各一分蟾酥杏仁大上件藥都細研為散每用兩黃米大吹入兩鼻中有嚏二五聲神效聖惠治小兒一切疳腦熱發乾吹鼻散方熊膽硃砂各一錢麝香半分上件藥同研令細五月五日取蟾酥和丸如黍粒大取一粒研為末吹兩鼻中甚者兼以奶汁調塗口中及齒齦上更甚者暖水下三丸聖惠治小兒一切疳鼻塞壅悶宜用瀉腦散方穀精草燒灰細辛蘆薈瓜蒂各一分上件藥搗細羅為散每用黃米大吹在鼻內當出惡物為效聖惠治小兒一切疳鼻癢發乾吹鼻散方蝸牛殼微炒蝦蟆灰各一分麝香一錢瓜蒂末半分上件藥細研為散每用麻子大吹入鼻中日三四度後便煮益母菜粥與吃佳聖惠治小兒一切疳心煩腦熱宜用灌鼻丸方青黛黃連末蘆薈瓜蒂末各一錢龍腦一杏仁大蟾酥半杏仁大上件藥都研為末用粳米飯和丸如緑豆大以奶汁化破兩丸滴在鼻中每日三兩度用之效聖惠治小兒一切疳頭髮干疏腦熱煩悶吹鼻散方瓜蒂七枚蔥白一莖切曬乾黎蘆英粉各半錢麝香一字上件藥搗羅都研為散每用緑豆大吹左右鼻中良久有蟲子出仔細看如斷綿此是病根出也聖惠治小兒一切疳頭髮干立作穗眼睛有膜鼻頭生瘡宜用吹鼻通腦散方蚺蛇膽研入犀角屑穀精草各一分上件藥搗細羅為散入麝香同研令勻每使時候兒睡著以粳米大納入鼻中有蟲出似馬尾長三二寸便是病也聖惠治小兒一切疳定命丸方硃砂細研蛇蛻皮灰青黛細研各一分麝香半分細研瓜蒂乾蠍微炒各二十枚上件藥搗羅為末都研令勻用狗膽汁和丸如黍米大每度以乳汁化破一丸男左女右滴入鼻中得嚏三五聲為效聖惠治小兒一切疳及有名無名瘡疥孩子頭干腦有無辜子或時喉閉並用吹鼻散方蝦蟆灰甘草末地榆末蝸牛殼各一分麝香蘭香灰龍腦各半錢青黛人參灰各一錢花蛇膽半分上件藥都細研每日取少許吹於鼻中其患漸瘥其發生出皆如漆色切忌五辛聖惠治小兒一切疳揉眼鼻撏耳發乾吹鼻散方蝸牛殼二七枚洗去土蝦蟆灰地榆銼各一分青黛細研蘭香灰麝香細研半分上件藥搗羅為末相和更研令極細每日兩度以葦筒子吹半粳米大於鼻中覺有效即日一度吹之聖惠治小兒一切疳眼鼻癢腦熱發立乾瘦宜用此吹鼻散方熊膽黃柏各一分丁香蝦蟆五月五日者炙黃皂莢各半兩麝香一錢細研上件藥細羅為散每用小豆大吹於兩鼻中嚏出疳蟲為效聖惠治小兒一切疳腦熱鼻塞宜用通頂定命散方蘆薈細研瓜蒂鵝不食草豬牙皂莢各一分麝香一錢細研上件藥搗細羅為散每取少許吹於鼻中當嚏出疳蟲黑者難治赤白黃者易治聖惠治小兒一切疳通頂散方青黛細研藜蘆各一分蟾酥半杏大研入赤小豆二十粒麝香半分細研瓜蒂七枚上件藥搗細羅為散每度用一緑豆大吹入鼻中當有蟲子出如米心大黑者難治赤白黃者易治聖惠治小兒一切疳吹鼻散方上取棘針瓜蒂等分搗細羅為散每用黍粒大吹入鼻中日二度佳茅先生小兒患甚不知人事既無脈形候又不好可用此吹鼻散試如搐入鼻中打噴嚏來即吉不打噴嚏來即死又名問命散青黛末細辛瓜蒂黃連各等分上入麝香少許為末每服用指甲挑少許搐入小兒鼻中依前法所言張渙通聖散治一切疳證可以卜輕重逆順方瓜蒂半兩細辛乾地龍炒白礬灰藜蘆去蘆頭各一分上件為細末每用少許吹鼻中得嚏即吉若有蟲出即瘥
