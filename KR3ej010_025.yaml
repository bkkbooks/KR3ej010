body:
  text: 卷第二十五諸疳異證凡十一門走馬疳第一茅先生小兒生下有走馬疳候甚即遍沿作崩沙候牙邊肉腫爛口內氣臭身微有潮熱吃食不得齒縫出鮮血齒常動似欲脫肉爛自漏落此候因肚中疳氣盛而奔上上焦蒸得牙如此所治者先以黑鉛散方見本門一日三次揩殺牙邊肉內蟲然後將硃砂膏方見驚積門中牛黃膏方見膈熱門中天竺黃散方見實熱門中夾調理如甚則下秋霜散揩牙上方見本門然常服三解牛黃散方見實熱門中如此調理則愈如調理不退候極齒落三個面光淨爪甲黑死候不治惠眼觀證走馬疳疳蝕之極也乃五臟蒸熱上攻口齒潰爛先以淡淡鹽湯洗口內次下紫金散摻之方見本門與茅先生同如大段甚即下秋霜散摻方見本門再以天竺黃散夾地黃膏與吃即安二方並見重舌門中若見先落齒一個即死候不治相次面光發而腮漏見骨而卒小兒形證四十八候走馬疳歌疳名走馬意如何急疾生蟲胃熱多腎冷又攻牙齒動血腥氣臭不通呵齒齦紫色為深極肺絶殃深事轉多若使齒牙都又黑腎家亦絶奈醫何此病先與退脾肺風熱宜吃檳榔散五七服方見煩熱門中後用此藥貼齦上以大棗一個砒少塊去棗核入砒在內纏定燒灰存性臨臥時貼齦上數次效惠濟小兒走馬疳候歌牙齦風腫熱攻傷愚者須知走馬瘡胃崩沙疾口氣和膿並血臭一回乳食汙衣裳邪傳腎臟風毒壅熱極胸膛未可量牙焦落地猶間事唇口都穿命亦亡此候先用蔥湯丸取次用蛇床散貼之二方並與黃氏家傳方同蔥湯丸見驚積門蛇床散見本門中仙人水鑑治小兒走馬疳蟲透損骨者方上用天南星一枚當心剜作一竅子安好雄黃一塊在內用大麥麵煨候雄黃熔作汁以盞子合定出火毒一宿去面研為末入好麝香少許掃在瘡上驗集驗方治小兒走馬疳上用蠶退紙不計多少燒成灰存性入麝香少許貼患處佳博濟方治小兒走馬疳蝕唇頰齒牙浮動宣露口臭至妙秋霜散信砒一錢粉霜膩粉各半錢麝香少許上件四味同研令細如粉每用時以指頭拈一粟米許揩在患處牙齦上立效博濟方治大人小兒齒齦損爛及走馬疳麝香膏麝香一兩豬牙皂角三挺存性燒用白礬二兩緑礬一兩半二味同研碎入銚子內枯了用膩粉水銀各半兩苦楝根白皮黃柏密他僧各一兩上件杵為末用無灰酒三升熬成膏患者先淨漱口塗之久患者取藥一匙砒霜粉霜末各一錢拌和勻使絶妙一方通十一味內不用砒霜膩粉靈苑治小兒走馬疳牙齦腐爛惡血口臭牙齒脫落立驗麝香散方麝香銅緑各一錢黃連三錢上三味併為末以棗肉一個水銀一錢同研如泥入前藥末共研令勻有患處敷少許以蘭香葉覆之立瘥肉消者可待肉生靈苑又方蝦蟆一個燒作灰留性青橘皮甘草青黛各一分上件四味杵羅為細末入麝香少許研合令勻或小兒滿口臭爛落下牙齒用鵝毛掃於瘡上立瘥談氏殊聖治走馬疳方上用尿桶內白不拘多少焙乾為末入麝香少許研細揩牙立效談氏殊聖又方上用蜣螂不以多少燒過碾為末入麝香少許和勻摻在瘡上其血化毒水立效談氏殊聖又方疥蝦蟆一個五月五日午時新瓦二口盛在裡面更用楊柳條五尺安在裡面用火燒麝香少許膽礬二錢上件研為末每服用少許以柳條子去皮挑在瘡上立效談氏殊聖又方草烏頭炮去皮尖御米殼焙乾銅青各生一錢上件為末用淡鹽水漱口綿子搵干用藥乾摻點之談氏殊聖玉線子治走馬疳方雄黃一錢黃丹半兩麝香砒霜各少許上件四味用七七四十九粒緑豆盞子內共砒一處煮熟不用緑豆將四味為末麵糊為丸牙縫裡填茅先生小兒走馬疳黑鉛散惠眼觀證名紫金散方黃丹蛇床子炒令黑地龍炒令黑各半兩青礬一分煅過上末每服一字揩牙齦上一日三次揩茅先生小兒崩沙秋霜散方好砒半兩白礬四分上用水三分一盞先煎水令海眼沸來便下砒煅水乾為度即下白礬末同煅干為末取出入好麝香少許好坯子少許同拌合為末每使一字用鵝毛點拂牙齦上一日三四回拂即愈茅先生小兒崩沙方雞內金蘆薈白礬火煅乳香地龍麝香上各少許為末候小兒睡著以藥末摻牙齦上錢乙龍骨散治疳口瘡走馬疳方砒霜蟾酥各一字粉霜半分龍骨一錢定粉一錢半龍腦半字上先研砒粉極細次入龍骨再研次入定粉等同研每用少許敷之良方治小兒走馬疳唇齒瘡爛交巡狼狽用此即瘥砒霜粉霜二物先研極細石灰羅過次研上等分相合左右轉研各千下當極膩如面每以雞羽尖托少許掃瘡上其瘡即干慎勿多用恐入腹中有大毒慎之海州東海縣民家賣此藥每百錢一掃如米許大無不瘥者九籥衛生緑雲散療大人風疳牙宣小兒走馬疳方砒霜一錢膽礬一分定粉石灰各半兩上件同研勻每用半字揩患處聚寶方麝香散治小兒走馬疳牙齦宣露麝香一字退石灰皮密他僧各一分砒霜半分上四味為末每用一字水油調翎子掃在齦上後口中吐黑水三兩次佳聚寶方蘆薈散治小兒走馬疳效蘆薈蟾酥真者大麻仁膩粉麝香銅青各一錢石膽燒灰一字上七味為末每用先以穀草𦱌草二味鹽漿水煎汁洗搵乾用藥少許遍塗瘡上若小可瘡痍只用散子入乳汁或漿水調塗之西京丁左藏定命散治小兒走馬疳方白礬緑礬以上各等分炒一大錢上同研勻用大麥面五錢萎蔥一寸研爛將面同搜和軟硬得所為餅子將研勻者藥裹在中心用文武火燒存性於地坑內出火毒一宿又研如粉入鉛霜二錢同研令細每服一剜耳許揩牙上一二遍西京丁左藏蟾灰散治小兒走馬疳方干蝦蟆一個大者燒存性五倍子以上一錢麝香少許上同研蜜水調塗齒根上未止更用之西京丁左藏聖散子治小兒走馬疳方膽礬龍膽草各一兩上同於瓦瓶中煅煙盡略存性貼瘡上西京丁左藏生金散治小兒走馬疳方天南星一個重一斤者緑礬一兩上先安排南星在乾地上用礬與南星同處四邊以灰火燒煙盡為度取出後研如粉入當門子一粒先含漿水洗貼之西京丁左藏捍牙散治小兒走馬疳脫落牙臼方鹽瓜虀燒灰抄三錢砒霜抄一錢麝香少許上研令勻雞毛掃於牙床上牙臼落者依舊安得掃藥了卻黏住神效惠眼觀證秋霜散治崩沙齒齦欲落方粉霜砒霜白礬各一錢上為末用北艾一大團裹定上件藥末以石灰滲艾上後用碗盛發火燒盡細研以手捻少許揩齒上用鹽湯漱口燒時以盞子蓋定恐走了藥氣劉氏家傳走馬疳方峰窠雄黃砒上雄砒二物共與蜂窠等分將砒入蜂窠內可深一米厚以下火煅過細研入麝研極勻細候睡著摻藥於牙齦上神效劉氏家傳季琬麝香散治小兒走馬急疳口臭牙齒損爛及攻蝕唇鼻腮頰纍治未效者可用此方立驗麝香一錢真者黃柏一兩去皮杵末青黛半兩上好者雄黃一分飛研上件杵研極細如有患者先次綿纏箸擦卻齒上蝕損死肌以軟帛拭去惡血量瘡大小乾摻日夜五次用之或血盛並多不定者加定粉半兩同研用如前法張氏家傳治小兒走馬疳蟲蝕齒及口鼻唇顆作竅方隔虎刺中蟲一個隔虎刺木如蟲長短要用兩節川人謂之隔牛刺上將刺木並蟲都一處燒作灰入麝香少許研細凡貼瘡先使蜜塗蟲咬處所臨時用藥貼之來日揭起立效張氏家傳小兒走馬疳方砒霜白礬各二錢半粉霜硇砂各一錢上件藥入鍋子內以瓷器蓋口用文武火燒研勻於地上開坑子放鍋子在內候藥冷取出細研更入寒水石七錢再研極細每服半錢分作兩服擦牙齦張氏家傳又方上用大棗一枚去核將真砒一黑豆大在棗內外面紙裹訖泥固濟燒成灰研極細雞毛掃病處立效張氏家傳又方黑神散龍膽草銼青膽礬上等分用甘鍋子一個先入膽礬在內次入龍膽草用鹽黃泥固濟留一眼子周回用炭火燒至眼子上煙斷為度放冷取出研細入麝香少許如有患人看瘡內大小乾擦貼之立效牙疼乾擦牙根有鮮血出並腫爛牙擦之即愈莊氏家傳治小兒走馬疳方緑豆五錢膩粉三錢粉霜青黛砒霜麝香各一錢上研極細每用燈心點在牙齦上患處立止或瘡口大及頰腮或透成血條出者即以小篦子抄藥貼之此藥須旋合恐力慢莊氏家傳又方麝香雄黃熊膽上等分研為末或貼或吃莊氏家傳治小兒走馬疳並諸疳瘡蝕爛牙齦及口中生瘡久不較者大棗一枚去核內膽礬一豆大燈上用大針簽定燒煙斷放地上出大毒上細研入麝香少許每用少許摻瘡上勿令多及咽恐令人吐莊氏家傳又方五倍子不拘多少微炒放冷捶碎再令炒焦黃上搗羅為細末貼瘡上痛者以痛止不痛者以痛為效莊氏家傳治走馬疳骨槽風等雄黃散方雄黃半兩水銀銅緑各半錢麝香半字上先將雄黃同水銀研令星盡次入銅緑麝香研勻細先用鹽漿水揩患處搵令乾次貼藥有涎吐之如走馬疳先剪去死肉貼藥其效甚捷莊氏家傳治小兒走馬疳藥方伏翼蝦蟆各一個小兒寸屎麝香各少許上三味穰在蝦蟆腹內用火燒為灰去小兒疳瘡處一字多貼立愈孔氏家傳治小兒走馬疳牙齦爛者方上以好硃砂少許細研入麝香少許一處研勻用紙捻子蘸一粟米大紝在牙縫內不過三兩上即效孔氏家傳治小兒走馬疳無比散方麝香一分別研真蟾酥緑礬各半兩膽礬沒藥各二分上四味一同用大磚一口鑿中心作竅穴子勿令透地便安四味藥在穴中周回用紅著炭三斤燒過取出同麝香再研勻如有患者以雞翎微濕沾藥末掃於小兒齒上立效王氏手集治小兒走馬疳口鼻生瘡牙齦腫爛諸藥不能治者方槲葉十片乾者麝香少許上以蘆薈為末水調塗葉上炙乾又塗又炙凡塗炙數遍為末瘡濕乾摻趙氏家傳麝香散治小兒走馬急疳口臭牙齦損爛及攻蝕唇鼻腮頰纍治未效服此立驗方麝香一錢真者黃柏一兩去皮青黛半兩蘆薈雄黃飛各一分上為末有患者先以綿纏箸展擦卻齒齦蝕損死肉以軟帛拭去惡血量瘡大小乾摻日夜五次用之或血盛並多不定者加定粉半兩同研用如前法朱氏家傳治小兒走馬疳牙齦臭爛經效乳香散方乳香研密陛僧黃丹各燒研水飛白礬煨青礬燒過輕粉各等分上和研令極細每用一字許貼牙上少頃以青鹽湯漱口日用數次吉氏家傳治走馬疳一字散方天麻麻黃川芎地龍川烏炮各等分上為末每服一字薄荷湯下吉氏家傳走馬疳方膽礬二錢麝香少許乳香一塊上末將塗齦上立安吉氏家傳治走馬疳並乳母腰間生瘡麝香散方熊膽豬牙皂角燒存性稱蕪荑仁螻蛄燒存性稱此乃何古織女上各等分同為末研入麝香少許若走馬疳齒落用蜜調貼牙齦上乳母下腰間生瘡亦用蜜調貼之吉氏家傳治走馬疳方黃連一兩白礬一兩上燒存性為末摻牙上吉氏家傳又方不蛀皂角切去子每一竅子入硫黃一塊如緑豆大燒存性二錢上末稱二兩入麝香膩粉半錢同研揩牙忌動風物吉氏家傳蛇床散治小兒走馬疳方蛇床子蠶故紙共燒為灰麝香少許上為細末每用少許干貼牙上朱氏家傳治小兒走馬疳牙床臭爛不可近紅龍散方信砒火飛過坯子雜坯子也各一錢硃砂少許上為末每服少許敷牙床上然後用鹽水灌漱安師傳走馬疳藥方此疳齒中不住血出上用蠶連紙燒灰止血時間令住若用地骨皮中嫩處為末貼之便未止長沙醫者丁時發傳治小兒走馬疳方銅青香白芷等分上半字摻之口齒疳第二聖惠夫小兒口齒疳者由臟腑壅熱乳食不調內有疳蟲上蝕於口齒故也其候唇口癢痛牙齒峭黑舌上生瘡腦中乾熱齦肉赤爛頰腫齒疼熱毒熏蒸口多臭氣故曰口齒疳方顱囟經治孩兒蝕口齒齒齦宣露臭穢不可近方葶藶子炒梧桐律等分上件和研以臘