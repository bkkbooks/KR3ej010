疳氣肌體瘦羸而臟腑挾於風熱癰滯不得宣通因其乳食過多胸膈痰結邪熱之氣上攻於目則令腦熱目癢或赤爛生瘡或生障翳漸漸遮睛久而不瘥損於眼目故號眼疳也玉訣小兒眼疳生翳歌搖頭揉目熱生疳愛暗憎明不奈觀雀目每因風氣盛斑瘡腑熱翳侵滿此患先與涼膈後瀉肝次淋洗之即無誤也又一玉訣上此患小兒疳熱宜瀉疳散蕤仁膏涼膈退熱方並見本門又一玉訣云小兒疳眼雀目斑瘡入眼者先與利膈退熱良心經後與疳藥也龍木論殺疳散方防風龍腦牡蠣白芷細辛五味子各二兩上為末每服一錢食後粥飲調下龍木論退翳丸方黑參防風各一兩細辛石決明車前子各半兩桔梗黃芩各一兩半上為末煉蜜為丸梧桐子大空心茶下十丸聖惠治小兒眼疳及雀目天南星散方天南星炮裂穀精草甘草炙赤銼黃芩各半兩麝香一分研上件藥搗細羅為散用羊子肝一具切破入藥末二錢用串子炙令熟空心服後用不淘米煮粥半盞壓之聖惠治小兒眼疳諸藥未效宜服使君子散方使君子五顆訶梨勒皮三顆甘草一分炙微赤銼乾蟾頭一枚塗酥炙焦黃上件藥搗細羅為散以羊子肝一枚於砂盆內用生米泔一合同爛研絞取汁食後調下半錢三歲以下即可服一字聖惠又方穀精草川大黃細銼微炒薑石搗研水飛過甘草炙微赤銼各半兩上件藥搗細羅為散以羊子服一枚用竹刀子切破內藥末一字在肝裡面使線子纏定以醋煮熟放冷任意食之不過三五枚子肝見效聖惠又方夜明砂微炒薑石搗研水飛過芎藭以上各三分上件藥搗細羅為散用羊子肝一枚以米泔半盞同研絞取汁調下半錢日三服三歲以下可服一字聖惠又方黃連末麝香硃砂並細研各一分上件藥都研令勻每服半錢用豬子肝切破入藥以絹袋子盛用米泔煮熟放冷食之量兒大小增減聖惠又方羯羊肝一具切開決明子一兩上搗羅決明子為細散摻於肝內用米泔兩碗煮泣盡為度不計食前後量兒大小任意食之聖惠又方薑石搗研水飛過寒水石各一兩豉一合微炒上件藥搗細羅為散每於食後以米泔調下半錢量兒大小加減服之聖惠治小兒眼疳赤癢穀精草散方穀精草一兩蒼朮去皮微炒銼蛇蛻皮灰各一分定粉一錢上件藥搗細羅為散每服一錢用羊子肝一具以竹刀子劈開摻藥在內用線纏定米泔煮熟承熱先熏過眼次服其汁後食其肝兒小即分減服之聖惠治小兒眼疳漸漸急小多赤夜明砂散方夜明砂微炒芎藭各一兩天竺黃犀角屑羚羊角屑白殭蠶微炒甘菊花車前子各半兩上件藥搗細羅為散每日常於午時以溫水調半錢服量兒大小加減服之聖惠又方決明子蕤仁湯浸去赤皮黃連去須各半兩上件藥搗碎用水一大盞入古錢四十文煎取五分綿濾澄清日點三四度瘥聖惠治小兒眼疳不見物者方寒水石一兩搗羅為末水銀一分上件藥相和點少水研令水銀星盡為度每服以米泔研豬子肝半具絞取汁調下半錢量兒大小加減服之聖惠治小兒眼疳怕日赤爛淚下疼痛不久眼睛將落宜早治之薑石散方薑石以濃米泔浸七日曬乾搗研水飛過桑耳搗羅為末豉曬乾搗羅為末以上各一兩上件藥同研令勻三歲以下每服半錢三歲以上至七歲每服一錢用羊肝或豬肝牛肝兩指大去膜細切以水研絞取汁調下日三服聖惠又方白芷桑耳槐白皮銼各一分薑石一兩搗研水飛上件藥搗細羅為散每用豬子肝一片兩指大切入藥末三錢卻系定以米泔內煮熟量兒大小斟酌與食之聖惠治小兒眼疳生障翳不開硃砂散方硃砂細研水飛過雄黃細研各半兩川大黃銼碎微炒石決明胡黃連神麯微炙各一兩上件藥搗細羅為散每服以蜜水調下半錢日三服量兒大小以意加減聖惠治小兒眼疳白翳不退胡黃連丸方胡黃連為末硃砂細研水飛過各半兩青黛雄黃各細研一分麝香一錢細研金銀箔各細研五十片上件藥都研令勻用酒煮麵糊和丸如緑豆大以溫茶下三丸日三服量兒大小加減服之聖惠治小兒眼疳生翳膜遮睛欲失明鈴石散方鈴石石決明甘菊花井泉石夜明砂炒黃連去須各一分上件藥搗細羅為散每服二錢以米泔同煮豬子肝一具令爛熟量兒大小分減服之聖惠治小兒眼疳生翳膜體熱夜明砂散方夜明砂蝸牛殼各微炒子芩豆豉炒乾各半兩硃砂一分細研上件藥搗細羅為散每服一錢以水一中盞入緑豆半匙都煮熟放冷量兒大小和滓分減服之聖惠治小兒眼疳及疱瘡入眼宜服清神散方惡實炒木通銼晚蠶沙各一分上件藥搗細羅為散每服以溫水調下半錢日三服量兒大小以意加減聖惠治小兒眼疳及雀目翳膜遮障宜服此方蛤粉一分上化黃蠟汁與蛤粉相和丸如皂莢子大用羊子肝一枚劈破內藥丸在內著線子系定入米泔內用夜明砂黃芩末各一錢同煮令熟將子肝於臨臥時任意服之神效聖惠治小兒眼疳睛腫欲垂落者方上以生雞子清塗掌中徐徐㩉之逐手漸瘥聖惠又方上以紫草花爛搗以生油調塗之便瘥博濟方治小兒多時瀉痢眼生翳膜並疳眼退翳如聖散蛇蛻皮兩條各長二尺用細燭燒灰研或只烙熟穀精草一兩去根土蟬殼去足石決明各一分黑附子末二錢去臍子定粉四錢上件前三味先搗羅為末次入諸藥同研為散每服一字半羊子肝一具劈破摻末用麻皮線纏米泔煮熟先熏眼後與吃如未能吃食研汁灌之靈苑治肝肺壅熱眼生胬肉赤脈澀痛及赤眼障翳睛疼癢痛羞明及小兒風疳爍陽眼神妙羚羊角丸方羚羊角銼屑日曬乾脆為末甘草生白何首烏瓦松以紗絹內洗去土各一兩生乾地黃洗鬱金炮過用地土去火氣各二兩上件六味並細銼曝乾搗羅為細末煉蜜為丸如梧桐大每服十五丸用濃煎淡竹葉黑豆湯冷下食後臨臥服小兒丸如緑豆大每服七丸至十