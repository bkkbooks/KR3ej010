香肉豆蔻去殼麵裹燒燒熟去面南木香各一兩蘆薈使君子去殼訶子皮去核各半兩上為細末麵糊丸黃米大空心米飲下三十丸莊氏家傳小兒肉疳吃食不肥肌膚乾瘦方鱉甲小便浸炙當歸各一兩黃連牛黃桔梗硃砂各一分麝香少許上為末煉蜜丸麻子大煎棗湯下三丸服莊氏家傳疳瘦疳瀉方使君子沒石子各二個並一生一熟麝香一錢上同為末滴水為丸如緑豆大每服三丸至五丸冷米飲下莊氏家傳治肌瘦殺疳方蘆薈半兩熊膽牛黃郁李仁微炒別研麝香各一分胡黃連一兩乾蟾一個破肚淨洗酒浸一夕慢火炙焦黃別研羅上用麵糊丸如緑豆大冷粥飲下五丸日三服孔氏家傳神聖丸肥小兒疳藥常服永無腸臟之疾方胡黃連去皮宣連去毛白蕪荑去皮木香蘆薈各一錢使君子二十枚上除蘆薈一味外五味銀器內用豬膽汁熬成膏後入蘆薈同丸如緑豆大每服五七粒空心日午臨臥米湯下神效孔氏家傳豬肚丸治小兒疳熱而瘦皆可服方柴胡黃連秦艽各一兩淨蕪荑二兩用丸上爆干去殼取肉別為末臨時食用上用豬肚一箇中庸者破開淨洗入前藥三味末於內以酒半瓶童子小便一升煮乾舂令得所放蕪荑末又舂勻丸如桐子大每服二十丸飲下王氏手集治小兒疳瘦大人五勞七傷方宣黃連半斤去須及蘆頭為細末獖豬肚一個去脂膜將黃連末穰在內縫合於三鬥米內蒸以米熟軟為度上件取出爛研丸如粟米大風乾隨兒子大小加減日三服三歲兒每服五七丸至十丸大人服如梧桐大每服二十丸空心米飲下王氏手集治小兒疳患瘦弱不成腹肚或瀉痢諸藥不效方大蜘蛛十個於碗內用鹽一兩菴之用蓋合定以文武火內炮過去須腳皮肌肚肉用麝香隨多少用蘆薈硃砂各二錢半細研內硃砂減一半用為衣上同研令勻蜜丸如緑豆大量兒大小每服五丸或七丸蜜熟水下王氏手集蘆薈丸治小兒積疳腹脹羸瘦面黃煩渴等疾方蘆薈半分研蕪荑仁使君子去殼稱肥黃連去須稱胡黃連青橘去白草龍膽各一分檳榔沒石子各二個上為細末獖豬膽汁煮麵糊為丸如豌豆大每七粒或十粒量歲數加減溫服吳氏蕪荑丸治五疳黃瘦肚急長肌殺蟲肥兒蕪萸淨肉京三稜白朮檳榔川楝子木香各一分熊膽蘆薈各別研硇砂用絹裹水飛過各一錢黃連一兩淨去須苗上件除蕪荑熊膽蘆薈硇砂外其餘細銼微火焙燥碾羅為末入前件藥用雄豬膽汁和為丸如緑豆大每服飯飲下十粒至二十粒日三服趙氏家傳豬肚丸治小兒肌瘦肥兒消疳方宣連二兩肉豆蔻陳橘皮去瓤人參栝蔞根杏仁去皮尖稱胡黃連檳榔柴胡各一兩上為細末用獖豬肚一個入藥三分之二在內以麻線縫合銀石砂器內煮爛研如泥更入所留藥末一分同和丸如梧桐子大兒子若小丸如緑豆大每服十丸米飲下空心臨臥各一服趙氏家傳斧槌丸治小兒疳久服肥白方干蝦蟆一個白礬膽礬緑礬各半兩四味同入罐子內炭火燒礬枯為度京三稜石三稜雞爪三稜水下不計時候用好硃砂為衣亦可王氏手集萬靈丸治小兒疳瘦不食常可服方黃連川芎川楝子去皮上等分為末以獖豬膽汁和內膽中用飲漿水煮熟取出去膽皮入麝香少許爛研丸黃黍大三五歲兒五七丸米飲下王氏手集治小兒疳瘦滑泄吐逆進奶食治渴蘆薈丸方蘆薈木香宣連去須訶子皮各一分沒石子二個使君子七個麝香半錢上為細末粟米飯和丸如黃米粒大每服十丸至十五丸日進三服如入青黛少許不妨吳氏家傳治五疳黃瘦肚急長肌肉殺蟲肥孩兒蕪荑丸方蕪荑去殼取淨肉不焙別研京三稜白朮檳榔川楝子萆薢鶴蝨雷丸淡蕪荑黑狗脊木香各半兩沒石子三個使君子十個蘆薈熊膽各一錢上為末醋煮乾棗取肉爛研入少麵糊和藥極熟丸如緑豆大每服七丸米飲下趙氏家傳治小兒疳瘦玉柱杖散方黃耆二兩白茯苓半兩人參白朮各一兩上為末以水一盞藥一錢煎七分溫服趙氏家傳治小兒諸疳羸瘦不生肌肉大蘆薈丸方蘆薈木香紅芍藥沒石子各半兩使君子去皮一分肉豆蔻二錢人參一錢胡黃連一分上為細末入麝香半錢別研令細與藥拌勻蜜水打麵糊為丸每服十五丸米飲下空心食前服吉氏家傳治小兒聖疳藥十日肥治五疳諸痢發立焦黃肌瘦腹中疼痛愛吃泥土瀉痢無常盜汗腹大喘粗腳細難行洞下脫肛時時壯熱面覆地臥心喜啼呼腹內蟲生糞中米出便如泔澱嘔吐無時有以瘦勞更加寒顫此疾真是疳也宜此方黃連去須白芷苦參丁香青黛麝香硃砂上各等分上件為細末獖豬膽丸如芥子大別以硃砂為衣每服十五丸米飲下更看虛爛研如粉用粟米飯為丸如緑豆大每服五丸米飲下一日兩服張渙金粟丹治腹大疳瘦如吃泥土泄利不調方母丁香草龍膽厚朴生薑汁製好硃砂細研水飛青黛研各一兩乾蟾五枚塗酥炙焦黃夜明砂微炒訶子皮微炮蟬殼各半兩川黃連冬用二兩夏用一兩以上搗羅為細末次用麝香研半兩上件藥一處拌勻用煉蜜一半白麵糊一半丸黍米大每服十粒米飲下不拘時候量兒大小加減張渙香蟾丹治肌瘦面黃胸高腳細方乾蟾五枚水浸去骨用瓦藏瓶一枚須頭上取門入蟾瓶內鹽泥固濟木炭火燒留一竅以煙息為度取放地上一宿出火毒胡黃連二兩蛇蛻皮一兩燒灰地龍半兩微炒天竺黃蟬殼各一分以上併為細末次入上用黃栝蔞一個去瓤用黃連末填滿蒸爛取出用朴消末一錢蓋頭臨夜方取下然後露一宿研爛為丸許大每服五丸熟水下萬全方灸法黃帝療小兒疳痢脫肛體瘦渴飲形容瘦悴諸般醫治不瘥者灸尾翠骨上三寸骨陷間三壯炷如小麥大岐伯云兼三伏內用桃柳水浴孩子午時當日灸之後用青帛子拭兼有似見疳蟲子隨汗出也此法神效不可量乾疳第十聖惠夫小兒乾疳者由乳食不調心脾積熱之所致也其候身體壯熱或即憎寒舌澀口乾睡多盜汗皮膚枯燥發立毛焦乳食雖多肌肉消瘦四肢無力好睡昏昏日往月來轉加虺悴故號乾疳也仙人水鑑小兒患疳氣久不瘥遂受旁疾宜服此獨治乾疳方天靈蓋生鱉甲波斯青黛黃鹽以上各一分陶隱居士北海黃鹽草粒粗以作魚鮓及咸菹上並同研令細日服一字空心熱水下若是濕疳不治乾疳治之不過三服神效聖惠治小兒乾疳心臟煩熱眼目赤澀皮膚乾燥夜多盜汗羸瘦不能乳食天竺黃散方天竺黃半兩牛黃雄黃硃砂蘆薈麝香各細研蟾頭炙令焦黃胡黃連犀角屑木香甘草炙微赤銼鉤藤各一分龍膽一錢細研上件藥搗細羅為散都研令勻每服以溫水調半錢服日三服量兒大小以意加減聖惠治小兒乾疳體瘦煩熱眠臥不安宜服此方牛黃雄黃蘆薈青黛各細研丁香黃連去須熊膽研入蛇蛻皮灰天竺黃天漿子微炒犀角屑各一分胡黃連半兩蟾酥半錢研入麝香一分細研上件藥搗羅為末更研令勻以煉蜜和丸如緑豆大每服以粥飲下三丸日三服量兒大小以意加減聖惠治小兒乾疳肌體羸瘦皮毛乾焦發歇寒熱昏昏多睡青黛丸方青黛三分細研牛黃蘆薈硃砂麝香雄黃各細研胡黃連蛇蛻皮灰龍膽去蘆頭蟬殼微炒各一分蟾一枚塗酥炙焦黃上件藥搗羅為末都研令勻用麵糊和丸如黍米大每服以粥飲下三丸日三服量兒大小臨時增減聖惠治小兒乾疳面青目澀腦熱鼻瘡眼生障膜毛髮焦黃肌盧羸瘦蝸牛丸方蝸牛穀精草各燒灰夜明砂微炒各三分瓜蒂末半兩乾蟾一枚塗酥炙令焦黃雄黃麝香各一分上件藥都研為末用蒸餅和丸如緑豆大每服以粥飲下三丸日三服量兒大小加減服之聖惠治小兒乾疳煩渴壯熱皮膚枯燥日漸羸瘦牛黃丸方牛黃半錢細研雄黃細研黃連去須蘆薈天竺黃各一分腦麝各細研一錢甘草半分炙微赤銼上件藥搗羅為末都研令勻用糯米飯和丸如緑豆大每一歲以粥飲下一丸日三服聖惠治小兒乾疳瘦弱不能乳食發立腦幹肌體柴瘦胡黃連丸方胡黃連末半兩硃砂波斯青黛蘆薈各三分麝香一分蛇蛻皮一條燒灰蟾酥一杏仁大上件藥都研為末用豬膽一枚取法酒一盞和藥末都於銚子內熬如膏丸如緑豆大五歲至七歲以粥飲下五丸日三服三歲以下三丸聖惠治小兒乾疳乳食不成肌膚日漸羸瘦身體壯熱毛髮乾枯四肢無力蟾酥丸方蟾酥麝香蟬殼微炒去足乾地龍微炒蛇蛻皮灰各一分豬膽二枚青黛龍腦硃砂細研各三分上件藥除蟾酥外細研以豬膽化蟾酥和丸如粟米粒大每以溫水研五丸吹鼻內量兒大小以意加減聖惠治小兒乾疳日久不瘥骨立形枯諸治無效青黛散方青黛硃砂蘆薈地龍微炒夜明砂各微炒干蝦蟆灰熊膽各一分麝香二分上件藥都細研為散每服半錢空心以粥飲調下又用少許藥吹入鼻中後以桃枝湯看冷熱浴兒衣蓋有蟲子出為效也聖惠治小兒乾疳面色痿黃肌體羸瘦宜服此方蘆薈龍膽去蘆頭牛黃細研胡黃連各一分青黛三兩細研麝香一錢細研上件藥搗羅為末都研令勻蒸餅和丸如黃米大每服以粥飲下五丸量兒大小以意加減聖惠治小兒乾疳體熱羸瘦心神煩躁少得眠臥宜服牛黃丸方牛黃細研硃砂細研水飛過子芩犀角屑各半兩麝香一分細研上件藥搗羅為末都研令勻以糯米飯和丸如麻子大每服用粥飲下三丸量兒大小增減服之王氏手集治小兒乾疳蝦蟆丸方蝦蟆一個燒灰一錢牛黃麝香各一字蔓荊子蟬蛻各一錢上為末粟米飯和丸如麻子大每服二丸陳米飲下內疳第十一聖惠夫小兒內疳者由乳哺無常傷於臟腑之所致也其候乳食不消心腹虛脹眼目澀癢體熱皮枯腸胃不調痢下五色漸漸羸瘦蟲食肚腸日月彌深痢轉不止故號內疳也聖惠治小兒內疳乳食不調心腹脹滿肌膚羸瘦下痢無常木香丸方木香蟬殼微炒去足麝香細研黃連去須黃丹微炒熊膽研入夜明砂微炒干蟬塗酥炙微焦各一分亦石脂半兩肉豆蔻一顆去殼田父半兩炙令微黃上件藥搗羅為末用水浸蒸餅丸如麻子大每服以溫粥飲下二丸量兒大小以意加減聖惠治小兒內疳四肢羸瘦腹脹鼻癢皮膚乾燥下痢不常蘆薈丸方蘆薈雄黃各細研沒石子蟬殼微炒去足蛇蛻皮灰丁香熊膽研入各一分麝香細研蟾酥研入各一錢黃連半兩去須上件藥搗羅為末煉蜜和丸如黃米粒大每服以粥飲下三丸日三服別研一丸吹入鼻中量兒大小以意加減聖惠又收治疳痢聖惠治小兒內疳下痢不止體瘦食少腹痛羸弱殺疳丸方雄黃密陀僧麝香蘆薈各細研蝸牛殼母丁香鶴蝨白礬灰沒藥地龍微炒熊膽研入各一分肉豆蔻去殼黃連去須微炒艾葉炒令黃定粉微炒各半兩蟾酥一錢研入上件藥搗羅為末以麵糊和丸如緑豆大不計時候以粥飲下三丸量兒大小以意加減聖惠治小兒內疳下痢不止肌體消瘦諸治未瘥宜服麝香散方麝香蘆薈各細研蛇蛻皮灰夜明砂微炒蝸牛殼黃連去須微炒沒石子各一分黃丹定粉各微炒一兩訶黎勒半兩煨用皮上件藥搗細羅為散都研令勻每服以粥飲調下半錢早晨午後各一服看兒大小加減服之聖惠治小兒內疳體瘦下痢丁香散方丁香當歸銼微炒硃砂蚺蛇膽牛黃各細研白馬靨酒浸炙黃色各一分犀角屑半兩上件藥搗細羅為散都研令勻每服以粥飲調下半錢日三服量兒大小以意加減聖惠治小兒內疳下痢不止昏沉多睡胡粉丸方胡粉微炒青黛細研各半分黃連末一分微炒麝香一錢上件藥同研令細以豬膽一枚取汁和丸如黃米粒大不計時候以粥飲下五丸量兒大小以意加減聖惠又方丁香末牛黃黃連末細研雄黃各一分蟾酥半分上件藥同研令細以豬膽汁和丸如黍米粒大不計時候以薄荷湯下五丸量兒大小以意加減談氏殊聖方小兒臟病最難知索出時時又要歸大抵內疳人少會唯聞打瓦更鎖龜不求皂豆丁香白豈信人間有妙醫寶命丹皂角一兩炙令焦黑色去皮為末取三分巴豆二七個去心膜細研新瓦上出油了用之雄雀兒糞二錢上細末以粟米飯丸緑豆大空心溫水下三丸
