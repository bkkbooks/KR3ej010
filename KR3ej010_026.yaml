啼叫胡黃連白礬枯白龍骨各半兩胡粉炒一分研一歲兒米飲調一字二歲半錢量兒量病服龍膽丸治疳痢久不瘥體熱心煩不食龍膽麝各一分苦楝根皮臭樗根皮並炙黃使君子胡黃連各半兩蟾酥半錢羅麵糊丸如緑豆一歲一丸粥飲下意加治久疳痢不瘥腹脅脹滿麝香丸麝一分巴豆半兩油煎黑淨霜研燒飯丸如黍米粥飲下一丸空心午後服蕪荑丸羊子肝一枚切片蕪荑末半兩摻肝內線纏米泔煮熟糯米飯丸如麻子粥飲下五丸早晚各一服量與疳痢腹痛第九聖惠論夫小兒疳痢腹痛者由痢多而腸胃虛弱冷氣在內與臟腑氣相搏真邪交擊故令腹中㽲痛也聖惠治小兒疳痢腹脹㽲痛日夜三二十行宜服白朮散方白朮一兩微炒當歸五兩地榆銼微炒木香赤芍藥甘草炒各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減溫服聖惠治小兒疳痢腹痛不下乳食草豆蔻散方草豆蔻去皮醋石榴皮銼炒微黃子芩各三分龍骨一兩高良薑銼乾薑炮裂銼各一分當歸半兩銼微炒上件藥搗羅為散每服一錢以水一小盞入薤白一莖煎至五分去滓不計時候量兒大小分減溫服聖惠治小兒疳痢脾胃虛冷乳食不化臍腹疼痛熊膽丸方熊膽硫黃細研乾薑炮制銼訶梨勒煨用皮各一兩定粉一兩炒微黃附子一枚炮炙去皮臍砒霜一錢細研巴豆七枚去皮心研紙裹壓去油黃丹一兩點醋炒令紫色上件藥搗羅為末湯浸蒸餅和丸如黃米大每服以冷水下二丸量兒大小以意加減切忌熱物治疳痢腹痛不止胡黃連丸胡黃連半兩沒藥木香各一分羅末糯米飯丸如緑豆粥飲下五丸日三四意裁治疳痢腹脹㽲痛木香丸木香肉豆蔻去殼附生淨青橘皮去白焙各半兩硃砂人參各一分巴豆淨霜蟾酥各半分末醋糊丸如粟粥飲下二丸日二意加疳濕第十疳痢濕䘌附聖惠論夫小兒乳食不節冷熱相乖傷於臟腑致疳氣也若脾胃虛弱則哺乳不消大腸虛寒遂變泄痢因其久痢不止腸胃俱虛為水濕所乘腹內蟲動侵蝕下部故名疳痢濕䘌也葛氏肘後小兒穀道濕方上用杏仁熬令黃搗以稀塗道之千金除熱結腸丸斷小兒熱下黃赤汁沫及魚腦雜血肛中瘡爛坐䘌生蟲方黃連柏皮苦參鬼臼獨活橘皮芍藥阿膠各半兩上八味末之以藍汁及蜜丸如小豆大日服五丸至十丸冬無藍汁可用藍子合春蜜和丸有䘌蟲在下部方麝香礬石巴豆去皮膜附子炮真珠雄黃上六味等分治合取桑條如箭簳長三寸以綿纏頭二寸唾濡綿展取藥著綿上納穀道中半日復易之日再神效千金治濕䘌姜蜜湯方生薑汁五合白蜜三合黃連三兩上三味以水二升別煮黃連取一升去滓納姜蜜更煎取一升二合五歲兒平日空腹服四合日二巢氏疳濕病多因久痢脾胃虛弱腸胃間蟲動浸蝕五臟使人心煩懊悶上蝕者口鼻齒齦生瘡下蝕者肛門傷爛皆難治或因久痢或因臟熱嗜眠或好食甘美並令蟲動生病千金艾葉五升水一斗煮升半分三服又煮地榆汁浴日三治蟲蝕下部胡粉雄黃等分末著穀道中外臺下部蟲蝕大腸赤爛水銀一兩漿水煮唾研安竹筒中吹下部梅師治蟲䘌蝦蟆灰醋和敷日三五聖惠方干蝦蟆酥炙一枚木香硫黃各半兩麝一分羅散三歲溫水調一字日再意裁又楝株根皮石榴株皮銼水大盞煎六分量兒溫服日三四又青黛研麻油塗次貼日三四治疳痢羸瘦下部濕䘌丁香散丁香胡粉炒各一分桃白皮炙黃柏炙黃連白茯苓各半兩羅粥飲調半錢早晚各一服量兒治疳痢久不斷體羸昏昏不睡下部濕䘌食飲不下蚺蛇膽大豆許煮木通汁研粥飲調早晚各一服並塗五心下部錢乙金華散治一切濕瘡癬疳黃柏黃連各半兩黃丹火飛一兩輕粉一錢麝一字研溫水洗貼蛔疳第十一聖惠治小兒蛔疳蟲毒腹脹青筋急滿日漸枯瘦食物不著肌肉或時下蛔蟲或時腹內多痛蟾酥丸方蟾酥麝香五靈脂巴豆去皮心研紙裹壓去油各一分上件藥同研令極細用酒半盞同入銚子內以慢火熬不住手攪候堪丸即丸如黃米大每服以陳橘皮湯下三丸空心及晚後服之隨兒大小以意加減談氏殊聖治疳蛔卻蛔散方苦楝皮有子者良蔭干內赤色者殺人不用鶴蝨密陀僧各二分白檳榔一個炮乘熱杵上為細末米飲下一錢連吃三服蟲自出漢東王先生家寶治小兒蛔蟲攪刺腹肚疼痛常服內化其蟲永去根本化蟲丸方蕪荑川鶴蝨各一分檳榔二錢上為末用獖豬膽為丸如大麻子大每服三歲五丸五七歲十丸陳米吞下一日三服丁在藏殺蟲散治小兒疳蛔咬腹方乾漆五靈脂定粉以上各等分上為末每服半字蔥白湯下丁在藏乾漆散治小兒疳蛔咬心痛方狗脊乾漆大麻仁鶴蝨以上各等分上為細末炒香每服一錢精羊肉湯調下聖惠蛔疳者兒多食甜物油膩生冷在腸胃不消化成蟲其候合面臥覺氣急顏色痿黃肌體羸瘦啼哭聲高又似心痛發歇無時每月初二三四日其蟲甚人不識呼為鬼祟不早治蟲蝕臟腑必致危篤玉訣歌哭惡痰青蛔咬心涎生積冷痛難任每餐甜物並時果致得蟲生病轉深先下積取蛔疳次溫脾胃聖惠狼牙草散治蛔疳乾瘦發立或痢狼於草射干鼠尾草各一分使君子醋石榴皮貫衆根槲皮鉤藤龍膽栗刺棠梨根各半兩故綿灰發灰各一兩羅五六歲兒服一錢水小盞煎五分早晚各一溫服意裁蚺蛇膽丸治蛔疳壯熱眼赤或澀常揉及發黃禿視物不明手足心熱時出蛔蟲下痢或青黃赤白身體口鼻下部生瘡蟲蝕齒落項生無辜肌體羸瘦兄弟姐妹相傳至死蚺蛇膽丁香黃連苦參青葙子犀角木香米砂雄黃青黛硫黃麝牛黃胭脂龍膽白礬灰發灰緋絹灰干蝦蟆灰各一分羅末蜜丸如麻子粥飲下三丸量服水化二丸吹鼻中敷瘡處青黛丸治蛔疳兼諸疾青黛硃砂蘆薈胡黃連鶴蝨各一分末豬膽汁丸如緑豆空心湯下三丸有蟲下治蛔疳蟲出熊膽丸熊膽一分狗脊去毛白蕪荑乾蟾頭炙焦黃丹炒紫蛇蛻灰各半兩羅棗肉丸如緑豆粥飲化三丸更以藿香湯浴兒青熱衣蓋蟲出意減使君子丸治疳蛔出蟲使君子雄黃熊膽各一分牛黃蟾酥麝各一錢研軟飯丸如麻子疳極者桃柳湯浴粥飲調三丸又鶴蝨胡黃連檳榔熊膽乾蟾酥炙黃各半兩散空心湯調一字服後殺蟲如馬尾瘥三歲上半錢吳氏蛔疳七寶丹青皮去瓤乾薑麩炒木香麵裹炮赤巴豆淨肉米醋一碗煮乾水洗去油肉豆蔻生檳榔肉桂去粗皮不見火各一兩硇砂半兩湯澄慢火熬如煎鹽紙蓋收飛者細末麵糊丸如梧子硃砂衣空心服一二三粒欲消食食後服酒食傷諸般積胸膈不快或腹痛薑湯中酒蔥薑湯心痛炒薑湯婦人血氣當歸酒瀉肚陳米飲赤痢甘草湯白痢乾薑湯脾泄瀉煨姜一塊細嚼湯咽心腹脹滿渾身倦怠溫酒轉筋霍亂紫蘇藿香湯中毒藥五倍子雄黃湯大小便不通桐木根湯吐逆檀香湯膈上食毒虛痰姜蜜酒頭風臘茶清兒急慢驚風金銀薄荷湯疳蛔石榴湯疳瘡第十二錢乙論疳在外鼻下赤爛自揉鼻頭上有瘡不著痂漸繞耳生瘡治鼻瘡爛蘭香散方見鼻疳門中諸瘡白粉散主之方見本門千金治小兒疳瘡方上以豬脂和胡粉敷之五六度千金又方上嚼麻子敷之日六七度聖惠用大麻仁一字入少水研取汁與飲之候蟲出即住服千金又方亦治疳䘌上用羊膽二枚和醬汁於下部灌之豬脂亦佳聖惠治小兒面鼻身上生瘡及近口生濕瘡並赤白瘡等及疳氣入腹漸漸羸瘦方白狗糞蝦蟆地龍蝸牛殼蘭香和根人糞各燒灰半兩熊膽蘆薈麝香各一分上件藥細研為散若口中生瘡先以鹽醬水淨漱口以綿裹藥少許含之若鼻內生瘡吹少許在鼻中如鼻外生瘡去痂敷之疳氣入腹以新汲水空心調服半錢聖惠瘡生面鼻不癢不痛汁流即成瘡亦生身上兒多患之亦是風濕搏血氣名疳瘡鴿糞散治口中及各處疳瘡鴿糞人糞灰白礬灰青黛麝各一分研日三敷麝香散治面頭生疳口中臭氣麝蚺蛇膽瓜州黃礬蘆薈各一分研洗淨敷口內惡氣貼藥日三熊膽膏治身口面疳瘡並諸疳疾熊膽蚺蛇膽蘆薈牛黃龍腦各一分麝半兩研井華水三合瓷器盛重湯煮數添水可半日投糯米三五粒煮爛篦子數攪勿令四畔干取二豆許漸吹鼻中及塗口瘡頻使藥兩日即停一日兒發青止又狗糞中米燒馬街蟲曝乾並敷錢乙白粉散烏賊魚骨三匕白芨二匕輕粉一分細末先口含漿洗不時敷張渙諸疳羸瘦毛髮焦黃口鼻生瘡四珍丹干大蟾一枚去四足納胡黃連半兩在腹內線縫濕紙裹泥固燒赤蘆薈半兩麝一分研白麵糊丸黍米大服五七粒粥飲下量加減治疳瘡不瘥熊膽膏熊膽蚺蛇膽蘆薈各半兩牛黃一分龍腦一錢瓜州黃礬一分研井華水三合銀器盛重湯煮膏塗莊氏燒餳灰敷趙氏治疳瘡奪命散五靈脂萵苣菜陰乾地黃花黃丹炒白礬飛染胭脂麝少許末看瘡大小漿水洗貼趙舍人治疳瘡年深見骨或干或濕至寶散白蜆殼泥中多年色白丸小密陀僧同蜆殼煅各一兩無名異半兩細末入麝半錢研鹽湯溫漿水洗摻藥膏藥蓋不五七次即生肥肉生六分止不然瘡瘢高大如丈夫婦人有年深不較瘡亦治鄭愈治疳甜瘡蚌粉煆黃柏黃丹各一錢膩粉半錢巴豆三粒燒末麻油調塗疳腫第十三茅先生小兒疳腫塌氣丸氣腫水腫不用此藥川巴豆殼用醋煮黑色為度青橘皮去白蘿蔔子等分上為末醋麵糊為丸如此大每服五丸至七丸中庸赤小豆煎湯下長沙醫者鄭愈傳治小兒上氣喘促頭腹虛腫時時作聲四肢無力常有冷熱疳氣虛腫大黃散方大黃半兩煨川芎甘草黑牽牛犀角末朴硝各一分上件為末每服二錢水二盞煎至三分入生薑三片同煎如虛腫入少許蜜如不腫不用蜜吉氏治疳氣腫滿陳米半兩巴豆二十一粒炒焦木香二錢陳橘皮樟柳根焙各一分蘿蔔子輕炒錢半末半錢赤小豆湯溫調下疳後天柱倒第十四漢東王先生家寶治小兒久患疳疾體虛久不進飲食患來日久諸候退只是天柱骨倒醫者不識謂之五軟候須進金靈散生筋散方並見本門漢東王先生家寶生筋散方木鱉子三個萆麻子三十個上各取肉同研每用一錢許津唾調貼急抱揩項上令熱貼之吉氏家傳貼頭起項膏治小兒疳熱膽冷頭項軟倒方川烏末肉桂末蕓薹子天南星萆麻子各一錢黃丹炒一錢匕上大蒜一顆煨熟去皮乳鉢內研和藥細每用一錢入米醋和勻貼項上一日許吉氏家傳狼毒丸治小兒膽熱肝風天柱倒折宜服此藥更用前起頭貼項藥狼毒酒浸焙白附子大附子炙天麻防風羌活以上各一分硃砂地龍去土各一錢麝香一分上為細末法酒煮糊為丸如此大每服七丸至十五丸用黑豆薄荷湯入酒一滴吞下形證論他病天柱骨倒歌天柱才倒非心脾吐瀉失調至尫羸大患傷寒無汗脈鳳髓卻被傷寒無浮脈定因妙藥療他遲無此卒然生此患又兼不辨四肢肥身軟難堪頭似石面紅唇赤臉如緋此病多因傷腎熱鳳髓膽熱後來因作伏熱病作又相隨肝受熱風天柱倒但將涼藥與維持貼須性熱筋方緩立見溫和請莫疑吐瀉項軟唯調氣傷寒柱倒不須醫石壁經云或傷寒或吐或瀉乘虛邪毒透入肝脈熱邪所浸致筋軟長或手足軟或項頸軟須涼膈若吐瀉先調胃氣貼項並服涼肝膽藥勿太熱亦恐過冷漢東王先生金靈散直白殭蠶去絲炒末薄荷酒調服一錢日三更須生筋散貼形證論貼項藥川烏頭白芷地龍五靈脂赤小豆等分末薑汁酒調貼項上更服竹茹散竹茹散菊花三錢黃芩人參各一錢大黃半兩甘草一錢末竹葉湯下玉訣貼項藥草烏頭赤小豆等分末薑汁調攤帛上貼經宿項立起疳氣灌入陰第十五漢東王先生家寶治小兒疳氣灌入陰黃亮色烏金膏方通草黃皮大黃各一分燒上各燒存性為末每用一錢獖豬膽調成膏於陰上塗如未退煎蛇床子湯洗後再調塗之
