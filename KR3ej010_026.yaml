body:
  text: 卷第二十六諸疳餘證凡十五門疳熱第一漢東王先生論小兒發熱形瘦多渴吃食不長肌肉者謂之疳熱顱囟經治孩子諸疳或熱攻衝心肺氣急晝夜有汗日漸羸瘦不吃乳食調中丸方柴胡茯苓人參木香桂心大黃濕紙裹煨枳殼麩炒去穰甘草炙鱉甲醋炙各等分上件蜜丸如桐子大每歲兩丸至五歲三丸熱熟水下忌如常博濟方治小兒疳熱殺蟲青黛散青黛蕪荑仁夜明砂各別研川大黃細銼蒸三度焙乾為末各半兩黃連一錢半為末苦楝根三兩細切焙乾為末麝香一錢匕別研雄黃透明者硃砂好者各別研一分上件九味為細末每服看小兒大小服一錢或半錢如要解苦用蜜水調下日再服米飲調下亦可此宜常服談氏殊聖治小兒疳熱身多壯熱黃瘦久服令肥金瓜丸方黃連黃柏甘草微炮青皮去白上各等分為末入麝香少許用獖豬膽一個入藥在膽內用線系定入石器內用漿水煮五七沸取出風吊一宿取出丸如緑豆大每服五七丸米飲下加減玉訣方同外以硃砂為衣仍治脾疳博濟方同劉氏家傳方亦同云或添胡黃連若早晨服使君子丸方見疳痢門中晚服金瓜丸永無疾消食長肌肉莊氏家傳方同仍加夜明砂一味等分趙氏方亦同名涼疳藥長沙朱司理以為有神效茅先生小兒疳熱四肢如柴不能起止柴胡散方柴胡知母貝母去心茯苓茯神乾葛甘草炙各等分上為末每服用小麥一匙頭藥一匙頭水一盞同煎六分去滓服嬰童寶鑑治小兒疳熱大金粟丸方草龍膽末宣連各一兩蘆薈末半兩蕪荑巴豆霜大黃各一分木香二分上件為末用豬膽為丸如粟米大每服三丸甘草湯下玉訣手集地骨皮散治小兒熱疳進食方地骨皮揀擇令淨干用粗葛皮包洗過後干稱黃耆銼焙柴胡去蘆頭洗銼焙三味各一兩人參銼焙白茯苓去黑皮銼焙甘草炙焙三味各半兩上為細末每服一錢或半錢白湯點服長沙醫者丁時發傳治疳熱方疳熱頻傳疳在心有時膨脹氣相侵毛乾直上時多渴藥效還知惜似金惜金丸蓮心宣連各半錢蘆薈木香柿蒂各半錢巴豆霜七粒上件為末豬膽為丸粟米大五丸用熟水吞下殊聖治熱黃疳蝦蟆內蛆焙末半錢酒下效傷寒六物黃芩湯治腹大短氣熱有進退食不安穀不化黃芩大青甘草炙麥門冬人參白茯苓焙甘草炙各半兩末服一錢白湯點服疳渴第二聖惠論夫小兒疳渴者由臟腑夙有疳熱心肺壅熱之所致也此皆乳母恣食五辛或飲熱酒多味酸鹹夜餐炙爆心胸氣滯便即乳兒致臟腑生熱熱則煩躁故令兒渴不止也聖惠治小兒疳多渴體熱煩躁少得睡臥宜服天竺黃散方天竺黃細研黃連馬牙硝梔子仁葛根銼各半兩甘草炙微赤銼牛黃細研款冬花紫菀洗去苗土犀角屑土瓜根各一分上件藥搗細羅為散都研令勻不計時候以蜜水調下半錢量兒大小加減服聖惠治小兒疳渴口乾煩躁體熱羸瘦不欲乳食宜服此方蝸牛殼微炒蟾頭塗酥炙令焦黃胡黃連各半兩硃砂青黛各細研一分上件藥搗細羅為散都研令勻每服以蜜水調下半錢不計時候量兒大小以意加減聖惠治小兒疳大渴不止鉛丹丸方鉛丹鉛霜各一分黃連末石膏末各半兩上件藥都研為末以糯米飲和丸如緑豆大每服用新汲水淘米泔研下五丸日三四服量兒大小以意加減聖惠治小兒疳渴壯熱驚悸宜服此方地骨皮細研龍膽去蘆頭烏梅肉微炒地龍糞黃連去須各一分上件藥搗羅為末以獖豬膽汁和丸如緑豆大不計時候以新汲水化破五丸服之量兒大小以意加減聖惠治小兒疳熱煩渴乾瘦黃連丸方黃連去須天竺黃牛黃各細研甘草炙微赤銼梔子仁款冬花葛根紫菀去苗土犀角屑各一分川朴硝半兩竹瀝二合上件藥搗羅為末先用竹瀝拌和更入熟蜜和丸如緑豆大每服以新汲水研破五丸服之日四五服量兒大小臨時加減聖惠治小兒熱疳渴方黃連末半兩定粉一兩微炒上件藥同細研令勻不計時候以熟水調下半錢更看兒大小以意增減談氏殊聖治小兒疳瘦羸弱臟腑虛怯滑泄不止飲食減少引飲無度六神丸方丁香木香肉豆蔻麵裹煨蘆薈一分使君子仁訶子皮煨各半兩上為末棗肉和丸如緑豆大每服三五丸米飲下錢乙龍粉丸治疳渴方草龍膽定粉微炒烏梅肉焙稱黃連各二分上為細末煉蜜丸麻子大米飲下一二十丸無時張渙遺方青香丸治小兒疳渴引飲不休肌體羸劣胡黃連青黛硃砂鶴蝨各等分上為末獖豬膽和丸如緑豆大每服三丸米飲下吉氏家傳又方乾葛胡黃連甘草炙黑參麥門冬去心等分上件為末每服一錢水半盞姜一片煎四分莊氏治疳熱青黛丸青黛一兩胡黃連天竺黃宣連各半兩硃砂飛一分麝一錢肉豆蔻二個牛黃半錢蟾一個端午酥炙酒浸去腸肚末緑豆粉煮糊丸如芥子空心夜湯下三丸玉訣地骨皮散治熱疳進食地骨皮揀淨粗葛包洗黃耆焙柴胡焙各一兩紫菀犀角土瓜根各一分散不時蜜水調半錢量加減服胡黃連散治疳渴黃瘦壯熱不乳胡黃連旱蓮子龍膽青黛烏梅肉微炒知母各半兩牛黃一分搗羅棗瓤丸如緑豆甘草湯下五丸日三意裁五膽丸治渴疳豬膽狗膽牛膽鯽魚膽蝟膽各一枚四膽汁入牛膽內灶北後懸候乾丸如黍新汲水下二丸空心午後各一服更量胡黃連丸治疳熱渴乾瘦胡黃連犀角各一分生地黃汁二合麝半錢羊子肝一具研取汁蜜半合末和汁蜜等竹葉湯調藥汁一匙加減黃連丸治疳熱煩渴乾瘦黃連天竺黃牛黃甘草炙赤梔子仁款冬花葛根紫菀犀角各一分川朴硝半兩羅竹瀝二合和更入熟蜜丸如緑豆新汲水研五丸服更量日四五又蝸牛子三五十枚合淨盤內令行有似銀泥處膩粉和揩丸如黍不時湯下二丸治疳渴飲水不休麝香丸麝人中白各一分研藥餅丸如麻子一二歲皂莢湯下二丸更裁早午各一服劉氏大豬胞一個甘草一兩寸劈入胞內水一斗煮三升去甘草胞焙末服三錢湯調下莊氏活大鮎魚一個蛤粉塗頂上刮下涎入粉同研丸雞頭大服一丸小鮎魚一個水半盞浸涎水化一丸止和氣散一二服補又井泉石一名石甘遂太陰元精石馬牙硝等分末入生硫黃少許服半錢生米泔水調疳勞第三嬰童寶鑑小兒胎中受毒熱流於骨髓之間生下百日後仍有驚疾便服冷藥過劑則利利而腹冷骨中熱謂疳勞也惠濟小兒疳勞候歌好餐時果好餐甜此疾成疳不在占腹有青筋時脹起滿皮黃色病厭厭口瘡眼腫盤為面渴飲無時瀉作泔那更全身雖瘦弱試將手觸火炎炎此患只須先取轉虛中疳積是名談顱囟經治孩子疳勞肺氣熱咳嗽四肢漸瘦心肺干地黃煎方生地黃汁五兩蟾酥鹿角膠半兩生三汁蜜各一兩上先將地黃汁安鐺內慢火煎手不住攪約五六沸下蜜次下膠又下薑汁慢火煎後如稀餳即住火每食後兩度共與一匙頭忌毒物張氏家傳治三焦膈寒五臟澀滯氣逆痰涎米食後惡涎太陽昏痛及治山嵐瘴氣吐逆不美飲食面色浮黃指甲青黑小兒疳勞吐乳及大人小兒久病乍安神氣未復寒熱往來並皆救療三和飲子惠海長老方紫團人參三兩半洗銼甘草一兩半炙銼綿黃耆五兩酒浸一宿洗淨銼上件三味同入木臼內用木杵搗碎為散每服三大錢生薑三片水二盞棗三個同煎去滓取八分不拘時候吉氏家傳金瓜散治小兒疳勞黃瘦骨熱盜汗方宣連黃柏炙去皮甘草炒青皮去白炒上等分為末獖豬膽汁調成膏盛入膽袋內麻綿緊縛湯內煮數沸取出當風懸一宿去膽袋入麝香少許研為丸如此大每服五丸麥門冬水吞下吉氏家傳蘆薈丸治小兒疳勞羸瘦骨熱盜汗方蘆薈丁香使君子肉炒胡黃連硃砂肉豆蔻安息香熊膽以上各一分輕粉半錢麝香少許上研為末豬膽汁煮糊為丸如此大每服五丸或七丸熟水下漢東王先生治十歲上疳勞壯熱形瘦雞肉煎丸宣連二兩銀柴胡一兩蕪荑鶴蝨川各半兩秦艽淨知母使君子子芩各一兩末黃雌雞一隻重一斤專以大麻子飼五日開臀後去腸肚洗拭乾入藥線縫黑豆鋪甑底厚三寸安雞四旁及上又以豆裹日出時蒸至晚取藥用雞淨肉和研如干入酒糊丸如麻子大如緑豆空心麥門冬湯一二十丸意裁十五外溫酒下忌豬肉疳嗽第四惠眼觀證防己丸治疳嗽不止方漢防己牽牛子馬兜鈴炒甜葶藶別研上各等分為末棗肉為丸如此大每服十丸煎糯米飲下與溫肺散相間服惠眼觀證又方溫肺散栝蔞根半兩甘草炙一分上為末每服一錢蜂糖熟水調下疳積第五茅先生有小兒中疳積候面帶青黃色身瘦肚膨脹頭髮立渾身或熱肚中微痛此因疳盛而傳此候所治者先用勻氣散方見胃氣不和門中醒脾散方見慢脾風門中調理一日後下青金丹取下疳積方見積聚門中再下勻氣醒脾散補常服保童丸方見一切門中即愈玉訣疳氣腹脹潮熱候先與調胃氣後與取虛積藥次服疳藥也玉訣五積疳候歌小兒五積病還因乳母生生因傷腹肚以漸面虛盈多睡須舍地小便帶油清發黃多滑瀉吐逆亂交橫靈苑獨聖青金丸治小兒疳積方川巴豆三兩淨肉硫黃二兩不研二味同用生絹袋盛懸於瓷罐中不得著底以水煮三日三夜如水竭即旋添熟湯取出棄硫黃只用巴豆去皮心獨活柴胡桔梗乾薑炮防風五味各一兩生青黛三兩上件為末及細者以水煮麵糊為丸如緑豆大每服一丸至二丸食傷虛腫用橘皮湯下霍亂吐瀉及赤痢用甘草湯下白痢用乾薑湯下赤白痢用乾薑甘草湯下水瀉用冷水下小便不通用燈心湯下大便不通米飲下婦人血氣當歸酒下元氣炒茴香酒下腰痛茱萸湯下小兒疳積用米飲下氣疾橘皮湯下氣塊症癖用熱酒下傷寒頭痛甘草湯下並用臨臥時服如臟腑實熱臨時更加減丸數錢乙牛黃丸治小兒疳積方雄黃研水飛天竺黃各二錢半牽牛末一錢上同再研麵糊為丸粟米大每服三丸至五丸食後薄荷水下兼治疳消積常服尤佳大者加丸數張渙遺方褐丸子治小兒疳氣腹脹如鼓及奶癖食癖蘿蔔子一兩半炒黑牽牛一兩炒胡椒一分半木香一兩蓬莪朮濕紙裹煨切作片子半兩上為細末麵糊為丸粟米大每服二十丸煎仙人骨湯下張氏家傳金砂丸壯元氣治脾胃虛弱經年積滯冷氣蠱毒諸疾去久虛積氣消食壯氣理諸般風氣脫肛下血左癱右瘓治一切風筋骨中風氣等疾婦人血風攻賴刺月候不調四肢倦怠頭面浮虛氣衝喘急小兒疳氣頭漸無發腹大腳小無力履地不得者並皆治之山長老方針砂四兩用水淘洗五十餘次用好米醋八盞入熟鐵銚內煮乾以鐵匙抄煙盡水星出即傾下蒼朮米泔浸一宿去粗稱切木香麵裹煨熟去面不用白朮切各半兩附子炮去皮尖蓬莪朮洗切甘草切爁各一兩陳橘皮米泔浸一宿去瓤淨取二兩上件為末醋糊丸如緑豆大每服二十丸至三十四十丸常服米飲下治脾生薑湯下治風氣酒下被飲食所傷用所傷物下若飲食罷用所羹汁下三二十丸解積進食大有所益不拘時服莊氏家傳參苓散治小兒因積成疳久致脾胃虛弱不思飲食方人參茯苓川芎各一兩甘草炙芍藥黃耆各半兩青皮一分不用白上為末每服一錢水一小盞煎三五分去滓溫服莊氏家傳香甲丸治小兒積疳潮熱盜汗羸瘦煩渴手足心熱服之皆效輕骨長肌方蔡夢翁家翁苦黃瘦不食多汗喜叫哭服之效木香一分鱉甲去裙襴醋炙檳榔使君子用肉柴胡去蘆黃連去須各半兩上為末獖豬膽和丸緑豆大每服二十丸日中臨臥米飲下久發潮熱多汗無力者服之即效孔氏家傳胡黃連丸治肌瘦肥腸消積氣方黃連半兩木香一分麝香半錢檳榔一個上為細末後入麝香酒糊為丸如緑豆大熟水下趙氏家傳治小兒青蒿丸大疳藥