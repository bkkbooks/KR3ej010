聖惠治小兒霍亂不止籧篨散方故籧篨篾半兩鹽一字牛黃一黑豆大細研乳汁一合上件藥將乳汁煎二味三兩沸去滓調入牛黃服之立瘥茅先生小兒吐哯霍亂睡驚沉香飲方沉香丁香各一分檳榔甘草炙各半兩肉豆蔻一兩上為末每服半錢一錢用棗子半個水五分盞同煎三分通口服嬰孺治小兒霍亂腹脹不得利牛泄方上取牛泄絞汁百日兒服一合二百日一合半二歲一歲二合嬰孺治小兒霍亂嘔吐不止人參飲子方人參六分厚朴三分炙粗倉米二合淘上以水二升煮取七八合絞汁百日服半合一歲三服外臺方同嬰孺治小兒霍亂吐乳不止方上以人參煎湯服立已嬰孺又方上取薄荷葉未乾者研汁量多少捻鼻令口開灌之嬰孺治小兒霍亂乳母服之方扁豆莖一升先炙令萎切細人參三兩切之上以水三大升半取汁煮粟米少許為粥與乳母服之衣裹乳勿令露之每欲乳兒先捏去少許然後乳母乳兒常服大佳嬰孺治少小大吐下心結堅食飲不下嘔逆欲死並霍亂後吐下不止短氣煩滿半夏湯方半夏四分黃芩甘草各二分乾薑橘皮當歸人參各三分上以水四升煮一升半二百日兒服三合若腹痛加當歸二分嘔逆甚加橘皮三分玉訣銀白散取積取蟲後生胃氣使不霍亂方人參茯苓甘草炙白朮麥麩炒白萹豆去皮上各等分末一錢紫蘇湯調下一方有藿香葉等分玉訣蘆薈丸治霍亂後乾噦不常方蘆薈安息香胡黃連枳殼麩炒各一錢使君子三七個炒蕪荑一分澱粉一錢半麝香少許上末獖豬膽糊丸如此大五七丸米飲吞下惠眼觀證香參膏治霍亂瀉住吐不住方人參一指大銼之丁香一十四粒藿香一錢糯米七十粒同丁香炒合米黃上件四味同為末用棗肉和為膏每服一指頭大用鹽薑湯下惠眼觀證石黃散治霍亂吐瀉不住方硫黃半兩滑石一分上二味同研令細每服半錢米泔下吉氏家傳治霍亂吐不食奶丁香散方丁香二十個母丁香一個藿香一錢半夏五個湯泡七次上件末都以薑汁浸三宿焙乾再為末每服一字藿香湯下長沙醫者鄭愈傳治霍亂候嘔逆不止心胃虛熱人參散方人參陳皮桔梗甘草炙白芷各二錢上件為末每服一錢水五分入淡竹葉煎二分入蘆荻根煎亦得吐利第六但吐利而不霍亂巢氏病源小兒吐利候吐利者由腸虛而胃氣逆故也小兒有解脫而風冷入腸胃腸胃虛則泄利胃氣逆則嘔吐此大體與霍亂相似而小輕不劇悶頓故直云吐利亦不呼為霍亂也錢乙論小兒初生三日內吐瀉壯熱不思乳食大便乳食不消或白色是傷食當下之後和胃下用白餅子方見本門和胃用益黃散主之方見胃氣不和門中錢乙論小兒初生三日以上至十日吐瀉身溫涼不思乳食大便青白色乳食不消此上實下虛也更有兼見證肺主睡露睛喘氣心主驚悸飲水脾主困倦饒睡肝主呵欠頓悶腎主不語畏明當瀉見兒兼臟補脾益黃散主之此二證多病秋夏也益黃散方見胃氣不和門中錢乙論夏秋吐瀉五月二十五以後吐瀉身壯熱此熱也小兒臟腑十分中九分熱也或因傷熱乳食吐乳不消瀉深黃色玉露散主之六月十五日以後吐瀉身溫似熱臟腑六分熱四分冷也吐嘔乳食不消瀉黃白色似渴或食乳或不食乳食前必服益黃散食後多服玉露散七月七日以後吐瀉身溫涼三分熱七分冷也不能食乳多似睡悶亂哽氣長出氣睡露睛唇白多噦欲大便不渴食前多服益黃散食後少服玉露散八月十五日以後吐瀉止冷無陽也不能食乳乾噦瀉青褐水當補脾益黃散主之不可下也玉露散方見本門益黃散方見胃氣不和門中錢乙論吐瀉爭上去廣親此宅四大王宮五太尉病吐瀉不止米穀不化眾醫用補藥言用薑汁調服之六月中服溫藥一日益加喘吐不定錢曰當以涼藥治之所以然者謂傷熱在內也用石膏湯三服並服之眾醫皆言吐瀉多而米穀不化當補脾何以用涼藥王信眾醫又用丁香散三服錢後至曰不可服此三日外必腹滿身熱飲水吐逆三日外一如所言所以然者謂六月熱甚伏入腹中而令引飲熱傷脾胃即大吐瀉他醫又行溫藥即上焦亦熱故喘而引飲三日當死眾醫不能治復召錢至宮中見有熱證以白虎湯三服更以白餅子下之一日減藥二分二日三日又與白虎湯各二服四日用石膏湯一服旋合麥門冬黃芩腦子牛黃天竺黃茯苓以硃砂為衣與五丸竹葉湯化下熱退而安錢乙論虛實下藥云馮承務子五歲吐瀉壯熱不思食錢氏曰目中黑睛少而白睛多面色㿠白此子必多病面色㿠白神怯也黑睛少腎虛也黑睛屬水本怯而虛故多病也縱長成必肌膚不壯不耐寒暑易虛易實脾胃亦怯更不可縱酒欲若不保養不過壯年面上常無精神光澤者如婦人之失血也今吐利不食壯熱者傷食也不可下下之虛入肺則喘入心則驚入脾則瀉入腎則益虛此但以消積丸磨之為微有食也如傷食甚則可下不下則成癖也實食在內乃可下之下畢補脾必愈隨其虛實無不效者錢乙有吐瀉問難云廣親宮七太尉七歲病吐瀉是時七月其證全不食而昏睡睡覺而悶亂哽氣乾嘔大便或有或無不渴眾醫作驚治之疑睡故也錢曰先補脾後退熱與使君子丸補脾退熱石膏湯次日又以水銀硫黃二物下之生薑水調下一字錢曰凡吐瀉五月內九分下而一分補八月內十分補而無一分下此者是脾虛瀉醫妄治之至於虛損下之即死當只補脾若以使君子丸即緩錢又留溫胃益脾藥止之醫者李生曰何食而啘錢曰脾虛而不能食津少即啘逆曰何瀉青褐水曰腸胃至虛冷極故也錢治而愈錢乙附方凡小兒吐瀉當溫補之余每用理中丸以溫其中以五苓散導其逆五苓最治小兒吐連與數服兼用異功散等溫藥調理之往往便愈若已虛損當速生其胃氣宜與附子理中丸並研金液丹末煎生薑米飲調灌之唯多服乃效服至二三兩無害候胃氣已生手足漸暖陰退陽回然猶瘛瘲即減金液丹一二分增青州白丸子一二分同研如上服以意詳之漸減金液丹加白丸子兼用異功散羌活膏溫白丸鉤藤飲子之類調理至安依此治之仍頻與粥雖至危者往往死中得生十救八九嬰童寶鑑小兒為乳母飲酒淫泆情亂乳子為疾其候吐瀉青黃水身熱啼叫如驚不治嬰童寶鑑小兒吐利歌小兒吐利早須醫只為腸虛逆氣為更有中它湯藥毒必加煩躁在心脾千金治少小吐利方亂髮半兩燒鹿角六銖上二味末之米汁服一刀圭日三服千金又方上用熱牛屎合之一作牛膝千金又方上用熱特豬屎水解取汁少少服之外臺劉氏療百日以下蓐內兒吐利方面一錢炒乳汁二兩龍骨六分上三味煎龍骨和炒麵服之即瘥聖惠治小兒吐利發熱不欲乳食人參散方人參半兩嬰孺用四兩乾薑炮銼桂心各一分嬰孺各用三分甘草一分炙銼嬰孺用四分黃芩二分嬰孺用六分上件藥搗粗羅為散每服一錢以水一小盞棗一枚煎至五分去滓不計時候稍熱服之隨兒大小以意增減聖惠治小兒吐利腹脅虛悶訶梨勒散方桂心一分訶梨勒皮人參白朮甘草炙厚朴去粗皮塗生薑汁炙令香熟陳皮各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候稍熱服之量兒大小以意加減聖惠治小兒冷熱不和吐利不止白朮散方白朮木香丁香陳皮焙各一分麥門冬三分去心焙上件藥搗粗羅為散每服一錢以水一中盞煎至五分去滓不計時候稍熱服量兒大小以意加減聖惠治小兒吐利兼胸脅脹滿草豆蔻散方草豆蔻去皮木香五味子人參白茯苓陳皮湯浸去白各一分訶梨勒皮甘草炙銼各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候稍熱服隨兒大小以意加減博濟方治小兒未及周晬吐瀉不止因乳母氣血勞神或熱奶傷胃致有痰涎中和散方雄黃好者少許大黃五靈脂各等分上件三味同研為細末每服一字磨刀水調下譚氏殊聖治小兒吐瀉方白滑石硫黃各等分上細研淘糯米泔調下一字新生小兒未滿月及百日舌上生瘡口中白膏厚如池紙用坯子燕脂少許兒病用女乳汁女病用兒乳汁同調塗舌上一宿立效譚氏殊聖治小兒吐瀉不止乳香丸方乳香硃砂各一錢半夏半兩湯浸七遍切破用生薑汁炒令黃色上為末麵糊為丸如綠豆大每服三二丸如五歲以上五六丸米飲下茅先生小兒吐瀉丁香散方丁香二七粒肉豆蔻一個木香一錢以上三味研損用醋麵裹熱灰煨令面赤色取出不用面入後藥藿香桂心各半錢上此二味和前三味拌合為末每服一字半錢用陳米飯煮飲調下嬰孺皇子湯治少小痢下吐逆壯熱數日不止不得乳哺或但羸困欲死方甘草炙牡蠣煅末芍藥桂心各三兩上為粗末一歲兒水一升內四方寸匕煮三合頓服日再小兒以意加減此能除熱止痢上下神驗嬰孺治少小驚兼少小下痢及吐十日以上以意量之與服二十日以上依此方合服苦七八日以上倍加藥過此以意消息增減神妙方大黃三錢鉤藤六合黃耆二分細辛半分蛇蛻皮三寸炙蚱蟬二個炙甘草一分炙上切以水一升半煮五合絞去滓研牛黃五大豆許入湯中一服一棗許日三夜一亦同灸兩耳前三炷必瘥無牛黃以真麝香代之嬰孺治少小寒中吐利及客忤溫白丸方附子炮桔梗各二兩人參一兩乾薑二分上為末煉蜜丸二十日兒麻子大一丸五十日兒胡豆大一丸百日兒小豆大一丸不知加之嬰孺醋酒白丸子治吐利寒中並客忤方半夏洗人參各三分桔梗附子炮去皮臍乾薑各四分上為末以苦酒和丸小豆大一服一丸日三服此是一歲服法錢乙異功散溫中和氣治吐瀉思食凡小兒虛冷病先與數服以正其氣方人參切去頂茯苓去皮白朮甘草炒陳橘皮各等分上為細末每服二錢水一盞生薑五片棗二個同煎至七分食煎溫熱服量多少與之錢乙玉露散一名甘露散方甘草生一分寒水石嫩而微青黑中有細紋者是石膏堅白而手不可折者有牆壁堅白石膏是如無以方解石代之敲段段皆方是也各半兩上同為細末每服一字或半錢一錢食後溫湯調下錢乙治壯熱白餅子方又名玉餅子滑石輕粉半夏天南星二錢湯浸七次為末同上各一錢巴豆二十四個去皮膜水一升煮水盡為度上研勻巴豆後入眾藥以糯米飯為丸小綠豆大捏作餅子三歲以上三五餅子以下三餅子煎蔥白湯臨臥服錢乙附方金液丹治小兒吐瀉虛實極最妙沈存中良方論金液丹云親見小兒吐利劇氣已絕服之復活者數人真不妄也須多服多驗錢乙附方治小兒脾胃虛寒吐瀉等病及治冷痰齊州半夏一兩湯泡七次切焙陳粟米三分陳粳米亦得上㕮咀每服三錢水一大盞半生薑十片同煎至八分食前溫熱服張渙治小兒三焦不調停寒膈上乳哺不消胸膈痞滿甚則喘逆吐利肌體痿黃勻胃散方甘草一分炙藿香葉白豆蔻人參去蘆頭各一兩木香乾薑炮厚朴去粗皮塗生薑汁炙令香熟丁香各半兩上件搗羅為細末每服一錢水一小盞入生薑二片煎至六分去滓溫服張渙益中湯方治嘔吐兼瀉利人參去蘆頭青橘皮丁香各半兩桂心訶梨勒皮各一分草豆蔻三枚去皮炒上件搗羅細末每服半錢至一錢米飲調下量兒大小加減嬰童寶鑑治小兒吐利不止不二丸方巴豆三十個去心膜細研別用好黃連半兩水浸染紙兩張裹豆令出油硃砂末一錢重寒食麵一錢九上件研勻滴水為丸如綠豆大以新汲水磨下一丸萬全方治脾胃氣虛止吐瀉人參散人參白茯苓白朮乾葛陳橘皮去瓤厚朴薑汁塗炙以上各等分上件為末每服半錢用沸湯點量大小服之惠眼觀證沉香飲子大治吐瀉方沉香丁香藿香各半錢劉氏各用一錢肉豆蔻二個檳榔二個劉氏用一個甘草炙一錢劉氏各一分上為末每服一大錢水一小盞入老薑一小指大捶碎同煎三兩沸去滓溫服惠眼觀證醒脾散治吐瀉脾困多睡不思飲食方人參木香茯苓陳皮去白甘草草豆蔻去皮厚朴同硇砂一錢膽水一碗入此二味煮令乾都細切焙以上各一分白朮半兩上為細末每服一錢以冬瓜子煎湯下劉氏家傳人參異功散治小兒瀉利止嘔逆順氣補虛方人參一錢半白朮半兩青皮陳皮茯苓甘草各一分豆蔻三個入訶子上末之每服一錢陳米飲調下如秋間合則入訶子春夏不用或用紫蘇木瓜煎五七沸半盞末半錢或加至一錢逐日早服如是小兒傷風應諸般傷寒但以此藥正卻氣候和然後以紅棉散方見挾驚傷寒門中治之無有不效劉氏家傳醒脾散治小兒吐瀉脾困方人參二分丁香二十粒白茯苓白朮各一分藿香甘草炙各一錢天南星一個七八錢重去心用縮砂仁十個入在天南星內麵裹煨熟面焦黃為度去面不用上件同為細末每服一錢水六分生薑三片冬瓜子十四粒同煎三分溫吃不拘時候服張氏家傳降靈丹一名來復丹治小兒非時吐瀉古方舶上硫黃雪白硝石二味各一兩並於沙石銚或銀器內用文武火慢炒溶令作珠子無令火緊太過即不中須傾在紙上於冷收之研細末二味先成末乃妙蓮花青皮年久陳皮炒乾上等無石五靈脂以上各一兩上為細末白麵糊為丸豌豆大每服十五丸空心食前溫米飲下備小兒服食者丸作麻子大看大小加減之二味配類陰陽均平有天地中和之氣可冷可熱可緩可急治陰陽不調冷熱相制榮衛差錯上下隔塞心腎不升降水火不交養丈夫女人老幼嬰兒危證候並可救治但一點胃氣在服者無不獲安邪熱炎上煩躁者一服定冷熱攻注急痛者並一服定諸霍亂吐瀉水穀湯藥不住一服定大般吐逆唇口青色手足厥冷腳轉筋者兩服定著熱煩躁昏塞倒地不省人事者兩服省只時下不得吃水若瀉利不問赤白冷熱量深淺與服或非時吐瀉氣痞食不下者每服三十丸甚者五十丸輕者二十丸小兒十丸十五丸嬰兒三丸五丸新生牙兒一丸兩丸化破令服小兒因驚成癇發歇多日變成虛風或作慢驚者五七丸並服兩服定慢驚本非風胃氣欲絕故也若已絕即難救亦得時暫生爾若胃氣稍在雖困死亦可救也大人亦然但一切危急不識證候並治之此藥不問神聖通靈救人之寶其色不定隨時變動慎勿輕傳張氏家傳六神丹定吐瀉方丁香木香肉豆蔻麵裹炮熟訶子肉使君子仁各一分蘆薈二分上件為細末薄麵糊為丸如綠豆大粥飲吞下張氏家傳小兒驚風或吐或瀉脾困不進飲食或傷風潮熱或喘後出汗宜服此調中六神散方白朮茯苓甘草藿香葉草果子各一分丁香二錢上為細末每服一錢紫蘇米湯煎下應氣不勻疳瀉痢神妙張氏家傳治小兒吐瀉紫霜丸方代赭石陳皮去白巴豆肉半錢同炒乾巴豆不用木香杏仁去皮尖研各一分肉桂去皮不見火丁香各半錢藿香葉二錢上為細末粟米飯為丸小綠豆大每服七粒藿香湯吞下吐瀉炙藿香橘皮湯吞下吐煎棗子湯吞下張氏家傳治嬰孩榮衛虛脾胃弱吐瀉異功散方人參白朮甘草炙白茯苓白扁豆陳皮去白各等分上件為細末每服半錢陳米飲調下莊氏家傳木香丸治大人小兒吐利方木香白茯苓各等分上為末煉蜜和丸梧子大每服二十丸生薑米飲下小兒量大小化服三五丸莊氏家傳小兒吐瀉方舶上硫黃藿香上二味等分為末每服半錢生糯米泔水調下莊氏家傳羌活膏治小兒吐瀉不止煩渴悶亂欲成脾風手足微搐但非次發熱不能辨認證候請於一時中並服隨手有應冬末春初最宜頻服一方治小兒困驚發熱涎漱累徑痢病因傷乳食吐瀉後氣虛弱精神昏倦減乳食手足厥冷脈息微細漸成慢驚用藥亦同羌活獨活各去蘆頭人參切白茯苓去皮切天麻微炙乾蠍青黛研各一分腦麝各半分研水銀硫黃各一錢結砂子上為未研勻煉蜜丸皂子大捏作餅子五七歲每服三餅三二歲二餅一歲半餅一餅如身發熱煎荊芥乳香湯下手足厥冷人參生薑湯化下家中舊傳方有丁香而無龍麝青黛今所合去三物亦不曾入丁香三二歲小兒每服止一餅不敢多與恐大寒也若吐甚煎丁香湯化下亦佳歐陽行之所傳方在前少異莊氏家傳秋深腹虛吐瀉無時吃食微細面目黃腫方胡黃連丁香馬牙硝密陀僧訶子五分豆蔻二個檳榔一個麝香少許上為末用蒸餅酒浸為丸如綠豆大每服三丸陳米飲下日三服五歲五丸止吐用楠木湯下止瀉用綠豆湯下莊氏家傳治吐瀉方丁香白朮等分上末糊為丸粟大米飲下十丸至十五丸臨時增減王氏手集大白朮散治脾胃氣虛嘔吐泄瀉外熱裡寒手足厥逆昏困嗜臥面色青白下利清穀不思乳食方甘草炙乾薑一兩半附子一個生用去皮破作八片上為細末每服一錢水六分盞生薑二片同煎至四分去滓溫服量兒大小加減服王氏手集治小兒吐逆兼吐利不止方丁香藿香各一分木香一錢硫黃半兩別研極細滑滑石二錢研如粉上為末每服一錢或半錢米飲調下量大小與之如瀉即用附子一枚重半兩者炮去皮臍為末再用生薑汁搗成餅子用白麵裹之慢火煨面熟去面不用只將附子切焙再搗羅為末每吐兼瀉即入附子末少許如藥三之一更量虛實以米飲調下神驗吐如激水者亦定吐利不止多成慢驚宜速療之如已成慢驚兼金液丹與之趙氏家傳治小兒吐瀉不止溫胃消食白朮丸方白朮木香丁香肉豆蔻黃連各等分上為末麵糊為丸如黃米大每服十丸米飲下吉氏家傳治吐瀉藿香散方藿香一兩丁香一錢木香縮砂各半兩上末每服半錢水五分煎三分通口服或續加陳皮草果甘草人參尤妙吉氏家傳治吐瀉方草果子甘草各一兩炮上等分為末每服半錢米飲調下吉氏家傳治吐瀉不進飲食溫脾散方蒼朮二錢細銼先以油蔥炒赤色陳皮去白草果子不炮去皮用肉桂不見火各半錢桔梗甘草各一錢殭蠶少許上末每服半錢棗湯調下吉氏家傳治吐瀉參苓散方人參白茯苓山藥乾葛麥門冬去心黑附子炮去皮臍桔梗甘草炙各半兩蓮子心木香不見火各一錢藿香葉一分上為末每服一錢紫蘇米飲調下朱氏家傳大止小兒吐瀉方鬱金一個刮開心入去殼巴豆一個在內用麵裹煨熟取出候令去面與巴豆只用鬱金一味為末上以米泔汁調下一字大止小兒吐瀉朱氏家傳又方龍骨一分赤石脂縮砂去皮各一兩上件為末麵湯下一字或半錢大人一錢若止吐即入丁香一分代縮砂長沙醫者李剛中傳小兒夏秋吐瀉藥方黃連大者一兩銼碎去須土砂令深色冷使入虢丹一兩同黃連一處炒令虢丹焦赤色為度傾出在紙上於地冷上二味共為細末薄煮麵糊為丸如芥籽大每服二十粒加至二十粒用壁土生薑煎湯吞下更量大小加以丸數服亦不妨須連並二服立效長沙醫者丁時發傳一捻散治小兒滑泄腹脹作瀉吐逆可思食方陳皮青皮丁香各一錢訶子肉甘草炙各一分上為細末米飲調下長沙醫者毛彬傳銀白散治小兒胃氣不和吐瀉不止痰逆不進奶食平胃引行諸藥方半夏一兩湯洗七次焙乾為末薑汁製為餅子白扁豆微炒罌粟子人參洗去蘆銼白朮洗銼焙山藥白茯苓以上各四錢上七味同為細末每服二錢水八分生薑二片棗子一顆煎六分溫服長沙醫者毛彬傳桃紅散治小兒脾胃虛弱乘冷吐瀉不定不問冷熱可服方人參去蘆洗銼藿香去梗用葉曲紅色各二錢半上件同為細末每服半錢米飲調下無時量兒大小加減吐利津液少第七聖惠治小兒渴不止方蘆籜扁豆藤各半兩人參一兩去蘆頭上件藥細銼分為六服每服以水一小盞煎至五分去滓不計時候量兒大小分減稍熱服錢乙豆蔻散治吐瀉煩渴腹脹小便少方豆蔻丁香各半分舶上硫黃一分桂府白滑石三分上為細末每服一字至半錢米飲調下無時張渙調胃膏方治吐利服藥不下煩渴者即先服人參去蘆頭白朮炮丁香各二錢乾薑甘草炙赤茯苓各半兩上件搗羅為細末煉蜜和丸皂皂大每服一粒用熱湯化下用新水或冷水沉之極冷即服張渙三和散方治吐利津液燥少白茯苓一兩烏梅肉炒乾乾木瓜各半兩上件搗羅為細末每服一錢水一小盞煎至五分去滓放溫時時服之張渙香豆散方霍亂煩渴最宜服之藿香葉肉豆蔻各一兩白扁豆人參各半兩甘草一分炙上件搗羅為細末每服一錢水八分一盞入生薑二片煎至四分去滓溫服王氏手集和中散治陰陽不和清濁相干霍亂吐利壯熱煩渴胸膈痞悶腹脅脹滿面色青白手足厥寒困頓多睡全不思食方乾薑厚朴甘草炙各一兩上同為細末每服一大錢水八分盞生薑三片同煎至三分去滓溫服長沙醫者丁時發傳人參散治小兒虛熱及吐瀉煩渴不止及疏轉後可服方人參茯苓桔梗乾葛各半兩生犀角屑甘草炙各一分上為末每服一錢水一中盞入燈芯煎五分煩渴入新竹葉煎服大小加減與服吐利心腹痛第八聖惠夫小兒冷熱不調乳哺不節使陰陽清濁之氣相干而變亂於腸胃之間則成霍亂也而心腹痛者是冷氣與真氣相擊或上攻心或下攻腹故冷痛也外臺廣濟療小兒霍亂心腹刺痛吐利方茯苓桔梗人參各六分白朮五分甘草炙厚朴煮各四分上六味切以水二升煮取六合去滓溫服之聖惠治小兒霍亂心腹刺痛嘔吐丁香散方丁香桔梗人參白朮厚朴去皮銼薑汁炒各半兩甘草炙銼一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減與溫服聖惠治小兒霍亂心腹痛不欲飲食人參散方人參白朮芎藭草豆蔻厚朴薑汁炒用當歸銼炒陳皮去白焙丁香桂心各一分上件藥搗細羅為散不計時候煮薑棗米飲調下半錢量兒大小以意加減聖惠治小兒霍亂心腹痛不止高良薑散方高良薑銼人參去蘆頭赤芍藥甘草炙微赤銼陳橘皮湯浸去白瓤焙乾半兩上件藥搗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減服之聖惠治小兒霍亂吐瀉不止心腹痛面色青黃四肢冷溫中散方白朮三分人參一兩去蘆頭乾薑一錢炮製切炒銼厚朴去皮塗生薑汁炙令香熟甘草炙微赤銼桂心各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小加減溫服聖惠治小兒霍亂乳食不消心腹滿痛宜服此方訶梨勒皮半兩木香當歸銼炒白朮藿香陳皮去白焙各一分上件藥搗細羅為散不計時候以生薑湯調下半錢看兒大小以意加減聖惠治小兒霍亂吐瀉不止心腹痛面無顏色漸至困乏白朮散方白朮丁香陳皮去白焙各半兩草豆蔻去皮當歸銼炒各一分甘草半分上件搗細羅為散不計時候以粥飲調下半錢量兒大小加減溫服聖惠治小兒霍亂吐瀉心腹痛不定丁香散方丁香乾薑炮甘草炙銼桂心各半分訶梨勒皮人參各一分上件藥搗細羅為散不計時候煎薑棗湯調下半錢量兒大小以意加減聖惠治小兒霍亂吐瀉不止腹痛肉豆蔻散方肉豆蔻去殼桂心各一分人參去蘆頭甘草炙微赤銼各半錢上件藥搗粗羅為散每服一錢以水一小盞入生薑少許煎至五分去滓不計時候量兒大小分減溫服嬰孺治小兒卒吐利腹痛及久下當歸湯方當歸人參甘草炙乾薑黃耆各四分細辛三分上以水四升煮取一升半三四歲兒為三服小兒以意增減水藥嬰童寶鑑治小兒霍亂吐利腹中疼痛針頭丸方巴豆肉二個水半盞煮乾阿魏雞頭大一塊舶上硫黃一塊同阿魏大上件研勻以薄糊搜作餅子如錢眼大每服一餅子針頭穿定燈上燒留三分性淡薑湯化開服莊氏家傳大人參丸和脾胃止嘔吐治泄瀉青黃止腹痛多啼進乳食方丁香木香白朮各半兩藿香葉一兩半人參二兩上為細末煉蜜丸雞頭大每服一丸粟米飲化下趙氏家傳正氣人參膏治小兒脾胃氣虛中寒腹痛泄利嘔逆不入乳食夜啼多哭睡中饒驚吐利蛔蟲虛煩悶亂常服止煩渴調脾胃進飲食方人參乾木瓜甘草細銼炒各半兩陳橘紅罌粟米炒乾薑炮茯苓各一分上為末煉蜜和為膏每服一皂皂大米飲湯化下冷吐第九張渙溫脾散方散寒濕治嘔吐厚朴去皮薑汁拌炒用一兩丁香白朮乾薑各半兩肉桂一分上件搗羅為細末每服一錢煎人參湯調下張渙治小兒胃氣不和乳哺重沓及食入不消或吸風冷即令嘔吐若不止最為大病聖石丹方真陽起石半夏洗七遍焙乾各半兩人參去蘆頭木香白茯苓丁香各一兩礞石木炭火燒一伏時四兩不灰木木炭火燒一伏時四兩以上搗羅為細末次用杏仁巴豆二件連皮於燈上燒為度各二七個阿魏各一兩上件同為細末用湯泡炊餅和丸如龍眼大每服一粒水一盞入生薑一皂子大同拍碎煎五分放溫時時服之煎藥時於銀器中煎石器亦可九籥衛生流星散療小兒胃氣虛冷痰吐嘔逆方半夏十四個大者生用胡椒四十九粒上同為粗末每服半錢水一盞入生油七滴煎至四分去滓溫服莊氏家傳治小兒胃虛寒腹脹吐逆丁香丸方丁香木香藿香牛黃以上各半兩腦麝各一錢膩粉少許上一處為末麵糊為丸小豆大熱湯化一丸服之吉氏家傳治脾胃冷吐逆水食不下噎奶胃冷吐食因乳母多食酒肉淹藏毒物得之噎奶宜與驚藥微疏下中結丸方禹餘糧火煅赤米醋碎半兩巴豆麵裹煨七粒硃砂皂子大澱粉炒三分麝香少許上件為末蒸餅為丸綠豆大每服三五丸遠志湯下長沙醫者相漹傳肉豆蔻丸治小兒胃冷嘔吐不止諸藥不效者方肉豆蔻麵裹煨令香熟為度去面不用半兩丁香一錢上同為末水煮白麵糊為丸如芥子大量兒大小加減每服三五丸濃煎藿香柿蒂湯下便止如大人患吐加丸數亦如此湯使服之如渴以所煎湯作熟水飲之長沙醫者丁時發傳治小兒乳哺飲食溫冷過度傷於脾胃腸脅脹滿多吐痰涎方人參丁香乾薑半夏洗七遍各半兩白朮陳皮各一兩上為末麵糊和丸如麻子大每服十粒溫湯下熱吐第十聖惠治小兒嘔吐不止心神煩熱麥門冬散方麥門冬去心焙淡竹茹各半兩甘草炙銼人參茅根陳皮去白焙各一分上件藥搗粗羅為散每服一錢以水一小盞入生薑少許煎至五分去滓稍熱頻服量兒大小以意加減聖惠治小兒嘔吐心胸煩熱麥門冬散方麥門冬去心厚朴去皮薑汁炒用人參各半兩上件藥搗粗羅為散每服一錢以水一小盞入生薑少許棗一枚粟米五十粒煎至四分去滓放溫量兒大小漸漸與服聖惠治小兒嘔吐心煩熱渴蘆根粥方生蘆根銼二兩粟米一合上以水二大盞煎至一盞去滓投米作粥入生薑蜜汁少許食之太醫局定吐救生丹治小兒伏熱生涎心膈煩躁壯熱霍亂乳食不下嘔噦噁心或發吐逆方川大戟漿水煮切焙乾為末一十五兩膩粉粉霜各研七兩半龍腦研二兩半乳香八分研丁香為末各五兩水銀鉛與水銀同結砂子黃蠟各十二兩半上合令研勻每溶蠟一兩入蜜二錢半和為丸如黃米大每一歲兒服一丸如煩躁研生芝麻馬齒水下如吐逆煎丁香馬齒湯下更量虛實加減食後臨臥服之此藥除熱化涎下膈止吐逆若胃虛傷冷嘔吐不止者不可服凡小兒吐逆宜速療之久不止遂為慢驚常宜此藥備急錢乙辰砂丸治驚風涎盛潮作及胃熱吐逆不止方辰砂別研水銀砂子各一分牛黃腦麝各別研半錢生犀末天麻白殭蠶酒炒蟬殼去土乾蠍去尾炒麻黃去節根天南星湯浸七次切焙乾稗各一分上同為末再研勻熟蜜丸綠豆大硃砂為衣每服一二丸或五七丸食後服之煎薄荷湯送下張渙丁香益胃湯方治胃虛挾熱嘔吐不止丁香人參去蘆頭香一兩訶梨勒皮一分官桂大黃炮黑黃各半兩上件搗羅為細末每服一錢水一小盞入生薑二片煎至五分去滓溫服張渙保命膏方治吐逆不定服熱藥過多不能瘥者山大戟丁香大黃炮不灰木燒紅放冷甘遂各一分以上先為細末次入硃砂水磨雄黃並研細水飛各半兩粉霜水銀用錢結砂子各一錢巴豆去皮心膜不出油細研十個上件都研勻用黃蠟四兩銀石器中溶掩成膏旋旋取和丸如黍米大每服末周晬一粒二三歲兩粒四五歲三粒六七歲五粒十歲以上七粒新汲水下孔氏家傳凡小兒胃熱吐清胃散方上用生薑薄切以生面拌曬極幹略焙為末用紫蘇湯調下挾驚吐第十一張渙三香丹方治挾驚嘔吐不止藿香葉丁香各一兩半夏湯洗七遍焙乾半兩以上搗羅為末次入膩粉龍腦麝香當門子各一錢上件同拌勻生薑取汁打白麵為糊和丸黍米大每服十粒人參薄荷湯下量兒大小加減譚氏殊聖方小兒驚膈吐還頻晝夜連連不暫停綠水槐黃泔澱汁和蟲乳食一時噴丁香研共生犀服五膽牛黃立有勳若有得逢如此藥直饒命困卻還魂歸命丹丁香藿香各一分生犀末牛黃各半分豬鯽狗蝟熊膽魚膽等分或多些無妨共研半兩上為末丸如綠豆大量兒大小一歲以下煎苦楝湯研下二丸譚氏殊聖治小兒驚食胃管不快吐逆乳食或心胸發熱定吐丸方丁香二十一枚為末蠍梢四十九條半夏三個洗焙乾為末上件研勻煮棗肉如小黍米大每服七丸至十丸金銀煎湯吞下如傷暑霍亂吐瀉煎香茸散送下神效良方治久患翻胃及小兒驚吐諸吐並醫田季散上好硫黃細研半兩水銀與硫黃再研無星一分上同研如黑煤色每服三錢生薑四兩取汁酒一盞同薑汁煎熟調藥空心服衣被蓋覆當自足指間汗出迤邐遍身汗徹即瘥常有人患反胃食輒吐出午後即發經三年不瘥國醫如孫兆輩皆治療百端無驗消羸殆盡枯黑骨立有守藏卒季吉見之日此易治也一服可瘥始都不信之一日試令合藥與少錢市藥次日持藥至止一服如法服之汙出皆如膠腥穢不可近當日更不復吐遂又楚人田醫善治小兒諸吐亦用此藥量兒長少服一錢至一字冷水調下吐立定此散極浮難調須先滴少水以指緩緩研殺稍稍增湯使令調和若添入湯酒即藥浮泛不可服王氏手集睡驚丸治熱化涎鎮心神治驚悸吐逆方半夏末制者乳香犀角末各一錢上件同為末用生薑自然汁煮麵糊為丸如綠豆大每服七粒至十粒薄荷水夜臥服毒氣吐第十二巢氏病源小兒服湯中毒毒氣吐下候春夏以湯下小兒其腸胃脆嫩不勝藥勢遂吐下不止藥氣熏藏腑乃煩懊頓乏者謂此為中毒毒氣吐下也千金治毒氣吐不腹脹逆害乳哺藿香湯方藿香一兩生薑三兩青竹茹甘草炙各半兩上四味㕮咀以水二升煮取八合每服一合日三有熱加升麻半兩王氏手集消奶毒令兒吃奶無毒方升麻銼半兩大麻子搗破一合上兩味酒浸每日早晨與奶子一盞吃了要乳時須先捏去些小方與兒吃並兒有奶毒亦解
