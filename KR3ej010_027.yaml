中時覺乳生腥眼渾青碧生白膜汗出津津腳似冰氣細元因傷胃冷氣粗卻是欲生驚是風從早宜醫療暖胃和脾氣乃平此寒熱相勝使然也氣急則是胃實當涼則愈若囟門陷下氣細當生胃氣若渾身熱甚目中白膜甚者氣出喘粗若不急治必作瘛瘲鳳髓經歌括同有注云氣散宜與地黃散氣粗宜與蔥湯丸取地黃散見霍亂吐利門蔥湯丸見驚積門吉氏家傳方同小兒形證論四十八候哯奶歌一同後云此候是驚奶沖胃氣或交奶沖脾或是氣奶或是病奶致吐出遠聞腥氣與蛜𧌴丸方見一切癇門中氣細脈沉與調胃散方見積熱門中葛氏肘後小兒哯哺吐下方甘草炙人參當歸乾薑各一分上為末水一升煮取五合分服日三湯或內半分麝香益佳哯哺吐下如霍亂狀此方出小品嬰孺治小兒吐哯膈上有冷方細辛橘皮各一分大黃甘草各三分乾薑二分上切以水二升半煮取八合溫一合日三服嬰孺治小兒吐哯當歸湯方當歸黃芩甘草芎黃連各一分細辛乾薑各二分半上切以水二升煮取八合服半合日三溫服張渙嬰兒飲乳過多胸膈不快或多吐哯大便奶瓣不消宜用消乳丹方兼宜令兒乳後常服木香丁香青橘皮炒黃肉豆蔻各半兩牽牛子一錢炒黃上件搗羅為細末滴水和丸如針頭大每服三粒至五粒黏在奶頭上令兒吮之嬰童寶鑑治小兒哯乳玉真散方白朮半兩半夏七個椒半分去目汗上件為末每服半字水一呷調下大者一字三十六種治哯奶青皮散方青皮滑石硫黃研各一錢上為末每服半錢藿香湯調下噦逆第三巢氏病源小兒噦候小兒噦由哺乳冷冷氣入胃與胃氣相逆冷折胃氣不通則令噦也千金翼論胃中虛冷其人不能食者飲水即噦千金治小兒噦方生薑汁牛乳各五合上二味煎取五合分為二服聖惠同以牛乳二合薑汁一合銀器中煎一沸一歲兒飲半合千金又方上取牛乳一升煎取五合分五服外臺以羊乳煎無即以牛乳代聖惠同只煎三兩沸古今錄驗治小兒噦方鹿角粉大豆末上等分相和乳調塗奶上飲兒聖惠治小兒噦不止丁香散方丁香藿香白茅根銼各一分人參半兩去蘆頭花桑葉三兩炙上件搗羅為散三四歲兒每服一錢以水一小盞入生薑少許煎至五分去滓不計時候帶熱服之更量兒大小以意加減聖惠治小兒噦逆不止心神煩亂人參散方人參白朮白茯苓各半兩甘草炙銼藿香各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候稍熱服之量兒大小以意分減服聖惠治小兒噦不納乳食草豆蔻散方草豆寇三枚去皮甘草一分炙銼人參半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小以意增減聖惠治小兒多噦心胸煩悶麥門冬散方麥門冬一兩去心焙甘草一分炙銼人參陳皮厚朴去粗皮塗生薑汁炙令香熟各半兩上件藥搗粗羅為散三四歲兒每服一錢以水一小盞煎至四分去滓稍熱頻服更量兒大小以意加減聖惠治小兒噦乳母服人參散方人參三分陳皮一兩去白上件藥搗粗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓熱服至夜三四服乳母服訖即乳兒甚效惠眼觀證平胃丸養實胃氣大治乾嘔方馬芹子生白殭蠶直者丁香上各等分為末煉蜜為丸如此大每服一丸用陳皮一片炙過煎湯化下凡諸疾覺胃氣稍怯即服之霍亂吐利第四巢氏病源小兒霍亂吐利候霍亂者陰陽清濁二氣相干謂之氣亂氣亂於腸胃之間為霍亂也小兒腸胃嫩弱因解脫逢風冷乳哺不消而變吐利也或乳母觸冒風冷食飲生冷物皆冷氣流入乳令乳變敗兒若飲之即成霍亂吐利皆是觸犯腑臟使清濁之氣相干故霍亂也挾風而結實者則身發熱頭痛體痛而腹吐利凡小兒霍亂皆須暫斷乳亦以藥與乳母服令血氣調適乳汁溫和故也小兒吐利不止血氣變亂即發驚癇也千金翼問曰病有霍亂者何也答曰嘔吐而利此為霍亂茅先生小兒生下有中諸般瀉候各別各有所見下藥分次第下項小兒有中霍亂吐瀉候上吐下瀉遍身微熱不能乳哺此候因吃食冷熱不調氣不順脾家受熱胃冷不消化致此所治者先用沉香睡驚飲方見霍亂門中夾丁香散方見吐利門中乳香散方見一切泄瀉門中活脾散與服安樂有兩方一方見胃氣不和門一方見慢脾風門中如傳變大渴不食面臉紅眼微視氣小不語汗多恐化慢脾風死候不治漢東王先生家寶凡嬰孩小兒霍亂而成吐瀉仍須進大七寶散二三服方見本門並觀音散二三服方見胃氣不和門中溫白丸二三服如不退恐脾困不進乳食須進惺惺散二三服如依次用藥不退往往變作慢脾風慢驚風如得此患宜進竹瀝膏二三服間惺惺散三方並見利久不止門中調胃氣藥並沉香散與之方見本門張渙謹按小兒霍亂吐利由陰陽不和清濁相干與大人無異如救火拯溺宜速療之兼宜用聖石丹治之方見冷吐門中又宜順正湯方見本門翰林待詔楊大鄴問小兒霍亂吐奶者為何答曰凡將息小兒之道切慎擇奶母精神爽健精神詳慢智惠深遠身無疾病脂肉肥潤溫厚淳善能調理乳食何疾更生眾疾易愈緣不慎諸味恣意亂餐孩兒或變蒸或乘寒哺乳或蒸熱飼兒或醉後嗔怒或悲啼不常驚亂神氣乳食失節即吐瀉可疑惠眼觀證霍亂吐瀉形候忽然吐瀉謂之霍亂吐瀉如有渴即下沉香飲子方見吐利門中夾平胃丸服之方見噦逆門中苦未有渴量大小下鮓湯丸通一二遍白涎方見急慢驚風門中只依前用沉香飲子平胃丸調理或尚猖狂躁夜睡不得喘息急促此死候不治玉訣小兒霍亂有此兩證若胃冷霍亂身無大熱但只微溫面湏青黃宜銀白散調氣若腹痛多喘口吐清水面色不定乾噦不常宜蘆薈丸殺蟲二方並見霍亂門中後調氣歌曰霍亂皆因胃氣傷冷熱攻脾氣受殃或積