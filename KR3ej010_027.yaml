body:
  text: 卷第二十七吐噦霍亂凡十二門吐逆第一巢氏病源小兒嘔吐逆候兒啼未定氣息未調乳母怱遽以乳飲之其氣尚逆乳不得下停滯胸膈則胸滿氣急令兒嘔逆變吐又乳母將息取冷冷氣入乳乳變壞不捏除之仍以飲兒冷入兒腹與胃氣相逆則腹脹痛氣息喘急亦令嘔吐又解脫換易衣裳及洗浴露兒身體不避風冷風冷因客膚腠搏血氣則熱入於胃則腹脹痛而嘔逆吐也凡如此風冷變壞之乳非直令嘔吐胃虛入於大腸則為利也漢東王先生家寶小兒吐奶說小兒吐奶有數般或是風疾所致則其吐不可安也吐奶更夾痰才吐卻即風生若止吐後其風無止處更入外風則潮熱閉胃管後變驚風胃主四肢被痰涎閉卻即搐心主神被外邪所幹即驚神不定故變驚風也故止住吐即驚風發手足搐搦口眼翻張頭項強舉雖多服名藥亦不能救療耳小兒吐奶鼻青客風傷肺客風者則是外風也鼻青是肺之外應也夜間煩躁者是肺氣逆而為之也身上發熱者肺主身之皮毛外邪所傷故乃發熱宜下傷寒藥後平胃氣耳小兒吐奶唇黑多哭是傷脾湏夾痰也唇是脾之外應被食所傷故黑其夾痰者脾能生涎故痰沖胃而吐奶食小兒吐奶身熱其奶成片子者是胃有熱積久即生風也其人必四肢生瘡多渴面黃是也小兒吐奶不化夾清水是胃冷其人必面青唇白是也宜暖胃止之小兒吐奶早晚發熱則是驚吐而不睡是也宜與調驚漢東王先生家寶乳食不化腹急氣逆病證須進塌氣丸二三服下卻胸膈方見本門卻進觀音散二三服方見胃氣不和門中但生胃氣藥皆可以意與之又乳母不忌口吃生冷物冷氣入乳則乳變壞又不捏除之仍以此乳與兒吃冷乳入腹與胃相逆則腹脹氣急肚痛或變為瀉亦依前項藥調理如不退卻用羌活膏治之方見本門錢乙吐乳瀉黃傷熱乳也吐乳瀉青傷冷乳也皆當下惠眼觀證凡生下無故吐乳此因乳母冷熱不調啼中餵乳致令胸膈氣逆舊乳不化所以多吐吐下奶瓣或帶酸氣謂之奶積急以牛黃丸療之方見風熱門中仍服勻氣平胃湯藥若脾胃虛滑吃食多吐只以平胃丸方見噦逆門中夾蘆薈丸服之方未見若至正二月間方以鮓湯丸利之方見急慢驚風門中小方脈論小兒熱盛患急熱而吐更下熱藥脾胃熱而胃口閉所以吐傷水穀不通凡下湯藥乳食只伏在管胃口不開脾伏乳食上下不動若下取藥胃口不開只在胸膈不上不下乃是結腸翻吐候也歌曰得患初因是熱傷熱極吐逆也尋常醫人不會看形候又服熱藥怎生當至今胃開並腸結莫服冷藥不須涼若還更取兒當死先須閉胃後通腸嬰童寶鑑小兒嘔逆歌風冷吹雙乳乳壞氣須凝乳兒成嘔吐氣喘腹膨脝解脫當風下洗浴向檐楹喘中還餵奶氣逆在胸停皆成嘔逆病醫者貴調停石壁經三十六種內吐乳候歌吐乳從來胃氣實奶滿胃中生吐逆吐多遍身有風生驚邪本是從斯得吐定無過腦後溫吐出奶來無變色先與定氣後除驚如此醫流無費力此候胃氣實其乳或氣不定或食交奶或怒未息或行房了便乳孩兒使劃時便吐其奶吐出若不變色無害若色青黃或如水之狀或其中有蟲者治須涼膈以溫物暖其腦後避惡風吹其風府也既生其氣又涼其上焦即止也鳳髓經歌括同有注云宜與玉露散方見本門吉氏家傳方同形證論四十八候吐乳歌一同後云此候青色者是驚黃色者是風熱有涎者是驚奶乳解者是傷奶成塊者是胃冷臨時辨別用藥本草主小兒飲乳後吐逆入腹亦出方上用破蘆節中取蟲二枚煮汁飲之蟲如小蠶本草主小兒吐乳方上用仙人杖水煮服之千金治小兒吐乳補虛羸止渴方上以牛乳入生薑蔥白煎量服仙人水鑑小兒吐累醫不瘥方水精一分當門子三枚胡黃連三分乾蠍一枚以火燒之切令黑角代赭金箔各二分黃鹽四分陶隱居云北海黃鹽草粒粗以作魚鮓及咸菹上和藥同研令細勻於中夜取蟾酥為丸如黍米大一丸至兩丸熱水吞下服之立瘥廣利治小兒吐乳暖胃正氣方上用杉木皮以水煎服生廣西如桑株經驗後方治小兒吐不定五倍子二個一生一熟甘草一握用濕紙裹炮過上同搗末每服米泔調下半錢立瘥圖經治小兒嘔吐逆方上取壁錢蟲上錢幕二七枚煮汁飲之蟲似蜘蛛作白幕如錢在暗壁間此土人呼為壁繭聖惠治小兒嘔吐不止心神煩悶惡聞食氣人參散方人參去蘆頭丁香菖蒲各一分上件藥搗細羅為散每服一錢以水一小盞入生薑少許煎至五分去滓放溫量兒大小以意加減漸漸與服聖惠治小兒嘔吐煩渴葛根散方葛根銼人參去蘆頭桑根白皮銼白朮陳橘皮湯浸去瓤焙各半兩半夏一分湯浸七遍去滑上件藥搗粗羅為散每服一錢以水一小盞入生薑半棗大煎至五分去滓放溫量兒大小漸漸與服聖惠治小兒嘔吐不定丁香散方丁香人參去蘆頭白茯苓木香葛根銼甘草炙微赤銼枇杷葉拭去毛炙微黃各一分麝香半分細研上件藥搗細羅為散入麝香同研令勻不計時候以生薑湯調下半錢量兒大小以意加減聖惠又方藿香丁香代赭甘草炙微赤銼各半兩上件藥搗細羅為散不計時候以溫水調下半錢量兒大小以意加減聖惠治小兒嘔吐心煩不納乳食丁香散方丁香人參去蘆頭各一分茅根銼麥門冬去心各半兩甘草炙微赤銼陳橘皮湯浸去白瓤焙各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓稍熱頻服量兒大小以意加減聖惠治小兒脾胃氣逆嘔吐不止肉豆蔻丸方肉豆蔻去殼木香訶梨勒皮硃砂細研各一分人參半兩去蘆頭麝香細研一分上件藥搗羅為末都研令勻用麵糊和丸如麻子大三四歲兒不計時候以粥飲下三丸量兒大小以意加減聖惠治小兒嘔逆人參散方人參去蘆頭白朮乾薑炮製半夏湯洗七遍炒令黃桑根白皮陳橘皮湯浸去白瓤各半兩上件藥搗粗羅為散每服一錢以水一小盞入生薑少許棗一枚煎至五分去滓量兒大小分減溫服聖惠治小兒飲乳後吐不止丁香丸方丁香一分藿香半兩顱囟經用一分人參三分去蘆頭顱囟經用二分上件藥搗羅為末煉蜜和丸如綠豆大每服以粥飲研下三丸顱囟經亦妝治孩子霍亂吐瀉面色青冷汗或四肢冷聖惠治小兒吐逆不定丁香散方丁香花桑葉人參去蘆頭白茅根銼藿香各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小分減服之九籥衛生五神散治吐逆方同納花桑葉多一分孔氏家傳又以此方治霍亂聖惠治小兒吐乳麝香丸方麝香一分細研杏仁湯浸去皮尖雙仁微炒研入丁香各一分上件藥搗羅為末以粟米飯和丸如麻子大每服以人參湯研下三丸量兒大小加減服之聖惠治小兒吐乳菖蒲丸方菖蒲人參去蘆頭赤茯苓各半兩上件藥搗羅為末煉蜜和丸如麻子大每服以生薑湯化破三丸服之量兒大小以意加減聖惠治小兒吐乳不定枇杷葉散方枇杷葉拭去毛微炙黃母丁香各一分上件藥搗細羅為散如吐者乳頭上塗一字令兒咂便止聖惠又方生地黃汁人乳各一合上件藥相和煎三五沸徐徐與兒服之聖惠治小兒吐乳令乳母服此方人參一兩去蘆頭生薑切焙乾陳橘皮湯浸去白瓤焙各半兩上件藥搗篩為散每服三錢以水一中盞煎至六分去滓分溫二服服了良久令兒飲乳大效聖惠治小兒吐奶方雄黃馬牙硝各一分壁魚兒五枚上件藥入瓷碗子內研如泥以乳汁半合調之使藥注子內灌少許把孩兒抬項吐出黑血即定聖惠治孩子吐奶方上取田中地龍糞一兩研末空心以粥飲調下半錢不過三二服聖惠治小兒吐乳黃色方上多與驢乳吃令大腸稍利得利即毒氣便散聖惠又方上搗韭根汁滴豇豆大入口中瘥聖惠又方上取新熱馬屎一塊絞汁半合灌之效聖惠治小兒百日內積痰在胸膈吐乳方上取書中白魚七枚燒灰細研以乳汁調一字服之聖惠又方上取故壁下鼠負蟲七枚炙令焦細研以乳汁調半錢服靈苑黑丸子退熱定吐逆兼治小兒食傷方山茵陳蜀升麻常山各半兩芒硝半分麻黃去根節用一兩官桂一分去粗皮附子一分燒黑留心上同為末須重羅令極細旋炒一大錢入杏仁二粒去皮尖燈上燒黑存性巴豆一粒壓去油寒食麵糊為丸如綠豆大小兒丸如麻子大每服五丸傷寒手腳心冷冷茶清下日三服吐血眼眥血出者生油冷酒下吐不止茅根竹葉湯下熱攻瀉血蜜炒生薑湯下失音竹瀝酒下不過十服聲出太醫局蘇合香丸療傳屍骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐利時氣鬼魅瘴瘧赤白暴利瘀血月閉痃癖丁腫驚癇鬼忤中人小兒吐乳大人狐貍等病方蘇合香油入安息香膏內薰陸香別研龍腦研各一兩硃砂研水飛白朮丁香青木香白檀香銼沉香烏犀鎊屑蓽拔安息香別為末澄去砂石用無灰酒一升熬成膏香附子去皮訶黎勒燒取皮麝香研以上各二兩上為細末入研藥勻用安息香膏並煉白蜜和劑每服旋丸如梧桐子大早朝取井華水溫冷任意化服四丸老小兒可服一丸溫酒化服亦得並空心服之用蠟紙裹一丸如彈子大緋絹袋盛當心帶之一切邪神不敢近太醫局小丁香丸消積滯生冷留飲宿食止痰逆噁心霍亂嘔吐治心腹脹滿脅肋刺痛胸膈痞滿噎塞不通常服順脾胃進飲食又治小兒吐逆不定方丁香三兩肉豆蔻三十個木香一兩半五靈脂一十二兩巴豆去皮出油二百一十個上為細末入巴豆令勻麵糊和令得所丸如黍米大每服五丸至七丸溫生薑湯下橘皮湯亦得食後服如霍亂吐逆煎桃葉湯放冷下小兒吐逆不定三歲兒服三丸五歲以下服四丸用生薑桃葉湯下太醫局丁香散治小兒胃虛氣逆嘔吐不定精神羸困霍亂不安方丁香藿香去枝梗各一分人參半兩去蘆頭上件同杵羅為散每服一錢水半盞煎五七沸入乳汁少許去滓稍熱時時服不計時候譚氏殊聖治小兒吐逆下膈和胃紫樸散方上用厚朴去粗皮以生薑汁炙令香熟為細末每服一字或半錢米飲調下溫服譚氏殊聖治小兒吐逆不定方上用乾薑炭火燒及八分研如粉每服一字至半錢以蜜湯放冷調下立效嬰孺王子湯治小兒吐下不止方赤石脂九錢黃連甘草炙乾薑各六銖黃芩二錢膠一挺如指大黃蠟一彈子大上以水三升煮取一升納蠟並膠令烊盡為三服或四五服以意加減良嬰孺治小兒吐下後內虛氣奔上飲食嘔逆而煩方厚朴六分桂心四分枳實三個炙生薑二分上切以水二升煎至一升一合為三服漢東王先生家寶治嬰孩小兒乳食不化腹急氣逆塌氣丸方巴豆十片是五個也胡椒十粒丁香十個青橘十個湯浸一宿不去皮瓤每個入巴豆半個胡椒一粒丁香一個麻線纏結之上用釅米醋一碗煮青橘候醋乾為度取出細切青橘同諸藥焙乾為末粟米糊為丸如粟米大每服三歲五丸五歲七丸七歲十丸飯飲下一日三服漢東王先生家寶治嬰孩小兒吐逆不止羌活膏方羌活獨活各去蘆頭人參白茯苓防風蠶頭者肉桂去粗皮不見火全蠍炒水銀各一兩硫黃三錢同上項水銀研令青色各不見水銀星方可用上為末煉蜜為膏每服旋與嬰孩如黑豆大二三歲如龍眼核大五七歲如龍眼大薄荷湯化下錢乙香銀丸治吐方丁香乾葛各一兩半夏湯浸十次切焙水銀各半兩上三味同為細末將水銀與藥研勻生薑汁丸麻子大每服一二丸至五七丸煎金銀湯下無時張渙養中湯方養脾胃治嘔吐不止大附子炮裂去皮尖臍一枚沉香木香各半兩人參一兩官桂半夏湯浸七遍焙乾各一兩上件搗羅為細末每服一錢水一小盞入生薑三片煎五分去滓放溫時時服張渙香參湯方消寒痰治嘔吐藿香葉人參舶上丁香皮丁香白茯苓