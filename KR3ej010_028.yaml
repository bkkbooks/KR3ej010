body:
  text: 卷第二十八泄瀉羸腫凡十五門一切泄瀉第一養生必用論下利謂古人凡奏圊圊圈也瀉者皆謂之利尋常水瀉謂之利米穀不化謂之米穀利或言下利清穀清冷也痢謂之滯下言所下濡滯膿血點滴坐圊遲久豈不謂之滯下也痢有四種寒熱疳蠱是也白多為寒赤多為熱兼以後重赤白相雜為疳至蠱則純下血隨證用藥不若今人之妄也茅先生論霍亂吐瀉積瀉驚瀉疳瀉渴瀉傷瀉冷瀉熱瀉諸般瀉形狀各別下藥殊等如調一瀉患見變眼微視口內生瘡鼻口乾燥瀉久不止並下黑血囟門腫陷不能進食大渴不止死候不治兼看三關脈微微青黑腫起亦死錢乙論篤病訣安云黃承務子二歲病瀉衆醫止之十餘日其證便青白乳物不消身涼加哽氣昏睡醫謂病困篤錢氏先以益脾散三服方見胃氣不和門中補肺散三服方見喘咳上氣門中三日身溫而不哽氣後以白餅子微微下之方見吐利門中與益脾散二服利止何以然利本脾虛傷食初不與大下掩置十日上實下虛脾氣弱引肺亦虛補脾肺病退即身溫不哽氣是也有所傷食仍下之也何不先下後補曰便青為下臟冷先下必大虛先實脾肺下之則不虛而後更補之也錢乙附方驚風或泄瀉等諸病煩渴者皆津液內耗也不問陰陽宜煎錢氏白朮散使滿意取足飲之彌多彌好方見胃氣不和門中嬰童寶鑑洞泄死候大瀉不止體熱多困眼緩溏泄囟陷不動嬰童寶鑑小兒交奶為乳母有孕氣血不榮其乳飲子則其候發立腹急時瀉胸背皆熱夜啼肌瘦一如積聚之疾也嬰童寶鑑小兒水痢癖者因飲水時被驚或啼未住而飲水也茅先生小兒諸瀉死候歌大瀉應難止渾身熱困多緩睛溏泄滑囟陷見奔波千金治小兒下痢腹大且堅方上以故衣帶多垢者切一升水三升煮取一升分三服千金又方上腹上摩衣中白魚亦治陰腫千金治少小泄注四物粱米湯方粱米稻米黍米各三升蠟如彈丸大上四味以水五升東向灶煮粱米三沸去滓復以汁煮稻米三沸去滓復以汁煮黍米三沸去滓以蠟納汁中和之蠟消取以飲之數試有效古今録驗治冷熱不調或下帶水或赤白青黃者方上用酸石榴子五枚合殼舂絞取二升汁每服五合至二升盡即斷小兒以意服之二三合太醫局香連丸治小兒冷熱不調泄瀉煩渴米穀不化腹痛腸鳴或下痢膿血裡急後重夜起頻並不思乳食肌肉消瘦漸變成疳方龍骨黃連去須微炒白石脂白礬燒令汁盡乾薑炮各半兩上件藥搗羅為末醋煮麵糊和丸如麻子大每一歲兒服十丸米飲下乳食前服如煩渴煎人參湯下更量兒大小以意加減日三四服聖惠龍骨丸方同仍治洞泄談氏殊聖治小兒瀉痢方上用地榆略炒為細末每服一錢匕陳米飲調下養生必用治大人小兒老人虛人不以冷熱泄瀉神方黃連去須銼如豆若是例大即以新布裹石上盤之根鬚自別白芍藥銼如豆吳茱萸各三兩上三味鐺盆內慢火炒至赤色取下放冷杵羅為細末每服三錢匕水一盞半煎至八九分去滓取六分清汁空腹食前溫服日三四服小兒量與若是不喜藥人大假嫌苦即以水浸蒸餅丸如桐子大更丸一等如緑豆黃米大小兒並十五丸至二十丸溫米飲下若作散只以沸湯或溫米飲調下並可服病泄痢之人若不禁生冷魚肉肥膩與不服藥同養生必用治老人及諸虛人下痢滑泄百方治之不效方赤石脂真者別研乾薑末研勻各一兩上以面為糊和丸如桐子大每服二十丸空腹溫米飲下未知加至三五十丸小兒小丸與服赤石脂河東陝西有真者今齊州所出乃桃花石不入斷下藥茅先生小兒瀉痢三聖丸方黃連木香各細切茱萸各一錢上用銅銚先放黃連炒令色變便下茱萸同炒煙起便放木香三味同炒一時間取出放冷入礬灰二錢都為末用醋麵糊為丸此大每服十丸十五丸同蔥飯飲吞下茅先生小兒瀉痢香連丸方木香黃連用茱萸半兩同於銚內炒令煙起取出去茱萸肉豆蔻訶子炮去核各半兩阿膠麵炒硃砂各一錢上件為末飯飲為丸此大每服十丸十四丸用飯飲吞下兒小碎之茅先生小兒一切瀉痢乳香散方乳香二錢用荷葉於炭火上炙令半熔放地碗蓋別爛研肉豆蔻白姜甘草炙草果子以上各一分上四味細銼用醋面作包裹於熱灰內煨令赤色取出為度去面為末入乳香末拌和每服半錢一錢用陳米飯飲調下茅先生小兒一切瀉痢香連散方木香濕紙裹炮甘草炙橡斗子去粗皮五味子去心內塵蓮房細絲訶子炮去核上六味各等分為末每服一字半錢用陳米飯煎飲調下嬰孺治小兒不調適水利枳殼湯方枳殼四分炙人參黃芩各八分櫸皮茯苓各十分上切以水四升煮一升二合二歲兒為四服以次量之嬰孺治小兒及老人一切利及成疳者方白龍骨白石脂各五分雞糞礬炒黃連胡粉炒茯苓阿膠炙各四分上為末蜜為丸桐子大米飲下十五丸日進二服加至二十丸瘥小兒以意加減嬰孺治小兒注下三四日增減水藥皇子湯方龍骨牡蠣煅赤各一兩人參乾薑甘草炙赤石脂各三分細辛附子炮各二分黃連五分上以水四升煮一升半為三服日進三服兒小量之嬰孺治小兒泄痢黃連丸方黃連茯苓黃芩赤石脂各四分枳殼炒一分人參五分甘草炙二分上為末蜜丸一二百日兒麻子大五丸沾乳上送一二歲兒小豆大十丸次量加之飲下張渙訶子湯方治泄利訶黎勒皮人參去蘆頭木香白茯苓各一兩陳橘皮湯浸去白甘草炙各半兩上件搗羅為細末每服一錢水八分一盞入生薑二片煎至五分去滓溫服張渙治小兒脾胃虛弱不能飲食已漸傷損榮衛致令肌體羸瘦時時下利面色青白丁香黃耆散方綿黃耆銼丁香當歸洗焙乾白朮鱉甲塗醋炙黃去裙襴人參去蘆頭各一兩胡黃連甘草炙各半兩上件搗羅為細末每服一錢水一盞入生薑二片棗二枚同煎至五分去滓溫服食前張渙遺方人參散治小兒胃氣虛弱泄瀉不止人參白茯苓甘草炙枇杷葉各半兩丁香一分肉豆蔻二個藿香厚朴薑汁製各一兩青皮當歸洗乾薑炮各一分上為細末每服半錢水半盞生薑一片煎至三分溫服嬰童寶鑑治小兒瀉日霞丹方白堊砒霜黃丹各末麝香各一錢匕上件和勻糯米飲為丸如芥子大丸第一丸時取一口氣於藥上向下不用一歲一丸米飲下惠眼觀證斗門散治瀉方橡斗子訶子用肉各六個並三生三炮甘草六寸半生半熟上為細末每服一錢陳米飲調下惠眼觀證溪螺散治瀉方船底下溪螺四十九個先以水浸出泥乾葛粉半兩上將葛粉摻在螺上盛在碗內卻盞子蓋之一宿來早取螺上粉曬乾使每服一錢以退豬湯調下寶童方治瀉痢香姜散黃連去須生薑各半兩上細切同黃連共炒為末每服一錢陳米飲下張氏家傳調理小孩兒瀉痢肉豆蔻散方肉豆蔻大訶子肉青皮附子炮去皮厚朴薑製過炒熟各半兩上件焙乾為末每服大小加減粥飲調下空心服張氏家傳小兒冷熱不調作泄瀉腹痛作痢香連丸方木香黃連去毛訶子阿膠炒焦上等分細末飯為丸如麻子大每服二三十粒陳米飲吞下空心服忌生冷油膩面張氏家傳橘皮膏治小兒瀉痢和氣方丁香一分陳皮去白枳殼麩炒去瓤甘草炮訶子炮去瓤各半兩上為細末煉蜜為膏每服一皂皂大煎生薑湯化下莊氏家傳治小兒風冷入腸胃腹痛泄瀉虛風胃風湯方人參去蘆官桂去皮白朮川芎天麻肥白者大附子炮製去臍皮各等分上為粗末每服二錢水一盞入粟米煎七分去滓溫服莊氏家傳治小兒瀉方百草霜屋梁塵各二錢硇砂半字上細研用蠟為丸如緑豆大溫水吞下三丸莊氏家傳治瀉方兒烏頭一個半兩大炮去皮黃丹二錢火煅取焦為度上件藥為末麵糊丸如青豆大每服小兒三丸大人五丸如瀉用井華水吞下赤痢甘草湯下白痢乾薑湯下神驗莊氏家傳干瀉散治小兒脾癖方黑三稜去皮神麯炒鱉甲生用蓬莪朮陳橘皮蝸牛殼自乾死者於牆壁上尋上等分為細末每服半錢熱米飲調下不拘時候孔氏家傳治小兒久新瀉利不問冷熱分利水道茯苓丸方白茯苓五分黃連一兩阿膠炒三分上為末以燒粟飯和丸如緑豆大粟米飲下二十丸孔氏家傳吳婆散治小兒疳熱冷瀉腹肚虛脹皮肉消瘦唯存骸骨瀉利不止方宣連去須白茯苓真阿膠炙人參黃柏蜜炙令赤丁香以上各一分訶黎勒皮煨去核二枚桃白皮三分沒石子一枚緊實者上併為細散每服一二字白米泔調下不拘時候與良方不同王氏手集妙應散治腸虛受風身體壯熱洞泄下痢穀食不化冷熱相搏腹痛下利五色脫肛後重煩渴羸瘦全不思食方黑附子炮甘草燒黑黃連各三分白石脂白朮陳皮乾薑各半兩赤石脂龍骨各一兩木賊燒灰刺芥燒灰各三兩上為細末每服一錢兒小一字半錢米飲調下王氏手集木香治中丸勻冷熱止泄瀉利胸膈消脹滿除腹痛止嘔逆散痞氣進乳食方甘松蓬莪朮甘草青皮各一兩上件為細末煉蜜為丸入檀香一兩名香橘丸如緑豆大每服隨小大五七丸至十丸食前溫生薑湯下王氏手集白朮散和中益胃散風濕治腸鳴泄瀉米穀不化利下青白腹痛嘔逆脅肋脹滿氣痞不散體熱多睡全不思食方芍藥當歸官桂人參白朮茯苓各半兩粟米炒一兩上為粗末每服一大錢水六分盞煎至三分去滓溫服王氏手集溫胃固腸丸方肉豆蔻縮砂仁丁香龍骨訶子皮炙赤石脂上各等分白麵糊為丸如緑豆大每服一二十丸飯飲下量兒小大王氏手集治小兒臟冷滑泄不止腸鳴腹痛比聖丸方青州棗二十五個去核黃丹二錢勻分在棗肉內燒煙絶用訶子皮草豆蔻仁麵裹燒麥熟為度去面各半兩肉豆蔻木香上為末醋煮麵糊為丸如小黃米大每服二十丸米飲下王氏手集豆蔻調中湯治臟腑不調方白礬縮砂仁五倍子各一錢黑附子半兩去皮臍上為細末用墨水麵糊丸如緑豆大每服十五丸兒小五七丸食前米飲下趙氏家傳治瀉痢二色丸方黑丸子巴豆七粒和皮杏仁二七粒和皮二物燒存性同研勻細燈上溶蠟為膏紅丸子巴豆七粒去心膜研出油硃砂一錢研二物同研勻燈上溶蠟為膏上二色丸各令蠟與藥等分用旋丸如緑豆大每服紅黑各一丸瀉新水下赤痢甘草湯白痢乾薑湯赤白痢則各之吉氏家傳治一切瀉痢方厚朴用蜜炙白芷上等分為末每服二錢蜜湯下酒亦得更量大小吉氏家傳補小兒虛瀉調中散方人參一兩白朮半兩犀角屑桂藿香甘草炙各一分上末每服半錢棗湯調下吉氏家傳治秋泄瀉玉柱丸方烏頭一個舶上茴香一兩微炒肉豆蔻一個炮上件為末軟飯丸如此大水瀉井水下疳瀉米飲下驚瀉木香湯下大腸冷滑乾薑湯下五丸速要瘥加二丸吉氏家傳銀白散治小兒脾胃氣弱泄瀉不思飲食方人參茯苓甘草炙藿香葉白扁豆炒微生白朮麵炒上等分為末每服半錢至一錢紫蘇飯飲下朱氏家傳治脾胃不和瀉痢木香散方木香白朮各一分藿香益智各半兩肉豆蔻三個麵裹煨熟上為末每服半錢或一字量兒大小用木瓜紫蘇湯下長沙醫者相漹傳桑葉散治小兒泄瀉虛滑頻數不止方人參白茯苓藿香葉乾葛以上各等分焙上為末每服半錢濃煎桑葉湯調下若大人患瀉加至一大錢亦用桑葉煎湯調下至甚者不過三服長沙醫者丁時發傳薑黃散治小兒泄瀉可思食方陳皮一兩訶黎勒皮甘草炙青橘皮去白各半兩上為細末每服半錢米飲調下或煎亦得長沙醫者丁時發傳開胃丸治小兒乳食不消冷熱不調泄瀉頻並進飲食止吐逆方木香白朮人參當歸各一分白豆蔻一錢半上為細末麵糊為丸如粟米大麝香溫米飲下十丸至二十丸長沙醫者丁時發傳治大人小兒久瀉赤白痢及水瀉瀼瀉人