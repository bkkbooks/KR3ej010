米飲下十丸至三五十丸頻服之食前張渙順胃丹方治泄利蟲煩腹痛高良薑乾漆肉桂各一兩白朮炮肉豆蔻仁各半兩上件搗羅為細末白麵糊和丸如黍米大每服十粒粟米飲下量兒大小加減張渙建中丹方治泄注不止腹痛多啼胡椒蓬莪朮肉豆蔻各半兩全蠍一分上件為細末白麵糊和丸如黍米大每服十粒米飲下九籥衛生固氣丸療小兒脾胃虛怯泄瀉腹痛方上用絶大肉豆蔻一枚劈破填滴乳香一塊用酵麵裹慢火內煨候面熟為度去面不用將肉豆蔻乳香同為細末曲糊和丸如緑豆大每服二十丸乳食前米飲下張氏家傳治小兒久痢腹痛脫肛下血聖餅子方神麯一兩膩粉一錢匕上件二味拌合令勻後以雞子清調拌上件藥稀稠得所捏作餅子如錢大小於火上炙令黃熟每服一餅於早晨空心同油餅吃之後進飲少許吉氏家傳紫霜丸治小兒久積胸高羸瘦赤白痢疾腹痛甚方丁頭大赭石半兩令煅五遍醋淬五遍杏仁二七粒取霜乳香硃砂木香各一錢宣連一分去頭輕粉半錢麝香少許肉豆蔻二個麵裹炮巴豆十粒取霜上為細末稀麵糊為丸如此大每服七丸至十五丸紫蘇飯飲吞下下利羸瘦第十四瀉痢同巢氏病源小兒利後虛羸候腸胃虛弱受風冷則下利利斷之後脾胃尚虛穀氣猶少不能榮血氣故虛羸也聖惠夫小兒久痢羸瘦者由因乳食不節臟腑夙挾疳氣腸胃冷熱不調變而為下痢經久不瘥則脾胃虛弱穀氣減少氣血不榮故令肌體羸瘦也外臺劉氏療小兒痢後虛手足心熱痢縱未斷亦可服之方橘皮生薑各三分上二味切以牛乳半升煎取四合去滓分溫服之聖惠治小兒久痢不斷肌體羸瘦食不消桔梗丸方桔梗去蘆頭神麯微炒各一兩麥蘖烏梅肉微炒厚朴去粗皮塗生薑汁炙令香熟白朮人參去蘆頭赤石脂黃芩龍骨桂心甘草炙微赤各半兩黃連一兩半去須微炒黃雌雞骨一具淨洗去肉酒浸一宿炙令黃上件藥搗羅為末煉蜜丸如緑豆大每服以粥飲下五丸日三服量兒大小加減服之聖惠治小兒久痢不瘥羸瘦壯熱毛髮乾焦不能飲食雄黃散方雄黃蘆薈青黛硃砂熊膽麝香各細研龍膽去蘆頭黃連去須微炒黃柏微炙銼當歸銼微炒白芷細辛甘草炙微赤銼各一分蚱蟬七枚去足干蝦蟆一兩塗酥炙令黃焦上件藥搗細羅為散入研了藥更研令勻每服以井華水調下半錢日三四服量兒大小以意加減聖惠治小兒下痢不止瘦弱雞子粥方雞子一枚糯米一合上煮粥臨熟破雞子相和攪勻空腹入少醋食之張渙龍骨湯方治小兒痢久成疳漸漸黃瘦龍骨訶黎勒皮炮赤石脂各半兩醋石榴皮炒黃木香使君子仁各一分上件搗羅為細末每服半字至一錢點麝香湯調下下利浮腫第十五瀉痢同惠濟論小兒痢瘥後遍身腫候歌宜與塌氣散方在後冷痢日久失醫治遍身浮腫卻如吹脈洪是氣化為水沉實還因積有之順氣腫消為上法氣平兩日定多尿莫交食飽還憂滯此候原因積損脾惠濟論塌氣散方茴香白牽牛甘草各炒木香以上各一錢上為末每服半錢紫蘇湯下王氏手集止渴聖效散治小兒因吐利氣虛津液減耗生疳煩渴飲水不休面腫腳浮腹大頭細小便利白全不吃食方乾葛白芷各二兩一兩炒黃一兩生用細墨二兩一兩火煅過一兩生用黃丹二兩一兩炒紫色一兩生用上同為細末每服半錢倒流水調下
