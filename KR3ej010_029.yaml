訶梨勒丸治冷熱相搏時發腹痛下痢青黃乳食不化腹脅脹滿及下痢膿血方訶梨勒去核一分青皮薑黃各一錢上為細末麵糊為丸緑豆大每服十丸溫米飲下量兒大小加減長沙醫者王兌傳通神丸治小兒大人痢疾下膿血裡急腰重臍腹疼痛方沒藥五靈脂乳香各研細炒一錢巴豆七粒去皮心膜壓出油上四味同研令細勻滴水為丸如粟米大每服一粒生木瓜研水下不拘時候千金灸法小腸泄痢膿血灸魂舍一百壯小兒減之穴在俠臍兩邊相去各一寸翼云相去一寸五色痢第九漢東王先生家寶治小兒下痢腸虛胃冷或毒氣蘊積其大腸虛者則變血痢其痢狀血色蘊瘀如雞鴨肝隨痢下是也宜服鮓湯丸方見本門小兒形證論四十八候五色痢歌五色之痢最多端見此方知有五般青色只因驚積聚黃多食積在脾間白色冷虛腸胃患赤為積熱最難安雞肝隱積多成片黑血相和不易安膚搐胸高兼露齒臉紅筋出每居前急安臟腑和湯散醫者留心按古賢又歌曰五色之痢莫言奇四歲之前始有之青色只因驚積聚黃因食積毒於脾赤黑已知心腎病白多殘害是脾為三七以前無變動休令多睡飲餐遲此疾且須和五臟補榮衛方漸漸安愈如目腫不進飲食只與調胃散補之方見積熱門中翰林待詔楊大鄴小兒五色痢候歌痢色原因有五般治患先須仔細看青色只因驚積聚黃多有毒在脾間赤色還知心腎病白多應是肺家寒二七以前無變動莫交絶食命傾殘此候須是安和五臟調其榮衛始得安然如目腫不吃食乃惡候也先調榮衛後隨形候用藥勿令瘥誤切須用意況十中不得三五再生漢東王先生家寶治小兒瀉痢五色膿血如爛魚腸並無大便只是膿血腸中攪痛鮓湯丸方粉霜輕粉硇砂各稱一錢硃砂炒一錢匕白丁香匙炒四錢乳香稱半錢別研巴豆七粒去皮心不出油上為末蒸棗肉丸每服嬰孩三丸如粟米大二三歲如大麻子大四五歲亦如麻子大並旋㔢成丸煎鮓湯吞下一日二服間調胃氣藥與之三十六種內治下五色惡物心神煩熱不止方地榆白茯苓黃柏炙各一兩上為末每服一錢水一盞煎至五分去滓分三服張氏家傳治小兒赤白或五色積痢三霜丸方巴豆去皮揀選白色肥好者稱三錢研細先用白絹包三二十重次用白紙外面包定大石壓令油盡稱取二錢輕者為用真輕粉名水銀粉又名膩粉粉霜各稱一錢上三味同研勻極細別取好黃蠟三錢調煮三二十沸取出去酒令淨再溶入藥和之如有煮酒蠟亦堪用和成劑油單內盛如服食旋丸如小緑豆大三歲以下如粟米大每服三五丸溫熟水下此方西京龍門山文太師藥寮內真珠泉南壁石上刻量兒子大小加減服之吉氏家傳治五色痢兼渴不止方茯苓宣連黃柏各等分上件取黃柏末以漿水如麵糊良久和前二味為丸如緑豆大三歲米飲下七丸殺疳熟水下五丸吉氏家傳治五色痢至聖丸方厚朴去皮薑製黃柏略去皮以雞子白塗炙黃熟如干再上當歸酒浸一宿上三味等分細末煉蜜為丸如梧桐子大小兒細丸厚朴湯下每服四十丸加減長沙醫者鄭愈傳治疳痢五色痢定粉散方定粉龍骨黃丹煅過各二錢訶子三個煅熟取肉上為末每服半錢粥飲下三歲以上半錢休息痢第十葛氏肘後治下痢經時不止者此成休息療之方上取龍骨炙令黃焦搗服方寸匕日三服即愈葛氏肘後又方上用龍骨四兩搗如小豆大五升煮取二升半冷之分為五服效保生信效松焙餅子治一切塊癖積滯氣血瘕聚等一二十年者方細墨半兩焙芫花醋浸炒焦赤青蒙石大戟乾漆炒五靈脂荊三稜蓬莪朮密陀僧陳橘皮去白牡蠣燒各半兩巴豆一兩去皮用濕紙三處裹燒紙焦止大幹棗十四個去核燒存性白丁香硇砂研虻蟲去翅足斑蝥同上各一分上同為細末醋煮麵糊丸如皂子大捻作餅子記以所傷物煎湯或麵湯送下一丸須以齒齧咽之其積漸漸移近下再服再覺移下更一丸則積自下若尋常要宜轉只以麵湯下血積塊癖經血閉塞大人小兒久痢膿血休息惡痢皆治之長沙醫者丁時發傳玉命丹治小兒久患赤白痢及休息痢不止腹肚虛鳴日漸羸瘦撏眉多吃泥土可食者方硫黃研密陀僧黃丹各半兩寒水石白礬各研二兩用新瓦餅子入五味用鹽泥固濟煅令通赤研勻細麝香一字上件六味研勻以蒸餅為丸如小緑豆大每服十粒用烏梅甘草煎湯下大小加減忌生冷毒物鮓緬等蠱痢第十一巢氏病源小兒蠱毒痢候歲時寒暑不調而有毒厲之氣小兒解脫為其所傷邪與血氣相搏入於腸胃毒氣蘊積值大腸虛者則變痢血其痢狀血色蘊瘀如雞鴨肝片隨利下此是毒氣盛熱食於入臟狀如中蠱故謂之蠱毒痢也石壁經三十六種內脾毒痢候歌脾間有毒號純陽本為醫人熱藥傷致使大腸多結澀多饒滴血在枯腸如風腹閉難開眼身熱頭溫腳轉涼舌赤胸高為此候多啼喘急細消詳四十八候云更如狂先須解熱並開胃便是明醫用藥良此脾受熱積失治伏毒治當以涼脾次去其積若胸前骨忽然高者更加啼急則不治也鳳髓經歌括同有注云宜與金華散香連丸香連丸方見冷熱痢門吉氏方同金華散方見實熱門中小兒形證論四十八候脾毒痢歌一同後云此候臟腑有積或痢赤不宜熱藥宜用開胃散方見赤痢門中兼利藥量虛實微取大抵當宣轉小兒形證論四十八候風毒痢歌八痢之中風轉難形如青草汁多般毒風豆汁添邪熱胃敗雞肝片片全加赤不須先下積閉眸食絶不堪看若歸白痢還須下臟腑頻溫得本源千金治下血狀如雞肝腹中攪痛難忍號蠱毒痢方此方乃人以謂八物茜根湯者茜根升麻犀角各三兩桔梗黃柏黃芩各二兩地榆白蘘荷各四兩上八味㕮咀以水九升煮取二升半分三服此蠱痢血用之小兒分減服千金治小兒蠱毒痢方上用藍青汁一升二合分為四服圖經治蠱痢方側柏葉焙乾為末川大黃等分上二味同煎為汁服之以療男子婦人小兒大腹下黑血茶腳色或膿血如澱所謂蠱痢者治之有殊效又能殺五臟蠱子母祕録小兒蠱毒痢方上用生地黃汁一升二合分三四服立效千金收治膿血痢聖惠治小兒蠱毒痢不止身體壯熱煩悶蘘荷散方白蘘荷根川升麻各一兩敗鼓皮一分燒黃焦甘草炙微赤銼干藍葉各半兩赤芍藥犀角屑各三分上件藥搗粗羅為散每服一錢以水一小盞入豉二七粒煎至五分去滓不計時候量兒大小分減溫服聖惠治小兒蠱毒痢血體瘦黃連散方黃連一兩去須微炒敗鼓皮炙令黃焦白頭翁甘草炙微赤銼藍青各半兩犀角屑白蘘荷根黃芩茜根銼各三分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫不計時候量兒大小分減服之聖惠治小兒蠱毒血痢發盛心神煩悶腹脹不欲飲食犀角散方犀角屑白蘘荷根地榆微炙銼桔梗去蘆頭蘇木銼各等分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減溫服嬰孺治小兒蠱毒痢蘘荷根湯方白蘘荷根八分犀角穀皮四寸炙升麻十分甘草四分炙藍青一升豉三合芍藥七分上以水四升煮一升二合二歲兒為三服嬰孺治小兒谷痢挾毒犀角煎方地脈草黃連葳蕤各十二分黃柏竹茹茜草各八分蜜一升人參六分牡蠣十分梁州櫸皮十四分干藍四分犀角屑甘草各五分上切以水一斗煮及二升半絞去滓下蜜火上煎餘二升三歲一合三四歲一合半日二夜一量與之張渙謹按小兒歲時寒暑不調而有毒厲之氣入於腸間其痢狀如雞鴨肝片隨痢而下乃名蠱毒痢及肛門脫出宜白頭翁散祛毒止痢方白頭翁黃連去須微炒茜根銼焙乾蘇枋木故舊豉皮炙令黃焦各一兩犀角屑地榆炙銼各半兩甘草炙一分上件搗羅為細末每服一錢水一小盞煎六分去滓服量兒大小加減乳食前張渙地榆丹消毒止痢方地榆炙銼黃連干藍葉川升麻各一兩川楝子苦楝根各半兩上件搗羅為細末軟飯和丸黍米大每服十粒米飲下量兒大小加減乳食前四十八候治毒痢宣連丸方宣連一錢作散用雞子清和作餅於瓦上燒乾再為末肉豆蔻一個去心臍內入乳香不拘多少紙裹火煨黃色硃砂木香各半錢杏仁七粒和皮燒巴豆四粒燒七粒亦得上為末醋糊丸如蘿蔔子大陳米飲下七粒赤痢槐花湯下寶童方治臟毒痢為吃諸藥不愈者槐花半兩炒白礬一兩上為末每服一錢用陳米飲下孔氏家傳治蠱小品方上取薺苨根搗末以飲服方寸匕立瘥一方可入地榆臭椿根同服脫肛第十二巢氏病源小兒脫肛候脫肛者肛門脫出也肛門大腸之候小兒患肛門脫出多因利久腸虛冷兼因躽氣故肛門脫出謂之脫肛也聖惠夫小兒痢脫肛者皆因久痢大腸虛冷所謂也肛門為大腸之候大腸傷於寒痢而用力其氣下衝則肛門脫因謂之脫肛也嬰童寶鑑小兒腸脫為瀉痢久不瘥冷極肚腸滑玉訣小兒瀉血脫肛候歌脫肛瀉血本因傷冷熱攻脾損大腸消渴口瘡添上熱氣虛浮腫面青黃此患先調胃氣後下虛積次和臟腑即安石壁經三十六種內翻花脫肛候歌本為醫人下藥涼致令冷氣入回腸鼻頭一云鼻根只見多青脈唇白相兼更齒旁一雲根黃初患百朝常此候若經年月臉生光眉紅好哭唇乾燥形候分明要審詳只當溫大腸止渴調氣則愈慎不可食冷藥也顱囟經治孩子脫肛方上用苦葫蘆一個並子細搗時時水調服之切忌動風之物如瀉血用栝蔞一個慢火燒令熟細研為末熟水下一錢顱囟經又方大黃二兩木賊草一分炙白礬半兩燒灰上為細末空心米飲下半錢葛氏肘後卒脫肛方上燒蜘蛛為灰敷肛上千金鱉頭丸治小兒積冷久不瘥後余脫肛不瘥腹中冷肛中疼痛不得入者方死鱉頭二枚炙令焦磁石四兩小蝟皮一枚炙令焦桂心三兩上四味末之蜜丸如大豆兒三歲至五歲服五丸至十丸日三兒大以意加之外臺古今録驗療小兒久痢脫肛方鱉頭一枚炙焦東壁土五色龍骨各五分卷柏四分上四味搗散以粉敷之按內之即瘥外臺古今録驗又方上取鐵精粉敷內之瘥姚和衆治小兒因痢脫肛方連翹不以多少先用水洗去土上為細末先用鹽水洗次用藥末時時干敷脫肛上立瘥長沙醫者丁時發傳治小兒脫肛不收方卷柏二錢鱉一枚火煅白礬一錢火煅上件為末先用鹽水洗次用藥塗脫肛上立瘥千金灸法小兒脫肛灸頂上旋毛中三壯即入千金又灸尾翠骨三壯千金又灸臍中隨年壯聖惠灸法小兒脫肛瀉血每廁臟腑攝痛不可忍者灸百食一穴三壯在頭中心陷者是也炷如小麥大聖惠岐伯灸法療小兒脫肛瀉血秋深不較灸龜尾一壯炷如小麥大脊端窮骨也萬全方灸法治小兒脫肛瀉血灸第十二椎下節間名接脊穴灸一壯炷如小麥大
