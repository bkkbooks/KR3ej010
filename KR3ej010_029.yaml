body:
  text: 卷第二十九滯痢赤白凡十二門八痢第一茅先生小兒生下周歲上至十歲以前有中痢疾分八種各逐一有說赤痢臟腑積熱白痢臟腑積冷傷積痢其糞內一半似土色本因奶食所傷驚積痢其糞夾青涕色因驚候不曾取下驚積至此脊瀝痢時下五色不定不吃奶又名五花閉口痢此五臟積毒孔竅不開藥毒痢所出如魚腦漿本因患痢久而成醫人下藥不對故名藥毒積痢鎖口痢都不下食常引水吃秋後脾虛又名調泄瀉凡治得痢又瀉治得瀉又痢此是大腸滑脾虛熱又名臟中有積毒而成熱毒風毒痢所出痢如青草汁又或如赤豆汁時時自滴瀝出乃脾家受風熱毒而成此般痢十中無一生系惡候上八般痢如見不問色數先用勻氣散方見胃氣不和門中夾醒脾散有二方一方見胃氣不和門中一方見慢脾風門中香連散乳香散調理二日二方並見一切泄瀉門中漸有黃下來時便下褊銀丸一服方見積瀉門中取下痢積三五行再用勻氣散醒脾散調平其氣後常服香連丸方見一切泄瀉門中夾調中飲與服即愈方見胃氣不和門中如見大渴都不進食口內生瘡鼻乾燥肚膨死候不治漢東王先生家寶小兒八痢者皆因八邪而生也或冷熱不勻風熱入臟則為痢也熱痢則赤冷痢則白冷熱相加則雜赤白色食痢則酸臭驚痢則青脾痢則吃食不消化時行痢則有血疳痢則曩瀉不時此是八痢也五開貫真珠囊小兒八般痢候一白膿痢二魚腦痢三五色痢四血瘕痢五水瀉痢六腹肚痢七瘕積痢八赤白痢茅先生小兒八痢不治死候歌痢頻都不食腹脹喘還粗下糞全如墨渾身熱渴俱一切痢第二聖惠夫小兒一切痢者由痢色無定或水穀或膿血或青黃或赤白變雜無常相兼而下也此皆乳哺不調冷熱交互經久則脾胃虛弱連滯不瘥令肌體羸瘦也嬰童寶鑑小兒痢為腸胃中冷熱相擊經絡澀滯而為痢熱多即赤冷多即白也嬰童寶鑑痢疾死候痢頻不食腹脹喘急下糞黑體熱渴惠眼觀證赤白滯痢且以平胃丸方見噦逆門中參苓散方見胃氣不和門中醒脾散吃方見吐利門中三日內痢變黃糞成大糞即量大小肥瘦下鮓湯丸取之方見急慢驚風門中次調氣下參苓散即用痢藥下阿膠散方見赤白痢門中香連丸方見利渴不止門中夾平胃醒脾溫和藥調理或見大渴不進食糞不變下青血汁即謂之傳赤白滯滯經二七日乃鎖口疳痢而死泛常患痢便可以阿膠香連治之亦得若三四分夾糞須用通利如等時時只一點兩點來又治兼併不進食此亦難治嬰童寶鑑小兒諸痢歌小兒痢下有多般不得將來一例看冷痢有時青與白或如丹色赤相干熱侵經絡為鮮血蟲毒為傷下紫肝腸虛日有如膏血渴甚仍知臟腑干脾弱遍身成腫滿熱沖肝膽翳漫漫更有脫肛爭忍視急求名藥便平安玉訣小兒瀉痢積熱候歌小兒瀉痢胃家傷冷熱傳脾損大腸胃氣失和寧化谷邪攻變蟲自非常夫小兒瀉痢先須調氣次服痢藥如是蟲毒須看虛實用藥取之更調胃氣顱囟經治孩子初患諸色痢乃微有疳氣上用枳實不限多少炒令黑拗破看內外相似為散空心米飲下半錢以歲加減服之忌如常葛氏肘後徐王神效方三歲小兒痢或赤白谷冷熱不調上用雞子一枚破其頭如粟米大出黃白於甌中和胡粉如皂莢子大研令極勻調還內殼中糊頭蒸令熟以喂兒取瘥止嬰孺治赤白痢又治膿血痢葛氏肘後療小兒痢方日夜數十行者上用雞子一枚破取白半雞子和釅醋攪如白酒煎如稀餳勿使干干即難咽灌訖勿令吐前後兩度服之稍有效驗千金駐車丸治大冷洞痢腸滑下赤白如魚腦日夜無節度腹痛不可堪忍者方黃連六兩乾薑炮二兩當歸阿膠各三兩上四味末之以大酢入合煬膠和之並手丸如大豆許干之大人飲服三十丸小兒百日以還三丸期年者五丸余以意加減日三服仙人水鑑小兒秋夏痢不止神方乾漆蝦蟆各三分砒霜一分煮黃丹熬蜀葵花遠志黃鹽陶隱居云北海鹽黃草粒粗以作魚鮓及咸花滑石各二分干蚯蚓一條生用上併為末同研令細飯丸如麻子大患深者不過五服以冷水下一丸至二丸仙人水鑑孩子生下一月患乳痢白膠方乳母寒氣浸兒病痢加深仙人有神法先使水林檎湯煮白羊肉充餐力自任乳母一飽食兒病不能臨上取水林檎不計多少捶碎以水煮白羊肉食之兒痢疾立可仙人水鑑治小兒八般痢七寶散方鵓鴿糞二錢取白夜明砂好者槐花硃砂研各一錢白姜白礬各半錢上為末入麝香一字研勻每服一錢水一盞煎四分溫吃忌毒物孫尚藥治丈夫婦人小兒痢方木香一塊方員一寸黃連半兩上件二味水半升同煎乾去黃連只薄切木香焙乾為末三服第一橘皮湯第二陳米飲第三甘草湯調下此乃李景純傳有一婦人久患痢將死夢中觀音授此方服之遂愈陳藏器止小兒痢方上用雞子和蠟作煎餅與小兒食止痢陳藏器治痢方上用生雞子一個連紙一幅有肉烏梅十個取雞子白攤遍連紙日乾折作四重包撮烏梅安尉斗中用白炭火燒煙欲盡取出以盞碗蓋覆候冷研令極細入水銀粉少許和勻如大人患分為二服小兒分三服不拘赤白痢空心井華水調服如覺臟腑微有疏利不須再服貪療小兒大人痢方上用烏賊魚骨炙令火去皮細研成粉粥中調服之良子母祕録治小兒痢方上用林檎子杵取汁服以意多與服瘥孟詵小兒患秋痢方上與蟲棗食良孟詵又方上用醂柿澀下焦健脾胃氣消宿血作餅及糕與小兒食治秋痢又研柿先煮粥欲熟即下柿更三兩沸與小兒飽食並奶母吃亦良圖經止下痢上用黃柿和米粉作禾臭蒸與小兒食之止下痢聖惠治小兒一切痢不瘥腹痛羸瘦不欲飲食當歸散當歸銼微炒阿膠搗碎炒令黃燥黃芩龍骨各三分人參半兩去蘆頭甘草一分炙微赤銼上件藥搗細羅為散每服以粥飲調下半錢日三四服量兒大小加減服之聖惠治小兒一切痢不瘥腹痛多渴人參散方桔梗去蘆頭當歸銼微炒地榆微炙銼各三分人參去蘆頭艾葉微炒黃耆銼各半兩烏梅肉一分微炒龍骨一兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減溫服聖惠治小兒一切痢不瘥脾胃氣弱飲食全少腹脹無力木香散方木香黃連去須微炒桃白皮微炙銼各半兩麝香一錢細研白礬二兩燒令汁盡龍骨三分上件藥搗細羅為散不計時候以粥飲調下半錢量兒大小以意加減聖惠治小兒一切痢不瘥青金散方定粉二兩白朮一分訶黎勒皮一分黃丹白礬灰白龍骨各半兩上件藥搗羅為末用棗一升去核共藥都搜作丸入瓷罐內盛燒令通赤取出細研為散每服以粥飲調下半錢日三四服量兒大小加減服之聖惠治小兒一切痢不瘥黃丹散方黃丹莨菪子黃明膠各半兩青州棗三十枚去核上件藥搗為一團燒令通赤放冷搗細羅為散每服以米飲調下半錢日三四服量兒大小加減服之聖惠治小兒一切痢不瘥日夜度數無常密陀僧散方密陀僧細研定粉黃丹各微炒龍骨各一分上件藥搗細羅為散每服以粥飲調下半錢日三四服量兒大小加減服之聖惠治小兒一切痢不瘥鹿角散方鹿角一兩定粉密陀僧黃丹白礬各半兩上件藥入瓶內燒令通赤放冷取出細研為散每服以粥飲調下半錢日三四服量兒大小加減服之聖惠又方定粉砒霜各一分上件藥同研為末以麵糊和丸如黍米大每服以冷漿水下二丸量兒大小以意加減聖惠治一切痢諸藥無效宜服此方巴豆七枚去皮心油深色燕脂三錢上件藥先研巴豆為末次入燕脂同研令細煮棗肉和丸如黍米大每服以冷粥飲下三丸小兒一丸忌食熱物聖惠治小兒下痢日夜數十行漸至困弱黍米粥方黍米一合雞子一枚黃蠟半兩上煮粥臨熟下雞子蠟攪令勻空服食之嬰孺治小兒實下痢細辛湯方大黃四分細辛一分黃芩甘草炙各三分上以水三升煮八合為三服去五里久再進嬰孺治小兒下痢方龍骨乾薑當歸鹿茸炙附子炮礬石燒各二分黃連七分上為末蜜丸大豆大五丸日三服大效嬰孺治半歲兒滯痢方龍骨乾薑各二分附子一分炮甘草上以水三升煮一升二合頓服半合日三服嬰孺治小兒身羸瘦滯痢已服自下湯罷其痢未斷薤白豉湯方薤白十二莖豉熬湯梔子仁各五合上以水一升煮八合一歲為三服三四歲再服二百日以下為四服一云無豉子嬰孺治少小下痢方人參黃芩甘草炙乾薑各二分上為末蜜丸如小豆大五丸日三服嬰孺治小兒諸痢方上用羊骨燒研為末飲調方寸匕日二服瘥嬰孺又方上用黃連二兩水二升煎二合去滓納犀角末四分再煎取一合更納麝香末一分早午晚各服一雞子許神驗大效嬰孺治小兒痢櫸皮飲子方梁州櫸皮五分桔梗茯苓各八分粟米二合上以水五升四合量兒大小以意加減嬰孺治小兒下痢已服龍骨湯不已宜此女萎丸方女萎黃柏各一兩附子三分炮黃連五分乾薑四分上為末蜜丸大豆大一服十丸日三服夜一稍加至十五丸嬰孺治小兒痢子芩湯方子芩二十分竹葉八合切甘草黃柏各四分女萎知母各六分枳殼八分上以水三升煮一升一歲兒分服惠眼觀證胡黃連丸治痢方胡黃連訶子肉炮稱二錢硃砂一錢半上為末爛飯為丸如此大每服七丸至十丸隨大小甘草薑湯下劉氏家傳小兒痢方上用黃蠟熔以黃丹調赤為度丸緑豆大每服七丸烏梅甘草艾葉煎湯下張氏家傳金匱丹治大人小兒老人産婦應有寒熱臟腑之疾服之神效西京龍門奉天寺主合此藥云是異國神僧傳授硃砂半兩飛研極細黃丹二兩半炒黑色乳香七錢新水研細紙箱於瓦上干之木鱉子大者十枚燒黑色去皮白膠香四錢不雜僞者砒霜硝石各三兩同研瓷合以赤石脂封固口縫再以鹽泥紙筋固濟蔭干用灰火燒通赤候冷取藥其藥如雪玉謂之瓊林玉株此藥中唯此神異過度煉家謂之用砒不用砒之說此是也一料用一兩六錢巴豆揀大者去皮心膜出油杏仁大者去皮尖炒研各七十枚上研極細研以黃蠟一兩三錢熔和為劑要服旋丸以全藥力每服三丸如緑豆大臨臥漿水湯下未效連日服三服必效更著老小虛實加減大小也張氏家傳纏金丹治一切痢下積聚老少不拘並不疏動極有神效一名硃砂膏方辰砂一兩別研極細硇砂明淨無石者一兩別研極細一方用半兩上先取肥者巴豆七十個去皮用黃蠟十棗大同煎焦黃色取出不用巴豆將前藥二味與蠟攪勻放稍冷和成挺子如有患旋丸如大人豌豆大每服二丸溫將水吞下如赤白痢乾薑甘草湯下驟瀉新水下赤痢冷黃連湯下白痢艾湯下皆臨臥服二丸小兒麻子大更看大小臨時加減服之張氏家傳袞金膏利胸膈化痰取虛中有積臍腹急痛裡急後重欲作惡痢及小兒停食發熱糞白鮓臭嘔吐酸水下利積膿穀食不化全不美食止瀉痢方硃砂半兩細研粉霜硫黃硇砂各一錢砒霜硝石各半錢膩粉二錢腦麝各半字上件研細用巴豆半兩黃明者去殼心膜研如面和前藥令極勻黃蠟三分熔和後用重湯內煮三兩丸搜成丸用金箔裹著旋丸小麥大五粒至七粒取積漿水送下化痰薑湯下瀉痢米飲下小兒丸如麻子大每服三五粒莊氏家傳治瀉痢神驗木香丸方黃連一兩去須銼如大豆大吳茱萸一兩同炒令焦黃色去茱萸肉豆蔻二個木香一分上為末蒸餅為丸如梧桐子大用麵糊亦得水瀉赤痢用米飲下二十丸白痢厚朴湯下小兒丸如許大服十丸莊氏家傳如聖丸治大人小兒冷熱瀉痢腹痛米穀不消膿血赤白並療之方乾薑炮槐花炒各一兩宣連半兩去毛上為末麵糊為丸如緑豆大大人三十丸小兒七八丸看歲數加減如常瀉