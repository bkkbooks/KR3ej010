body:
  text: 卷第三十血疾淋痔凡十九門吐血第一巢氏病源小兒吐血候小兒吐血者是有熱氣盛而血虛熱乘於血血性得熱則流散妄行氣逆即血隨氣上故令吐血也錢乙論補下不同云段齋郎子四歲病嗽身熱吐痰數日而咯血醫以桔梗湯及防己丸治之不愈其涎上攻吐喘不止請錢氏下褊銀丸一大服方見痰涎門中復以補肺散補脾散治之方見胃氣不和門中今段氏咯血肺虛何以下之曰肺雖咯血有熱故也久即虛痿今涎上潮而吐當下其涎若使不吐涎為甚便也蓋吐涎能虛又生驚也痰實上攻亦使發搐故依法只宜先下痰後補脾肺必涎止而吐愈若先補其肺為逆先下其痰為順先下後補為良也嬰童寶鑑小兒吐血歌血為榮兮氣為衛二氣相隨無住滯忽然血動氣來沖便是妄行忘本位血隨氣上奔心來吐出如屠爭忍視便須服藥好看承解熱且令依次第千金治小兒吐血方上用燒蛇蛻皮末以乳服之並治重舌千金又方上取油三分酒一分和之分再服簡要濟衆治小兒吐血不止方上蒲黃細研每服半錢用生地黃汁調下量兒大小加減進之簡要濟衆治小兒吐血不止方上用黃連一兩去須搗為散每服一錢水七分入豉二十粒同煎至五分去滓溫服量兒大小加減進之聖惠治小兒四五歲以上非時吐血犀角散方犀角屑梔子仁生熟地黃子芩紫參刺薊各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小加減服之聖惠治小兒吐血不止蒲黃散方蒲黃亂髮灰各一分伏龍肝半兩上件藥同研令勻細不計時候暖生地黃汁調下半錢量兒大小加減服之聖惠治小兒吐血心躁煩悶茜根散方茜根半兩犀角屑川升麻川大黃銼微炒黃芩甘草炙微赤銼以上各一分上件藥搗粗羅為散每服一錢以水一小盞入黑豆三十粒淡竹茹半分煎至六分去滓不計時候量兒大小以意加減溫服聖惠又方刺薊自然汁不限多少上件藥取汁一合暖令溫不計時候調下元明粉半錢量兒大小以意加減聖惠又方上取生地黃汁一合暖令溫調下面塵半錢不計時候量兒大小以意加減溫服聖惠又方上以亂髮燒灰細研每服以溫水調下一字張鋭雞峰方以米飲調下嬰孺治少小咳唾中有血款冬湯方款冬花乾薑阿膠炙各二兩吳茱萸一升桂心五寸艾雞子大鯉魚一條長一尺二寸上研細酒和置魚肚中銅器中蒸熟取汁大人服一升小兒一合以意裁之嬰孺治少小咳逆甚者血出鼻衄豚肺散方上以豚肺好酒浸一宿平旦取炙乾為末一服一撮飲下嬰孺治小兒熱病鼻衄或唾血升麻湯方升麻八分淡竹青皮羚羊角各五分生地黃七分甘草四分芍藥六分上以水三升煮一升一歲兒為三服嬰孺治小兒汁出如漿衄血吐血小便出血垂死者方都梁香乾地各二兩紫菀桂心人參青竹葉蓯蓉各一兩上為末酒服方寸匕日進三服夜一服可至二匕張渙治小兒內有邪熱血流散妄行若氣逆即血隨氣上或口中吐血鼻中衄血紫參散方紫參生乾地黃山梔子各一兩刺薊亂髮各燒灰一分以上搗羅為細末次用蒲黃伏龍肝各細研一分上件都拌勻每服半錢至一錢煎竹茹湯調下張鋭雞峰方治吐血上用伏龍肝末每服二錢水一盞同煎至六分去滓溫服不以時張鋭雞峰方治吐血衄血上用白茅花每服稱一錢水一盞同煎至六分去滓溫服不以時張鋭雞峰又方上用新綿燒灰研細每服一錢旋入少粗香溫酒調下米飲亦可王氏手集青金散治肺嗽喘息有音及熱搏上焦血溢妄行咳唾血出咽嗌疼痛煩渴嘔吐寒熱休歇減食羸瘦方白芨青黛研各半兩上同研勻每服半錢或一錢糯米飲調下嗽血第二王氏手集解肌丸治外搏風邪內挾痰飲寒熱往來煩渴頰赤心忪減食熱在上焦咳嗽有血方防風地骨皮各一分上件燒沙糖為丸每服一丸食後煎紫蘇湯下王氏手集丸參丸治嗽血方阿膠皂兒黃人參各半兩上件膠為細末湯少許煬膠和如雞頭大白湯化下朱氏家傳治咳嗽出血下涎雞清散方鬱金半兩用皂莢漿水一盞或酸菜汁亦得煮乾為度滑石半兩生雄黃半兩醋煮半乾用上為細末每服一字常服薄荷湯調下止嗽螺粉水下嗽血雞子清調下鼻衄第三巢氏病源小兒鼻衄候小兒經脈血氣有熱喜令鼻衄夫血之隨氣循行經脈通遊腑臟若冷熱調和行必依其常度無有壅滯亦不流溢也血性得寒即凝澀結聚得熱即流散妄行小兒熱盛者熱乘於血血隨氣發溢於鼻者謂之鼻衄凡人血虛受熱即血失其常度發溢漫行乃至發於七竅謂之大衄也千金翼脈浮發熱口乾鼻燥能食者即衄嬰童寶鑑小兒心熱肺氣貫血隨熱入肺經為鼻衄惠濟論小兒鼻衄候歌欲衄之候脈弦洪鼻中乾燥響如風氣衝積血停留肺臟腑煩冤邪脈攻數合出紅猶可治更加升鬥命須終明師若欲知調治涼血清胸始有功清胸清肺也葛氏肘後療人少小亟鼻衄小勞輒出方上用桑耳無多少熬令焦搗下篩每衄發輒以杏仁大塞鼻數度即可斷外臺法燒用為丸以內亦得仙人水鑑小兒百日內鼻中出血方葵花一字急吹之白礬水浴更相宜此是鼻風不消藥莫教虛懼奶頭兒外臺古今録驗療小兒鼻衄不止方上以馬矢綿裹塞鼻孔中外臺古今録驗又方上燒發灰為末吹鼻孔中亦佳本草聖惠嬰孺法同甚妙外臺古今録驗又方上單服白馬屎汁三合甚良外臺深師治少小衄血方桂心十八銖亂髮洗燒灰乾薑各六銖上三味搗篩為散服方寸匕日再聖惠治小兒鼻衄或唾血升麻散方川升麻半兩羚羊角屑甘草炙微赤銼黃芩赤芍藥以上各一分上件藥搗粗羅為散每服一錢以水一小盞入淡竹葉七片煎至五分去滓入地黃汁半合更煎一兩沸不計時候量兒大小分減溫服聖惠治小兒鼻衄不止生地黃煎方生地黃刺薊各取汁半斤蜜一合杏仁一兩湯浸去皮尖雙仁麩炒黃別研阿膠半兩搗碎炒令黃燥為末上件藥都入銀鍋中以慢火熬為膏不計時候用新汲水調下一錢量兒大小加減服之聖惠又方刺薊蒲黃各半兩亂髮灰一分上件藥搗細羅為散每服以冷水調下半錢不計時候量兒大小加減服之聖惠治小兒鼻衄不止方亂髮灰半兩伏龍肝一兩上件藥都研令勻不計時候以新汲水調下半錢量兒大小以意加減聖惠又方刺薊汁二合地黃汁一合生薑汁少許上調和令勻徐徐服半合仍將滓塞鼻中即瘥聖惠又方上炒桑耳令焦熟搗細羅為散不計時候以冷水調下半錢亦吹少許於鼻中量兒大小以意加減談氏殊聖方小兒鼻衄數還啼顏色青黃漸改移忽爾發時饒莽躁連忙走起索東西只緣積熱三焦壅凝水川消貝母知更取荷衣煎五合蜜調頓服定無凝凝波散寒水石貝母知母為末各一分半馬牙硝細研川硝亦得各一分荷葉一兩以水一升煮五七沸濾干焙上為末每服半錢蜜水調下茅先生治小兒鼻血出方山梔仁半兩半生半炒陳槐花一分上同為末用熟水調下半錢聖惠方同只槐花微炒梔子不炒張渙抵聖散治不以疾病鼻衄不止方盆硝研亂頭髮燒灰研紅藍花取末各一分上同研勻細以綿纏搵藥塞鼻中張渙槐花散治衄血方槐花一兩炒蒲黃半兩川面薑一分上件搗羅為細末每服半錢新水調下張鋭雞峰方治衄血上每用石榴花末一字許搐鼻內張鋭雞峰又方上每用龍骨末少許吹鼻中惠眼觀證調英散治衄血不止方血餘父母者上者一團用緑竹筍殼一片裹燒過上為末每服半錢或一錢新汲井花水下吉氏家傳黃藥散治小兒鼻衄不止方上黃藥一味為細末每服半錢或一錢井水調下大便血第四聖惠夫小兒大便血者為心主於血脈心臟有熱熱乘於血血性得熱流散妄行不依常度其血流滲於大腸者故令大便血出也千金治大便訖出血方上用鱉頭一枚炙令黃黑末之以飯下五分匕多少量兒大小日三服外臺鱉甲一枚炙末水調千金又方上燒車釭一枚令赤內一升水中分二服千金又方上燒甑蒂末敷乳頭上令兒飲之仙人水鑑小孩子遺血呼為胎風宜使此方人多不識每因上廁犯之至三歲以上解行後有少鮮血宜用此散子方胎腸風最惡日久殺孩兒如後有鮮血宜取一甘梨梨內安琥珀並蜜封燒之宜待交梨碎取研救孩兒上取一顆好梨去心入少許琥珀末並蜜即以麵裹泥球之火中煅一伏時取出去皮研以水調服立效子母祕録治小兒下血上取雌雞翅下血服之聖惠治小兒大便出血體熱黃瘦不欲飲食羚羊角散方羚羊角屑黃耆銼川升麻黃芩甘草炙微赤銼地榆銼以上各一分生乾地黃半兩上件藥搗粗羅為散每服一錢以水一小盞入苦竹茹半分煎至六分去滓不計時候量兒大小分減溫服聖惠治小兒大便出血腹痛黃瘦不欲飲食槐花散方槐花微炒白朮熟乾地黃芎藭以上各半兩黃耆銼木香當歸銼微炒甘草炙微赤銼以上各一分上件藥搗粗羅為散每服一錢以水一小盞煎至六分去滓不計時候量兒大小分減溫服聖惠治小兒大便出血久不止面色痿黃肌體羸瘦或時腹痛不欲飲食卷柏丸方卷柏阿膠搗碎炒令黃燥赤石脂各一兩槐花炒黃牛角䚡炙焦當歸銼炒黃耆銼芎藭各一兩上件藥搗羅為末煉蜜和丸如麻子大三歲兒每服以粥飲下七丸日三服量兒大小以意加減聖惠又方上用鹿角燒灰細研以粥飲調下半錢日三服量兒大小以意增減嬰孺方刮屑米飲服太醫局沒石子丸治小兒腸虛受熱下利鮮血或便赤汁腹痛後重晝夜不止遍數頻多方沒石子地榆各半兩黃連銼炒一兩半黃柏銼碎蜜炒二兩酸石榴皮一兩上件搗羅為細末以醋煮麵糊和丸如麻子大每服十丸至二十丸溫米飲下食前服茅先生治小兒大便下血方枳殼去白麵炒荊芥穗甘草各等分上為末每服一錢用陳米飲調下九籥衛生紫參散療小兒下血痛方臭椿根皮貫衆紫參酸石榴皮燒灰存性各等分上同為細末每服一錢米飲調下腹痛煎艾湯調下孔氏家傳治小兒大腸有血上後有血如痢疾相似但不拘十歲以上皆神效散方芍藥地榆甘草炙陳橘皮黃連乾葛以上各等分上為末每服一錢用陳米飲調下日進三服孔氏家傳治小兒便鮮血槐花散方黃耆一兩當歸槐花白朮人參芍藥各三分上為末米飲下一錢小兒半錢吉氏家傳治瀉血不定是脾胃氣冷大腸風毒宜服此方沒石子一個大者肉豆蔻一個茶末一錢桑根白皮二錢炙上件末不計時候以水如茶點一錢灌服立瘥朱氏家傳小兒熱氣攻大腸其病瀉血臟腑疼痛漸如茶色難治此病是傷寒出汗不盡或因瘡子出不足令熱氣行於大腸所以瀉血如活先解汗後下氣攻大腸散方鬱金一兩乾薑半兩大腹皮一兩半上為末每服半錢陳米飲下小便血第五巢氏病源小兒尿血候血性得寒則凝澀得熱則流散而心主於血小兒心臟有熱乘於血血滲於小腸故尿血也千金治小兒尿血方上燒鵲巢灰井華水服之亦治尿床嬰孺治大便血姚和衆治小兒尿血方上用甘草五分以水六合煎取二合去滓一歲兒一日服令盡姚和衆又方上用蜀升麻五分水五合煎取一合去滓一歲兒一日服盡聖惠治小兒尿血水道中澀痛阿膠散方阿膠一兩搗碎炒令黃燥黃芩梔子仁甘草炙微赤銼車前子各一分上件藥搗細羅為散每服用新汲水調下半錢日三四服量兒大小以意加減聖惠又方榆白皮生乾地黃各半兩甘草一分炙微赤銼上件藥都細銼以水一小盞煎至六分去滓溫服量兒大小以意加減聖惠又方苦楝子一兩鬱金二枚一枚泡一枚生用上件藥搗細羅為散每服煎蔥湯調下半錢量兒大小以意加減聖惠又方生乾地黃黃芩以上各半兩上件藥搗粗羅為散每服