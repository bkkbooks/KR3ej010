之先宿不食以黍米泔濃汁半升下一丸大人服盡五歲兒服其半小兒減藥及泔汁泔汁冷飲熱即發張渙木香桃仁丹方治蛔蟲攻心痛不可忍木香桃仁湯浸去皮尖雙仁麩炒香熟黑狗脊鶴蝨揀淨各一兩檳榔一分苦楝根皮半兩上件搗羅為細末獖豬膽汁和丸黍米大每服十粒點麝香湯下不拘時候萬全又方鶴蝨使君子各一兩上為末每服煎肥豬肉汁調下半錢其蟲便出玉訣蔥湯丸下蛔蟲諸積方水銀白扁豆巴豆霜白附子上各等分末麵糊丸如此大五丸煨薑蔥湯吞下三十六種治蛔蟲咬心痛乾漆丸方乾漆青黛輕粉甘遂各等分上為末麵糊為丸緑豆大每服五丸薄荷湯調下四十八候蛔疳散方使君子一分檳榔一個輕粉一字定粉一錢茴香黃丹苦楝根末炒各半錢上為末每服一錢或二錢臨臥時煎肉汁湯調下須進三二服蟲下再調氣趙氏家傳凡小兒因熱著後吐逆不止或躁渴飲水無度入口即吐至四五日不止雖吐逆稍定或發驚癇或有用手向口探取之狀此蓋蛔蟲攻心所致俗醫不曉此只取止吐治驚藥治之必不驗又蛔蟲三兩日向上攻心吐逆不止五七日皆垂頭向下故令小兒疾病無處可曉皆蛔所作也據此形證當須用安蛔藥治之未驗仍取蛔藥無不愈者小兒或患傷寒不能得汗亦由此蟲所攻仲景所謂蛔厥者是也凡有蛔者眼多有赤脈京師徐助教方安蛔寸金散乾漆一兩半炒煙盡為細末雄黃半兩研上同研勻以新汲水及油一兩滴調下一錢若未驗服取蛔蟲藥吉氏家傳使君子散取小兒蛔蟲方上用使君子不計多少火上炒乾為細末每服半錢大者一錢五更空心飯飲下長沙醫者丁時發傳治小兒蛔蟲㽱刺心腹疼痛方上用石榴皮一兩以水一大盞煎四分去滓分作二服長沙醫者丁時發傳治蛔疳方孩兒蛔咬痛攢心忽發來時面帶青唇黑兒如灰土色使君四味可通靈使君子散使君子七個輕粉蕪荑鶴蝨各半錢上件為末每服半錢五更米飲調下長沙醫者鄭愈傳治小兒蛔蟲攻腹痛無時嘔逆涎沫取蟲散方使君子肉東引石榴根皮鶴蝨各二錢輕粉半錢上為末每服一錢或半錢煮雞肉汁下五更早兩服蟯蟲第三巢氏病源小兒蟯蟲候蟯蟲者九蟲之內一蟲也形甚細小如今之瘑蟲狀亦因腑臟虛弱而致發甚者則成痔屢瘑疥也聖惠治小兒蟯蟲方上用煉了臘月豬脂每日空心取如皂莢子大服之甚良聖惠又方上以槐實末每用少許內下部中聖惠又方上以苦楝實末每用少許內下部中聖惠治小兒蟯蟲下部中癢大棗膏方蒸大棗二枚取肉水銀半分上件藥都研令水銀星盡捻為挺子長一寸以綿裹宿內下部中明旦蟲出為效聖惠治小兒蟯蟲蝕下部胡粉散方胡粉雄黃各一分上件藥都研令細每用少許敷於下部中聖惠又方上用杏仁一兩湯浸去皮尖雙仁麩炒微黃研如膏以綿裹棗核大內下部中甚者不過三度瘥聖惠又方槐根白皮銼桃仁湯浸去皮雙仁生研苦楝子各一兩上件藥搗羅為末以豬膏和丸如棗核大內下部中更以蔥白兩莖去須水煮濃汁溫飲半合聖惠治蟯蟲芫花散方巴豆一枚去皮膜研壓出油桃仁四枚湯浸去皮尖雙仁生用上件藥都研令爛丸如緑豆大大人平旦以溫漿水下二丸小兒服一丸若不下再服之嬰孺治小兒蟯蟲狀如瘑蟲令人下部中癢方上用萹竹一把以水三升煮熟去滓溫先食小兒服五合立下宿食不消服亦佳嬰孺治小兒蟯蟲方茱萸根揀南行者大拇指大刮去黑皮用白皮桃白皮三兩上以酒浸一宿絞去滓先食頓服盡不能頓服為二服一方桃根白皮四兩張渙胡粉丹方治小兒蟯蟲發動甚者成痔瘻瘑疥青州大棗五十個蒸熟取肉水銀二味同研勻細次用雄黃各半兩水磨飛研胡粉一兩上件與水銀一處拌勻用棗肉和丸黍米大每服十粒用苦楝根煎湯下量兒大小加減寸白蟲第四巢氏病源小兒寸白候寸白者九蟲內之一蟲也長一寸而色白形小扁因腑臟虛弱而能發動或云飲白酒一云以桑株枝貫串牛肉炙並食生粟所作或云食生魚後即食乳酪亦令生之其發動則損人精氣腰腳疼弱又云此蟲生長一尺則令人死者聖惠夫小兒寸白者多因甘肥不節生冷過度之所致也其蟲發動傷人臟腑飲食不成肌膚子母相生無有休止若蟲長一尺則能害人也千金治寸白蟲方上用東行石榴根一把水一升煮取三合分服千金又方上用桃葉搗絞取汁服之聖惠治小兒寸白蟲連年不除面無顏色體瘦少力青黛散方青黛鶴蝨各一分檳榔一枚苦楝根一兩微炙銼上件藥搗細羅為散每服時先吃淡肉脯少許後以粥飲調下半錢量兒大小加減服之日二三服聖惠又方硃砂麝香各一錢苦楝子肉一兩糯米拌炒以米熟為度上件藥都研令細以水浸蒸餅和丸如芥子大每於空腹春夏冷水秋冬熱水下七丸量兒大小加減服之聖惠治小兒寸白蟲久不愈檳榔散方檳榔二枚為末豬牙皂角三枚燒苦楝子五枚為末上件藥同研為散每服空心煎苦楝根白皮湯調下半錢三兩服後蟲皆自下量兒大小加減服之聖惠又方鶴蝨雷丸使君子各三分巴豆十枚去皮心研紙裹壓去油上件藥搗羅為末以糯米飯和丸如緑豆大每服以砂糖水下三丸量兒大小加減服之張渙碧金散方治小兒大便蟲下及生寸白蟲苦楝根一兩微炙銼豬牙皂角三挺燒灰鶴蝨檳榔使君子仁各半兩搗羅為細末次用好青黛半兩細研麝香一分細研上件同拌勻每服一字煎淡豬肉湯下不拘時候張氏家傳治大人小兒腹中生蟲名寸白蟲如葫蘆子大令人瘦悴久而不可者方密陀僧一錢細研輕粉少許上每早晨未吃飲食且令稍飢然後用生油調猛吃三兩口候一兩時辰蟲母取下可長數尺永除根本長沙醫者丁時發傳治小兒寸白蟲久不瘥檳榔丸方檳榔二枚為末豬牙皂角三條燒苦楝子五個為末石榴根一握二七莖燒一碗上件為末每服半錢苦楝根白皮湯調下三兩服取蟲大小加減㿗疝第五巢氏病源小兒病㿗候㿗者陰核氣結腫大也小兒患此者多因啼怒躽氣不止動於陰氣陰氣下擊結聚不散所成也嬰童寶鑑小兒疝氣陰囊大為腎久冷攻於膀胱下入小腹結聚不行流於陰中故陰囊腫也小方脈論小兒疝氣四等一盤疝氣其病元帶白色臥間奔臍下坐時卻在腹如作天色先喘粗後臍下疼痛名疝氣也二瘕氣其患似雞子形中間粗兩頭尖碧色如作天氣先困後喘粗臍下疼痛瘕氣漸作聲名瘕氣也三偏氣一偏腫無頭如作天色先無力後臍下痛四小腸氣其病元緊實不去如發天色臍下痛此病皆因母月內啼泣閉小腸氣嬰童寶鑑小兒陰疝歌陰疝因何得邪風在腎經傳流因血聚如此漸成形玉訣小兒胎積疝氣候歌小兒疝氣每因啼胎積膀胱不散之偏者氣傷或左右結實年深不可醫此患先下小腸積熱調膀胱氣順即妙石壁經三十六種內疝氣候歌此病從來有兩般夜啼胎疝在詳觀要知胎氣生紅脈啼哭黃昏青脈連中指只看交脈處須識伊家病本源一枚搐上宜先理兩個雙提妙藥難治此當行心氣利小腸去膀胱毒熱其有如李者亦有稀軟者亦有並腎大者亦有木硬者其楚痛不可忍只以證知鳳髓經歌括同有注云夜啼與睡紅散方見夜啼門吉氏方同疝氣與勝金丸方見偏㿗門吉氏方同小兒形證論四十八候疝氣多啼候歌腎腫為疝小兒疝氣有多般日夜啼聲意不歡或有胎中毒氣在傷寒一種亦難安請看指內相連處識得醫家病本源一脈紅時須急整莫教雙脈恐難痊此候多因啼哭得冷氣衝膀胱為疝氣又傷寒與胎氣衝下者但手中心個指面上有紅筋一條者是疝氣兩條者是驚氣驚氣宜蛜𧌴丸方見一切癇門中疝氣服抽抱散方見本門惠濟歌小兒疝候歌與勝金丸方見偏㿗門吉氏方同氣積膀胱入腎囊疝㿗兩腫各分張喜怒嘔啼因滯氣驚撥兒眠氣亦傷幸有小腸通水氣莫教虛損病難將更有一般胎氣病人言獨腎不成雙顱囟經治孩子陰囊或疝腫脹青木香散方狐陰一雙炙蒺藜炒地膚子昆布枳殼炒槐子炒各一分上為末一歲二歲空心米飲下一錢金匱要略卒疝走馬湯主之方巴豆去皮心熬杏仁去皮尖各二枚上二味取綿纏捶令碎熱湯二合捻取白汁飲之當下老小量之葛氏肘後徐王神效方小兒腹痛大汗出名曰寒疝上濃煮梨葉汁一服七合以意消息可作三四度飲之良千金治小兒卵腫方上取雞翅六莖燒作灰服之隨卵左右取翮古今録驗云治陰大如斗聖惠嬰孺通治偏㿗陰腫千金治小兒㿗方上用蜥蜴一枚燒末酒服之千金治小兒氣㿗方土瓜根芍藥當歸上三味各一兩㕮咀以水二升煎取一升服五合日二千金治小兒核腫壯熱有實方甘遂青木香石膏各十八銖麝香三銖大黃前胡各一兩黃芩半兩甘草炙十八銖千金翼用半兩上八味㕮咀以水七升煮取一升九合每服三合日四夜二千金治小兒狐疝傷損生㿗方桂心十八銖地膚子二兩半白朮炮一兩十八銖千金翼用一兩一分上三味末之以蜜和丸白酒服如小豆七丸日三亦治大人聖惠作散酒服半錢千金又方芍藥茯苓各十八銖防葵一作防風大黃各半兩半夏桂心蜀椒研各六銖上七味末之蜜和服如大豆一丸日五服可加至三丸千金翼方同有乾薑一分嬰孺以胡椒代蜀椒仙人水鑑小兒患小腹氣疾方凍青葉一握防葵子漢防己雄黃緑豆各一分豬牙皂角一挺水蛭三個末石衣水下者當門子五個黃鹽六分陶隱居云北海黃鹽草粒粗以作魚鮓及咸菹上並搗研為散蜜丸麻子大煎小豆湯下三丸至十丸瘥外臺肘後療超躍舉重卒得陰㿗方狐陰一具炙海藻牡丹各三分桂心二分上四味搗篩為散蜜和為丸如梧子大小兒服五丸大人增之忌胡荽生蔥外臺古今録驗療小兒陰㿗方狐陰一具炙飛生蟲十四枚桂心附子炮乾薑蒺藜硝石一作滑石細辛各二分卷柏桃仁去尖熬各六分上十味搗散蜜丸大豆許以飲下五丸至七丸再服瘥止圖經主小兒差㿗方差㿗核大小也上取杜父魚擘開口咬之七下聖惠治小兒陰㿗腫硬或時疼悶薏苡仁散方薏苡仁赤芍藥土瓜根黃芩蛇床子地膚子桔梗去蘆頭各三分上件藥搗細羅為散一二歲每服空心以溫酒調下半錢日午晚後再服量兒大小以意加減聖惠治小兒陰㿗衆藥未效魁蛤散方魁蛤三分細研狗陰一具炙令黃白朮半兩桂心一分上件藥搗細羅為散一二歲兒每於空心以粥飲調下半錢晚後再服酒下更量兒大小以意增減聖惠治小兒陰㿗不消白蒺藜散方白蒺藜微炒去刺香豉微炒各半兩鼠婦蟅蟲微炙川大黃銼微炒桂心細辛各一分上件藥搗細羅為散一二歲兒每服以溫酒調下半錢早晨晚後各一服量兒大小以意加減聖惠治小兒陰㿗腫脹木香散方木香白蒺藜微炒去刺地膚子昆布洗去鹹味枳殼麩炒微黃去瓤槐子各一分狐陰一具用斷炙令焦黃上件藥搗細羅為散一二歲兒空心以粥飲調下半錢晚後再服量兒大小以意加減聖惠治小兒陰㿗日夜疼痛桃仁丸方桃仁三分湯浸去皮尖雙仁微炒川大黃銼微炒赤芍藥防葵赤茯苓各半兩半夏湯浸七遍去滑桂心川椒去目及閉口者微炒去汗各一分上件藥搗羅為末煉蜜和丸如緑豆大三歲兒每於食前以溫酒下五丸看兒大小以意加減聖惠治小兒陰㿗腫大不消方上用硼砂一分以水研化塗之立效談氏殊聖方小兒疝氣胎中積漸大深疑救療難往往卻成腎疳病遍身瘦弱不堪觀求取珍珠並石燕自然銅共續隨研蝸牛青黛滑石等膠清和作黍黃元冷茴香湯下三粒一朝兩服心安痊青金丹珍珠末二分石燕末自然銅末青黛滑石各三錢續隨子二百粒去皮研末用之蝸