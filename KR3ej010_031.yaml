body:
  text: 卷第三十一三蟲㿗疝凡九門蟲動第一巢氏病源小兒三蟲候三蟲者是長蟲赤蟲蟯蟲為三蟲也猶是九蟲之數也長蟲蛔蟲也長一尺動則吐清水而心痛貫心即死赤蟲狀如生肉動則腸鳴蟯蟲至細微形如菜蟲也居胴腸間多則為痔劇則為癩因人瘡處以生諸癰疽癬瘻瘑疥齲蝨無所不為此即九蟲之內三者而今則別立名嘗以其三種偏發動成病故謂之三蟲也外臺肘後三蟲者謂長蟲赤蟲蟯蟲也乃有九種而蟯蟲及寸白人多病之寸白從食牛肉飲白酒所成相連一尺則殺人服藥下之須結里潰然出盡乃佳若斷者相生未已更宜速除之蟯蟲多是小兒患之大人亦有其病令人心痛清朝口吐汁煩躁則是也其餘各種種不利人人胃中無不有者宜服藥以除之錢乙論蟲痛面㿠白心腹痛口中吐沫及清水出發痛有時安蟲散主之方見本門中小兒本怯者多此病積痛食痛虛痛大同小異惟蟲痛者當口淡而沫自出治之隨其證錢乙論蟲與癇相似小兒本怯故胃虛冷則蟲動而心痛與癇略相似但目不斜手不搐也安蟲散主之方見本門錢乙論蟲痛訣死云辛氏女年五歲病蟲痛諸醫以巴漆硇砂之屬治之不效至五日外多哭而俯仰臥不安自按心腹時大叫面無正色或青或黃或白或黑目無光而慢唇白吐沫至六日胸高而臥不安錢詳而視之用蕪荑散三服見目不除青色大驚曰此病大困若更加瀉則為逆至次日錢見辛日夜來三更而瀉錢於瀉盆中看如藥汁以扙攪之見有藥丸錢曰此子肌厚當氣實今證反虛不可治也何以然師曰脾虛胃冷則蟲動今反目青此肝乘脾又脾加瀉知其氣極虛也而丸藥隨糞下即脾胃已脫兼形病不相應故知死病後五日昏篤七日而死張渙謹按小兒胃氣久不和自須蟲動不安令兒腹中痛甚者往來上下痛有休止狀若風候六七歲以外不因吐利而作者多是食甘肥物等而作若攻心即致夭折亦非小疾切宜慎之千金治小兒三蟲方雷丸芎藭上二味各等分為末服一錢匕日二千金治肝勞生長蟲在肝為病恐畏不安眼中赤方雞子五枚去黃乾漆四兩蠟吳茱萸東行根皮各三兩粳米粉半斤上五味搗茱萸皮為末和藥銅器中煎可丸如小豆大宿勿食旦飲服一百丸小兒五十丸蟲當爛出集驗方無茱萸根名雞子丸外臺古今録驗療長蟲雞子丸方雞子白三枚乾漆四兩熬一本無蠟三兩粳米粉半斤上四味內銅器中於微火上煎攪令稠內粉令凝可丸下置土上才溫及內雞子攪令相得又煎令可丸宿勿食以飲下小豆許大一百二十丸小兒五十丸效驗外臺肘後療三蟲方茱萸根取東行指大者長一尺栝萎四兩切上二味細銼茱萸根以酒一升漬之一宿旦絞去滓宿勿食旦空腹先吃脯然後頓服之小兒分再三服亦療寸白蟲外臺範汪療三蟲白蘞丸方白蘞狼牙雚蘆桃花貫衆各三分橘皮二分蕪荑一分上七味搗篩蜜丸如小豆大宿勿食旦以漿水服一劑日中乃食立下一男子病大腹面黃欲食肉服此藥下赤蟲如筍莖一尺已有頭目百餘枚病愈又九江謝丘病脅下有積大如杯少腹亦堅伏痛上下移嘔逆喜唾心下常痛欲食肉服此藥下蟲無頭足赤身有口尾二百餘枚得愈又九江陳公病大腹煩滿常欲食生菜服此藥下白蟲大如臂小者百餘枚立瘥妊身婦人不得服之圖經主小兒無辜癧子寒熱大腹殺蟲上用苦耽苗子煮汁服亦生搗絞汁服亦研敷小兒閃癖生故墟牆塹間高二三尺子作角如撮口袋中有子如珠熟則赤色談氏殊聖方小兒心悶氣頻粗喘息唇焦四體虛乳食朝朝饒嘔吐連脾脹滿甚崎嶇大都脾胃蟲多擾頭熱時時面似朱輕粉大黃寒水石水銀調吃永消除育神散大黃末馬牙硝水銀各一分膩粉半分寒水石二分研上件研令水銀星盡每服一字熱水調下一歲以下半錢談氏殊聖方小兒蟲咬痛攢心晝夜連聲忍不禁龍象胡連熊膽汁當門子入勝千金牛黃生米汁為使頻服三字蟲不浸六味若能丸一處小兒得吃免疴沉勝丸子一名勝金丸胡黃連末半錢蘆薈腦麝各一字牛黃半字四味並研上為末以熊膽和丸如豆大每服三五丸生米泔汁研下忌一切毒物談氏殊聖小兒九蟲或蟲咬心痛口吐清水面色青黃手足逆冷或吐利下蟲及蟲蝕下部生疳𧈟瘡或五痔勝金散方黑狗脊去毛白蕪荑去輪皮各一兩上為末每服一錢煎淡肉湯調下食前如下部生瘡痔以生油調塗瘡上甚效茅先生小兒取疳蟲檳榔散方檳榔雷丸湯浸去皮使君子肉畫粉各半兩膩粉一分上件為末每用一錢匕炙牛肉摻吃不久即便取下蟲來嬰孺治九蟲貫衆丸方貫衆五分炒雚蘆十二分炒狼牙子蕪荑炒各四分石蠶雷丸蜀漆殭蠶厚朴炙各三分上為末蜜丸梧子大夜臥晨起以苦酒漿服七丸日進三服以知為度此方貫衆主白蟲殭蠶主弱蟲雚蘆主長蟲狼牙子主胃蟲蕪荑主肉蟲石蠶主蛔蟲雷丸主赤蟲蜀漆主肉蟲厚朴主肺蟲夫九蟲一曰伏蟲廣一寸長四寸二曰長蟲名蛔蟲長一尺貫心害人三曰白蟲長一寸四曰肉蟲如爛杏令人煩滿五曰肺蟲如蠶形令人咳逆六曰胃蟲如蝦蟆令人嘔逆吐七曰弱蟲如瓜瓣令人多唾煩滿八曰赤蟲狀如生肉令人腹中鳴九曰蟯蟲狀如瘑蟲令人下部癢悉主之纍試大驗錢乙安蟲散方胡粉炒黃檳榔川楝子去皮核稱鶴蝨炒黃各二兩白礬一分鐵器內火上熬枯稱上件為細末每服一字大者半錢溫米飲調下痛時服博濟名鶴蝨散方錢乙安蟲丸治上中二焦虛或胃寒蟲動及痛又名苦楝丸方乾漆三分杵碎炒煙出盡雄黃一分巴豆霜一錢上為細末麵糊丸黍米大看兒大小與服取棗引石榴根煎湯下痛者煎苦楝根湯下或蕪荑湯下五七丸至三二十丸發時服錢乙又方蕪荑散白蕪荑去扇稱乾漆炒各等分上為細末每服一字半錢或一錢米飲調下發時服古方杜壬養生必用方同杜亦治胃寒蟲上錢乙附方治小兒蟲咬心痛欲絶五靈脂末二錢匕白礬半錢水飛上同研每服一二錢水一盞煎至五分溫服無時當吐出蟲張渙黃金散方專治吐利後蟲動乾漆一兩白蕪荑半兩肉豆蔻半兩以上搗羅為細末次用水磨精明雄黃三分細研上件都研令極細拌勻每服半錢煎蔥白湯入生油一點同調下須調令勻熟藥冷即再溫動乳煎張渙黑金散每於蟲煩以前服之得眠睡為驗乾漆二兩肉桂一兩草豆蔻石榴根水磨精明雄黃各半兩上件於瓦器中燒存性搗羅為細末乳鉢內研極細每服一字至半錢研入麝香少許煎粟米飲調下量兒大小加減張渙補胃膏治有蟲心腹痛甚不可忍者高良薑微炮肉桂刮去皮各一兩肉豆蔻乾漆燒存性烏梅肉炒乾各半兩上件搗羅為細末煉蜜和丸如雞頭大每服一粒至二粒米飲化下乳食前張渙烏梅丹久痢蟲動及傷寒蛔厥並宜服之烏梅肉一百枚炒焦川黃連三兩當歸洗焙乾乾薑各二兩附子炮製去皮臍細辛桂心去皮人參去蘆頭蜀椒揀去閉目雙仁者炒香熟出汗黃柏各一兩上件搗羅為細末煉蜜和於石臼中搗一二百下如黍米大每服十粒米飲下量兒大小加減張渙化蟲丹方治五六歲以上小兒食甘肥過多蟲動鶴蝨揀淨檳榔苦楝根各一兩以上搗羅為細末次入胡粉細研白礬飛過各半兩上件都為細末拌勻用白麵糊和丸如黍米大每服十粒以溫漿水入生油一兩點同下不拘時候太醫局化蟲丸方同仍云小兒疾病多有諸蟲或因腑臟虛弱而動或因食甘肥而動其動則腹中疼痛發作結聚往來上下痛無休止亦攻心痛叫哭閣眼仰身撲手心神悶亂嘔噦涎沫或吐清水四肢羸困面色青黃飲食雖進不生肌膚或寒或熱沉沉默默不的知病之去處其蟲不療則子母相生無有休止長一尺則能害人張渙香雷散治蟲動啼叫不止雷丸鶴蝨苦楝根淡蕪荑各半兩上件搗羅為細末每服一字半錢用生精豬肉淡湯調下不拘時候張渙奪命丹方治小兒蟲動不止攻心危困狼牙草萹竹苦參各一兩雷丸鶴蝨薏苡仁各半兩上件搗羅為細末糯米飯和丸如黍米大每服十粒取生地黃汁下量兒大小加減張渙穀精丹方治諸病下蟲如絲髮或如馬尾甚者便至夭傷穀精草三兩入瓶子內鹽泥固濟慢火煨通赤為度取出為末瓜蒂胡黃連母丁香各半兩末皂莢三寸燒灰末乾蟾三枚五月五日取者用酥炙黃末蘆薈研粉霜麝香各細研一分上件都拌勻用豬膽汁和如黍米大每服十粒溫米泔下量兒大小加減劉氏家傳治驚風疳蟲方蟾酥杏仁青黛胡黃連蘆薈坯子胭脂無油者各半兩麝香一分瓜蒂七個天竺黃一字上末之獖豬膽丸小豆大驚風疳蟲一歲一丸五歲五丸奶汁下莊氏家傳治蟲動叫哭不已一服見效七聖散方筒子乾漆杵碎炒煙盡五靈脂等分上為末每服一錢半水八分連根蔥七莖煎至六分去滓溫服量兒大小加減莊氏家傳小兒腹痛額上有汗即有蟲方上用使君子二十個並殼搗水煎作飲子去滓溫服莊氏家傳治小兒退黃去塊殺蟲斧磓膏方緑礬一斤膽礬半兩京三稜二兩硇砂一兩上件藥各搗為末用銅石器內入好醋看多少與上件藥一處熬令醋盡後用棗瓤亦看多少入藥內以斧於淨石上塗油少許捶令可丸得所乃成膏每服緑豆大旋圓一丸溫米飲下不計時候日三服孔氏家傳小兒疳痢久服藥不效或渴者是蟲證宜蕪荑散方白蕪荑半兩乾漆一兩油炒雄黃一分上入油一二點水調下入麝香少許孔氏家傳小兒殺蟲定痛抵聖散方苦楝肉二兩白蕪荑半兩上為末水一盞末一錢煎服二分放冷待發時服之趙氏家傳碧散子治療一切蟲動方上用緑礬為末每服一剜耳子濃煎豬肉湯下趙氏家傳醫工李賓治一小兒忽患昏塞不省人事叫喚身向上踴素問謂之蟲厥蓋胃寒則蟲結聚而上搶心方麝香木香各一錢上為末分兩服暖酒服之一服稍定再服遂醒更兩服平愈謂麝香安蟲去穢木香溫胃故也吉氏家傳取蟲檳榔散方檳榔使君子膩粉上件等分為末肉汁調下量虛實多少用之長沙醫者丁時發傳治小兒諸蟲化蟲者蕪荑鶴蝨各一分炒檳榔一枚重二錢上件為末豬膽為丸每服七粒至十粒陳米飲下大小加減長沙醫者鄭愈傳治小兒諸般蟲蘆薈丸方蘆薈二錢輕粉五合硫黃末一錢密陀僧一兩金色者丁香三錢半上用水一碗同於銀石器內煮乾為度只取密陀僧碾為末如惡瘦先用炙肉少許後用藥一字或二字使飯飲湯下如下黑糞是蟲化也蛔蟲第二巢氏病源小兒蛔蟲候蛔蟲者九蟲內之一蟲也長一尺亦有長五六寸者或因腑臟虛弱而動或因食甘肥而動其動則腹中痛發作腫聚行來上下痛有休止亦攻心痛口喜吐涎及清水貫傷心者則死診其脈腹中痛其脈法當沉若弦今反脈洪而大則是蛔也嬰童寶鑑小兒蛔痛為未五歲時食雞肉而變為蟲蟲咬心而痛也來去不定故發歇也石壁經三十六種內蛔蟲咬心痛候歌只為從前吃食粗蟲生脾內瘦肌膚愛甜怕苦鳳髓經云怕食多生痛痛便高聲病不除形容但看人中上從鼻並唇口亦烏乾漆去蟲兼定痛蛔蟲盡取痛皆無此因脾熱食物太粗是以物在脾內停久不能化感人血氣而化作蟲其有數種形類不一有如馬尾者有如叉條者有如瓜子者治當調氣血去積毒生肌肉也次當去其蟲定痛行經脈安五臟鳳髓經歌括一同有注云宜與使君子散取蟲方見本門吉氏家傳方同小兒形證論四十八候蛔蟲咬心痛候歌一同後云此候與正蛔蟲候吊病盤腸脾氣病四候皆相切磋只人中黑色便是蛔候先調氣正後取下蟲又調氣用調胃散方見積熱門中取蟲用蛔疳散方見本門顱囟經治孩子蛔蟲咬心痛面伏地臥口吐清痰涎方檳榔苦楝根鶴蝨炒各