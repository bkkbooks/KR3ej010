聖惠治小兒偏墜或氣攻小腹疼痛蘹香子丸方蘹香子微炒搗為末古文錢青研硇砂細研各一分桃仁四十九枚湯浸去皮尖雙仁生研上件藥都研令勻以湯浸蒸餅和丸如麻子大二三歲兒每服以橘皮湯下一丸聖惠又方蛇床子末半兩馬鞭草汁一合上件藥相和如膏塗兒陰腫處效聖惠又方上用枳殼三兩微炒搗細羅為散每用柏枝煎濃汁調厚塗兒偏腫處妙嬰孺治少小偏㿗狗莖散方狗莖一具燒白朮三分豬苓二分桂心一分上為末米飲汁若酒服一刀圭日再灸其對㿗足大指毛上各二壯嬰孺又方上以蜘蛛一個燒灰作末飲服之愈張渙治小兒疝疾偏墜海蛤散方海蛤細研蘹香子炒香熟各三分薏苡仁白朮檳榔麵裹炮各半兩上件藥搗羅為細散每服半錢以溫酒調下早晚乳食前量兒大小加減張渙妙香丹方治疝氣偏墜薰陸香青木香昆布洗去鹹味各三分藿香葉牽牛子炒各半兩上件藥搗羅為細末用棗肉和如麻子大每服十粒空心以牡蠣湯下量兒大小加減九籥衛生療小兒㿗偏大氣脹方雄黃一兩研甘草一錢細銼上同煎湯淋泄劉氏家傳小兒外腎偏墜熏洗法上用皂角一寸煨去黑皮並子以盞載燒煙燻又槐葉五兩水二升煎就一升溫日一熏洗吉氏家傳勝金丸治小兒疝氣偏墜方川楝子去核取肉續隨子肉七十個去皮輕粉一錢上為末稀麵糊為丸如此大每服七丸至十丸蔥白薄荷湯吞下聖惠灸法小兒胎疝卵偏重者灸囊後縫十字紋當上三壯不三月較炷如小麥大陰腫第七巢氏病源小兒陰腫候足少陰為腎之經其氣下通於陰小兒有少陰之經虛而受風邪者邪氣衝於陰與血氣相搏結則陰腫也千金治小兒陰腫方上用狐莖炙搗末酒服之千金又方上搗蕪菁敷上外臺搗蕪菁菜葉根敷之嬰孺杵蕪菁子敷之千金又方上用豬屎五升水煮沸布裹安腫上千金又方上搗垣衣敷之千金又方上以衣中白魚敷之千金又方上桑株白汁塗之聖惠治小兒小腸虛冷因多啼氣下致令陰腫桃仁丸方桃仁湯浸去皮尖雙仁麩炒微黃白蒺藜微炒去刺郁李仁湯浸去皮微炒各三分黃柏一分微炙銼牡丹桂心各半兩上件藥搗羅為末煉蜜和丸如緑豆大三歲兒每於食前以溫酒下七丸量兒大小以意加減聖惠治小兒陰腫壯熱甘遂丸方甘遂煨令微黃麝香細研各一分川大黃銼微炒木香各一兩前胡二兩去蘆頭黃芩半兩上件藥搗羅為末煉蜜和丸如緑豆大三歲兒每於食前以溫水下三丸量兒大小以意加減聖惠治小兒陰腫為腸虛冷多啼躽氣下所為宜服牡丹丸方牡丹皮桂心郁李仁湯浸去皮微炒各半兩桃仁一分湯浸去皮尖雙仁麩炒微黃上件藥搗羅為末煉蜜為丸如麻子大一二歲兒每服以溫水下五丸早晨晚後各一服量兒大小以意加減聖惠治小兒陰腫大黃散方木通銼羌活川大黃銼炒各一分桑根白皮半兩銼川朴硝三分上件藥搗粗羅為散一二歲兒每服一錢以水一小盞煎至五分去滓量兒大小分減溫服聖惠治小兒卒陰囊腫癢蛇床仁湯尉方蛇床仁柳蟲仲屑各一兩上件藥以水一大碗煎六七沸洗之取其滓以帛裹尉兒腫處妙聖惠治小兒陰卒腫痛脹牛蒡膏方生牛蒡汁二大盞煎令如膏赤小豆末半兩肉桂末一分上件藥相和如膏塗兒腫處立消聖惠又方上取蔓菁子末以豬脂調塗之聖惠又方上以莧菜根搗汁頻頻塗之聖惠又方上以馬鞭草爛搗裹之日二易之聖惠又方上用桃仁湯浸去皮尖雙仁麩炒微黃搗研如膏三歲兒以溫酒化豇豆大服之日三服量兒大小以意加減茅先生小兒陰莖赤腫方大黃赤小豆上等分為末用雞子清調塗之嬰孺治陰卒腫痛如刺汗出方小蒜韭楊柳根各一斤上合燒以酒灌之及熱以氣蒸之瘥錢乙附方治小兒外腎腫硬成疝上用干蚯蚓為細末唾調塗常避風冷濕地張渙治小兒足少陰之經虛而受風邪者衝於下經則成陰腫桃仁丹方桃仁三分湯浸去皮尖雙仁麩炒微黃郁李仁一分湯浸去皮微炒牡丹白蒺藜微炒去刺桂心各半兩上件搗羅為細末煉蜜和丸如黍米大每服十粒以溫酒下乳食前量兒大小加減張渙胡連散方治陰腫生瘡胡黃連去須胡粉各半兩白礬灰一分上件搗羅為細末每用少許以生油調塗患處吉氏家傳疝氣外腎大莖腫方牡丹皮肉桂豉心熬鐵粉等分上件為末煉蜜丸如緑豆大空心溫酒下二十丸小兒乳汁下三五丸朱氏家傳治小兒外腎腫赤脹痛如聖丸方上石燕子二個細研末米醋調成膏子塗在腎上長沙醫者丁時發傳治小兒陰腫壯熱甘遂丸方甘遂煨令黃麝香各一分木香川大黃各一兩炒前胡二兩子芩半兩上件為末煉蜜為丸如緑豆大三歲一丸於溫水下量大小加減長沙醫者丁時發傳治小兒外腎赤腫吊痛方上用江中水螺殼細研為粉冷水調拂於腫處長沙醫者丁時發傳白丁香散治小兒外腎浮腫吊痛方上白丁香半合用道人頭三十枚同白丁香合子取霜子半錢小兒一字蔥五寸同藥紙裹定酒浸火內煨香熟細嚼時時服葛氏肘後灸法小兒陰疝發時腫痛隨左右灸足大指第二節下橫紋理正中央五壯佳姚云足大指本三壯聖惠灸法陰腫灸內崑崙各三壯在內踝後五分筋骨間陷中炷如小麥大又灸大敦七壯陰瘡第八巢氏病源小兒陰腫成瘡候小兒下焦熱熱氣衝陰陰頭忽腫合不得小便乃至生瘡俗云尿灰火所為也千金治小兒陰瘡方上取狼牙濃煮汁洗之千金又方黃連胡粉等分上以香脂油和敷之千金治小兒陰瘡方上以人屎灰敷之又狗屎灰敷之又狗骨灰敷之又馬骨末敷之聖惠燒馬骨灰敷千金治小兒岐股間連陰囊生瘡汁出先癢後痛十日五日自瘥一月或半月復發連年不瘥者方上灸瘡搔去痂帛拭令乾以蜜敷更搜面作燒餅熟即以錫塗餅上尉之冷即止再度瘥外臺備急治陰瘡方上用貓兒骨燒作灰敷之即瘥千金云狗骨灰敷之聖惠治陰瘡方白礬灰胡粉炒各一分上件藥同研令勻細用槐枝煎汁調塗兒陰囊上聖惠又方上以狐陰莖炙微黃搗羅為末以水調敷之聖惠又方上取蔓菁根搗研敷之聖惠又方上以雄雀糞以陳醬汁和敷之茅先生治小兒陰莖生瘡方地龍燒灰黃柏為末各半兩輕粉重一錢上為末乾摻於莖上瘡處嬰孺治小兒核腫壯熱腹中有實方大黃前胡各五分黃芩甘草炙青木香石膏研綿包各三分甘遂二分麝香一分別研上以水七升煮一升九合一服三合日四夜再湯成入麝香末吊起外腎第九茅先生小兒於六十日內連哭至一百日不止者此驚疝之候是以哭而吊起外腎遇陰疼痛四肢強直哭至天明不已者此候才見啼叫急看外腎或一個在或一個不在或兩個俱不見如一個不見下兩粒桃奴丸兩個不見下四粒桃奴丸後用鐵掬散二方並見本門中貼外腎常服硃砂膏方見驚積門中勻氣散方見胃氣不和門中與服即愈如面見黑色氣少項軟鼻口燥黑死候女人看兩腳下上便此外腎也茅先生小兒吊起外腎桃奴丸方桃奴二七個枝上干桃不落者桃膠乳香別研各二錢苦瓠子山蘗荔子各二七個上為末每服滴水為丸如此大若腎上至四更用荊芥蔥湯下五丸至七丸茅先生小兒疝氣貼臍並治吊起外腎鐵掬散方天南星鐵焰粉甘菊草烏各二錢上為末每服二大錢用蔥涎調塗陰上以紙貼之吉氏家傳治吊腎桃奴散方干桃一合枝上自乾者舶上硫黃木香各二錢上件為末木香湯下一錢千金灸法失精筋攣陰縮入腹相引痛灸下滿各五十壯老人加之小兒隨年壯千金翼灸法治失精筋攣陰縮入腹相引痛灸中封五十壯又下滿灸五十壯兩腳一百壯些二穴亦主喉腫厥逆五臟所苦鼓脹悉主之老人加之五十歲以下及小兒並隨年壯
