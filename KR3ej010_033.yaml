利犀角散方犀角屑麥門冬去心焙川大黃銼微炒黃耆銼各半兩赤芍藥木通銼枳殼麩炒微黃去瓤甘草炙微赤銼各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小不計時候加減溫服聖惠治小兒腦熱鼻乾宜用貼頂散方芒硝黃柏銼各一分地膽草地龍糞各半兩上件藥搗細羅為散以豬膽汁和捏作餅子兩枚更互貼於囟門上聖惠治小兒腦熱無涕吹鼻散方蟾酥一小豆大硝石蚺蛇膽各一分上細研如粉每取少許吹入鼻中尤良嬰孺治小兒鼻乾身熱方上取韭根杵汁澄之滴黑豆大內鼻中立止不可多用張渙犀角升麻散方治腦熱肺壅鼻乾病犀角末一兩川升麻馬牙硝黃連各半兩以上搗羅為細末次用硃砂細研水飛半兩牛黃龍腦各一分細研上件藥搗羅為細末每服半錢溫蜜湯調下乳食後萬全方治小兒心肺壅熱腦幹無涕時有煩躁麥門冬丸麥門冬去心焙一兩龍腦細研半分甘草炙犀角屑粉霜硃砂馬牙硝各研生乾地黃子芩各半兩黃連赤茯苓牛黃研入各一分上件藥搗羅為末入研了藥都研令勻每服半錢以溫蜜水調下鼻有瘜肉第二十四千金翼論曰凡人往往有鼻中肉塞眠食皆不快利得鼻中出息而俗方亦衆而用之皆無成效惟見本草云雄黃主鼻中瘜肉此言不虛但時人不知用雄黃之法醫者生用故致困斃曾有一人患鼻不得喘息余以成煉雄黃日內一大棗許大過十日肉塞自出當時即得喘息更不重發其煉雄黃法在千金翼仙丹方中具有之宜尋求也期有神驗千金治小兒鼻塞生瘜肉方通草細辛各一兩上二味搗末取藥如豆著綿纏頭內鼻中日二千金翼治鼻中瘜肉通草散方通草半兩礬石一兩燒真珠一銖上三味下篩展綿如棗核取藥如小豆內綿頭入鼻中日三度一方有桂心細辛各一兩千金翼治鼽鼻鼻中瘜肉不得息方礬石燒藜蘆附子炮各半兩瓜蒂二七枚上四味各搗下篩合和以小竹管取藥如小豆大內鼻孔中吹之以綿絮塞鼻中日再以愈為度一方加葶藶半兩千金翼治鼻中瘜肉塞鼻不得喘息方上取細辛以口濕之屈頭內鼻中旁內四畔多著日十易之滿二十日外以葶藶一兩松蘿半兩上二味搗篩以綿裹薄如棗核大內鼻中日五六易之滿二十日外以吳白礬上上者二兩瓦坯裹相合令密置窯中燒之待瓦熟取搗篩以面脂和如棗核大內鼻中日五六易盡更和不得頓和二十日外乃瘥慎行作勞及熱食並蒜面百日千金翼治齆鼻有瘜肉不聞香臭方瓜蒂細辛各半兩上二味為散絮裹豆大塞鼻中須臾即通千金翼羊肝散主鼻中瘜肉梁起方羊肝一具干之白朮炮四兩蓯蓉通草乾薑炮芎藭各二兩上六味為散食後以粥汁服五分匕日二服加至方寸匕
