爛研和丸如緑豆大每於食後以冷水下五丸五歲以上增之聖惠又方烏梅槐子各微炒黃連去須防風去蘆頭各一兩黃牛膽一枚取汁上件藥搗羅為末以牛膽汁拌合令勻曝乾重搗為末煉蜜和丸如緑豆大三歲每日空心以溫水下五丸量兒大小以意加減聖惠又方甘草炙微赤銼穀精草各半兩乾薑銼一分上件藥搗羅為散用面一兩作燒餅子樣用藥三錢入在中間安慢火內煨令熟用好茶下之每日早晨一服至三日後見物多時者不過五服見效無問大人小兒並治小兒即量其大小加減聖惠又方地膚子決明子各半兩上件藥搗羅為末以粟米飯和丸如緑豆大每日空心以粥引下七丸至夜再服量兒大小以意加減聖惠又作散飲服一錢聖惠又方夜明砂微炒黃芩各半兩上件藥搗細羅為散用米泔濯豬肝汁調下半錢日三服三歲以上增之聖惠又方上用蒼朮一兩去皮銼微炒搗細羅為散每服一錢用羊子肝一具以米泔煮熟分半具細切拌藥與兒食之至晚再服五歲以上即頓服未吃食兒不可與服聖惠治小兒雀目立見物方上用羊子肝一具薄切作片子鄆州蛤粉一錢勻摻在肝內系定以水煮熟服之五歲以下分減與吃聖惠又方上用牽牛子一兩搗細羅為散用羊子肝一片切入末一錢拌肝用白麵作角子兩個炙令黃色候冷服之以粥飲下量兒大小加減服之聖惠又方上用夜明砂一兩微炒細研豬膽和丸如緑豆大不計食前後以粥飲下五丸三歲以下三丸聖惠治雀目不計大人小兒久患不瘥方天南星一枚大者炮製防風去蘆頭黃芩黃連去須穀精草各半兩甘草一分炙微赤銼上件藥搗細羅為散每服一錢半用羊子肝一片以竹刀子批開兩處入藥末在內於銚子中用米泔一盞盞以盞子合候煮盡泔為度放溫食之忌豬肉炙爆熱面聖惠又方黃芩穀精草蛤粉羚羊角屑各半兩上件藥搗細羅為散每於食後以溫水調下六錢聖惠又方細辛地膚子決明子松脂各二兩上件藥搗細羅為散每於食後以竹葉湯調下一錢嬰孺治小兒晚日眼茫茫不見物也上用鼠膽汁點目中良張渙復明散方專治小兒每至日暮即不見物乃雀目也地膚子黃芩決明子各半兩蒼朮二兩米泔浸去皮焙乾穀精草一兩上件藥搗為細末每服一錢水八分一盞入荊芥少許煎五分去滓溫服食後張渙家傳治眼還睛散風氣銀花攀睛努絲瘀肉翳膜侵睛小兒雀目並皆治之蔓菁子半升煮一蒸一炒一萆麻子旋覆花真菊花各八銖羌活防風甘草炙蒺藜沙苑者炒青葙子炒鼠黏子炒以上各四銖穀精草石決明蟬殼地骨皮木通草牡蠣烏魚骨淡竹葉木賊草龍膽細辛密蒙花各十六銖白花蛇半兩蒼朮三十二銖米泔水浸竹刀銼去粗皮上件藥搗羅為末除蔓菁子單搗細拌和為散每服二錢匕丈夫生椒湯或茶湯下婦人並小兒雀目並米泔調下食後服忌瓜魚醬酒或腎臟風攻眼入桃仁四兩炒吉氏家傳治雀目夜盲瑞雲散方真珠決明子土瓜根石膏慢火煨一宿碗蓋一宿上各等分為末三光俱不睹晝夜瞑瞑咨啀不止多痛刺甘草煎湯調下半錢日三服聖惠小兒雀目夜不見物灸手大指甲後一寸內廉橫紋頭白肉際各一壯炷如小麥大疣目第九巢氏病源小兒疣目候人有附皮肉生與肉色無異如麥豆大謂之疣子即疣目也亦有三數相聚生者割破里狀如筋而強亦微有血而續復生此多由風邪客於皮膚血氣變化所生故亦有藥治之瘥者亦有法術治之瘥者而多生於手足也龍木論治小兒瞼中生贅外障此眼初患時皆因脾胃壅毒上衝入眼瞼眥之中致令生肉初時即小如麻米後三五年間漸長大摩隱瞳人赤澀淚出切宜鉤割散去瘀血後乃尉烙即較宜服搜胃散補肝丸點曾青膏即瘥方並見本門千金治小兒疣目方上以針及小刀子決目四面令似血出取患瘡人瘡中黃膿敷之莫近水三日即膿潰根動自脫落龍木論搜胃散方大黃桔梗元參防風車前子細辛芒硝黃芩各二兩上為末水一盞散一錢煎五分食後去滓服龍木論補肝丸方芎藭藁本五味子細辛各一兩羌活知母各一兩半茺蔚子二兩上為末煉蜜為丸梧桐子大空心茶下十丸龍木論曾青膏方曾青一兩龍腦乳頭香硃砂琥珀真珠各半兩上為末水三盞銀器內熬一盞入蜜半兩再熬成膏臨睡點之聖惠治小兒疣目方桑柴灰四升以湯淋取汁入砂盆內煎如餳入附子二枚去皮臍生用硇砂一分研入糯米五十粒上件藥搗羅為末入煎內調令勻每取少許點目上即自落兼治黑痣聖惠又方桑皮灰艾灰各三升上件藥以水五升淋之又重淋三遍以五色帛納汁中合煎令消點少許於疣目上則爛脫矣聖惠又方上用糯米三十粒於濕石灰里埋之以爛為度用針撥破疣目敷之經宿自落聖惠又方上硫黃細研以醋調塗疣目上六七度聖惠又方上松脂柏脂搗末以石灰汁調點少許於疣上自落聖惠又方上七月七日以大豆一合拭疣上三遍即令病人自種豆於南屋東頭第二流中豆生四葉以熱湯沃之瘥聖惠又方上石灰以醋漬六七日取汁點疣上小作瘡即落聖惠又方上以蜘蛛絲纏疣目即落聖惠又方上以杏仁燒令黑研膏塗之聖惠又方上以牛涎數數塗疣上自落目中有眯第十目澀羞明附千金治目中眯不出方上以蠶沙一粒吞之即出千金翼治眯目不明方上槌羊粗筋擘之如被筋法內筋口中熟嚼擘眼內著瞳子瞼上以手當瞼上輕挼之若有眯者二七過挼便出之視眯當著筋出來即止未出者復為之此法常以平旦日未出時為之以瘥為度出訖當以好蜜注四眥頭鯉魚膽亦佳若數挼目痛可間日挼之聖惠灸法小兒目澀怕明狀如青盲灸中渚二穴各一壯在手小指次指本節後陷者中炷如小麥大耳聾第十一巢氏病源小兒耳聾候小兒患耳聾是風入頭腦所為者手太陽之經入於耳內頭腦有風風邪隨氣入乘其脈與氣相搏風邪停積即令耳聾嬰童寶鑑小兒耳聾鳴聤耳痛不痛歌太陽入耳損聽聰氣滯時多耳必聾鳴是風並氣相系痛應腦戶有邪風腎熱鬱蒸聤耳患日深疼痛出稠膿不有稠膿非此患只緣滴水入其中千金治耳聾干耵聤不可出方上搗自死白項蚯蚓安蔥葉中面封頭蒸之令熟並化為水以汁滴入耳中滿即止不過數度即挑易出瘥後發裹鹽塞之肘後以療蚺蜒入耳效只以蚯蚓並鹽一捻置蔥筒中須臾亦化為水千金又方上灌酢三年者最良綿塞之半日許必有物出千金翼治耳聾方生地黃極粗大者長一寸半杏仁燒令黑巴豆去皮熬令紫色各七枚印成鹽兩顆頭髮雞子大炙之上五味搗作末以發薄裹內耳中一日一夜若少損即抑之直以發塞耳耳中黃水及膿出漸漸有效不得更著若未損一宿後更內一日一夜還去藥一依前法千金翼又方硫黃雌黃一云雄黃上二味等分末之綿裹塞耳數日聞聲千金翼又方上以童子尿灌耳中三四度瘥千金翼赤膏主耳聾齒痛方丹參五兩蜀椒二升大黃白朮細辛芎藭各一兩乾薑二兩桂心四寸大附子炮去皮巴豆去皮各十枚上一十味切以淳苦酒漬一宿內成煎豬膏三斤著火上煎三上三下藥成去滓可服可摩耳聾者綿裹膏內耳中齒冷痛著齒間諸痛皆摩若腹中有病以酒和服如棗許咽喉痛吞如棗核一枚千金翼治久聾方成煎雞肪五兩桂心野葛各二兩上二味切膏中銅器內微火煎三沸去滓密貯勿泄以葦筒盛如棗核大火炙令熱仰傾耳灌之如此十日耵聹自出大如指長一寸久聾不過三十日以發裹膏深塞勿使泄氣五日乃出之千金翼又方上以器盛石鹽飯底蒸令消以灌耳中驗聖惠治小兒耳聾或因腦熱或因水入或因吹著並宜用此細辛膏方細辛防風去蘆頭川大黃銼微炒黃芩各一分川椒十粒去目蠟半兩上件藥細銼用清麻油三合煎藥紫色濾過下蠟候消為膏每日三度用一大豆大點於耳中聖惠治小兒風熱兩耳聾鳴方遠志去心甘草炙微赤銼柴胡去苗菖蒲各一分磁石三分搗碎水淘去赤汁麥門冬半兩去心焙上件藥搗細羅為散每服以蔥白湯調下半錢日二服量兒大小以意加減聖惠治小兒耳聾不瘥方甜葶藶杏仁湯浸去皮鹽各等分上件藥研如膏以少許豬脂和合煎令稠以綿裹如蕤核大塞耳中日一易之聖惠又方松脂菖蒲末烏油麻各半兩上件藥相和搗熟綿裹如一紅豆大塞耳中日一易之聖惠又方菖蒲末一分杏仁半兩湯浸去皮尖雙仁研如泥上相和研令乳入每用少許綿裹內於耳中日一易之聖惠又方上取蔥白於煻灰中煨令熟以蔥白頭內耳中日一易之聖惠又方萆麻子十枚去皮棗肉七枚上件藥同搗如膏每取蕤核大綿裹少許塞耳中日一易之聖惠又方上搗芥子令爛以入乳和綿裹少許塞耳中日一易之張渙通鳴散方治耳聾病菖蒲一寸九節者遠志去心各一兩柴胡去苗麥門冬去心防風各半兩細辛甜葶藶各一分以上搗羅併為細末次入磁石一分搗碎水淘去赤汁研杏仁二七粒湯浸去皮尖研上件都研勻每服半錢煎蔥白湯調下日二服量兒大小加減乳食後長沙醫者鄭愈傳治沉耳麝香散方麝香少許白礬一錢火煆五倍子二錢上件為末紙捻子點入耳中少許耳鳴第十二巢氏病源小兒耳鳴候手太陽之經脈入於耳內小兒頭腦有風者風入乘其脈與氣相擊故令耳鳴則邪氣與正氣相搏久即邪氣停滯皆成聾也嬰孺治小兒耳目鳴日夜不止菖烏散方菖蒲烏頭炒各四分上為末綿裹內耳中日再耳中痛第十三巢氏病源小兒耳中風掣痛候小兒耳鳴及風掣痛皆起於頭腦有風其風入經脈與氣相動而作故令掣痛其風染而漸至與正氣相擊輕者動作幾微故但鳴也其風暴至正氣又盛相擊二則甚動作病急故掣痛也若不止則風不散津液壅聚熱氣加之則生黃汁甚者即有薄膿也千金翼治耳痛方附子炮去皮菖蒲上二味等分裹塞之耳瘡第十四巢氏病源小兒耳瘡候瘡生於小兒兩耳時瘥時發亦有膿汁此是風濕搏於血氣所生世亦呼之為月蝕瘡也千金治小兒耳瘡方上燒馬骨灰敷之聖惠又方上燒雞屎白筒中吹之外臺集驗方以雞屎白敷之聖惠治小兒耳瘡及頭瘡口邊肥瘡蝸瘡並宜用白礬散方白礬燒灰蛇床子各一兩上件藥同研細為散乾摻於瘡上立效聖惠治小兒耳內生瘡汁出方白礬灰一錢麝香一字上件藥同研令細少少摻於耳中聖惠治小兒因築榼損耳耳內有瘡汁出不止方上取胡桃搗肉取油用滴耳中即止聖惠又方上取肉機上垢敷之良談氏殊聖治小兒耳上生瘡方上柏子葉不以多少瓦上焙乾碾成細末用輕粉麝香不拘多少同和勻如瘡干時用生油調塗如瘡濕時乾摻張渙香礬散方治耳瘡白礬一兩燒灰蛇床子一分以上搗羅為細末次用麝香一錢研令細上件再一處拌勻用一字摻瘡上月蝕瘡第十五巢氏病源小兒月蝕瘡候小兒耳鼻口間生瘡世謂之月蝕瘡隨月生死因以為名也世云小兒見月初生以手指指之則令耳下生瘡故呼為月蝕瘡也千金論曰凡日月蝕時忌食飲腹中生𧈟蟲及房室生子不具足必患月蝕瘡亦不得與兒乳日月生後乃不忌令人口臭齒斷宣露常有血出舌上生瘡者皆由犯此所致耳日月蝕時須救不救出行逢暴雨其救月杖須收取治𧈟之神藥預備患此者施之救療聖惠論月蝕瘡夫月蝕瘡者生於兩耳及鼻面間並下部諸孔竅側侵蝕乃至筋骨月初則瘡盛月末則瘡衰以隨月生因名之為月蝕瘡也又小兒耳下生瘡亦名月蝕瘡世云小兒見月以手指指之則令病此瘡也其生諸孔竅中則有蟲矣久不瘥則變成瘻也葛氏肘後小兒初得月蝕瘡多在兩耳及七孔竅隨月生死俗言小兒指月所為方上燒蚯蚓屎令赤膏和敷