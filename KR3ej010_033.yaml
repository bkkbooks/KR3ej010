body:
  text: 卷第三十三眼目耳鼻凡二十四門眼赤痛第一目腫附巢氏病源小兒目赤痛候肝氣通於目臟內有客熱與胸膈痰飲相搏熏漬於肝肝中熱氣衝發於目故令目赤也甚則生翳漢東王先生家寶治眼病證嬰孩小兒目赤者因上焦壅熱痰飲相搏熏漬於肝以致眼昏澀疼痛宜用金連散方見夾驚傷寒門中輕青丹方見單傷寒門中洗肝散四順散各二三服相間與之並用青涼膏貼兩太陽穴三方並見本門如依資次不退腑臟痰壅漸加熱痛其熱氣蘊積則變生障翳外臺五忌云凡目疾不問少長男女等所忌有五一房室二面酒三目衝風冷霜雪向日遠視四哭泣嗔怒五終身不用吃生五辛蕎麥煮葵菜若因疾犯者則疾深難療幸細意將慎百無一失故其五忌也兒小者雖不能皆犯此五忌然其間有不可不忌者顱囟經治孩兒赤眼並胎熱及疳瘴多淚茴香散茴香冬青膽陰乾生甘草各等分上每洗眼時取藥一分水一盞煎十沸後溫洗之或孩兒長大即加藥並水顱囟經孩子用洗眼後更服飲子方知母黃芩青葙子地膚子秦皮車前草山梔子獨活各等分上件藥以水五合煎二合去滓溫服忌食如常千金治目熱眥赤生赤脈侵睛瘜肉急痛閉不開如芥在眼磣痛大棗煎方大棗七枚去皮核黃連二兩碎綿裹淡竹葉四五合上三味以水二升先煮竹葉取一升澄清取八合內棗肉黃連煎取四合去滓令淨細細以敷眥中千金翼治目赤痛方雄黃細辛乾薑各一銖黃連四銖上四味細篩綿裹以唾濡頭注藥內大眥必閉目目中淚出須臾自止勿手近勿用冷水澆千金翼又方雄黃乾薑黃連礬石燒半日各一分上四味合用之如前方可加細辛一分千金翼治目赤口乾唇裂方石膏一斤碎生地黃汁赤蜜各一升淡竹葉切一升上四味以水一斗二升煮竹葉取七升去滓下地黃汁兩沸下澄清煮石膏取一升半蜜取三升細細服之千金翼治赤眼方上取杏仁四十九顆末之絹袋裹飯底蒸之熱絞取脂以銅青胡粉各如大豆乾薑鹽各如半大豆熟研之以雞毛沾取掠眼中眥頭日二不過三瘥千金翼赤眼方杏仁脂一合鹽緑如棗核大印成鹽三顆上三味取杏仁脂法先搗杏仁如脂布袋盛蒸熟絞取脂置密器中納諸藥直坐著其中密蓋二七日夜臥注目四眥不過七度瘥止千金翼治赤眼不問久近方上用硇砂三兩一味以醋漿垍器中浸日中曝之三日藥著器四畔乾者取如粟米大夜著兩眥頭不過三四度永瘥並石鹽石膽等尤佳千金翼治眼赤暈白膜翳方上用麻燭一尺薄批豬脂裹使匝燃燭以銅器承取脂內蕤仁三十枚研胡粉少許合和令熟夜內兩眥中千金翼又方上用枸杞汁洗目日五度良煮用亦得千金翼治赤眼方石膽蕤仁鹽緑細辛各一兩生驢脂一合上五味為末以乳汁和夜點兩眥外臺謝道人療眼暴腫毒痛不可忍欲生翳方決明子梔子仁肥精者地膚子茺蔚子干藍菜切各一升石膏研升麻切各四兩苦竹葉切二升芒硝二兩春車前草汁一升二合冬瓜子三升為末上十一味以水二斗煮竹葉取七升二合去滓納諸藥煮取四升分為四服每服相去可兩食間再服為度小兒減藥以意裁之外臺古今録驗療小兒眼痛方上用取淡竹瀝拭之外臺古今録驗又方上取鯉魚膽敷之嬰孺以鯉魚膽點外臺古今録驗又方上取車前草汁和竹瀝敷之嬰孺以二物洗外臺古今録驗又方上以人乳浸黃連點之外臺劉氏療小兒赤眼方黃連三分朴硝一分燒令乾上二味以婦人奶汁浸之點眼良聖惠云浸半日外臺小品療小兒蓐內赤眼方上生地黃薄切冷水浸以貼之妙外臺小品又方上取羊子肝薄切以井華水浸以貼之妙外臺小品又方上取黃柏以乳浸點之聖惠治小兒肝臟風毒上衝眼赤痛開張不得頭額疼痛羚羊角散方羚羊角屑甘草炙微赤銼各半兩葳蕤防風去蘆頭甘菊花牛黃細研入元參赤芍藥黃芩梔子仁各一分上件藥搗粗羅為散每服一錢以水一小盞煎至六分去滓入牛黃一字量兒大小分減溫服聖惠治小兒眼風熱澀赤痛梔子仁散方梔子仁黃芩犀角屑龍膽去蘆頭赤芍藥黃連去須川大黃銼微炒甘草炙微赤銼各半兩上件藥搗篩為散每服一錢以水一小盞煎至五分去滓溫服量兒大小以意加減聖惠治小兒赤眼澀痛不開由膈中有熱宜服決明散方決明子子芩柴胡去苗川大黃銼微炒川升麻梔子仁甘草炙微赤銼羚羊角屑各半兩石膏一兩上件藥搗粗羅為散每服一錢以水一小盞入竹葉七片煎至五分去滓不計時候隨兒大小加減溫服聖惠治小兒熱毒眼疼痛赤澀熱淚不止方元參決明子甘草炙微赤銼黃芩梔子仁犀角犀牛黃細研各半兩龍腦半錢細研上件藥搗細羅為散都研令勻每以食後以蜜水調下半錢五歲以上增之聖惠治小兒肝臟壅熱兩眼赤痛龍腦散方龍腦一錢細研梔子仁黃芩麥門冬去心焙地骨皮川升麻犀角屑各半兩川大黃一兩銼微炒甘草炙微赤銼牛黃細研各一分上件藥搗細羅為散每於食後以溫水調下半錢五歲以下可服一字聖惠治小兒肝臟風熱上注眼目赤腫疼痛羚羊角散方羚羊角屑犀角屑赤芍藥各三分黃連去須馬牙硝硃砂細研各一分牛黃天竺黃各細研川升麻芎藭甘草炙微赤銼當歸銼微炒各半兩上件藥搗細羅為散入研了藥令勻每服煎竹葉湯放溫調下一錢量兒大小以意加減聖惠治小兒肝臟風熱上攻眼目赤痛真珍散方真珠末研入青葙子各一分牛黃細研甘草炙微赤銼黃連去須各半分蔓菁子半兩上件藥搗細羅為散入研了藥都研令勻每服以熟水調下半錢量兒大小加減服之聖惠治小兒肝臟久積風熱毒上攻兩眼赤痛宜服胡黃連散方胡黃連真珠末研入各一分梔子仁甘草炙微赤銼各半兩上件藥搗羅為散入真珠粉同研令勻每服一字濃煎竹葉湯溫溫調下不計時候量兒大小加減服之聖惠治小兒肝心壅熱上衝眼赤腫疼痛牛黃丸方牛黃熊膽各細研一分硃砂細研水飛過黃連末各半兩龍腦細研膩粉各一錢上件藥都研令勻煉蜜和丸如麻子大不計時候以溫水下五丸量兒大小以意加減聖惠治小兒熱毒眼赤痛黃連水藥煎方黃連去須蕤仁湯浸去皮研入杏仁各四十九枚湯浸去皮尖雙仁研入黃柏銼青鹽各半兩膩粉龍腦細研各一錢上件藥搗細羅為末入研了藥令勻以生絹袋盛用雪水二大盞浸藥一七日取出藥袋子將藥汁灌在竹筒內密裹封坐在重湯鍋中煮一伏時掘地坑子深三尺埋一宿取出入龍腦攪令勻以瓷瓶盛旋取點之聖惠治小兒暴赤眼澀痛神效方龍腦半錢秦皮銼黃連去須甘草生銼馬牙硝煉過細研各半兩上件藥搗羅為末用水一大盞浸藥一宿以銀銚子煎至五分以新綿濾過入龍腦攪令勻用瓷器盛日三度以銅箸點之聖惠治小兒暴赤眼澀痛點眼方黃連末杏仁湯浸去皮尖各一分膩粉半錢蕤仁半分湯浸去皮上件藥先將杏仁蕤仁爛研如膏後入黃連膩粉相和研了以新綿厚裹卻以新汲水半小盞於淨器內浸藥半日捩取汁日三四度點之聖惠又方甘蔗汁三合黃連末半兩上件藥於銅器中以慢火熬養令汁減半以綿濾每日三四度點之聖惠又方龍腦一錢川朴硝半兩上件藥都研令細每用如緑豆大日三四度點之聖惠治小兒眼暴赤痛點眼方雞子一枚黃連末半兩上取雞子敲破頭作小竅子出黃取清調拌黃連末卻內雞子殼中蠟紙封裹於青泥坑中浸三兩日不得令沒取出日三四度點之聖惠又方杏仁一分湯浸去皮尖龍腦三豆許大上件藥先研杏仁後入龍腦同研如膏頻點少許目眥中瘥聖惠治小兒目暴赤熱毒腫痛方蕤仁一分去皮研黃連末半兩上件藥同研以綿裹內雞子白中浸一宿後和如膏以半小豆大點目兩眥良久用熱水洗之聖惠治小兒眼痛赤洗眼方黃柏秦艽去苗各一兩蕤仁半兩湯浸去皮干棗一七枚去核上件藥細銼以水三大盞煎至二盞去滓放溫時時用洗之生地黃黃芩決明子各一兩竹葉切一升赤芍藥半兩上件藥細銼以水二碗煮一二十沸去滓澄清日三四度洗之聖惠治小兒眼赤痛不能開方竹瀝三合人乳汁一合上件藥相和以綿濾過時時拭眼中月內兒及三歲以下並宜用之聖惠治小兒肝臟風熱上攻於目疼痛不止宜用牛黃膏方牛黃一分川大黃一兩細銼生用上先搗羅大黃為末與牛黃同研令勻以生地黃汁調如稀膏勻於紙上貼眼候乾時時以冷水潤之如食頃間重換聖惠治小兒蓐內患赤眼方黃連去須黃柏各一錢上件藥細銼以奶汁浸半日綿裹濾去滓頻點之太醫局羚羊角散治大人小兒一切風熱毒氣上衝眼目暴發赤腫或生瘡疼痛隱澀羞明方羚羊角鎊川升麻黃芩車前子甘草微炙各十兩決明子二十兩草龍膽去蘆頭梔子仁各五兩上為細末每服一錢食後溫熟水調下日進三服小兒可服半錢太醫局秦皮散治大人小兒風毒赤眼腫痛癢澀眵淚昏暗方秦皮銼桂府滑石槌碎黃連去須各十兩上為末每用半錢沸湯點去滓溫熱頻洗嬰孺治小兒赤眼方黃連半兩槌丁香五個棗一枚去核上以水半升銅器中煎至一大合勿令灰入澄了卻入銅器中紙封頭避塵土點眥中嬰孺治小兒頭眼熱痛方木香白檀香各三分上為末以水塗額上干則易之嬰孺又方上取芭蕉汁塗額上立愈嬰孺治小兒肝熱沖眼決明湯方決明子大黃子芩梔子仁各七分升麻芍藥柴胡各六分枳殼三分炙竹葉切八合石膏十分碎綿裹杏仁去皮碎甘草炙各二分上以水四升煮一升二合為四服一二歲兒一合若生障翳加地膚子五分嬰孺治小兒眼赤膜膜不開隔中有熱決明湯方決明子子芩淡竹葉切五合大黃各五分升麻梔子石膏綿包碎各四分柴胡枳殼炙各三分甘草一分半上以水二升七合煮七合二百日兒為三服嬰孺治小兒眼赤痛有膿壯熱已服湯自下不消澤瀉湯方澤瀉升麻知母柴胡梔子仁芍藥各八分決明子五分枳殼炙四分竹葉切一升杏仁去皮尖寒水石碎各六分上以水五升煮一升半五六歲為三服嬰孺治小兒眼痛方上取齏杵汁注目中佳漢東王先生家寶治小兒目赤腫痛等洗肝散方芍藥防風各一分羌活大黃濕紙裹煨甘草炙各半分上為末每服嬰孩一字二三歲半錢及一錢水一藥注或半銀盞燈心黑豆各少許同煎十數沸食後服之漢東王先生家寶治小兒目赤上焦壅熱及退諸般潮熱大便不通四順散方當歸洗去土芍藥洗大黃濕紙裹煨甘草炙上等分為末每服嬰孩一字二三歲半錢及一錢水一藥注或半銀盞於銀石砂銚中煎十數沸溫服漢東王先生家寶治赤眼腫痛貼太陽穴清涼膏方上芙蓉葉見秋了採陰乾為末每用半錢或一錢以井華水調貼之四十八候治風毒赤眼通頂散方石膏煅薄荷花各一錢川芎二錢炙硼砂牙硝各半錢甘草二寸炙上為末麝香蜜水調劉氏家傳小兒赤眼及斑瘡入眼方龍腦薄荷川黃連各一兩上同末之新汲水調塗頂上張氏家傳治上焦壅熱牛黃散子偏療諸眼疾及小兒諸疾方肉桂鬱金各一兩馬牙硝四兩甘草半兩上四味並生用搗羅為散有患眼十五年二十年只吃一二兩便瘥小小赤眼凡吃十服已來便瘥臨臥用新汲水調一錢匕莊氏家傳截赤目清神膏方上每用杏仁三四枚去尖連皮淨漱口爛嚼以膩粉少許相拌青色得所用急熱湯浸散正臥用紙腳子去眼中時時點之覺藥力行且便睡一時已來或臨夜睡時用之睡至曉神效甚妙王氏手集大治小兒赤眼不可忍方上射干不許多少細搗羅為末每服一錢用臘茶清調下臨臥服吉氏家傳治目腫出血方甘草五寸用豬膽汁浸炙盡上為末每服半錢米泔調下吉氏家傳治