body:
  text: 卷第三十四口唇喉齒凡二十四門口瘡第一巢氏病源口瘡候小兒口瘡由血氣盛兼將養過溫心有客熱熱熏上焦故口生瘡也千金翼曰凡口瘡忌食鹹膩及熱面干棗等宜純食甜粥勿食鹽菜三日即瘥又口中面上生瘜肉轉大以刀決潰去膿愈嬰童寶鑑小兒口瘡是心臟積熱上發於口故也葛氏肘後小兒口瘡方上燒葵敷之良葛氏肘後支太醫小兒口瘡方上桑白汁生地黃汁赤蜜各半合相和緩緩細敷兒口取瘥葛氏肘後口瘡不得飲乳方上飲羊乳佳食療取羖羊生乳含千金治小兒口瘡不得吮乳方大青十八銖黃連十二銖千金翼用二兩上二味㕮咀以水三升煮取一升二合一服一合日再夜一千金又方臘月豬脂一斤蜜二升甘草炙如指大三寸上三味合煎相得含如棗大稍稍咽之日三千金又方上用礬石如雞子大置醋中塗兒足下二七遍愈千金治小兒心熱口為生瘡重舌鵝口方上用柘根銼五升無根弓材亦佳以水五升煮取二升去滓更煎取五合細細敷之數數為之良千金治口瘡白漫漫方上取桑汁先以父發拭口以桑汁塗之千金翼治口中瘡咽喉塞不利口燥膏方豬膏白蜜各一斤黃連一兩切上三味合煎去滓令相得含如半棗日四五夜二千金翼治積年口瘡不瘥薔薇湯方上用薔薇根一升以水七升煮取三升去滓含之久久極即吐之定更含少少入咽亦佳夜未睡以前亦含之三日不瘥更令含之瘥為度驗祕不傳也千金翼治口中瘡身體有熱氣痱瘰薔薇丸方薔薇根黃芩鼠李根當歸葛根白蘞石龍芮黃柏黃耆芍藥續斷黃連各一兩栝蔞根二兩上一十三味末之煉蜜和丸如梧子大十丸日三服千金無黃連外臺救急療小兒口瘡方上以蛇蛻皮水漬令濕軟拭口內瘡一兩遍即瘥外臺劉氏療小兒口瘡方黃柏皮一兩切烏豆一升上二味以水二升煮取兩合去滓重煎如錫入少許龍腦研和敷之甚良宮氣方主小兒口瘡通白芨風疳瘡蝕透者上以白殭蠶炒令黃色拭去蠶上黃肉毛為末用蜜和敷之立效宮氣方治小兒口瘡及風疳瘡等上用晚蠶蛾細研貼瘡上妙宮氣方治小兒口瘡上用角蒿灰貼瘡上圖經主小兒口中熱瘡方上用故錦燒作灰研為末敷口瘡上聖惠治小兒口瘡多睡吐乳龍膽丸方龍膽去蘆頭川大黃銼碎微炒茵陳各一分人參去蘆頭梔子仁川朴硝郁李仁湯浸去皮微炒各半兩上件藥搗羅為末煉蜜和丸如緑豆大一二歲兒以溫水研下三丸看兒稍大臨時加之聖惠治小兒口瘡心熱煩悶黃連散方黃連去須大青川升麻各三分桑根白皮銼甘草炙微赤銼各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫量兒大小分減服之若與奶母服即加梔子黃芩各半兩每服三錢以水一中盞煎至六分去滓每於食後溫服聖惠治小兒口瘡爛痛不問赤白或生腮頷間或生齒齦上雄黃散方雄黃硃砂各細研硝石蚺蛇膽黃連去須石鹽苦參銼各一分雞屎礬半分麝香一錢細研上件藥搗細羅為散都研令勻日可三五度塗之聖惠治小兒久患口瘡不瘥宜用此方蝦蟆塗酥炙微黃筍灰各半兩白礬灰黃柏銼黃連去須晚蠶蛾微炒川升麻各一分蝸牛三七枚去殼微炒上件藥搗細羅為散每取少許以白蜜和如膏塗於瘡上日三用之聖惠治小兒口瘡多時氣臭生蟲子升麻散方川升麻黃芩藁本甘草生用生乾地黃五倍子各一分皂莢訶梨勒皮夏枯草以上三味燒灰各半兩上件藥搗細羅為散候兒睡時即乾摻於瘡上神效聖惠治小兒口瘡鉛丹膏方鉛丹一分鉛霜半分晚蠶蛾微炒蛤粉各半錢麝香一錢上件藥研令極細用蜜二兩熬成膏每上取膏半錢塗在口中聖惠又方麝香梧桐律晚蠶蛾微炒黃柏末各一分硃砂半分上件藥都細研為散每夜臨臥時於瘡上薄貼之不過三夜瘥聖惠治小兒一切口瘡止疼痛方沒石子三分微火炙令虛脹甘草一分上件藥搗細羅為散每於瘡上薄摻蓋令遍聖惠治小兒口瘡腫痛方蟾酥石膽各半錢黃柏三錢末上件藥細研令勻煉蜜和丸如皂莢子大每夜以水化一丸如餳相似以篦子抹在口中每夜一兩上不過兩夜瘥聖惠又方麝香半分細研蜜半兩黃丹一分生地黃汁一合上件藥先以蜜地黃汁黃丹同入銚子以慢火熬令紫色次下麝香勻攪候冷日三度塗於瘡上聖惠又方銅緑一錢細研白芷末半兩上件藥相合研勻日三度摻貼於瘡上聖惠治小兒百日以上二三歲以來患口瘡宜服晚蠶蛾散方晚蠶蛾一分微炒麝香半分上件藥都細研為散每用少許摻於瘡上日再用之聖惠治小兒口瘡赤爛石膽散方石膽半錢蚺蛇膽龍腦各一分上件藥同細研為散每用少許塗於瘡上日三用之以瘥為度聖惠又方膩粉一錢黃柏末半兩上件藥相和令勻薄薄摻塗之博濟方治大人小兒口瘡紫金霜黃柏如兩指大二片塗蜜慢火炙令紫色訶子一枚燒過盞子蓋少時麝香膩粉各少許上件藥搗羅為末每服二字許摻於舌上立瘥博濟方治骨槽風牙齒宣露腫癢浮動疼痛作時或齦爛生瘡兼治大人小兒口瘡地骨皮散地骨皮麥蘖各一兩豬牙皂角半兩青鹽一合上件四味同杵令勻粗入鍋內炒過再杵為末每服看患大小用之仍先以鹽漿嗽口了摻擦談氏殊聖方小兒心臟不清涼客壅傷神饒口瘡釣引重舌言妨當涎流不斷似流漿待教食乳搖頭怕夜夜啼聲哭斷腸五膽三黃除客熱七香金箔甚為良保生丸大黃黃柏為末別研宣連各一分半丁香一錢麝香一字金箔五片以水銀結砂子上並細研棗肉為丸如皂子大溫水化下一粒談氏殊聖治小兒口瘡方上用密陀僧以文武火燒赤地上以碗蓋出火毒為細末臨時乾摻之茅先生治小兒口熱生瘡方黃柏用蜜塗炙令紫色稱半兩青黛炒一分上共為末一日三五次摻口內常吃涼心藥嬰孺治小兒口瘡如月蝕狀赤黑似瘤有竅如有蟲吮之有血黃連含湯方黃連礬石細辛各二分藜蘆一分炙上以水三升煮二合未食含滿口冬可暖之兒大解語可用含之但以綿搵拭瘡上嬰孺治小兒口瘡湯方水銀一分黃連六分上二味以水二升半煮五合小兒不能含以綿搵拭口中日十遍嬰孺治小兒口瘡爛方羊乳汁黃連上以羊乳汁浸黃連著口中三上愈嬰孺又方上克桑枝取汁塗兒口瘡上日三嬰孺又方上用赤葵莖炙乾為末蜜和含之嬰孺又方羊脂薏苡根各二兩上煎熟去滓雞翎塗瘡上嬰孺治小兒口瘡方芍藥當歸黃連上等分乳汁浸塗口中嬰孺治口瘡白者肺噤赤者心噤方上取雞屎白棗大一塊綿裹水一合煮二沸分再服漢東王先生家寶治小兒嬰孺鵝口重舌及口瘡青液散方青黛一錢腦子少許上研為末每用少許敷舌上錢乙治小兒口瘡方上用大天南星去皮只取中心如龍眼大為細末醋調塗足心談氏殊聖名必效散仍用唾津調貼張渙桐律散方治口瘡口吻病梧桐律黃柏蜜炙蛤粉各一分晚蠶蛾一錢微炒以上搗羅為細末次用硃砂半兩細研水飛麝香一錢研龍腦半錢研上件都研勻每用少許摻貼患處嬰童寶鑑治小兒口瘡方黃丹一兩龍腦一字上件用蜜調敷口中惠眼觀證丹蜜膏治嗽牙兒口瘡方上用黃丹一分炒令紫黑色蜜一分同黃丹於飯上蒸兩次以竹篦子攪勻以手點少許入口惠眼觀證石膽散治口瘡方石膽不拘多少龍腦少許上為末摻之劉氏家傳治口瘡方上雞內金細末摻之立效劉氏家傳金粉散治小兒無故生口瘡不下乳食只於腳心塗貼黃柏天南星上等分末釅醋調塗兩足心咳嗽塗頂門劉氏家傳治大人小兒透舌口瘡及疳瘡韓甲伏方上用柳木蛀蚛蟲不以多少燒灰煙盡為度如無柳木雜木蟲亦得為細末入麝香少許瘡上無時干貼劉氏家傳治小兒口瘡青黛散方青黛甘草生用黃連香白芷密陀僧醋燒別研各等分上為末每用摻口內張氏家傳治大人小兒口瘡方柴胡吳茱萸上件各等分為細末每用一錢好醋調塗腳心男左女右張氏家傳失笑散治口瘡或唇裂破血出及小兒赤白口瘡作熱疼立效方元胡索白殭蠶各三錢黃連一錢輕粉抄二錢麝香抄一字鉛白霜硼砂黃柏各半錢上為細末每用一捻干貼舌上出涎再貼立效莊氏家傳治未滿月小兒口瘡方上以沒石子細研少許置乳上令兒吮之乳入口即啼取乳候少頃再用不過三次愈莊氏家傳治口瘡方鬱金雄黃甘草一半炙一半生上各一兩為末同和摻瘡上有涎吐之每用少半錢許甚妙又蛤粉水調塗腳心王氏手集治奶下兒子口瘡方烏頭尖七個天南星一個上二味為末以地磨生薑汁調於男左女右腳心內塗之不過三兩次立愈王氏手集兩蜜散治小兒口瘡方上用密陀僧不以多少末之每用一字蜜調塗唇上兒舔之盡口瘡便安吉氏家傳治口瘡方密陀僧黃丹等方上為末煉蜜和藥同熬成膏鵝毛拂塗效善化陶宰傳治小兒口瘡升麻散方升麻黃連各半兩上為末乾摻朱氏家傳治小兒口瘡方赤芍藥川大黃宣連各等分上件為末以獖豬膽調塗囟門上一日兩次換長沙醫者鄭愈傳治小兒口瘡方青黛黃連各二錢甜硝白殭蠶各三錢馬屁勃拳大上件為末乾摻先用茱萸湯洗腳心又醋麵糊調茱萸末塗腳心長沙醫者鄭愈傳治上焦熱口生白瘡膈中疳氣鉛霜散方鉛白霜粉霜各一錢馬牙硝硃砂各二錢上為末每服使少許菴於口內嬰童寶鑑灸法小兒口瘡臭氣灸手心一壯口臭第二千金翼治口臭方上濃煮細辛汁含久乃吐卻三日當愈千金翼又方上井華水三升嗽口吐廁中千金翼又方橘皮五分木蘭皮一兩桂心三分大棗四十枚去核蒸之去皮上四味末之以棗肉丸如梧子大服二十丸日二服稍稍至三十丸一方有芎十八銖千金翼又方桂心甘草炙等分上二味細末三指撮酒服二十日香千金翼又方蜀椒汗桂心各一兩上二味服如前方千金灸法灸勞宮主大人小兒口中腫腥臭口乾第三千金治口乾方上羊脂若豬脂雞子大擘之內半升酢中漬一宿絞取汁含之千金治口乾除熱下氣方石膏五合研蜜二升上二味以水三升煮石膏取二升內蜜煮取二升去滓含如棗核大咽汁盡更含之千金翼治口乾方上含一片梨即愈夜睡當時即定千金翼又方羊脂雞子大酒半升大棗七枚上三味合漬七日取棗食之瘥千金翼又方上遇夜勿食酸食及熱面燕口瘡第四巢氏病源小兒燕口生瘡候此由脾胃有客熱熱氣熏發於口兩吻生瘡其瘡白色如燕子之吻故名為燕口瘡也千金治小兒燕口兩吻生瘡方上燒發灰和豬脂敷之千金治燕口瘡方上以白楊枯枝鐵上燒取𣿉及熱敷之千金又方又以木履尾內煻灰中令熱取柱兩吻各二七遍千金治口吻瘡方上以楸白皮濕貼之三四度瘥千金又方上取經年葵根欲腐者彌佳燒作灰及熱敷之千金又方上以新炊飯了甑及熱以唇口向甑唇上尉之二七下三兩上瘥止仙人水鑑治乳口瘡在口角上經月不瘥方桑葉搗汁當門子末各少許上細研塗之即瘥陳藏器治小兒吻瘡方上以桑葉細銼大釜中煎取如赤糖塗之聖惠治小兒燕口生瘡胡粉散方胡粉一分炒令黃黃連半兩末上件藥細研令勻敷於瘡上聖惠治小兒燕口及重舌並生熱瘡方上以柘樹根一握洗去土銼水煎濃汁去滓更煎令稠日三四上塗之聖惠又方上雞胵黃皮燒灰研為末以乳汁調半錢服之日三服聖惠治小兒燕口及口內生瘡方上羖羊髭燒灰研為末以臘月豬脂和日三四上塗之效聖惠又方上黃連一兩去須搗羅為末用蜜調蒸一炊久旋旋與兒吃嬰孺治小兒燕口兩吻有瘡方上取雞屎白三大豆溫酒和服水下亦可唇口上生瘡第五千金治口旁惡瘡方亂髮灰故絮灰黃連乾薑炮上四味等分為散以粉瘡上不過三遍瘥千金治冬月唇乾拆血出方上搗桃仁以豬脂和敷之千金治遠行唇口面皺裂方上熟煎豬脂將行夜常敷面設行萬里野宿不損千金治唇邊生瘡久不瘥方上以八月蘭葉十斤絞取汁洗不過三日瘥聖惠治小兒唇口吻生瘡方上以新瓦搗羅為末以生油調塗之聖惠又方上燒雞屎白作末以敷之有涎易之聖惠治小兒唇腫生瘡及口中生白瘡欲爛方上於清旦取桑根白皮中汁塗之效聖惠治小兒唇口卒生瘡或痛癢方上用黃柏末濃煎薔薇根汁調塗之立效舌腫第六巢氏病源小兒舌腫候心候舌脾之絡脈出舌下心脾俱熱氣發於口故舌腫也千金治舌腫強滿方上滿口含糖醋良千金又方上飲羖羊乳即瘥千金翼治舌卒腫起如吹胞狀滿口塞喉氣息欲不復須臾不治殺人治之方上以刀鋒決兩邊第一大脈出血勿使刺著舌下中央脈血出不止殺人血出數升以燒鐵令赤尉瘡數過以絶血也千金翼又方上含甘草汁佳千金翼治舌卒腫如吹胞滿口溢出氣息不得通須臾不治殺人方上急以指刮破潰去汁即愈亦可以鈹刀於前決破之千金云兩邊破之千金翼又方上以苦酒一升煮半夏一十枚令得八合稍稍含漱吐之半夏戟人咽須熟洗去滑盡用之勿咽汁也加生薑一兩佳張鋭雞峰方治舌腫上以百草霜研細醋調成膏舌上下敷之以針決出血汁敷之彌佳舌上瘡第七巢氏病源小兒舌上瘡候心候於舌若心臟有熱則舌上生瘡也本草治小兒舌上生瘡飲乳不得上以白礬和雞子置醋中塗足底二七即愈千金治小兒舌上瘡方上以蜂房燒灰屋間塵各等分和勻敷之千金又方又以桑白汁塗乳與兒飲之千金又方上以羊蹄骨中生髓和胡粉敷之千金舌主心臟熱即應舌生瘡裂破引唇揭赤升麻煎泄熱方蜀升麻射干各三兩柏葉切一升大青二兩苦竹葉切地黃汁各五合生蘆根薔薇根白皮各五兩生元參汁三合赤蜜八合上十味㕮咀以水四升煮取一升去滓下元參汁令兩沸次下地黃汁兩沸次下蜜煎取一升七合綿惹取汁安舌上含細細咽之外臺小品小兒舌上瘡方上以烏賊魚骨燒末以雞子黃和塗之至喉咽舌下遍敷即瘥止嬰孺治小兒舌瘡方上燒葵根為灰每用少許敷之張鋭雞峰方治口舌生瘡久不瘥上野薔薇根銼碎每用一匙頭以水二盞同煎至六分去滓熱含冷即吐了張氏家傳治大人小兒口舌上生瘡方龍腦半分寒水石半兩燒細研上每摻於舌上少許吉氏家傳治生下來三五日爛舌上白瘡吃奶啼叫敷涎膏方黃丹一分輕粉一錢蜜少許上三味同勻去飯上蒸一度鵝毛掃入口舌上一二次安舌上血出第八千金翼治舌上黑有數孔出血如湧泉此心臟病也方戎鹽黃芩黃柏大黃各三兩人參桂心各二兩甘草一兩炙上七味末之煉蜜和丸飲服十丸如梧子日三服仍燒鐵烙之唇腫第九千金翼治唇黑腫痛癢不可忍方上取四文大錢於磨石上以臘月豬脂磨取汁塗之不過數遍即愈千金翼又方上以竹弓彈之出其惡血立瘥外臺小品療小兒唇腫及口中生白瘡爛方上清旦斫桑木白皮取汁以塗兒唇口即瘥緊唇第十聖惠夫脾與胃合為足陽明其經脈起鼻環於唇其支脈入絡於脾脾胃有熱氣則發於唇生瘡而重被風邪寒濕之氣搏於瘡則微腫濕爛或冷或熱乍瘥乍發積月纍年謂之緊唇亦名沈唇也千金治緊唇方上纏白布作大燈炷如指安斧刃上燃炷令刃汗出拭取敷唇上日二三度故青布亦佳並治沈唇千金又方上用青布燒灰以酒服之亦可脂和塗千金治唇生核方上豬屎平量一升以水投絞取汁溫服之千金翼治緊唇方上以亂髮蜂房及六畜毛燒作末敷瘡上豬脂和亦佳子母祕録小兒緊唇方上以馬芥子搗汁先揩唇血出敷之日七遍馬芥即刺芥也唐本草注治小兒緊唇方上搗赤莧取汁洗之聖惠治小兒緊唇是五臟熱毒氣上衝唇腫反粗是也宜用黃連散方黃連去須甘草生銼寒水石黃柏銼各半兩檳榔一分上件藥搗細羅為散煉蜜調塗於唇上一日兩三度換之聖惠又方上搗刺薊取汁煎令濃先以物揩唇上血即塗之聖惠又方上爛嚼澤蘭心安唇上良聖惠又方上以葵根燒灰為末以酥調封之聖惠又方上燒自死螻蛄灰細研水調敷之聖惠又方上炙松脂貼之聖惠又方上燒烏蛇灰細研酥調敷之聖惠又方上干蠐螬燒灰細研以豬脂和臨臥塗之瘥聖惠又方上燒鱉甲令煙盡細研酥調敷之張渙葵根散方治緊唇病葵根燒灰一兩烏蛇燒灰黃柏銼末鱉甲燒灰研各半兩上件都研勻每用半錢以豬脂少許和塗唇上時時用唇青第十一巢氏病源小兒唇青候小兒臟氣不和血虛為冷所乘即口唇青皅亦有臟氣熱唇生瘡而風冷之氣入瘡雖瘥之後血色不復故令唇青仙人水鑑小兒百日內無故唇口青不起飲乳神仙方大藍採取陰乾菱霄花牙硝蜀大黃各一分上以上並搗為散使羊髓丸之將一丸研碎灌之便吃乳也余休官去後曾遊湖湘三江長憶雲水修合此方特行救懸危者千餘人皆表功效殊妙恐有熱者可服而寒者難用咽喉腫痛第十二喉中有瘡附茅先生小兒生下中詐腮風壅候渾身壯熱耳邊連珠赤腫喉中或結肉瘤起有此為詐腮風壅此候本固積熱甚即衝上乃如此所治者先微下奪命散略與吐下風涎方見急慢驚風門中後用勻氣散補方見胃氣不和門中又用硃砂膏方見驚風門中夾天竺黃散與服方見實熱門中又用蔥涎膏貼腮腫處方見囟風傷寒門中如此調理三日即愈如見惡候恐傳急驚千金治小兒卒毒腫著喉頸壯熱妨乳方升麻射干大黃各一兩上三味㕮咀以水一升五合煮取八合一歲兒分三服以滓薄腫處冷更暖以薄大兒以意加之千金升麻湯治小兒喉痛若毒氣盛便咽塞並主大人咽喉不利方升麻生薑射干各三兩橘皮一兩上四味㕮咀以水六升煮取二升去滓分三服千金治懸癰乘熱暴腫長方乾薑半夏等分上末以少少著舌上千金又方上鹽末以箸頭張口柱之日五千金翼治咽中腫垂肉不得食方上先以竹筒內口中熱燒鐵從竹中柱之不過數度愈千金翼治熱病口爛咽喉生瘡水漿不得入膏方當歸射干升麻各一兩附子半兩炮去皮白蜜四兩上五味切以豬膏四兩先煎之令成膏下著地勿令太熱納諸藥微火煎令附子色黃藥成絞去滓內蜜復火上令相得盛器中令凝取如杏仁子大含之日四五輒咽之瘥千金翼治咽痛不得息若毒氣哽咽毒攻咽喉方桂心半兩杏仁一兩去尖皮熬之上二味為散以綿裹如棗大含咽其汁千金翼又方上刺小指爪甲文中出血即瘥左右刺出血神祕立愈千金翼治喉卒腫不不食方上用韭一把搗熬敷之冷即易之佳千金翼又方上含荊瀝稍稍咽之千金翼又方上含上好酢口舌瘡亦佳外臺古今録驗青木香湯療春夏忽喉咽痛而腫兼不利方青木香二兩黃連去毛白頭翁各一兩上三味切以水五升煮取一升半分溫三服小兒一服一合忌豬肉冷水外臺千金療小兒卒毒腫著喉頸壯熱妨乳方上煮桃皮汁三升服之聖惠治小兒咽喉腫痛塞悶方桑株上螳螂窠一兩燒灰馬勃半兩上件藥同研令勻煉蜜和丸如梧子大三歲以下每服煎犀角湯研下三丸三歲以上漸漸加之聖惠治小兒卒毒腫著咽喉壯熱妨乳方上以馬藺子半兩水一中盞煎至半盞去滓不計時候量兒大小分減溫服聖惠又方上取牛蒡根細銼搗汁漸漸服之驗聖惠又方上以蛇蛻皮燒灰細研為散不計時候用乳汁調下一字聖惠又方上以露蜂房燒灰細研為散不計時候用乳汁調下半錢看兒大小以意加減聖惠治小兒脾肺壅熱咽喉腫痛射干散方射干川升麻百合木通銼甘草炙微赤銼桔梗去蘆頭各一分馬牙硝半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小以意加減溫服聖惠治小兒咽喉腫塞疼痛升麻散方川升麻木通銼川大黃銼微炒絡石葉甘草炙微赤銼犀角屑以上各一分石膏川朴硝各三分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小以意加減溫服博濟方治小兒膈上壅熱唇口生瘡咽喉腫痛玉芝飲子甘草銼作半寸許擘破湯浸一日微炒過吳石膏研如粉各四兩藿香三分山梔子六兩去皮炒令香上件四味同杵為細末每服二錢以新汲水調下不以老幼並加減服之博濟方治小兒風熱咽喉腫痛塞悶生瘡搖頭燥悶及蟲咬心痛龍腦膏龍腦半錢白礬一分銚子內煉過煎卻礬汁候乾為度元明粉一錢蟬殼三十個去足炒研末蛇蛻皮一條長二尺用鐵器上煉焦為度旋除下黑色焦旨再爆須緊按實著鐵器焦後研為末牛黃少許上件六味一處爛研入砂糖少許和為劑丸如梧子大冷水化破一丸服之博濟方治大人小兒咽喉腫疼氣息難通絳雪散硇砂為君少許白礬為臣皂子大馬牙硝三分三佐硝石四兩四相黃丹半兩五方巴豆六兩六甲上件用粗瓷罐子一個先煨令熱後次第漸漸下藥巴豆逐個打破後有火焰盡更入一個續入蛇蛻皮一條謂之七擒以火養成汁候結硬乃成也每用少許以竹筒子吹在患處忌雞犬婦人見準臘月合之養生必用如聖湯治喉閉舌頰腫咽喉有瘡咳嗽濃血方甘草炙二兩桔梗一兩上為末每服二錢水一盞煎至七分去滓溫服急切不以時日二三張鋭雞峰方二味等分養生必用治咽中瘡腫方萆麻子去皮一枚朴硝一錢研勻上新汲水調作一服未效再作嬰孺治小兒咽喉病不利乳哺半夏湯方半夏八個洗棘刺半升西者麥門冬半兩人參甘草各一兩上切以水三升煮一升稍稍飲之張鋭雞峰方治咽喉腫痛閉塞白殭蠶生去絲嘴馬牙硝各二錢上同為末每服半錢生薑汁調下不以時韓樞密傳大聖奪命玉雪無憂散方元參管仲白茯苓去皮縮砂仁甘草炙滑石別研入山豆根川黃連去須荊芥穗各半兩寒水石三兩火燒細水中淬別研入硼砂三錢別研入上八味搗羅為末次入滑石等三味合和勻每服半錢此藥理喉咽塞滯口內生瘡心腹脹滿脾積癥塊解百藥毒如纏喉痹風涎主小兒蝦嗽奶瓣不消化誤咽下叫子魚骨針刺錢等並藥用半錢先抄入口次用新汲水一口咽之任是百毒硬物可令除化立有妙效如要吃巴豆針刺麥粳𥝖針瓷瓦子等諸毒藥毒蟲硬物只用藥半錢與物相拌和吃之用水一口下並無防礙但是心腹間有礙亦如前法服之潤三焦消五穀除三尸去八邪闢九蟲趁瘟疫專理渴病除風涎開牙關神效不可具述服者自當知之張氏家傳治大人小兒咽喉腫塞疼痛口舌生瘡上膈壅熱毒龍石散方寒水石一斤燒一兩硃砂一兩一分飛研生腦子一錢上為細末每用少許擦患處咽津無妨小兒瘡疹毒氣攻口齒先用五福化毒丹方見驚熱門太醫局方同掃次用此藥擦之立愈張氏家傳諸病無急於咽喉死人最急初覺咽喉腫痛急宜此得效方上用白礬同白殭蠶二味等分為末研生薑水調下一錢不過兩服即愈如是禁定牙關便用巴豆七粒剝去皮擦巴豆油在四指大四方紙花子上用紅箸斜角卷之卻徹去紅箸男左女右箸在鼻孔中存一半在外用燈點著外相紙花捲兒頭即時煙透喉中牙關隨手便開以白礬少許吹在喉中壓下熱涎即安此病暴速非其他病之可擬也倉卒害人性命不可不慎長沙醫者丁時發傳地龍散治小兒風熱咽喉腫痛方鬱金用皂角水煮乾甘草炙白殭蠶地龍各一兩蠍牙硝各一分上為細末每服一錢薄荷湯調下兒小半錢長沙醫者丁時發傳治大人小兒風熱咽喉腫痛方白礬一兩巴豆二十一粒餅內火煅上為細末每服一字吹入口內或鼻內尸咽第十三千金翼治尸咽語聲不出方乾薑十兩末之酒酥各一升上三味酒二合酥一匙薑末一錢匕和服之日三食後服亦治肺病千金翼治尸咽咽中癢痛吐之不出咽之不入如中蟲毒方上含生薑五十日瘥咽中噎第十四千金翼治噎方上酥蜜生薑汁合一升微火煎二沸每服兩棗許內酒中溫服千金翼又方上以手巾布裹舂頭粳拭齒喉痹第十五巢氏病源小兒喉痹候候痹是風毒之氣客於咽喉之間與血氣相搏而結腫塞飲粥不下乃成膿血若毒入心心即煩悶懊憹不可堪忍如此者死嬰童寶鑑小兒候痹馬痹歌熱毒喉中結作癰名為喉痹食難通馬痹頷間生腫痛盛邪心煩命也終玉訣小兒咽腫喉閉候歌咽喉腫閉肺家殃積熱於中舌有傷風盛氣攻丹腫毒卻愁生出腦疳瘡此患先解利宣泄臟腑壓熱調氣即安也千金治小兒喉痹腫方上用魚膽二七枚以和灶底土塗之瘥止聖惠用鯇魚膽千金治小兒喉痹腫方桂心杏仁各半兩上二味末之綿裹如棗大含咽汁千金凡卒喉痹不得語服小續命湯加杏仁一兩喉嚨者脾胃之候若臟熱喉則腫塞神氣不通烏翣膏主之方生烏翣十兩升麻三兩羚羊角芍藥木通各二兩薔薇根切一升艾葉六銖生者尤佳生地黃切一五合豬脂二斤上九味㕮咀綿裹苦酒一升淹浸一宿內豬脂中微火煎取苦酒盡不鳴為度去滓薄綿裹膏似大杏仁內喉中細細吞之千金治喉痹方上荊瀝稍稍咽之千金又方上以臘月豬毛燒末水服之千金又方上燒牛角末酒服之崔元亮云凡小兒飲乳不快覺似喉痹者取此灰塗乳上咽下即瘥千金又方上熬杏仁令黑含或末服之千金又方上刺手小指爪文上出三大豆許血逐左右刺皆須慎酒面毒物千金翼以繩纏手大指刺出血一大豆以上瘥云小指亦佳千金治喉痹卒不得語方上濃煮桂汁服一升亦可末桂著舌下漸咽之良千金又方上煮大豆汁含之無豆用豉亦佳千金又方上以酒三合和人乳半升分二服千金又方上燒炊帚作灰三指撮水服之千金又方上用芥子末水和薄之干則易千金又方上商陸苦酒熬令濃熱敷之千金又方上末桂心如棗核大綿裹著舌下須臾破千金治喉卒腫不下食方上以韭一把搗熬薄之冷則易千金又方上含上好醋口舌有瘡亦佳千金翼治喉痹咽唾不得方上半夏一味細破如棋子十四枚雞子一枚扣其頭如粟大出卻黃白內半夏於中內酢令滿極微火上煎之取半小冷飲之即愈千金翼喉痹方上取附子一枚去皮蜜塗火炙令乾復塗蜜炙須臾含之咽汁愈千金翼又方上含蜀升麻一片立愈外臺千金升麻湯主小兒喉痹痛若毒氣盛便咽塞並大人喉咽不利方生薑升麻射干各二兩橘皮一兩上四味切以水六升煎取二升分溫三服外臺劉氏療小兒喉痹熱塞方升麻五兩切馬藺一合上二味以水一升煎取二合入少白蜜與兒服之甚良食醫心鑑小兒喉痹腫痛方上以蜂房燒灰以乳汁和一錢匕服食醫心鑑又方上燒蛇蛻皮末以乳汁服一錢匕聖惠治小兒喉痹腫塞不通壯熱煩悶宜服犀角散方犀角屑桔梗去蘆頭絡石葉梔子仁甘草炙微赤銼川升麻各一分馬牙硝射干各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小以意加減溫服聖惠治小兒喉痹疼痛水漿不入馬牙硝散方馬牙硝馬勃牛黃細研川大黃銼微炒甘草炙微赤銼以上各一分上件藥搗細羅為散不計時候以新汲水調下半錢更量兒大小以意加減張渙射干湯治風熱上搏於咽喉之間血氣相搏而結腫乳食不下名咽閉方射干川升麻各一兩馬牙硝馬勃各半兩上件搗羅為細末每服一錢水一盞煎至五分去滓放溫帶熱服食後聚寶方治急喉痹木賊用牛糞餅子火燒每三兩莖才勻著便取出再取燒上一味為末每服一錢冷水研米汁清調下小兒臘茶清調下半錢入口腫破血出即安三日內未得吃粟米粥飯吉氏家傳治咽喉涎壅喉閉等疾方鬱金大者一個為末輕粉抄一錢匕巴豆七粒四粒熟三粒生熟者是去油生者生用上和合藥先左研四十九遍然後一向順研令勻次入輕粉每用一字管子吹入喉中吉氏家傳治喉閉奪命散與大人同治方朴硝白礬天南星各半兩上為末小兒每服半錢水一盞同煎二分大人水一盞藥三錢煎七分作一服長沙醫者鄭愈傳治喉閉方上用馬藺子為末每服半錢麥門冬熟水調下聖惠灸法喉痹灸天突一壯在項結喉下三寸兩骨間柱如小麥大馬痹第十六巢氏病源小兒馬痹候馬痹與喉痹相似亦是風熱毒氣客於咽喉頷頰之間與血氣相搏結聚腫痛其狀從頷下腫連頰應喉內痛腫塞水漿不下甚者膿潰毒若攻心則心煩懊悶至死千金凡喉痹深腫連頰吐氣數者名馬喉痹治之方上以馬銜一具水二升煮取一升分三服千金又方上以馬鞭草根一握勿中風截去兩頭搗取汁服千金翼治馬喉痹方上燒馬藺根灰一方寸匕燒桑枝瀝汁和服纏喉風第十七太醫局解毒雄黃丸解毒治纏喉風及急喉痹卒然倒僕失音不語或牙關緊急不省人事方雄黃飛鬱金各一錢巴豆去皮出油二七個上為末醋煮麵糊為丸如緑豆大用熱茶清下七丸吐出頑涎立便蘇省未吐再服善治纏喉風及走馬喉閉卒死倒地失音不語以至牙關緊硬不知人事如至死者心頭猶熱灌藥不下即以刀尺鐵匙斡開口灌之但藥下喉嚨無有不活吐泄些小無妨及上膈壅熱痰涎不利咽喉腫痛赤眼癰腫一切毒熱並宜服之如小兒患喉嚨赤腫及驚熱痰涎壅塞服二丸或三丸量兒大小加減養生必用治纏喉風咽中如束氣不得通方蛇蛻炙當歸切焙等分上為末溫酒一錢得吐為良未效再作切忌針灸張氏家傳異功散治纏喉風詐腮喉閉及咽喉一切患方盆硝一兩甘草炙六錢訶子肉白殭蠶貫衆馬勃蛇蛻皮點油醋慢火炒令黃色各半兩硼砂元精石各一兩上為細末每服用一字以蘆筒子吹咽喉內纏喉風磨刀水調下半錢尋常置舌根下用張氏家傳治纏喉風喉閉牙宣牙癰走馬疳口瘡等方上蠶蛻紙燒存性少入龍腦蜜丸如雞頭大含化小兒減少如牙宣癰腫揩貼齦上如有走馬牙疳加麝香擦貼立愈莊氏家傳治小兒急喉閉及纏喉風方元參鼠黏子半生半熟炒為末各一兩上二味為末新汲水調下立瘥安師傳纏喉風藥方上以火炊草一大把舂爛用水一鉢沖取汁漱咽中漸寬即下小續命湯加蔓荊子何首烏薄荷荊芥各少許與小續命湯多少相等咽下使一人守之連數服腫消乃退齒痛第十八千金翼治齒痛方上夜向北鬥手拓地灸指頭地咒曰蠍蟲所作斷木求風蟲所作灸便休疼痛疼痛北斗收即瘥千金翼又方上人定後向北斗咒曰北斗七星三臺尚書某甲患齦若是風齦閉門戶若是蟲齦盡收取急急如律令再拜三夜作千金翼治牙疼方上用蒼耳子五升以水一斗煮取五升熱含之疼則吐吐復含不過二劑愈無子莖葉皆得用之千金翼又方上莽草五兩切以水一斗煮水五升含漱之一日令盡千金翼又方上內藜蘆末於牙孔中勿咽汁神良千金翼又方上取門下桃橛燒取㴯汁少少內孔中以蠟固之千金翼針牙痛方針隨左右邊疼手大指次指掌間入一寸得氣絶補三十九息千金翼灸牙痛方上取桑東南引枝長一尺余大如匙柄齊兩頭口中柱著痛牙上以三姓火灸之咒曰南方赤帝子教我治蟲齒三姓灸桑條條斷蠍蟲死急急如律令大效千金翼含漱湯主齒痛方獨活黃芩芎藭當歸各三兩細辛蓽茇丁香各一兩上七味㕮咀水五升煮取二升半含漱之食頃乃吐更含之一方有甘草二兩千金翼又方上含白馬尿隨左右含之不過三口瘥張渙藁本散方治卒痛病藁本白附子川芎莽草各半兩並搗羅為細末青黛蘆薈麝香各一錢研細上件都再研勻每用一字塗揩患處善化陶宰傳小兒牙齒黑蛀氣息疼痛雄黃丸方雄黃二錢麝香半錢上為細末較飯和為梃子安在牙內齒齦宣露第十九巢氏病源小兒齒根血出候手陽明足太陽之脈併入於齒小兒風氣入其經脈與血相搏血氣虛熱即齒根血出千金翼治齒血出不止方上刮生竹茹二兩酢漬之令其人解衣坐乃別令一人含噀其背上三過並取竹茹濃煮取汁勿與鹽適寒溫含漱之終日為度外臺肘後治齒齦宣露出血所以日月蝕未平復時特忌飲食小兒亦然方上用蚯蚓糞水和作稠泥團以火燒之令極赤末之如粉以臘月豬脂和敷齒齦上日三即瘥茅先生治小兒牙宣齒縫出血方苦參末一兩白礬灰一錢上為末一日三次揩牙上立驗也張鋭雞峰方治齒間血出上以苦竹葉不以多少水濃煎取汁入鹽少許寒溫得所含之冷即吐了張鋭雞峰又方上用童子小便半升分為三兩次含之冷即吐了莊氏家傳治小兒唇口臭爛齒齦宣露麝香散方麝香雄黃蘆薈白龍骨各一錢密陀僧二錢石膽半兩生乾蟾一個重一兩者入瓶燒存性上合研令極勻細先用綿子纏箸頭上以鹽礬漿水輕輕洗過然後貼藥齒根腫痛第二十千金翼齒根腫痛方生地黃獨活各一兩上二味切以酒漬一宿含之千金翼又方上常以白鹽末封齒齦上日一夜二千金翼又方上扣齒三百下日一夜二即終身不發至老不病齒千金翼治齒牙根搖欲落方上以生地黃大者一寸綿裹著牙上嚼咽汁汁盡去之日三即愈可十日含之更不發也千金翼齒根腫方松葉一握鹽一合好酒三升上三味煎取一升含之千金翼治齒根空腫痛困斃無聊賴方獨活四兩酒三升上二味於器中漬之煻火煨之令暖稍稍沸得半去滓熱含之不過四五度千金翼又方上取地黃如指大長一寸火炙令大熱著木椎之以綿裹著齒上嚼之咽汁盡即易三易瘥止千金翼又方上燒松柏槐枝令熱柱病齒孔須臾蟲緣枝出千金翼治牙齦疼痛方杏仁一十枚去皮尖兩仁者鹽末方寸匕上二味以水一升煮令沫出含之味盡吐卻更含不過再三瘥養生必用治小兒牙方牛蒡子炒香一分乳香一錢上為末入白麵少許溫水調塗養生必用又方上用大硼砂研細水化雞羽掃齲齒第二十一巢氏病源小兒齒痛風齲候手陽明足太陽之脈併入牙齒風氣入其經脈與血氣相搏齒即腫痛濃汁出謂之風齲千金翼治齒齲方上切白馬懸蹄可孔塞之不過三度聖惠方用夜眼聖惠治小兒齒痛風齲連頭微腫蝦蟆散方干蝦蟆一枚燒灰青黛細研柑子皮細辛白雞糞薰黃以上各一分麝香細研乾薑炮製銼各半分上件藥搗細羅為散都研令勻以薄綿裹少許內齲孔中日一易之聖惠又方白附子藁本細辛芎藭莽草以上各一分上件藥搗細羅為散以薄綿裹少許著齲齒上聖惠治小兒風齲齒痛及蟲蝕疼痛黑爛方青黛細研雞糞白燒灰藁本細辛雄黃細研各一分麝香少許細研上件藥搗羅令細同研令勻旋取少許敷牙齒上聖惠又方上以郁李根白皮五兩銼以水一大盞半煎取一盞熱含冷吐之當吐出蟲聖惠又方上以皂莢炙去皮子搗末取少許著齒痛上瘥聖惠又方上以松柏脂捏鋭如錐柱齲孔內須臾齲蟲緣松脂出即瘥聖惠又方上以雞舌香半兩細銼以水一中盞煎至六分去滓熱含冷吐蚛齒第二十二裂齒附千金翼治蟲蝕齒疼痛方上閉氣細書曰南方赤頭蟲飛來入某姓名裂齒裹今得蠍蟲孔安置耐居止急急如律令小箋紙內著屋柱北邊蠍蟲孔中取水一杯禹步如禁法還誦上文以水沃孔以淨黃土泥之勿令泄氣永愈千金翼治蟲蝕齒根肉黑方上燒腐棘取𣿉塗之十遍雄黃末敷即愈若齒黑者以松木灰揩之細末雄黃塗齦百日日再塗之七日慎油豬肉神效千金翼治齒蚛方上以簷一枚令病人蹲坐橫簷於膝上引兩手尋使極住手伸中指灸中指頭簷上三壯兩頭一時下火病人口誦咒曰啖牙蟲名字鶻莫啖牙莫啖骨灸人亦念之千金翼治裂齒方上以腐棘針二百枚以水二升煮取一升含嗽之日四五瘥止千金翼又方上取死曲蟺末敷痛處即止日華子治小兒風蚛牙方上濃煎郁李仁水含之聚寶方黃龍散治齒齦疳蟲有竅子不合者龍實龍骨中有之深黃或淡黃土褐色緊探人舌者是白礬蝸牛殼南粉牛黃各一錢上五味為末每用少許貼竅子內時時用之齒落久不生第二十三千金治小兒齒落久不生方上以牛屎中大豆二七枚小開豆頭以注齒根處數度即生千金又方上取雄鼠屎二七枚以一屎拭一齒根處盡此上二十一日即生雄鼠屎頭尖經驗方治小兒大人多年牙齒不生上用黑豆三十粒牛糞火內燒令煙盡細研入麝香少許一處研勻先以針挑不生齒處令血出用末少許揩不得見風忌酸鹹物聖惠治齒落久不生方上取路旁遺卻稻粒於齒落處點三七下其齒自生神效靈苑治大人小兒生齒神驗方上用雄雌雞糞各十四顆焙乾同研如粉入麝香少許仍先以針挑破損齒腳下出血將散子敷之年高者不過二十日生年少者十日不計傷損及少自退落並再生頰車蹉閃第二十四牙車急附千金治失欠頰車蹉閃不合方上用一人以手指牽其頤以漸推之則復入矣推當急出指恐誤齒傷人指也千金失欠頰車蹉方上消蠟和水敷之千金翼治牙車急口眼相引舌不轉方牡蠣熬伏龍肝附子炮去皮礬石燒上四味等分末之以白酒和為泥敷其上干則易之取瘥止千金灸法失欠頰車蹉灸背第五椎一日二七壯滿三日未瘥灸氣衝二百壯胸前喉下甲骨中是亦名氣堂千金又灸足內踝上三寸宛宛中或三寸五分百壯三報此三陰交穴也
