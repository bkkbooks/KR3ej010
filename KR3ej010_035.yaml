body:
  text: 卷第三十五一切丹毒凡三十八門丹候第一巢氏病源小兒丹候風熱毒氣客在腠理熱毒搏於血氣蒸發於外其皮上熱而赤如丹之色故謂之丹也若久不瘥即肌肉爛傷聖惠方若久不歇則肌肉壞爛若毒氣入腹則殺人也土虺丹發兩手指作紅絲迤漸下行至關節便殺人以下丹無方者可於一切丹門中求之眼丹眼卒然赤腫生翳至有十數翳者是也五色丹發而變改無常或青黃白黑赤茱萸丹發初從背起遍身如細纈赤丹丹之純赤色者是也白丹初發癢痛微虛腫如吹奶起不痛不赤而白色者是也黑丹初發癢痛或熛腫起微黑色者是也殃火丹發兩脅及腋下膀上神火丹發兩膀不過一日便赤黑野火丹發赤斑斑如梅子遍背腹骨火丹初發在臂起正赤若黑家火丹初發著兩腋下兩膀上火丹往往如傷寒赤著身而日漸大丹火其狀發赤如火之燒須臾熛漿起者是也朱田火丹先發背起遍身一日一夜而成瘡天灶火丹發兩膀里尻間正赤流陰頭赤腫血出赤流丹身上或一片片赤色如燕脂染及漸引俗謂之流若因熱而得者色赤因風而得者色白皆腫而壯熱是也赤遊腫其狀皮膚赤而腫起行遊不定者是也風火丹初發肉黑忽腫起暴火丹之狀帶黑皅色遊火丹發兩臂及背如火炙石火丹發通身自入起如細粟大色青黑鬱火丹發從背起赤黑丹本是毒熱折於血氣蘊蒸色赤而復有冷氣乘之冷熱互交更相積瘀令色赤黑厲火丹發初從髂下起背赤能移走飛火丹著兩臂及背膝留火丹發一日一夜便成瘡如棗大正赤色藍注候小兒為風冷乘其血脈血得冷則結聚成核其皮肉色如藍乃經久不歇世謂之藍注顱囟經黃帝問歧伯曰後生少稚多被惡疾丹毒二品昔分歧伯曰陽解百年一十以上為毒一十以下為丹丹毒一也隨其大小分別之治之有毒至依方萬無一差喻人問男女皆遭丹毒之有毒至體此枉死者復何限哉良由信邪師之語仍被恐之過昧之人勿與下手請依方用之今出此圖形狀如後伊火丹從兩脅起神灶丹從肚起尿灶丹從踝起胡吹灶丹從陰囊上起天火丹從腹背遍身起天雷丹從頭項起熛火丹從背甲起胡漏灶丹從臍中起廢灶丹從曲臂起神氣丹從頭背上起土灶丹從陰踝起朱黃丹赤豆色遍身上起螢火丹從耳起野龜丹從背脊起鬼火丹從面上起嬰童寶鑑小兒諸般丹毒歌丹火初成似火燒天火渾身赤轉饒伊火膀邊青黑色厲從額上起根苗臀並穀道熛丹毒如帶黳紅暴火調留火發時一日甚變改無時五色摽家火頰連雙腋乳天灶內腫到陰尻背並膝赤飛丹病股內臍陰尿灶招一切丹第二本草治小兒諸熱丹毒上並以水銀服生銀少許功勝紫雪千金治小兒丹毒方上搗慎火草絞取汁塗之良千金治丹毒大赤腫身壯熱百治不折方寒水石十六銖聖惠用二十四銖石膏十三銖聖惠用二十四銖藍青十二銖冬用乾者聖惠同犀角八銖聖惠用二十四銖柴胡八銖聖惠用二十銖杏仁八銖聖惠用二十四銖知母十銖聖惠用十二銖甘草炙用五銖聖惠用十二銖羚羊角鎊屑六銖聖惠用三分芍藥七銖聖惠用三分梔子十二銖聖惠同黃芩七銖聖惠用二十四銖竹瀝一升生葛汁四合澄清蜜二升聖惠同上十五味㕮咀以水三升並竹瀝煮取一升三合去滓內杏仁脂葛汁蜜微火煎取二升一二歲兒服二合大者量加之聖惠藍青散藥味同分兩不同千金治小兒丹腫及風毒風疹麻黃湯方麻黃去根節一兩半甘草炙獨活射干桂心青木香石膏黃芩各一兩上八味㕮咀以水四升煮取一升三歲兒分為四服日再千金治小兒惡毒丹及風疹麻黃湯方麻黃升麻葛根各一兩射干雞舌香甘草炙各半兩石膏半合上七味㕮咀以水三升煮取一升三歲兒分三服日三千金治小兒數十種丹溻湯方大黃甘草炙當歸芎藭白芷獨活黃芩芍藥升麻沉香青木香木蘭皮芒硝各三兩上十三味㕮咀以水一斗二升煮取四升去滓內芒硝以綿搵湯中適寒溫溻之干則易之取瘥止千金治小兒丹毒方上搗馬齒莧一握取汁飲之以滓敷之聖惠絞汁塗之千金又方上搗赤小豆五合水和取汁飲之一合良滓塗五心千金又方上濃煮大豆汁塗之良瘥亦無瘢痕千金又方上用臘月豬脂和釜下土敷之干則易千金翼治小兒丹腫方棗根升麻白蘞黃柏黃連大黃梔子甘草生用各二兩生地黃汁一升上九味切以水一斗四升煮取七升去滓內地黃汁煎三沸以故帛兩重內湯中以溻丹上小暖即易之常令溫千金翼澤蘭湯主丹疹入腹殺兒方澤蘭芎藭附子炮去皮莽草藁本細辛茵芋各半兩上七味㕮咀以水三升煮取一升半分四服服此湯然後作余湯洗之千金翼溻湯主丹癰疽始發焮熱浸長進方兼主小兒丹長忌近陰升麻黃連大黃芎藭羚羊角當歸甘草各二兩黃芩三兩上八味以水一斗煮取五升去滓又還鐺中內芒硝三兩火上令一沸貼帛溻腫上數過腫熱便隨手消盡外臺劉氏療小兒油丹赤腫方上用栝蔞三大兩以釅醋搗藥以敷之佳外臺劉氏又方上取蕎麥麵以醋和塗之瘥外臺救急療小兒赤丹一名丹瘤方上取小豆搗末以雞子白和塗之以瘥為度先以針決丹上然後敷之千金亦療火丹外臺古今錄驗療月內兒發丹方升麻二分聖惠用一分半黃芩二分聖惠用一分犀角二分聖惠用一分甘草一分炙聖惠用半分柴胡二分聖惠用一分大黃別浸二分聖惠用一分蘭葉切三合聖惠用一兩梔子仁八分聖惠用一分石膏三分聖惠用一分半上九味切以水一升二合煮取八合下竹瀝四合更煎取一半去滓分二服甚妙外臺古今錄驗又方上搗藍汁塗之外臺廣濟療小兒丹毒方青藍汁五合竹瀝七合上二味相和分為二三服大小量之一合至三合簡要濟眾治小兒丹毒從臍中起方伏龍肝是年深灶下黃土研為末上以屋漏水和如糊敷患處干即再敷以瘥為度用新汲水調亦得修真秘旨治小兒丹瘤方上用蓖麻子五個去皮研入面一匙水調塗之甚效陳藏器治小兒丹毒方上以淬鐵水一合飲之此打鐵器時堅鐵糟中水陳藏器治小兒丹毒寒熱腹內熱結方上以積雪草搗絞汁服之東人呼為連錢草葉團如錢蔓生溪間邊及陰濕地陳藏器治小兒丹毒方上用旋花根苗搗絞汁服之俗呼鼓子花子也子母秘錄治小兒丹煩方上用柳葉一斤水一斗煮取三升去滓溻洗赤處日七八度子母秘錄治癰瘡疽痔痛惡瘡小兒丹方上用桐木皮水煎敷子母秘錄治癰疽痔痛惡瘡及小兒丹方上末蠐螬敷上子母秘錄治小兒丹方上用鯽魚肉細切五合小豆搗屑三合合和更杵如泥和水敷上食療治小兒丹方上以鯉魚血塗之即瘥姚和眾治小兒毒破作瘡黃水出方上焦炒豉令煙絕為細末油調敷之聖惠治小兒一切丹遍身壯熱煩渴升麻散方升麻川大黃銼碎微炒黃芩各一分川朴硝麥門冬去心葛根銼各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫不計時候量兒大小分減服之聖惠治小兒一切丹遍身赤痛大黃散方川大黃銼碎微炒防風去蘆頭各半兩川升麻黃芩麻黃去根節秦艽去苗各一分川朴硝三分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫不計時候量兒大小分減服之聖惠治小兒一切丹發無常處體熱如火燒宜用升麻膏方川升麻川大黃景天草蛇銜梔子仁寒水石川芒硝藍葉生地黃芭蕉根羚羊角屑梧桐皮各半兩上件藥細銼以竹瀝浸一宿明日漉出卻入鐺中用臘月豬脂一斤於慢火上熬一食久承熱以綿濾去滓候冷成膏以瓷合盛旋取摩之兼以膏如棗核大以竹瀝調服之聖惠治小兒一切丹通用慎火草散方慎火草紫葛銼硝石各半兩上件藥搗細羅為散用冷水調塗之干即再塗以瘥為度聖惠治小兒一切丹遍身體熱硝石散方硝石一兩乳香一分上件藥細研為散以雞子白調塗之聖惠又方太陰元精石一兩白礬一分上件藥細研為散以水調塗之聖惠又方上以浮萍草研如泥敷之聖惠又方上以藍靛塗之熱即更塗聖惠又方上取菲畦中土以水調塗之聖惠又方上取粟米以水煮濃汁洗之聖惠又方上取地龍糞以水研如泥塗之聖惠治小兒一切丹及諸毒腫方上鼠黏草根洗去苗搗絞取汁每服半合量兒大小分減服之聖惠治小兒一切丹方上用芭蕉根搗絞取汁塗之聖惠又方上取蒴藋搗絞取汁塗之聖惠又方上以景天花爛搗敷之聖惠又方上以川芒硝以水研塗之嬰孺凡小兒病丹此病發起暴卒急者不治凡人養小之家當先察審病源初起端倪尋方觀圖視病形象隨用別藥余少探之救瘥者甚眾故復記之治丹毒天下極驗無及水中藥但有患熱毒丹腫百藥不瘥者方上以水藻不拘多少切爛搗熟敷丹上厚三分許干則易之則瘥則止嬰孺治小兒丹方升麻柴胡石膏梔子仁各五分大黃生葛各八分子芩六分犀角屑杏仁芍藥各四分甘草三分炙竹瀝八合上切以水三升並瀝煮一升為三服此是一歲兒服量之嬰孺治小兒丹毒溻方升麻犀角屑白蘞黃芩梔子各三兩藍葉切一升石膏四合碎生地黃四兩上以水五升竹瀝二升煮二升半去滓沾帛溻之干即易嬰孺又方𦷧菜切一升豉五合芒硝五兩上杵以水和如泥封之嬰孺又方上以豬槽下泥敷之立已嬰孺又方上黃龍湯服三合並塗之嬰孺又方上取生麻油塗之嬰孺治小兒惡毒丹毒赤及風疹方上以甘草杵敷之嬰孺又方上以小豆屑五合生麻油和如泥塗之嬰孺又方上杵蔓菁根敷之嬰孺又方上取婦人月水衣洗敷毒處不洗中央散廣去嬰孺又方上以白鵝血敷之干即易之嬰孺治小兒半身皆紅漸漸長引者方牛膝甘草等分上切以水五升煮之沸去滓和灶下黃土封之錢乙治熱毒氣客於腠理搏於血氣發於外皮上赤如丹白玉散方白土一分寒水石半兩上末之用米醋或新水調塗張銳雞峰方治丹瘤上搗細豆豉水和敷之張銳雞峰又方上梔子去皮為末水調塗之張銳雞峰又方上生地黃搗爛取汁塗之張銳雞峰又方大黃末芒硝等分上合研勻水調塗之劉氏家傳小兒發丹方當得草子或葉小兒多摘搭額者沙莧等分上搗爛絹裹磨患處立效莊氏家傳治丹瘤方上木鱉子新者去皮細研醋調以雞翎敷隨手消孔氏家傳治小兒丹瘤方赤小豆蛤粉上等分為末用園荽汁調塗吉氏家傳治小兒丹瘡遍赤方上末浮炭打鐵者細羅蜜調敷之隨手瘥吉氏家傳發丹遍身熱服前聖惠六味升麻散後更宜塗此方滑石乳頭香各一分上以雞子清調塗之吉氏家傳治小兒丹毒癮疹方上天麻末每服半錢或丈夫婦人每服二錢紅酒調下土虺第三養生必用治土虺丹發兩手指作紅絲迤漸下行至關節便殺人惡瘡蟲子咬並治方大赤足蜈蚣二條白礬膽礬各一錢麝香半錢上為細末每用一剜耳許先以針撥破瘡口安藥在內以醋麵粉紙花子貼定日一換好肉生膿血惡肉盡去即貼膏藥眼丹第四集驗方治小兒眼卒然赤腫生翳至有十數翳者名眼丹方遲救之必能損目上令患人仰臥以紅錢纏並剪刀刃卻安在患人眼上以三姓老婦人各拈艾炷一枚在剪刀上灸之仍人祝云不灸病人只灸眼丹如此三遍候煙斷將此剪刀棄之宅後或無人行處路上隔宿收之神效五色丹第五巢氏病源小兒五色丹候五色丹發而變改無常或青黃白黑赤此由風毒之熱有盛有衰或冷或熱故發為五色丹也千金治小兒五色丹方上搗蒴藋葉敷之千金又方上以豬槽下爛泥敷之干則易集驗治卒赤黑丹千金又方上服黃龍湯二合並敷患上聖惠治小兒五色丹方川大黃黃芩川芒硝梔子仁干藍葉商陸各一兩上件藥搗細羅為散以水調塗之立