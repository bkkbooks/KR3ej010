出謂之天灶火丹也千金治小兒天灶火丹病從脾間起小兒未滿百日犯行路灶君若熱流下令陰頭赤腫血出方上伏龍肝搗末雞子白和敷之三日良千金又方鯽魚肉銼五合赤小豆末三合上二味和搗少水和敷之良聖惠治小兒天灶火丹方薺葉青羊脂各三兩赤小豆一合煅爐門上灰五兩蔥白一莖切上件藥相和搗如膏摩之燥再摩之聖惠又方細辛一兩糯米一合景天草三兩上件藥搗如泥塗丹上瘥聖惠又方上以車前子末水調塗之聖惠又方上以蠶沙一升水煮去滓洗之聖惠又方上以鐵落末用餳和如膏塗之嬰孺治天灶火丹初發著腳脛間方細辛二兩白生米一合景天五兩上同杵如泥敷之嬰孺又方上桑根切二升以水一升煮一沸去滓浴之日三不瘥更合嬰孺又方上取生浮萍杵為泥敷之或取汁塗惟多遍良張渙赤豆散方治丹發兩髈里尻間正赤流至陰處乃名天灶火丹赤小豆末伏龍肝細研灶中黑土是也各一分上件藥再同研細每用一錢以雞子白調塗患處廢灶火丹第二十九巢氏病源小兒廢灶火丹候丹發從足趺起正赤者謂之廢灶火丹也顱囟經廢灶丹從曲臂起上用屋四角茅草灰雞子白調塗之千金治小兒廢灶火丹初從足趺起正赤色者方上以棗根煮汁沐浴五六度聖惠治小兒廢灶火丹方赤小豆末一兩牛角二兩燒灰上件藥細研為散用雞子白調如泥塗嬰孺云牛角燒之作聲兼治青黑石丹嬰孺治廢灶丹初發之時起兩腳亦如火燒方上五加葉根燒灰以煅爐槽中水和塗之惟瘥止嬰孺治廢灶丹初起足趺正赤上桑根煮汁洗五遍張渙莽草散方治丹發從足趺起正勻赤乃名廢灶火丹莽草寒水石硝石各半兩上件藥搗羅為細散每用以新汲水調塗患處尿灶火丹第三十巢氏病源小兒尿灶火丹候丹發膝上從兩股起及臍間走入陰頭謂之尿灶火丹也顱囟經尿灶丹從踝起上用屋四角頭茅草燒灰以雞子白調塗之千金治小兒尿灶丹初從兩股起及臍間走入陰頭皆赤色者方上以水二升桑皮切二升煮取汁浴之良千金一方用桑根皮煮千金又方上燒李根為灰以田中流水和敷之良張渙二根湯方治丹發膝上從兩股至臍間走入陰處乃名尿灶火丹桑根白皮李子根各四兩上件細銼每用三匙頭以水兩碗煎至一碗去滓看冷熱避風淋患處野灶丹第三十一顱囟經野灶丹從背脊起上用柔香茸蒴藋赤小豆末塗之立瘥大孕丹第三十二長沙醫者鄭愈傳治小兒大孕丹諸般毒聖塗散方凌霄花萬州黃各一字苧根半兩切焙乾用上一處爛研以酒調和蜜同調服少許塗于丹上立消爾朱丹第三十三嬰孺治小兒爾朱丹及一切丹粉散方牡蠣煅赤烏頭燒麻黃根各三分石膏一分真珠二分麝香半分上方六味為末以粢米粉二升合和為散火中小炒須冷絹袋盛以粉粉遍身大佳夫丹治爾朱有瘡汁以粉粉之無不立愈以麻油塗病上然後以粉粉之大驗赤流丹第三十四聖惠夫小兒身上或一片片赤色如燕脂染及熱漸引此名丹毒俗謂之流若因熱而得者色赤或因風而得者色白皆腫而壯熱也可用一小鈹刀散鐮去惡血毒未入腹者可療也圖經治小兒遊瘤丹毒方上以冷水調剪刀草化如糊以雞翎掃之腫便消退其效殊佳圖經又方上以老鴉眼睛草葉入醋細研治小兒火焰丹消赤腫即天茄子也聖惠治小兒心熱身上赤流色如燕脂皮膚壯熱升麻散方川升麻川朴硝川大黃銼碎微炒元參各半兩犀角屑黃芩梔子仁甘草炙微赤銼木通銼各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫不計時候量兒大小分減服之聖惠治小兒赤流熱如火宜用此方護火草汁三合赤地利末膩粉各一錢上件藥相和量兒大小分減服之良久瀉下血片為效其滓敷在赤處亦佳聖惠治小兒赤流半身色紅漸漸展引不止方牛膝一兩去苗甘草半兩生用上件藥細銼以水一大盞煎至五分去滓調伏龍肝末塗之效聖惠又方川大黃一兩生用赤小豆半兩炒令紫色川朴硝三分上件藥搗羅為末以雞子清調塗之干則易之聖惠又方李子油三兩硃砂一分末上件藥調如膏塗之聖惠又方上以醬汁塗之聖惠又方上以蘿摩汁塗赤處隨手便瘥聖惠又方上蕎麥麵以醋調塗之不過三兩度瘥聖惠又方上以胡荽汁塗之聖惠又方上用白礬一兩以水煮冷暖得所洗之聖惠又方上取燒粉家洗甕水塗之聖惠又方上取紅藍花末以醋調塗之聖惠又方上以蕓薹葉爛搗塗之聖惠又方上砒霜不限多少細研於硯中著水入霜以墨濃研用筆點塗之良久以冷水洗後更塗以瘥為度聖惠又方上栝萎根搗末以醋調塗之干即更塗聖惠又方上糯米水研稀粥塗之干即更塗聖惠又方上粟米粉炒令黑以唾調塗之譚氏殊聖方五遊忽發遍身形恐悚令人怕怖驚乍腫剎那生滿體莫冤神鬼錯看承甘泉硝石蒼龍骨感攝消磨去痛疼更取鐵槽連底水調和頻掃便身輕消腫散清泉硝石白龍骨各一兩上研細淨器內盛若有患赤瘤丹及毒瘡者以鐵槽水調一錢掃塗立瘥張渙消毒散方治諸丹赤流初發甚者川升麻黃芩各半兩麥門冬去心川大黃銼碎微炒川朴硝各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫服不計時候量兒大小加減張渙棗根浴湯方治丹發而變改無常棗木根四兩丹參三兩菊花二兩上件藥細銼拌勻每用兩匙頭以水二碗煎三五沸看冷熱避風處浴兒極佳張渙木通散方治身體赤流片片赤色如燕脂染毒氣漸引者木通一兩川升麻川大黃銼碎微炒川朴硝各半兩甘草炙微赤銼梔子仁各一分上件藥為粗散每服一錢以水一小盞煎至五分去滓放溫服不計時候量兒大小加減張渙截毒散方治赤流熱如火者川大黃生用鬱金黃藥膩粉豬牙皂角去皮子用各半兩上件藥搗羅極細每用少許看赤處以生油調塗患處赤遊腫第三十五巢氏病源小兒赤遊腫候小兒有肌肉虛者為風毒熱氣所乘熱毒搏於血氣則皮膚赤而腫起其風隨氣行遊不定故名赤遊腫也本草治小兒患赤白遊腫上用蝦搗碎敷之蝦無須及煮之白色者皆不可食生水田及溝渠中者有小毒又鮓內者甚有毒爾顱囟經治孩子赤遊腫或如丹煩渴渾身赤溜壯熱方綠豆粉鉛白霜上細研蕓薹汁調塗之顱囟經取鉛霜法將鉛來於石上打令薄掘地作坑可鉛片大以杵搗坑實滿坑著醋以鉛蓋定經一宿去取霜如珠子大刮下藥使之如煩渴以後方解解熱飲子方麥門冬小蘆根竹葉乾葛搗末木漏蘆犀角屑各等分上用水四合藥半兩煎一合無問食前後徐徐與之服千金治小兒赤遊腫若遍身入心腹即殺人方上搗伏龍肝為末以雞子白和敷干易之千金又方上白豆末水和敷之勿令乾子母秘錄治小兒赤遊行於身上下至心即死方上以芒硝內湯中取濃汁以拭丹上子母秘錄又方上水中苔搗末敷上良子母秘錄又方上蒴藋煎汁洗之子母秘錄又方上搗生景天敷瘡上子母秘錄又方上搗芭蕉根汁煎塗之子母秘錄又方上杵菘菜敷上陳藏器治小兒熱毒遊腫方上破草鞋和人亂髮燒作灰醋和敷之兵部手集治小兒遊丹赤腫方上蕎麥麵醋和敷之良聖惠治小兒赤遊皮膚作片赤腫此是風熱所致宜服犀角散方犀角屑黃芩黃耆銼川升麻梔子仁漢防己川朴硝各一分牛黃半分細研上件藥搗細羅為散不計時候煎竹葉湯調下半錢量兒大小加減服之聖惠治小兒頭面及身體赤毒腫起作片宜用升麻膏方川升麻一兩生地黃二兩犀角屑射干赤芍藥黃芩梔子仁川大黃大青藍子元參羚羊角屑各半兩上件藥細銼以豬脂一斤半入於鐺中慢火上煎不住手攪候藥色變膏成去滓以瓷合盛頻用摩腫處聖惠又方黃柏末川朴硝細研川大黃末各半兩馬勃水銀手心內津研令星盡各一分雞子三枚去殼上件藥都研如膏每用時先以鈹針鈹破然後以膏塗之聖惠又方雞冠花商陸紫礦川大黃各半兩上件藥搗細羅為散以雞子清入生油等分調塗之干即更塗聖惠又方附子去皮臍川椒去目各半兩石鹽三分上件藥搗羅為末以煉了豬脂四兩相和於慢火上熬成膏以瓷合盛候冷時用塗之以瘥為度聖惠又方栝蔞根二兩末伏龍肝半兩上件藥細研為散以醋調塗之干即再塗張渙防己散方治風熱邪毒搏於血氣則皮膚赤而腫起遊走不定乃名赤遊腫漢防己半兩川朴硝犀角屑黃芩黃耆銼川升麻各一分上件藥搗羅為細末每服半錢煎竹葉湯調下量兒大小加減服之劉氏家傳治走馬胎赤腫走入心腹則不救方生槐葉一握生栝蔞去皮合槐葉研爛赤小豆末各等分上和塗患處立效此藥神效莊氏家傳治小兒遊丹赤腫方上栝萎三兩以釅醋搗敷之身有赤處第三十六血疽附巢氏病源小兒身有赤處候小兒因汗為風邪熱毒所傷與血氣相搏熱氣蒸發於外其肉色赤而壯熱是也葛氏肘後治身上有赤腫處者上熬粉令黑和唾塗之千金治小兒半身皆紅赤漸漸長引者方牛膝甘草炙上二味㕮咀合得五升以水八升煮三沸去滓和伏龍肝末敷之千金治小兒身赤腫起者方伏龍肝亂髮灰上二味末之以膏和塗之聖惠治小兒身上有赤引於頰上或口旁眼下赤如燕脂面上皮即皴剝漸漸引多此是心熱血凝所為其治法宜以小刀子鋒頭鐮破令血出後宜服丹參散方丹參黃芩枳殼麩炒微黃去瓤葛根銼犀角屑以上各一分麻黃半兩去根節上件藥搗粗羅為散每服一錢以水一小盞入竹葉十片竹茹半分煎至五分去滓放溫不計時候量兒大小分減服之聖惠治小兒身上有赤煩熱麥門冬散方麥門冬去心蘆根銼葛根銼犀角屑甘草炙微赤銼漏蘆各半兩上件藥搗粗羅為散每服一錢以水一小盞入竹葉十片煎至五分去滓放溫不計時候量兒大小分減服之聖惠治小兒身上有赤或瘀腫或如火丹煩渴渾身赤引壯熱鉛霜散方鉛霜綠豆粉各半兩上件藥細研為散以蕓薹菜汁調塗之聖惠又方上桃仁湯浸去皮研令爛以面脂和塗聖惠又方上黃蒿穗以水濃煎湯入鹽少許溫溫洗之聖惠又方上白礬細研以生油調塗之聖惠又方上芭蕉根搗絞汁塗之聖惠又方上水中苔搗末以水調塗之聖惠又方上川芒硝以水研塗之吉氏家傳治小兒腿上並座處血疽方此疾但有赤色如燕脂漸引闊如錢大或手掌大皮膚光緊此名血疽此因心熱心主血血得熱即凝聚不散宜用此藥上以石灰炒令極熱即以水沃之澄清三度敷之赤白溜第三十七聚寶方牛黃散治小兒初生至二三歲一切風發赤白瘤走癢四肢方牛黃硃砂蝸牛肉乾蠍全者白殭蠶直者天麻白附子乳香麝香各一分生龍腦一錢螳螂翅五對七月中採上十一味為細末每服一字薄荷水調下初生兒洗了後用乳少許調塗口中胎疾永除卒腹皮青黑第三十八巢氏病源小兒卒腹皮青黑候小兒因汗腠理則開而為風冷所乘冷搏於血隨肌肉虛處停之則血氣沉澀不能榮其皮膚而風冷搏於腹皮故青黑也嬰童寶鑑小兒血凝為初生下時肌未成肉以新綿及厚衣衣之血被熱而不結變為肌肉故凝也其候身上青黯哭而無聲不乳是也千金治小兒卒腹皮青黑方上以酒和胡粉敷上若不急治須臾便死子母秘錄治小兒卒腹皮青黑赤不能喘息即急用此方上用女青末內口中酒服亦治大人聖惠治小兒卒腹皮青黑不能喘息宜急用此方上苦參一兩銼搗細羅為散不計時候以醋湯調下半錢量兒大小以意加減聖惠又方上取爛棺木半兩以醋一中盞煎至六分去滓溫服半合量兒大小以意加減服之聖惠又方上取荊子搗入少水絞取汁暖服半合量兒大小以意加減千金灸法治小兒卒腹皮青黑不急治須臾即死灸臍上下左右去臍半寸並鳩尾骨下一寸凡五處各三壯
