body:
  text: 卷第三十六癰疽瘰癧凡十一門癰第一巢氏病源小兒癰瘡候六腑不和寒氣客於皮膚寒搏於血則壅遏不通稽留於經絡之間結腫而成癰其狀腫上皮薄而澤是也熱氣乘之熱勝於寒則肉血腐敗化為膿膿潰之後其瘡不瘥故曰癰瘡也養生必用論治癰疽等方謂凡癰疽始作皆須以大黃等藥極轉利既利之後病人當自知之勿以困苦為念若曰與其腹背潰爛臟腑焦枯膿血流漓孔穴穿空備諸惡而死不若利而死況有生道哉古聖賢立法率用五香連翹漏蘆等湯道路貧苦恐不能及即單煮大黃甘草作湯以利之須排日不廢直至膿潰漸有生意即服黃耆等藥排膿止痛千金外臺備矣世醫不學蔽以妄意不達標本皆曰瘡發於表豈可轉利死者比比良可悲夫孫真人云緩急單煮大黃一物服取快利此要法也張渙謹按小兒癰疽毒腫瘡癤瘰癧結核癭氣諸瘻疳瘡等皆與大人無異經云五臟不和則九竅不通六腑不和則流結為癰皆由寒熱結搏淺則為癰甚則為疽毒腫者挾風又腫及寸者為癤邪熱上衝於頭面則生瘡結於皮膚間則成瘰癧氣結於頸下則成癭病久不瘥則成瘻甚則成疳本根一也千金漏蘆湯治小兒熱毒癰疽赤白諸丹毒瘡癤方漏蘆連翹肘後用白薇白蘞芒硝肘後用芍藥甘草炙各六銖黃芩升麻枳實麩炒麻黃去根節各九銖大黃一兩上十味㕮咀以水一升半煎取五合兒生一日至七日取一合分三服八日至十五日取一合半分三服十六日至二十日取二合分三服二十日至三十日取三合分三服三十日至四十日取五合分三服肘後治大人用漏蘆白蘞黃芩白薇枳實炙升麻甘草炙芍藥麻黃去節各二兩大黃三兩十物以水一斗煮取三升若無藥用大黃下之佳其丹毒須針才去血經心録無連翹有知母芍藥犀角各等分千金五香連翹湯治小兒風熱毒腫腫色白或有惡核瘰癧附骨癰疽節解不舉白丹走竟身中白疹瘙不已方青木香薰陸香雞舌香沉香麻黃去根節黃芩各六銖升麻枳實麩炒連翹海藻射干各半兩麝香三銖大黃二兩竹瀝三合上十四味㕮咀以水四升煮藥減半內竹瀝煮取一升二合兒生百日至二百日一服三合二百日至期歲一服五合一方不用麻黃千金治大人小兒癰腫方上用生豬腦敷紙上貼之干則易日三四度千金又方上用芥子末湯和敷紙上貼千金翼以豬膽和塗千金又方上用白薑石末蒜和搗敷上瘥千金又方上馬鞭草搗敷上即頭出千金翼禁癰方咒曰癰非癰癤非癤土塊矢癰即滅三七遍取一土塊摩腫上傳與病人男左女右聖惠治小兒癰腫成瘡臟腑壅滯犀角散方犀角屑紅雪元參赤芍藥薺苨葳蕤升麻各半兩甘草一分麥門冬三分去心焙上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓入竹瀝半合更煎一兩沸量兒大小不計時候分減服之聖惠治小兒心肺熱毒攻於諸處生癰瘡及項腋下有結核煩熱疼痛不得睡臥宜服吳藍葉散方吳藍葉犀角屑元參川升麻梔子仁甘草黃耆銼連翹子各半兩大青黃芩各一分川大黃三分銼碎微炒上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小不計時候分溫服聖惠治小兒癰瘡及丹毒瘡癤漏蘆散方漏蘆麻黃去根節連翹川升麻黃芩川芒硝甘草各一分白蘞三分大黃一兩銼微炒上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小不計時候分減溫服聖惠治小兒癰瘡膿潰數日不止致體虛煩熱頭痛昏悶黃耆散方黃耆銼防風去蘆頭川升麻羚羊角屑白茯苓甘草地骨皮人參去蘆頭各半兩芎藭一分石膏一兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小不計時候分減溫服聖惠治小兒癰瘡膿水出不盡心中煩悶不已麥門冬散方麥門冬三分去心焙紫葛銼黃耆銼川升麻犀角屑甘草炙微赤銼木通各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小不計時候分減溫服聖惠治小兒癰瘡臟腑壅熱太過心神煩悶大小便不通大黃散方川大黃銼碎微炒川升麻葵子川朴硝各半兩梔子仁一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服以利為度更量兒大小加減服之聖惠治小兒癰瘡臟腑澀滯大麻仁丸方大麻仁二兩枳實麩炒微炒黃去瓤甘草炙微赤銼木香各半兩川大黃銼碎微炒牛蒡子微炒各一兩上件藥搗羅為末煉蜜和丸如緑豆大每服以熟水下十丸以利為度更量兒大小加減服之聖惠治小兒癰瘡腫毒熱赤疹痛消腫散方川大黃生銼杏仁湯浸去皮別研鹽花各三分上件藥搗細羅為散入杏仁以新汲水和稀稠得所旋取塗瘡腫上干即易之以效為度聖惠治小兒癰瘡腫方上用益母草不限多少銼碎搗取汁每服半合量兒大小加減服之更以滓敷癰瘡上良聖惠又方上用雞羽毛七枚燒灰細研以水調服之即潰聖惠又方上用伏龍肝末以好醋調作膏塗於故帛上貼之聖惠又方上以地松爛搗敷之干即易之聖惠又方上以馬齒莧爛搗敷之聖惠又方上用赤小豆末以雞子白和塗之聖惠又方上用地龍糞以新汲水調塗之聖惠又方上以龍葵菜爛搗敷之聖惠又方上以雞腸草爛搗敷之聖惠又方上以蕓薹葉爛搗敷之聖惠又方上以景天葉爛搗敷之茅先生小兒身上發癰毒方黃丹草烏天南星末白芨各等分上為末冷水調如泥用紙貼赤腫處不久自破嬰孺漏蘆湯治小兒熱毒癰疽赤白丹瘡癤方漏蘆連翹白蘞芒硝甘草炙各一分細辛升麻枳實炙麻黃去節黃芩各三分大黃四分上以水一升煮五合兒生一日至七日一合為三服八日至十五日一合半為三服十六日至二十日二合為三服二十日至三十日三合為三服三十日至四十日五合為三服百日至二百日一服三合二百日及一歲一服五合此方比千金加細辛及分兩不同爾張渙連翹散方治癰癤等連翹一兩沉香黃耆各半兩白蘞川朴硝川大黃炮甘草上件搗羅為粗散每服一錢水一盞抄入麝香一錢煎至五分去滓放溫服食後張渙益母散方癰癤皆可用益母草燒灰二兩鹽花炒乾一兩伏龍肝半兩上件研為細末每用一錢新水調稀稠得所旋取塗上瘡口惠眼觀證白乳散塗破癰毒方白丁香半兩乳香黃丹白芨各一分上為末用水調塗在帛上貼之惠眼觀證柏連散合癰瘡口方黃柏黃連白蘞白芨上等分為末每用二錢以水調厚貼之如湯火所傷以雞子清調塗兩上愈長沙醫者鄭愈傳治癰疽身上熱冷瀉不止鬱金散方鬱金青皮各二錢白豆蔻一個麵裹煨上件為末少許點於奶上吃千金灸法大人小兒癰腫灸兩足大拇指奇中立瘥仍隨病左右疽第二巢氏病源小兒疽候五臟不調則生疽亦是寒客於皮膚折於血氣血氣痞澀不通結聚所成大體與癰相似所可為異者其上如牛領之皮而硬是也癰則浮淺疽則深也至於變敗膿潰重於癰也傷骨爛筋遂至於死千金治小兒疽癰方丹砂大黃各三十銖黃連三十六銖雌黃䕡茹漆頭者雄黃各二十四銖莽草礬石馬齒者各十八銖上八味㕮咀以豬脂一升三合微火煎三上三下膏成去滓下諸石末攪凝敷之千金治小兒疽極月初即生常黃水出方上酢和油煎令如粥及熱敷之二日一易欲重敷則以皂莢湯洗瘡乃敷之聖惠治小兒熱毒生疽腫硬疼痛及赤白諸丹毒瘡癤並宜服漏蘆散方漏蘆麻黃去根節連翹川芒硝各半兩川升麻枳實麩炒微黃黃芩赤芍藥白蘞甘草各三分川大黃二兩銼碎微炒上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小不計時候分減服之聖惠治小兒熱毒疽腫及赤白諸丹毒腫或生瘰癧瘡癤身中風疹搔癢木香散方木香薰陸香沉香雞骨香黃芩麻黃去根節各一分連翹海藻洗去鹹味牛蒡子炒枳實炒射干川升麻各半兩川大黃二兩銼碎炒上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓入竹瀝半合更煎三兩沸放溫量兒大小不計時候分減溫服聖惠治小兒疽腫及瘡癤身體壯熱口乾心躁黃耆散方黃耆銼連翹川升麻枳殼炒各半兩丹參露蜂房炙甘草炙銼元參各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫量兒大小分減服之聖惠治小兒疽毒腫硬壯熱大渴犀角散方犀角屑三分麥門冬一兩去心焙葛根銼川升麻木香黃耆銼甘草炙黃芩各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫量兒大小分減服之聖惠治小兒疽毒腫堅硬疼痛攻衝四畔焮赤宜用抽熱毒消腫氣青膏方羊桃根銼川大黃銼生用各一兩黃芩緑豆粉黃柏銼各半兩赤小豆半分上件藥搗細羅為散用蕓薹菜搗取自然汁以蜜少許相和調藥令稀稠得所看四畔腫赤處大小剪生絹上勻攤可厚一錢貼之干即換之聖惠治小兒疽腫穴後及惡瘡腫膿水雖較肌肉不生宜敷密陀僧散方密陀僧一兩黃連去須檳榔各三分上件藥搗細羅為散用摻瘡上日三敷之聖惠治小兒疽瘡久不瘥宜貼松脂餅子方松脂薰陸香各一兩上件藥合搗內少許鹽為餅子貼於瘡上汁出盡即瘥聖惠治小兒疽已潰黃連散方黃連去須黃柏銼地榆銼白芷各半兩上件藥搗細羅為散每用雞子白調塗於故細布上貼之聖惠又方白芷黃連去須地榆銼白蘞各半兩上件藥搗細羅為散每用雞子白調塗於故細布上貼瘡上日三四度換之聖惠治小兒疽腫結硬已成膿未成膿貼熁方鹿角屑二兩燒灰白蘞一兩粗理黃石三兩燒赤以醋淬九遍上件藥搗細羅為散以醋調稀稠得所厚塗之干即更塗五七度即效聖惠又方上用蛇蛻皮貼之經宿自消聖惠又方上以商陸爛搗敷之聖惠又方上用芫花搗羅為末水和如膏塗之聖惠又方上以蠐螬研塗之鰻鱺魚膽汁及血各用塗之並效張渙雞舌散方治疽瘡雞舌香木香沉香各一兩麻黃去根節海藻洗去鹹味大黃炮各半兩上件搗羅為粗末每服一大錢水一大盞入竹瀝三兩點煎五分去滓溫服兼放溫熱淋泄患處附骨疽第三千金凡附骨疽者以其無破外臺作故附骨成膿故名附骨疽喜著大節解中丈夫産婦喜著䏶中小兒亦著脊背大人急著者先覺痛不得動搖按之應骨痛經曰便覺皮肉漸急洪腫如肥狀是也小兒才手近便大啼呼即是肢節有痛候也大人緩者先覺肌烘烘然經曰便覺痛痹不隨小兒四肢不能動搖亦如不隨狀看肢節解中若有肌烘烘處不知是附骨疽令遍身成腫不至潰體皆有青黯大人亦有不別呼為賊風風腫不知是疽也凡人身體患熱當風取涼風入骨解中風熱相搏便成附骨疽其候嗜眠沉重忽忽耳鳴又秋夏露臥為冷所折風熱伏結而作此疾急者熱多風少緩者風多熱少小兒未知取風冷何故而有此疾由其血盛肌嫩為風折之即使凝結故也幾初得附骨疽即須急服漏蘆湯下之敷小豆散得消可服五香連翹湯漏蘆湯五香連翹湯方並見癰門中千金翼治骨疽百方治不瘥方上可於瘡上以艾灸之三日三夜無不愈千金翼又方久瘡不愈瘥而復發骨從孔出者名為骨疽上取一死烏雌雞淨去肉取骨熬成灰取三家牛拘木刮取屑三家炊單各一兩皆別熬成灰合導瘡中碎骨當出數十片愈外臺千金凡骨疽者久瘡不瘥瘥而復發骨從孔中出名為骨疽方上以豬膽和楸葉搗封之外臺千金又方上搗白楊葉下篩敷之外臺千金又方上穿地作坑口小里大深三尺取乾雞屎五升以艾及荊葉和之令可燃火令煙出內疽孔坑中以衣擁坑口勿泄煙半日許當有蟲出外臺千金癰疽敗及骨疽方上末龍骨粉瘡四面厚二分外臺千金又方上用自死蛤蟆一枚頭髮一把以豬膏一斤半內二物煎之消盡下之