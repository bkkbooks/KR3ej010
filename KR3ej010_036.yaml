蘞以上各半兩蛤蚧一兩炙微黃琥珀三分上件藥搗細羅為散每服以牛蒡子煎湯調下半錢不計時候量兒大小以意加減服之聖惠治小兒癭氣腫悶宜服昆布散方昆布洗去鹹味黃耆銼麥門冬去心焙川大黃銼微炒陳橘皮湯浸去白瓤焙以上各半兩甘草炙微赤銼杏仁湯浸去皮尖雙仁麩炒微黃各一兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓量兒大小不計時候加減溫服聖惠治小兒癭氣腫結漸大海藻散方海藻昆布各洗去鹹味海帶海蛤木香以上各半兩金箔三十斤豬羊靨各三枚微炙上件藥搗細羅為散每服以溫酒調下半錢量兒大小以意加減日三四度聖惠治小兒癭氣心胸煩悶半夏散方半夏湯浸七遍去滑土瓜根龍膽去蘆頭射干昆布海藻二味洗去鹹味小麥面各一分上件藥搗細羅為散每服以生薑酒調下半錢日三四服量兒大小以意加減聖惠治小兒癭氣咽喉腫塞妨悶木通丸方木通銼昆布洗去鹹味乾薑炮裂銼甜葶藶隔紙炒紫色各半兩人參去蘆頭羚羊角屑射干檳榔海藻洗去鹹味各一分上件藥搗羅為末煉蜜和丸如麻子大不計時候以溫酒下十丸量兒大小以意加減聖惠治小兒癭氣咽喉噎塞陳橘皮丸方陳橘皮湯浸去白瓤焙麥門冬去心焙赤茯苓連翹海藻洗去鹹味商陸乾者各半兩杏仁一分湯浸去皮尖雙仁麩炒微黃羊靨三枚炙黃檳榔三分上件藥搗羅為末煉蜜和丸如緑豆大二三歲以溫水下七丸兒大者綿裹一丸如皂子大不計時候含咽津聖惠又方羚羊角屑昆布洗去鹹味桂心木通銼以上各半兩川大黃一兩銼微炒上件藥搗羅為末煉蜜和丸如麻子大不計時候以粥飲下七丸量兒大小臨時加減聖惠又方昆布海藻各洗鹹味訶梨勒皮川大黃銼微炒以上各半兩枳殼麩炒微黃去瓤木香各一分上件藥搗羅為末煉蜜和丸如麻子大不計時候以溫酒下七丸量兒大小加減聖惠又方檳榔一兩海藻昆布各半兩洗去鹹味上件藥搗羅為末煉蜜和丸如麻子大不計時候以溫酒下七丸量兒大小加減服之聖惠又方羊靨炙令黃青橘皮湯浸去白瓤焙燒銀砂鍋各半兩上件藥搗羅為末用糯米飯和丸如緑豆大不計時候以溫酒下五丸量兒大小加減服之張渙昆布丹方治癭氣不散昆布海藻各洗去鹹味草龍膽甜葶藶隔紙炒令紫色研各一兩牽牛子炒檳榔各半兩上件藥搗羅為細末白麵糊和如黍米大每服十粒煎人參湯下量兒大小加減劉氏家傳治童男童女風土癭氣及因氣結所成者昆布散昆布蓬莪朮川芎檳榔茴香海藻荊三稜甘草炙各半兩木香丁香青橘皮各一分上件藥為細末每服二錢水一中盞先用豬靨三枚燈焰上用針串在尖上燎熟入藥內同煎至六七分和滓溫服臨臥每夜止進一服久服日漸消也夔州醫者鄧俊民治小兒癭氣方杏仁湯浸去皮尖雙仁研丁香用瘦小者為細末各二十一粒荊三稜三錢濕紙裹炮銼杵為細末上件三味藥拌勻用豬靨一枚切作四花入藥末一錢匕在內用麻線系定於針上穿於麻油燈焰上燒令香熟去線細嚼咽下去碗不得言語睡及不得漱口忌生冷鮮菜咸醋等物一百日夔州醫者鄧俊民蓬莪朮散消小兒及丈夫婦人項氣磨宿滯積氣方蓬莪朮四錢生溫水洗過用丁香母丁香不用杏仁湯洗去皮尖各七粒上件搗羅為細末每用豬靨一枚針穿去麻油燈焰上燒令香熟破開入藥末一字在內含化咽津忌油鹽雞魚日三服稍退可徐徐服半月除根
