又方上燒亂髮灰和臘月豬脂敷之千金又方上以臭酥和胡粉敷之外臺救急療疥瘡及小兒身上熱瘡並主之方黃連黃柏赤小豆臭黃各一兩水銀半兩研相和上五味為散以麻油和先淨洗瘡然後塗之甚佳外臺救急又療小兒瘡疥神驗方黃連糯米粉各十三分水銀用八分研胡粉六分吳茱萸赤小豆各一兩上六味搗散水銀手中和唾研如泥以豬脂並水銀成膏先洗瘡干拭令淨以藥塗三兩度瘥忌豬雞魚肉聖惠治小兒疥瘙癢不止蛇床子散方蛇床子吳茱萸硫黃細研蕪荑以上各一分膩粉一錢上件藥搗細羅為散入硫黃研勻用油一合蔥一莖切入油內煎蔥黃黑色去蔥候油冷調散塗之聖惠治小兒疥遍身皆有痛癢不止黃連散方黃連去須胡粉水銀與胡粉點少水同研星盡各二兩吳茱萸一兩赤小豆一百粒上件藥除胡粉水銀外搗羅為末入胡粉水銀同研令勻以臘月豬脂和塗之亦治瘑瘡聖惠治小兒疥及身上熱瘡並治之黃柏散方黃柏銼黃連去須赤小豆臭黃各一兩水銀半兩硫黃一分與水銀結作砂子上件藥搗羅為末與臭黃水銀砂子同研令細用生油調日三塗之聖惠治小兒胎中受風長後或身體生疥瘙癢不止臭黃膏方臭黃硫黃各一分蔥白一莖細切上件藥研令細用清油一兩入銚子內熬令熟下少許蠟及蔥白次下硫黃臭黃攪令勻膏成以瓷盒中盛旋旋塗之聖惠治小兒疥及諸般瘡洗浴苦參湯方苦參丹參苦楝根防風去蘆頭各半兩蒴藋根三兩上件藥細銼和勻以水一斗煎至五升濾去滓於密室中洗浴兒以故帛拭乾即塗前膏聖惠治小兒疥癢不止方硫黃二兩白礬灰四兩上件藥細研為散以烏麻油調如稀麵糊灸疥令熱薄塗摩之聖惠治小兒疥癢痛不可忍方上用硝石一兩細研以生油調如膏每用時先以泔清洗之拭乾塗之聖惠又方上取羊蹄草根搗末以豬脂和塗之聖惠又方上用硫黃細研以醋調塗之聖惠又方上搗蛇床子末以豬脂和塗之博濟方治小兒瘡疥及三十六種風疾服之必愈靈寶丸天麻鄆州者洗天南星白附子新羅者獨活白殭蠶川烏頭炮羌活洗乾蠍全者各一兩牛黃龍腦各一分細研旋入麝香半兩細研旋入上件十一味各要上好藥淨洗日內曬乾不用近火杵為細末煉蜜為丸如豌豆大諸色風疾薄荷溫酒下五丸女人血風更入少當歸末溫酒下如癱瘓風下床不得先用白礬半兩為末蔥十莖煎湯溫浴後用薄荷汁溫酒下三十丸衣被蓋出汗別服補藥如是男子婦人疥癬瘰癧並須依前法澡浴服三十丸出汗當日必瘥小兒瘡疥亦須如常浴每一歲一丸並須出汗永瘥忌熱面豬肉魚毒物等養生必用治疥不以久新方白蕪荑一兩檳榔吳茱萸各半兩硫黃二錢別研上為末油調抓破擦張渙治小兒疥癬遍身或頭面生瘡如粟大浸淫癢痛搔之膿汁出雄黃膏方雄黃雌黃並細研各一兩川烏頭一枚去皮臍為末松脂亂髮燒灰各一分上件除雄黃雌黃外以豬脂六兩於鐺中煎煉成油下烏頭松脂亂髮等烏頭色黑亂髮消盡膏成綿濾去滓入雄黃雌黃攪令勻盛於瓷器中候冷每用少許塗瘡上日三兩次用惠眼觀證烏粉散治頭上疥瘡方漆𥯃二片赤豆一小勺上將豆捲在𥯃內火煅過取為末入輕粉少許以生薑汁調塗之惠眼觀證如聖散治疥癬他藥治之無驗者用此藥如聖立效方細辛蕪荑魚鹽者剪刀草藜蘆白礬研旋入硫黃研旋入上六味各等分為末用面油調勻更入豬筒骨髓一條再研勻和揩擦瘡上甚妙惠眼觀證乳香膏治小兒疥癬並小兒頭瘡等亦治痱子方雄黃一錢乳香膩粉各半錢研細上用巴豆二十粒清麻油四兩慢火渫令焦黃不用巴豆入前三味再煎數沸以黃蠟半兩候熔化入淨器內每用先以溫水洗瘡拭乾用藥塗之甚驗劉氏家傳小兒身癢欲生瘡方何首烏艾上件等分煮水與浴永不生瘡長沙醫者鄭愈傳治臟腑熱毒壅熱滯瘡疥等人參飲子方人參大黃荊芥天竺黃甘草炙各二錢白芷燈心各一錢鉤藤鉤子二七個梔子仁五個上粗杵為末以水一碗煎至半碗去滓時時服長沙醫者丁時發傳治大人小兒諸般熱毒氣瘡疥癆瘡方海螵蛸硫黃青礬各一錢蛇床黃連各半錢上同為細末油調塗瘡上或乾用得亦此藥太妙癬第八奶癬附巢氏病源小兒癬候癬病由風邪與血氣相搏於皮膚之間不散變生癮疹疹上如粟粒大作形郭或邪或丸浸淫長大癢痛搔之有汁名之為癬小兒面上癬皮如甲錯起乾燥謂之乳癬言兒乳飲乳汁漬汙兒面變生之仍以乳汁洗之便瘥也嬰童寶鑑小兒癬是母於風中浴後拭之未乾和水飲乳及夏月汗出而不粉其瘡細星星者是也千金治小兒濕癬方上以枸杞根搗作末和臘月豬膏敷之千金又方上以桃青皮搗末和醋敷之日二千金又方上揩破以牛鼻上津敷之千金又方上煎馬尿洗之千金又方上燒狗屎灰和豬脂塗之千金治小兒癬方上以蛇床實搗末和豬脂以敷之千金翼治濕癬方上取東壁土摩乾溼癬極有效聖惠治小兒癬癢痛不止白礬膏方白礬灰硫黃膩粉各一錢綠礬半錢川大黃一分末上件藥同研為末以米醋一升熬如黑餳收於瓷器中旋取塗之聖惠治小兒濕癬附子散方附子半兩去皮雄黃細研白礬各一分吳茱萸半分米粉半分上件藥搗細為散每日三度以綿搵撲聖惠治小兒癬久不瘥雄黃膏方雄黃細研多年薤根白礬藜蘆去蘆頭瓜蒂胡粉各一分水銀三分與胡粉點少水同研令星子盡上件藥搗羅為末入胡粉水銀同研令勻用豬脂調為膏輕拭塗之聖惠治小兒癬不計乾溼瘙癢不絕雌黃膏方雌黃研黃連去須蛇床子黃柏銼硝石蕪荑莽草藜蘆去蘆頭苦參銼各半兩松脂三兩杏仁一兩湯浸去皮別研如膏上件藥搗細羅為散以臘月豬脂半斤和松脂煎令熔先下杏仁次下諸藥攪令勻煎成膏收於不津器中用時先以泔清淨洗瘡拭乾塗於故帛上貼日二換之聖惠又方羊蹄根干筍燒灰各一兩上件藥搗羅為末以麻油調塗之聖惠治小兒久癬方獨蓄根去土一把附子二枚去皮臍生用上件藥搗令爛以好酒和塗之每塗藥時先以皂角湯淨洗拭乾後用藥日二塗之聖惠治小兒乾癬方水銀胡粉各兩上件藥點少水同研令星盡以雞冠血和塗之聖惠治小兒乾溼癬方雄黃一分麝香一錢上件藥細研用甲煎油調塗之聖惠又方上取乾蟾燒灰細研以豬脂和塗之聖惠治小兒癬久不瘥方上用黃礬一兩燒灰細研每用先以水淨洗拭乾塗之聖惠又方上以薤根搗醋和塗之聖惠又方上以醬瓣雀糞相和研塗之聖惠又方上取羊蹄草根爛搗以蜜和絞取汁先揩破塗之聖惠又方上以楮株白汁塗之聖惠又方上取亂髮燒灰細研以豬脂和塗之譚氏殊聖方小兒乳癬遍身形眼睫連眉退不生此是毋名傷五泄發兒損體病還成野油花共天麻杵赤箭除風四體輕天竺烏犀懸劍子蟾雄龍腦最多靈赤芝飲子野油花名油覆花天麻苗亦名天箭苗防風等分上為末洗癬了次以油調塗之後服烏犀丸譚氏殊聖烏犀丸方犀末一錢黑豆二錢乾蟾末三錢龍腦少許上為末以熊膽汁為丸如綠豆大溫水化一丸養生必用治小兒大人濕癬方甘草二分蘆薈四分別研上為末溫漿水先洗瘡後貼藥茅先生小兒周歲以上兒生細沙丹謂之奶癬方地龍去土炒黑為末黃連末豆豉上三味等分為末入輕粉油調塗嬰孺治小兒頭面瘡癬方上用大麻子五升為末以水和絞汁和蜜塗之白狗膽汁塗之亦效張銳雞峰方治乾溼癬久不瘥者上以新楮葉將有芒刺處於瘡上貼以手拍之候黃水出盡干即瘥惠眼觀證防風飲子治風虛瘡癬方防風甘草炙連翹各一兩山梔子半兩上為末每服二錢水五分煎三五沸去滓服張氏家傳治小兒頭面生煉銀瘡癬方黃連末黃柏厚者取各一錢輕粉二錢匕乳香少許杵細白膠香為細末白礬如癢生使不癢煅過各半錢上為細末先將熔下白膠香次下黃連黃柏令溫下粉乳已卻成塊再研令極細敷瘡上張氏家傳治大人小兒濕癬藥方桔梗灶底黃土豆豉各半兩麝香膩粉各少許上件三味為末後入麝香膩粉用暗芝麻油調塗先用溫水洗過後用藥塗之一上一洗莊氏家傳治小兒癬及大人惡瘡方石灰黃丹上二味等分同炒紫色為末干敷妙王氏手集治小兒奶癬方上以苦楝子不計多少燒灰存性研細入膩粉生油調搽極妙吉氏家傳乾癬方巴豆斑蝥各一枚上件研為極細末使不見星取臘燕脂調塗之日三上瘑瘡第九巢氏病源小兒瘑瘡候瘑者風濕搏於血氣所成多著手足節腕間匝匝然搔之癢痛浸淫生長呼為之瘑以其瘡有細蟲如瘑蟲故也聖惠治小兒瘑瘡及濕癬蛇床子散方蛇床子附子雄黃細研吳茱萸白礬苦參各一分上件藥搗細羅為散敷瘡上日三服之聖惠治小兒瘑瘡癢痛螺殼散方螺殼一兩爛者亂髮燒灰龍膽末胡粉各半兩上件藥細研為散以油腳調塗之聖惠治小兒瘑瘡及疥癬惡瘡水銀膏方水銀白礬蛇床子黃連去須各一兩上件藥除水銀外搗羅為末以臘月豬脂七兩入水銀和研以不見水銀星膏成敷瘡神效聖惠治小兒濕瘑瘡方上以胡燕窠一枚取大寬抱子處余處不用搗細羅為散每使時先以水煎甘草入鹽少許作湯溫溫淨洗瘡拭乾以散敷之三兩上便瘥若患惡刺以醋和用帛裹之日二易當愈聖惠治小兒瘑瘡及疥癬方上用苦參三兩搗羅為末以蜜和塗之聖惠治小兒干瘑濕瘑疥癬方上取楝根皮蔥白搗如膏以豬脂和塗聖惠治小兒久瘑瘡及疥瘡內黃水汁出方上取羊蹄草根爛搗以白蜜相和絞取汁塗之聖惠治小兒瘑瘡方上取桃葉爛搗以醋和敷之莊氏家傳大人小兒尾閭骨生瘡癢不可忍者豬攔門泥但是豬擦臀處泥土取用或門上木削皮燒灰麝香少許上為末濕則干貼干則油塗熛瘡第十巢氏病源小兒熛瘡候小兒為風熱毒氣所傷客於皮膚主生熛漿而潰成瘡名為瘡也葛氏肘後治大人小兒卒得熛瘡一名爛瘡初起作熛漿方上燒牛屎末以粉和敷之姚氏同葛氏肘後又方上熬秫米令黃黑然後搗以敷之葛氏肘後又方上末黃連和粉塗之葛氏肘後又方上燒鐵令赤二七度注水中浴兒日二三度葛氏肘後徐王神效方兒三歲初患頭上起熛漿如釘蓋一二日面及胸背皆生仍成瘡水銀硃砂胡粉硫黃各半兩上為末豬膏和塗禁見狗並青衣小兒婦女先濃煮桑汁以洗之帛子拭淨敷膏日三夜再每一洗一易膏千金治小兒瘡初起熛漿似火瘡名曰熛瘡亦名爛瘡方上以桃仁熟搗以面脂和敷之亦治遍身赤腫起千金又方上以馬骨燒灰敷之外臺備急療小兒三崴患頸上起熛漿如釘蓋一二日及胸背皆生仍成瘡方水銀硃砂各半兩碎研相得石硫黃一兩研臘月豬脂和研如膏上四味煮桑葉湯洗以敷之勿令豬犬婦人小兒等見之無效聖惠治小兒熛瘡梔子膏方梔子仁川升麻犀角屑黃芩各半兩蛇銜三分藍葉生地黃川大黃各一兩上件藥細銼以豬脂一斤同於鍋內以微火煎令藥色變濾去滓以瓷盒盛候冷塗之聖惠又方水銀松脂土蜂房黃柏川大黃生用各一兩膩粉一分與水銀於手掌上以拌研如泥上件藥搗羅為末以煉成豬脂一斤與藥末同入鐺內慢火熬令稀稠得所將水銀膩粉入膏中攪令勻膏成以瓷盒盛候冷塗之不過三五上瘥聖惠治小兒卒得熛瘡赤爛方上取牛糞燒灰細研敷瘡上日三用之嬰孺治小兒熛毒瘡梔子膏方梔子蛇銜草藍青各五分犀角屑三分升麻黃芩各四分生地黃八分上以豬脂切一升三合煎藥三上三下去滓敷瘡張渙生地黃膏方治熛漿瘡毒氣發於遍體者生地黃川升麻藍葉梔子仁川大黃以上各一兩上件藥細銼以豬脂八兩同於鍋內以慢火煎令藥色變濾去滓以瓷盒盛候冷每用少許塗患處張渙硃砂膏方治熛漿起如釘蓋才發遍體生瘡硃砂胡粉水銀各半兩上件藥點少水都研令水銀星盡以臘月豬脂四兩入銚子內慢火上熔化攪成膏以瓷盒盛候冷每用少許塗患處尿灰瘡第十一子母秘錄治小兒尿灰瘡方上末伏龍肝和雞子白塗之子母秘錄又方上以黑豆皮熟嚼敷之酢瘡第十二陳藏器治小兒酢瘡方上以產死婦人塚上草取之勿回顧作浴湯洗之不過三度佳陳藏器又方上以仙人草煮湯浴亦搗敷之酢瘡頭小大硬小者此瘡或有不因藥而自瘥者當丹毒入腹必危可預飲冷藥以防之兼用此草洗瘡亦明目去膚翳挼汁滴目中生階庭間高二三寸葉細有雁齒似離隔草北地不生也魚臍瘡第十三聖惠夫小兒魚臍瘡者此瘡頭黑深破之黃水出四畔浮漿起狹長如魚臍故謂之魚臍瘡也聖惠治小兒魚臍瘡方蛇蛻皮一兩炙微黃雞子一枚打破取清上件藥以水一大盞煎蛇皮至五分去滓入雞子清攪令勻更煎三兩沸放溫量兒大小分減服之聖惠又方芫花根二兩細銼豬牙皂角五挺黑豆三合白礬三兩燒令汁盡細研上件藥用醋七升先浸芫花根及皂角黑豆三日於釜中以文火煎至二升去滓後卻於別鐺中煎至一升入白礬灰攪令勻膏成以瓷盒盛攤於故帛上貼聖惠又方上臘月豬脂並髓以雞子清調令勻塗聖惠又方上以寒食干餳燒灰細研敷之聖惠又方上以白萵苣搗絞取汁先以針刺瘡上及四伴滴汁於瘡中即瘥聖惠又方上當瘡上切大蒜片子貼定以艾灸二七壯逐壯換蒜灸畢研豆豉厚罨定效張渙雞清散方治身體生瘡出黃水四畔熛漿起狹長似魚臍上以蛇蛻皮一兩燒灰細研每用少許雞子清調塗瘡上王灼瘡第十四巢氏病源小兒王灼惡瘡候腑臟有熱熱熏皮膚外為濕氣所乘則變生瘡其熱偏盛者其瘡發勢亦盛初生如麻子須臾王大汁流潰爛如湯火所灼故名王灼瘡亦名王爛瘡又語訛為黃爛瘡本草治小兒黃爛瘡方上以羅勒根燒灰敷之佳藥性論主小兒急黃爛瘡方上取赤小豆汁冷洗之不過三度瘥能令人美食千金治小兒黃爛瘡方四交道中土灶下土上二味各等分末之以敷瘡亦治夜啼千金又方上燒艾灰敷之聖惠方瘡干即用生油調艾灰塗千金又方上燒牛屎敷之亦滅瘢聖惠治小兒王爛瘡一身盡有如麻子有膿汁乍痛乍癢或時壯熱赤芍藥散方赤芍藥甘草白蘞各三分黃芩黃連去須黃柏炙各半兩上件藥搗細羅為散以蜜水調塗之日三四上瘥聖惠治小兒王爛瘡及惡瘡秫米散方秫米竹筱等分上件藥燒灰細研為散以田中禾下水調塗之立效聖惠治小兒王爛瘡初患一日內色變二日疱漿出或四畔時赤漸長若疱漿匝身即不可療其狀如湯火燒宜速用黃連散方黃連末胡粉各一兩上件藥細研令勻以生油調塗之聖惠治小兒王爛瘡初起疱漿似火燒瘡宜用此方上用桃仁湯浸去皮搗令爛以面脂和塗之聖惠又方上以吳茱萸酒煎汁塗之聖惠又方上以赤地利搗末用酥和塗之出華山春夏生苗作蔓繞草大上莖赤葉青似蕎麥葉七月開白花亦如蕎麥根如菝葜亦如山蕎麥本草云所在山谷有之嬰孺治小兒王灼惡瘡一身如麻豆者戴膿汁乍痛乍熱乍癢方甘草芍藥白蘞黃芩各三分黃連黃柏各四分上為末蜜和塗之日再亦可作湯洗之良乃聖惠治王爛瘡藥但聖惠以甘草芍藥白蘞各三分以黃芩黃柏黃連各半兩嬰孺治小兒王灼瘡方上燒古屋柱作炭杵末敷之火灼瘡第十五千金治小兒火灼瘡一身盡有如麻豆或有膿汁乍痛乍癢方甘草炙芍藥白蘞黃芩黃連黃柏苦參各半兩上七味末之以蜜和敷之日二夜一亦可作湯洗之千金翼除苦參只六味余皆同千金翼治小兒火瘡方上熟煮大豆濃汁溫浴之亦令無瘢千金翼又方上以蜜塗之日十遍兵部手集小兒火灼瘡一名熛漿瘡一名火爛瘡上用酒煎茱萸拭上黃肥瘡第十六巢氏病源小兒口下黃肥瘡候小兒有涎唾多者其汁流溢浸漬於頤生瘡黃汁出浸淫肥爛挾熱者瘡汁則多也千金治小兒口下黃肥瘡方上取羖羊髭燒作灰和臘月豬脂敷之角亦可用千金治口下肥瘡方上熬灶上飯令焦末敷之浸淫瘡第十七巢氏病源小兒浸淫瘡候小兒五臟有熱熏發皮膚外為風濕所折濕熱相搏身體發瘡初出甚小後有膿汁浸淫漸大故謂之浸淫瘡也千金治小兒浸淫瘡方灶中黃土發灰上二味各等分末之以豬脂和敷之外臺備急療小兒浸淫瘡方上燒艾作灰敷之千金同外臺備急又方上以牛屎燒作灰敷之千金同簡要濟眾治小兒浸淫瘡疼痛不可忍發寒熱方上刺薊末新水調敷瘡上干即易之聖惠治小兒浸淫瘡漸展不止方鯽魚一枚長三寸者豆豉一盒上件藥搗如膏塗之亦療馬鞍瘡若或先起四肢漸向頭面者難治也聖惠又方上以雞冠血塗之聖惠又方上煎鯽魚膏塗之聖惠又方上以生鯽魚薄切大片和鹽貼之嬰孺治浸淫瘡方上取胡燕窠燒灰水和敷之張渙苦瓠散方治身體風濕發瘡膿汁浸淫漸大干苦瓠一兩蛇蛻皮燒灰露蜂房炙各半兩梁上塵半合上件藥搗羅為細末每用半錢以生油調塗瘡上
