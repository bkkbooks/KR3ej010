body:
  text: 卷第三十七瘡熛疥癬凡十七門一切瘡第一漢東王先生家寶論小兒諸瘡癤夫瘡者皆因臟腑不調風邪失守而得或有積毒或是風化為蟲或則熱氣有盛或是驚入皮膚其大者是滯於血脈而橫出於皮膚之間若節其氣血則易破若或風纏則生其癮疹或是外邪所入即多燥癢而不定其食毒則滯死其血氣久則化為膿也或作驚瘡者驚本無物亦蹉其血氣在臟而為積在腑故出皮膚為瘡發遍身而四肢難較其積即是不化之食在脾有積者皆是脾得之其脾胃主四肢故有根本在臟宜以取轉耳風瘡亦發遍身其形甚小世呼為疥其風出入毛竅之間久感外風化為氣也熱毒瘡發處不定節滯其血故作瘡蟲窠瘡常發於脛後作其窠窠內有蟲如蟣子蓋因腹中燒蟲隨氣化其瘡即較而再發成片子如癬相似甚有死血癢若以藥敷較只是歸腹中須是取卻蟲方瘥及與殺蟲藥驚瘡若發在四肢手足腕時亦難瘥宜服驚藥頭瘡多因胎熱及腎上衝之所為也雁過瘡是肺熱也其瘡遇秋肺盛則發遇春水旺必瘥發在腳䐎𦝨上成片子也嬰童寶鑑論小兒瘡是臟腑有積熱並宿食停留胸中毒氣流十二經絡而生瘡也千金治小兒上下遍身生瘡方芍藥黃連黃芩各三兩苦參八兩大黃二兩蛇床子一升黃柏菝葜一斤上八味㕮咀以水二斗煮取一斗以浸浴兒千金苦參湯治小兒身上下百瘡不瘥方苦參八兩地榆黃連王不留行獨活艾葉各五兩竹葉二升上七味㕮咀以水三斗煮取一斗以浴兒瘡上浴訖敷黃連散養生必用治瘡腫退臟腑積熱方黃耆切焙人參甘草炙白藥子栝蔞根等分上為末煎柳枝湯放溫溫調下一錢日二三服嬰孺治小兒大人一切瘡醫不識者神效方水銀甘草黃柏黃連松脂黃明者膩粉土蜂窠以泥為著壁者南方均有自可採覓以上等分上取水銀放掌中以唾殺為青泥入垍碗中以生麻油和研生絹濾如稀餳和藥末再研如稠餳先以溫水洗瘡帛拭乾塗之治一切無名瘡此方不須付醫人合和令一細心子弟依方為之塗一度即瘥至如瘡有黃水出塗之隨手便乾如瘡癢不堪忍塗之立止如痛不撒者塗之立瘥比合此藥前後救人非一也嬰孺治瘡飛烏膏方輕粉燒硃砂作水銀上黑煙也礬石燒灰各二兩上為末甲煎和如脂敷乳瘡日三為末敷不須和有汁自淹定為散敷諸種瘡黃爛一切悉效嬰孺治瘡又方黃連三兩末胡粉五分水銀一兩上和勻以紙裹熟挼勻敷乳瘡上及小兒頭垢百瘡並悉大效嬰童寶鑑洗小兒瘡藥剪刀草防己黃連黃柏甘草各一分上件同杵每用一匙布裹入蔥葉以水同煎湯候通手洗之嬰童寶鑑治小兒大人瘡方黃丹一兩膩粉一錢匕上件研勻嚼杏仁取汁調藥敷之莊氏家傳治小兒諸般瘡欲出已出變證壞證神效二仙湯方防風甘草炙各一兩上為粗末先用杏仁一兩去皮尖茶盆內研令細爛後入上件藥末同更研拌令勻每用藥五錢入陳粳米一匙須用水一碗煎米熟為度如熟水飲之趙氏家傳治禿瘡疳瘡無辜瘡方皂角三寸不蚛者鱉甲一兩燒存性豉一合炒焦膩粉五筒上為末後入粉一處研勻生油調塗瘡上先用漿水洗去瘡上不潔然後上藥此累經大驗頭上一切瘡皆可治吉氏家傳治諸般瘡毒方黃柏柏葉各一兩輕粉二錢上件為末用雞子油調塗在瘡上未瘥更上一次安師傳瘡口久不合者方狗頭骨空雞子殼已抱出者乳香沒藥黃連上五味將狗頭骨及雞子殼各燒灰乳香等各為細末平取五者等分以油蠟成膏調塗搽瘡上便乾好若是曾水入後不合即用皂子燒灰存性入沙糖和貼瘡口上少頃水出腫退卻合前合瘡口藥如腫水退且用取水毒令腫退方合瘡口蓐瘡第二子母秘錄治小兒口瘡兼治小兒蓐瘡方上取重五日蝦蟆炙杵末敷瘡上即瘥子母秘錄治小兒蓐瘡方上嚼澤蘭心封上子母秘錄小兒蓐瘡方上燒葵根末敷之安師傳治小兒蓐瘡方上炒綠豆焦黑研為細末敷貼瘡上風熱瘡第三千金五香枳實湯治小兒著風熱㾦癗堅如麻豆粒瘡癢搔之皮剝汁出或遍身頭面年年常發者方青木香九銖麝香六銖雞舌香薰陸香沉香防風秦艽漏蘆各半兩枳實一兩半麻黃升麻黃芩白蘞各一兩大黃一兩十八銖上十四味㕮咀以水五升煮取一升八合兒五六歲者一服四五合七八歲者一服六合十歲至十四五者加大黃半兩足水為一斗煮取二升半分三服千金枳實丸治小兒病風瘙癢痛如疥搔之汁出遍身㾦癗如麻豆粒年年喜發面目虛肥手足乾枯毛髮細黃及肌膚不光澤鼻氣不利此則小時熱盛極體當風風熱相搏所得也不早治之成大風疾方枳實麩炒一兩半菊花蛇床子防風白薇浮萍蒺藜子各一兩天雄炮裂去皮臍麻黃去根節漏蘆各半兩上十味末之蜜和丸如大豆許五歲兒飲服十丸加至二十丸日二服五歲以上者隨意加之兒大者可為散服日華子治遊風熱毒風疹惡瘡疥癩小兒壯熱方上並煎楝皮湯浸洗服食須是生子者名雌枝皮一兩可入五十粒糯米煎煮殺毒瀉多以冷粥止不瀉者以熱蔥粥發之無子者名雄枝能吐瀉殺人不可誤服嬰孺枳實湯治小兒著風熱㾦癗堅如麻豆抓之皮剝汁出或竟身頭面年年常發有時方枳實六分炙防風秦艽雞舌香薰陸香各二分麝香一分沉香黃芩白蘞升麻各四分大黃木香各十分上以水五升煮一升八合五六歲一服五合七八歲六合劉氏家傳摩風去毒神異膏治男子女人不問老幼身上生一切風瘡腫毒氣瘡熱毒瘡癤生瘡發背才覺便點藥擦熱即消頭面風氣攻注如蟲行攻掣眼目瞤動種種瘡癬久使自安最治婦人黑斑粉刺粉靨落妝及治鼻面酒齇腳上臁瘡並皆神效使時一如面油塗擦熱為度綿黃耆半兩零陵香一分赤芍藥防風川芎生乾地黃天麻各一錢蠟二兩半清油十二兩上除黃蠟外將眾藥捶擘細以清油浸七日文武火上煎至黃色以新棉濾過去滓方入蠟再煎濾過入瓷器收之長沙醫者丁時發傳治胎中風熱後生瘡滿身或如疥癆方側柏鬱金蠍天南星地龍黃芩大黃等分上件為末用溫酒調下熱毒瘡第四聖惠夫小兒熱瘡者是諸陽氣在表陽氣盛則表熱小兒解脫腠理開則為風邪所客風熱相搏留於皮膚則生瘡初作瘭漿黃汁出風多則癢熱多則痛血氣乘之則多膿血故名熱瘡也千金治小兒熱瘡水銀膏方水銀胡粉松脂各三分上三味以豬脂四升煎松脂水氣盡下二物攪令勻不見水銀以敷之陳藏器治小兒赤白遊疹火焱熱瘡上搗馬藻絞汁服去暴熱熱痢止渴生水上如馬齒相連劉禹錫傳信方亂髮雞子膏主孩子熱瘡上以雞子五枚去白取黃亂髮如雞子許大二味相和於鐵銚子中炭火熬初甚干少頃即發焦遂有液出旋取置一瓷碗中以液盡為度取塗熱瘡上即以苦參末粉之頃在武陵生子蓐內便有熱瘡因閱本草至發髲本經云合雞子黃煎之消為水療小兒驚熱下痢注云俗中嫗母為小兒作雞子煎用發雜熬良久得汁與小兒服去痰熱主百病用發皆取久梳頭亂者聖惠治小兒熱瘡生於身體黃芩散方黃芩三分石膏柴胡去苗川大黃銼碎炒川升麻各一兩甘草炙微赤銼元參各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫量兒大小分減服之聖惠治小兒身上生熱瘡心躁皮膚焮疼枳殼散方枳殼麩炒微黃去瓤甘草炙銼黃連去須各半兩上件藥搗細羅為散每服以蜜水調下半錢量兒加減服之聖惠治小兒熱毒瘡梔子膏方梔子仁川升麻蛇銜黃芩各一兩犀角屑三分藍葉切五合生地黃二兩上件藥細銼以豬脂一斤半同入鐺內於微火上煎十餘沸濾去滓膏成於瓷盒中盛塗於故帛上貼之聖惠治小兒熱瘡黃膿出黃芩膏方黃芩一兩半水銀入少水與胡粉同研令星盡矣川大黃各一兩黃柏梔子仁黃連去須胡粉各三分竹葉二兩生地黃二兩半上件藥除水銀胡粉外並銼如豆大以新綿裹用豬脂一斤半入鐺內於慢火上煎十餘沸候藥色紫去綿以布絞取汁候凝下水銀胡粉以柳木篦攪令勻膏成以瓷盒盛日夜三四度塗之聖惠又方黃柏白礬燒令汁盡各一兩上件藥搗細羅為散敷於瘡上日三用之聖惠又方黃連半兩去須為末膩粉一分上件藥研令勻以諸菜汁和塗於瘡上日三用之聖惠又方上以豆豉炒乾搗末敷之嬰孺仍先數煮桃葉浴之聖惠又方上以伏龍肝搗末用雞子白和塗之張渙青砂散方治身體頭面熱毒瘡青黛研硃砂細研各一兩硫黃研水銀以棗瓤研令星盡各半兩胡粉研赤小豆各一兩上件拌勻研細每用少許用生油膩粉調塗患處惠眼觀證芭蕉散塗退丹毒熱瘡方寒水石煅過蚌粉上為末用芭蕉汁調塗鵝翎掃之張氏家傳治小兒生大血泡瘡黑聖丸雲和尚方草烏三十二兩米泔浸三宿洗去皮尖簿切曬乾甘草切焙零陵香藿香各洗銼曬茅香五靈脂洗去沙土曬各四兩荊芥三兩銼日曬沒藥入白瓦盞內川芎石膏入伏龍肝五兩乃灶下紅土加些不假細末各一兩血竭如無用乳香缽內研細研時口中念元胡索字並是用二兩上件前藥各有過度為末用好酒糊為丸如大梧桐子陰乾磨第一等墨染過入些乳香在墨內亦陰乾甚佳都幹了用葛布袋盛之當風處非但治頭風疼傷寒進飲食大小兒生大血泡瘡並治腫處醋磨貼之治牙痛更治血風有妊婦人不可服莊氏家傳治身生大瘡方黃丹一兩膩粉一錢匕上研勻嚼仁取汁調藥敷之王氏手集治小兒疳熱諸瘡不瘥方魯直上取驢前蹄一隻自瀝水之下燒過為末入少麝香濕敷干油塗吉氏家傳治生下一百二十日內身上或頭上遍身癰癤赤光腫先用鎮心散後用貼腫藥方見急驚風門中吉氏方用同上用蓖麻子不拘多少去殼爛研成膏貼在腫處內自消赤腫結成者貼得破安師傳治小兒熱毒瘡方生硫黃一錢檳榔一兩上同為細末油調敷之立效凡欲用藥先爛搗絲瓜兒罨一宿次日敷貼頭面身體生瘡第五巢氏病源小兒頭面身體諸瘡候臟腑熱盛熱氣衝發皮膚而外有風熱折之與血氣相搏則生瘡其狀初赤起㾦癗後乃生膿汁隨瘥隨發或生身體或出頭面或身體頭面皆有也千金治二百日小兒頭面瘡起身體大熱方升麻柴胡石膏各六銖千金翼各用一兩甘草炙當歸各十二銖大黃十八銖千金翼用三兩黃芩十八銖上七味㕮咀以水四升煮取二升分服日三夜一量兒大小用之千金翼同服外仍多煮此藥洗瘡佳千金治小兒頭面身體悉生瘡方上用榆白皮隨多少曝令燥下篩醋和塗綿以敷瘡上蟲自出亦可以豬脂和塗之千金翼苦參湯主小兒頭面熱瘡方苦參八兩大黃芍藥黃連各三兩蛇床子一升黃芩二兩黃柏五兩菝葜一斤上八味切以水三斗煮取一斗半洗之日三度大良千金云治上下遍身生瘡千金翼又方大黃黃芩黃柏澤蘭礬石石南各一兩戎鹽二兩蛇床子三合上八味切以水七升煮取三升以絮內湯中洗拭之日三度千金翼又方上熬豉令黃末之以敷瘡上不過三愈聖惠以此方治小兒頭面身體有惡氣數起生瘡仍每用先煮桃葉湯洗淨拭乾敷之外臺古今錄驗療小兒面及身上生瘡如火燒方上取黃米一斗末以蜜水和塗之瘥為度外臺古今錄驗又方上以赤地利搗末以粉之佳聖惠以水浸梔子膿汁調赤地利塗瘡外臺廣濟療小兒頭面生熱瘡方黃連八分聖惠用四分蛇床子黃柏各八分胡粉四合聖惠用半兩炒令黃色上四味搗散麻油和塗瘡遍敷之佳聖惠黃連散方同兼治身體生熱瘡若面上瘡以豬脂和塗子母秘錄治小兒面上忽生瘡黃水出上以鯽魚頭燒末和醬清汁敷日易之子母秘錄治小兒頭面身上生諸瘡上燒蛇蛻末和豬脂敷上聖惠治小兒