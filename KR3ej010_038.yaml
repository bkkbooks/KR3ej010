body:
  text: 卷第三十八頭瘡凍痱凡十八門頭瘡第一巢氏病源小兒頭瘡候有腑臟有熱熱氣上衝於頭而復有風濕乘之濕熱相搏折血氣而變生瘡也嬰童寶鑑小兒頭瘡是六陽受熱而為之六陽之脈食在於頭故熱乘於陽不流而為之也千金治小兒一切頭瘡久即疽癢不生痂藜蘆膏方藜蘆黃連雄黃黃芩松脂各二兩豬脂半斤礬石五兩上七味末之煎令調和先以赤龍皮天麻湯洗訖敷之赤龍皮檞木皮是也千金治小兒頭瘡經年不瘥方松脂苦參黃連各一兩半大黃胡粉各一兩黃芩水銀各一兩六銖礬石半兩蛇床子十八銖上九味末之以臘月豬脂和研水銀不見星敷之千金又方上取大蟲脂敷之亦治白禿千金翼治小兒頭瘡方胡粉一兩黃連二兩上二味搗為末洗瘡去痂拭乾敷之即愈發即如前再敷亦治陰瘡千金翼又方胡粉白松脂各二兩水銀一兩豬脂肪四兩上四味合煎去滓內水銀胡粉攪令和調塗之大人亦同聖惠方同仍先以胡粉入少水與水銀同研令星盡用千金翼治小兒熱瘡身頭熱煩蝕瘡方上以梓白皮湯洗之並封敷嫩葉主爛瘡外臺範汪療傷寒白膏摩體中手當千遍藥力乃行並療惡瘡小兒頭瘡牛領馬鞍皆療之先以鹽湯洗惡瘡布拭之著膏瘡腫上摩向火千遍日再自消方天雄烏頭炮莽草羊躑躅各三兩上四味各切以苦酒三升漬一宿作東向露灶又作十二聚濕土各一升許成煎豬脂三斤著銅器中加灶上炊以葦薪為火令膏釋內所漬藥炊令沸下著土聚上沸定頃上火煎如此十二過令土聚盡遍藥成絞去滓傷寒頭痛酒服如杏核一枚溫覆取汗咽痛含如棗核日三咽之不可近目千金同忌豬肉等外臺集驗治小兒頭瘡天麻草湯方天麻草切五升以水一升半煎取一斗隨寒溫分洗小兒頭瘡洗畢敷飛烏膏散方細粉燒硃砂作水銀上黑煙是也熬令焦燥礬石燒粉三兩上二味以絹篩了以甲煎和之令如脂以敷頭瘡日三作散者不須和有汁自著可用散亦敷諸熱瘡黃爛浸淫汁瘡蜜瘡丈夫陰蝕癢濕諸小兒頭瘡疳蝕口邊肥瘡蝸瘡等並以此敷之天麻草葉如麻冬生夏著花亦如鼠尾花外臺救急療小兒頭瘡經年不瘥瘥而復發方雄黃雌黃各研大黃黃柏黃芩薑黃白芷當歸青木香各四分上九味切㕮咀以苦酒浸一宿以豬脂一大升煎候白芷色黃膏成去滓入水銀一兩以唾於手中研令消入膏攪和得於瓷器中收每以皂角湯洗瘡干拭以膏塗之日夜再換以瘥為度外臺古今録驗療小兒頭瘡面上亦有日月益甚者方黃連赤小豆各等分上二味搗末以臘月豬脂和塗之即瘥止子母祕録治小兒頭瘡及女人面瘡方上以菟絲湯洗子母祕録治兒頭上瘡發不生方上以楸葉搗汁塗瘡上發即生兼治白禿子母祕録小兒頭瘡耳上生瘡方上以竹葉燒末和豬脂塗上又以雞子白敷之亦妙子母祕録小兒頭上瘡及白禿髮不生汁出者方上以雞子七個去白皮於銅器中熬和油敷之陳藏器主小兒頭瘡吻瘡耳後月蝕瘡方上甲煎敷之陳藏器治小兒頭瘡癰腫陰㿗方上蒺藜子可作摩粉其葉主風癢可煮以浴之陳藏器本草主小兒頭瘡方上取豬羊膽汁敷之勝金右治小兒頭上生惡瘡方上以黃泥聚豉煨熟冷後取出豆豉為末以純菜油敷之瘥食療治小兒患頭瘡方上燒馬骨作灰和醋敷之亦治身上瘡白禿瘡以駁馬不乏者尿數數暖洗之十遍瘥唐本草注治小兒頭瘡方上生嚼胡麻塗之又嚼白油麻塗之胡麻角作八稜者為巨勝四稜者為胡麻都以烏者為良白者為劣藥性論治小兒頭瘡方上以龜甲燒灰敷之藥性論治小兒頭瘡方上搗蓼葉末和白蜜一雲和雞子白塗上蟲出不作瘢聖惠治小兒頭上生惡瘡方人糞灰狗糞灰豬糞灰皂角灰香豉炒令微焦白礬灰以上各半兩上件藥搗細羅為散每使可瘡以生油調塗之日一易以瘥為度聖惠治小兒頭瘡久不瘥惡汁出不斷方黃連去須黃柏銼白礬燒灰各一兩蛇床子半兩胡粉三分上件藥搗細羅為散以熬成豬脂調如膏日二塗之效聖惠治小兒頭瘡及惡瘡方香豉麻油各二合臭黃半兩蔥白四兩細切上件藥先煎油令熟入香豉等熬令煙出熟搗貼於瘡上以物密裹之效聖惠又方黃連一兩去須吳茱萸生用膩粉杏仁湯浸去皮各半兩麻油一合上件藥搗羅為末入麻油杏仁同研如膏每塗藥時先以鹽漿水洗了拭乾塗於瘡上日二用之聖惠治小兒頭瘡久不瘥青砂散方水銀以少棗肉研令星盡硫黃川椒去目膩粉縮砂去皮各一分竹葉狗頭骨各半兩燒灰上件藥搗細羅為散研入水銀令勻以生油調塗之立效聖惠治小兒頭上生惡瘡及疳瘡軟癤並宜敷胡粉散方胡粉黃連去須水銀點少水入胡粉研令星盡各一兩糯米二十一粒赤小豆十四粒吳茱萸半分上件藥搗羅為末即以麻油和諸藥調勻塗之聖惠治小兒赤瘡渾頭面及胸上作片人不識者宜用水銀膏方水銀松脂各一兩黃柏銼土蜂窠川大黃各一兩半膩粉一分上件藥除水銀膩粉外搗羅為末以煉成豬脂半斤煎成膏似稀麵糊放冷取水銀膩粉於掌中以唾調如青泥然後可入膏中相和攪令勻塗於瘡上不過三兩上瘥聖惠治小兒頭瘡經年不瘥瘥而復發宜用雄黃膏方雄黃雌黃各細研黃柏黃芩薑黃白芷當歸木香各一兩上件藥除雄雌黃外並細銼用頭醋浸一宿以豬脂一斤煎候白芷色赤黃膏成去滓入水銀一兩以唾於掌中研令星盡入膏內攪令勻次入雄黃雌黃等末又攪之用瓷盒盛每使先以鹽漿水洗瘡令淨拭乾以膏塗之聖惠治小兒頭瘡紫草膏方紫草二兩去無色枝幹搗末馬腸根搗末杏仁湯浸去皮研各一兩雄黃細研吳茱萸搗碎各一分清麻油八兩上件藥先以麻油於一淨鐺內煎下杏仁茱萸入於鐺中徐徐煎三兩沸即去火以生絹濾去滓次入紫草馬腸草等末又煎五七沸再濾去滓看膏稀稠得所入雄黃末攪令勻用瓷盒盛每使先以鹽漿水洗瘡令淨拭乾以膏塗立效聖惠治小兒頭瘡及白禿瘡雞子膏方新雞子七枚去殼膩粉半兩麝香一分細研婦人油頭髮一團如雞子大上件藥先將雞子入銚子內熬次下發令消以綿濾過入膩粉麝香攪令勻以瓷盒盛每用先洗淨拭乾塗之聖惠治小兒頭瘡出膿水瘥而復發方豆豉炒微焦鱉甲燒灰各一兩膩粉一分皂角一挺長三寸許燒為灰上件藥搗細羅為散每使以生油調塗上立效聖惠又方杏核一百粒燒灰膩粉一分上件藥細研為散每使以生油調塗之聖惠又方水銀胡粉各半兩黃連末一兩上件藥相和入少水研水銀星盡以生油調塗之聖惠治小兒頭瘡久不瘥方梁上塵五合青礬半分上件藥細研為散每使以生油調塗之聖惠治小兒頭瘡積年不瘥方上取檳榔水磨以紙襯曬乾以生油調塗之聖惠又方上以雞子殼燒灰細研以臘月豬脂和塗之效雞糞炒為末敷之亦佳聖惠又方上取烏梅肉燒灰細研以生油調塗之聖惠又方上以吳茱萸炒令焦細研入膩粉以口脂調塗之聖惠又方上以菖蒲末生油調塗之聖惠治小兒頭瘡及惡瘡及浸淫瘡並宜此方上取生油麻嚼敷之效聖惠治疥癬瘡經年不瘥水銀膏方水銀白礬蛇床子末雄黃䕡茹末各一兩上件藥入煉了豬脂半斤都研候水銀星盡便用敷之日三兩上兼治小兒頭瘡甚良聖惠治頭瘡經年月不瘥松脂膏方黃連四兩去須䕡茹胡粉黃柏銼各一兩上件藥搗羅為末以烏麻油調如膏若小兒先以泔清洗之大人即以泔清皂角洗之然後塗藥不過三上即瘥茅先生治小兒遠年頭瘡方苦楝子十四個杏仁七個上都燒令成灰為末入膩粉生油調塗瘡上嬰孺治小兒頭瘡方巴豆十四個胡粉一棗大水銀四大豆許上取汞粉巴豆研如青脂至赤塗瘡勿近陰及目嬰孺治小兒頭瘡苦參湯洗方苦參黃連甘草大黃當歸芎藭黃芩各一兩蒺藜子四兩上以水六升煮三升沾帛洗瘡上日三嬰孺治小兒頭瘡經年不瘥方松脂六分大黃四分苦參五分上為末臘月豬脂研如膏敷之亦和少水為效嬰孺治小兒頭瘡經年不瘥松脂子母膏方松脂黃連各六分大黃胡粉各四分苦參屋塵水銀蛇床子黃芩各五分礬石二分燒汁盡上為末豬脂研勻敷之嬰濡治小兒遍頭瘡方水銀松脂胡粉各二兩臘月豬脂半斤煉成油上都入銅器中煻火上熟研候汞消盡膏成用敷之更以散子敷黃連末五兩水銀一兩烏賊魚骨三兩炙上研汞盡為末敷膏上亦有用白蘞研汞令消者洗瘡用桃葉煮湯或桃皮狼牙悉佳嬰童寶鑑治小兒頭瘡方頭髮灶上土各彈丸大𩶅魚頭巴豆各一個上件諸藥入魚肚內以一寸甘草塞口中煅過為末更入膩粉油調敷之保生信效治一切風熱瘡尤治小兒頭瘡方瀝青黃蠟各半兩脂麻油一兩巴豆十四粒上先將瀝青黃蠟熬成汁次入油次入巴豆不住攪候巴豆焦黑即去巴豆不用次入膩粉稱二錢再攪極勻放冷敷瘡上政和改元夏豫以干至頴昌驛吏合此藥治其子目睹隨手即愈惠眼觀證茱萸膏治遍身疥瘡及頭瘡方茱萸炒黃連各一兩黃蠟松糖各半兩上將上二味為末將油煎黃蠟松糖入蔥頭一寸共煎候蔥頭赤色取出蔥頭以前二味調勻傾出收之如患者先以蔥湯洗過然後使之不過三五上愈張氏家傳諸小兒多害頭瘡若不治長大遂成禿瘡或有終身無發者方上以肥珠子一兩個獨子者最佳無即不拘存性燒灰用油瓶底濃油腳調塗之不過三兩上永除根本莊氏家傳小兒頭上肥瘡方上以蛇床子炒焦色為末油調敷莊氏家傳小兒頭瘡方緑豆生為末黃連水銀粉少許上為末生麻油調敷莊氏家傳又方上以雞子殼燒灰為末入膩粉油調敷莊氏家傳又方上用狼牙草汁洗敷妙莊氏家傳又方燕窠一個炭火煅黑色膩粉少許上研細生麻油調敷莊氏家傳又方蚯蚓糞炭火煅膩粉各少許上研細先用甘草溫水洗瘡揩乾生油調塗神妙孔氏家傳小兒頭瘡方黃丹膩粉白膠香等分上為末先洗了用油調塗患處孔氏家傳又方上以寒水石燒過研如粉每約寒水石半兩入膩粉三錢水銀一小塊研無星色變青則油調敷之妙王氏手集治小兒頭瘡奶癬方上以馬兜鈴一兩燒灰為末油調入膩粉少許同敷趙氏家傳治小兒頭瘡方馬兜鈴五倍子等分上為末用生油調塗之吉氏家傳治小兒頭瘡惡瘡久不愈者方臭橘葉一握取自然汁不計多少黃柏末五靈脂各二錢輕粉炒一錢匕上件為末同橘油汁調塗瘡上一時之間用黑紙一張摻在頭上待一時取下便有細白蟲在黑紙上吉氏家傳治小兒頭上瘡及疳肥禿瘡方豆豉一合炒焦色白礬半兩煅輕粉一錢上件為末先淨洗瘡削去發用小便一盆將稱錘燒令赤淬入小便中令熱將洗瘡及去瘡上皮血出尤妙用軟物拭乾生油調藥塗之朱司理傳治小兒經年頭瘡神效方鳳尾草豬牙皂角穿山甲各等分上同入火煆存性細研每用一錢入輕粉一錢和勻麻油調先用溫鹽湯洗瘡令淨然後塗之朱氏家傳治小兒頭瘡方上用白礬一塊坯子少許細研帶赤色入燒綿絮一大指大即用少許油調塗立效禿瘡第二千金治小兒禿頭瘡方上取雄雞屎陳醬汁苦酒和以洗瘡了敷之千金翼不用苦酒千金又方上用不中水蕪菁葉燒作灰和豬脂敷之陳藏器治小兒禿瘡方上以藍澱滓敷之聖惠治禿瘡及浸淫瘡方上以苦楝枝並皮燒為灰細研如瘡濕即干敷之如瘡干以豬脂調塗之兼治小兒浸淫瘡等莊氏家傳小兒禿瘡方上以薜荔球燒灰油調敷莊氏家傳又方上用蠶蛾燒灰油調敷之妙莊氏家傳大人小兒禿瘡方上用黃米不計多少用白布作小袋一個盛貯緊實於火內燒為灰然後細研用生油膩粉調塗孔氏家傳治頭禿瘡方守宮一枚蛇蛻同守宮等上以清油煎去二物了以蠟收塗之絶妙白禿瘡第三巢氏病源小兒白禿候白禿之候頭上白點斑剝初似癬而上有白皮屑久則生痂又成瘡遂至遍頭洗刮除其痂頭皮瘡孔如箸頭大里有膿汁出不痛而有微癢時其里有蟲甚細微難見九蟲論亦云是蟯蟲動作而成此瘡乃至自小及長大不瘥頭髮禿落故謂之白禿也唐本草注小兒白禿瘡方雞窠中草白頭翁花上等分燒灰以蠟月豬脂調塗之仍先以酸泔洗然後塗葛氏肘後白禿方上以葶藶搗末以湯洗訖塗上子母祕録小兒白禿瘡頭上瘡團團白色方上以牛屎敷之子母祕録小兒白禿髮不生汁出慘痛方上濃煮陳香薷汁少許脂和胡粉敷上子母祕録小兒白禿瘡凡頭上團團然白色者方上以蒜揩白處早朝使之聖惠治小兒白禿瘡瘥而復生皂角散方皂角二挺燒灰白芨半分黃芩硃砂麝香二味細研黃丹微炒檳榔乾薑燒灰各一分上件藥搗羅為末以濃醋腳調塗之甚者不過三上瘥聖惠治小兒白禿瘡及諸癬松脂膏松脂半兩清油二兩天南星川烏頭去皮臍膩粉各一分黃蠟杏仁湯浸去皮別研如膏各一兩上件藥搗羅為末先取油蠟入於瓷器內以慢火熔之後下諸藥末和攪令勻熬三五沸膏成候冷塗瘡上日再用之聖惠又方蕪荑豆豉各一分川椒二十粒去目上件藥搗如泥以陳醬汁調塗之聖惠小兒白禿瘡痛癢不瘥方桃花三月三日收未開者陰乾赤桑根各一兩上件藥搗細羅為散以臘月豬脂和如膏每使時先以桑柴灰汁淨洗拭乾塗之即瘥聖惠又方細柳枝一握水銀半兩以津研令星盡皂角一挺去皮子上件藥細銼以醋一升煎令濃去滓再熬成膏下水銀攪令勻以瓷盒盛日二塗之聖惠治小兒白禿瘡無發苦癢野葛膏方野葛末豬脂羊脂各一兩上件藥同煎三五沸攪令勻濾去滓盛於瓷器中候冷塗之不過三上瘥聖惠治小兒白禿瘡及疳頭髮連根作穗脫落發不生者宜塗黑豆瀝方黑豆巨蕂子各三合訶黎勒皮一兩上件藥搗羅為末以油水中半拌令勻內在竹筒中用亂髮塞口以煻火燒瀝取膏貯於不津器中每使時先以米泔皂角淨洗然後塗之日二用十日內發生矣聖惠又方巴豆十枚去皮心用紙裹壓去油鹽一塊如栗子大麻油一合上件藥都入乳鉢內研如膏日三度塗之瘥聖惠治小兒白禿瘡發落苦癢黃柏散方黃柏末薰陸香各一兩上件藥細研以生麻油調稀稠得所塗之干即更塗不過四五度瘥聖惠治小兒白禿瘡發不生方上取蔓菁子川烏頭等分燒灰細研以生油和塗之聖惠治小兒白禿瘡久不瘥方上取鯽魚一頭重四兩者去肚腸實填亂髮以濕紙裹燒為灰細研入雄黃末二錢更研令勻每用時以泔清淨洗瘡拭乾以臘月豬脂調塗之生油調亦得聖惠治小兒白禿瘡方上取東引楝木枝銼碎搗羅為末以豬脂和塗之聖惠又方馬腸根一兩銼微炒藜蘆半兩去蘆頭銼炒令焦上搗羅為末每用時先以泔清淨洗瘡拭乾敷之聖惠又方上以梁上塵五兩細研每用時先以皂角湯溫溫淨洗瘡拭乾敷之聖惠又方上以雄雞糞白細研以陳醬汁調塗之嬰孺先以苦酒洗了塗之聖惠又方上以熊脂五兩熔令消塗之聖惠又方上取瓦青衣細研以生油調塗之聖惠又方上以醋泔洗頭後淋蕎麥灰汁再洗之聖惠又方上以葵根燒灰細研敷之聖惠又方上以蛇蛻皮燒灰細研敷之茅先生治小兒白禿瘡及頭瘡方漆𥯃豆豉白礬等分上都入垍器內泥裹燒過研細入輕粉油調塗之長沙醫者丁時發傳治小兒纍年不效白頭爛方石炭以童子小便浸七日又換小便浸之蛇胞子葉陰乾等分上為細末先用白紗子頭上裹定次用鴨卵餅一個在頭上又用白絹裹定良久蟲在紗子上卻去紗絹卵次用藥塗之不過三五上瘥赤禿瘡第四千金治赤禿方上搗黑椹取三升服之日三千金又方上以桑皮汁洗頭搗椹封之日中曝頭睡千金又方上燒牛角灰和豬脂敷千金又方上以馬蹄灰末臘月豬脂和敷之子母祕録療小兒鬼舐赤禿方上以貍屎燒灰和臘月豬脂塗上漏頭瘡第五聖惠治小兒頭瘡晝開出膿夜即復合者宜用此方大附子去皮臍搗羅為末鯽魚長四寸者各一枚葛氏肘後方用鯉魚上件藥將附子末入魚肚中於炭火上炙令焦細研敷瘡上更爛搗蒜於上封之甚良聖惠又方亂髮一團如梨大雞子黃五枚上件藥相和入銚子中以炭火熬令發消以棉濾過用瓷盒盛塗於瘡上萬全方更用膩粉少許外入通前三味聖惠又方上以馬蹄燒灰細研以生油調塗之聖惠又方上以露蜂房燒灰細研以臘月豬脂調塗之聖惠又方上以黑豆一合炒令存性搗羅為末以水調塗之蠼螋尿瘡第六巢氏病源小兒蠼螋繞腰腹候蠼螋蟲長一寸許身有毛如毫毛長五六分腳多而甚細居處屋壁之間云其遊走遇人則尿人影隨所尿著影處人身即應之生瘡世病之者多著腰脅初生之狀匝匝起初結㾦癗小者如黍粟大者如麻豆染漸生長闊大繞腰生膿汁成瘡也千金論曰凡蠼螋蟲尿人影著處便令人病瘡其狀身中忽有處慘痛如芒刺亦如刺蟲所螫後起細㾦癗作聚如茱萸子狀也四邊赤中央有白膿如黍粟亦令人皮肉急舉身惡寒壯熱劇者連起竟腰脅胸也治之法初得之摩犀角塗之止其毒治如火丹法余以武德中六月得此疾經五六日覺心悶不佳以他法治不愈又有人教畫地作蠼螋形刀子細細畫取蠼螋腹中土就中以唾和成泥塗之再塗即愈將知天下萬物相感莫曉其由矣千金治小兒蠼螋咬繞腹匝即死方上搗蒺藜葉敷之無葉子亦可千金又方上取燕窠中土豬脂和敷之干即易之千金治蠼螋尿方上以羖羊發燒灰臘月豬脂和封之千金又方上搗豉封之千金又方上酢和胡粉塗之千金治蠼螋尿瘡方上燒鹿角末以苦酒和敷瘡上聖惠以酒和塗已有汁者燒道旁弊蒲席敷之千金又方上以槐白皮半斤切以苦酒二升漬半日刮去瘡處以洗日五六遍末赤小豆以苦酒和敷之燥復易之小兒以水和千金又方上嚼大麥以敷之日三千金又方上熟嚼梨葉以水和塗燥復易之千金又方上以馬鞭草熟搗以敷之燥則易之千金又方上取茱萸東行根下土酢和塗之聖惠治小兒蠼螋瘡方上取敗蒲扇以水煮濃汁塗之聖惠又方上以扁豆葉搗爛塗之聖惠又方上以生甘草搗末敷之聖惠又方上以梨子嚼汁塗之干則再塗之聖惠又方上以粟子爛嚼塗之聖惠又方上以扁竹汁塗之聖惠又方上生白礬細研以生蔥汁調厚塗之自懸瘡第七王氏手集頃見應天有一小兒項下生瘡常癢痛不幹漸繞項滋長經年不愈有一道人云此名自懸瘡是自縊鬼為祟將繞項周匝能使人頭斷甚可怪也只求自縊人墓上土數合細研隨瘡敷之初用藥不可勝計用此果不纍敷而愈代指第八聖惠夫小兒代指者其指先腫焮焮熱痛其色不黯然後方始爪甲結膿劇者爪甲脫也亦名代甲亦名糟指亦名土灶火爪筋之餘也由筋骨熱盛氣澀不通故結腫生膿而爪甲脫也聖惠治小兒代指腫痛方上用麻黃三兩搗碎以水二碗煎至一碗乘熱略蘸指在其中日十餘遍即愈聖惠治小兒代指逆腫方上以雜毛和黃土作泥泥指上令厚五分內煻灰中暖之令微熱可忍候泥漸漸干即易不過二三度即瘥聖惠又方上以豬脂和曲蟺研敷之數易之聖惠又方上取梅核中仁熟搗以醇苦酒和敷之以瘥即止聖惠又方上取梁米粉鐵鐺中熬令赤以衆人唾和之塗上令厚一寸即消聖惠又方上以小便和鹽作泥厚裹之數易即瘥更用鑱針刺血出最妙手足皸裂第九聖惠夫小兒肌膚軟弱冬時解脫觸冒風寒手足脫肉破故謂之皸裂也千金翼治手足皴裂血出疼痛方上取豬𦚠著熱酒中以洗之即瘥聖惠治小兒入水手足皴裂腫痛血出方上用生胡麻爛搗塗之聖惠又方上以棗煮取肉研細敷之一宿後用甘草湯洗即瘥腳瘃第十聖惠夫小兒腳瘃者是小兒肉嫩外風冷中於足掌中湧泉穴也是兒腳上皮肉間血氣與風邪相感便肉硬血氣不通陽氣不達致使然也聖惠治小兒腳瘃腫硬疼痛宜用沸蘸方川椒二兩鹽一兩上以清酒五升煎取三升頻頻蘸之候冷即住其藥重暖三五七度用之聖惠又方附子一兩乾薑二兩上件藥搗羅為末入於綿中裝襪與兒著之聖惠又方上用豬脂日三二度塗之吉氏家傳方濃煎臘脂塗之凍瘡第十一巢氏病源小兒凍爛瘡候小兒冬月為寒氣傷於肌膚寒氣搏於血氣血氣壅滯因即生瘡其瘡亦焮腫而難瘥乃至皮肉爛謂之為凍爛瘡千金治凍爛瘡方上以豬後懸蹄以夜半時燒之研細篩以豬脂和敷亦治小兒千金翼治冬月冒涉凍凌面目手足瘃壞及始熱疼痛故瘃方上取麥窠煮取濃汁熱漬手足兼洗之三五度即瘥千金翼治手足皴凍欲脫方椒芎藭各半兩白芷防風姜一稱鹽各一分上五味以水四升煎令濃塗洗之三數遍即瘥千金翼治凍傷十指欲墮方上取馬屎三升煮令麻沸漬冷易之半日愈子母祕録治小兒凍瘡方上用雀兒腦髓塗之立瘥孟詵治凍瘡方上取臘日新死者牡鼠一枚油一大升煎之使爛絞去滓重煎成膏塗凍瘡及折破瘡聖惠治小兒凍耳成瘡或癢或痛黃柏散方黃柏白蘞各半兩上件藥搗細羅為散先用湯洗瘡後以生油調塗之聖惠治小兒凍腳成瘡或癢或痛宜用此方小麥半升穰草三握上件藥用醋一升水二升同煮至二升去滓溫如人體洗兩腳夜間頻洗之效聖惠治小兒凍手皴裂成瘡白蘞散方白蘞末三分白芨末半兩生油麻二合生搗上件藥同研令勻更用蒸蘿蔔一個爛研一處以酒調似稀膏先以童子小便洗後便塗之效養生必用凍瘡久不愈方上以馬蘭花子為末煎湯帶熱淋洗張渙治小兒冬月乳母不慎調適為寒氣傷於皮膚搏於血氣令焮腫生瘡難瘥俗呼為凍瘡或偏發耳上手足黃柏膏方黃柏白蘞各末一兩白芨末半兩生油麻二合生搗取汁上件藥同研令勻更用蒸蘿蔔一個一處以好酒一盞爛搗成膏每用少許先以童子小便洗後用藥看患處塗之痱子第十二聖惠夫盛夏之月小兒膚腠開易傷風熱風熱毒氣搏於皮膚則生痱瘡其狀如湯之潑輕者匝匝如粟粒重者熱浸漬成瘡因以為名世呼為痱子也陶隱居療小兒熱痱方上以菟絲子取莖挼汁以浴小兒聖惠治小兒痱子磨破成瘡疼痛宜用止痛生肌赤石脂散方赤石脂黃柏末臘麵茶末各半兩白麵二兩龍腦一分上件藥同研令勻每用綿搵撲於瘡上以瘥為度聖惠治小兒夏月痱瘡及熱瘡葛粉散方葛粉三兩甘草生銼石灰炒各一兩上件藥搗羅為末以綿搵撲於瘡上以瘥為度聖惠治小兒體熱痱瘡滑石散方滑石末三兩白礬灰一兩棗葉四兩上件藥搗羅為末先以溫漿洗瘡後取藥敷之即瘥聖惠又方英粉五兩白龍腦一錢上件藥細研先用棗葉湯洗後以散撲之聖惠治小兒痱瘡熱破痛不止方干藕節末二兩生油麻二合上件藥先搗油麻如膏後下藕節末和別入生蜜調稀稠得所塗於瘡上不過三五度瘥張渙治小兒盛夏之月因汗腠理開疏風熱毒氣客之則生痱瘡其狀如湯潑或紛紛如粟粒俗呼為痱子甚者磨破宜龍腦散方龍腦別研黃柏末各半兩白麵臘麵茶末各二兩上件藥同研勻細每用新綿搵藥撲於瘡上破者敷之以瘥為度赤疵第十三黑疵附巢氏病源小兒赤疵候小兒有血氣不和肌肉變生赤色染漸長大無定或如錢大或闊三數寸是也千金治小兒身上生赤疵方上取馬尿洗之日四五度千金治小兒身上有赤黑疵方上針父腳中取血貼疵上即消千金又方上取狗熱屎敷之皮自卷落千金翼凡人身有赤疵方上常以銀揩令熱不久漸漸消滅瘢痕嬰孺治赤疵方上取生漆點之瘥白駁第十四千金翼治白癜白駁浸淫癧瘍著頸及胸前方上以大醋於甌底磨硫黃令如泥又以八角附子截一頭使平就甌底重磨硫黃使熟夜臥先布拭病上令熱乃以藥敷之重者三度千金翼又方硫黃水銀礬石灶墨上四味等分搗下篩以蔥涕和研之臨臥以敷病上千金翼又方石硫黃三兩附子去皮鐵精各一兩上三味並研搗以三年醋和內瓷器中密封七日以醋泔淨洗上拭乾塗之即愈一兩日慎風千金翼治頭項及面上白駁浸淫漸長有似於癬但無瘡方上以干鰻鱺魚灸脂塗之先拭駁上外把刮之令小慘痛拭燥然後以魚脂塗之一塗便愈難者不過三塗之佳千金翼又方上取生木空中水洗之食頃止千金翼又方上以桂心末唾和敷駁上日三止千金翼又方白芨當歸附子天雄黃芩各一兩乾薑四兩躑躅一升上七味搗篩為散酒服五分匕日三服千金翼灸法五月五日午時灸膝外屈腳當紋頭隨年壯兩處灸一時下火不得轉動漆瘡第十五巢氏病源小兒漆瘡候人無問男女大小有稟性不耐漆者見漆及新漆器便著漆毒令頭面身體腫起隱疹色赤生瘡癢痛是也千金漆瘡方上以生柳葉三斤以水一斗五升細切煮得七升適寒溫洗之日三肘後方云老柳皮尤妙千金又方上以磨石下滓泥塗之取瘥止大驗千金又方上取蓮葉燥者一斤以水一斗煮取五升洗瘡上日再千金又方上以貫衆治末以塗上干以油和塗之即愈千金又方上以羊乳汁塗之千金又方上以芒硝五兩湯浸洗之千金翼塗之千金又方上以礬石著湯中令消洗之千金又方上取七姑草搗封之救急方及聖惠皆搗七姑草和芒硝塗之千金又方上取豬膏塗之千金又方上宜啖豬肉嚼穄谷塗之千金又方上濃煮鼠查葉以洗漆上亦可搗葉取汁以塗之外臺必效療漆瘡方上濃煮杉木汁洗之數數用即除小兒尤佳聖惠治小兒漆瘡四肢壯熱藍葉散方藍葉麥門冬去心川升麻木通銼甘草炙微赤銼茯神各半兩犀角馬牙硝各三分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫量兒大小分減服之聖惠又方木通銼川升麻木防己各一分川大黃銼碎微炒川朴硝各一分桑根白皮半兩銼上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓放溫量兒大小分減服之聖惠又方垂柳枝五兩苦參二兩黃連一兩去須上件藥細銼以水三升煎至半升去滓入墨末一合攪令勻熬成膏以瓷合盛候冷塗於瘡上聖惠又方上濃煎蔓青湯看冷熱洗之聖惠又方上取蟹二枚生者爛搗以水二合同絞取汁塗之雞峰方末自死蟹水煎洗之聖惠又方上以糯米嚼令爛塗之聖惠又方上以茅香漬汁頻洗之聖惠又方上用小麥曲搗末以雞子白和塗之聖惠又方上用馬屎洗之聖惠又方上以薤白生搗如泥塗之煮汁洗之亦佳聖惠又方上濃煎黃櫨湯看冷熱洗之聖惠又方上以菜子油塗之聖惠又方上濃煎新糜帚湯看冷熱洗之聖惠又方上搗韭汁塗之張渙化毒散方治男女有稟性不耐漆者見生漆及漆器便著毒生瘡癢痛木通銼一兩麥門冬去心藍葉各半兩犀角屑甘草炙微赤銼馬牙硝各一分上件藥搗羅為粗散每服一錢以水一小盞煎至五分去滓放溫服量兒大小加減張渙又方柳杖膏垂柳枝五兩苦參二兩黃芩一兩上件藥細銼為粗末每用三匙頭以水二碗煎至一碗濾去滓研入好墨半匙頭攪令勻再熬成膏以瓷合盛候冷每用少許塗於瘡上張鋭雞峰方治漆瘡上以蓬莪朮為細末每一兩以水五盞煎至二盞去滓洗之張鋭雞峰又方上以桂去皮油調塗之金瘡第十六巢氏病源小兒金瘡候小兒為金刃所傷謂之金瘡若傷於經脈則血出不止乃至悶頓若傷於諸臟俞募亦不可治自余腹破腸出頭碎腦露並亦難治其傷於肌肉淺則成瘡終不慮死而金瘡得風則變痙千金翼療金瘡方上以石灰上血大效若五月五日采蘩蔞葛葉鹿活草槲葉芍藥地黃葉蒼耳青蒿葉令搗石灰為團如雞卵曝乾末以療瘡生肌大神驗鹿活草天名精也千金翼桃仁湯主金瘡瘀血方桃仁五十枚去皮尖及雙仁虻蟲去翅足熬水蛭熬各三十枚大黃五兩桂心半兩上五味切以水酒各五升煮取二升服一合日三服明日五更一服千金翼金瘡內漏方上還自取瘡中血著杯中水和盡服愈千金翼金瘡腹中有瘀血二物湯方大麻仁三升蔥白二七莖上藥使數人各搗令熟著九升水中煮取半頓服之若血去盡腹中有膿血更令服之當吐膿血耳千金翼金瘡內漏血不出方上以牡丹為散服三指撮五日尿出血千金翼金瘡方上取馬鞭草搗篩薄瘡一宿都瘥冬用干葉末千金翼治金瘡出血多虛竭內補散方蓯蓉芍藥當歸芎藭乾薑人參黃芩厚朴炙桑白皮吳茱萸黃耆桂心甘草炙各一兩蜀椒三分去目及閉口者上十四味搗篩為散飲服方寸匕日三千金翼治金瘡煩滿方上用赤小豆一升以苦酒浸之熬燥復漬之滿三度色黑治服方寸匕日三千金翼治金瘡苦不瘥方上用白楊木白皮熬令燥末服方寸匕日三服又以末敷瘡中即愈千金翼治金瘡刺痛不可忍百方不瘥方上以蔥一把水三升煮數沸漬瘡即止千金翼治金瘡煩痛大便不利方大黃黃芩等分上二味搗篩為末煉蜜和丸先食飲服如梧子七丸日三千金翼金瘡方上以桑白皮裹令汁入瘡中或石灰封並妙千金翼凡金瘡出血必渴當忍啖燥食不得飲粥及漿犯即血出殺人凡白血不止方上粉龍骨末於瘡上立止千金翼又方上割取人見著鞋上有斷乳十枚布瘡上立止千金翼又方上末雄黃敷瘡當沸汁出即瘥千金翼又方上刮具子末服一錢匕千金翼又方上煮葛根食之如食法勿令多千金翼凡金瘡深不用早合方上若合則以滑石末粉則不合千金翼金瘡止血散方釣樟根三兩當歸芎藭乾地黃續斷各一兩鹿茸半兩炙龍骨二兩上七味搗篩為散以敷血即止酒服一錢匕日五夜三千金翼金瘡腸出令入方磁石燒滑石各三兩上二味搗細篩為散白飲服方寸匕日五夜二三日當入千金翼治刀斧所傷及冷瘡牛領馬鞍瘡方續斷松脂各一兩鹿角牛骨腐者亂髮燒各二兩上五味搗篩細為散以豬脂半斤並松脂合煎令和下鐺於地上攪令冷凝用之瘡有汁散敷之千金翼金瘡煩悶方白芷芎藭甘草炙各二兩上三味熬令變色搗篩為散水服方寸匕日五夜二千金翼續斷散主金瘡筋骨續絶方續斷三兩半蓯蓉薄切酒浸一首令乾芎藭當歸各一兩半細辛半兩附子炮去皮乾薑蜀椒汗去目閉口者桂心各三分蛇銜草乾地黃各二兩芍藥人參甘草炙各一兩上十四味搗篩為散酒服方寸匕日三夜一千金有地榆古今録驗又有杜蘅千金翼澤蘭散主金瘡內塞方澤蘭防風蜀椒去目閉口者汗石膏乾薑附子炮去皮細辛辛夷芎藭當歸各半兩甘草一兩炙上十一味搗篩為散酒服方寸匕日三夜一膿多倍甘草渴加栝蔞半兩煩熱加黃芩半兩腹滿短氣加厚朴三分瘡中瘀血更加辛夷半兩寶童方治諸般傷損花蕊石一斤硫黃一兩上件用瓷合盛白芨粉水調固縫然後以鹽泥固濟火內燒一日一夜取出火氣研細用治瘡凡貓犬所傷及有損用摻之吉氏家傳金鐵傷血不止方石灰一兩雞子一個打破和黃上二味拌和作餅子燒之令煙絶再研細每日摻之湯燙火燒第十七聖惠凡小兒被湯潑火燒者初時慎勿以冷物及井下泥及尿泥並蜜塗塌之其熱氣得冷即卻深搏至入筋骨爛也所以人中湯火後筋喜攣縮者良由此也千金治火燒瘡方上以死鼠頭一枚臘月豬膏煎令消盡以敷干即敷瘥不作瘢神效亦治大人火瘡千金又方上用丹參無多少以羊脂豬髓腦煎塗之無瘢神良千金治湯沃人肉爛壞方杏仁附子各二兩甘草一兩羊脂五兩松脂雞子大上五味㕮咀以不中水豬膏五兩煎塗之千金翼火燒瘡方上取新牛屎承熱塗之千金翼又方上燒桃葉鹽和煮作湯洗之千金翼又方上以醬汁塗立愈千金翼又方上以桑皮灰敷干則易千金翼又方上以井底清泥塗之佳千金翼又方上以青羊髓塗之佳無青羊白黑羊亦得千金翼治灸瘡及湯火所損晝夜啼呼不止兼滅瘢方羊脂松脂各半兩豬脂蠟各一分上四味於松明上以小銚火燒豬脂等皆消以杯承取汁敷之松明是松木節也千金翼治火瘡方柏白皮半兩竹葉一兩甘草二兩上三味以豬膏一斤煎三沸三上三下藥成去滓待冷塗之集驗有地黃四兩圖經治湯溫火燒方上以側柏葉入臼中濕搗令極爛如泥冷水調作膏以治大人及小兒湯湯火燒塗敷於傷處用帛子系定三兩日瘡當斂仍滅瘢北夢瑣言孫光憲家婢抱小兒不覺落炭火上方上便以醋泥敷之無痕良方亦載此說子母祕録治小兒湯火瘡方上水煮大豆汁冷塗上數易瘥無斑聖惠治小兒卒被湯潑火燒苦劇大麻子膏方大麻子一合柏白皮白芷甘草梔子仁各一兩上件藥細銼以豬脂一斤煎白芷色黃為度以綿濾去滓盛於瓷器中候冷塗於瘡上日三四度用之聖惠治小兒被湯潑火燒赤痛生地黃膏方生地黃甘草苦竹葉各一兩柏白皮二兩上件藥細銼以豬脂一斤煎令地黃色黑以綿濾去滓盛於不津器中候冷日三度塗之聖惠治小兒火燒瘡敗壞宜用羊髓膏方羊髓一斤柏白皮生地黃蛇銜草黃芩梔子仁苦竹葉各一兩上件藥細銼先以鐺中煉羊髓令沸次下諸藥同煎候地黃色黑為度以綿濾去滓傾於瓷器中候冷塗於瘡上日三度用之聖惠治小兒湯火瘡白膏方白松脂白蘞白芨定粉各半兩乳香一分清油二合黃蠟一兩上件藥搗羅為末先以油入瓷鍋內用慢火熬令香下蠟令熔次下諸藥末不住手攪熬成膏以瓷盒盛候冷日三四度塗之聖惠又方柏葉梔子仁各一兩胡粉半兩上件藥搗羅為末以羊髓五合入鐺中於微火上化之後下諸藥末不住手攪熬成膏盛於不津器中候冷塗之以瘥為度聖惠又方白礬二兩燒灰梔子三七枚燒令煙盡為度上件藥細研為散以雞子白調塗之聖惠又方上用柏白皮半斤細銼以豬脂五兩入銚子內與柏白皮同煎焦黃色取下綿濾去滓內入瓷閣中候冷塗之聖惠又方上用丹參搗末以羊脂和敷之聖惠又方上用死鼠一枚以清油一升煎令黑焦去滓日三度塗之聖惠又方上以榆白皮嚼熱塗之聖惠又方上用梔子仁以水浸汁日五六度塗之聖惠又方上用菰蔣根去土燒灰細研以雞子白和塗之聖惠又方上用柳白皮細銼半斤以豬脂一斤相和煎候柳皮黑去滓放冷日三塗之聖惠又方上用雄黃末以醋調塗之聖惠又方上用浮萍草搗末以溫水調塗之聖惠又方上初被湯火所傷便取狗毛碎剪消膠和之遍塗於瘡上以帛封之一封以至痂落更不易之亦之不痛甚良聖惠又方上以粟米熬令焦投水中卻漉出爛研敷之效聖惠又方上用黍米煮粥以雞子白和敷之聖惠又方上以乳頭香水研薄薄塗之聖惠治小兒卒被湯潑方上用牛皮膠以漿水同入瓷器內慢火煨令化厚塗之立瘥養生必用湯火傷妙方上以蛤螭殼火燒令通赤放冷研為末生油調塗藥至如冰不作瘢一方云無蛤螭殼細蛤粉亦可養生必用又方上以水調白麵掃上養生必用又方萆麻子去皮蛤粉等分上研如膏湯傷用油調塗火傷用水調塗嬰孺治小兒湯火瘡柏皮膏方生柏皮生槐白皮各切三合生地黃汁生蛇銜各八分梔子仁六分甘草黃柏各四分上切以豬脂一升半小火上煎為膏去滓敷之嬰孺又方上以柏葉火燒為末冷水和敷之乳母忌口無瘢嬰孺又方上以蜜塗之五七張渙治小兒偶被湯潑火燒麻子膏方大麻子柏木白皮香白芷甘草生地黃各一兩上件搗為粗末以豬脂八兩熔熬藥色黃成膏以綿濾去滓盛於瓷器中候冷每用少許塗患處張鋭雞峰方治湯火燒上以風化石灰清油調塗之張鋭雞峰又方上以蕎麥麵炒焦冰水調塗之或入油少許尤妙聚寶方治火燒瘡上以干牛糞燒灰細研生油調塗之仍無瘢痕王氏手集治小兒湯湯火燒方雞子白一個蔥一條煨熟去皮蛤粉一棗大上研極細塗燒湯處便不成瘡有瘡者亦無瘢吳氏家傳凡湯火傷人小兒痛苦之方出多門如醋磨大黃等方具載與冊謂出神授用輒不驗自得此方常試甚妙人有自頂至踵為熱油所中者急以塗敷隨手無纖恙其間有點星塗敷遺漏處輒起紅泡糜爛經月不瘥可知塗敷所及一何妙也湯火方上以一熔銀或金敗鍋子推出火次數絶多者為上才被傷即以冷水急於石上磨汁重重塗敷不見赤痕即止次日任其自干脫剝是驗長沙醫者鄭愈傳治小兒湯湯火燒方寒水石煅乾山藥螺兒青各等分上件藥為末如燒湯著用蜜調塗瘡上即時見效瘡中風中水第十八千金治瘡因風致腫方上以櫟木根皮一斤濃煮內鹽一把漬之千金治破傷風腫方上厚塗杏仁膏燃麻燭遙灸之千金凡因瘡而腫痛者皆中水及中風寒所作其腫入腹則殺人治之方上以溫桑灰汁漬冷復溫之常令熱神祕千金治瘡中水腫方上以炭白灰胡粉等分脂和塗瘡孔上水出則痛止
