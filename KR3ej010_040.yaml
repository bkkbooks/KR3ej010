body:
  text: 卷第四十論藥敘方凡十五門玉石部第一丹砂一名真朱雲母楊損之云黑者不任用害人石鐘乳本草云不煉服之令人怵朴硝本草云色黃者傷人赤白者殺人滑石雷公云色似冰白青色畫石上有白膩文者方使余色者有毒殺人石膽一名膽礬綠青一名石碌黃鹽陶隱居云北海鹽黃草粒粗以作魚鮓及咸菹石亭脂俗以生硫黃中揀出色赤黃者以為石亭脂水銀一名汞陶隱居云燒時飛著釜上灰名汞粉俗呼為水銀粉凝水石一名寒水石色如雲母可折者良鐵爇陳藏器云以竹木爇火於刀斧刃上燒之津出如漆者是也方中雲鐵上燒取㶆者即此也鐵華粉一名鐵衣方中或云鐵焰粉鐵印粉鐵精粉鐵粉皆此粉也光明鹽一名石鹽伏龍肝一名灶心土或云灶底黃土釜下土釜月下土皆此土也礬石本草云不煉服則殺人鐺墨一名釜底煤或名釜墨或稱為是百草霜今鍋底煤亦云粉錫一名胡粉一名定粉又名光粉或云南粉英粉韶粉或用燒粉家洗甕水皆此粉也戎鹽本草云西羌北地酒泉福祿城東南角北海青南海赤又陶隱居云河南鹽池自有凝鹽如石片打破皆方青黑色故今言青鹽者亦或以為戎鹽大鹽唐本注云即河東印鹽也白堊一名白善日華子云入藥燒用方中或云白繕土白土畫粉皆此土也金牙日華子云入藥並燒淬去粗汁乃用井泉石本草云用之當細研為粉不爾使人淋草部第二茺蔚子一名益母草獨活一名羌活陶隱居云羌活形細而多節軟潤氣息猛烈獨活色微白形虛大薯蕷一名山藥澤瀉扁鵲云多服病人眼昏遠志本草云葉名小草赤箭唐本注云芝類也故方中或云赤箭芝蘼蕪本草云芎藭苗也黃耆一名蜀脂決明子一名馬蹄決明又名草決明旋花一名鼓子花蘭草一名都梁香蛇床子日華子云入服食藥即挼去皮殼取仁微炒殺毒用地膚子唐本注云田野人名為地麥草景天一名慎火或名護火草茵陳蒿一名山茵陳杜若一名杜蘅葈耳實一名常思或名蒼耳俗呼為道人頭當歸雷公云破血使頭節止血止痛用尾節麻黃陶隱居云根節止汗沫令人煩蠡實一名馬藺子白芷本草云葉名蒚音歷麻可作浴湯淫羊藿一名仙靈脾黃芩丸者名子芩白蘚皮一名白羊鮮石韋本草云用之去黃毛微炙惡實一名牛蒡子又名鼠黏子王瓜根一名土瓜根陳藏器云有小毒宜少進之防己本草云文如車輻理解者良唐本注云其青白虛軟者名木防己蘹香子一名茴香子一名土茴香補骨脂一名破故紙俗以為蕃韭子也零陵香一名薰草積雪草一名連錢草烏頭一名烏喙其汁煎之名射罔草蒿一名青蒿鉤吻一名野葛射干一名烏扇一名烏翣蛇合合音含一名蛇銜蜀漆本草云常山苗也雚菌一名雚蘆澤漆本草云大戟苗也貫眾一名管仲牙子一名狼牙商陸一名章陸一名章柳方中或名中庸唐本注云有赤白二種白者入藥赤者見鬼神甚有毒但貼腫外若服之傷人乃至痢血不已而死菰根一名菰蔣草萹蓄一名萹竹豨薟一名火杴草白頭翁一名野丈人鬼臼一名馬目毒公陶隱居云馬目毒公如黃精根臼處似馬眼而柔潤鬼臼似射干木輩有兩種然二藥實一物也女青本草云蛇銜根也蛇莓一名蛇胞子赤地利一名山蕎麥蚤休一名紫河車烏蘞莓一名五葉莓蒲公草一名鳧公英或名僕公英昨葉荷草一名瓦松屋遊一名瓦青衣即瓦屋上青苔衣也草三稜一名雞爪三稜木部第三牡桂一名桂枝桂枝者桂條非身干也松脂松黃松脂一名松糖或名歷青松黃即松香枸杞一名地骨一名西王母杖五加皮一名豺漆楓香脂一名白膠香雞舌香一名丁子香桑根白皮桑耳本草云桑根白皮出土上者殺人桑耳一名桑菌又名桑黃梔子一名越桃皮薄而丸小者入藥用其大而長者不堪入藥紫䤵䤵𨥥𨥥音礦騏驎竭一名血竭本草云二物大同小異別本云二物同條功效全別紫葳本草注云即凌霄花也胡桐淚一名胡桐律胡或作梧白棘一名棘針圖經云有鉤直二種直者入補藥鉤者入癰腫藥仙人杖本草云此是筍欲成竹時立死者色黑如漆衛矛一名鬼箭大腹孫真人云鴆鳥多棲此樹上宜先酒洗仍以大豆汁洗方可用伏牛刺一名隔虎刺救月杖中草云此即月蝕時救月擊物木也蜀椒本草云口閉者殺人楝實一名金鈴子或名川楝子郁李仁一名車下李莽草本草云用沐勿令入眼無石子一名沒石子又名墨石子雷丸本草云赤者殺人日華子云入藥炮用槲皮葛洪謂之赤龍皮鼠李一名牛李小蘗一名山石榴赤瓜木一名鼠查榼藤子一名象豆日華子云入藥炙用蔓椒一名豬椒人部第四黃龍湯陶隱居云別塞空罌口內糞倉中積年得汁甚黑而苦名黃龍湯日華子云臘月截淡竹去青皮浸滲取之獸部第五白膠一名鹿角膠羚羊角陶隱居云真者耳邊聽之集集鳴者良也犀角本草注云凡見成犀物皆被蒸煮又有㹀犀並不堪藥用㹀犀文理細膩斑白分明虎骨虎膏虎膽虎睛陳藏器云凡中毒自死者勿使傷人貍骨貍屎唐本注云家貍亦好一名貓也震肉本草云此畜為天雷所霹靂者是膃肭臍圖經云取置睡犬傍其犬忽驚跳苦狂者真禽部第六雄雀屎一名白丁香燕屎陳藏器云慎勿入口毒人伏翼一名蝙蝠又名仙鼠天鼠屎一名夜明砂蟲魚部第七龜甲本草云勿令中濕日華子云卜龜鑽遍者名敗龜桑螵蛸本草云蟷蜋子也用當火炙不爾令人泄以桑上者好海蛤一名魁蛤細如巨勝潤澤光淨又別有一種魁蛤形似紡軖音狂小狹長外有綜橫文理與此海蛤一名魁蛤者為異烏賊魚骨一名海螵蛸白殭蠶本草云直者佳中暑即有毒石龍子一名蜥蜴一名蠍虎一名守官又名壁宮子蝦蟆一名蟾蜍或名蟾又大者名田父白頸蚯蚓一名地龍蚺蛇膽本草注云取如粟著水中浮游行走者真其多著亦沉散蛇蛻藥性論云白如銀色者良蠮螉一名土蜂蜈蚣本草云赤頭足者良日華子云入藥炙用水蛭陳藏器云此物雖加火炙得水猶活日華子云修制須細銼後用微火炒令色黃乃熟不爾入腹生子為害斑蝥日華子云入藥除足羽熟炒用生即吐瀉人余修制見芫青條地膽一名蚖青一名青珪修制見芫青條芫青圖經云凡用斑蝥芫青地膽當以糯米同炒看米色黃黑即為熟便出之去頭足翅羽更以亂髮裹之掛屋東榮一宿然後用之即去毒矣貝子一名貝齒雀甕一名棘剛子一名天漿子或名雀兒飯甕白花蛇圖經云頭尾一尺內有大毒尤甚可不用蜣螂本草云臨用當炙勿置水中令人吐蠍本草云緊小者名蛜𧌴良螻蛄陶隱居云腰以前甚澀腰以後甚利鯪鯉甲一名穿山甲鼠婦一名濕生蟲陶隱居云鼠在坎中背則負之故又名鼠負衣魚一名白魚又名衣中白魚今人亦呼為壁魚果部第八豆蔻一名草豆蔻俗亦呼為草果子枇杷葉藥性論云用須火炙拭去毛桃裊一名桃奴是實著枝不落實中者杏仁本草云雙仁者殺人米部第九胡麻一名巨勝葉名青蘘小麥奴陳藏器云麥苗上黑黴是也醋一名苦酒腐婢本草云小豆花也罌子粟一名御米菜部第十蕪菁一名蔓菁石胡荽一名鵝不食草香薷一名香柔或名香戌本草雖無而人可識者第十一西壁土西壁上土取夕陽久照受日氣之多胞衣瓶中水胞衣在瓶中久年而化為水蟬蚷蟬蛻前二足為蚷救月蝕鼓皮月蝕之夜撾鼓救月其鼓皮可以為藥釜月下灰釜月釜耳也勞水再三揚之使力乏為勞水如敗車輻之為勞辛水也苦鱉魚今黃姑魚中有頭大而鯿生赤黑斑者減杖花似紅木香生紅花漸白而微香其木有刺人呼為野薔微花獨角仙林木上多有之似夾豉蟲而獨角色黑而粗硬可畏鴟鴞翩彼飛鴞集於泮林鴟鴞惡鳥也俗呼作木兔又呼為禿梟籧篨苕帚也地尾人以車前草為地尾草烏牛葹草烏牛食草而葹之者土狗子形似螻蛄本草既無而人未識者第十二皮巾子托胎或云是今羊托胎乳釜魚灶橫麻花消海附子龍骨草根黃皮瘑子鹿活草山矍麥大莓草狗蟲窮賊子石地松獨腳瓜山槐土消花鈴石紫金粉靈石紫龍水赤消羊消花魚茗子前代方書第十三黃帝內經素問黃帝與歧伯鬼臾區輩問難之書顱囟經世傳為黃帝之書至周穆王時師巫得之於崆峒洞今不可考石壁經或傳以為黃帝時書疑未必然得之湘陰士人朱中立不倚金匱要略後漢張機作機字仲景前此其書未出至國朝翰林學士王洙在館閣日於蠹簡中得之華佗九候後漢華佗撰佗字元化沛國譙人葛氏肘後晉葛洪撰洪字稚川丹陽句容人今書三卷按晉史本傳云肘後要急方四卷此論莫究其所從出世言龍木王菩薩之書玉訣三十六種四十八候玉訣太元真人撰三十六種四十八候皆托以神仙所傳不知其果為何人得之長沙諸醫近世方書第十四聖惠方國朝太宗皇帝太平興國中編聖濟經國朝徽宗皇帝御製太醫局方朝奉郎尚書庫部郎中陳師文等編證類本草唐慎微纂傳其書者失其邑里族氏良方眉山蘇子瞻夢溪沈存中所論方書活人書奉議郎致仕朱肱字翼中撰養生必用初虞世紹聖中編嬰童寶鑑太湖釣叟棲真子撰茅先生方少室山無夢茅先生方博濟方太原王袞撰靈苑方本方不載所作人姓名漢東王先生方本方不載名字萬全方劉元賓撰元賓字子儀號通真子主邵州邵陽縣簿錢乙方太醫丞錢乙之書乙字仲陽汶上人保生信效閻孝忠編孝忠字資欽許昌人傷寒證治信陽太守王寔編張渙方張渙編總方四百二十道長沙小兒醫立松年又得遺方數十首分載諸門全生集宋道方撰道方字義叔拱州人譚氏殊聖洪農譚永德撰永德沛國下邳人旅舍備急方瘡疹論二書皆隱士董汲撰汲字及之東平人丁左藏方西京左藏庫使丁信臣九籥衛生宗室右監門衛大將軍忠州防禦使士紆編劉洙瘡疹訣彭城劉洙撰洙字道源雞峰備急蜀醫張銳編銳字子剛楊大鄴方翰林待詔楊大鄴方得之今湖北範運使家藏惠眼觀證宜黃戴師憫術翰林醫學梁逢堯撰得之前宗正丞葵衛子周家藏嬰孺方此方得之湖南撫干向澹伯海云相傳出於秘閣凡一十卷近崇文總目求遺書有兩嬰孺方卷目皆同亦不載所作之人脈法要略膏肓灸法莊氏家傳叄書皆前知筠州莊公手集得之其子監潭州都作院念祖泉伯鳳髓經飛仙論寶童方聯珠論保信論惠濟歌吉氏家傳七書皆得之前岳州平江令吉撝之謙伯家藏上六書並不載所作之人內吉氏家傳乃謙伯手集之方聚寶方不載所作之人得之長沙醫工鄭愈五關貫真珠囊不載所作之人得之長沙醫工毛彬士大夫家藏第十五張氏家傳知撫州張徽猷家藏方孔氏家傳孔參議家藏號東家方陳防禦家傳湖南陳路鈐家藏方吳氏家傳湖南運干吳兗魯山家藏方趙氏家傳江西運干趙栩季羽家藏方睢陽王氏家傳前潭州簽判王昇伯陽家藏方董氏家傳知潭州醴陵縣董瑛堅老家藏方陶氏家傳知潭州善化縣陶定安世家藏方朱氏家傳潭州司理參軍朱如山季高家藏方班防禦方京師醫官胡氏家傳長沙士人胡晰然明家藏方朱氏家傳朱不倚家藏方安師所傳方建安僧惠安所傳方相漹易忠信李剛中丁時發王兊丁安中劉之才丘松年毛彬鄭愈蕭景仁所傳方十一家皆長沙醫工或醫者之子所傳方劉氏家傳旦先公太中所傳並平日手抄之方
