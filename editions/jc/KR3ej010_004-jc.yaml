body:
  text: 卷第四形初保者凡二十二門小兒胎教第一聖濟經原化篇扶真翼正章曰泥在鈞金在熔惟陶冶所成子之在母豈無待而然耶蓋專精孕氣大鈞賦形有人之形不能無人之情彼其視聽言動好憎欲惡雖冥於隱默之中而美惡特未定也善母道者引而發之若為之訓迪若為之挑達彼將因物而遷因形而革有不期然而然者故示以賢人君子使之知所以好德示以禮法度數使之知所以制心揚之以聲音之和則若琴瑟鐘鼓者欲其厭足於耳作之以剛毅之氣則若犀象軍旅者欲其感動於目觀圭璧珠玉則取夫陰陽之至精誦詩書箴誡則取夫言語之至正以至調心神和情性戒喜怒節嗜欲是皆因物隨感有益於得者也若乃人有殘廢物有醜惡鳥獸之有毒怪者則欲其勿見若形有不全割有不正味有異常者則欲其勿食是又防閒忌慎無所不用其至夫其在母也如此則居然而生明智面忠厚端莊而好德美好而壽考無足怪矣是謂外象而內感也昔大任之妊文王目不視惡色耳不聽淫聲口不出傲言而世傳胎教者以此聖惠論曰至精才遇一氣方凝始受胞胎漸成形質子在胎內隨母聽聞所以聖賢傳乎胎教凡妊娠之後才及月餘則須行坐端嚴性情和樂常處靜室多聽美言令人講讀詩書陳說禮樂玩弄珠玉按習絲篁耳不入其非言目不觀於惡事如此則男女福壽敦厚忠孝自全若虧此儀則男女或多狼戾及壽不長斯乃聖人胎教之道為人父母可不行乎小兒初生將護法第二聖濟經慈幼篇保衛鞠育章曰五行孕秀有春夏秋冬異宜者五形有殊相也陰陽委和有筋骨氣血不同者五態有殊氣也夫始生而蒙衝和均稟五行陰陽形態潛異蓋母氣胎育有盛衰虛實其在子也因有剛柔勇怯之異是以嬰兒初舉汙穢欲其盪滌不足欲其輔翼沖和欲其保全如惡血未納拭以綿指吞而在胸膈者吐以甘草入而在腹中者利以黃連汞粉皆所以革汙穢也啼聲不發呵臍以溫之甚者灸焫以攻之皆所以助不足也衛顱囟之天杜風池之邪浴之以通血脈哺之以助穀神皆所以養沖和也三者保子之常法然同為吐利而吐利有輕重同為灸焫而灸焫有多寡或先吐利必使汙穢畢除或先灸焫必使疾疢不作然後真氣自育彼其緩急先後之序隨時變通不可泥於一曲也前世之書執小兒氣盛之論者不知陽中有陰而專於吐利執河北關中地寒之論者不知南北之異而專於灸焫或以謂六歲為兒而嬰孺之病無承據不知榮衛血氣有生皆全也或以謂小兒脈候多端與老壯有殊不知臟腑呼吸有形皆同也通識之士必察剛柔勇怯之所以異視其汙穢無憚於吐利視其虛弱無憚於灸焫審乎五形適以寒溫之宜審乎五態導以陰陽之平病之輕重緩急隨證以治之不必蔽於難治也脈之長短遲速因形以別之不必拘於至數也明乎此則慈幼之道其庶乎巢氏病源小兒始生肌膚未成不可暖衣暖衣則令筋骨緩弱宜時見風日若都不見風日則令肌膚脆軟便易損傷皆當以故絮著衣莫用新綿也天和暖無風之時令母將抱日中嬉戲數見風日則血凝氣剛肌肉硬密堪耐風寒不致疾病若常藏在幃帳之內重衣溫暖譬如陰地之草木不見風日軟脆不任風寒又當薄衣薄衣之法當從秋習之不可以春夏卒減其衣不則令中風寒從秋習之以漸稍寒如此則必耐寒冬月但當著兩薄襦一復裳耳非不忍見其寒適當佳耳愛而暖之適所以害也又當消息無令汗出汗出則致虛損便受風寒晝夜寤寐皆當慎之其飲食哺乳不能無痰癖常當節適乳哺若微不進切當將護之凡不能進乳哺則宜下之如此則終不致寒熱也又小兒始生生氣尚盛無有虛勞微惡則須下之所損不足言及其愈病則致深益若不時下則成大疾疾成則難治矣其冬月下之難將護然有疾者不可不下夏月下之後腹中常當小脹滿故當節哺乳將護之數日間又哺哺之當令多少有常劑兒稍大食哺亦當稍增若減少者此是腹中已有小不調也便當微將藥勿復哺之但當乳之甚者十許日輕者五六日自當如常若都不肯食哺而但飲乳者此是有癖為疾重要當下之不可不下不下則致寒熱或吐而發癇或致下痢此皆病重不早下之所為也則難治先治其輕時兒不耗損而病速除矣小兒所以少病癇者其母懷娠時時勞役運動骨血則氣強胎養盛故也若侍御多血氣微胎養弱則兒軟脆易傷故多病癇兒皆須著帽項衣取燥菊花為枕枕之兒母乳兒三時摸兒項風池若壯熱者即須熨使微汗微汗不瘥便灸兩風池及背第三椎第五椎第七椎第九椎兩邊各二壯與風池凡為十壯一歲兒七壯兒大者以意節度增壯數可至三十壯惟風池特令多十歲以上可百壯小兒常須慎護風池諺云戒養小兒慎護風池風池在頸項筋兩轅之邊有病乃治之疾微慎不欲妄針灸亦不用輒吐下聖惠乃云立夏後疾慎不欲妄針灸亦不欲輒吐下所以然者針灸傷經絡吐下動腑臟故也但當以除熱湯浴之除熱散粉之除熱赤膏摩之又以臍中膏塗之令兒在涼處勿禁水漿常以新水洗新生無疾慎不可逆針灸逆針灸則忍痛動經脈因喜成癇河洛間土地多寒兒喜病痙其俗生兒三日喜逆灸以防之又灸頰以防噤有噤者舌下脈急牙車筋急其土地寒皆決舌下去血灸頰以治噤江東地溫無此疾古方既傳有逆針灸之法今人不詳南北之殊便按方用之多害於小兒是以田舍小兒任自然皆得無此天又云春夏決定不得下小兒所以爾者小兒腑臟之氣軟弱易虛易實下則下焦必虛益上焦則熱熱則增痰痰則成病自非當病不可不下也千金翼聖惠及諸家方書皆以此為宗本其議論略有不同者皆見於後千金論生兒宜用其父故衣裹之生女宜以其母故衣皆勿用新帛為善聖惠云新綾絹衣不可令衣過厚千金翼又於厚字下有一熱字令兒傷皮膚害血脈發雜瘡而黃兒衣綿帛特忌厚熱慎之慎之聖惠論凡小兒一期之內造兒衣裳皆須用故綿及故帛為之不得以綿衣蓋於頭面冬天可以裌衣蓋頭夏日宜用單衣皆不得著面及乳母口鼻吹著兒囟凡綿衣不得太厚及用新綿令兒壯熱或即發癇特宜慎之也聖惠論凡兒匍匐以後逢物即吃奶母雖至細意必亦不能盡覺春夏必飲滯水冷物至秋初便皆疾作初則多啼不食或好伏地面色青黃或時腹痛既不解說惟反拗多啼或逢水漿便吃不可制止或睡中驚啼或大便秘澀常人惟知與紅雪鉤藤飲子此二藥終日在口然自不見其效況腹中滯結已多冷熱衝擊頗久二藥何能排去所以得秋氣風吹著背心腳心便成瘧痢庸醫與冷藥則傷滑不禁與澀藥則氣壅不行傷損臟腑益令不食遂使虛熱衝上面黃發焦滯惡在內手足如火自然風水橫溢四肢便腫如此將養十無一存但每經春夏不問有病無病便須與四味飲子多不三四劑即康強也葛氏肘後同方見溫壯門嬰孺論凡兒所以風者衣暖汗出風因而入也張渙論嬰兒生後兩滿月即目瞳子成能笑識人乳母不得令生人抱之及不令見非常之物百晬任脈生能反復乳母當存節喜怒適其寒溫半晬尻骨已成乳母當教兒學坐二百日外掌骨成乳母當教兒地上匍匐三百日臏骨成乳母當教兒獨立周晬膝骨已成乳母當教兒行步上件並是定法蓋世之人不能如法存節往往抱兒過時損傷筋骨切宜慎之為吉張渙論嬰兒冬月但當著夾衣及衲衣之類極寒即漸加以舊綿人家多愛子乃以綿衣過厚適所以為害也張渙論嬰兒須看稟受南北之殊用藥蓋地土寒溫不同此古人之最為慎也嬰童寶鑑論孩子春勿覆頂裹足致陽氣亡出故多發熱衣物夜露多生天瘹三歲之中勿太飽勿太肌臥須覆肚食須飲水漿若能如此者則子少患而無夭傷矣萬全方論田舍婦人產育皆不知小兒初生將護之法所養有絕無他疾者譬之凡草凡木生於深山大澤之中容易合抱至於奇材異果縱加倍壅間有不秀實者此豈貴賤之理有異哉蓋天之於物出於自然古人亦云小兒始生肌肉未成不可暖衣即令筋骨緩弱宜見風日若都不見風日即令肌膚脆軟便易傷損皆以絮著衣內勿用新綿天氣和暖無風之時令乳母抱兒日中嬉戲數見風日即血凝氣剛肌肉硬密堪耐風寒以田舍小兒較之此說尤長顱囟經治小兒初生日與平和飲子人參茯苓甘草炙升麻以上各一分上以水一白盞煎至一合半已來時時與之乳母忌油膩滿月及百晬已來加之臨時冷加白朮熱加硝各半錢海藥按仙傳小兒方上燒降真香或引鶴降蘸星辰燒此香甚為第一度籙燒之功力極驗小兒帶之能辟邪惡之氣也別說小兒方上柳絮貼灸瘡良飛入浴水於陰暗處為浮萍嘗以器盛水置絮其中數日覆之即或又多積可以捍作氈以代羊毛極柔軟宜與小兒臥益佳以性涼也本草小兒方上白油麻與乳母食其孩子永不病生若久熱可作飲汁服之停久者發霍亂客食抽人肌肉秘要指迷嬰兒初生三日乃令母服順氣藥及煎人參湯方上用人參甘草煎湯與母服隨奶乳下與嬰兒飲先洗盡胎腸惡物如母服藥乃須溫暖味不可冷熱相反則令兒有病生又凡嬰兒初生嘗以句氣湯散服一匕日外但服無慮千金灸法凡新生兒七日以上周年以還灸不過七壯炷如雀屎大擇乳母法第三下乳吹奶附千金論乳母者其血氣為乳汁也五情善惡悉是血氣所生也其乳兒者皆宜慎於喜怒夫乳母形色所宜其候甚多不可求備但取不胡臭癭瘻氣嗽瘑疥癡癃白禿癧瘍沈唇耳聾齆鼻癲癇無此等疾者便可飲兒也師見其故灸瘢便知其先疾之源也千金治乳無汁方石鐘乳四兩漏蘆三兩通草栝蔞根各五兩甘草二兩炙一方不用上五味㕮咀以水一斗煮取三升分三服一云用栝蔞實一枚千金又方右母豬蹄一具粗切以水二斗煮熟得五六升汁飲之不出更作千金又方豬蹄二枚熟炙槌碎通草八兩細切上二味以清酒一斗浸之稍稍飲盡不出更作外臺豬蹄不炙以水一斗煮取四升入酒四升更煮飲之佳千金又方上栝蔞根切一升酒四升煮三沸去滓分三服千金又方上栝蔞取子尚青色大者一枚熟搗以白酒一斗煮取四升去滓溫服一升日三黃色小者用二枚亦好千金又方石鐘乳通草各一兩漏蘆半兩桂心甘草炙栝蔞根各六銖上六味治下篩酒服方寸匕日三最驗千金又方石鐘乳漏蘆各二兩上二味治下篩飲服方寸匕即下千金又方上燒鯉魚頭末酒服三指撮千金又方上燒死鼠作屑酒服方寸匕日三立下勿令知千金又方上用土瓜根治下篩服半錢匕日三乳如流水千金翼治婦人乳無汁鍾乳湯方鍾乳白石脂硝石各一分通草生桔梗各二分上五味㕮咀以水五升煮三上三下餘一升去滓內硝石烊絞服無多少若小兒不能乳大人嗍之千金翼治婦人乳無汁漏蘆湯方漏蘆通草各二兩鍾乳一兩黍米一升上四味㕮咀黍米宿漬揩撻取汁三升煮藥三沸去滓飲之日三服千金翼治婦人下乳汁鯽魚湯方鯽魚長七寸豬肪半斤漏蘆鍾乳各二兩上四味㕮咀藥切豬肪魚不須洗清酒一斗二升合煮魚熟藥成去滓適寒溫分五服即乳下良飲其間相去須臾一飲令藥力相及千金翼又方通草鍾乳栝蔞實漏蘆各三兩上四味㕮咀以水一斗煮取三升去滓飲一升日三服千金翼又方通草鍾乳各四兩上二味切以酒五升漬一宿明旦煮沸去滓服一升日三服夏冷服冬溫服之千金翼又方上用石膏四兩碎以水二升煮三沸稍稍服一日令盡千金翼又方上用鬼箭五兩切以水六升煮取四升一服八合日三服亦可燒灰水服方寸匕千金翼治婦人乳無汁鼠肉臛方鼠肉五兩羊肉四兩獐肉半斤上三味作臛勿令疾者知之千金翼治婦人產後下乳鮑魚大麻子羹方飽魚肉三斤麻子仁一升上二味與鹽豉蔥作羹任意食之千金翼又方通草鍾乳上二味等分搗篩作面粥服方寸匕日三服百日後可兼養兩兒通草橫心白者是勿取羊桃根色黃者無益千金翼又方麥門冬去心鍾乳栝蔞理石上四味等分搗篩空腹酒服方寸匕日三服千金翼又方漏蘆三分鍾乳栝蔞根各五分蠐螬三合上四味搗篩先食糖水服方寸匕日三服千金翼方栝蔞根三兩鍾乳四兩漏蘆滑石通草各二兩白頭翁一兩上六味搗篩為散酒服方寸匕日再服千金翼又方鍾乳通草各五分雲母二兩半甘草一兩炙屋上敗草二把燒作灰上五味搗篩為散食後以溫漏蘆水服方寸匕日三服乳下為度千金翼又方麥門冬去心鍾乳通草理石乾地黃土瓜根蠐螬並等分七味搗篩為散食後酒服方寸匕日三服張氏家傳通奶方上以木通為散蔥酒調下張氏家傳黃金散治婦人一切奶疾中年者為胃虛血衰所致年少者多因產後臥失將息喜怒食物所致或因小兒食乳吹咂令痛癢無時未破者曰癰既破者曰漏甚非小疾若誤用藥便成大患急須治之方上用陳橘皮不以多少湯浸洗揀淨用黃明者於新瓦上慢慢磨去白令薄後用水淨洗瀝乾切細用麥麩拌和入銚子內炒火須文武火候香熟黃色於地上攤出火毒篩去麩碾為細末入好麝香少許以薄紙裹於男子懷中貼一復時童男尤佳每服二錢至三錢無灰酒調下就患處一壁臥令睡良久再一服候燥癢生癮疹便散破者便合極患者不過三服乳兒法第四顱囟經孩子或夏中熱時因乳母沐浴多使冷水奶得冷氣血脈皆伏見孩子氣未定便與奶使孩子多胃毒及赤白兩般惡痢此乃是奶母之過也凡浴後可令定息良久候氣定熟揉與之即令無患千金論凡乳兒不欲太飽飽則嘔吐每候兒吐者乳太飽也以空乳乳之即消日四乳兒若臍未愈乳兒太飽令風中臍也夏不去熱乳令兒嘔逆冬不去寒乳令兒咳痢母新房以乳兒令兒羸瘦交脛不能行母有熱以乳兒千金翼云母患熱以乳兒令變黃不能食母怒以乳兒令喜驚發氣疝又令上氣癲狂母新吐下以乳兒令虛羸母醉以乳兒令身熱腹滿凡乳母乳兒當先極挼散其熱氣勿令汁奔出令兒噎輒奪其乳令得息息已復乳之如是十返五返視兒飢飽節度知一日中幾乳而足以為常又常捉去宿乳兒若臥乳母當以臂枕之令乳與兒頭平乃乳之令兒不噎母欲寐則奪其乳恐填口鼻又不知飢飽也聖惠論凡為乳母皆有節度如不禁忌即令孩子百病並生如是自曉攝調可致孩子無疾長壽是以春夏切不得沖熱哺孩子必發熱疳並嘔逆秋冬勿以冷乳哺孩子必令腹脹羸瘦乳母嗔怒次不得哺孩子必患狂邪乳母醉後不得哺孩子必患驚癇天瘹急風等病如母有娠不得哺孩子必患胎黃及脊疳乳母有疾不得哺孩子必患癲癇風病乳母吐後不得哺孩子必令嘔逆羸瘦乳母傷飽不得哺孩子必致多熱喘急諸書並取此三書以為說別無異論嬰孺云凡兒生一日至七日取乳一合分作三服二十日至三十日以三合為三服生八日至十五日取一合半為三服生三十日至四十日以至五合為三服生十六日至二十日取二合為三服四十日以上方法准此為率節級加減嬰童寶鑑云凡乳母飲酒淫餐勿飼兒乳令發霍不治錢乙烏藥散治乳母冷熱不和及心腹時痛或水瀉或乳不好天台烏藥香附子破用白者高良薑赤芍藥各等分上為末每服一大錢水一盞同煎六分溫服如心腹疼痛入酒煎水瀉米飲調下無時莊氏家傳治乳母體熱令小兒黃瘦薑黃散方薑黃人參去蘆頭陳橘皮上件等分為粗末每服一錢水一盞煎至六分去滓溫服日只一服乳母雜忌慎法第五聖濟經慈幼篇乳哺襁褓章曰人之初生胃氣未固膚革未成乳飲易傷風邪易入乳哺欲其有節襁褓欲其有宜則達其飢飽察其強弱適其襛薄循其寒燠者蓋有道矣是以論乳者夏不欲熱熱則致嘔逆冬不欲寒寒則致咳痢母不欲怒怒則令上氣癲狂母不欲醉醉則令身熱腹滿母方吐下而乳則致虛羸母有積熱而乳則變黃不能食新房而乳則瘦悴交脛不能行論襁褓者衣欲舊帛綿欲故絮非惟惡於新燠也亦資父母之餘氣以致養焉重衣溫厚幃帳周密則減損之苟為不然傷皮膚害血脈瘡瘍發黃是生多疾皆不可不察也然論乳者又有用哺之法蓋哺所以賴穀氣也始生三日用飲過三日用哺哺之多少量日以為則如是則五臟得所養而胃氣壯矣論襁褓者又有去寒就溫之法方大和無風之時攜持保抱嬉戲日中如是則血凝氣剛骨骼成就觀夫陰地草木以其不歷風日故盛夏柔脆未秋搖落而鮮克有立況於人乎聖人論食飲有節起居有常矧嬰兒者其肉脆其血少其氣弱乳哺襁褓庸可忽諸顱囟經師巫燒錢乳母須預祝之勿令著水噴兒皆令驚熱入心轉成患害切細慎之葛氏肘後小兒新生十歲衣被不可露慎之慎之大方具說其事畏鳥獲鳥取兒聖惠論乳母忌食諸豆及醬熱面韭蒜蘿蔔等可與宿煮羊肉鹿肉野雞雁鴨鯽魚蔥薤蔓菁萵苣菠薐青麥莙達冬瓜等食若兒患疳即不得食羊肉及魚又不得油膩手䙀裹及抱兒又不得以火灸襁褓熱時便與兒者令孩子染熱病始終須慎大底冬中切宜戒之若天大寒以火灸衣被且拋向地上良久熱挼之冷熱得所即與孩子䙀之無妨如乳母有夫不能謹卓者切須防備儻新有過犯氣息未定便即乳兒者必能殺兒未滿月內所驅使人亦不得令有所犯到於兒前惡氣觸兒兒若得疾必難救療也哺兒法第六葛氏肘後小兒新生三日應開腹助穀神碎米濃作汁飲如乳酪與兒大豆許數令咽之頻與三豆許三七日可與哺慎不得取次與雜藥紅雪少少得也千金亦有此說又云止日三與之滿七日可與哺也千金云兒生十日始哺如棗核二十日倍之五十日如彈丸聖惠云二十日百日如棗若乳汁少不得從此法當用意小增之若二十日而哺者令兒無疾兒哺早者兒不勝穀氣令生病頭面身體喜生瘡愈而復發令兒尫弱難養三十日後雖哺勿多若不嗜食勿強與之強與之不消復生疾病哺乳不進者腹中皆有痰癖也當以四物紫丸微下之方見變蒸門節哺乳數日便自愈小兒微寒熱亦當爾利之要當下之然後乃瘥千金翼凡小兒不能哺乳當服紫丸下之千金翼小兒生滿三十日乃當哺之若早哺之兒不勝穀氣令兒多肉耗姚和眾云小兒初生七日助穀神以導達腸胃研粟米煮粥飲厚薄如乳每日研與半粟谷嬰孺論云嬰兒二十日乃哺令兒無病兒早哺而多頭面身體生瘡愈則復發令兒尫弱難養也又孫氏翼云生滿三日乃當哺若不勝穀氣令兒病若不嗜食勿強與之與之則不消成病而乳不進令腹中有痰癖也當以四物雙丸微下之即乳數日自愈嬰童寶鑑云小兒五十日可哺哺如棗核許百日加之如彈丸早晚二哺其後莫抱於檐下澡浴當風解衣哭未斷而乳胃冷而哺又不可在神佛前及驢馬之畔各房異戶之親諸色物器並不可觸犯切宜慎之犯之即害子性命乃為驚癇經云未三歲勿食雞肉子腹中生蟲錢乙云小兒多因愛惜過當往三兩歲猶未與飲食致脾胃虛弱平生多病自半年以後宜煎陳米稀粥取粥面時時與之十月以後漸與稠粥爛飯以助中氣自然易養少病惟忌生冷油膩甜物等初哺日第七外臺崔氏初哺兒良日以平定成日大吉其哺不得令咸外臺崔氏又方寅醜辰巳酉日良外臺崔氏又方男戊己日不得哺女丙丁日不得哺嬰孺哺兒初吉日壬寅壬辰己酉日吉浴兒法第八千金論凡浴小兒湯極須令冷熱調和冷熱失所令兒驚亦致五臟疾也凡兒冬不可久浴浴久則傷寒夏不可久浴浴久則傷熱數浴背冷則發癇若不浴又令兒毛落新生浴兒者以豬膽一枚取汁投湯中以浴兒終身不患瘡疥勿以雜水浴之兒生三日宜用桃根湯浴桃根李根梅根各三兩枝亦得㕮咀之以水三斗煮二十沸去滓浴兒良去不祥令兒終身無瘡疥治小兒驚辟惡氣以金虎湯浴金一斤虎頭骨一枚以水三斗煮為湯浴但須浴即煮用之外臺崔氏又浴兒虎頭骨湯主闢除惡氣兼令兒不驚不患諸瘡疥方虎頭骨五大兩無頭身骨亦得碎苦參四兩白芷三兩嬰孺集以為五兩上三味切以水一斗煮為湯內豬膽汁少許適寒溫以浴兒良本草注主小兒身熱食不生肌方上楮葉可作浴湯又主惡瘡生肉簡要濟眾新生小兒浴方上以益母草一大把銼水一斗煎十沸溫浴而不生瘡疥益母草茺蔚苗也俗名郁臭子母秘錄小兒辟惡氣上以水煮虎皮骨湯浴兒數數作食療方小兒初生取虎骨煎湯浴其孩子長大無病斗門方浴小兒胎穢白殭蠶黑牽牛細辛上等分為末如澡豆用之良元和紀用經慶浴吉慶法謂三日五日或七日洗兒也當取寅卯酉日為大吉良宜避壬午丁未並凶癸巳亦凶今不能合上三日者但勿犯下三日凶惡之日皆平安浴法聖惠治新生兒卒寒熱不能服藥宜用莽草湯浴方莽草丹參蛇床子桂心菖蒲各一兩上件藥銼碎以水五斗煮一二十沸去滓適寒溫以浴之避風聖惠浴兒闢溫惡氣療百病去皮膚沙粟方桃根梅根李根各一把細辛蛇床子各一兩上件藥都銼以水二斗煎至一斗澄濾候冷暖得所浴兒佳聖惠治小兒壯熱浴方上以李子葉切半升用水一斗煎至七升去滓看冷暖得所浴之聖惠又方白芷二兩苦參三兩上都銼以水一斗煎至七升去滓加少鹽及少漿水浴之浴了以粉摩之即不畏風又大引散諸風也嬰孺治兒生一月至五月乍寒乍熱柳枝湯浴方上以柳枝不限多少煮湯浴之若渴取冬瓜汁飲之嬰孺凡常浴兒不療病只取桃柳心各七個並水少許清漿水鹽各少許浴之大良浴了以粉粉之不怕風又散氣除邪惟不用頻浴頻浴引冷發癇嬰童寶鑑諸小兒浴法凡浴湯用豬膽則瘡疥不生用金銀虎頭骨麝香丹砂煎湯則避惡氣客忤驚癇用李葉桃葉楮葉梅葉根等煎湯則解體熱溫壯之患嬰童寶鑑浴湯方金銀虎頭骨桃奴丹砂雄黃上煎浴兒退驚辟邪氣煎湯沐發則令潤黑無垢嬰童寶鑑煎湯浴兒退熱蒴藋蔥胡麻葉白芷藁本蛇床子嬰童寶鑑煎湯浴兒退風豬膽苦參防己黃連甘草白芨藁本杉柏楓葉嬰童寶鑑煎湯浴兒治瘡大麻仁零陵香丁香桑椹藁本莊氏家傳浴小兒五根湯桃根柳根楝根桑根槐根上等分銼或各以枝亦得加豉為湯浴兒妙仍以光粉和蚌粉撲身辟邪吉莊氏家傳云尋常浴湯煎熟入少許清漿水鹽一捻浴訖以粉磨既不畏風又引散諸藥拭兒口法第九千金論曰小兒初生先以綿裹指拭兒口中及舌上青泥惡血此謂之玉衡一作銜若不急拭啼聲一發即入腹成百病矣千金翼云成痞病死聖惠論凡兒初飲乳後以發纏指沾清水點拭了看齒根上有黃筋兩條便以葦刀子割斷點豬乳便瘥如兒口難開但先點豬乳自開小兒集驗方云小兒初生每日以井華水或微溫水將潔淨舊軟帕子裹乳母手指蘸水撩拭小兒口中因而捺舌及兩頰令稍寬舒即不生口噤積熱風疾等病京畿與山東人多能之謂之捺兒口拭畢仍用少研細入麝者干坯子胭脂塗口中令兒美乳食小兒集驗方云東平有一老嫗善與小兒拭口使不生煉銀云小兒上下唇與齒斷相連處皆有一筋牽引若上唇筋緊即生上煉下唇筋緊即生下煉上煉生瘡滿頭或生眉間如有癬狀瘙癢不已時複流出黃汁汁至處又生瘡若下煉則起腰背漸至四肢亦如癬狀亦瘙癢黃汁不已若疾盛不治或頭面上下相通累年不較又咬折或成大疾惟是每日早晨取溫水一盞令其乳母以故軟潔淨帕子包手第一指蘸溫水拭兒口水中渲下又拭又捺使兒口中淨及捺上下筋令寬舒即小兒自美乳食諸疾不生亦云永無煉銀惟使筋寬舒是法京畿見小兒失捺變為口噤不吃奶或不解捺而生煉銀者不可勝數斷臍法第十千金論曰凡斷臍不得以刀子割之須令人隔單衣物咬斷兼以暖氣呵七遍然後纏結所留臍帶令至兒足趺上短則中寒令兒腹中不調常下痢若先斷臍然後浴者則臍中水臍中水則發腹痛其臍斷訖連臍帶中多有蟲宜急剔撥去之不爾入兒腹成疾斷兒臍者當令長六寸長則傷肌短則傷臟若不以時斷及挼汁不盡則令暖氣漸微即自生寒令兒臍風千金翼聖惠與古來方斷臍裹臍語皆同嬰童寶鑑論小兒斷臍云凡小兒生下可先浴而後斷臍及可以衣襯而口齧之不然則刀斷如刀斷者則以剪刀先於懷中厭令暖方用又斷之則臍帶不可令長只如子足長短短即中寒而傷臟長即傷膚先斷而後洗即令水入臍中孩子多天瘹痛苦啼叫面青黑為中水患也臍若短即腹中不調常下痢有中寒之患其臍不可傷動傷動即令久不幹如不幹即傷外風傷外風即口噤小兒不可救也秘要指迷論曰嬰兒初生剪去臍帶切令剪刀暖不可傷冷及外風所侵莊氏家傳烙臍丸豆豉黃蠟各一分麝香少許上同搗令爛熟捻作餅子斷臍訖安臍上灸三壯艾炷如小麥大若不啼灸至五七壯灸了以封臍散封之不得濕著恐令臍腫封臍散方在裹臍門中灸臍法第十一聖惠云小兒生下一宿抱近明無風處看臍上有赤脈直上者當時於脈盡頭灸三壯赤散無患矣湖南檢法王時發傳吾家雖大族獨有本房兒女自來少虛弱腹痛下痢之人往往氣壯無病蓋數世以來男女初生方斷臍時於所留臍帶上常當灸處灸大艾炷三十餘壯所以強盛如此裹臍法第十二封臍法附千金論凡裹臍法椎治白練令柔軟方四寸新綿厚半寸與帛等合之調其緩急急則令兒吐哯兒生二十日乃解視臍若十許日兒怒啼似衣中有刺者此臍燥還刺其腹當解之易衣更裹裹臍時閉戶下帳燃火令帳中溫暖換衣亦然仍以溫粉粉之此謂冬時寒也若臍不愈燒絳帛末粉之若過一月臍有汁不愈燒蝦蟆灰粉之日三四度千金翼云燒蝦蟆灰治末粉臍中又云若臍未愈乳兒太飽令兒風臍也若臍中水及中冷則令兒腹絞痛夭糾啼呼面目青黑此是中水之過當灸粉絮以熨之不時治護臍至腫者當隨輕重重者便灸之乃可至八九十壯輕者臍不大腫但出汁時時啼呼者搗當歸末和胡粉敷之灸絮日熨之至百日愈以啼呼止為候若兒糞青者冷也與臍中水同諸方書法皆同稍不同者見於後嬰孺裹臍法當捶白布令軟方四寸新綿厚半寸與布等合之穿中央臍貫孔中於表闢之復以絮裹在上帶之余說皆同張渙嬰兒初生斷臍之後宜著熟艾厚裹愛護若乳母不慎或因洗浴水入臍中或兒尿在䙀袍之內濕氣傷於臍中或解脫風冷邪氣所乘令兒臍腫多啼不能哺乳即成臍風先宜急用裹臍法封臍散方好川當歸半兩洗焙乾天漿子三個微炒亂髮一錢燒灰存性上件同搗羅為細末入麝香一字拌勻用藥一字至半錢敷臍中時時用外臺劉氏療小兒初生至七日者臍欲落封藥方雄鼠屎七顆乾薑棗許大胡粉三分熬麝香少許緋帛灰一錢匕上五味搗研為粉看臍欲落不落即取藥以敷之是以不令風入故也用乾薑恐痛不用亦得莊氏家傳封臍散雄鼠屎七枚兩頭尖者是乾薑棗許大甑帶雞子大以上並燒作灰緋帛灰半分胡粉三錢令黃麝香少許上和研令細看臍欲落不落取藥半錢至一錢封臍便瘥永不患臍腫濕燒藥時勿令灰入甘草法第十三葛氏肘後小兒新產出未可與朱蜜取甘草如中指節炙碎以水一合煮取一合以纏綿點兒口中可得一蜆殼止兒當便吐胸中惡汁兒智惠無病千金方洗浴斷臍竟䙀袍畢與甘草湯方與葛氏同指以綿纏沾取與兒吮之得一蜆殼入腹止兒當快吐如得吐則余藥更不須與若不得吐可消息計如飢渴須臾更與之若前所服及更與並不得吐者但稍稍與之令盡此一合止如得吐去惡汁令兒心神智惠無病也千金方飲甘草湯一合盡都不吐者是兒不含惡血耳勿復與甘草湯仍可與朱蜜以鎮心神安魂魄也黃連法第十四小兒集驗方云凡小兒初生必有惡汁留於胸次若不消去即胸膈壅塞易生蘊熱驚癇瘡癤皆由此也故小兒才生一臘之內用好肥黃連數塊捶碎每少許厚以綿包裹如奶頭狀湯內浸成黃汁時復拈摭一二點在小兒口內即惡汁自下乳食便美其後或間以朱蜜與之若見惡汁以下即已有隻用空綿包別浸黃連蘸苦汁與之者韭汁法第十五大觀證類本草注蕭炳云小兒初生與韭根汁灌之即吐出惡水令無病本草食療初生孩子可搗韭根汁灌之即吐出胸中惡血永無病聖惠凡䙀袍兒訖吃生甘草後暖水浸少韭子汁塗兒口唇上干又塗十數度止不得令入口中朱蜜法第十六葛氏肘後方甘草吐惡汁後更與朱蜜主鎮安魂魄煉真硃砂如大豆以蜜一蜆殼和一日與一豆許三日與之大宜小兒矣千金法與葛氏同而多與則病葛氏所不言故又載其說兒新生三日中與朱蜜者不宜多多則令兒脾胃冷腹脹喜陰癇氣急變噤痙而死新生與朱蜜法與葛氏肘後同以綿纏箸頭沾取與兒吮之得三沾止一日令盡一豆許可三日與之則用三豆許也勿過此過者則傷兒也姚和眾姚和眾無三日連服之法又生六日後乃服仍云溫腸胃千金乃言多則令兒脾胃冷小兒初生六日溫腸胃壯血氣取煉成硃砂如一大豆許細研以蜜一棗大熟調以綿搵取令小兒吮之一日令盡牛黃法第十七葛氏肘後方與朱蜜後與牛黃益肝膽除熱定驚辟惡氣與之如朱蜜多少千金方與朱蜜竟與牛黃不獨益肝膽除熱定精神止驚辟惡氣又除小兒百病張渙牛黃法上以真牛黃一塊許用好蜜煉熟和成膏每服一豆大乳汁化時時滴口中形色不實者不宜多服若嬰兒胎熱或身體黃色宜多服之汞粉法第十八張渙嬰兒初生第一日才斷臍䙀袍訖看兒形色若面紅潤色赤啼聲響快者宜用汞粉半錢旋旋令兒吮之良久有臍糞下為佳嬰童寶鑑云凡小兒初生下速去口中惡物仍以銀粉抹其口舌上下左右兩頰然後始可飼朱蜜飲奶令腹中物下盡其子易長少患也豬乳法第十九千金論曰凡新生小兒一月內常飲豬乳大佳聖惠法凡取豬乳須令豬兒飲母次便提豬兒後腳起離乳急捋之即得空捋無由得汁張渙嬰兒初生滿月內常時時旋取豬乳滴口中最為佳矣藏衣法第二十外臺崔氏凡藏兒衣法兒衣先以清水洗之勿令沙土草汙又以清酒洗之仍內錢一文在衣中盛於新瓶內以青綿裹其瓶口上仍密蓋頭且置便宜處待滿三日然後依月吉地向陽高燥之處入地三尺埋之瓶上土厚一尺七寸唯須牢築令兒長壽有智惠若藏衣不謹為豬狗所食者令兒癲狂蟲蟻食者令兒病惡瘡犬鳥食之令兒兵死近社廟傍者令兒見鬼近深水洿池令兒溺死近故灶傍令兒驚惕近井傍者令兒病聾盲棄道路街巷者令兒絕嗣無子當門戶者令兒聲不出耳聾著水流下者令兒青盲棄於火里令兒生爛瘡著林木頭者令兒自絞死如此之忌皆須一慎之外臺崔氏又安產婦及藏衣天德月空法正月天德在丁月空在丙壬二月天德在坤月空在甲庚三月天德在壬月空在丙壬四月天德在辛月空在甲庚五月天德在乾月空在丙壬六月天德在甲月空在甲庚七月天德在癸月空在丙壬八月天德在艮月空在甲庚九月天德在丙月空在丙壬十月天德在乙月空在甲庚十一月天德在巽月空在丙壬十二月天德在庚月空在甲庚凡藏兒衣皆依此法天德月空處埋之若有遇反支者宜以衣內新瓶盛密封塞口掛於宅外福德之上向陽高燥之處待過月然後依法埋藏之大吉外臺崔氏又法甲寅旬日十日不得藏埋兒衣以瓶盛密封安置空處度十日即藏埋之外臺崔氏又法甲辰乙巳丙午丁未戊申此五日亦不藏兒衣還盛瓶中密塞勿令氣通掛著兒生處過此五日即埋之亦不得更過此日外臺崔氏又法甲乙日生兒丙丁日藏衣吉丙丁日生兒戊己日藏衣吉戊己日生兒庚辛日藏衣吉庚卒日生兒壬癸日藏衣吉子母秘錄藏衣法先用一罐盛兒衣先以清水洗次以清酒洗次入大豆一合次小豆一合次城門土市門土獄門土蔥園中土韭園土各一合重重複之上用五色綿各一尺五寸重重系罐口上用鐵券朱書云大豆某胡去無辜小豆歷歷去子癖城門土見公卿市門土足人行獄門土闢盜兵蔥韭園土剪復生與兒青令兒壽命得長生與兒赤令兒身命皆清吉與兒白令兒壽祿皆千百與兒皂令兒長壽不衰老與兒黃令兒清淨去百殃急急如律令將此令於一尺二寸鐵慄上先用淨墨塗遍上以硃砂寫此語令在上置在罐口上且放便處待滿三日然後於月吉向陽高燥之處入地三尺埋之罐上令土一尺七寸唯須牢築使兒長壽有智慧剃頭法第二十一外臺崔氏初剃兒頭良日寅丑日吉丁未日凶集驗方京畿初剃頭不擇日皆於滿月日剃之蓋風俗所尚前此產婦未得出房滿月即與兒俱出以謂胎髮穢惡多觸神灶小兒不安故此日必剃頭而出剃頭於溫暖避風處剃之剃後須以生油杏仁膩粉頭上捺之以避風邪其後小兒剃頭亦宜用此禳謝法第二十二外臺崔氏禳謝法軒轅者乾神天丞相使者風伯犯之令兒驚吐可取梨枝六寸埋生處大吉雷公者震神太陰使者天馬犯之令兒煩悶腹滿解之以三屠家肉為餅於產處謝之大吉咸池者坎神天之雨師使者犯之令兒啼不止用羊脯酒於生處謝之吉豐隆者艮神天之東明使者天僕也害氣犯之令兒乍寒乍熱大腹以白魚二枚於生處謝之又大豆一升投井中亦大吉招搖者坤神天上使者犯之令兒驚空嚼不止以酒餅生處謝之即愈天候者巽神天一執法使者犯之令兒腹脹張眼以白魚二枚於生處謝之吉吳時者離神天一將軍遊擊使者犯之令兒驚腹痛用馬脯五寸於生處謝之吉又以白魚五枚並棗餅埋其生處吉大時者兌神小時北斗使者犯之令兒腹脹下痢解之以酒脯於生處謝之又以大豆一升投井中吉犯月殺者令兒驚啼用丹雄雞血於生處謝之吉犯白虎者用稻米一升雞子三枚於生處謝之吉黍米亦得犯大夫者用羊肝三枚及稻米一升於生處謝之吉又用雞羝羊脾黍米亦得犯日遊者令兒口噤色變欲死者用三屠家肉麥飯於生處謝之吉
