body:
  text: 卷第三十二水痰鬼持凡九門痰飲第一嬰童寶鑑小兒痰飲候歌飲水並傷乳為痰結在胸令兒不下乳吐沫與癇同實即身多熱譫言入睡中早須醫治取久即變驚風外臺範汪病痰飲者當以溫藥和之療心腹虛冷遊痰氣上胸肋滿不下食嘔逆胸中冷半夏湯方半夏一升洗生薑一斤橘皮四兩上三味切以水一斗煮取三升分三服若心中急及心痛肉桂心四兩若腹痛內當歸四兩羸瘦老小者服之佳忌羊肉餳兒小分減服王氏手集倍術丸治脾胃受濕心下停飲煩渴嘔吐腸間瀝瀝有聲胸膈痞滿短氣腹脅脹痛小便不利身面虛浮全不思食方官桂乾薑各一兩白朮二兩上為末煉蜜為丸綠豆大每服十五二十丸米飲下兒小減丸王氏手集丁香開胃丸治脾胃不調停積痰飲嘔吐吞酸胸膈痞悶方半夏為粗末用生薑汁浸炒令黃色甘草炙京三稜炮各一兩丁香三分乾木瓜半兩生薑十二兩切研入青鹽一兩炒潤焙乾為末上為細末煉蜜為丸雞頭大每服一丸沸湯化下不計時候兒小分減腫滿第二巢氏病源小兒腫滿候小兒腫滿者由將養不調腎脾二臟俱虛也腎主水其氣下通於陰脾主土候肌肉而剋水腎虛不能傳其水液脾虛不能剋制於水故水氣流溢於皮膚故令腫滿其挾水腫者即皮薄如熟李之狀也若皮膚受風風搏而氣致腫者俱虛腫如吹此風氣腫也茅先生小兒生下有中氣腫候遍身黃腫腫滿腹肚不和氣喘急此候因吃物不度或因瀉久而虛至此所治者先用勻氣散方見胃氣不和門中醒脾散與調一日有二方一方見胃氣不和門中一方見慢脾風門中後下甘遂散通下黃水五升已來方見本門即用勻氣散夾醒脾散與服五日後常下塌氣散方見本門仍要斷鹽醋一月日即愈如見氣大喘不吃食陰腫唇縮死候不治漢東王先生家寶論小兒頭面手腳浮腫因疳積日久結風此病或因久患用藥不退發渴喜飲水變成虛浮二證宜先用調胃氣藥補之如觀音散方見胃氣不和門中人參散方見失食傷寒門中之類自然平愈如服調胃藥不退宜進內消丸又未退進紅粉散取了二方並見本門再用藥補之錢氏論腫病腎熱傳於膀胱膀胱熱盛逆於脾胃脾胃虛而不能制腎水反剋土脾隨水行脾主四肢故流走而身面皆腫也若大喘者重也何以然腎大勝而克退脾土上勝心火心又勝肺肺為心克故喘或問曰心刑肺肺本見虛今何喘實曰此有二一者肺大喘此五臟逆二者腎水氣上行滂浸於肺故令大喘此皆難治張渙論小兒諸病後下痢不瘥或有體腫滿蓋脾腎虛弱腎主水其氣不通於陰脾主土候於肌肉而剋水脾腎俱虛不能剋制於水故流溢皮膚則令腫滿翰林待詔楊大鄴問小兒四肢浮腫喘嗽者為何答曰小兒寒熱虧盈本是常度一食失節百病來輳何況過有熱壅諸毒是積小成多壅塞遍於胃管日月深遠積結轉深雜食未離於口三焦之氣不通四肢漸漸浮腫小便或即赤黃大便或通或秘致喘促盈盈虛脹每每從茲食減轉至尫羸先要安和脾胃次須利小腸免傷枉矣嬰童寶鑑小兒氣腫水腫候歌小兒腫滿一如吹只為風邪與氣為若見皮膚熟李樣此名疳水定無疑脾虛土壞難禁水腫滿從來只在皮腫若赤時因熱作皆由氣血各無歸但見此般須早辨莫令差失致傾危外臺劉氏療小兒身體滿氣急臥不得方上用郁李仁一合搗末和麵搜作餅子法與兒吃微利即瘥外臺劉氏又方上用郁李仁末六分以水七合和調去滓煮粥與兒吃之茅先生小兒氣腫水腫甘遂散方甘遂大戟黑牽牛檳榔陳橘皮去白木香以上各半兩上為末每歲一錢五更初用蔥酒調下不食吃酒用蔥湯調下天明通下黃水來可依形證調理茅先生小兒腫後塌氣散方中庸赤小豆橘皮紅蘿蔔子檳榔甘草以上各半兩木香一分上為末每服二錢水一小盞薑棗同煎至六分通口服進四服看大小用嬰孺治小兒面目腫胸膈中有熱方黃芩芍藥知母各四分虻蟲三十個炒當歸大黃甘草炙各三分上為末蜜丸大豆大飲下二丸日四夜一若睡中涎膈上有水者加細辛白朮各三分令兒強健嬰孺治小兒通體洪腫腹滿堅脹氣喘急郁李仁湯方郁李仁三合大黃十二分柴胡澤瀉各八分赤茯苓十分黃芩麻黃各十二分杏仁湯去皮尖升麻各七分芍藥豬苓各八分鱉甲五分炙上以水二升半煮一升六合七歲為三服四五歲為四服隨小大加減嬰孺治小兒腫滿黃芩湯方黃芩澤瀉通草各八分柴胡桑白皮各七分杏仁湯去皮尖豬苓去皮柴各六分澤漆葉四分上以水五升煮一升半四五歲兒為三服一二歲服二合嬰孺治小兒腫滿小豆飲子方槲皮白切七合茯苓二分小豆八分上以七升水煮一升四合去滓飲之未效再合嬰孺治小兒腫滿不消服湯不退葶藶煎方葶藶子三分炒防己六分柴胡八分茯苓澤瀉杏仁去皮尖炒研各十二分澤漆葉炒郁李仁各五分蜜一升上以水一斗煮二升半去滓內杏蜜煎至二升二歲兒一合量大小服之嬰孺治小兒腫滿結實諸治不效甘遂丸方甘遂炒芍藥杏仁車前子黃芩豬苓葶藶子炒各三分鱉甲七分醋炙上為末蜜為丸大豆大竹葉飲下二歲五六丸日再量之嬰孺治小兒腫滿頭面身體壯熱似傷寒者方癇瘥腫者除大青用龍膽葵子葳蕤大青茯苓前胡各一分上以水二升煮八合服半合日再嬰孺治小兒頭面及身體浮腫衛矛丸方衛矛羽鬼箭用羽也鬼箭一名衛矛松羅四分防己黃耆各三分郁李仁一錢別研入上為末蜜丸大豆大百日兒食後一丸日再以腰中身體汗出盡為度嬰孺治少小手足身體腫方咸菹汁上溫浸之汁味盡易為度嬰孺又方上溫人溺令暖漬之漢東王先生家寶治小兒頭面手腳虛浮內消丸方青橘五個湯浸去瓤巴豆七個去殼木香二錢炮防己一錢半丁香十四粒上青橘同巴豆炒蒼色去巴豆不用以其餘藥為末蒸餅丸如大麻子大每服二三歲三丸四五歲七丸或十丸男孩兒陳橘皮湯下女孩兒煎艾葉湯下一日三服漢東王先生家寶治小兒渾身虛腫氣喘不思飲食紅粉散方硃砂一分檳榔一錢輕粉半錢上為末每服一字及半錢薄荷湯調下吃一服則取下仍用觀音散方見胃氣不和門中人參散方見夾食傷寒門中調其胃氣忌生冷粗硬等物張渙海蛤湯方治腫滿大小便不利海蛤桑根白皮各一兩漢防己白朮炮赤茯苓各半兩甜葶藶隔紙炒紫色川朴硝木豬苓去黑皮各一分上件搗羅為細末每服一錢水一盞煎至五分去滓溫服乳食後張渙郁李仁丹方應腫滿皆可服郁李仁湯浸去皮微炒檳榔各半兩牽牛子一分炒上件搗羅為細末滴水和丸黍米大每十粒煎蔥白湯下不拘時候量兒大小加減惠眼觀證塌氣散大治虛腫脹滿虛煩手足腫宜服此方白朮木香青橘皮去瓤甘草炙茴香各半兩巴豆三十粒上將巴豆炒橘皮候巴豆黑色去巴豆取橘皮用諸藥為末每服一大錢飯飲調下吉氏家傳治小兒遍身腫塌氣散方漢防己當歸芍藥紫菀黑牽牛杏仁去皮略炒先研以上各一錢檳榔面熛二錢綿黃耆二錢蜜炙上件為末每服一錢水一盞姜三片棗子一個煎至五分服吉氏家傳治小兒遍身虛腫棗肉丸方石燕子一個捶為末大棗七個去核巴豆七粒去油上二味入棗肉內燒存性細研以蟾酥丸麻子大看原因甚物所傷以原傷物汁下甚妙莊氏集俞穴灸法飲水不歇面目黃者灸陽綱各二壯在第十椎下兩旁各五寸陷中水氣第三嬰童寶鑑小兒水氣是積聚久不治並頻下而脾胃虛積散而成水氣及通身虛腫但如熟李即是水也有疳氣虛腫而不亮也惠眼觀證水氣浮腫遍體如黃熟李色不能消先調氣次日四更下中庸飲子取下膜外浮水一兩盆方見專門即調氣後用粥補一月斷鹽醋一月外又服調氣散方未見須安樂若此候見臍凸肚腫兩腎如石此死候不治簡要濟眾治小兒水氣腹腫兼下痢膿血小便澀方葶藶子半兩微炒搗如面上以棗肉和搗為丸如綠豆大每服五丸棗湯下空心晚後量兒大小加減服之聖惠治小兒水氣腫滿喘促坐臥不安宜服檳榔散方檳榔川大黃銼碎炒牽牛子微炒甜葶藶隔紙炒令紫色各半兩上件藥搗細羅為散每服以溫水調下半錢日二三服兒稍大增之以利為效聖惠治小兒水氣腫滿喘嗽不止赤茯苓散方赤茯苓桑根白皮銼貝母煨微黃各半兩桔梗去蘆頭甜葶藶隔紙炒令紫色川升麻杏仁湯浸去皮尖雙仁炒微黃各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服日三四服更量兒大小加減服之聖惠治小兒水氣腫滿不消楮皮湯方褚樹白皮銼赤小豆各一合赤茯苓二兩銼上件藥都和令勻每取一分以水一小盞煎至五分去滓分為二服日三四服隨兒大小以意加減聖惠治小兒水氣腫滿小便澀貍豆根湯方貍豆根桑根白皮車前草各半兩葵子赤小豆各半合上件藥細銼和勻每取一分以水一小盞煎至五分去滓分為二服日三四服隨兒大小以意加減聖惠治小兒水氣腫滿小便不利臍腹妨悶喘促豬苓散方豬苓去黑皮桑根白皮銼赤茯苓海蛤細研甜葶藶隔紙炒令紫色各一分上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服日三四服更隨兒大小以意加減聖惠治小兒水氣遍身腫滿喘促小便不利桑根白皮散方桑根白皮銼射干赤茯苓黃芩木通銼澤漆漢防己澤瀉各十兩上件藥搗細羅為散每服以煮赤小豆湯調下半錢日三四服看兒大小加減服之聖惠治小兒水氣面目腫小便澀心腹脹滿方赤茯苓杏仁湯浸去皮尖雙仁麩炒微黃漢防己陳橘皮湯浸去白瓤焙紫蘇子微炒甜葶藶隔紙炒令紫色各半兩上件藥搗羅為末煉蜜和丸如綠豆大每服煎桑根白皮湯下十丸日三服五歲以下減丸服之聖惠治小兒水氣通身腫滿心腹妨悶坐臥不安宜服甜葶藶丸方甜葶藶隔紙炒令紫色牽牛子微炒雄雀糞各半兩大戟一分膩粉一錢研入巴豆十粒去皮心別紙裝壓去油上件藥搗羅為末都研令勻用棗瓤和丸如綠豆大每服以溫茶下一丸日二服五歲以上加丸服之聖惠治小兒水氣遍身腫滿大小便難喘促不得睡臥宜服甘遂散方甘遂煨令微黃檳榔川大黃銼碎微炒甜葶藶隔紙炒令紫色各一分牽牛子半兩微炒上件藥搗細羅為散每服以溫水調下一字以利為效隨兒大小以意加減聖惠治小兒水氣四肢浮腫腹脅妨悶宜服木香散方木香赤茯苓各一分牽牛子三分微炒鱉甲塗醋炙令黃去裙襴川大黃銼碎微炒各半兩上件藥搗細羅為散每服以溫水調下半錢以利為度隨兒大小加減服之聖惠又方檳榔一分郁李仁半兩湯浸去皮微炒上件藥搗羅為末以大麥面一兩和作餅子煻灰火內煨熟量兒大小與吃即得通利氣下也以溫水下之聖惠治小兒水氣腹肚虛脹頭面浮腫小便不利郁李仁粥方粟米一分郁李仁湯浸去皮尖微炒桑根白皮銼各一兩上件藥搗碎每服半兩以水一大盞煎至七分去滓下米作粥入少許生薑汁任意食之惠眼觀證治水氣腫滿黃疸中庸飲子方海金砂續隨子各一分生薑中庸樟柳根是也各一兩蜜二兩上五味細研罨一宿以次日五更時用絹帛濾汁只作一服溫暖吃盡食前逼下黃水乃服勻氣藥補後用樟柳根煮粥吃聖惠灸法小兒水氣四肢盡腫及腹大灸臍上一寸三壯炷如小麥大分水穴也中惡第四巢氏病源小兒中惡候小兒中惡者是鬼邪之氣卒中於人也無問大小若陰陽順理榮衛平調神守強則邪不干正若精氣衰弱則鬼毒惡氣中之其狀先無他病卒然心腹刺痛悶亂欲死是也凡中惡腹大而滿脈緊大而浮者死緊細而微者生余勢不盡停滯臟腑之間更發後變為疰也葛氏肘後救卒死或先病痛或常居寢臥奄忽而絕皆是中惡救之方上取蔥黃心刺其鼻男左女右入七八寸小兒量度之若使目中血出佳扁鵲法同是後穴耳條中葛言此云刺鼻故別為一法葛氏肘後又方上令二人以衣壅口吹其兩耳極則易人可以筒吹之並捧其肩上側身遠之莫臨死人上葛氏肘後又方上以蔥葉刺耳耳中鼻中血出者莫怪無血難治有血是候時當捧兩手忽放之須臾死人自當舉手撈人言痛乃止又男刺左鼻女刺右鼻中令入七八寸余大效小兒量度之亦治自縊死此與扁鵲方同葛氏肘後又方上以綿漬好酒中須臾置死人鼻中手按令汁入鼻中並持其手足莫令驚葛氏肘後又方上視其上唇裡弦有兒如黍米大以針決去之葛氏肘後又方上以小便灌其面數回即能語此扁鵲法葛氏肘後又方上末皂莢如大豆吹其兩鼻中嚏則氣通矣葛氏肘後又方上割雄雞頭取血以塗其面干復途並以灰營死人二周葛氏肘後又方上以管吹下部令數人互吹之氣通則活葛氏肘後又方上破白犬以拓心上無白犬小雞亦佳葛氏肘後又方上取雄雞就死人口斷其頭以熱血瀝口中並以竹筒吹其下部極則易人氣通下則火葛氏肘後又方上取牛馬糞尚濕者絞取汁灌其口中令入喉若口已噤者以物強撥之若不可強者乃扣齒下若無新者以人溺解乾者絞取汁此扁鵲法千金治卒忤方此病即今人所謂中惡者與卒死鬼擊亦相類為治皆參取而用之上鹽八合以水三升煮取一升半二服得吐即愈備急方云治鬼擊若小便不通筆頭七枚燒作灰末和服之即通外臺古今錄驗黃帝護命千金丸療羸瘦歷年胸滿結疹飲食變吐宿食不下中風鬼疰疾瘦方野葛七寸炙斑蝥二十枚去足翅熬雄黃雌黃丹砂各研瓜丁鬼臼礬石泥裹燒半日沙參莽草炙椒去目汗各一兩地膽十五枚去足翅熬上十二味搗下篩蜜和搗三十杵為丸如梧子大服五丸日二卒中惡氣絕不知人服如小豆二丸老小半之牛馬所抵踐癰腫若蟲毒所齧取一丸著掌中唾和塗瘡中毒上立愈正月日以酒率家中大小各一丸一歲不病若傷寒身熱服一丸若欲視病服一丸病者共臥不恐忌生血物聖惠治小兒中惡腹心堅脹疼痛顏色青黑大便不通桃奴散方桃奴五枚甘草一分炙微赤銼麝香一錢細研杏仁二十枚湯浸去皮尖雙仁麩炒微黃桔梗去蘆頭赤芍藥黃芩柴胡去苗川升麻川大黃銼微炒鬼臼去毛各半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服以利為度量兒大小以意加減聖惠治小兒中惡心堅強卒痛欲困鬼箭羽散方鬼箭羽真珠末各一分羚羊角屑桔梗去蘆頭川朴硝川升麻赤芍藥柴胡去苗黃芩各半兩桃仁十枚湯浸去皮尖雙仁麩炒微黃川大黃一兩銼微炒上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候溫服量兒大小以意加減聖惠治小兒中惡心痛闢除邪氣雄黃丸方雄黃細研真珠末各半兩麝香牛黃各細研一錢巴豆二十枚去皮心研紙裹壓出油上件藥都研令勻入棗瓤及煉蜜和丸如粟米大每服以薄荷湯下三丸量兒大小加減服之嬰孺治小兒中惡心腹堅強卒痛欲困鬼箭羽湯方鬼箭羽二分硃砂一分羚羊角屑桔梗鬼臼朴硝湯成下各四分升麻芍藥柴胡各五分黃芩六分大黃八分桃仁四十二個碎去皮尖上以水四升煮一升二合二歲兒為四分更量兒大小與服之葛氏肘後灸法以繩圍其死人肘腕男左女右畢伸繩從背上大椎度以下又從此灸橫行各半繩此法三灸各三即起又令爪其病人人中不醒不起者卷其手灸下文頭隨年壯又灸鼻中三壯也又灸頤下宛宛中名承漿穴十壯大效又灸兩足大指爪甲聚毛中七壯此華佗法一云三七壯又灸臍中百壯也卒死第五巢氏病源小兒卒死候小兒卒死者是三虛而遇賊風故無病倉卒而死也三虛者乘年之衰一也逢月之空二也失時之和三也有人因此三虛復為賊風所傷使陰氣偏竭於內陽氣阻隔於外而氣壅閉陰陽不通故暴絕而死也若腑臟未竭良久乃蘇亦有兼挾鬼神氣者皆須邪退乃生也此中客忤及中惡卒死而邪氣不盡停滯心腹久乃發動多變成疰也茅先生卒死候眼合嚌齒遍身如綿軟面青黑口鼻冷此候因本生下而遍身熱或因有駕患醫人一向退熱不曾下得驚積及奶積遂積聚被邪氣至此候上前件三個候都來一般只是要辨元初受患根源所治者急下奪命散與吐下風涎方見急慢驚風門中醒後便下勻氣散方見胃氣不和門中二服補除後下硃砂膏方見驚積門中鎮心丸與服方見一切驚門中如有伏熱來時即下大附子散與調理三五日安樂方見慢驚風門中前件三個形候只是此一般調理上件疾見鴉聲上啼偏搐汗如珠不得睡眼障淚出死候不治嬰童寶鑑小兒三虛歌乘年之衰兮逢月之空失時之和兮五虛之中卒中賊風兮成卒死兼挾鬼氣兮候亦同臟腑未絕兮須再活急令醫治兮莫忽忽金匱要略救小兒卒死而吐利不知是何病方上以馬屎一團絞取汁灌之無濕者水煮乾者取汁葛氏肘後救卒死而壯熱者上用礬石半斤水一升半煮消以漬腳令沒踝葛氏肘後又方救卒死而目閉者上用騎牛臨面搗薤汁灌之耳中葛氏肘後又方救卒死而四肢不收屎便者上取牛洞一升溫酒灌口中洞者稀糞也千金卒死無脈無他形候陰陽俱竭故也治之方上用牽牛臨鼻上二百息牛舐必瘥牛不肯舐著鹽汁塗面上即牛肯舐千金又方上灸熨斗熨兩脅下備急方云及治屍厥千金治魘死不自覺者方上用慎燈火勿令人手動牽牛臨其上即覺若卒不能語取東門上雞頭末之以酒服千金治卒魘死方上搗韭汁灌鼻孔中劇者灌兩耳張仲景云灌口中千金治鬼魘不悟方上末伏龍肝吹鼻中千金又方上末皂莢如大豆許吹鼻中嚏則氣通起死人集驗方治中惡聖惠治小兒卒死方上取女青末半錢用牛乳汁調服之聖惠又方上燒獖豬糞水解取汁服之聖惠又方上以苦參醋煮汁少許內口中即蘇水煮亦得又酒煮爛棺木板取汁服少許聖惠又方上煎鹽湯令極咸以物拗口開灌之令入腹即活聖惠又方上以熱湯和灰厚壅身上逡巡即蘇嬰孺治小兒不知所病便所絕方上取雄雞冠臨兒口上割血滴入口下即活葛氏肘後灸法卒死而四肢不收屎便者灸心下一寸臍上三寸臍下四寸各一百壯兒小者隨年千金治卒死針間使各百餘息千金灸鼻下人中一名鬼客廳肘後方云又治屍厥鬼持第六鬼氣附巢氏病源小兒為鬼所持候小兒神氣軟弱精爽微羸而神魂被鬼所持錄其狀不覺有餘疾直爾萎黃多大啼喚口氣常臭是也嬰童寶鑑小兒鬼持歌小兒氣弱命中衰魂魄多應被鬼持其候萎黃多哭地不須用藥可求師嬰童寶鑑又小兒鬼氣歌鬼氣皮膚里相傳臟腑開腫虛如水病瘈瘲似驚癇熱發渾身澀心攣痛所攢小兒還有此服藥急醫看圖經治鬼持方上用虎睛爪並指骨毛以系小兒臂上辟惡鬼外臺深師五邪丸療邪狂鬼魅妄言狂走恍惚不識人此為鬼忤當得殺鬼丸方丹砂雄黃各別研龍骨馬目毒公鬼箭各五兩鬼臼二兩赤小豆三兩芫青一枚桃仁百枚去皮尖熬別研上九味搗下篩細絹篩和諸藥拌令和調後內蠟和之大如彈丸絳囊盛之係臂男左女右小兒系頭合藥勿令婦人雞犬見之所服蜜和丸如梧子一服三丸日三忌五辛生血物疰病第七巢氏病源小兒疰候疰之言住也謂其風邪鬼氣留人身內也人無問大小若血氣虛衰則陰陽失守風邪鬼氣因而客之留住肌肉之間連滯臟腑之內或皮膚掣動遊易無常或心腹刺痛或體熱皮腫沉滯至死死又疰易旁人故為疰也小兒不能觸冒風邪多因乳母解脫之時不避溫涼暑濕或抱持出入早晚其神魂軟弱而為鬼氣所傷故病也千金治小兒疰方上用灶中灰鹽等分相和熬熨之千金太一備急散主卒中惡客忤五屍入腹鬼刺鬼痱及中蠱疰吐血下血及心腹卒痛腹滿傷寒熱毒病六七日方雄黃芫花桂心各二兩丹砂蜀椒各一兩藜蘆巴豆各一分附子五分炮裂去皮臍野葛三分上九味巴豆別治如脂余合治下篩以巴豆合和更搗之合和調以銅器中密貯之勿泄有急候水服一字匕可加至半錢匕老小半之病在頭當鼻衄在膈上吐在膈下利在四肢當汗出此之所為如湯沃雪手下皆愈秘之非醫不傳千金治疰病相染易及霍亂中惡小兒客忤長病方獺肝一具雄黃莽草丹砂鬼臼犀角巴豆各一兩麝香二分大黃牛黃各一兩蜈蚣一枚上十一味末之蜜丸空腹服如麻子大二丸加至五丸以知為度屍疰第八巢氏病源小兒屍疰候屍疰者是五屍之中一屍疰也人無問小大腹內皆有屍蟲屍蟲為性忌惡多接引外邪共為患害小兒血氣衰弱者精神亦羸故屍疰因而為病其狀沉嘿不的知病之處或寒熱淋瀝涉引歲月遂至於死死又疰易旁人故名之為屍疰也張渙論小兒亦有疰病與大人所病無是久後疰易旁人傳染骨肉如屍疰蠱毒之類是也外臺張仲景治大人小兒飛屍走馬湯方巴豆去心皮熬杏仁去皮尖各二枚上二味取綿纏槌令極碎投熱湯二合捻取白汁服之須臾瘥未瘥更一服老小量之通療鬼擊有屍疰者常蓄此藥用驗忌野豬肉蘆筍備急同聖惠治小兒屍疰心腹滿脹疼痛不可忍木香散方木香鬼箭羽桔梗去蘆頭當歸銼微炒紫蘇莖葉各半兩檳榔三分上件藥搗粗羅為散每服一錢以水一小盞入生薑少許煎至五分去滓不計時候溫服更量兒大小加減服之聖惠治小兒屍疰及中惡諸病皆主之犀角散方犀角川升麻木香檳榔桑白皮銼川大黃銼碎微炒各半兩麝香一錢細研桃仁二錢七枚湯浸去皮尖雙仁麩炒微黃上件藥搗細羅為散每服以溫水調下半錢日四五服更量兒大小加減服之聖惠治小兒屍疰鬼癖心腹往來疼痛或加寒熱恍惚形色多般桃仁散方桃仁三七枚湯浸去皮尖雙仁麩炒微黃木香人參去蘆頭虎頭骨塗酥炙令黃檳榔京三稜微煨銼白芥子微炒麝香細研桂心各一分款冬花硃砂細研水飛過干桃柳葉各半兩上件藥搗細羅為散不計時候以溫水調下半錢量兒大小臨時加減聖惠治小兒屍疰鬼癖驚癇魍魎三十六種無辜天行急黃並宜服保童丸方牛黃麝香各細研真珠末甘草炙微赤銼各一分赤芍藥光明砂細研水飛過赤茯苓杏仁湯浸去皮尖雙仁麩炒微黃各半兩甘遂七分煨令微黃虎睛一對酒浸炙令微黃巴豆五枚去皮心研紙裹壓出油上件藥搗羅為末都研令勻煉蜜和丸如麻子大三四歲兒每服以荊芥湯下二丸更量兒大小加減服之聖惠治小兒屍疰及諸蠱魅精氣入心腹使兒刺痛黃瘦雌黃丸方雌黃雄黃硃砂各細研川大黃銼碎微炒白頭翁徐長卿羚羊角屑各一分麝香細研半分上件藥搗羅為末都研令勻以青羊脂和丸如麻子大每服以粥飲下三丸日三服更量兒大小加減服之聖惠治小兒屍疰邪氣入腹㽲痛立效方雄黃一分細研梔子仁十枚赤芍藥半兩上件藥搗細羅為散研入雄黃令勻每服以溫水調下半錢更量兒大小加減服之聖惠治小兒屍疰勞瘦或時寒熱鬼臼丸方鬼臼半兩去毛川升麻三分麝香一錢細研柴胡一兩去苗上件藥搗羅為末都研令勻煉蜜和丸如綠豆大每服以暖酒下十丸日三服更量兒大小加減服之聖惠又方上以桃仁二十枚湯浸去皮尖生研用水一中盞煎至五分去滓量兒大小分減與服當吐為效如不吐即非是疰也聖惠又方上用鱉頭一枚燒為灰細研為散每服以新汲水調下半錢聖惠又方上以雞子一枚打破生吞之已困者內入喉中搖頭令下即瘥張渙雌黃丹方治屍疰病雌黃雄黃各細研川大黃慢火炮黑鬼臼去毛各一兩桃仁三十個湯浸去皮尖研白頭翁半兩以上併為細末次用麝香一分別研巴豆十粒去皮心膜紙裹出油上件都研勻以羊脂五兩熔和諸藥成膏如黍米大每服三粒至五粒荊芥湯冷下量兒大小加減張渙又方立效方川大黃炮銼干桃柳葉洗焙乾各一兩梔子仁赤芍藥各半兩以上搗羅為細末次用硃砂細研水飛一兩麝香雄黃各研一分上件都拌勻每服一錢用蜜湯調下量兒大小加減蠱疰第九巢氏病源小兒蠱疰候人聚蟲蛇雜類以器皿盛之令相啖食餘一存者即名為蠱能變化或隨飲食入腹食人五臟小兒有中者病狀與大人老子無異則心腹刺痛懊悶急者即死緩者涉歷歲月漸深羸困食心臟盡利血心臟爛乃至死死又疰易旁人故為蠱疰也外臺範汪療大人小兒蠱疰百病癥瘕積聚酸削骨肉大小便不利卒忤遇惡風臚脹腹滿淋水轉相注殫門盡戶延及男女外孫醫所不能療更生十七物紫參丸方紫參人參半夏洗藜蘆代赭桔梗白薇肉蓯蓉各三分石膏大黃牡蠣熬丹參各一分蝦蟆灰烏頭炮各四分狼毒七分附子炮三分巴豆七十枚去心皮熬上件藥搗篩蜜和為丸以飲下如小豆一丸日三服老小以意減之蜂蠆所螫以塗其上神神忌豬羊肉冷水一方無蝦蟆有乾薑四分聖惠治小兒中蠱毒腹中堅如石面目青黃小便淋瀝變易無常羖羊角散方羖羊角屑蘘荷各一兩梔子仁七枚赤芍藥牡丹黃連去須各一兩犀角屑半兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服日三四服更量兒大小加減服之聖惠又方敗鼓皮三分炙令黃苦參銼蘘荷根各一兩上件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓溫服日三四服更量兒大小加減服之聖惠治小兒初中蠱毒宜服升麻散方川升麻桔梗去蘆頭栝蔞根各半兩上件藥搗粗羅為散每服一錢以水一小盞前至五分去滓溫服日四五服量兒大小加減服之聖惠治小兒飛蠱狀如鬼氣者宜服雄黃散方雄黃麝香各細研犀角末各半兩上件藥都研令勻每服以溫水調下半錢日四五服更量兒大小加減服之聖惠治小兒五種蠱毒悉主之方上搗馬兜苓根細羅為散每服一錢以水一小盞煎至五分去滓空腹頓服當時隨吐蠱出未快吐即再服聖惠又方上用敗鼓皮一片燒為灰細研為粉空心以粥飲調服一錢病人須臾當呼蠱三姓名病便愈聖惠又方上用薺苨一兩搗羅為末以粥飲調下一錢甚效量兒大小加減服之聖惠治小兒畏忌中蠱欲死方上用甘草半兩生銼以水一中盞煎至五分去滓分為二服當吐蠱出若平生預防蠱者宜熟炙甘草煮汁服之即內消不吐神效聖惠治小兒中蠱毒令腹內堅痛面目青黃淋露骨立病變無常方上用桃株寄生二兩搗細羅為散如茶點服之日四五服聖惠又方上用麝香半錢細研空腹以溫水調服即吐出蠱毒未效再服聖惠治小兒中蠱下血欲死方上取生赤雌雞翅下血服之立效聖惠又方上搗青藍汁頻頻與半合服聖惠治小兒疰病諸蠱魅精氣入心入腹刺痛黃瘦骨立雄黃丸方雄黃雌黃各四分丹砂野丈人徐長卿各三分大黃五分麝香三棗大羚羊角屑五分上為末以青羊脂和丸百日兒酒服黍米大三丸日進二服或豆大亦可張渙雄麝散方專治蠱毒病雄黃水磨者細研麝香別研羖羊角屑赤芍藥敗鼓皮炙黃各一兩馬兜鈴根薺苨鬼臼去毛各半兩以上除雄黃麝香外搗羅為細末上件八味都一處拌勻研細每服半錢濃煎甘草湯調下食前張渙又方麝犀湯犀角屑鬼箭安息香水磨雄黃細研各一兩苦參牡丹皮各半兩以上搗羅為細末次用麝香半兩細研上件都拌勻每服一錢水一大盞煎至五分去滓放溫時時服
