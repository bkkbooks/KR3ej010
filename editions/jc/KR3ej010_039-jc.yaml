body:
  text: 卷第三十九鯁刺蟲毒凡十七門惡刺第一竹木刺狐尿刺並刺中風水附千金治惡刺方上苦瓠開口內小兒尿煮兩三沸浸病上千金又方上莨菪根火煮浸之冷復易神效千金又方上濃煮大豆汁漬取瘥千金又方上以李葉棗葉搗絞取汁點之即效千金治惡刺並狐尿刺方上以烏父驢尿漬之又白馬尿溫漬之千金因瘡而腫痛劇者數日死或中風寒或中水或中狐尿刺治之方上燒黍穰若牛馬屎若生桑條取得多煙之物燒熏汁出愈千金又方上以熱蠟內瘡中新瘡亦瘥千金又方上以蒲公英摘取根莖白汁塗之惟多塗為佳瘥止余以正觀五年七月十五日夜左手中指背觸著庭下木至曉遂患痛不可忍經十日痛日深瘡日高大色如熟小豆色嘗聞長者之論有此治方試復為之手下則愈痛亦即除瘡亦即瘥不過十日尋得平復此大神效故疏之蜀人名耳瘢菜關中名苟乳奴切又千金翼云凡諸螳螂之類盛暑之時多有孕育著諸物上必有精汁其汁干久則有毒人手觸之不王相之間則成其疾名日狐尿刺日夜磣痛不識眠睡百方治之不瘥渠取蒲公英莖葉根中斷之取白汁塗之令厚一分即瘥神驗千金治刺傷中風水方上刮箭羽下屑調塗之千金又方上燒魚目灰敷之千金又方上服黑牛熱尿一服二升三服即止千金又方上煮韭熟拓之千金又方上以蠟一兩熱炙熨薄裹上令水出愈千金凡八月九月中刺手足犯惡露腫殺人不可輕也治之方上用生桑枝三枚內煻灰中推引之令極熱斫斷正以頭柱瘡口上熱盡即易之盡三枚則瘡自爛仍取薤白搗綿裹著熱灰中使極熱去綿取薤白薄瘡上以布帛急裹之若有腫者便作之用薤白第一佳千金治竹木刺在皮不出方上以羊屎燥者燒作灰和豬脂塗刺上若不出重塗乃言不覺刺出時一云用干羊屎末千金治久刺不出方上服王不留行即出兼取根末貼之千金治刺人肉中不出方上煮山瞿麥汁飲之日三瘥止千金又方上用牛膝根莖生者並搗以敷之即出瘡雖已合猶出也千金又方上溫小便漬之千金又方上嚼豉塗之千金又方上嚼白梅以塗之肘後方用烏梅千金又方上以白茅根燒末以膏和塗之亦治瘡因風致腫千金又方上燒鹿角末以水和塗之立出久者不過一夕千金治竹木刺不出方上以薔薇灰水服方寸匕日三十日刺出千金又方上燒鑿柄灰酒服二寸匕千金又方上以酸棗核燒末服之千金又方上以頭垢塗之即出千金治卒刺手足中水毒方上搗韭及藍青置上以火炙熱徹即愈千金翼治因風水腫方上卒刺涉水成腫取韭並鹽搗置上以火炙藥上熱徹即愈千金翼惡刺方上以五月蔓菁子搗末和烏牛乳封之無即凡牛乳亦得千金翼又方上取野狐屎燒灰臘月豬膏和封孔上千金翼又方上取桑灰汁熱漬冷即易千金翼又方上以針砂和膠清塗之千金翼又方上取故鞋網如棗大婦人中衣有血者如手掌大倒鉤棘針二七枚三味合燒作灰以臘月豬膏和塗之蟲出千金翼又方上蔓菁子五升微熬末研童兒尿一升合內瘡口中周迴厚二寸以煻火燒一升投內瘡於中漬之即愈千金翼又方上煮槐白皮取湯漬之千金翼又方上以苦瓠煮作湯漬之千金翼又方上取五月五日蛇皮燒灰臘月豬膏和敷之千金翼又方上取故鞍韉旃燒灰臘月豬膏和封之蟲出千金翼又方上取樗根白皮切一升泔漬煮三沸內孔中亦可漬之千金翼肉刺方上割頭令血出內鉛丹如米許曝之千金翼又方上以刀割卻以好墨塗便瘥簡要濟眾主小兒誤為諸骨及魚骨刺入肉不出方上以水煮白梅肉爛研後調象牙末厚敷骨刺處自軟勝金方治小兒大人一切骨鯁或竹木簽刺喉中不下上於臘月中取鱖魚膽懸北檐下令乾每有魚鯁便取一皂子許以酒煎化溫溫呷若得逆便吐骨即隨頑涎出若未吐更吃溫酒但以吐為妙酒即隨性量力也若更未出煎一塊子無不出者此藥應是鯁在臟腑中日久痛黃瘦甚者服之皆出若卒求鱖魚不得鯉魚鯇魚鯽魚俱可臘月收之甚佳陳藏器敷狐刺瘡方上以蓼葉搗敷之陳藏器又方上以胡瓜根搗敷之胡瓜即黃瓜也張銳鸚雞方治魚骨鯁上取飴糖如雞子黃大含化張銳雞峰又方上用象牙為細末每服一錢蜜水調下聚寶方治惡刺入肉不出上以肉桂去皮為末熔黃蠟為丸看瘡大小任磨內三五重濕紙蓋以火㶸候藥丸熔入肉其刺出骨鯁第二發繞喉附千金治魚鯁方上以鸕鷀屎服方寸匕千金又方上口稱顱鷀鸕鷀則下千金又方上服橘皮湯即下千金又方上服沙糖水即下千金又方上燒魚網灰服方寸匕必效方云取魚網覆頭立下千金治骨鯁在喉眾治不出上取飴糖丸如雞子黃吞之不去更吞漸大作丸可至十丸止千金又方上燒虎狼屎服之千金又方上吞豬膏如雞子不瘥更吞瘥止千金治食中吞發咽不去繞喉方上取亂髮燒末酒服一錢匕食土第三千金治小兒食土方上取肉六斤繩系曳行數里勿洗火炙與吃之姚和眾候合時買市中羊肉一斤一法以水洗炒炙依料與兒未吃食者即煮法食之經驗方治小兒吃泥上以膩粉一分用沙糖搜和丸如麻子大空心米飲下一丸良久瀉出泥土瘥姚和眾治小兒食土方上取好土濃煎黃連汁搜之日乾與服落水第四千金治落水死方上以灶中灰布地令厚五寸以甑側著灰上令死人伏於甑上使頭小垂下抄鹽二方寸匕內竹管中吹下孔中即當吐水水下因去甑下死人著灰中壅身使出鼻口即活千金又方上掘地作坑熬數斛灰內坑中下死人覆灰濕輒即易之勿令大熱煿人灰冷更易半日即活千金又方上但埋死人灰守頭足俱沒惟開七孔千金又方上倒懸死人以好酒灌鼻中又灌下部又酢灌鼻亦得千金又方上綿裹皂莢內下部中須臾水出千金又方上裹石灰內下部中水出盡則活千金又方上倒懸解去衣去臍中垢極吹兩耳起乃止千金又方上熬沙覆死人面上下但出鼻口耳沙冷濕即易千金又方上灶中灰三石埋死人從頭至足出七孔即活千金又方上屈兩腳著生人兩肩上死人背向生人背即負持走行吐出水便活千金又方上解死人衣炙臍中凡落水經一宿猶可活千金治冬月落水凍四肢直口噤尚有微氣者方上以大器中熬灰使暖盛以囊薄其心上冷即易心暖氣通目得轉口乃開可溫尿粥稍稍吞之即活若不先溫其心便持火炙身冷氣與火爭即死遺尿第五巢氏病源小兒遺尿候遺尿者此由膀胱有冷不能約於水故也足太陰為膀胱之經足少陰為腎之經此二經為表裡腎主水腎氣下通於陰小便者水液之餘也膀胱為津液之腑既冷氣衰弱不能約水故遺尿也千金治小兒遺尿方瞿麥龍膽皂莢桂心石韋各半兩雞腸草人參各一兩車前子一兩六銖上八味末之蜜丸每食後服如小豆大五丸日三加至六七丸千金又方上以小豆葉搗汁服千金又方上燒雞腸末之漿水服方寸匕日三一云面北鬥服外臺千金療失禁不覺尿出方上以豆醬和灶突墨如大豆許內尿孔中佳聖惠治小兒遺尿不可禁止雞肶胵散方雞肶胵六具炙令黃桑螵蛸三分微炒甘草一分炙微赤銼黃耆牡蠣燒為粉各半兩上件藥搗粗羅為散每服二錢以水二小盞煎至六分去滓量兒大小分減溫服聖惠治小兒遺尿體瘦心煩不欲食牡蠣散方牡蠣粉桑螵蛸微炒龍骨各三分甘草七分炙微赤銼麥門冬去心焙雞腸草黃耆白茯苓各半兩上件藥搗粗羅為散每服一錢以水一小盞入生薑少許棗二枚煎至六分去滓量兒大小分減溫服聖惠治小兒遺尿足寒宜服白朮散方白朮土瓜根各半兩牡蠣粉三分上件藥搗粗羅為散每服一錢以水一小盞入生薑少許棗二枚煎至六分去滓量兒大小分減溫服嬰孺治小兒遺尿方上杵小豆末取乳汁調服之嬰孺又方瞿麥龍膽石韋皂莢炙桂心各二分雞腸草人參各三分車前子五分桑螵蛸炙十分肉雞腸自死者十二分上為末蜜丸如小豆大服五丸日三至六七丸食前千金灸法遺尿灸臍下二寸半隨年壯又灸大敦三壯亦治尿床第六千金治尿床方上取羊肚盛水令滿線縛兩頭熟煮即開取中水頓服之立瘥千金又方上取雞肶胵一具並腸燒末酒服男雌女雄千金又方上取羊胞盛水滿中炭火燒之盡肉空腹食之不過四五頓瘥千金又方上以新炊熱飯一盞寫尿床處拌之收與食之勿令知良千金灸法尿床垂兩手兩髀上盡指頭上有陷處灸七壯又灸臍下橫紋七壯狐臭第七巢氏病源小兒狐臭候人有血氣不和腋下有如野狐之氣謂之狐臭而此氣能染易著於人小兒多是乳養之人先有此病染著小兒千金論曰有臭有為人所染臭者天生臭者為人所染者易治然須三年醋敷礬石為散勿止並服五香丸乃可得瘥勿言一度敷藥即瘥止可敷藥時暫得一瘥耳忌食蕓薹五辛治之終身不瘥千金五香丸治口及身臭令香止煩散氣方豆蔻丁香藿香零陵香青木香白芷桂心各一兩香附子二兩甘松香當歸各半兩檳榔二枚上十一味末之蜜和丸常含一丸如大豆咽汁下三夜一亦可常含咽汁五日口香十日體香二七日衣被香三七日下風人聞香四七日洗手水落地香五七日把他人手亦香慎五辛下氣去臭千金治狐臭方辛荑芎藭細辛杜蘅藁本各二分上五味㕮咀以酒漬之一宿煎取汁敷之欲敷取臨臥時以瘥為度千金石灰散石灰一升半青木香楓香薰陸香丁香各二兩橘皮陽起石各三兩礬石四兩上八味治下篩以綿作篆干粗如指長四寸展取藥使著篆上以絹袋盛著腋下先以布揩令痛然後夾之千金又方青木香附子白灰各二兩礬石半兩上四味為散著粉中常粉之肘後無礬石千金又方上赤銅屑以酢和銀器中炒極熱以布裹熨腋下冷復易千金又方上槲葉切三升水五升煮取一升洗腋下即以白苦瓠燒令煙出熏之數數作千金又方辛荑細辛芎藭青木香各四分上四味治下篩熏竟粉之千金又方上用馬齒菜一束搗碎以蜜和作丸以絹袋盛之以泥紙裹厚半寸曝乾以火燒熟破取更以少許蜜和使熱勿令冷先以生布揩之夾藥腋下藥痛久忍之不能然後以手巾勒兩臂千金又方肘後方云合椒塗之牛脂胡粉各等分上二味煎令可丸塗腋下一宿即愈千金又方上以伏龍肝作泥敷之千金又方上以三年苦酢和石灰敷之千金翼治諸腋臭方石灰五合馬齒草二兩礬石三兩燒甘松香一兩上四味合搗篩先以生布揩病上令黃汁出拭乾以散敷之三日瘥永除千金翼又方上二月社日盜取社家糜饋一團猥地摩腋下三七遍擲著五道頭勿令人知永瘥人知即不效諾蟲咬第八千金治蛇蠍螫方上服小蒜汁滓薄上肘後方云治蝮蛇螫千金又方上熟搗葵取汁服之千金治蛇齧方上人屎厚塗帛裹即消千金治蛇毒方上消蠟注瘡上不瘥更消注之千金又方上以母豬耳中垢敷之肘後方云牛耳中垢亦可用千金治蠍毒方上凡蠍有雌雄雄者痛止在一處雌者痛牽諸處痛若是雄者用井底泥塗之溫則易雌者用當瓦屋溝下泥敷之若值無雨可用新汲水從屋上淋下取泥千金又方上取齒中殘飯敷之又豬脂封之又射罔封之又硇砂和水塗立愈千金治蠍螫方上若著手足以冷水漬之水微暖則易之著余處者冷水浸故布㩉之小暖則易千金又方上用生烏頭末唾和敷之千金治蜂螫毒方上取瓦子摩其上唾二七遍置瓦子故處千金治蜂螫方蜜豬脂各五合蠟二兩上三味和煎如膏候冷以塗之千金又方上燒牛屎灰苦酒和塗之千金又方上燒蜂房末膏和塗之肘後方云先煮蜂房洗之又燒塗之千金又方上以酥脂塗之立愈千金又方上以淳酢沃地取起泥塗之千金又方上取齒垢塗之千