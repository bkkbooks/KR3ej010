件藥搗粗羅為散每服一錢以水一小盞煎至五分去滓不計時候量兒大小分減溫服嬰孺治小兒墮地有瘀血在腹中天陰則翕翕寒熱不肯乳哺但呼啼方蒲黃大黃甘草各十銖麥門冬十五銖黃連十二銖上以水二升煮一升為三服量兒大小與之忌生冷菘菜冷水張渙蒲黃湯方治打撲或落床墮地至損吐氣羸瘦痿黃或時刺痛遊走不定蒲黃生乾地黃當歸洗炒各一兩赤芍藥琥珀桂心各半兩上件藥搗羅為細末每服一錢水一小盞煎至五分去滓溫服量兒大小加減張渙又方茯神丹茯神麥門冬湯浸去心當歸洗焙乾各一兩人參去蘆頭黃芩龍膽草各半兩以上為細末次用桃仁湯浸去皮尖炒香熟半兩上件同再細研拌勻煉蜜和丸黍米大每服十粒用生地黃汁少許同酒下量兒大小加減誤吞銅鐵等物第十一外臺小品論療小兒誤吞鐵珠子如貍豆大者經年不以為害後病瘦瘠食不生肌膚時下痢或寒熱服諸藥自療來反劇不效有師診之云是吞物不消作法服眾藥所吞物不去終不瘥今其家中察之云兒近歲常弄十六具鐵珠覺失一顆慮是吞之從來積歲實不以為疑師出診乃信是故令病矣為處湯藥所患即瘥復與將療其兒肌膚充悅而忘說其方且記之又有一家女子六七歲許患腹痛其母與摩按之覺手下有一橫物在兒肉裡正平橫爾問兒曰那得針在肉中大驚怪脫衣看之肉全淨無有刺處按之兒亦不患針痛惟覺腹裡痛耳其母即以爪用重重介之乃橫物折爪下兩段亦不偏痛迎師診之共察若吞鐵刺物者其嬰兒不經鯁礙惟恐養兒時母常帶針身抱兒體針入兒肌膚中兒縱覺痛啼呼與乳臥息便止遂成不覺今因腹痛摩之知耳鐵得土木濕皆生屑易朽針在人肉中經數歲因得血氣皆朽也故介之即折令患腹痛不安但療腹痛服溫中湯下心腹痛瘥後長大嫁因產乳不聞道針處為患故記之千金治小兒誤吞針上取磁石如棗核大吞之及含之其針立出聖惠磨磁石如棗核大鑽竅以絲線穿令吞之吸出千金治小兒誤吞鐵等物方上用艾蒿一把銼以水五升煮取一升半服之即下千金治吞錢方上以艾蒿五兩以水五升煮取一升頓服之即下千金又方上末木炭酒服方寸匕水服亦得千金又方上服蜜二升即出千金治吞金銀環及釵方上以白糖二斤一頓漸漸食之多食益佳也千金又方上吞水銀一兩再服之千金誤吞環及指驅方上燒雁毛二七枚末服之鵝羽亦得聖惠用粥飲調服半錢千金誤吞釵方上曝韭令萎蒸熟勿切食一束即出或生麥葉筋縷如薤法皆可用但立意多食自消千金誤吞銅鐵而哽者方上燒銅弩牙令赤內酒中飲之立愈嬰孺用水中滓飲之千金誤吞釘針及箭鏃等方上但多食脂肥肉令飽自裹出千金治誤吞針方上取懸針磁石末飲服方寸匕即下古本錄驗云今吞針在喉中而服磁石末入腹即含碎石口中或吸針出耳外臺肘臺療小兒誤吞梅李方上以少水灌小兒頭盛其水與飲之即出良外臺近效療小兒誤吞錢在喉中不出方上取麩炭末以指彈入喉中其兒當便咯出如日華子治小兒誤吞針錢等方上末磁石同筋膜肉莫令抹斷與磁石少許同下之藥性論治惡瘡小兒吞錢不出方上煮冬葵根飲之即出神妙聖惠治小兒誤吞嚥銅鐵物在喉內不下方上取南燭根燒灰細研以熟水調下一錢瘥聖惠又方上用貘齒骨燒灰細研如粉每服以磨刀水調服一錢止聖惠治小兒誤食發繞咽喉方上用梳頭梳燒灰細研如粉以粥飲調下半錢聖惠治小兒誤吞鉤繩方上凡小兒若誤吞鉤繩繩猶在手中者莫引之但以珠當若穿了薏苡子之輩就貫著繩稍稍令推至鉤處小小引之則出聖惠又方上以常思草頭一把水一大盞搗絞取汁分三四遍飲之即效聖惠治小兒誤吞鉤方上以琥珀珠穿貫鉤繩上推令前入至鉤所又復推以牽引出矣靈苑玉錯散治大人小兒一切骨鯁或竹木簽刺喉中不下方蓖麻一兩去殼寒水石細研如粉上入蓖麻乳缽內研如膏旋入石末同研但旋添入石末袞得幹成粉即止不拘分兩也有被鯁者只取一捻致舌根深處以冷水咽之其鯁物自然不見可用竹木片於舌深處用藥試之立驗嬰孺治小兒吞下錢方上取枲頭一把水二升灌水中十餘度飲之立下嬰孺治小兒吞針方上以炭末水服立出嬰孺治小兒鯁若吞錢不下半夏散方半夏二分洗白蘞一分上為末酒或薑汁服方寸匕再服立下嬰孺治小兒食飲發繞咽喉方上取梳頭髮燒灰服之一錢瘥張渙通氣散方治誤吞銅錢物及鉤繩之類在咽喉不下方象牙末燒存性鵝毛燒灰各一錢磁石一皂皂大燒灰上件搗羅為細末每服半錢新汲水調下莊氏家傳誤吞錢方上用石灰為末酒調服莊氏家傳治小兒誤吞錢神應丸方硃砂三錢精研半夏大者三枚以漿水煮過研石腦油真者須小但斟量稀稠抹和得硃砂半夏二味為度切勿令稀旋旋滴少許在乳缽內研拌二味藥上三件同入乳缽內研令勻膩丸如豌豆大每服三丸空心並食前以酒吞下一日之間吃三服不過一二日或三四日內自然隨大便下來此藥大有神效不取轉不搜覺但趁逐錢下來莊氏家傳又方此與次方吃了令咽喉並胸中不噎悶便吃得物上羊脛炭不計多少搗羅極細再於乳缽內研令極勻膩每服三滿大錢以砂糖溫水調下不計時候日五服臨睡更一服莊氏家傳又方上以舊經穿錢者麻索子二十對須是元金者逐旋討得旋燒旋用於熨斗內以精炭火些小吹去灰燒麻索子作灰乳缽內研令極細只以砂糖溫水調三大錢不拘時一日五服錢索若帶青色者為上玉氏手集治小兒誤吞錢在腹方上用榆白皮濕者搗爛如泥用新水調打半匙許服之自下或乾者搗羅亦得耳中有物不可出第十二千金治耳中有物不可出方上以弓弦從一頭令散敷好膠柱著耳中物上停之令相著徐徐引出孔氏家傳治小兒皂子入耳鼻內方上取曲蟮一條活者用蘿蔔看多少同搗黏以麻錢貫三五寸於剪斷頭邊散開些小點蟮膏在上入耳鼻中便黏出滅瘢痕第十三千金滅瘢痕方上以豬脂三斤飼烏雞一隻令三日使盡後取白屎內白芷當歸各一兩煎白芷色黃去滓內以鷹屎白半兩攪令調敷之日三千金又方上禹餘糧半夏等分末之以雞子黃和先以新布拭瘢令赤塗之勿見風日二十日瘥十年者亦滅千金又方鷹屎白一合辛荑一兩白附子杜若細辛各半兩上五味㕮咀以酒五合浸一宿以羊髓五兩微火煎三上三下去滓小傷瘢上敷之日三千金滅瘢痕無問新舊必除方上以人精和鷹屎白敷之日二白蜜亦得千金治瘢痕凸出方上春夏以大麥麩秋冬以小麥麩好細絹下篩以酥和封之千金又方鷹屎白一兩衣白魚二七枚上二味末之蜜和以敷之日三五度良千金又方上以熱瓦熨之千金又方上以凍凌熨之千金又方鷹屎白二兩白殭蠶一兩半上二味末之以白蜜和敷上日三慎五辛生菜千金又方上以臘月豬脂四升煎大鼠一枚令消盡以生布拭上皮令赤塗之不過四五上譚氏殊聖方療豆瘡瘢痕面黶上以密陀僧細研水調夜塗之明旦洗去平復也中食毒第十四千金治飲食中毒煩滿方上苦參三兩㕮咀以酒二升半煮取一升頓服之取吐愈千金治食六畜肉中毒方上各取六畜干屎末水服之佳若是自死六畜肉毒水服黃柏末方寸匕須臾復與佳千金又方上燒小豆一升末服三方寸匕神良千金又方上服灶底黃土方寸匕千金治食生肉中毒方上掘地深三尺取下土三升以水五升煮土五六沸取上清飲一升立愈千金治食牛肉中毒方上取狼牙灰水服方寸匕良一作豬牙千金又方上以溫湯服豬脂千金又方上以水煮甘草汁飲之千金治食豬肉中毒方上燒豬屎末服方寸匕犬屎亦佳千金治食百獸肝中毒方上頓服豬脂一斤佳亦治陳肉毒千金治食野味馬肝肉諸脯肉毒方上取頭垢如棗核大吞之起死人千金又方上燒狗屎灰水和絞取汁飲之立愈千金又方上燒豬骨末之水服方寸匕日三服千金治漏脯毒方張文仲云茅水沾脯為漏脯上搗韭汁服之良大豆汁亦得千金治郁肉濕脯毒方張文仲云肉閉在密器中經宿者為郁肉上燒狗屎末水服方寸匕凡生肉熟肉皆不用深藏密蓋不泄氣皆殺人又肉汁在器中密蓋氣不泄者亦殺人千金治脯在黍米中毒方上曲一兩以水一升鹽兩撮煮服之良千金又以雉肉作䴵臛因食皆吐下治之方上服犀角末方寸匕得靜甚良千金凡食鵝鴨肉成病胃滿面赤不下食者治之方上服秫米泔良千金治食魚中毒方上煮橘皮停極冷飲之立驗肘後方云治食魚中毒面腫煩亂者千金食魚中毒面腫煩亂及食鱸魚中毒欲死者方上銼蘆根舂取汁多飲食並治蟹毒亦可取蘆葦茸汁飲之愈千金治食魚鱠不消方大黃三兩切朴硝二兩上二味以酒二升煮取一升頓服之仲景方有橘皮一兩肘後方云治食豬肉遇冷不消必成症下之方也無橘皮千金又方上舂馬鞭草飲汁一升即消去也生薑亦良肘後方云亦宜服諸吐藥千金又方上燒魚皮灰水服方寸匕千金又方上燒魚灰水服方寸匕食諸鮑魚中毒亦用之千金治食蟹中毒方上取冬瓜汁服二升亦可食冬瓜千金治食諸菜中毒方甘草貝齒胡粉上三種各等分治下篩以水和服方寸匕小兒尿乳汁共服二升亦好千金治食山中木上菌毒方上取人屎汁服一升良千金治食百物中毒方上掘廁傍地深一尺以水滿坑中取廁籌七枚燒令煙以投坑中乃取水汁飲四五升即愈急者不可得但掘地著水即取飲千金又方上含貝子一枚須臾吐食物瘥千金黃帝云服大豆屑忌食豬肉炒豆不得與一歲以上十歲以下小兒食食者啖豬肉必擁氣死千金翼凡六畜五臟著草自動搖得諸醋鹽不變色及墮地不汙又與犬不食者皆有毒殺人千金翼凡食飲有毒者澆地地墳起者殺人千金翼凡脯肉熟肉皆不用深藏密不泄氣殺人若中此毒者皆大糞灰水服方寸匕良本草注慄實飼孩兒令齒不生本草注蕨小兒食之腳弱不行本草注越瓜白瓜也不益小兒天行病後不可食又不得與牛乳酪及鮓同餐及空心食令人心痛陶隱居俗傳言食蕺不利人腳恐由閉氣故也今小兒食之便覺腳痛陶隱居小兒食雞肉好生蛔蟲陳藏器食蝦無須主五野雞病又煮熟色正赤小兒及雞狗食之腳屈不行又以熱飯盛密器中作鮓食之毒人至死食療小兒夏月不可與越瓜食又發諸瘡令人虛弱冷中常令人臍下為症痛不止食療雞兔同食成泄痢小兒五歲以下未斷乳者勿與雞肉食楊氏產乳凡子不得與桑椹子食令兒心寒孟詵蕺戢者菜小兒食之三歲不行久食之發虛弱損陽氣消精髓不可食此物無似蕎麥莖紫赤色蔓生濕地切南方人好生食閩中為之莉菜嬰童寶鑑凡小兒慎忌不可多食慄令腎氣弱而行遲不可食黍米飯立無力不可食蕨亦立無力不可食雞肉腹中有蟲不可食越瓜發動故疾不可食胡瓜黃瓜也滑中生蟲不可食芡令不能行不可食蕎麥令發落不可食𦽏柴令臍下痛不可食鱘魚令腹有癥癖中藥毒第十五巢氏病源小兒服湯藥中毒候小兒有疹患服湯藥其腸胃脆嫩不勝藥氣便致煩毒也故謂之中毒千金論曰甘草解百毒此實如湯沃雪有同神效有人中烏頭巴豆毒甘草入腹即定中藜蘆毒蔥湯下咽便愈中野葛毒土漿飲訖即止如此之事其驗如反掌要使人皆知之然人皆不肯學誠可嘆息方稱大豆汁解百藥毒余每試之大懸絕不及甘草又能加之為甘豆湯其驗尤奇有人服玉壺丸治嘔不能已百藥與之不止藍汁入口即定如此之事皆須知之此則成規更不須試練也解毒方中條例極多若不指出一二學者不可卒知余方例爾千金百藥毒甘草薺苨大小豆汁藍汁及實汁根汁千金食藥毒白鴨屎人參汁千金雄黃毒防己千金礬石毒大豆汁白鵝膏千金金銀毒服水銀數兩即出鴨血及屎汁雞子汁及屎白燒豬脂和服水淋雞屎汁煮蔥汁千金鐵粉毒磁石千金防葵毒葵根汁千金桔梗毒白粥千金甘遂毒大豆汁千金芫花毒防己防風甘草桂汁千金大戟毒菖蒲汁千金野葛毒雞子清千金翼打破雞子一枚併吞之即吐野葛葛根汁甘草汁千金翼煮甘草汁冷飲鴨頭熱血豬膏人屎雞屎千金翼服雞屎汁千金藜蘆毒雄黃煮蔥汁溫湯千金烏頭天雄附子毒大豆汁遠志防風棗肉飴糖千金射罔毒藍汁大小豆汁竹瀝大麻子汁六蓄血貝齒屑蚯蚓屎藕芰汁千金半夏毒生薑汁及煮乾薑汁千金躑躅毒梔子汁千金莨菪毒薺苨甘草犀角蟹汁升麻千金狼毒毒杏仁藍汁白蘞鹽汁木占斯千金巴豆毒煮黃連汁大豆汁菖蒲汁生藿汁肘後云小豆藿煮寒水石汁千金蜀椒毒葵子汁桂汁豉汁人尿冷水土漿蒜雞毛燒吸菸及水調服千金雞子毒淳醋千金斑蝥芫青毒豬膏大豆汁戎鹽藍汁巴豆鹽湯煮豬膏千金馬刀毒清水千金杏仁毒藍子汁千金野芋毒土漿人糞汁千金諸菌毒上掘地作坑以水沃中攪之令濁澄清飲之名地漿千金解一切毒藥發不問草石始覺惡即服此方生麥門冬蔥白各八兩豉二升上三味㕮咀以水七升煮取二升半分三服千金解諸毒雞腸草散方雞腸草三分薺苨升麻各四分芍藥當歸甘草炙各二分藍汁一合坌土一分上八味治下篩水服方寸匕多飲水為佳若為蜂蛇等眾毒蟲所螫以針刺螫上血出著藥如小豆許於瘡中令濕瘥為射罔箭所中削竹如釵股長一尺五寸以綿纏繞水沾令濕取藥內瘡中隨瘡深淺令至底止有好血出即休若服藥有毒水服方寸匕毒解痛止愈千金解毒藥散方薺苨一分藍並花二分上二味七月七日取藍陰乾搗篩水和服方寸匕日三千金又方上取秦燕毛二七枚燒灰服千金解一切毒方上取母豬屎水和服之又水三升三合和米粉飲之千金解鴆毒及一切毒藥不止煩滿方甘草四分蜜四分千金翼用八分粱米粉一分千金翼用半升上三味以水五升千金翼以水三升煮甘草取二升去滓歇大熱內粉湯中攪令勻調內白蜜更煎令熱如薄粥適寒溫飲一升佳千金治食莨菪悶亂如卒中風或似熱盛狂病服藥即劇方上飲甘草汁藍青汁即愈千金治野葛毒已死口噤者上取青竹去兩節柱兩脅臍上內冷水注之暖即易之須臾口開開即服藥立活惟須數易水千金翼云忌酒千金治鉤吻毒困欲死面青口噤逆冷身痹方肘後方云鉤吻茱萸食芥相似而所生之傍無他草又莖有毛誤食之殺人上取薺苨八兩㕮咀以水六升煮取三升冷如人體服五合日三夜二凡煮薺苨惟令濃佳千金又方上煮桂汁飲之千金又方上啖蔥涕治諸毒千金治腹中有鐵方上取自折炭刮取末井花水服三錢不過再服千金服藥過劑悶亂者方吞雞子黃飲藍汁水和胡粉地漿襄荷汁粳米沈豉汁乾薑黃連飴糖水和葛粉千金翼治惡毒藥方上狗舌草一把去兩頭以水五升銅器中煮取汁搜面作粥食之千金翼鉤吻眾毒困欲死面青口噤逆冷身痹方上煮藍汁飲之養生必用金虎碧霞丹施之小兒為害彌大蓋小兒臟腑氣血柔弱不能支當有毒藥尤宜慎重中水毒第十六千金論曰凡山水有毒蟲人涉水中覺似射工而無物其診法初得之惡寒微以頭痛目痛心中煩懊四肢振惞腰背百節皆強兩膝痛或翕翕面熱但欲睡旦醒暮劇手足逆冷至肘膝二三日腹中生蟲食人下部肛中有瘡不痛不癢令人不覺不急治過六七日下部出膿潰蟲上食人五臟熱盛毒煩下利不禁八九日良醫不能治矣覺得之急早視其下部若有瘡正赤如截肉者陽毒最急若瘡如鯉魚齒者為陰毒猶小緩要皆殺人不過二十日也欲知是中水與非者當作五六升湯以小蒜五升㕮咀投湯中消息勿令大熱去滓以浴之是水毒身體當發赤斑無異者非也當以他病治也千金治中水毒方上取梅若桃葉搗絞取汁三升許或干以少水絞取汁飲之小兒不能飲以汁敷乳頭與吃千金翼治水毒方上搗蒼耳取汁服一升以綿沾汁滓導下部中日三千金翼又方上取蓼一把搗取汁服一升不過三服千金翼又方上取藍一把搗水解以洗面目身令遍千金翼又方上取大莓根末飲之並導下部生蟲者用汁夏月常多將此藥屑入水浴以方寸匕投水上流無所畏又闢射工凡洗浴以少許投水盆中即無復毒也百病第十七巢氏病源小兒百病候小兒百病者由將養乖節或犯寒溫乳哺失時乍傷飢飽致令血氣不理腸胃不調或欲發驚癇或欲成伏熱小兒氣血脆弱病易動變證候百端若見其微證即便治之不成眾病故謂之百病也治之若晚其病則成凡諸病至於困者汗出如珠著身不流者死也病如囟陷口唇乾目皮反口中氣出冷足與頭相柱臥不舉手足四肢垂其臥正直如縛其掌中冷至十日必死不可治也千金治小兒赤白下痢及狐臭耳聾鼻塞等病此藥以三丸為一劑服藥不過三劑萬病悉除說無窮盡故稱萬病丸以其牛黃為主故一名牛黃丸以耆婆良醫故名耆婆丸方牛黃麝香犀角一方云一銖今各一分硃砂雄黃黃連禹餘糧大戟芫花人參茯苓乾薑炮桂心當歸芎藭芍藥甘遂黃芩桑白皮蜀椒細辛桔梗巴豆去皮臍前胡紫菀蒲黃紙上微炒葶藶防風各一分芫青七枚石蜥蜴一寸蜈蚣三節上三十一味崔氏無黃芩桑白皮桔梗防風為二十七味並令精細牛黃麝香犀角硃砂雄黃禹餘糧巴豆別研余者各搗重絹下之以白蜜和更搗三千杵密封之破除日平旦空腹酒服三丸如梧子大取微下三升惡水為良若卒暴病不要待平旦無問早晚即服以吐利為度若不吐利更加一丸或至三丸五丸須吐利為度不得限以丸數病強藥少即不吐利更非他故若其發遲以熱飲汁投之若吐利不止即以醋飯兩三口止之服藥忌陳臭生冷酢滑黏食大蒜豬魚雞狗馬驢肉若一歲以下小兒有疾者令乳母服兩小豆亦以吐利為度近病及卒病皆用多積久疾病即少服常取微溏利為度小兒客忤服二丸如米和乳汁敷乳頭令嗍之小兒驚癇服二丸如米塗乳頭令嗍之看兒大小量之小兒乳不消必腹脹滿服二丸如米塗乳頭令嗍之不瘥更服千金翼治百病諸荒邪狂走氣痞冷病歷年黃黑大腹水腫小兒丁奚瘧疾經年霍亂中惡蜚屍及暴疾皆悉主之方巴豆去心皮斑蝥去翅足熬芫青各三十枚天雄炮去皮乾薑各半兩烏頭附子各炮去皮細辛蜀椒汗去目閉口者躑躅黃芩桂心各一兩上一十二味細切以絹袋中盛酒一斗漬十日去滓服半合日三以知為度曝滓作散酒服半錢上日三強人一錢傷寒中溫濕冷頭痛拘急寒熱瘧發頭風皆須服一錢匕厚覆取汗初服當吐清汁三四升許又主心疝婦人無子服之煩悶不堪者飲冷水一升即解外臺深師鎮心丸療老小心氣不足虛弱時若小語勞則劇風邪百病並主之方銀屑一分半研牛黃九銖丹砂研甘草炙麥門冬去心遠志去心各五分桂心乾薑各六分菖蒲紫菀各三分防葵人參附子炮紫石英研防風細辛茯神椒汗各四分上十八味搗下篩以白蜜和丸如梧子先食服三丸日三不知稍增之忌海藻菘菜生菜豬肉生蔥生血物餳丹砂一作丹參外臺必效七宣丸方大黃十五兩枳實炙青木香訶黎勒皮柴胡各五兩桃仁去尖皮熬六兩甘草四兩炙上七味搗篩蜜和丸如梧子大以酒服二十丸稍加至五十丸病在下空腹服病在上食後服之以宣利為度增減以意量之若風氣結聚宿食不消兼砂石皮毛在腹中服經七八日乃盡出下似牛涎魚腦等若病深痼則須半月或一月專服之不用五補丸五補丸三人所服此更不毒若積年腰膝疼痛寒冷如水石腳氣衝心憒悶將死頭旋暗倒肩背重悶心腹脹滿胸膈閉塞風毒腫氣連及頭面及大小便或利或澀脾胃氣不理不能飲食夜臥腳轉筋脈掣痛恍恍然眠寢不安等疾以飲服之盡瘥此藥功效不可盡說如前十數種病攻擊則須服七宣丸令除自外輕病下妨與五補丸兼服循環不輟補養無限不問男女老小並可服餌但須量氣力細察候之加減服若是初生孩子可與三丸五丸稍稍加之取通利其二方當須經久常服不限春秋冬夏朝夕行止間藥性甚善禁如常法外臺仙人煉絳雪療一切病肺氣積聚咳逆嘔吐膿血丹石毒發天行時氣一切熱病諸黃疸等心風昏亂心忪健忘四肢煩熱頭痛眼赤大小便不通煩悶不安骨節疼痛赤白痢血痢熱毒痢宿食不消化心腹脹滿出氣不得下一切諸毒藥腳氣等飲酒多醉困久痢不瘥孩子驚癇等以上和水服之產後一切諸病墮胎和酒服之方朴硝十斤升麻三兩大青桑白皮槐花各二兩犀角屑羚羊角屑各一兩蘇枋木六兩竹葉兩握訶黎勒皮山梔子三十枚檳榔二十顆硃砂半兩細研上十三味以水二斗漬一宿煎取一斗去滓入鍋內朴硝煉烊攪勿住手候欲凝出於盆中攪入硃砂麝香訖雪成後於垍器中密封有疾量取之和水服之以利病除身輕目明四肢調適療一切病神驗老小量之上云入硃砂麝香未見分兩外臺仲景三物備急丸司空裴秀為散用療心腹諸卒暴百病方大黃乾薑巴豆去皮心熬別搗如脂各一兩上藥各須精新好藥搗篩蜜和更搗一千搗丸如梧子或小豆服三丸老小量之為散不及丸也若中惡客忤心腹脹滿卒痛如錐刀刺痛氣急口噤停屍卒死者以暖水若酒服之或不下捧頭起灌令下咽須臾更瘥如未更與三丸以腹中當鳴轉即吐下便愈若口已噤亦須折齒灌之令入尤妙神驗忌蘆筍豬肉冷水肥膩外臺必效玉壺丸主萬病與麝香丸同效方雄黃硃砂各研巴豆去皮心熬特生礜石燒半日研附子炮去皮藜蘆炙各三兩上六味搗篩蜜和丸如小豆以飲服二丸得利病瘥小兒黍粟一丸以意量之外臺劉氏療小兒百病上冷下熱上熱下冷難將息方犀角末甘草生地黃各六分芍藥五分白朮茯苓梔子各三分柴胡人參大黃生薑各四分黃芩二分桂心一分上十三味切以水三升煮取一升分溫服之仙經治百病方上以朴硝制伏為元明粉朴硝是太陰之精華水之子也陰中有陽之藥太陰號曰元明粉小兒疳氣陰毒傷寒表裡疫癘等候並悉治之此藥久服令人身輕目明駐顏延壽急解毒藥補益妙唐明皇帝聞說終南山有道士劉元真服食此藥遂詔而問曰朕聞卿壽約三百歲服食何藥得住世間充悅如此元真答曰臣接仙經修煉朴硝號元明粉止服此藥遂無病長生其藥無滓性溫能除眾疾生餌尚能救急難性命何況修煉長服益精壯氣助氣正陰不拘丈夫婦人幼稚襁褓不問四時冷熱俱治一兩分為十二服但臨時酌量加減似覺壅熱傷寒頭痛鼻塞四肢不舉飲食不下煩悶氣服不論晝夜急疾要宣瀉求安即看年紀高下用藥一分或至半兩酌量加減用桃花湯下為使最上次用蔥湯下食後隨冷熱服經驗方備急治一切疾患山豆根方上用山大豆根不拘多少依下項治療一名解毒二名黃結三名中藥患蟲毒密遣人和水研已禁聲服少許不止再服患禿瘡以水研敷瘡上患喉痛含一片細嚥津患五種痔水研服患齒痛含一片於痛處患麩豆等瘡水研服少許患頭風搗末油調塗之患赤白痢搗末蜜丸空心煎水下二十丸三服自止患腹脹滿喘悶搗末少許煎水調一盞瘥患瘡癬搗末臘月豬脂調塗之患頭上白雪屑搗末油浸塗如是孩兒即乳汁調半錢患中宿冷寸白蟲每朝空心熱酒調三錢其蟲自出患五般急黃空心以水調二錢蟲氣酒下二錢霍亂橘皮湯下三錢熱腫熱酒空心下三錢卒腹痛水研半錢蜘蛛咬唾和塗狗咬蚍蜉瘡蛇咬並水研敷聖惠治兒百病變蒸客忤驚癇壯熱不解龍膽草散喘促痰結胸中滿悶虎睛仁炙一對犀角吳藍赤芍藥牽牛子炒牡蠣燒鱉甲酥炙淨各半兩巴豆霜半分真珠牛黃桔梗漢防己杏仁麩炒各一分羅末煉蜜和搗五百杵丸如綠豆湯下二丸量加靈苑萬病散一名無憂散諸風瘡腫疥癬臟腑積冷壅滯結為風勞膀胱宿冷臟腑衰敗面黃癥癖氣塊疳蛔攻心痛中寒腦痛狀如山嵐時疫急服宣轉三五行瘥或中風口喎語謇睡後涎出十日一服三服永瘥久患腰膝疼痛拜跪艱難坐食不安進一兩服兒疳痢脫肛量與男女久泄氣痢狀似休息一服搜出冷痰一二升此藥並不困倦不妨行步服藥一兩日後便覺身輕目明腰下減重頓思飲食婦人久患血癆痿黃無力亦宜孕婦或遇廢晦勿服服後疾未除將息三四日再服黃耆木通桑白皮陳皮白朮木香胡椒各半兩作一服別研置牽牛子微炒勿周熱頭末一兩黃耆散二錢牽牛末二錢天色晴明五更薑湯小半盞調藥頓服更以湯送平明宣三兩行下多不妨應臟腑百病悉出轉後吃一日白粥補養生神麯治兒諸疾丙日作曲丁日治藥名丙丁膏天南星烏蛇肉各三錢麻黃去節天麻各半兩大附子炮淨一枚蠍分半白附子三錢半白殭蠶四錢末水一升浸三日捩滓寒食曲一斗和踏曲楮葉罨七日紙袋懸十四日治兒吐瀉後精神困頓不乳多睡入龍麝湯服變癇鴉聲面青黃瘛瘲咽中不利硃砂龍麝曲服又滑痢曲末蜜丸雞頭大湯化又曲一兩入硃砂雄黃少許琥珀甘草末各二錢蜜丸雞頭大名太一丹嬰孺治八痞積聚留飲伏熱宿食不化裡急腹痛往來寒熱羸瘦骨立飲食不為氣力多厭翕翕短氣魂神不守邪鬼往來恍惚不定醫不能治太乙決疑牛黃雙丸牛黃棗大馬目毒公二個附子一枚巴豆炒四十枚雄黃丹砂真珠甘草牡蠣煆蜀椒汗白蜜各一兩杏仁炒淨五十粒研末杵杏仁千下次入巴豆次牛黃真珠並杵又銅器煎蜜熱灌臼中下諸藥杵千下丸如桐子飲服一丸一宿當和大便出勿復與藥兒一歲內寒熱在脅結痛哺乳吐下劇者瘛瘲及背不著席手足皆舉目青嘔沫名風癇為腹癖以小豆大二丸平旦服日中臨臥各服二丸至十二丸不去服桐子大二丸又不愈難治大病數年此藥決之破除日合勿令婦人見一無甘草目毒有甘遂一兩常山二兩五參丸治百病熱毒人參苦參丹參元參沙參各二分柴胡茯苓各四分巴豆淨䗪蟲淨各十枚黃芩三分葶藶杏仁淨各半合末蜜丸飲下小豆大二丸日再不知加若心下食不消用吐下一無黃芩柴胡茯苓杏仁加乾薑炮附子各一分防風半分椒出汗半合治五癇吐痢寒熱不乳百病大黃湯大黃五兩滑石龍骨當歸芍藥黃芩桂心甘草炙人參青石脂牡蠣煆石膏各二兩粗末囊盛五歲下棗五枚水八合煮五合撮藥湯中煮三沸絞滓先食盡服有乳痰即吐宿乳若下宿乳當止中風汗出㽲痛服後安臥衣蓋兒大量加治百病驚癇紫芝丸紫芝胡黃連當歸羚羊角赤石脂人參馬齒炙各一分川椒杏仁蚱蟬烏蛇雀甕並炒蜂房丹參乾薑芍藥龍骨細辛黃連芎各二分丹砂熬十上下牛黃各五分東門上雞頭炙一枚末一歲兒食前乳汁和丸如大豆二丸日三不知加一有蜣螂桂心各三分主病甚多常帶令不病保童丸治諸疾一歲上無辜疳濕閃癖驚癇魍魎除天行赤眼面黃等牛黃夜明砂甘草炙甘遂牡蠣真珠巴豆淨煮五七沸霜各一分虎睛一分芍藥黃苓杏仁淨各四分末煉蜜和杵三千下垍器密封飲下三丸褥中兒米大一丸量兒加利下覺虛吃蒸餅煮生赤棗五六枚蔥薤作羹大妙覺吃冬瓜羹數次及裹頭豉粥奶母同忌服藥後熱服炙鱉甲末飲下一錢張氏太乙金華散木香桂心白姜陳皮白蕪荑當歸白朮吳茱萸各一分大黃半分檳榔二枚一生一熟黃連巴豆水浸二宿逐日換淨研各半兩肉豆蔻一枚大附子一枚皂莢一挺浸去黑皮半炮半酥炙無酥醋代末研五百轉傾藥入銚盞蓋定煻火灰上坐一茶久開盞拭汗可五度逐轉以匙抄勻七日後可服霍亂菖蒲湯陰毒傷寒發汗麻黃湯血氣當歸酒一切風漢防己湯難產胎橫益母湯胎衣不下酒調腰腳痛薑蔥酒產後血痢蘿蔔子酒兒疳氣蔥湯咳嗽桑白皮湯或杏仁湯食症神麯湯吐逆生薑湯瀉痢黃連湯脾氣茶下心痛蕪荑酒打撲損暖酒下兒蛔咬心冷水妊娠氣衝心安胎酒下兒腸頭出甑帶灰水調大小便不通茶下粥引赤白帶下赤蜀葵湯腳痛履地不得酒下敗血不散米飲血刺厚朴湯血汗曾臥竹簟灰湯酒疾酒下肉疾肉汁下熱面疾麵湯下腳氣冷茶五勞七傷豬膽湯或柴胡湯痃癖准上口瘡棗湯五疳乳汁肺氣咳逆杏仁湯胃氣陳皮湯一切瘡腫白蜀葵湯眼昏黑豆湯頭風發落大黃湯邪氣中心發灰湯產後血衝心酒下胎動芎藭湯懷胎心痛蕪荑湯懷胎痢艾湯大人一字兒量服治兒驚疳變蒸傷寒瀉痢多嗽口瘡雀目疳蟲咬心至聖青金丹青黛雄黃胡黃連各二分硃砂膩粉熊膽水化入藥蘆薈各一分白附子二枚麝半分蟾酥水銀各皂子大龍膽鉛白霜各少許末獖豬膽一枚汁熬浸蒸餅丸青黛衣丸如梧子或如豆曝乾瓷器密封常服金銀薄荷湯磨一二丸三五日進一服驚風天瘹眼上搐搦湯化滴鼻中嚏噴二五遍即定薄荷湯進二丸五疳粥飲下變蒸薄荷湯化下寒熱薄荷湯化下久患瀉痢米飲下疳眼乳汁化塗眼鼻下赤爛疳瘡等乳汁下雀目羊子肝一個竹刀批開入藥兩丸麻縷纏米坩煮熟空心吃乳母忌食雜物常隔一二日與之服永無諸疾別一方前添入蟬殼二分龍齒一分尤妙又以麝香水和糯米粉一兩匙丸亦得王氏手集萬安丸治小兒百病神效方乳香明淨者二錢五分研細辰砂如石榴子者木香搗羅為末各半兩安息香如琥珀者二銖巴豆四十粒去皮心膜細研紙壓去油如霜方用上先將辰砂研細次入巴豆霜研與硃砂同色又入木香末研勻次入乳香安息香研勻用軟飯和成劑以真酥潤手丸如綠豆大每服三五粒溫湯送下
